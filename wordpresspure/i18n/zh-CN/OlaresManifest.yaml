metadata:
  description: 博客工具、发布平台、CMS
  title: WordPress

spec:
  fullDescription: |
    WordPress 现已为全球超过 43% 的网站提供支持——这个数字每天都在增长。从简单的网站、博客，到复杂的门户和企业网站，甚至是应用程序，都可以用 WordPress 构建。
    
    WordPress 为用户和发布者提供了简洁的使用体验，同时为开发者开放底层的复杂性。这种灵活性让它既易于使用，又功能强大。

    **以下是我们认为你一定会喜欢的一些特性。**
    简单易用

    灵活性
    - 你可以创建任何类型的网站：个人博客、个人网站、摄影博客、企业网站、专业作品集、政府网站、杂志或新闻网站、在线社区，甚至是网站网络。通过主题让你的网站美观，通过插件扩展功能，甚至可以打造你自己的应用。

    轻松发布
    - 你可以轻松创建文章和页面，方便格式化和插入媒体，只需点击按钮即可让你的内容上线。

    发布工具
    - 创建草稿、定时发布并查看文章修订历史。可以将内容设为公开或私有，也可用密码保护文章和页面。

    用户管理
    - 你的网站可以有多种类型的贡献者，让更多人参与到社区中。管理员管理网站，编辑处理内容，作者和投稿者负责撰写内容，订阅者则可以管理自己的个人资料。

    媒体管理
    - 可以快速方便地上传图片和媒体文件到 WordPress。将媒体拖放到上传器即可添加到网站中。添加图片描述和标题，并插入图片或图库到内容里，还可以用一些实用的图片编辑工具。

    完全符合标准
    - WordPress 生成的每一行代码都完全符合 W3C 的标准。

    主题系统简便
    - WordPress 自带三套默认主题，还有数千个主题可供选择，让你创建出美观的网站。

    插件扩展
    - 拥有成千上万款插件。可添加复杂图库、社交网络、论坛、社交媒体挂件、防垃圾、日历、搜索引擎优化控件、表单等丰富功能。

    内置评论功能
    - WordPress 配备了完整的评论工具，让你的网站可以成为讨论的平台，并能轻松管理讨论。

    搜索引擎优化
    - WordPress 开箱即用已为搜索引擎优化，若需更细致优化，可以通过海量 SEO 插件实现。

    多语言支持
    - WordPress 支持 70 多种语言。

    简单的安装与升级

    导入工具
    - WordPress 内置 Blogger、LiveJournal、Movable Type、TypePad、Tumblr 和 WordPress 的导入工具。

    数据自主
    - 使用 WordPress 意味着没有人能访问你的内容，数据完全属于你——包括网站、内容和数据。

    自由
    - WordPress 遵循 GPL 协议，该协议旨在保护你的自由。

    社区
    - 作为全球最受欢迎的开源 CMS，WordPress 拥有充满活力且互助的社区。

    参与贡献
    - 你也可以成为 WordPress 的一份子！可以帮助开发 WordPress、在支持论坛回答问题、撰写文档、将 WordPress 翻译成你的语言、参与 WordCamp 演讲、在你的博客写 WordPress 文章等。无论你有什么技能，我们都欢迎你的加入！

    立即参与：https://make.wordpress.org/
  upgradeDescription: |
    WordPress 6.4.2 现已发布！

    本次小版本更新对核心程序修复了 7 个 bug。其中包括一个有时导致样式表和主题目录返回错误结果的问题修复。

    此版本还包含一个安全修复。由于这是一次安全更新，建议你立即更新你的网站。

    安全团队在此版本中修复了以下漏洞。

    一个远程代码执行漏洞，该漏洞本身在核心中不可直接利用，但安全团队认为，在某些插件配合下、尤其是在多站点安装中，可能存在高风险。

    详细公告：https://wordpress.org/news/2023/12/wordpress-6-4-2-maintenance-security-release/
