{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-download-models
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-download-models
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-download-models
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download-model
          image: "docker.io/beclab/harveyff-hf-downloader-only:v0.0.7"
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
          args:
            - "--tasks"
            - '{"tasks":[{"repo":"ACE-Step/Ace-Step1.5","file":"","ref":"main","outDir":"/app/checkpoints","doneNameTpl":".Ace-Step1.5.done"},{"repo":"ACE-Step/acestep-v15-xl-sft","file":"","ref":"main","outDir":"/app/checkpoints/acestep-v15-xl-sft","doneNameTpl":".acestep-v15-xl-sft.done"},{"repo":"ACE-Step/acestep-5Hz-lm-4B","file":"","ref":"main","outDir":"/app/checkpoints/acestep-5Hz-lm-4B","doneNameTpl":".acestep-5Hz-lm-4B.done"}]}'
            - "--static"
            - "/app/static"
            - "--port"
            - "8090"
            - "--probe-url"
            - "/gradio_api/info"
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: "1"
              memory: 1Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      volumes:
        - name: checkpoints
          hostPath:
            path: "{{ .Values.sharedlib }}/ai/acestep15v2"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-download-models
  ports:
    - name: download-status
      port: 8090
      targetPort: 8090
  type: ClusterIP
{{- end }}
