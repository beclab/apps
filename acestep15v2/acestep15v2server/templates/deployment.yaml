{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acestepv2
  namespace: {{ .Release.Namespace }}
  labels:
    app: multi-port
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-port
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: multi-port
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - chown -R 1000:1000 /app/checkpoints
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: acestep
          image: "docker.io/beclab/ace-step-ace-step-1.5:0.1.8"
          ports:
            - containerPort: 7860
          command:
            - /bin/bash
            - '-c'
            - |
              set -e
              MAIN_DONE="/app/checkpoints/.Ace-Step1.5.done"
              XL_DONE="/app/checkpoints/acestep-v15-xl-sft/.acestep-v15-xl-sft.done"
              LM_DONE="/app/checkpoints/acestep-5Hz-lm-4B/.acestep-5Hz-lm-4B.done"
              echo "[wait] Waiting for model downloads..."
              while [ ! -f "$MAIN_DONE" ] || [ ! -f "$XL_DONE" ] || [ ! -f "$LM_DONE" ]; do
                echo "[wait] main=$([ -f "$MAIN_DONE" ] && echo ok || echo pending) xl-sft=$([ -f "$XL_DONE" ] && echo ok || echo pending) lm-4b=$([ -f "$LM_DONE" ] && echo ok || echo pending)"
                sleep 10
              done
              echo "[wait] All required models ready, starting ACE-Step server."

              cd /app
              if [ -x /app/docker-entrypoint.sh ]; then
                export ACESTEP_MODE=gradio
                export ACESTEP_INIT_SERVICE=true
                export GRADIO_SERVER_NAME=0.0.0.0
                export GRADIO_PORT=7860
                export ACESTEP_EXTRA_ARGS="--service_mode true --language ${ACESTEP_UI_LANGUAGE:-en} --device ${ACESTEP_DEVICE:-auto}"
                exec /app/docker-entrypoint.sh
              fi

              exec uv run python -m acestep.acestep_v15_pipeline \
                --server-name 0.0.0.0 \
                --port 7860 \
                --init_service true \
                --service_mode true \
                --init_llm true \
                --config_path "${ACESTEP_CONFIG_PATH}" \
                --lm_model_path "${ACESTEP_LM_MODEL_PATH}" \
                --backend "${ACESTEP_LLM_BACKEND:-pt}" \
                --language "${ACESTEP_UI_LANGUAGE:-en}" \
                --device "${ACESTEP_DEVICE:-auto}"
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: ACESTEP_CONFIG_PATH
              value: "acestep-v15-xl-sft"
            - name: ACESTEP_INIT_SERVICE
              value: "true"
            - name: ACESTEP_LM_MODEL_PATH
              value: "acestep-5Hz-lm-4B"
            - name: ACESTEP_LLM_BACKEND
              value: "pt"
            - name: GRADIO_SERVER_NAME
              value: "0.0.0.0"
            - name: GRADIO_PORT
              value: "7860"
            - name: ACESTEP_MODE
              value: "gradio"
            - name: ACESTEP_DOWNLOAD_SOURCE
              value: "auto"
            - name: ACESTEP_USE_FLASH_ATTENTION
              value: "true"
            - name: ACESTEP_OFFLOAD_TO_CPU
              value: "true"
            - name: ACESTEP_LM_OFFLOAD_TO_CPU
              value: "true"
            - name: ACESTEP_DEVICE
              value: "auto"
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: ACESTEP_UI_LANGUAGE
              value: "en"
          envFrom:
            - configMapRef:
                name: acestep-config
          resources:
            requests:
              cpu: "500m"
              memory: 12Gi
            limits:
              cpu: "5"
              memory: 29Gi
          volumeMounts:
            - name: checkpoints
              mountPath: /app/checkpoints
            - name: outputs
              mountPath: /app/gradio_outputs
            - name: logs
              mountPath: /app/logs
          imagePullPolicy: IfNotPresent
      volumes:
        - name: checkpoints
          hostPath:
            path: "{{ .Values.sharedlib }}/ai/acestep15v2"
            type: DirectoryOrCreate
        - name: outputs
          hostPath:
            path: "{{ .Values.userspace.userData }}/AI/output/acestep15v2"
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: "{{ .Values.userspace.appData }}/logs"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: acestep-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: multi-port
  ports:
    - name: main-api
      port: 7860
      targetPort: 7860
  type: ClusterIP
{{- end }}
