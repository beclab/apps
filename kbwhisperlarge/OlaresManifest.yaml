olaresManifest.version: "0.11.0"
olaresManifest.type: app
metadata:
  name: kbwhisperlarge
  description: Private transcription API powered by KBLab kb-whisper-large.
  icon: https://huggingface.co/front/assets/huggingface_logo-noborder.svg
  appid: kbwhisperlarge
  title: KB Whisper Large
  version: "1.0.0"
  categories:
    - AI
    - Utilities
    - Developer Tools
permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: "gpu-cu128"
  fullDescription: |
    KB Whisper Large exposes a transcription API on Olares using the model:

    - `KBLab/kb-whisper-large`

    Endpoints
    - `GET /`
      - Returns service metadata and model initialization state.
    - `GET /health`
      - Returns runtime health and model loading status.
    - `GET /v1/models`
      - Returns the configured model id.
    - `POST /v1/audio/transcriptions`
      - OpenAI-style transcription endpoint using multipart form-data.
      - Request fields:
        - `file` (required)
        - `model` (must be `KBLab/kb-whisper-large`)
        - `language` (optional)
        - `prompt` (optional)
        - `response_format` (`json`, `verbose_json`, or `text`)
        - `temperature` (optional)
    - `POST /transcribe`
      - Simple alias that returns `{ "text": "..." }`.

    Example request
    - `curl -X POST http://kbwhisperlarge-svc:8000/v1/audio/transcriptions -F "model=KBLab/kb-whisper-large" -F "file=@./sample.wav" -F "language=sv"`

    Notes
    - First request may be slow while model weights are pulled into app data.
    - Hugging Face cache is persisted at `userspace.appData/huggingface`.
    - This package targets `amd64` Olares nodes with NVIDIA GPU support.
  developer: progress44
  website: https://huggingface.co/KBLab/kb-whisper-large
  sourceCode: https://github.com/progress44/rpi-system
  submitter: progress44
  doc: https://huggingface.co/KBLab/kb-whisper-large
  license:
    - text: Apache-2.0
      url: https://huggingface.co/KBLab/kb-whisper-large
  locale:
    - en-US
  requiredMemory: 12Gi
  limitedMemory: 12Gi
  requiredDisk: 5Gi
  limitedDisk: 40Gi
  requiredCpu: 4
  limitedCpu: 4
  requiredGpu: 12Gi
  limitedGpu: 16Gi
  supportArch:
    - amd64
options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.1-0"
envs:
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
entrances:
  - name: kbwhisperlarge
    port: 8000
    host: kbwhisperlarge-svc
    title: KB Whisper Large
    icon: https://huggingface.co/front/assets/huggingface_logo-noborder.svg
    authLevel: internal
    openMethod: window
