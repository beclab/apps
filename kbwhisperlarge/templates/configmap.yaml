---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kbwhisperlarge-config
  namespace: {{ .Release.Namespace }}
data:
  WHISPER_MODEL_ID: {{ .Values.whisper.modelId | quote }}
  WHISPER_DEVICE: {{ .Values.whisper.device | quote }}
  WHISPER_DEFAULT_LANGUAGE: {{ .Values.whisper.defaultLanguage | quote }}
  WHISPER_MAX_UPLOAD_SIZE_MB: {{ .Values.whisper.maxUploadSizeMb | quote }}
  WHISPER_ENABLE_DOCS: {{ .Values.whisper.enableDocs | quote }}
  HF_ENDPOINT: {{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE | default "https://huggingface.co/" | quote }}
  HF_TOKEN: {{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN | default "" | quote }}
  HUGGING_FACE_HUB_TOKEN: {{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN | default "" | quote }}
  HF_HOME: /data/huggingface
  HF_HUB_CACHE: /data/huggingface/hub
  TRANSFORMERS_CACHE: /data/huggingface/transformers
  NVIDIA_VISIBLE_DEVICES: {{ .Values.whisper.nvidiaVisibleDevices | quote }}
  NVIDIA_DRIVER_CAPABILITIES: {{ .Values.whisper.nvidiaDriverCapabilities | quote }}
