olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: paddleocrv3
  description: Text Recognition & Doc Parsing Toolkit
  icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
  appid: paddleocrv3
  version: '1.1.5'
  title: PaddleOCR
  categories:
  - Utilities_v112

  - AI

sharedEntrances:
- name: paddleocr
  title: PaddleOCR API
  host: sharedentrances-paddleocr
  icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
  port: 0
  invisible: true
  authLevel: internal

entrances:
- name: paddleocr-client
  port: 80
  host: paddleocr-svc
  title: PaddleOCR
  icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
  authLevel: private
  openMethod: window

workloadReplicas:
  paddleocrv3: 1
  paddleocrclient: 1

permission:
  appData: true
  appCache: true
  userData:
  - Home

spec:
  versionName: '3.4'
  promoteImage:
  - https://app.cdn.olares.com/appstore/paddleocr/1.webp
  - https://app.cdn.olares.com/appstore/paddleocr/2.webp
  - https://app.cdn.olares.com/appstore/paddleocr/3.webp
  fullDescription: |
    PaddleOCR is an industry-leading, production-ready OCR and document AI engine, offering end-to-end solutions from text extraction to intelligent document understanding

    PaddleOCR converts documents and images into structured, AI-friendly data (like JSON and Markdown) with industry-leading accuracy—powering AI applications for everyone from indie developers and startups to large enterprises worldwide. With over 60,000 stars and deep integration into leading projects like MinerU, RAGFlow, pathway and cherry-studio, PaddleOCR has become the premier solution for developers building intelligent document applications in the AI era.

    **Core Features**
    Document Recognition: Advanced document OCR pipeline based on PaddleOCR-VL for accurate document text recognition.

    Layout Analysis: Integrated PP-DocLayoutV3 model for precise document layout detection and analysis.

    PaddleOCR-VL Model: Powered by PaddleOCR-VL-1.5-0.9B model for high-quality document understanding and text extraction.

    PaddleX Deployment: Deployed using PaddleX framework for optimized inference and production-ready performance.

    **Key Advantages**
    High Accuracy: State-of-the-art document recognition models trained on large-scale datasets for superior accuracy.

    Fast Processing: Optimized inference engine through PaddleX for fast document processing.

    Document-Oriented: Specialized for document recognition tasks with advanced layout understanding capabilities.

    Production Ready: Deployed using PaddleX for stable and efficient production deployment.

    **Technical Details**
    Model: PaddleOCR-VL-1.5-0.9B for document recognition and text extraction.

    Layout Model: PP-DocLayoutV3 for document layout detection and structure analysis.

    Deployment Framework: PaddleX for optimized model serving and inference.

    Use Case: Document OCR and layout analysis for various document types.
  upgradeDescription: |
    Migrated PaddleOCR to apiVersion v3 shared app pattern (paddleocr → paddleocrv3).

    **What's Changed**

    - **Architecture**: flattened the paddleocr/paddleocrserver sub-charts into a
      single chart; the PaddleOCR engine Deployment is now named after the release
      (`{{ .Release.Name }}` == appid) for v3 workload verification, and the nginx
      frontend Deployment is `paddleocrclient`. The engine API Service was renamed
      from `paddleocr-svc` to `paddleocr-api-svc` so it no longer collides with the
      frontend `paddleocr-svc` in the shared namespace; the frontend now reaches the
      engine within the release namespace instead of the old `*-shared` name.
    - **Scaling**: `workloadReplicas` declares replica counts for the `paddleocrv3`
      engine and `paddleocrclient` frontend workloads.
    - **Runtime**: PaddleOCR-VL-1.5 (PaddleX serve) 3.4, CPU/GPU image selected via
      the DEVICE_TYPE setting (unchanged).
  developer: Baidu
  website: https://aistudio.baidu.com/paddleocr
  sourceCode: https://github.com/PaddlePaddle/PaddleOCR
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://aistudio.baidu.com/paddleocr
  license:
  - text: Apache-2.0
    url: https://github.com/PaddlePaddle/PaddleOCR/blob/main/LICENSE

  # Container totals (initContainers excluded), engine + frontend nginx:
  #   Σ limits.cpu    = 2000m + 500m  = 2500m  <= limitedCpu
  #   Σ limits.memory = 9Gi  + 512Mi  = 9.5Gi  <= limitedMemory
  #   Σ requests.mem  = 2Gi  + 64Mi   = 2112Mi <= requiredMemory
  supportArch:
  - amd64
  onlyAdmin: true

  requiredCpu: 500m
  limitedCpu: 3000m
  requiredMemory: 2560Mi
  limitedMemory: 10Gi
  requiredDisk: 128Mi
  limitedDisk: 100Gi
envs:
- envName: DEVICE_TYPE
  type: string
  required: true
  editable: true
  applyOnChange: true
  description: "RUN the model on CPU or GPU"
  options:
  - title: "CPU"
    value: "cpu"
  - title: "GPU"
    value: "gpu"

options:
  shared: true
  apiTimeout: 0
  conflicts:
  - name: paddleocr
    type: application
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
