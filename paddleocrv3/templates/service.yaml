---
apiVersion: v1
kind: Service
metadata:
  name: paddleocrv3-svc
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: paddleocrv3
spec:
  type: ClusterIP
  selector:
    io.kompose.service: paddleocrv3
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-paddleocr
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: paddleocrv3
spec:
  type: ClusterIP
  selector:
    io.kompose.service: paddleocrv3
  ports:
    - name: http-api
      protocol: TCP
      port: 80
      targetPort: 8080
