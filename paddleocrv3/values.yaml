# Default values for paddleocrv3
image:
  repository: paddleocr-frontend
  tag: latest
  pullPolicy: IfNotPresent

# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest):
#   paddleocrv3     — PaddleOCR engine (paddlex serve, name: {{ .Release.Name }} == appid)
#   paddleocrclient — nginx frontend client
workloads:
  paddleocrclient:
    replicaCount: 1
  paddleocrv3:
    replicaCount: 1
backend:
  # Engine API service (renamed from paddleocr-svc to avoid colliding with the
  # frontend Service once both run in the same flattened namespace).
  service: paddleocr-api-svc
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 80
