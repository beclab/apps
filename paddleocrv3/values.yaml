# Per-workload replica counts (key matches Deployment metadata.name and
# workloadReplicas in OlaresManifest).
workloads:
  paddleocrv3:
    replicaCount: 1

frontend:
  image: docker.io/beclab/bleachzou-paddleocr-frontend:0.0.2
  # Olares v3 sums all containers in a Pod against accelerator limits in OlaresManifest.
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi

engine:
  # 本机 benchmark 实测（engine 容器）；Pod 总配额见 OlaresManifest accelerator
  gpuMemory: 8Gi
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "619m"
      memory: 4Gi
