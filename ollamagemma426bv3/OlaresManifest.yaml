olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: ollamagemma426bv3
  icon: https://app.cdn.olares.com/appstore/llm/ollama/gemma.png
  description: "Gemma 4 26B served with Ollama."
  appid: ollamagemma426bv3
  title: Gemma 4 26B (Ollama)
  version: '1.0.1'
  categories:
    - AI
sharedEntrances:
  - name: ollamagemma426bv3
    host: sharedentrances-api
    port: 0
    title: Gemma 4 26B
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/gemma.png
entrances:
  - name: ollamaclient
    port: 8090
