#   ollamagemma426bv3 — engine Deployment (== appid / Release.Name)
#   llminit          — llm-init / entrance Deployment
workloadReplicas:
  ollamagemma426bv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'gemma4:26b'
  fullDescription: |
    **Model Overview**
    Gemma 4 26B is a mixture-of-experts model from Google's Gemma 4 family, instruction-tuned for reasoning, coding, and multimodal tasks. It supports thinking, tool calling, and vision, with broad multimodal coverage including video and audio in the Gemma 4 line. This app pulls `gemma4:26b` from the Ollama library.

    Recommended when you need high decode throughput alongside rich multimodal support. Gemma 4 26B offers extensive multimodal capabilities for vision, video, and audio workloads.

    **Preset Configuration**
    - Model: `gemma4:26b`
    - Capabilities: thinking, tools, vision
    - Engine args: `OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=131072 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1` (128K context, keep model in VRAM, flash attention, q8_0 KV cache)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                                              |
    |----------------|-------------------|----------------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; Ollama uses GPU by default                   |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod                         |
    | `cpu`          | CPU only          | Chart injects `OLLAMA_NUM_GPU=0`; disables GPU                       |

    **How It Works**
    First, Model Console pulls the model from the Ollama library and gets it ready, then the Ollama daemon starts serving the model when it's ready. These two parts run separately but share files and progress info.

    **Stack**
    - **Ollama daemon** (port 11434): pulls and serves the model
    - **Model Console** (port 8090): drives model pull, shows progress, and provides the OpenAI API, proxying to Ollama

    **Model Storage**
    All pulled models are stored in a shared folder at `appCommon/ollama`. All Ollama-based apps share this location, so blobs deduplicate by digest across installs.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - This model needs a GPU with at least 23Gi of memory.

  developer: Google
  website: https://ai.google.dev/gemma
  sourceCode: https://huggingface.co/google/gemma-4-26b-it
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma Terms of Use
      url: https://ai.google.dev/gemma/terms

  accelerator:
    #   cpu          — CPU-only inference; chart injects OLLAMA_NUM_GPU=0, no GPU inject / gpumem
    #   nvidia       — discrete GPU; OLLAMA_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: cpu
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
    - mode: nvidia
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
      requiredGPUMemory: "-1"
      limitedGPUMemory: "-1"
    - mode: nvidia-gb10
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE        # example: ollama://qwen3.5:2b
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "ollama://gemma4:26b"
    description: "Example: ollama://qwen3.5:2b. The Ollama library source to pull your model. Use `ollama://<model>:<tag>` format. Browse models at https://ollama.com/library."
    regex: "^ollama://"
  - envName: MODEL_NAME          # example: qwen3.5:2b
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "gemma4:26b"
    description: "Example: qwen3.5:2b. The name of your model — use the string after `ollama://` in MODEL_SOURCE. This is also used as the OpenAI alias."
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools,vision"
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description: "The model capabilities. Pick what your model supports; check ollama.com/library for details. If no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1
    required: true
    default: "OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=131072 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1"
    type: string
    editable: true
    applyOnChange: true
    description: "Example: OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 .... KEEP_ALIVE is ollama-daemon-only (chart default -1, forever in VRAM)."
  - envName: LOG_LEVEL
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "info"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: OLLAMA_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description: "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. Use `0` on CPU. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
