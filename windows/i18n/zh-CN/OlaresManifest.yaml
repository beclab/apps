metadata:
  title: Windows
  description: 在 Olares 上运行 Windows

spec:
  fullDescription: |
    这款应用程序可帮助你在 Olars 上运行 Windows。
    它基于 dockur 的 Docker 容器内的 Windows。

    **功能**
    - ISO 下载器
    - KVM 加速
    - 基于网络的浏览器  

    **支持的 Windows 版本**
    - Windows 11 Pro
    - Windows 11 LTSC
    - Windows 11 Enterprise
    - Windows 10 Pro
    - Windows 10 Enterprise
    - Windows 8.1 Enterprise
    - Windows 7 Ultimate
    - Windows Vista Ultimate
    - Windows 2000 Professional
    - Windows Server 2025
    - Windows Server 2022
    - Windows Server 2019
    - Windows Server 2016
    - Windows Server 2012
    - Windows Server 2008
    - Windows Server 2003
  upgradeDescription: |
    存储：持久卷从 `appCache` 迁移到 `appData`。升级后首次启动时，若 appData 为空，initContainer 会将旧 appCache 内容复制到 appData（标记文件：`.migration_from_appcache_done`）；旧 appCache 数据保留以便回滚。

    移除针对 Olares < 1.12.3 的 appCache 路径分支逻辑；当前最低支持版本为 1.12.6。

    虚拟机磁盘存储从 appCache 根目录迁移到 appData/storage。

    完整发布说明：https://github.com/dockur/windows/releases/tag/v4.34
