olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: v1

metadata:
  name: tautulli
  appid: tautulli
  title: Tautulli
  description: Monitoring and statistics dashboard for Plex Media Server.
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tautulli.png
  version: 2.17.1
  categories:
    - Utilities
    - Utilities_v112

entrances:
  - name: tautulli
    host: tautulli
    port: 8181
    title: Tautulli
    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tautulli.png
    authLevel: public
    openMethod: window

ports:
  - name: tautulli
    host: tautulli
    port: 8181
    protocol: tcp
    exposePort: 8181
    addToTailscaleAcl: false

permission:
  appData: true
  userData: []

spec:
  versionName: "2.17.1"
  developer: Tautulli
  website: https://tautulli.com/
  sourceCode: https://github.com/Tautulli/Tautulli
  submitter: donbodbod
  locale:
    - en-US
  supportArch:
    - amd64
  requiredCpu: 100m
  requiredMemory: 256Mi
  limitedCpu: 1000m
  limitedMemory: 1Gi
  requiredDisk: 64Mi

options:
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.0"
