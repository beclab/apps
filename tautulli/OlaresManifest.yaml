olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  tautulli: 1
metadata:
  name: tautulli
  appid: tautulli
  title: Tautulli
  description: Monitoring and statistics dashboard for Plex Media Server.
  icon: https://raw.githubusercontent.com/donbodbod/apps/8818290c4b0f1292c58c16b3d77671c4d0a61fee/tautulli/icon.png
  version: 2.17.2
  categories:
    - Utilities_v112

entrances:
  - name: tautulli
    host: tautulli
    port: 8181
    title: Tautulli
    icon: https://raw.githubusercontent.com/donbodbod/apps/8818290c4b0f1292c58c16b3d77671c4d0a61fee/tautulli/icon.png
    authLevel: public
    openMethod: window

ports:
  - name: tautulli
    host: tautulli
    port: 8181
    protocol: tcp
    exposePort: 8181
    addToTailscaleAcl: false

permission:
  appData: true

spec:
  versionName: "2.17.1"
  developer: Tautulli
  website: https://tautulli.com/
  sourceCode: https://github.com/Tautulli/Tautulli
  submitter: donbodbod
  locale:
    - en-US
    - zh-CN
  supportArch:
    - amd64
  requiredCpu: 100m
  requiredMemory: 256Mi
  limitedCpu: 1000m
  limitedMemory: 1Gi
  requiredDisk: 64Mi

options:
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.6-0"
