---
olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  twenty: 1
  twentyingress: 1
  twenty-worker: 1
metadata:
  name: twenty
  icon: https://app.cdn.olares.com/appstore/twenty/icon.png
  description: 'The #1 Open-Source CRM - A modern alternative to Salesforce'
  appid: twenty
  title: Twenty
  version: '1.0.9'
  categories:
  - Productivity_v112

entrances:
- authLevel: internal
  host: twentyingress
  icon: https://app.cdn.olares.com/appstore/twenty/icon.png
  name: crm
  openMethod: window
  port: 8080
  title: Twenty
spec:
  versionName: '2.22.0'
  promoteImage:
  - https://app.cdn.olares.com/appstore/twenty/1.webp
  - https://app.cdn.olares.com/appstore/twenty/2.webp
  - https://app.cdn.olares.com/appstore/twenty/3.webp
  - https://app.cdn.olares.com/appstore/twenty/4.webp
  - https://app.cdn.olares.com/appstore/twenty/5.webp

  fullDescription: |
    Twenty is an open-source CRM that gives you the building blocks to create exactly what your business needs.

    **Main Features**
    - Calendar & Emails: Sync your mailbox and calendar to see all communications on your CRM records. Learn more.
    - Data Model: Create custom objects and fields to match your unique business processes. Explore.
    - Data Migration: Import and export your data via CSV or API. Get started.
    - Views & Pipelines: Organize your data with table views, kanban boards, and sales pipelines. Discover.
    - Workflows: Automate your business processes and integrate with external tools. Build automations.
    - AI: Enhance your CRM with AI-powered features and agents. Explore AI.
    - Dashboards: Track performance with custom reports and visualizations. View dashboards.
    - Permissions & Access: Control who can view, edit, and manage your data with role-based permissions. Configure access.
    - Notes & Tasks: Create notes and tasks linked to your records for better collaboration.
    - API & Webhooks: Connect to other apps and build custom integrations. Start integrating.

  upgradeDescription: |
    Upgrade Twenty to v2.22.0 (`twentycrm/twenty:v2.22.0`).

    Move sensitive credentials (`APP_SECRET`, `PG_DATABASE_URL`, `REDIS_URL`, `EMAIL_SMTP_PASSWORD`) into a Kubernetes Secret and inject them via `secretKeyRef`, so Deployment specs no longer embed plaintext secrets.

    Full release note at: https://github.com/twentyhq/twenty/releases/tag/v2.22.0

  developer: Twenty PBC
  website: https://twenty.com
  sourceCode: https://github.com/twentyhq/twenty
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://docs.twenty.com
  license:
  - text: AGPL-3.0
    url: https://github.com/twentyhq/twenty/blob/main/LICENSE
  limitedCpu: 4
  limitedDisk: 50Gi
  limitedMemory: 6Gi
  requiredCpu: 710m
  requiredDisk: 100Mi
  requiredMemory: 1000Mi
  supportArch:
  - amd64
permission:
  appData: true
  appCache: true
options:
  apiTimeout: 0
  allowedOutboundPorts:
    - 465
    - 587
  dependencies:
  - name: olares
    version: '>=1.12.6-0'
    type: system
envs:
  - envName: MAIL_TYPE
    required: false
    applyOnChange: true
    default: smtp
    type: string
    editable: true
  - envName: SMTP_SERVER
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
  - envName: SMTP_PORT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
  - envName: SMTP_USERNAME
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME
  - envName: SMTP_PASSWORD
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
  - envName: MAIL_DEFAULT_SEND_FROM
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS
  - envName: SMTP_USE_TLS
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USE_TLS
  - envName: EMAIL_FROM_NAME
    required: false
    type: string
    editable: true
    applyOnChange: true
  - envName: EMAIL_SYSTEM_ADDRESS
    required: false
    type: string
    editable: true
    applyOnChange: true
middleware:
  postgres:
    username: twenty
    databases:
      - name: twenty
  redis:
    namespace: db0