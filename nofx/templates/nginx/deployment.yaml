---
# Gateway: port 8080. Frontend at /, API at /api/.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nofx-gateway-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    server {
      listen 8080;
      server_name _;

      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 300s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_hide_header X-Frame-Options;

      location /api/ {
        proxy_pass http://nofx-backend:8080/api/;
      }

      location / {
        proxy_pass http://nofx-frontend:80/;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nofx-gateway
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: nofx-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nofx-gateway
  strategy: {}
  template:
    metadata:
      labels:
        io.kompose.service: nofx-gateway
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nofx-gateway-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
      restartPolicy: Always

---
# Olares entrance (host: nofx, port: 8080) resolves to this Service.
apiVersion: v1
kind: Service
metadata:
  name: nofx
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: nofx-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: nofx-gateway
