{{- $prev := lookup "v1" "Secret" .Release.Namespace "nofx-backend-env" }}
apiVersion: v1
kind: Secret
metadata:
  name: nofx-backend-env
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: nofx-backend
type: Opaque
stringData:
  # Olares Sprig has no randBytes/genPrivateKey; RSA comes from init container (openssl on image).
  JWT_SECRET: {{ if $prev }}{{ index $prev.data "JWT_SECRET" | b64dec | quote }}{{ else }}{{ randAlphaNum 44 | quote }}{{ end }}
  DATA_ENCRYPTION_KEY: {{ if $prev }}{{ index $prev.data "DATA_ENCRYPTION_KEY" | b64dec | quote }}{{ else }}{{ randAlphaNum 44 | quote }}{{ end }}
