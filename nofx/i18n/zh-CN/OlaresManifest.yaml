metadata:
  title: NOFX
  description: 你的个人AI交易助手。支持任意市场，任意模型。

spec:
  fullDescription: |
    NOFX 是一款开源的自主 AI 交易助手。与传统 AI 工具不同，NOFX 的 AI 能够自主感知市场、选择模型、获取数据，无需人工干预。你只需设置策略，AI 将自动完成所有交易。

    完全自主：AI 决定使用哪个模型、获取哪些市场数据、何时交易，一切自动完成。无需手动配置模型，也无需为不同服务管理 API 密钥。只需为 USDC 钱包充值，即可让 AI 自动运行。

    *它能做什么*
    - 多 AI 支持：DeepSeek、Qwen、GPT、Claude、Gemini、Grok、Kimi、MiniMax 等，随时切换。
    - 多交易所支持：Binance、Bybit、OKX、Bitget、KuCoin、Gate、Hyperliquid、Aster、Lighter 等。
    - 策略工作室：可视化构建器，支持币种来源、指标、风险控制等。
    - AI 竞赛：AI 实时竞争，排行榜评估性能。
    - Telegram 代理：与你的交易助手实时交流，支持流式传输、工具调用、记忆功能。
    - 仪表盘：实时持仓、盈亏、AI 决策链路记录。
