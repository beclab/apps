apiVersion: v1
kind: Service
metadata:
  name: radicale
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/instance: radicale
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: radicale
    app.kubernetes.io/version: "3.7.3"
    helm.sh/chart: radicale-1.0.7
  annotations:
spec:
  type: ClusterIP
  ports:
  - port: 5232
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: radicale
    app.kubernetes.io/instance: radicale
---
# Source: radicale/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radicale
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/instance: radicale
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: radicale
    app.kubernetes.io/version: "3.7.3"
    helm.sh/chart: radicale-1.0.7
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radicale
      app.kubernetes.io/instance: radicale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radicale
        app.kubernetes.io/instance: radicale
    spec:
      serviceAccountName: default
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      securityContext:
        fsGroup: 2999
      initContainers:
        - name: fix-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
          args:
            - |
              mkdir -p /data/collections
              chown -R 2999:2999 /data
              chmod -R 770 /data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: radicale-data
              mountPath: /data
      containers:
        - name: radicale
          image: "docker.io/beclab/tomsquest-docker-radicale:3.7.3.0"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          env:
            - name: RADICALE_CONFIG
              value: /config/config
            - name: TZ
              value: UTC
            - name: TAKE_FILE_OWNERSHIP
              value: "false"
          ports:
            - name: http
              containerPort: 5232
              protocol: TCP
          volumeMounts:
            - name: radicale-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 5232
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 5232
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 5232
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
      volumes:
        - name: radicale-data
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/radicale'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/radicale'
            {{- end }}
