metadata:
  name: radicale
  description: Free and Open-Source CalDAV and CardDAV Server
  icon: https://app.cdn.olares.com/appstore/radicale/icon.png
  appid: radicale
  version: '1.0.7'
  title: Radicale
  categories:
  - Productivity_v112
