olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  opencode: 1
  terminal: 1
metadata:
  name: opencode
  icon: https://app.cdn.olares.com/appstore/opencode/icon.png
  description: The open source AI coding agent
  appid: opencode
  title: OpenCode
  version: '1.0.16'
  categories:
  - Developer Tools
  - Productivity_v112
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.17.13'
  promoteImage:
  - https://app.cdn.olares.com/appstore/opencode/1.webp
  - https://app.cdn.olares.com/appstore/opencode/2.webp
  fullDescription: |
    OpenCode is an open-source agent that helps you write code in the terminal, IDE, or desktop.

    - Support LSPs to automatically load appropriate LSPs for LLMs
    - Multi-session Launch multiple agents in parallel in the same project
    - Share Link Share any session link for reference or debugging
    - GitHub Copilot Sign in with GitHub to use your Copilot account
    - ChatGPT Plus/Pro Login with OpenAI to use your ChatGPT Plus or Pro account
    - Arbitrary Models supports 75+ LLM providers with Models.dev, including native models
    - Any editor provides terminal interfaces, desktop applications, and IDE extensions

    Usage:
    - Open the app and use the Web UI directly in your browser.
    - Configure your LLM provider and API keys in the Web UI.
    - Your code workspace is mounted at /home/opencode/workspace (linked to your Home/Code directory).
  upgradeDescription: |
    Upgrade OpenCode to v1.17.13.

    A cumulative update over v1.17.0 with upstream OpenCode fixes and
    improvements — search, provider reliability, MCP handling, session
    recovery, and UI refinements.

    Full release notes: https://github.com/anomalyco/opencode/releases/tag/v1.17.13
  developer: Anomaly
  website: https://opencode.ai/
  sourceCode: https://github.com/anomalyco/opencode
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://opencode.ai/docs
  license:
  - text: MIT
    url: https://github.com/anomalyco/opencode/blob/dev/LICENSE
  requiredMemory: 2304Mi
  limitedMemory: 24Gi
  requiredDisk: 5Gi
  limitedDisk: 50Gi
  requiredCpu: 0.5
  limitedCpu: 13
  supportArch:
  - amd64
  - arm64
envs:
  - envName: OPENCODE_OMO
    required: false
    applyOnChange: true
    type: bool
    editable: true
    default: "false"
    description: "Activate oh-my-opencode (OMO) multi-agent UI. The OMO package is always pre-installed; this toggle only controls whether the plugin is loaded at startup."
  - envName: OPENCODE_OMO_VERSION
    required: false
    applyOnChange: true
    type: string
    editable: true
    default: "4.8.1"
    description: "Exact semver of oh-my-opencode (OMO) to install, e.g. '4.8.1'."
  - envName: ENABLE_DIND
    required: false
    applyOnChange: true
    type: bool
    editable: true
    default: "true"
    description: "Run a privileged Docker-in-Docker sidecar so `docker`, `docker compose` and `docker buildx` work in the terminal (via DOCKER_HOST=tcp://localhost:2375). Uses extra CPU/RAM/disk under app data. Disable if your environment forbids privileged containers."
options:
  apiTimeout: 0
  allowedOutboundPorts:
  - 80
  - 443
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: opencode
  port: 8080
  host: opencodeingress
  title: OpenCode
  icon: https://app.cdn.olares.com/appstore/opencode/icon.png
  openMethod: window
  authLevel: internal
- name: opencodeterminal
  port: 8081
  host: opencodeingress
  title: OpenCode Terminal
  icon: https://app.cdn.olares.com/appstore/opencode/terminal.png
  openMethod: window
  authLevel: internal
