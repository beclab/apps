olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: opencode
  icon: https://app.cdn.olares.com/appstore/opencode/icon.png
  description: The open source AI coding agent
  appid: opencode
  title: OpenCode
  version: '1.0.12'
  categories:
  - Developer Tools
  - Productivity_v112
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.14.19'
  promoteImage:
  - https://app.cdn.olares.com/appstore/opencode/1.webp
  - https://app.cdn.olares.com/appstore/opencode/2.webp
  fullDescription: |
    OpenCode is an open-source agent that helps you write code in the terminal, IDE, or desktop.

    - Support LSPs to automatically load appropriate LSPs for LLMs
    - Multi-session Launch multiple agents in parallel in the same project
    - Share Link Share any session link for reference or debugging
    - GitHub Copilot Sign in with GitHub to use your Copilot account
    - ChatGPT Plus/Pro Login with OpenAI to use your ChatGPT Plus or Pro account
    - Arbitrary Models supports 75+ LLM providers with Models.dev, including native models
    - Any editor provides terminal interfaces, desktop applications, and IDE extensions

    Usage:
    - Open the app and use the Web UI directly in your browser.
    - Configure your LLM provider and API keys in the Web UI.
    - Your code workspace is mounted at /home/opencode/workspace (linked to your Home/Code directory).
  upgradeDescription: |
    Config changes:
    - Add built-in oh-my-openagent (OMO) plugin
    - Add Terminal entrance with auto-start TUI
    
    Upgrade OpenCode version to 1.14.19

    What's Changed (v1.14.19):
    Core
    - Prevented compiled binaries from failing on startup because of a circular session schema dependency.
    - Renamed the compaction setting to preserve_recent_tokens for the budget that keeps recent turns verbatim.
    - Preserved concurrent edits to the same file instead of letting parallel edits overwrite each other.
    - Fixed managed installs on Windows and added bundled ripgrep support for Windows ARM64.
    - Added NVIDIA as a built-in provider option, including connection docs and required attribution headers. (@anniesurla)
    - Kept recent conversation turns verbatim during session compaction so follow-up work keeps more local context.
    - Fell back to summarizing the full conversation when preserved recent turns include too much media to fit safely.

    Desktop:
    - Reduced loading flicker when opening projects and bringing prompt controls online.
    - Added a separate terminal font setting and bundled JetBrainsMono Nerd Font Mono.

    Full release notes: https://github.com/anomalyco/opencode/releases/tag/v1.14.19

  developer: Anomaly
  website: https://opencode.ai/
  sourceCode: https://github.com/anomalyco/opencode
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://opencode.ai/docs
  license:
  - text: MIT
    url: https://github.com/anomalyco/opencode/blob/dev/LICENSE
  requiredMemory: 1792Mi
  limitedMemory: 6Gi
  requiredDisk: 5Gi
  limitedDisk: 15Gi
  requiredCpu: 0.3
  limitedCpu: 5
  supportArch:
  - amd64
  - arm64
envs:
  - envName: OPENCODE_OMO
    required: false
    applyOnChange: true
    type: bool
    editable: true
    default: "false"
    description: "Activate oh-my-opencode (OMO) multi-agent UI. The OMO package is always pre-installed; this toggle only controls whether the plugin is loaded at startup."
  - envName: OPENCODE_OMO_VERSION
    required: false
    applyOnChange: true
    type: string
    editable: true
    default: "3.17.4"
    description: "Exact semver of oh-my-opencode (OMO) to install, e.g. '3.17.4'."
options:
  apiTimeout: 0
  allowedOutboundPorts:
  - 80
  - 443
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
entrances:
- name: opencode
  port: 8080
  host: opencodeingress
  title: OpenCode
  icon: https://app.cdn.olares.com/appstore/opencode/icon.png
  openMethod: window
  authLevel: internal
- name: opencodeterminal
  port: 8081
  host: opencodeingress
  title: OpenCode Terminal
  icon: https://app.cdn.olares.com/appstore/opencode/terminal.png
  openMethod: window
  authLevel: internal
