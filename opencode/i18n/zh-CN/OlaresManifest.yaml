metadata:
  title: OpenCode
  description: 开源 AI 编程助手
spec:
  fullDescription: |
    OpenCode 是一个开源代理，帮助你在终端、IDE 或桌面编写代码。

    - 支持 LSP，可为 LLM 自动加载合适的 LSP
    - 多会话，支持在同一项目中并行启动多个代理
    - 会话分享，可分享任意会话链接以供参考或调试
    - GitHub Copilot，支持通过 GitHub 登录以使用你的 Copilot 账号
    - ChatGPT Plus/Pro，支持通过 OpenAI 登录以使用 ChatGPT Plus 或 Pro 账号
    - 支持 75+ LLM 服务商和任意模型，基于 Models.dev，包括原生模型
    - 任何编辑器，支持终端界面、桌面应用和 IDE 扩展

    Usage:
    - 打开应用，可直接在浏览器中使用 Web UI。
    - 在 Web UI 中配置你的 LLM 服务商和 API 密钥。
    - 你的代码工作区已挂载在 /home/opencode/workspace（链接到你的 Home/Code 目录）。
  upgradeDescription: |
    配置变更：
    - 内置 oh-my-openagent (OMO) 多代理插件
    - 新增 Terminal 入口，支持自动启动 TUI
    
    升级 OpenCode 版本至 1.14.19

    v1.14.19 更新：
    核心
    - 修复了编译后的二进制文件在启动时因为循环会话架构依赖关系而失败的问题。
    - 将压缩设置重命名为 preserve_recent_tokens，用于预算，该预算保持最近的会话话语按原样保留。
    - 保留对同一文件的并发编辑，而不是让并行编辑覆盖彼此。
    - 修复了 Windows 上的托管安装并添加了适用于 Windows ARM64 的捆绑 ripgrep 支持。
    - 添加了 NVIDIA 作为内置提供商选项，包括连接文档和所需归属标头。 (@anniesurla)
    - 在会话压缩期间保留最近的会话话语，以便后续工作保持更多本地上下文。
    - 在保留的最近会话包含太多媒体无法安全保存时，回退到总结整个对话。
    桌面
    - 减少打开项目时的加载闪烁，并使提示控制在线。
    - 添加了单独的终端字体设置并捆绑了 JetBrainsMono Nerd Font Mono。
    
    完整发布说明请见：https://github.com/anomalyco/opencode/releases/tag/v1.14.19
