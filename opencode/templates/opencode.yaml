{{- $opencodeDomainENV := split  ","  .Values.domain.opencode -}}
{{- $opencodeDomain := index $opencodeDomainENV "_0" -}}
{{- $env := .Values.olaresEnv | default dict -}}
{{- $enableOMO := ne (index $env "OPENCODE_OMO" | default "false") "false" }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: opencode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: opencode
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: opencode
        bytetrade.io/terminal: opencode
    spec:
      initContainers:
        - name: init-setup
          image: "docker.io/beclab/anomalyco-opencode:1.14.19"
          command:
            - sh
            - "-c"
            - |
              set -e
              wget -q -O /dev/null https://dl-cdn.alpinelinux.org/alpine/v3.23/main/x86_64/APKINDEX.tar.gz 2>/dev/null &
              _wpid=$!
              ( sleep 5 && kill "$_wpid" 2>/dev/null ) &
              _gpid=$!
              if ! wait "$_wpid" 2>/dev/null; then
                echo "=== init-setup: Alpine CDN unreachable or too slow, switching to China mirrors ==="
                sed -i 's|dl-cdn.alpinelinux.org|mirrors.aliyun.com|g' /etc/apk/repositories
              fi
              kill "$_gpid" 2>/dev/null || true
              wait "$_gpid" 2>/dev/null || true
              apk add --no-cache python3
              OC_DOMAIN="{{ $opencodeDomain }}"
              export OLARES_OC_DOMAIN="$OC_DOMAIN"
              export OLARES_ENABLE_OMO="{{ if $enableOMO }}1{{ else }}0{{ end }}"
              mkdir -p /home/opencode/workspace \
                       /home/opencode/.opencode \
                       /home/opencode/.config/opencode \
                       /home/opencode/.config/opencode/skills/web-preview \
                       /home/opencode/.config/opencode/skills/system-admin \
                       /home/opencode/.pkg-queue
              SKILL="/home/opencode/.config/opencode/skills/web-preview/SKILL.md"
              printf '%s\n' \
                '---' \
                'name: web-preview' \
                'description: "Framework-specific dev-server configs (Vite / Next.js / FastAPI / Flask / static / Go / Express), HMR setup, and a troubleshooting table for previewing web pages in Olares. The baseline 5-step launch flow is authoritative; this skill only fills in per-framework details."' \
                '---' \
                '' \
                '## Scope' \
                '' \
                'The mandatory 5-step launch flow is in the system baseline (always in your context).' \
                'This skill provides framework config snippets, optional HMR setup, and a troubleshooting table.' \
                'Do NOT re-derive the launch flow here; follow the baseline and use this document for details only.' \
                '' \
                '## Framework configs' \
                '' \
                '### Vite (vite.config.js / vite.config.ts)' \
                '' \
                '```js' \
                'export default defineConfig({' \
                '  base: "/__preview/<PORT>/",' \
                '  server: {' \
                '    host: "0.0.0.0",' \
                '    port: <PORT>,' \
                '    // Optional: HMR over the TLS reverse proxy' \
                '    hmr: { protocol: "wss", clientPort: 443 },' \
                '  },' \
                '})' \
                '```' \
                '' \
                '### Next.js (next.config.js / next.config.mjs)' \
                '' \
                '```js' \
                'module.exports = {' \
                '  basePath: "/__preview/<PORT>",' \
                '  assetPrefix: "/__preview/<PORT>",' \
                '}' \
                '```' \
                '' \
                'Launch: `setsid nohup npx next dev -H 0.0.0.0 -p <PORT> >/tmp/preview-<PORT>.log 2>&1 </dev/null &`' \
                '' \
                '### FastAPI / uvicorn' \
                '' \
                '```' \
                'setsid nohup uvicorn app:app --host 0.0.0.0 --port <PORT> --root-path /__preview/<PORT> >/tmp/preview-<PORT>.log 2>&1 </dev/null &' \
                '```' \
                '' \
                '### Flask' \
                '' \
                'Flask does not accept a base-path flag. Use a WSGI prefix middleware (werkzeug DispatcherMiddleware) or set APPLICATION_ROOT in config. Bind `--host 0.0.0.0 --port <PORT>` and launch with the same `setsid nohup` template.' \
                '' \
                '### Static HTML (no bundler)' \
                '' \
                'Vite is pre-installed globally; no project setup or config file needed.' \
                '' \
                '```' \
                'setsid nohup vite --host 0.0.0.0 --port <PORT> --base /__preview/<PORT>/ >/tmp/preview-<PORT>.log 2>&1 </dev/null &' \
                '```' \
                '' \
                '### Go / Express / custom servers' \
                '' \
                'Bind to `0.0.0.0:<PORT>` and route everything under `/__preview/<PORT>/`. Examples:' \
                '- Express: `app.use("/__preview/<PORT>", router)`' \
                '- Go: `http.Handle("/__preview/<PORT>/", http.StripPrefix("/__preview/<PORT>", handler))`' \
                '' \
                '## Troubleshooting' \
                '' \
                '| Symptom | Likely cause | Fix |' \
                '|---|---|---|' \
                '| White page; console 404 on /src/main.js or /assets/* | base path not configured | Set `base` (Vite) / `basePath` (Next) to `/__preview/<PORT>/` |' \
                '| HMR / WebSocket errors in browser console | dev-server WS unaware of the TLS proxy | Vite: add `server.hmr: { protocol: "wss", clientPort: 443 }` |' \
                '| EADDRINUSE at launch | port chosen per baseline is still in use | `fuser -k <PORT>/tcp 2>/dev/null` then re-launch (follow baseline step 1 to decide whether to reuse or pick another port) |' \
                '| Server dies immediately after launch | shell hangup; missing `setsid` or stdio not closed | Use the exact launch template from the baseline |' \
                '| 502 / connection refused via the preview URL | server bound to 127.0.0.1 only | Add `--host 0.0.0.0` (or framework equivalent) |' \
                '' \
                '## Verifying a running server' \
                '' \
                '```' \
                'tail -f /tmp/preview-<PORT>.log          # startup output' \
                'ss -tlnp | grep ":<PORT>\b"              # confirm the listener' \
                'curl -sI http://127.0.0.1:<PORT>/        # local-side sanity check' \
                '```' \
                > "$SKILL"
              ADMIN="/home/opencode/.config/opencode/skills/system-admin/SKILL.md"
              printf '%s\n' \
                '---' \
                'name: system-admin' \
                'description: "MUST load before installing ANY system package. Provides pkg-install for Java, Python, Go, Rust, FFmpeg, databases, compilers, and all Alpine packages."' \
                '---' \
                '' \
                '## pkg-install — system package manager' \
                '' \
                'This environment is Alpine Linux. Use `pkg-install` to manage system packages.' \
                '`sudo` and `apk` are NOT available directly — always use `pkg-install`.' \
                '' \
                '### Install' \
                '' \
                '```' \
                'pkg-install <package> [package2 ...]' \
                '```' \
                '' \
                'Examples:' \
                '' \
                '```' \
                'pkg-install openjdk17-jdk          # install Java 17' \
                'pkg-install make cmake gcc          # install multiple packages' \
                'pkg-install nodejs=20.15.1-r0       # install a specific version' \
                '```' \
                '' \
                '### Remove' \
                '' \
                '```' \
                'pkg-install --remove <package> [...]' \
                '```' \
                '' \
                '### Search, Info, List' \
                '' \
                '```' \
                'pkg-install --search <keyword>      # search available packages' \
                'pkg-install --info <package>         # show details and available versions' \
                'pkg-install --list                   # list all installed packages' \
                'pkg-install --help                   # show full help' \
                '```' \
                '' \
                '### Version pinning' \
                '' \
                'To install a specific version, append `=<version>`:' \
                '' \
                '```' \
                'pkg-install nodejs=20.15.1-r0' \
                '```' \
                '' \
                'Use `pkg-install --info <package>` first to see available versions.' \
                '' \
                '## Common package names (Alpine)' \
                '' \
                '| Need                | Package name        |' \
                '|---------------------|---------------------|' \
                '| Java 17             | openjdk17-jdk       |' \
                '| Java 21             | openjdk21-jdk       |' \
                '| GCC / G++ / Make    | build-base          |' \
                '| CMake               | cmake               |' \
                '| SQLite              | sqlite              |' \
                '| PostgreSQL client   | postgresql-client   |' \
                '| MySQL / MariaDB cli | mariadb-client      |' \
                '| Redis cli           | redis               |' \
                '| FFmpeg              | ffmpeg              |' \
                '| ImageMagick         | imagemagick         |' \
                '| PHP                 | php83               |' \
                '| Ruby                | ruby                |' \
                '| Perl                | perl                |' \
                '| Lua                 | lua5.4              |' \
                '| .NET SDK            | dotnet8-sdk         |' \
                '| Nginx               | nginx               |' \
                '| Docker CLI          | docker-cli          |' \
                '| tmux                | tmux                |' \
                '| vim / neovim        | vim / neovim        |' \
                '| jq / yq            | jq / yq             |' \
                '' \
                '## Pre-installed tools' \
                '' \
                'The following are already available (no install needed):' \
                '' \
                '- **Languages**: python3, pip, node, npm, go, rustc, cargo' \
                '- **VCS**: git' \
                '- **Network**: curl, wget, ssh, ss' \
                '- **Shell**: bash' \
                '- **Compression**: zip, unzip, gzip, bzip2, xz, tar, zstd' \
                '' \
                '## Language-specific package managers' \
                '' \
                'For language ecosystem packages, use the native tool directly (no pkg-install needed):' \
                '' \
                '```' \
                'pip install <pkg>           # Python' \
                'npm install <pkg>           # Node.js' \
                'go install <pkg>@latest     # Go' \
                'cargo install <pkg>         # Rust' \
                '```' \
                '' \
                '## Rules' \
                '' \
                '- ALWAYS use `pkg-install` for system packages' \
                '- NEVER use `sudo`, `apk`, or download binaries manually' \
                '- NEVER tell the user that system packages cannot be installed — they CAN via pkg-install' \
                '- NEVER modify ~/.profile or ~/.bashrc for PATH — packages install to standard paths' \
                '- When unsure about the package name, use `pkg-install --search <keyword>` first' \
                > "$ADMIN"
              echo "=== Olares global baseline / plugin + workspace legacy instructions cleanup (python) ==="
              OLARES_PY=/tmp/olares-init-opencode-cfg.py
              printf '%s\n' \
                'import json' \
                'import os' \
                'from pathlib import Path' \
                '' \
                'DOMAIN = os.environ.get("OLARES_OC_DOMAIN", "")' \
                'ENABLE_OMO = os.environ.get("OLARES_ENABLE_OMO", "0") == "1"' \
                'BASELINE_MD = Path("/home/opencode/.config/opencode/olares-baseline-instructions.md")' \
                'GLOBAL_JSON = Path("/home/opencode/.config/opencode/opencode.json")' \
                'WORKSPACE_JSON = Path("/home/opencode/workspace/opencode.json")' \
                'OLARES_REF = "/home/opencode/.config/opencode/olares-baseline-instructions.md"' \
                'PLUGIN_NPM = "oh-my-openagent"' \
                'STALE_PLUGIN_NPM = "oh-my-opencode"' \
                '' \
                'LEGACY_S1 = (' \
                '    "CRITICAL: You have special skills. ALWAYS run /skill load web-preview BEFORE any task involving "' \
                '    "web, server, preview, run, start, serve, build, create, demo, test, launch, deploy, site, app, page, "' \
                '    "website, frontend, backend, API, port, vite, react, next, vue, flask, go server, python server. "' \
                '    "ALWAYS run /skill load system-admin BEFORE installing ANY system package."' \
                ')' \
                'LEGACY_S2 = "NEVER use sudo, apt, or apk directly. Use pkg-install instead."' \
                'LEGACY_S3 = (' \
                '    f"NEVER show localhost URLs. The domain is {DOMAIN}. "' \
                '    f"Dev server preview URL format: https://{DOMAIN}/__preview/<port>/"' \
                ')' \
                'LEGACY = {LEGACY_S1, LEGACY_S2, LEGACY_S3}' \
                '' \
                '# --- BASELINE content (free to edit; independent from LEGACY cleanup below) ---' \
                'BASELINE_WEB = (' \
                '    f"URL pattern: https://{DOMAIN}/__preview/<PORT>/\n"' \
                '    "Never show localhost or pod IPs; always use the URL above.\n\n"' \
                '    "When the user asks to preview a running web page, follow EXACTLY:\n\n"' \
                '    "1. Pick <PORT>:\n"' \
                '    "     - If the user specified a port, use it exactly; free it first: fuser -k <PORT>/tcp 2>/dev/null || true\n"' \
                '    "     - Else if you already started a preview in this session for the same project, reuse that port; free it with the same fuser -k command.\n"' \
                '    "     - Else pick the first free port starting from 5173 (Vite) or 3000 (others).\n"' \
                '    "2. Ensure deps: [ -d node_modules ] || npm install --silent\n"' \
                '    "3. Configure the framework for base path /__preview/<PORT>/:\n"' \
                '    "     Vite (vite.config.*): base: \"/__preview/<PORT>/\"\n"' \
                '    "     Next.js (next.config.*): basePath: \"/__preview/<PORT>\"; start with -H 0.0.0.0 -p <PORT>\n"' \
                '    "4. Launch exactly:\n"' \
                '    "     setsid nohup <START_CMD> >/tmp/preview-<PORT>.log 2>&1 </dev/null &   # verify: tail -f /tmp/preview-<PORT>.log\n\n"' \
                '    "NEVER use a plain HTTP server (python3 -m http.server, npx serve, npx http-server, busybox httpd, etc.) - they cannot serve files under /__preview/<PORT>/.\n"' \
                '    "For plain HTML (no framework), use vite as the server (pre-installed, no vite.config.js needed):\n"' \
                '    "     setsid nohup vite --host 0.0.0.0 --port <PORT> --base /__preview/<PORT>/ >/tmp/preview-<PORT>.log 2>&1 </dev/null &"' \
                ')' \
                'BASELINE_PKG = "NEVER use sudo, apt, or apk directly. Use pkg-install instead."' \
                '' \
                'BASELINE_MD.parent.mkdir(parents=True, exist_ok=True)' \
                'md = (' \
                '    "<!-- olares-managed: baseline-instructions v2 (rewritten each pod start) -->\n\n"' \
                '    "# Olares environment baseline\n\n"' \
                '    "## Web preview and dev servers\n\n"' \
                '    + BASELINE_WEB' \
                '    + "\n\n## System packages\n\n"' \
                '    + BASELINE_PKG' \
                '    + "\n"' \
                ')' \
                'BASELINE_MD.write_text(md, encoding="utf-8")' \
                '' \
                'cfg = {}' \
                'if GLOBAL_JSON.is_file():' \
                '    try:' \
                '        cfg = json.loads(GLOBAL_JSON.read_text(encoding="utf-8"))' \
                '    except json.JSONDecodeError:' \
                '        cfg = {}' \
                'instr = cfg.get("instructions")' \
                'if not isinstance(instr, list):' \
                '    instr = []' \
                'if OLARES_REF not in instr:' \
                '    instr = list(instr) + [OLARES_REF]' \
                'cfg["instructions"] = instr' \
                'cfg.setdefault("$schema", "https://opencode.ai/config.json")' \
                'plugins = cfg.get("plugin")' \
                'if not isinstance(plugins, list):' \
                '    plugins = []' \
                'plugins = [p for p in plugins if isinstance(p, str)]' \
                'plugins = [p for p in plugins if p != STALE_PLUGIN_NPM]' \
                'if ENABLE_OMO:' \
                '    plugins = [p for p in plugins if p != PLUGIN_NPM]' \
                '    plugins.append(PLUGIN_NPM)' \
                'else:' \
                '    plugins = [p for p in plugins if p != PLUGIN_NPM]' \
                'if plugins:' \
                '    cfg["plugin"] = plugins' \
                'else:' \
                '    cfg.pop("plugin", None)' \
                'GLOBAL_JSON.parent.mkdir(parents=True, exist_ok=True)' \
                'GLOBAL_JSON.write_text(json.dumps(cfg, indent=2, ensure_ascii=False), encoding="utf-8")' \
                '' \
                '' \
                'if WORKSPACE_JSON.is_file():' \
                '    try:' \
                '        wcfg = json.loads(WORKSPACE_JSON.read_text(encoding="utf-8"))' \
                '    except json.JSONDecodeError:' \
                '        wcfg = None' \
                '    if wcfg is not None:' \
                '        winst = wcfg.get("instructions")' \
                '        legacy_changed = False' \
                '        if isinstance(winst, list):' \
                '            new_inst = [x for x in winst if x not in LEGACY]' \
                '            if new_inst != winst:' \
                '                legacy_changed = True' \
                '                if new_inst:' \
                '                    wcfg["instructions"] = new_inst' \
                '                else:' \
                '                    wcfg.pop("instructions", None)' \
                '        only_schema = isinstance(wcfg, dict) and set(wcfg.keys()) == {"$schema"}' \
                '        if legacy_changed:' \
                '            if not wcfg or only_schema:' \
                '                WORKSPACE_JSON.unlink(missing_ok=True)' \
                '            else:' \
                '                WORKSPACE_JSON.write_text(json.dumps(wcfg, indent=2, ensure_ascii=False), encoding="utf-8")' \
                '        elif only_schema:' \
                '            WORKSPACE_JSON.unlink(missing_ok=True)' \
                > "$OLARES_PY"
              python3 "$OLARES_PY"
              rm -f "$OLARES_PY"
              OMO_AGENT_CFG="/home/opencode/.config/opencode/oh-my-openagent.json"
              if [ ! -f "$OMO_AGENT_CFG" ]; then
                echo "=== Writing default oh-my-openagent.json ==="
                printf '%s\n' \
                  '{' \
                  '  "$schema": "https://raw.githubusercontent.com/code-yeongyu/oh-my-openagent/dev/assets/oh-my-opencode.schema.json",' \
                  '  "runtime_fallback": { "enabled": true, "max_fallback_attempts": 7 },' \
                  '  "agents": {' \
                  '    "sisyphus": { "model": "anthropic/claude-opus-4-6", "variant": "max", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "openai/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "hephaestus": { "model": "openai/gpt-5.4", "variant": "medium", "fallback_models": [' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "oracle": { "model": "openai/gpt-5.4", "variant": "high", "fallback_models": [' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "high" },' \
                  '      { "model": "google/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "anthropic/claude-opus-4-6", "variant": "max" },' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "explore": { "model": "anthropic/claude-haiku-4-5", "fallback_models": [' \
                  '      { "model": "github-copilot/grok-code-fast-1" },' \
                  '      { "model": "opencode/gpt-5-nano" }' \
                  '    ] },' \
                  '    "multimodal-looker": { "model": "openai/gpt-5.4", "variant": "medium", "fallback_models": [' \
                  '      { "model": "openai/gpt-5-nano" },' \
                  '      { "model": "github-copilot/gpt-5-nano" },' \
                  '      { "model": "opencode/gpt-5-nano" }' \
                  '    ] },' \
                  '    "prometheus": { "model": "anthropic/claude-opus-4-6", "variant": "max", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "openai/gpt-5.4", "variant": "high" },' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "high" },' \
                  '      { "model": "google/gemini-3.1-pro-preview" },' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "metis": { "model": "anthropic/claude-opus-4-6", "variant": "max", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "openai/gpt-5.4", "variant": "high" },' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "high" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "momus": { "model": "openai/gpt-5.4", "variant": "xhigh", "fallback_models": [' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "xhigh" },' \
                  '      { "model": "anthropic/claude-opus-4-6", "variant": "max" },' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "google/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "atlas": { "model": "anthropic/claude-sonnet-4-6", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-sonnet-4.6" },' \
                  '      { "model": "openai/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "sisyphus-junior": { "model": "anthropic/claude-sonnet-4-6", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-sonnet-4.6" },' \
                  '      { "model": "openai/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] }' \
                  '  },' \
                  '  "categories": {' \
                  '    "visual-engineering": { "model": "google/gemini-3.1-pro-preview", "variant": "high", "fallback_models": [' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "anthropic/claude-opus-4-6", "variant": "max" },' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "ultrabrain": { "model": "openai/gpt-5.4", "variant": "xhigh", "fallback_models": [' \
                  '      { "model": "google/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "anthropic/claude-opus-4-6", "variant": "max" },' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "deep": { "model": "openai/gpt-5.4", "variant": "medium", "fallback_models": [' \
                  '      { "model": "github-copilot/gpt-5.4", "variant": "medium" },' \
                  '      { "model": "anthropic/claude-opus-4-6", "variant": "max" },' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "google/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "artistry": { "model": "google/gemini-3.1-pro-preview", "variant": "high", "fallback_models": [' \
                  '      { "model": "github-copilot/gemini-3.1-pro-preview", "variant": "high" },' \
                  '      { "model": "anthropic/claude-opus-4-6", "variant": "max" },' \
                  '      { "model": "github-copilot/claude-opus-4.6", "variant": "max" },' \
                  '      { "model": "openai/gpt-5.4" },' \
                  '      { "model": "github-copilot/gpt-5.4" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "quick": { "model": "openai/gpt-5.4-mini", "fallback_models": [' \
                  '      { "model": "github-copilot/gpt-5.4-mini" },' \
                  '      { "model": "anthropic/claude-haiku-4-5" },' \
                  '      { "model": "github-copilot/claude-haiku-4.5" },' \
                  '      { "model": "google/gemini-3-flash-preview" },' \
                  '      { "model": "github-copilot/gemini-3-flash-preview" },' \
                  '      { "model": "opencode/gpt-5-nano" }' \
                  '    ] },' \
                  '    "unspecified-low": { "model": "anthropic/claude-sonnet-4-6", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-sonnet-4.6" },' \
                  '      { "model": "openai/gpt-5.3-codex", "variant": "medium" },' \
                  '      { "model": "google/gemini-3-flash-preview" },' \
                  '      { "model": "github-copilot/gemini-3-flash-preview" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "unspecified-high": { "model": "anthropic/claude-sonnet-4-6", "fallback_models": [' \
                  '      { "model": "github-copilot/claude-sonnet-4.6" },' \
                  '      { "model": "openai/gpt-5.3-codex", "variant": "medium" },' \
                  '      { "model": "google/gemini-3-flash-preview" },' \
                  '      { "model": "github-copilot/gemini-3-flash-preview" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] },' \
                  '    "writing": { "model": "google/gemini-3-flash-preview", "fallback_models": [' \
                  '      { "model": "github-copilot/gemini-3-flash-preview" },' \
                  '      { "model": "anthropic/claude-sonnet-4-6" },' \
                  '      { "model": "github-copilot/claude-sonnet-4.6" },' \
                  '      { "model": "opencode/big-pickle" }' \
                  '    ] }' \
                  '  }' \
                  '}' \
                  > "$OMO_AGENT_CFG"
              fi
              chown 1000:1000 /home/opencode /home/opencode/workspace
              find /home/opencode -mindepth 1 -maxdepth 1 ! -name '.pkg-root' \
                -exec chown -R 1000:1000 {} +
              chown -R 1000:1000 /home/opencode/.pkg-root/usr/local 2>/dev/null || true
          resources: {}
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0

        - name: init-packages
          image: "docker.io/beclab/anomalyco-opencode:1.14.19"
          command:
            - sh
            - "-c"
            - |
              PKG="/home/opencode/.pkg-root"
              OC_VER="1.14.19"
              GLIBC_VER="2.35-r1"
              BASE_PKGS="python3 py3-pip git curl wget bash openssh-client nodejs npm go rust cargo iproute2 zip unzip gzip bzip2 xz tar zstd"
              GLOBAL_NPM_TOOLS="vite"
              FINGERPRINT="oc=${OC_VER} glibc=${GLIBC_VER} arch=$(uname -m) pkgs=${BASE_PKGS} npm=${GLOBAL_NPM_TOOLS}"
              PKG_HASH=$(printf '%s' "$FINGERPRINT" | sha256sum | cut -c1-16)
              MARKER="$PKG/.installed-${PKG_HASH}"

              OMO_VER="{{ index $env "OPENCODE_OMO_VERSION" | default "3.17.4" }}"
              case "$OMO_VER" in
                ""|latest|next|beta|*[!0-9.]*)
                  echo "=== WARNING: invalid OPENCODE_OMO_VERSION '$OMO_VER', falling back to 3.17.4 ==="
                  OMO_VER="3.17.4"
                  ;;
              esac

              setup_mirrors() {
                USE_CN_MIRROR=false
                wget -q -O /dev/null https://dl-cdn.alpinelinux.org/alpine/v3.23/main/x86_64/APKINDEX.tar.gz 2>/dev/null &
                _wpid=$!
                ( sleep 5 && kill "$_wpid" 2>/dev/null ) &
                _gpid=$!
                if wait "$_wpid" 2>/dev/null; then
                  echo "=== Network: Alpine CDN reachable ==="
                else
                  echo "=== Network: Alpine CDN unreachable or too slow, switching to China mirrors ==="
                  USE_CN_MIRROR=true
                  sed -i 's|dl-cdn.alpinelinux.org|mirrors.aliyun.com|g' /etc/apk/repositories
                fi
                kill "$_gpid" 2>/dev/null || true
                wait "$_gpid" 2>/dev/null || true
              }

              github_download() {
                local url="$1" output="$2"
                if [ "$USE_CN_MIRROR" = "true" ]; then
                  for proxy in https://ghproxy.net https://gh-proxy.com https://ghproxy.homeboyc.cn https://ghfast.top; do
                    echo "=== Trying proxy $proxy for: $url ==="
                    if curl -fsSL --connect-timeout 15 --speed-limit 10000 --speed-time 30 \
                         "${proxy}/$url" -o "$output"; then
                      return 0
                    fi
                    rm -f "$output"
                    echo "=== Proxy $proxy failed ==="
                  done
                  echo "=== All proxies failed, falling back to direct ==="
                fi
                curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 15 --speed-limit 10000 --speed-time 30 "$url" -o "$output"
              }

              verify_cache() {
                [ ! -d "$PKG/bin" ] || [ ! -d "$PKG/usr" ] || [ ! -d "$PKG/lib" ] && return 1
                for b in \
                  bin/tar bin/gzip \
                  usr/bin/python3 usr/bin/pip3 usr/bin/git usr/bin/curl usr/bin/wget \
                  usr/bin/ssh usr/bin/node usr/bin/npm usr/bin/go usr/bin/rustc usr/bin/cargo \
                  usr/bin/zip usr/bin/unzip usr/bin/bzip2 usr/bin/xz usr/bin/zstd \
                  sbin/ss \
                  usr/local/bin/opencode usr/local/bin/pkg-install; do
                  if [ ! -e "$PKG/$b" ] && [ ! -L "$PKG/$b" ]; then
                    echo "=== Cache invalid: $b missing ==="
                    return 1
                  fi
                  if [ -f "$PKG/$b" ] && [ ! -s "$PKG/$b" ]; then
                    echo "=== Cache invalid: $b is empty ==="
                    return 1
                  fi
                done
                # vite may land in /usr/bin or /usr/local/bin depending on npm's default prefix
                VITE_FOUND=false
                for p in usr/bin/vite usr/local/bin/vite; do
                  if [ -e "$PKG/$p" ] || [ -L "$PKG/$p" ]; then
                    VITE_FOUND=true
                    break
                  fi
                done
                if [ "$VITE_FOUND" != "true" ]; then
                  echo "=== Cache invalid: vite missing (checked usr/bin and usr/local/bin) ==="
                  return 1
                fi
                if [ "$(uname -m)" = "x86_64" ]; then
                  if [ ! -e "$PKG/lib64/ld-linux-x86-64.so.2" ] && [ ! -L "$PKG/lib64/ld-linux-x86-64.so.2" ]; then
                    echo "=== Cache invalid: glibc linker (ld-linux-x86-64.so.2) missing ==="
                    return 1
                  fi
                fi
                return 0
              }

              restore_user_packages() {
                UPKGS="/home/opencode/.user-packages"
                [ ! -s "$UPKGS" ] && return 0
                RESTORE=$(cat "$UPKGS" | tr '\n' ' ')
                echo "=== Restoring user packages: $RESTORE ==="
                apk info -q 2>/dev/null | sort > /tmp/.pkgs-before
                FAILED=""
                for p in $RESTORE; do
                  if ! apk add --no-cache "$p" 2>&1; then
                    echo "=== Warning: failed to restore $p ==="
                    FAILED="$FAILED $p"
                  fi
                done
                apk info -q 2>/dev/null | sort > /tmp/.pkgs-after
                NEW_PKGS=$(comm -13 /tmp/.pkgs-before /tmp/.pkgs-after)
                if [ -z "$NEW_PKGS" ]; then
                  echo "=== No new packages to snapshot ==="
                  rm -f /tmp/.pkgs-before /tmp/.pkgs-after
                  return 0
                fi
                echo "=== Snapshotting new packages: $NEW_PKGS ==="
                for pkg in $NEW_PKGS; do
                  apk info -qL "$pkg" 2>/dev/null | while IFS= read -r f; do
                    [ -f "/$f" ] || [ -L "/$f" ] || continue
                    d=$(dirname "$f")
                    mkdir -p "$PKG/$d"
                    cp -a "/$f" "$PKG/$f" 2>/dev/null || true
                  done
                done
                if [ -n "$FAILED" ]; then
                  echo "=== Failed packages (will retry next restart):$FAILED ==="
                fi
                rm -f /tmp/.pkgs-before /tmp/.pkgs-after
                echo "=== Restore complete ==="
              }

              echo "=== Setting up home directory (runs every start) ==="
              mkdir -p /home/opencode/.npm-global/bin /home/opencode/.npm-global/lib
              chown -R 1000:1000 /home/opencode/.npm-global

              cat > /home/opencode/.profile << 'EOFPROFILE'
              export VIRTUAL_ENV="/home/opencode/.venv"
              export NPM_CONFIG_PREFIX="/home/opencode/.npm-global"
              export GOPATH="/home/opencode/go"
              export CARGO_HOME="/home/opencode/.cargo"
              export PATH="/home/opencode/.venv/bin:/home/opencode/.npm-global/bin:/home/opencode/go/bin:/home/opencode/.cargo/bin:/home/opencode/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              EOFPROFILE
              cp /home/opencode/.profile /home/opencode/.bashrc
              chown 1000:1000 /home/opencode/.profile /home/opencode/.bashrc

              olares_run_omo() {
                OMO_FOUND=false
                for d in /usr/lib/node_modules/oh-my-opencode \
                         /usr/local/lib/node_modules/oh-my-opencode \
                         "$PKG/usr/lib/node_modules/oh-my-opencode" \
                         "$PKG/usr/local/lib/node_modules/oh-my-opencode"; do
                  [ -d "$d" ] && [ -f "$d/package.json" ] || continue
                  INST_VER=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$d/package.json" | head -n1)
                  if [ "$INST_VER" = "$OMO_VER" ]; then
                    OMO_FOUND=true
                    break
                  else
                    echo "=== OMO: $d at '${INST_VER:-unknown}', want '$OMO_VER', will reinstall ==="
                  fi
                done
                if [ "$OMO_FOUND" = "true" ]; then
                  echo "=== OMO: oh-my-opencode@${OMO_VER} already installed, skipping ==="
                else
                  echo "=== OMO: installing nodejs+npm and oh-my-opencode@${OMO_VER} ==="
                  apk add --no-cache nodejs npm 2>&1 || { echo "=== WARNING: apk add nodejs npm failed ==="; return; }
                  if [ "$USE_CN_MIRROR" = "true" ]; then
                    npm config set registry https://registry.npmmirror.com 2>/dev/null || true
                  fi
                  if npm install -g --ignore-scripts "oh-my-opencode@${OMO_VER}" 2>&1; then
                    OMO_DIR=$(npm root -g 2>/dev/null)/oh-my-opencode
                    if [ -d "$OMO_DIR" ] && [ -d "$PKG/usr" ]; then
                      SNAP_TARGET="$PKG$(npm root -g 2>/dev/null)/oh-my-opencode"
                      mkdir -p "$(dirname "$SNAP_TARGET")"
                      rm -rf "$SNAP_TARGET"
                      cp -a "$OMO_DIR" "$SNAP_TARGET" 2>/dev/null && \
                        echo "=== OMO: patched into snapshot for next restart ==="
                    fi
                  else
                    echo "=== WARNING: npm install oh-my-opencode@${OMO_VER} failed ==="
                  fi
                fi
                chown -R 1000:1000 /home/opencode/.local 2>/dev/null || true
              }

              setup_mirrors

              if [ -f "$MARKER" ] && verify_cache; then
                echo "=== Package snapshot cached (${PKG_HASH}) ==="
                restore_user_packages
                olares_run_omo
                exit 0
              fi
              rm -f "$MARKER"

              echo "=== Installing system packages ==="
              if ! apk add --no-cache $BASE_PKGS; then
                echo "=== FATAL: base package installation failed, exiting ==="
                exit 1
              fi

              echo "=== Removing PEP 668 EXTERNALLY-MANAGED marker ==="
              rm -f /usr/lib/python3.*/EXTERNALLY-MANAGED

              echo "=== Creating persistent Python venv ==="
              VENV="/home/opencode/.venv"
              if [ ! -f "$VENV/bin/activate" ]; then
                python3 -m venv "$VENV"
                chown -R 1000:1000 "$VENV"
              fi

              echo "=== Configuring user opencode (uid 1000) ==="
              addgroup -g 1000 opencode 2>/dev/null || true
              adduser -D -u 1000 -G opencode -h /home/opencode -s /bin/bash opencode 2>/dev/null || true

              ARCH=$(uname -m)
              if [ "$ARCH" = "x86_64" ]; then
                echo "=== Installing glibc (x86_64) ==="
                echo "=== Embedding sgerrand RSA public key ==="
                echo "" | base64 -d > /etc/apk/keys/sgerrand.rsa.pub
                github_download "https://github.com/sgerrand/alpine-pkg-glibc/releases/download/${GLIBC_VER}/glibc-${GLIBC_VER}.apk" /tmp/glibc.apk
                echo "=== Removing libc6-compat/gcompat before glibc install ==="
                apk del libc6-compat gcompat 2>&1 || true
                if apk add --no-cache --force-overwrite /tmp/glibc.apk libstdc++ 2>&1; then
                  mkdir -p /lib64
                  ln -sf /usr/glibc-compat/lib/ld-linux-x86-64.so.2 /lib64/ld-linux-x86-64.so.2
                  echo "=== Replacing opencode binary with glibc build ==="
                  cp /usr/local/bin/opencode /tmp/opencode.musl.bak 2>/dev/null || true
                  if github_download "https://github.com/anomalyco/opencode/releases/download/v${OC_VER}/opencode-linux-x64.tar.gz" /tmp/opencode-glibc.tar.gz && \
                    tar -xzf /tmp/opencode-glibc.tar.gz -C /usr/local/bin; then
                    chmod +x /usr/local/bin/opencode
                  else
                    echo "=== WARNING: glibc binary download failed, restoring musl binary ==="
                    cp /tmp/opencode.musl.bak /usr/local/bin/opencode 2>/dev/null || true
                    chmod +x /usr/local/bin/opencode
                  fi
                  rm -f /tmp/opencode-glibc.tar.gz /tmp/opencode.musl.bak
                else
                  echo "=== WARNING: glibc installation failed, using musl binary ==="
                fi
              else
                echo "=== Arch $ARCH: using original musl binary ==="
              fi

              echo "=== Force-reinstalling bash (fix glibc cascade removal) ==="
              apk del bash 2>/dev/null || true
              apk add --no-cache bash 2>&1 || echo "=== WARNING: bash reinstall failed in init, pkg-manager will fix ==="

              echo "=== Creating pkg-install wrapper ==="
              cat > /usr/local/bin/pkg-install << 'EOFWRAPPER'
              #!/bin/sh
              Q="/home/opencode/.pkg-queue"
              _LOCKED=0
              _lock() {
                _lc=0
                while true; do
                  if mkdir "$Q/.lock" 2>/dev/null; then
                    echo $$ > "$Q/.lock/pid"
                    _LOCKED=1
                    return 0
                  fi
                  _op=$(cat "$Q/.lock/pid" 2>/dev/null)
                  if [ -z "$_op" ] || ! kill -0 "$_op" 2>/dev/null; then
                    rm -rf "$Q/.lock"
                    continue
                  fi
                  _lc=$((_lc + 1))
                  if [ $_lc -ge 20 ]; then
                    echo ">> ERROR: Another pkg-install is running (pid $_op). Try again later."
                    return 1
                  fi
                  sleep 0.5
                done
              }
              _unlock() {
                if [ "$_LOCKED" = "1" ]; then
                  rm -rf "$Q/.lock" 2>/dev/null || true
                  _LOCKED=0
                fi
              }
              trap '_unlock; exit 130' INT TERM
              _send() {
                if [ ! -d "$Q" ]; then
                  echo ">> ERROR: pkg-manager queue not found. Is the sidecar running?"
                  return 1
                fi
                _lock || return 1
                rm -f "$Q/result" "$Q/log"
                echo "$1" > "$Q/request"
                _c=0
                while [ ! -f "$Q/result" ]; do
                  sleep 0.5
                  _c=$((_c + 1))
                  if [ $_c -ge 600 ]; then
                    echo ">> ERROR: pkg-manager did not respond within 300s"
                    echo ">> The pkg-manager sidecar may be down or busy."
                    _unlock
                    return 1
                  fi
                done
                cat "$Q/log" 2>/dev/null
                EXIT=$(cat "$Q/result")
                rm -f "$Q/result" "$Q/log"
                _unlock
                case "$EXIT" in ''|*[!0-9]*) EXIT=1 ;; esac
                return "$EXIT"
              }
              _query() {
                if [ ! -d "$Q" ]; then
                  echo ">> ERROR: pkg-manager queue not found. Is the sidecar running?"
                  return 1
                fi
                _lock || return 1
                rm -f "$Q/search-result"
                echo "$1" > "$Q/request"
                _c=0
                while [ ! -f "$Q/search-result" ]; do
                  sleep 0.5
                  _c=$((_c + 1))
                  if [ $_c -ge 120 ]; then
                    echo ">> ERROR: pkg-manager did not respond within 60s"
                    _unlock
                    return 1
                  fi
                done
                cat "$Q/search-result"
                rm -f "$Q/search-result"
                _unlock
              }
              _help() {
                cat << 'EOFHELP'
              pkg-install - Alpine package manager for OpenCode

              USAGE
                pkg-install <package> [package2 ...]    Install packages
                pkg-install --remove  <package> [...]   Remove packages
                pkg-install --search  <keyword>         Search available packages
                pkg-install --info    <package>          Show package details and available versions
                pkg-install --list                       List all installed packages
                pkg-install --help                       Show this help message

              INSTALL WITH SPECIFIC VERSION
                pkg-install <package>=<version>
                Example:  pkg-install nodejs=20.15.1-r0
                Tip:      use --info <package> to see available versions first

              EXAMPLES
                pkg-install openjdk17-jdk               Install Java 17
                pkg-install make cmake gcc               Install multiple packages
                pkg-install nodejs=20.15.1-r0            Install a specific version
                pkg-install --remove openjdk17-jdk       Remove Java 17
                pkg-install --search postgres            Search for PostgreSQL-related packages
                pkg-install --info nodejs                 Show nodejs details and versions

              NOTES
                - Packages are from Alpine Linux repositories (apk).
                - Installed packages persist across restarts and upgrades.
                - For language ecosystem packages (persist across restarts AND upgrades):
                    pip install <pkg>            Python (uses ~/.venv, auto-activated)
                    npm install -g <pkg>         Node.js global
                    go install <pkg>@latest      Go (installs to ~/go/bin/)
                    cargo install <pkg>          Rust (installs to ~/.cargo/bin/)
              EOFHELP
              }
              case "$1" in
                --help|-h|"")
                  _help
                  exit 0
                  ;;
                --search)
                  shift
                  [ -z "$1" ] && echo "Usage: pkg-install --search <keyword>" && exit 1
                  _query "SEARCH $*"
                  ;;
                --info)
                  shift
                  [ -z "$1" ] && echo "Usage: pkg-install --info <package>" && exit 1
                  _query "INFO $*"
                  ;;
                --remove)
                  shift
                  [ -z "$1" ] && echo "Usage: pkg-install --remove <package> [...]" && exit 1
                  echo ">> Removing: $*"
                  _send "REMOVE $*"
                  S=$?; [ $S -eq 0 ] && echo ">> Removed successfully." || echo ">> Removal failed."
                  exit $S
                  ;;
                --list)
                  _query "LIST"
                  ;;
                -*)
                  echo "Unknown option: $1"
                  _help
                  exit 1
                  ;;
                *)
                  echo ">> Installing: $*"
                  _send "INSTALL $*"
                  S=$?; [ $S -eq 0 ] && echo ">> Installed successfully." || echo ">> Installation failed."
                  exit $S
                  ;;
              esac
              EOFWRAPPER
              chmod +x /usr/local/bin/pkg-install

              echo "=== Installing global npm tools: $GLOBAL_NPM_TOOLS ==="
              if [ "$USE_CN_MIRROR" = "true" ]; then
                npm config set registry https://registry.npmmirror.com 2>/dev/null || true
              fi
              if npm install -g --ignore-scripts $GLOBAL_NPM_TOOLS 2>&1; then
                echo "=== Global npm tools installed at: $(command -v vite 2>/dev/null || echo 'vite NOT in PATH') ==="
              else
                echo "=== WARNING: npm install -g $GLOBAL_NPM_TOOLS failed ==="
              fi

              echo "=== Snapshotting filesystem to $PKG ==="
              rm -rf "$PKG"
              mkdir -p "$PKG" "$PKG/etc" "$PKG/tmp"

              SNAP_OK=true
              cp -a /bin "$PKG/bin"       || SNAP_OK=false
              ln -sf ../usr/bin/bash "$PKG/bin/bash"
              cp -a /sbin "$PKG/sbin"     || SNAP_OK=false
              cp -a /usr "$PKG/usr"       || SNAP_OK=false
              cp -a /lib "$PKG/lib"       || SNAP_OK=false
              cp /etc/passwd "$PKG/etc/passwd"  || SNAP_OK=false
              cp /etc/group "$PKG/etc/group"    || SNAP_OK=false
              cp -a /etc/apk "$PKG/etc/apk"    || SNAP_OK=false
              cp -a /etc/ssl "$PKG/etc/ssl"     || SNAP_OK=false
              mkdir -p "$PKG/lib64"
              if [ -d /lib64 ]; then
                cp -a /lib64/* "$PKG/lib64/" || echo "=== WARNING: lib64 snapshot copy failed ==="
              fi

              if [ "$SNAP_OK" != "true" ]; then
                echo "=== FATAL: snapshot copy failed (disk full?), cleaning up ==="
                rm -rf "$PKG"
                exit 1
              fi

              touch "$MARKER"
              echo "=== Snapshot complete ($(du -sh "$PKG" | cut -f1)) ==="

              restore_user_packages

              # Install OMO (plugin layer) AFTER base snapshot is sealed.
              # olares_run_omo saves OMO into $PKG via its own cp, independent of
              # the base snapshot's "cp -a /usr" sweep. Keeps plugin/base decoupled
              # and makes OMO persistence robust even if base-layer sweeps miss it.
              olares_run_omo
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            runAsUser: 0

      containers:
        - name: opencode
          image: "docker.io/beclab/anomalyco-opencode:1.14.19"
          command:
            - sh
            - "-c"
            - |
              echo "=== Runtime check ==="
              [ -x /usr/bin/bash ] && echo "bash OK" || echo "bash: waiting for pkg-manager fix"
              if [ ! -f "$HOME/.venv/bin/activate" ]; then
                echo "Creating Python venv..."
                python3 -m venv "$HOME/.venv"
              fi
              exec opencode web --hostname 0.0.0.0 --port 3000
          workingDir: /home/opencode/workspace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: HOME
              value: /home/opencode
            - name: TERM
              value: xterm-256color
            - name: PATH
              value: /home/opencode/.venv/bin:/home/opencode/.npm-global/bin:/home/opencode/go/bin:/home/opencode/.cargo/bin:/home/opencode/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: VIRTUAL_ENV
              value: /home/opencode/.venv
            - name: NPM_CONFIG_PREFIX
              value: /home/opencode/.npm-global
            - name: GOPATH
              value: /home/opencode/go
            - name: CARGO_HOME
              value: /home/opencode/.cargo
            - name: ENV
              value: /home/opencode/.profile
            - name: LD_LIBRARY_PATH
              value: /usr/glibc-compat/lib
          resources:
            limits:
              cpu: "4"
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 1Gi
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
            - name: pkg-bin
              mountPath: /bin
            - name: pkg-sbin
              mountPath: /sbin
            - name: pkg-usr
              mountPath: /usr
            - name: pkg-etc-passwd
              mountPath: /etc/passwd
            - name: pkg-etc-group
              mountPath: /etc/group
            - name: pkg-lib
              mountPath: /lib
            - name: pkg-lib64
              mountPath: /lib64
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 8081
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
        - name: pkg-manager
          image: "docker.io/beclab/anomalyco-opencode:1.14.19"
          securityContext:
            runAsUser: 0
          command:
            - sh
            - "-c"
            - |
              QUEUE="/home/opencode/.pkg-queue"
              UPKGS="/home/opencode/.user-packages"
              mkdir -p "$QUEUE"
              rm -f "$QUEUE/request" "$QUEUE/result" "$QUEUE/log" "$QUEUE/search-result"
              rm -rf "$QUEUE/.lock"
              touch "$UPKGS"

              rm -f /lib/apk/db/lock 2>/dev/null || true

              wget -q -O /dev/null https://dl-cdn.alpinelinux.org/alpine/v3.23/main/x86_64/APKINDEX.tar.gz 2>/dev/null &
              _wpid=$!
              ( sleep 5 && kill "$_wpid" 2>/dev/null ) &
              _gpid=$!
              if ! wait "$_wpid" 2>/dev/null; then
                echo "=== pkg-manager: switching to China mirrors ==="
                sed -i 's|dl-cdn.alpinelinux.org|mirrors.aliyun.com|g' /etc/apk/repositories
              fi
              kill "$_gpid" 2>/dev/null || true
              wait "$_gpid" 2>/dev/null || true

              echo "=== APK DB check ==="
              echo "installed: $(wc -l < /lib/apk/db/installed 2>/dev/null || echo 'NOT FOUND')"
              echo "arch: $(cat /etc/apk/arch 2>/dev/null || echo 'NOT FOUND')"
              echo "repos: $(cat /etc/apk/repositories 2>/dev/null || echo 'NOT FOUND')"
              ls -la /lib/apk/db/ 2>&1 || echo "/lib/apk/db/ missing"
              echo "apk info count: $(apk info 2>/dev/null | wc -l)"
              echo "=== end DB check ==="

              apk update 2>&1 || true

              echo "=== Force-reinstalling bash (every start) ==="
              apk del bash 2>/dev/null || true
              if apk add --no-cache bash 2>&1; then
                echo "=== bash reinstalled OK ==="
              else
                echo "=== WARNING: bash reinstall failed ==="
              fi

              _add_pkgs() {
                for p in $@; do
                  p_base=$(echo "$p" | sed 's/=.*//')
                  grep -qx "$p_base" "$UPKGS" || echo "$p_base" >> "$UPKGS"
                done
              }
              _del_pkgs() {
                for p in $@; do
                  sed -i "/^${p}$/d" "$UPKGS"
                done
              }

              trap 'echo "=== Package manager shutting down ==="; exit 143' TERM INT
              echo "=== Package manager ready ==="
              while true; do
                if [ -f "$QUEUE/request" ]; then
                  REQ=$(cat "$QUEUE/request")
                  rm -f "$QUEUE/request"

                  TMP="$QUEUE/.result.tmp"
                  case "$REQ" in
                    SEARCH\ *)
                      KEYWORD="${REQ#SEARCH }"
                      apk update >/dev/null 2>&1
                      apk search "$KEYWORD" > "$TMP" 2>&1
                      mv "$TMP" "$QUEUE/search-result"
                      ;;
                    LIST)
                      apk info > "$TMP" 2>&1
                      mv "$TMP" "$QUEUE/search-result"
                      ;;
                    INFO\ *)
                      TARGET="${REQ#INFO }"
                      apk update >/dev/null 2>&1
                      { apk policy "$TARGET" 2>/dev/null
                        echo ""
                        apk info -d -s "$TARGET" 2>/dev/null; } > "$TMP" 2>&1
                      mv "$TMP" "$QUEUE/search-result"
                      ;;
                    REMOVE\ *)
                      PKGS="${REQ#REMOVE }"
                      echo "=== Removing: $PKGS ==="
                      apk del $PKGS > "$QUEUE/log" 2>&1
                      RC=$?
                      [ $RC -eq 0 ] && _del_pkgs $PKGS
                      echo $RC > "$QUEUE/result"
                      ;;
                    INSTALL\ *)
                      PKGS="${REQ#INSTALL }"
                      echo "=== Installing: $PKGS ==="
                      apk add --no-cache $PKGS > "$QUEUE/log" 2>&1
                      RC=$?
                      [ $RC -eq 0 ] && _add_pkgs $PKGS
                      echo $RC > "$QUEUE/result"
                      ;;
                    *)
                      echo "=== Installing (legacy): $REQ ==="
                      apk add --no-cache $REQ > "$QUEUE/log" 2>&1
                      RC=$?
                      [ $RC -eq 0 ] && _add_pkgs $REQ
                      echo $RC > "$QUEUE/result"
                      ;;
                  esac
                fi
                sleep 1
              done
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: pkg-bin
              mountPath: /bin
            - name: pkg-sbin
              mountPath: /sbin
            - name: pkg-usr
              mountPath: /usr
            - name: pkg-lib
              mountPath: /lib
            - name: pkg-lib64
              mountPath: /lib64
            - name: pkg-etc-apk
              mountPath: /etc/apk
            - name: pkg-etc-ssl
              mountPath: /etc/ssl
            - name: pkg-etc-passwd
              mountPath: /etc/passwd
            - name: pkg-etc-group
              mountPath: /etc/group
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["test", "-d", "/home/opencode/.pkg-queue"]
            initialDelaySeconds: 10
            periodSeconds: 30
      terminationGracePeriodSeconds: 10
      restartPolicy: Always
      volumes:
        - name: opencode-home
          hostPath:
            path: "{{ .Values.userspace.appData }}"
            type: DirectoryOrCreate
        - name: opencode-workspace
          hostPath:
            path: "{{ .Values.userspace.userData }}/Code"
            type: DirectoryOrCreate
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: pkg-bin
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/bin"
            type: DirectoryOrCreate
        - name: pkg-sbin
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/sbin"
            type: DirectoryOrCreate
        - name: pkg-usr
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/usr"
            type: DirectoryOrCreate
        - name: pkg-lib
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/lib"
            type: DirectoryOrCreate
        - name: pkg-lib64
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/lib64"
            type: DirectoryOrCreate
        - name: pkg-etc-passwd
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/etc/passwd"
            type: FileOrCreate
        - name: pkg-etc-group
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/etc/group"
            type: FileOrCreate
        - name: pkg-etc-apk
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/etc/apk"
            type: DirectoryOrCreate
        - name: pkg-etc-ssl
          hostPath:
            path: "{{ .Values.userspace.appData }}/.pkg-root/etc/ssl"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: opencode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: opencode
spec:
  ports:
    - name: web
      port: 3000
      targetPort: 3000
  selector:
    io.kompose.service: opencode
status:
  loadBalancer: {}
