---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: opencode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: opencode
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: opencode
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /home/opencode/workspace /home/opencode/.opencode /home/opencode/.config/opencode
          resources: {}
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
        - name: init-glibc
          image: "docker.io/beclab/alpine:3.20"
          command:
            - sh
            - "-c"
            - |
              ARCH=$(uname -m)
              if [ "$ARCH" != "x86_64" ]; then
                echo "=== Arch $ARCH: glibc fix not available, skipping ==="
                exit 0
              fi

              CACHE="/home/opencode/.glibc-cache"
              GLIBC_VER="2.35-r1"
              OC_VER="1.2.27"
              MARKER="$CACHE/done-${OC_VER}-${GLIBC_VER}-x86_64"

              if [ -f "$MARKER" ]; then
                echo "=== glibc cache hit, skipping downloads ==="
                exit 0
              fi

              echo "=== Downloading glibc and opencode glibc binary (x86_64) ==="
              mkdir -p "$CACHE"
              apk add --no-cache curl

              curl -sL https://alpine-pkgs.sgerrand.com/sgerrand.rsa.pub \
                -o "$CACHE/sgerrand.rsa.pub"

              curl -sL "https://github.com/sgerrand/alpine-pkg-glibc/releases/download/${GLIBC_VER}/glibc-${GLIBC_VER}.apk" \
                -o "$CACHE/glibc.apk"

              curl -fsSL "https://github.com/anomalyco/opencode/releases/download/v${OC_VER}/opencode-linux-x64.tar.gz" \
                -o "$CACHE/opencode.tar.gz"

              touch "$MARKER"
              echo "=== Downloads complete ==="
              ls -la "$CACHE/"
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsUser: 0
      containers:
        - name: opencode
          image: "docker.io/beclab/anomalyco-opencode:1.2.27"
          command:
            - sh
            - "-c"
            - |
              CACHE="/home/opencode/.glibc-cache"
              ARCH=$(uname -m)

              if [ "$ARCH" = "x86_64" ] && [ -f "$CACHE/glibc.apk" ] && [ -f "$CACHE/opencode.tar.gz" ]; then
                echo "=== Installing glibc (x86_64) ==="
                cp "$CACHE/sgerrand.rsa.pub" /etc/apk/keys/sgerrand.rsa.pub
                apk del libc6-compat gcompat 2>/dev/null || true
                apk add --no-cache --force-overwrite "$CACHE/glibc.apk" libstdc++ 2>/dev/null

                echo "=== Replacing opencode binary with glibc build ==="
                tar -xzf "$CACHE/opencode.tar.gz" -C /usr/local/bin
                chmod +x /usr/local/bin/opencode

                echo "=== Setting up glibc loader ==="
                mkdir -p /lib64
                ln -sf /usr/glibc-compat/lib/ld-linux-x86-64.so.2 /lib64/ld-linux-x86-64.so.2 2>/dev/null
              else
                echo "=== Arch $ARCH: using original binary (terminal may not be available) ==="
              fi

              echo "=== Starting opencode ==="
              exec opencode web --hostname 0.0.0.0 --port 3000
          workingDir: /home/opencode/workspace
          securityContext:
            runAsUser: 0
          env:
            - name: HOME
              value: /home/opencode
            - name: TERM
              value: xterm-256color
            - name: LD_LIBRARY_PATH
              value: /usr/glibc-compat/lib
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always
      volumes:
        - name: opencode-home
          hostPath:
            path: "{{ .Values.userspace.appData }}"
            type: DirectoryOrCreate
        - name: opencode-workspace
          hostPath:
            path: "{{ .Values.userspace.userData }}/Code"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: opencode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: opencode
spec:
  ports:
    - name: web
      port: 3000
      targetPort: 3000
  selector:
    io.kompose.service: opencode
status:
  loadBalancer: {}
