olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: ollamaornith35bv3
  icon: https://app.cdn.olares.com/appstore/llm/ollama/ornith.png
  description: "Ornith 35B served with Ollama."
  appid: ollamaornith35bv3
  title: Ornith 35B (Ollama)
  version: '1.0.5'
  categories:
    - AI
sharedEntrances:
  - name: ollamaornith35bv3
    host: sharedentrances-api
    port: 0
    title: Ornith 35B
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/ornith.png
entrances:
  - name: ollamaclient
    port: 8090
    host: download-svc
    title: Ornith 35B
    icon: https://app.cdn.olares.com/appstore/llm/ollama/ornith.png
    openMethod: window
    authLevel: internal
#   ollamaornith35bv3 — engine Deployment (== appid / Release.Name)
#   llminit          — llm-init / entrance Deployment
workloadReplicas:
  ollamaornith35bv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'ornith:35b'
  upgradeDescription: |
    v1.0.5: nvidia host memory — requiredMemory 22Gi, OLLAMA_MEMORY_REQUEST 21Gi, OLLAMA_MEMORY_LIMIT 30Gi; llm-init limit 2Gi; limitedMemory 32Gi.
    v1.0.4: bump ollama to 0.31.2.
    v1.0.4: bump llm-init to v1.3.1.
  fullDescription: |
    **Model Overview**
    Ornith 35B is the Ollama-packaged build of DeepReinforce's Ornith-1.0-35B MoE model, designed for agentic coding with thinking, tool calling, and vision support. This app pulls `ornith:35b` from the Ollama library.

    Recommended when your workload centers on code writing and automated terminal operations (agentic coding). Ornith-1.0-35B uses a self-improving RL framework and targets benchmarks such as SWE-bench and Terminal-Bench.

    **Preset Configuration**
    - Model: `ornith:35b`
    - Capabilities: thinking, tools, vision
    - Engine args: `OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=131072 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1` (128K context, keep model in VRAM, flash attention, q8_0 KV cache)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                                              |
    |----------------|-------------------|----------------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; Ollama uses GPU by default                   |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod                         |
    
    **How It Works**
    First, Model Console pulls the model from the Ollama library and gets it ready, then the Ollama daemon starts serving the model when it's ready. These two parts run separately but share files and progress info.

    **Stack**
    - **Ollama daemon** (port 11434): pulls and serves the model
    - **Model Console** (port 8090): drives model pull, shows progress, and provides the OpenAI API, proxying to Ollama

    **Model Storage**
    All pulled models are stored in a shared folder at `appCommon/ollama`. All Ollama-based apps share this location, so blobs deduplicate by digest across installs.


  developer: DeepReinforce
  website: https://deep-reinforce.com/ornith_1_0.html
  sourceCode: https://github.com/deepreinforce-ai/Ornith-1
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/deepreinforce-ai/Ornith-1/blob/main/LICENSE

  accelerator:
    #   nvidia       — discrete GPU; OLLAMA_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: nvidia
      limitedCpu: "15360m"
      requiredCpu: "1200m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      # Engine MEMORY_REQUEST 21Gi + llm-init <= requiredMemory 22Gi; MEMORY_LIMIT 30Gi + llm-init 2Gi <= limitedMemory 32Gi
      limitedMemory: "32Gi"
      requiredMemory: "22Gi"
      requiredGPUMemory: "23Gi"
      limitedGPUMemory: "24Gi"
    - mode: nvidia-gb10
      limitedCpu: "15360m"
      requiredCpu: "1200m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "48Gi"
      requiredMemory: "28Gi"
  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE        # example: ollama://qwen3.5:2b
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "ollama://ornith:35b"
    description: "Example: ollama://qwen3.5:2b. The Ollama library source to pull your model. Use `ollama://<model>:<tag>` format. Browse models at https://ollama.com/library."
    regex: "^ollama://"
  - envName: MODEL_NAME          # example: qwen3.5:2b
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "ornith:35b"
    description: "Example: qwen3.5:2b. The name of your model — use the string after `ollama://` in MODEL_SOURCE. This is also used as the OpenAI alias."
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools,vision"
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description: "The model capabilities. Pick what your model supports; check ollama.com/library for details. If no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1
    required: true
    default: "OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=131072 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1"
    type: string
    editable: true
    applyOnChange: true
    description: "Example: OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 .... KEEP_ALIVE is ollama-daemon-only (chart default -1, forever in VRAM)."
  - envName: LOG_LEVEL
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "info"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: OLLAMA_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_REQUEST # sum with llm-init <= requiredMemory 22Gi
    required: true
    default: "21Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_LIMIT # 30Gi + llm-init 2Gi <= limitedMemory 32Gi
    required: true
    default: "30Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description: "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
