  icon: https://app.cdn.olares.com/appstore/llm/llamacpp/qwop.png
  description: "Qwopus3.6-27B-v2 MTP Q4_K_M served with llama.cpp."
  appid: llamacppqwopus3627v2mtpq4kmv3
  title: Qwopus3.6-27B MTP (llama.cpp)
  version: '1.0.5'
  categories:
    - AI
sharedEntrances:
  - name: llamacppqwopus3627v2mtpq4kmv3
    host: sharedentrances-api
    port: 0
    title: Qwopus3.6-27B MTP
    invisible: true
