metadata:
  title: JDownloader 2
  description: 免费开源的下载管理工具，支持网页浏览器访问。
spec:
  fullDescription: |
    JDownloader 是一款拥有庞大社区的免费开源下载管理工具，让资源下载变得简单快捷。用户可以启动、停止或暂停下载，设置带宽限制，自动解压归档文件等。其高度可扩展的框架，每天都能为您节省宝贵时间！

    主要功能
    - 跨平台支持（Windows、Linux、Mac 等）
    - 兼容 Java 1.5 及以上版本
    - 完全开源（GPL协议）
    - 24 小时技术支持
    - 支持多文件同时下载
    - 支持多线程下载
    - 内置强大的 OCR 模块
    - 自动解压（包括密码列表搜索，支持 RAR 格式）
    - 主题切换支持
    - 多语言界面
    - 支持约 110 个主流下载站和 300 多个解密插件
    - 通过 JDLiveHeaderScripts 支持 1400 多种路由器的自动断线重连
    - 在线更新（Webupdate）
    - 集成用于额外组件的包管理器（如网页界面、关机功能）

    JDownloader 2 新增内容
    - 界面美化升级
    - 支持更多云存储服务、服务器和下载网站
    - 新增高级过滤器，可按文件类型、大小、名称限制添加链接
    - 选项菜单结构简化与优化
    - 浏览器集成体验提升
    - 支持下载 Facebook 或 Flickr 全部照片专辑
  upgradeDescription: |
    升级到 v26.03.1

    更新内容:
    * 更新基础镜像到版本 4.11.2
    * 修复某些设置下 X 服务器找不到合适 Mesa 驱动的问题

    完整发布说明参见: https://github.com/jlesage/docker-jdownloader-2/releases/tag/v26.03.1
