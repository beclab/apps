metadata:
  title: JDownloader 2
  description: Free, open-source download management tool with web browser access.
spec:
  fullDescription: |
    JDownloader is a free, open-source download management tool with a huge community that makes downloading as easy and fast as it should be. Users can start, stop or pause downloads, set bandwith limitations, auto-extract archives and much more. It's an easy-to-extend framework that can save hours of your valuable time every day!

    Features
    - Platform independent. (Windows, Linux, Mac, ..)
    - Runs on Java 1.5 or higher
    - Complete Open-Source (GPL)
    - 24-hour support
    - Download several files at once
    - Download with multiple connections
    - JD has an own powerful OCR module
    - Automatic extractor (including password list search) (Rar archives)
    - Theme Support
    - Multilingual
    - About 110 hoster and over 300 decrypt plug-ins
    - Reconnect with JDLiveHeaderScripts: (1400 router supported)
    - Webupdate
    - Integrated package manager for additional modules (eg. Webinterface, Shutdown)

    What's new in JDownloader 2?
    - Aesthetic changes to the interface.
    - Compatibility with more storage services, servers, and download webs.
    - Advanced filters that allow us to restrict which links are to be added (by file kind, size or name of the file).
    - Simplification and reorganization of the options menu.
    - Improved integration into web browsers.
    - Download full photo albums from Facebook or Flickr.
  upgradeDescription: |
    Upgrade to v26.03.1

    Changes:
    * Updated baseimage to version 4.11.2
    * Fixed X server failing to find the appropriate Mesa driver on some setups

    Full release notes at: https://github.com/jlesage/docker-jdownloader-2/releases/tag/v26.03.1
