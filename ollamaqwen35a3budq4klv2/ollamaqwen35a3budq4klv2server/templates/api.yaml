{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- $ollamaclientDomainENV := split "," .Values.domain.ollamaclient -}}
{{- $ollamaclientDomain := index $ollamaclientDomainENV "_0" -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: api
  name: api
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: api
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: api
    spec:
      containers:
        - name: api
          image: "docker.io/beclab/harveyff-olares-ollama:v0.1.17"
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: DISPLAY
              value: ":0"
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: MODEL_NAME
            - name: OLLAMA_URL
              value: "http://ollama.ollamaqwen35a3budq4klv2server-shared:11434"
            - name: APP_URL
              value: "https://{{ $ollamaclientDomain }}"
            - name: OLLAMA_NOPRUNE
              value: "1"
            - name: HF_REPO
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: HF_REPO
            - name: HF_FILE
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: HF_FILE
            - name: HF_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: HF_ENDPOINT
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: GGUF_DIR
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: GGUF_DIR
            - name: GGUF_PARAMS
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: GGUF_PARAMS
            - name: GGUF_TEMPLATE_NAME
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: GGUF_TEMPLATE_NAME
            - name: OLLAMA_CONTEXT_LENGTH
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: OLLAMA_CONTEXT_LENGTH
            - name: OLLAMA_REPEAT_PENALTY
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: OLLAMA_REPEAT_PENALTY
            - name: OLLAMA_REPEAT_LAST_N
              valueFrom:
                configMapKeyRef:
                  name: ollama-env
                  key: OLLAMA_REPEAT_LAST_N
          resources:
            requests:
              cpu: 300m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: "/models"
              name: gguf-models
      volumes:
        - name: gguf-models
          hostPath:
            path: "{{ .Values.userspace.userData }}/Ollama/{{ .Release.Name }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: api
  name: api
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "api"
      port: 8081
      targetPort: 8080
  selector:
    io.kompose.service: api
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: api
  name: sharedentrances-api
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "api"
      port: 80
      targetPort: 8080
  selector:
    io.kompose.service: api
status:
  loadBalancer: {}
{{- end }}
