metadata:
  title: Qwen3.5 35B A3B UD-Q4 (Ollama)
  description: 通过 Ollama 本地运行 Qwen3.5-35B-A3B GGUF（Q4_K_L 量化）。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型 ##
    Qwen3.5-35B-A3B 是阿里巴巴 Qwen3.5 系列的混合专家（MoE）模型，总参数 35B，激活参数 3B，以较低的资源消耗实现优秀的性能。Qwen3.5 集成了多模态学习、架构效率和强化学习方面的突破，为开发者和企业提供前所未有的能力。

    - 模型：Qwen3.5-35B-A3B-UD-Q4_K_L
    - 来源：unsloth/Qwen3.5-35B-A3B-GGUF（Hugging Face）
    - 量化：Q4_K_L
    - 上下文：131072
    - 后端：Ollama

  upgradeDescription: |
    升级 Ollama 至 0.18.3。主要性能改进包括优化缓存处理以加快本地推理速度、改进上下文压缩提升内存效率、提升工具调用准确性，以及支持 AMD GPU 的 ROCm 7。
