metadata:
  title: Qwen3.5 35B A3B Q4 (Ollama)
  description: Run Qwen3.5-35B-A3B GGUF (Q4_K_L quantization) locally via Ollama.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Qwen3.5-35B-A3B is a Mixture-of-Experts model from the Qwen3.5 series by Alibaba. It activates 3B parameters out of 35B total, delivering strong performance with lower resource usage. Qwen3.5 integrates breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning to empower developers and enterprises with unprecedented capability.

    - Model: Qwen3.5-35B-A3B-UD-Q4_K_L
    - Source: unsloth/Qwen3.5-35B-A3B-GGUF (Hugging Face)
    - Quantization: Q4_K_L
    - Context: 131072
    - Backend: Ollama

  upgradeDescription: |
    1. Ollama runtime upgraded to 0.18.1
    2. num_ctx pinned to 131072 (128K) instead of relying on model defaults
    3. GGUF models now use explicit Go Template injection, enabling Thinking (<think> blocks) and Tool Call (OpenAI-compatible function calling)
