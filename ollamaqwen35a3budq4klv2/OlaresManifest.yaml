  name: ollamaqwen35a3budq4klv2
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: Run Qwen3.5-35B-A3B GGUF (Q4_K_L quantization) locally via Ollama.
  appid: ollamaqwen35a3budq4klv2
  title: Qwen3.5 35B A3B UD-Q4 (Ollama)
  version: '1.0.5'
  categories:
    - AI
sharedEntrances:
  - name: ollamaqwen35a3budq4klv2
    host: sharedentrances-api
    port: 0
    title: Qwen3.5 35B A3B UD-Q4_K_L
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Qwen3.5 35B A3B UD-Q4_K_L
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'Qwen3.5-35B-A3B-UD-Q4_K_L'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Qwen3.5-35B-A3B is a Mixture-of-Experts model from the Qwen3.5 series by Alibaba. It activates 3B parameters out of 35B total, delivering strong performance with lower resource usage. Qwen3.5 integrates breakthroughs in multimodal learning, architectural efficiency, and reinforcement learning to empower developers and enterprises with unprecedented capability.

    - Model: Qwen3.5-35B-A3B-UD-Q4_K_L
    - Source: unsloth/Qwen3.5-35B-A3B-GGUF (Hugging Face)
    - Quantization: Q4_K_L
    - Context: 131072
    - Backend: Ollama

  upgradeDescription: |
    Ollama runtime upgraded to 0.18.2
  developer: Alibaba
  website: https://qwen.ai/home
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://huggingface.co/unsloth/Qwen3.5-35B-A3B-GGUF

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6200m
  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 500Gi
  limitedMemory: 40Gi
  requiredMemory: 4200Mi
  requiredGpu: 23.5Gi
  limitedGpu: 28Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamaqwen35a3budq4klv2server
    shared: true
  - name: ollamaqwen35a3budq4klv2
permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaqwen35a3budq4klv2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaqwen35a3budq4klv2
      type: application
      version: '>=1.0.1'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: KEEP_ALIVE
    required: false
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
{{- end }}
