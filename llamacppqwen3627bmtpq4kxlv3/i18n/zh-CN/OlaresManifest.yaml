metadata:
  description: "使用 llama.cpp 运行 Qwen3.6-27B MTP UD-Q4_K_XL 模型。需要 NVIDIA GPU。"
  title: Qwen3.6-27B MTP (llama.cpp)

spec:
  fullDescription: |
    **模型简介**
    Qwen3.6-27B MTP 是阿里巴巴 Qwen 系列带内置 Multi-Token Prediction (MTP) 草稿头的文本模型变体。MTP 草稿解码每步预测多个 token，提升生成吞吐。支持思考与工具调用。本应用通过 llama.cpp 运行 `unsloth/Qwen3.6-27B-MTP-GGUF` 的 `UD-Q4_K_XL` GGUF 量化版本（纯文本预设，不含视觉/mmproj）。

    适合对 token 生成速度有极高要求的场景。带 MTP 技术的模型通过每步草稿多个 token 来加速解码。

    **预设配置**
    - 模型：`unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL`
    - 能力：思考、工具
    - 引擎参数：`-c 100352 -ngl all -fa on -ctk q8_0 -ctv q8_0 --jinja -np 1 --spec-type draft-mtp --spec-draft-n-max 2`（98K 上下文、MTP draft-2、全量 GPU 卸载、q8_0 KV 缓存）
    - 所需显存：`23Gi`

    **加速器模式**
    | 模式           | 设备             | 说明                                        |
    |----------------|------------------|---------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存，`-ngl all` 完全利用 GPU   |
    | `nvidia-gb10`  | GPU (Spark)      | 类似上方，但显存由 pod 管理                  |
    **工作流程说明**
    首先，Model Console 下载并准备模型，然后 `llama.cpp` 在模型就绪后启动服务。MTP（`--spec-type draft-mtp`）利用模型内置草稿头每步预测多个 token，提升解码吞吐。

    **技术栈说明**
    - **llama.cpp**：运行模型并通过 8081 端口提供 API 服务
    - **Model Console**：下载模型，展示进度，并通过 8090 端口提供 OpenAI API，代理到 `llamacpp`

    **模型存储**
    所有模型文件存储在共享目录 `appCommon/huggingface`（挂载为 `/cache/hf/hub`），同类应用均使用此目录。

    **资源建议**
    - CPU、内存和 GPU 数量随图表自动配置，磁盘配额为固定
    - 该模型需要至少 23Gi 显存的 GPU 才能完全加速
    - MTP 会略增显存占用；若 98K 上下文 OOM，可降低 `-c`（如 `-c 65536`）
