#   llamacppqwen3627bmtpq4kxlv3 — engine Deployment (== appid / Release.Name)
#   llminit                      — llm-init / entrance Deployment
workloadReplicas:
  llamacppqwen3627bmtpq4kxlv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL'
  fullDescription: |
    **Model Overview**
    Qwen3.6-27B MTP is a text model variant with built-in Multi-Token Prediction (MTP) heads from the Qwen series (Alibaba). MTP draft decoding predicts multiple tokens per step for higher generation throughput. It supports thinking and tool calling. This app serves the `UD-Q4_K_XL` GGUF build from `unsloth/Qwen3.6-27B-MTP-GGUF` via llama.cpp (text-only preset, no vision/mmproj).

    Recommended when you need very high token generation speed. Models with MTP technology accelerate decode by drafting multiple tokens in each step.

    **Preset Configuration**
    - Model: `unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL`
    - Capabilities: thinking, tools
    - Engine args: `-c 100352 -ngl all -fa on -ctk q8_0 -ctv q8_0 --jinja -np 1 --spec-type draft-mtp --spec-draft-n-max 2` (98K context, MTP draft-2, full GPU offload, q8_0 KV cache)
    - MTP adds modest VRAM overhead; if OOM at full 98K context, reduce `-c` (e.g. `-c 65536`).
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    
    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving when ready. MTP (`--spec-type draft-mtp`) uses the model's built-in draft head to predict multiple tokens per step for higher decode throughput.

    **Stack**
    - **llama.cpp** (`server-cuda12-b9870`): Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.


  developer: Alibaba
  website: https://qwen.ai/home
  sourceCode: https://github.com/QwenLM/Qwen3
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://huggingface.co/unsloth/Qwen3.6-27B-MTP-GGUF

  accelerator:
    #   nvidia       — discrete GPU; LLAMACPP_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: nvidia
      limitedCpu: "15360m"
      requiredCpu: "1100m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "40Gi"
      requiredMemory: "25Gi"
      requiredGPUMemory: "23Gi"
      limitedGPUMemory: "24Gi"
    - mode: nvidia-gb10
      limitedCpu: "15360m"
      requiredCpu: "1100m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "48Gi"
      requiredMemory: "32Gi"

  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE        # example: hf://unsloth/Qwen3-0.6B-GGUF --include Qwen3-0.6B-Q4_K_M.gguf
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "hf://unsloth/Qwen3.6-27B-MTP-GGUF --include Qwen3.6-27B-UD-Q4_K_XL.gguf"
    description:  "Example: hf://unsloth/Qwen3-0.6B-GGUF --include Qwen3-0.6B-Q4_K_M.gguf. The source to download your model. For models with split files, only include the first part; for vision-language models, add the projector with a comma, like `hf://<repo> --include model.gguf,hf://<repo> --include mmproj-F16.gguf`."
    regex: "^hf://"
  - envName: MODEL_NAME          # example: unsloth/Qwen3-0.6B-GGUF:Q4_K_M (-hf repo:quant)
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL"
    description:  "Example: unsloth/Qwen3-0.6B-GGUF:Q4_K_M. The name of your model in `owner/repo:quant` format"
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools"
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description:  "The model capabilities. Pick what your model supports, if no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: -c 8192 -ngl all -fa on
    required: true
    default: "-c 100352 -ngl all -fa on -ctk q8_0 -ctv q8_0 --jinja -np 1 --spec-type draft-mtp --spec-draft-n-max 2"
    type: string
    editable: true
    applyOnChange: true
    description:  "Example: -c 8192 -ngl all -fa on. Extra llama.cpp options, to fully use GPU, add `-ngl all`, for CPU, it adds `-ngl 0` automatically. You can also use values like `LLAMA_ARG_*=val`."
  - envName: LOG_LEVEL           # single-select: debug | info | warn | error
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "info"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: LLAMACPP_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description:  "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
