olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  rnasequencingingress: 1
  rnasequencing: 1
metadata:
  name: rnasequencing
  description: An end-to-end GPU-powered workflow for scRNA-seq using RAPIDS
  icon: https://app.cdn.olares.com/appstore/rnasequencing/icon.png
  appid: rnasequencing
  version: '1.0.5'
  title: RNA Sequencing
  categories:
  - Productivity_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '0.0.5'
  fullDescription: |
    Single-cell RNA sequencing (scRNA-seq) lets researchers study gene activity in each cell on its own, exposing variation, cell types, and cell states that bulk methods hide. But these large, high-dimensional datasets take heavy compute to handle.

    This playbook shows an end-to-end GPU-powered workflow for scRNA-seq using RAPIDS-singlecell, a RAPIDS powered library in the scverse® ecosystem. It follows the familiar Scanpy API and lets researchers run the steps of data preprocessing, quality control (QC) and cleanup, visualization, and investigation faster than CPU tools by working with sparse count matrices directly on the GPU.

    Playbook link: https://build.nvidia.com/spark/single-cell

  developer: Severin Dicks
  website: https://build.nvidia.com/spark/single-cell
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://rapids-singlecell.readthedocs.io/en/latest/
  accelerator:
  - mode: nvidia
    requiredMemory: 21Gi
    limitedMemory: 48Gi
    requiredDisk: 6Gi
    limitedDisk: 15Gi
    requiredCpu: "1.5"
    limitedCpu: "2.5"
    requiredGPUMemory: 10Gi
    limitedGPUMemory: 24Gi
  supportArch:
  - amd64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
  - authLevel: internal
    host: rnasequencingingress
    icon: https://app.cdn.olares.com/appstore/rnasequencing/icon.png
    name: rna
    openMethod: window
    port: 8080
    title: RNA Sequencing
