# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   mtranserverv3       — translation engine Deployment (name: {{ .Release.Name }} == appid)
#   mtranserverv3client — nginx entrance Deployment
# The CDN download Job ({{ .Release.Name }}-download-models) carries no replica count.
workloads:
  mtranserverv3client:
    replicaCount: 1
  mtranserverv3:
    replicaCount: 1
models:
  - name: "mtranserver_models.tar.zst"
    output: "./downloads"
    md5: "e8660683d89993a315b463d0a731f5ec"
