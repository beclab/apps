---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    # MTranServer entrance: upstream backup sends traffic to downloader-init
    # (:8090) until the engine (:8989) is healthy. /translate and /languages
    # always pin to the engine for API probes during download.
    upstream svc_backend {
        server mtranserver.{{ .Release.Namespace }}.svc.cluster.local:8989 max_fails=1 fail_timeout=2s;
        server download-svc.{{ .Release.Namespace }}.svc.cluster.local:8090 backup;
    }

    server {
        listen 8080;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;
        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location ~ ^/(translate|languages) {
            proxy_pass http://mtranserver.{{ .Release.Namespace }}.svc.cluster.local:8989;

            if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
              add_header Access-Control-Allow-Headers "deviceType,token,authorization,content-type,x-csrftoken";
              return 204;
            }
        }

        location / {
            proxy_pass http://svc_backend;

            if ($request_method = 'OPTIONS') {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
              add_header Access-Control-Allow-Headers "deviceType,token,authorization,content-type,x-csrftoken";
              return 204;
            }
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtranserverv3client
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: mtranserverweb
spec:
  replicas: {{ .Values.workloads.mtranserverv3client.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: mtranserverweb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: mtranserverweb
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: mtranserverweb
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: mtranserverweb
  ports:
    - name: mtranserverweb
      protocol: TCP
      port: 8080
      targetPort: 8080
