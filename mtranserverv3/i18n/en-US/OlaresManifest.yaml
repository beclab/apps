metadata:
  title: MTranServer
  description: A high-performance offline translation server with minimal resource requirements
spec:
  fullDescription: |
    MTranServer is a high-performance offline translation server with minimal resource requirements.

    It runs on CPU with just 1GB memory, no GPU needed. Average response time of 50ms per request. Supports translation of major languages worldwide.

    Translation quality comparable to Google Translate.

    Note: This model focuses on speed and private deployment on various devices, so the translation quality will not match that of large language models. For high-quality translation, consider using online large language model APIs.

    Translation models are downloaded at install time from the Olares CDN bundle
    (`mtranserver_models.tar.zst`) via `downloader-init` and extracted into
    `/app/models` before the server starts. No Hugging Face token is required.
  upgradeDescription: |
    Migrated MTranServer to the apiVersion v3 shared app pattern (mtranserverv2 → mtranserverv3).

    **What's Changed**

    - **Model download**: kept the CDN `downloader-init` tar.zst bundle unchanged;
      no Hugging Face / llm-init migration.
    - **Entrance routing**: nginx upstream backup sends traffic to the download
      dashboard until the engine is healthy; `/translate` and `/languages` pin to the engine.
    - **Architecture**: flattened the mtranserverv2 / mtranserverv2server sub-charts
      into a single chart; backends resolve within the release namespace (dropping the
      `*-shared` admin / non-admin split).
    - **Accelerator**: declared CPU-only resource requirements via `accelerator` modes.
    - **Scaling**: `workloadReplicas` declares the engine and nginx client workloads.
    - **Runtime**: image `xxnuo/mtranserver:4.0.33` (was `beclab/xxnuo-mtranserver:3.1.11` in v2).
