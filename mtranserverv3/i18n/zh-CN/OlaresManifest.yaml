metadata:
  description: 一个超低资源消耗超快的离线翻译服务器
  title: MTranServer
spec:
  fullDescription: |
    MTranServer 是一个超低资源消耗超快的离线翻译服务器。
    英译中模型仅需 860MB 内存即可运行，无需显卡。单个请求平均响应时间 50ms。支持全世界主要语言的翻译。

    翻译质量与 Google 翻译相当。

    注意本模型专注于速度和多种设备私有部署，所以翻译质量肯定是不如大模型翻译的效果。
    需要高质量的翻译建议使用在线大模型 API。

    安装时通过 `downloader-init` 从 Olares CDN 下载模型包（`mtranserver_models.tar.zst`），
    解压到 `/app/models` 后再启动服务。无需配置 Hugging Face Token。
  upgradeDescription: |
    将 MTranServer 迁移至 apiVersion v3 共享应用模式（mtranserverv2 → mtranserverv3）。

    **更新内容**

    - **模型下载**：保留 CDN `downloader-init` tar.zst 包，未迁移至 Hugging Face / llm-init。
    - **入口路由**：nginx upstream backup 在引擎就绪前将流量导向下载页；`/translate` 与 `/languages` 固定转发至引擎。
    - **架构**：合并 mtranserverv2 / mtranserverv2server 子 chart 为单一 chart；后端服务在 release 命名空间内解析（移除 `*-shared` 管理员/非管理员拆分）。
    - **加速器**：通过 `accelerator` modes 声明纯 CPU 资源要求。
    - **扩缩**：`workloadReplicas` 声明引擎与 nginx 客户端 workload。
    - **运行时**：镜像 `xxnuo/mtranserver:4.0.33`（v2 为 `beclab/xxnuo-mtranserver:3.1.11`）。
