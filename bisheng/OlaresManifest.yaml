metadata:
  name: bisheng
  icon: https://app.cdn.olares.com/appstore/bisheng/icon.png
  description: Open LLM devops platform for next generation Enterprise AI applications
  appid: bisheng
  title: BISHENG
  version: "1.0.15"
  categories:
