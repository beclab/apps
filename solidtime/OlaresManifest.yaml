olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: solidtime
  description: Modern open-source time-tracking app
  icon: https://app.cdn.olares.com/appstore/solidtime/icon.png
  appid: solidtime
  version: '1.0.1'
  title: solidtime
  categories:
  - Productivity_v112
  - Productivity
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '0.11.5'
  promoteImage:
  - https://app.cdn.olares.com/appstore/solidtime/1.webp
  - https://app.cdn.olares.com/appstore/solidtime/2.webp
  - https://app.cdn.olares.com/appstore/solidtime/3.webp
  - https://app.cdn.olares.com/appstore/solidtime/4.webp
  fullDescription: |
    solidtime is a modern open-source time tracking application for Freelancers and Agencies.
  
    Features:
    - Time tracking: Track your time with a modern and easy-to-use interface
    - Projects: Create and manage projects and assign project members
    - Tasks: Create and manage tasks and assign tasks to projects
    - Clients: Create and manage clients and assign clients to projects
    - Billable rates: Set billable rates for projects, project members, organization members and organizations
    - Multiple organizations: Create and manage multiple organizations with one account
    - Roles and permissions: Create and manage organizations
    - Import: Import your time tracking data from other time tracking applications (Supported: Toggl, Clockify, Timeentry CSV)
  developer: solidtime-io
  website: https://www.solidtime.io/
  submitter: Olares
  sourceCode: https://github.com/solidtime-io/solidtime
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1.5Gi
  limitedMemory: 3Gi
  requiredDisk: 2.5Gi
  limitedDisk: 4Gi
  requiredCpu: 0.5
  limitedCpu: 2
  doc: https://docs.solidtime.io/
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
entrances:
  - authLevel: internal
    host: solidtimeingress
    icon: https://app.cdn.olares.com/appstore/solidtime/icon.png
    name: solidtime
    openMethod: window
    port: 8080
    title: solidtime
middleware:
  redis:
    namespace: solidtime
  postgres:
    username: solidtime
    databases:
      - name: solidtimedb
        distributed: false
envs:
  - envName: SMTP_FROM_NAME
    type: string
    required: false
    editable: true
    applyOnChange: true
    default: "solidtime"
  - envName: SMTP_SERVER
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
    applyOnChange: true
  - envName: SMTP_PORT
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
    applyOnChange: true
  - envName: SMTP_LOGIN
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME
    applyOnChange: true
  - envName: SMTP_PASSWORD
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
    applyOnChange: true
  - envName: SMTP_FROM_ADDRESS
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS
    applyOnChange: true
  - envName: SMTP_TLS
    applyOnChange: true
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_USE_TLS
  - envName: SMTP_SSL
    applyOnChange: true
    required: false
    valueFrom:
      envName: OLARES_USER_SMTP_USE_SSL
  - envName: OLARES_USER_TIMEZONE
    required: false
    valueFrom:
      envName: OLARES_USER_TIMEZONE
    applyOnChange: true
  - envName: ADMIN_EMAIL
    type: email
    required: true
    editable: false
  - envName: ADMIN_NAME
    type: string
    required: true
    editable: false
    description: "Workspace and admin user name (maximum 30 characters)"
    regex: '^[\w\-.]{1,30}$'
  - envName: ADMIN_PASSWORD
    type: password
    required: true
    editable: false
    description: "Password must be at least 8 characters long"
    regex: '^[\w\-!@#^&*()+={}\[\]:,.?~]{8,}$'
