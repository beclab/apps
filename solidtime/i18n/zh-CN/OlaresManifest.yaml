metadata:
  title: solidtime
  description: solidtime是一款面向自由职业者与机构的现代开源时间跟踪应用程序。
spec:
  fullDescription: |
    solidtime是一款面向自由职业者与机构的现代开源时间跟踪应用程序。
  
    【核心功能】
    
    时间跟踪：通过现代化易用界面实时追踪时间
    项目管理：创建并管理项目，支持成员分配与协作
    任务体系：构建任务体系并关联至具体项目
    客户管理：维护客户数据库并绑定对应项目
    计费配置：支持为项目、成员、组织设置多层级计费费率
    多组织支持：单账户可创建及管理多个独立组织架构
    权限控制：基于角色的权限系统实现组织精细化管理
    数据迁移：支持从Toggl、Clockify及CSV格式导入历史时间数据