metadata:
  title: TREK
  description: 自托管的实时协作旅行规划工具。
spec:
  fullDescription: |
    TREK（原名Nomad） 是一款自托管的实时协作旅行规划工具，集成交互式地图、预算管理、行李清单等功能。

    功能亮点

    行程规划
    - 拖放式规划器：将地点组织到每日计划中，支持重新排序和跨日移动
    - 交互式地图：基于 Leaflet 的地图，支持照片标记、聚合显示、路线可视化和自定义瓦片源
    - 地点搜索：支持 Google Places（含照片、评分、营业时间）或 OpenStreetMap（免费，无需 API 密钥）搜索
    - 每日笔记：为每一天添加带时间戳和图标标签的笔记，支持拖放排序
    - 路线优化：自动优化地点顺序并导出到 Google 地图
    - 天气预报：通过 Open-Meteo 获取 16 天天气预报（无需 API 密钥），并提供历史气候平均值作为后备
    - 地图分类筛选：按类别筛选地点，仅在地图上显示匹配的标记

    旅行管理
    - 预订管理：追踪航班、住宿、餐厅的预订状态、确认号和附件
    - 预算追踪：按类别记录支出，支持饼图展示、按人/按日分摊、多币种
    - 行李清单：分类清单，支持用户分配、打包模板和进度追踪
    - 打包模板：在管理面板创建可复用的打包模板，包含分类和物品
    - 行李追踪：可选的重量追踪和行李分配功能
    - 文档管理：为行程、地点或预订附加文档、门票和 PDF（单文件最大 50 MB）
    - PDF 导出：将完整行程导出为 PDF，含封面、图片、笔记和品牌标识

    协作功能
    - 实时同步：通过 WebSocket 协同规划，更改即时同步到所有连接用户
    - 多用户：邀请成员协作共享行程，支持基于角色的访问控制
    - 邀请链接：创建一次性注册链接，可配置最大使用次数和过期时间
    - 单点登录（OIDC）：支持 Google、Apple、Authentik、Keycloak 或任何 OIDC 提供者登录
    - 双因素认证（MFA）：基于 TOTP 的双因素认证，支持二维码设置
    - 协作：与团队聊天、共享笔记、创建投票、追踪活动

    移动端与 PWA
    - 渐进式 Web 应用：从浏览器直接安装到 iOS 和 Android
    - 离线支持：Service Worker 通过 Workbox 缓存地图瓦片、API 数据、上传文件和静态资源
    - 触控优化：响应式设计，移动端专属布局和触控友好的控件

    扩展插件（模块化，管理员可切换）
    - Vacay：个人假期规划器，支持日历视图、100+ 国家公共假期和结转追踪
    - Atlas：交互式世界地图，展示到访国家、心愿清单、旅行统计和连续记录
    - Collab：群组聊天、共享笔记、创建投票
    - 仪表盘小组件：货币转换器和时区时钟，每用户可切换

