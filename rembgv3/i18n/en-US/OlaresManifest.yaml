metadata:
  title: Rembg
  description: Rembg is a tool to remove images background
spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    Rembg is a tool to remove image backgrounds.

    ONNX models are downloaded at install time from the Olares CDN bundle
    (`rembgv2_models_20251203.tar.zst`) via `downloader-init` and extracted into
    `/root/.u2net` before the rembg server starts. No Hugging Face token is required.
  upgradeDescription: |
    Migrated Rembg to the apiVersion v3 shared app pattern (rembgv2 → rembgv3).

    **What's Changed**

    - **Model download**: kept the CDN `downloader-init` tar.zst bundle unchanged;
      no Hugging Face / llm-init migration.
    - **Entrance routing**: nginx upstream backup sends traffic to the download
      dashboard until the rembg engine is healthy; `/gradio_api/info` pins to the engine.
    - **Architecture**: flattened the rembgv2 / rembgv2server sub-charts into a
      single chart; backends resolve within the release namespace (dropping the
      `*-shared` admin / non-admin split).
    - **Accelerator**: moved the GPU requirement into the accelerator modes list
      (nvidia only; amd64-only app).
    - **Scaling**: `workloadReplicas` declares the engine and nginx client workloads.
