metadata:
  title: Rembg
  description: Rembg 是一个用于去除图片背景的工具
spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，在 Olares 内部仅会部署一个服务。每个用户可以安装一个桌面入口进行访问或使用共享入口进行 API 调用。

    **概述**
    Rembg 是一个用于去除图片背景的工具。

    安装时通过 `downloader-init` 从 Olares CDN 下载模型包（`rembgv2_models_20251203.tar.zst`），解压到 `/root/.u2net` 后再启动 rembg 服务。
    无需配置 Hugging Face Token。
  upgradeDescription: |
    将 Rembg 迁移至 apiVersion v3 共享应用模式（rembgv2 → rembgv3）。

    **更新内容**

    - **模型下载**：保留 CDN `downloader-init` tar.zst 包，未迁移至 Hugging Face / llm-init。
    - **入口路由**：nginx upstream backup 在 rembg 引擎就绪前将流量导向下载页；`/gradio_api/info` 固定转发至引擎。
    - **架构**：合并 rembgv2 / rembgv2server 子 chart 为单一 chart；后端服务在 release 命名空间内解析（移除 `*-shared` 管理员/非管理员拆分）。
    - **加速器**：GPU 要求写入 accelerator modes（仅 nvidia；仅 amd64）。
    - **扩缩**：`workloadReplicas` 声明引擎与 nginx 客户端 workload。
