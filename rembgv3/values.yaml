# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   rembgv3       — rembg HTTP server Deployment (name: {{ .Release.Name }} == appid)
#   rembgv3client — nginx entrance Deployment
# The CDN download Job ({{ .Release.Name }}-download-models) carries no replica count.
workloads:
  rembgv3client:
    replicaCount: 1
  rembgv3:
    replicaCount: 1
models:
  - name: "rembgv2_models_20251203.tar.zst"
    output: "./downloads"
    md5: "775b230ae84727f28063391e27496158"
