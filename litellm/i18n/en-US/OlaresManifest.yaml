metadata:
  description: Call 100+ LLMs in OpenAI format
  title: LiteLLM
spec:
  fullDescription: |
    LiteLLM is a Python SDK and Proxy Server (AI Gateway) to call 100+ LLM APIs in OpenAI (or native) format, with cost tracking, guardrails, loadbalancing and logging.

    Features:
    - Unified API: Call 100+ LLM APIs (OpenAI, Anthropic, Azure, Bedrock, VertexAI, etc.) in OpenAI format
    - Cost Tracking: Track costs across all providers
    - Load Balancing: Distribute requests across multiple models/endpoints
    - Guardrails: Content filtering and safety checks
    - Logging & Observability: Comprehensive logging and monitoring
    - Rate Limiting: Built-in rate limiting and throttling
    - Proxy Server: Deploy as an AI Gateway/Proxy server
    - Multi-tenant: Support for multiple users and teams

  upgradeDescription: |
    Upgrade to [v1.83.3-stable](https://github.com/BerriAI/litellm/releases/tag/v1.83.3-stable) (from v1.81.4).

    Security:
    - Fix privilege escalation on /key/block, /key/unblock, /key/update max_budget
    - Global secret redaction via root logger and key-name-based pattern matching
    - Supply chain hardening: pin all Docker/npm/pip dependencies, cosign image signing

    Providers:
    - Anthropic: preserve thinking.summary when routing to OpenAI Responses API; add opt-out flag for default reasoning summary
    - Gemini: fix image token undercounting in usage metadata; pass model to context caching URL builder for custom api_base
    - Azure: auto-route gpt-5.4+ tools+reasoning to Responses API
    - Bedrock: support cache_control_injection_points for tool_config; respect api_base in count_tokens
    - OpenAI: round-trip Responses API reasoning_items in chat completions; GPT-5.4 mini/nano day-0 support

    Proxy & Core:
    - Project-level guardrails support
    - Redis cluster caching fix; Redis-backed cross-pod budget enforcement
    - Fix streaming guardrail race condition and post-call guardrail response capture
    - Per-model-group deployment affinity; per-model rate limits for teams
    - Auto-recover shared aiohttp session when closed

    UI:
    - Migrate components from Tremor to Ant Design
    - Team management modernization; team guardrails UI
    - Logs filter fix (empty filter no longer shows stale data); CSV export fix on Global Usage page
    - Paginated team search on usage page; key alias substring search
