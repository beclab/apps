metadata:
  description: 以 OpenAI 格式调用 100+ LLM API
  title: LiteLLM
spec:
  fullDescription: |
    LiteLLM 是一个 Python SDK 和代理服务器（AI 网关），用于以 OpenAI（或原生）格式调用 100+ LLM API，具有成本跟踪、防护、负载均衡和日志记录功能。

    主要功能：
    - 统一 API：以 OpenAI 格式调用 100+ LLM API（OpenAI、Anthropic、Azure、Bedrock、VertexAI 等）
    - 成本跟踪：跟踪所有提供商的成本
    - 负载均衡：在多个模型/端点之间分发请求
    - 防护：内容过滤和安全检查
    - 日志和可观测性：全面的日志记录和监控
    - 速率限制：内置速率限制和节流
    - 代理服务器：部署为 AI 网关/代理服务器
    - 多租户：支持多个用户和团队

  upgradeDescription: |
    升级至 [v1.83.3-stable](https://github.com/BerriAI/litellm/releases/tag/v1.83.3-stable)（从 v1.81.4）。

    安全：
    - 修复 /key/block、/key/unblock、/key/update max_budget 的权限提升漏洞
    - 通过根日志记录器和密钥名称模式匹配实现全局密钥脱敏
    - 供应链加固：锁定所有 Docker/npm/pip 依赖版本，Docker 镜像 cosign 签名

    提供商：
    - Anthropic：路由至 OpenAI Responses API 时保留 thinking.summary；支持关闭默认推理摘要
    - Gemini：修复图片 token 用量低估；自定义 api_base 时正确传递 model 到上下文缓存 URL
    - Azure：gpt-5.4+ 工具调用+推理自动路由至 Responses API
    - Bedrock：支持 tool_config 级别的 cache_control_injection_points；count_tokens 端点使用 api_base
    - OpenAI：chat completions 中往返透传 Responses API reasoning_items；GPT-5.4 mini/nano 首日支持

    代理与核心：
    - 项目级 Guardrails 支持
    - Redis 集群缓存修复；基于 Redis 的跨 Pod 预算控制
    - 修复流式 Guardrail 竞态条件及 post-call Guardrail 响应捕获
    - 按模型组部署亲和性；团队按模型速率限制
    - aiohttp 会话关闭后自动恢复

    界面：
    - 组件从 Tremor 迁移至 Ant Design
    - 团队管理现代化；团队 Guardrails 界面
    - 日志筛选修复（空筛选不再显示旧数据）；全局用量页 CSV 导出修复
    - 用量页团队分页搜索；密钥别名子串搜索
