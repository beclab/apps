---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: teable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teable
  strategy:
    type: Recreate  
  template:
    metadata:
      labels:
        app: teable
    spec:
      initContainers:
        - name: check-ready
          image: "docker.io/beclab/wait-for:0.1.0"
          args:
            - '-it'
            - >-
              teable-redis:6379
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      containers:
        - name: teable
          image: "docker.io/beclab/teableio-teable:3077582aef94c87199dade566f2459ef264f26bb"
          imagePullPolicy: IfNotPresent
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: DISPLAY
              value: ":0"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: teable
                  key: app-password
            - name: PRISMA_DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.teable }}?schema=public"
            - name: BACKEND_CACHE_REDIS_URI
              value: "redis://teable-redis:6379/0"
          envFrom:
            - configMapRef:
                name: teable-config
          resources:
            requests:
              cpu: 300m
              memory: 500Mi
            limits:
              cpu: 2000m
              memory: 3Gi
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - mountPath: /app/.assets
              name: teable-data
              subPath: teable
      volumes:
        - name: teable-data
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/teable'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/teable'
            {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: teable-db-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    app: teable
    component: db-migrate
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: teable-db-migrate
          image: "docker.io/beclab/teableio-teable-db-migrate:3077582aef94c87199dade566f2459ef264f26bb"
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: DISPLAY
              value: ":0"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: teable
                  key: app-password
            - name: PRISMA_DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.teable }}?schema=public"
          resources:
            requests:
              cpu: 300m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi
      restartPolicy: Never

---
apiVersion: v1
kind: Service
metadata:
  name: teable
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: teable
spec:
  ports:
    - name: "http"
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: teable
