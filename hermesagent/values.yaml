image:
  repository: ghcr.io/progress44/hermes-agent-olares
  tag: "1.1.0"
  pullPolicy: Always

olaresEnv: {}

service:
  dashboardPort: 9119
  gatewayPort: 18789

app:
  gatewayRestartDelaySeconds: 30

resources:
  workspace:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi
  dashboard:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  gateway:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

# These are supplied by Olares at deploy time. The defaults keep local
# helm lint/template runs deterministic.
userspace:
  appData: /var/olares/app-data
  userData: /var/olares/user-data

sharedlib: /var/olares/sharedlib
sysVersion: "1.12.3"
