olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  hermesagent: 1
  terminal: 1
metadata:
  name: hermesagent
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  description: The agent that grows with you
  appid: hermesagent
  title: Hermes Agent
  version: 1.3.23
  categories:
  - Productivity_v112
  - Developer Tools
entrances:
- name: terminal
  host: terminal
  port: 80
  title: Hermes CLI
  icon: https://app.cdn.olares.com/appstore/hermesagent/terminal.png
  openMethod: window
  authLevel: internal
- name: dashboard
  host: hermesdashboard
  port: 9119
  title: Dashboard
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  openMethod: window
  authLevel: internal
- name: api
  host: hermesgateway
  port: 8642
  title: Hermes Gateway API
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  invisible: true
  authLevel: internal
spec:
  versionName: '0.18.2'
  fullDescription: |
    **The self-improving AI agent built by [Nous Research](https://nousresearch.com).** It's the only agent with a built-in learning loop — it creates skills from experience, improves them during use, nudges itself to persist knowledge, searches its own past conversations, and builds a deepening model of who you are across sessions. Run it on a $5 VPS, a GPU cluster, or serverless infrastructure that costs nearly nothing when idle. It's not tied to your laptop — talk to it from Telegram while it works on a cloud VM.

    **Tips**
    Gateway Restart
    - Run `hermes gateway restart` from the Hermes CLI terminal (same container as the supervised gateway). Config changes are picked up after restart.

    Optional Python backends (Feishu, Honcho, Firecrawl, …)
    - On first use, Hermes installs packages into `/opt/data/lazy-packages` (persistent; requires PyPI access on first install).
    - Feishu/Lark gateway: configure credentials in `hermes setup` or `/opt/data/.env`, then `hermes gateway restart` — `lark-oapi` is installed automatically when the gateway connects.
    - Honcho memory: if `hermes memory setup honcho` fails with a pip/permission error, pre-install in the CLI first:
      `python3 -c "from tools.lazy_deps import ensure; ensure('memory.honcho', prompt=False)"` then re-run setup.

    npm / Node packages
    - `/opt/hermes` is read-only (immutable install tree); do not install there. npm's global prefix is preset to `/opt/data/npm-global` (persistent).
    - Install a CLI app: `npm install -g <app>` (bin is on PATH) or run once with `npx <app>`.
    - Install a library for a project: run `npm install <pkg>` from a writable dir such as `/opt/data` (your HOME).

    Storage
    - All Hermes state — config, API keys, sessions (SQLite + FTS5), skills, memories, cron, logs, checkpoints — lives in `/opt/data` (`HERMES_HOME`). No external database is required. The directory is persisted across pod restarts and upgrades by the host volume.

    First-time Setup
    - Open the `Hermes CLI` entrance and run `hermes setup` to launch the interactive wizard. It writes API keys, model providers, and channel tokens into `/opt/data`.

    **Key Features**
    - Real Terminal UI: a full React/Ink rewrite with multiline editing, slash-command autocomplete, sticky composer, live streaming, status bar with per-turn stopwatch and git branch, light-theme preset, and OSC-52 clipboard support.
    - Multi-channel Gateway with **20 platforms**: Telegram, Discord, Slack, WhatsApp, Signal, Email, Microsoft Teams, Google Chat, QQBot, Tencent 元宝, Matrix, Mattermost, Feishu, DingTalk, IRC, and more — all through one process. Voice memo transcription included; sessions auto-resume after gateway restart.
    - Closed learning loop: agent-curated memory, autonomous skill creation, FTS5 session search, Honcho dialectic user modeling. agentskills.io compatible. **Autonomous Curator** runs on a 7-day cycle to grade, consolidate, and prune your skill library.
    - Multi-agent **Kanban** board: durable, multi-profile collaboration with heartbeats, reclaim, zombie detection, retry budgets and a hallucination gate. Spin up an AI team that actually finishes what it starts.
    - **`/goal`** persistent cross-turn goals (Ralph loop) — the agent stays on task across turns.
    - **Checkpoints v2** with real pruning + disk guardrails, and per-session OpenAI-compatible API server with long-term memory via `X-Hermes-Session-Key`.
    - Scheduled automations via a built-in cron scheduler with a `no_agent` script-only watchdog mode.
    - Delegates and parallelizes work with isolated subagents and an explicit orchestrator role.
    - Built-in skills include ComfyUI v5, TouchDesigner-MCP, Spotify, Google Meet, SearXNG search, Shopify, video analysis (Gemini), and more.
    - Pluggable provider, transport, gateway-platform, and dashboard plugin systems — drop-in extensions without forking core.
    - Security hardened: secret redaction ON by default, MCP OAuth + auth.json TOCTOU windows closed, browser cloud-metadata SSRF floor, per-platform allowlists, `0600` perms on `.env` / `auth.json` / `state.db`.
    - Localized into 7 languages (中文 / 日本語 / Deutsch / Español / Français / Українська / Türkçe) plus a Chinese dashboard.

  upgradeDescription: |
    Upgrade to Hermes Agent v0.18.0 (1.3.23). Single supervised container; Dashboard auth is handled by Olares only.

    Change Details:
    - Image: `beclab/harveyff-hermes-agent:v2026.7.7.2-uid1000` (UID 1000 overlay only; opt-in Python deps use upstream lazy-install).
    - Architecture: gateway, dashboard, and CLI share one s6-supervised pod. Use `hermes gateway restart` (no `restart-gateway` sentinel or multi-container layout).
    - Dashboard: loopback `127.0.0.1:19119` + nginx sidecar on 9119; Host/Origin rewrite fixes "Invalid Host header". Olares `authLevel: internal` is the only login.
    - Removed: `HERMES_DASHBOARD_INSECURE`, `HERMES_DASHBOARD_BASIC_AUTH_*`, Chart init-time honcho pip overlays.
    - Optional backends (Feishu, Honcho, …): first use installs to `/opt/data/lazy-packages` (needs PyPI once). See app Tips if Honcho setup reports a pip error.
    - npm: global prefix preset to `/opt/data/npm-global` so `npm install -g` / `npx` work and persist (was EACCES against read-only `/opt/hermes`). See app Tips.
    - Terminal sidecar: `beclab/terminal:v0.0.13`; brew base `openclaw-brew-base:2026.7.6-cli`.

    After upgrade, open Dashboard via the Olares entrance. Existing `/opt/data` is preserved.

  developer: Nous Research
  website: https://hermes-agent.nousresearch.com
  sourceCode: https://github.com/NousResearch/hermes-agent
  submitter: progress44 & Olares
  locale:
  - en-US
  - zh-CN
  doc: https://hermes-agent.nousresearch.com/docs
  license:
  - text: MIT
    url: https://github.com/NousResearch/hermes-agent/blob/main/LICENSE
  requiredMemory: 5Gi
  limitedMemory: 22Gi
  requiredDisk: 5Gi
  limitedDisk: 20Gi
  requiredCpu: 4
  limitedCpu: 12
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
  - Home
  externalData: true
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
- envName: ALLOW_HOME_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow Hermes to access Home directory on Olares"
- envName: ALLOW_EXTERNAL_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow Hermes to access External directory on Olares"
- envName: API_SERVER_ENABLED
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Enable the OpenAI-compatible API server on port 8642 (for Hermes Workspace / Open WebUI integration). When true, API_SERVER_KEY must also be set."
- envName: HERMES_API_SERVER_KEY
  type: password
  required: false
  applyOnChange: true
  editable: true
  regex: '^[\w\-!@#$%^&*()+={}\[\]:,.?~]{8,}$'
  description: "Auth token for the OpenAI-compatible API server. Required when API_SERVER_ENABLED is true. Must be at least 8 characters and contain only letters, numbers, and common symbols. Pass the same value as HERMES_API_TOKEN on the client side."
