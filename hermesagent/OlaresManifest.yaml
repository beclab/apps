olaresManifest.version: "0.11.0"
olaresManifest.type: app
metadata:
  name: hermesagent
  description: Personal AI assistant with separate CLI workspace and Control UI on Olares.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: hermesagent
  title: Hermes Agent
  version: "1.1.0"
  categories:
    - AI
    - Utilities
    - Developer Tools
permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: "hermes-0.11.0-olares.1"
  fullDescription: |
    Hermes Agent provides a cloneable personal AI assistant on Olares with a
    dedicated CLI workspace and a separate Control UI.

    Entrances
    - `Hermes CLI`
      - Browser terminal attached to the persistent workspace container.
    - `Control UI`
      - Hermes dashboard and embedded TUI chat served behind a dedicated proxy.

    Runtime topology
    - Long-lived workspace container for terminal sessions
    - Dashboard sidecar for the web UI and `/api/pty`
    - Best-effort gateway sidecar for messaging, cron, and session runtime
    - Terminal helper deployment
    - Control UI proxy deployment

    Notes
    - This package is cloneable and intended for personal or per-workspace use.
    - It is not packaged as an Olares shared app.
    - The Control UI remains available even if the gateway sidecar is not yet configured.
    - The gateway sidecar may report `stopped` until messaging platforms are configured.
    - The OpenAI-compatible API server is disabled by default.
    - Provider API keys remain user-managed after install through Hermes config and `.env`.
  developer: Nous Research
  website: https://github.com/NousResearch/hermes-agent
  sourceCode: https://github.com/progress44/rpi-system
  submitter: progress44
  doc: https://hermes-agent.nousresearch.com/docs/
  license:
    - text: MIT
      url: https://github.com/NousResearch/hermes-agent/blob/main/LICENSE
  locale:
    - en-US
  requiredMemory: 2Gi
  limitedMemory: 8Gi
  requiredDisk: 2Gi
  limitedDisk: 10Gi
  requiredCpu: 1
  limitedCpu: 4
  supportArch:
    - amd64
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.2-0"
envs:
  - envName: ALLOW_HOME_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Allow Hermes to access the Olares Home directory"
  - envName: ALLOW_EXTERNAL_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Allow Hermes to access the shared external directory"
entrances:
  - name: terminal
    port: 80
    host: terminal
    title: Hermes CLI
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    authLevel: internal
    openMethod: window
  - name: hermesagent
    port: 8080
    host: hermesagentingress
    title: Control UI
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    authLevel: private
    openMethod: window
