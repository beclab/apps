---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermesagent-ingress-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      client_max_body_size 100m;

      location / {
          proxy_pass http://hermesagent:{{ .Values.service.dashboardPort }};
          proxy_http_version 1.1;

          proxy_set_header Host              $host;
          proxy_set_header X-Forwarded-Host  $http_host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;

          proxy_connect_timeout 600s;
          proxy_send_timeout    600s;
          proxy_read_timeout    3600s;

          proxy_buffering off;
          proxy_cache off;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: hermesagentingress
  name: hermesagentingress
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: hermesagentingress
  template:
    metadata:
      labels:
        io.kompose.service: hermesagentingress
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: hermesagent-ingress-nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: hermesagentingress
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: hermesagentingress
  ports:
    - name: hermesagentingress
      protocol: TCP
      port: 8080
      targetPort: 8080
