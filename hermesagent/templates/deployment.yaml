# Hermes Agent on Olares.
# 3 runtime containers (gateway / dashboard / hermesagent workspace) + init
# containers, all sharing /opt/data (hostPath app-data-home) as the single
# source of truth: SQLite, config.yaml, .env, SOUL.md, skills/, memories/, etc.
# No external DB. All containers run as hermes (uid/gid 10000) via pod-scope
# securityContext so `kubectl exec` from the terminal entrance also attaches
# as hermes (otherwise exec uses the image USER root and writes root-owned
# files the sidecars can't read).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: hermesagent
  name: "{{ .Release.Name }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: hermesagent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: hermesagent
        bytetrade.io/terminal: hermesagent
    spec:
      # Pod-scope hermes identity (10000) for all containers AND kubectl exec.
      # Without it, exec attaches as the image USER (root) and writes
      # root-owned files into /opt/data that the sidecars can't read.
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000

      initContainers:
        # Chown /opt/data to hermes (10000) before runtime starts. Runs as
        # root since the hostPath may be created root-owned on first install.
        - name: init-chmod-data
          image: "beclab/aboveos-busybox:1.37.0"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - "-c"
            - |
              mkdir -p /opt/data
              chown -R 10000:10000 /opt/data || true
              chmod -R u+rwX,g+rwX /opt/data || true
              echo "[init] /opt/data ready (owner=10000:10000)"
          resources: {}
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home

        # Materialize Linuxbrew base + stage olares-cli + python3 shim
        # onto the brew-volume hostPath. Idempotent on .brew-base-build.
        - name: init-install-brew
          image: "beclab/harveyff-openclaw-brew-base:2026.5.29-cli"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              if [ ! -d /brew-staging/.linuxbrew ]; then
                echo "[init-brew] FATAL: /brew-staging/.linuxbrew missing"
                exit 1
              fi
              mkdir -p /home/linuxbrew/.linuxbrew
              if cmp -s /brew-staging/.linuxbrew/.brew-base-build /home/linuxbrew/.linuxbrew/.brew-base-build 2>/dev/null; then
                echo "[init-brew] brew base up to date"
              else
                echo "[init-brew] materializing brew base..."
                cp -a /brew-staging/.linuxbrew/. /home/linuxbrew/.linuxbrew/
              fi

              # Stage olares-cli into brew bin.
              OLARES_CLI=""
              for p in /usr/local/bin/olares-cli /brew-staging/.linuxbrew/bin/olares-cli /opt/olares-cli/olares-cli /olares-cli; do
                [ -x "$p" ] && OLARES_CLI="$p" && break
              done
              [ -z "$OLARES_CLI" ] && OLARES_CLI="$(command -v olares-cli 2>/dev/null || find / -maxdepth 5 -type f -name olares-cli -perm -u+x 2>/dev/null | head -1)"
              if [ -n "$OLARES_CLI" ]; then
                install -m 0755 "$OLARES_CLI" /home/linuxbrew/.linuxbrew/bin/olares-cli
              else
                echo "[init-brew] WARN: olares-cli not found"
              fi

              # python3 shim -> hermes venv.
              printf '#!/bin/sh\nexec /opt/hermes/.venv/bin/python3 "$@"\n' > /cli-bin/python3
              chmod 0755 /cli-bin/python3

              # restart-gateway: touch sentinel + wait (cross-container restart).
              printf '#!/bin/sh\nset -eu\nS="${HERMES_GATEWAY_RESTART_SENTINEL:-/opt/data/.gateway-restart-requested}"\ntouch "$S"\necho "[restart-gateway] sentinel touched at $S, waiting ~6s for gateway to come back..."\nsleep 6\necho "[restart-gateway] done"\n' > /cli-bin/restart-gateway
              chmod 0755 /cli-bin/restart-gateway

              chown -R 10000:10000 /home/linuxbrew || true
              echo "[init-brew] done"
          resources: {}
          volumeMounts:
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /cli-bin
              name: cli-bin

        # Flatten the olares-* skills baked into the brew-base image
        # (/skills-staging) into $HERMES_HOME/skills. Per-dir refresh so hermes's
        # own bundled categories are never touched; skipped if the image has no
        # /skills-staging. Needs the skills-enabled brew-base tag.
        - name: init-skills
          image: "beclab/harveyff-openclaw-brew-base:2026.5.29-cli"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              if [ ! -d /skills-staging ]; then
                echo "[init-skills] /skills-staging not in image; skipping (rebuild brew-base with skills to enable)"
                exit 0
              fi
              mkdir -p /opt/data/skills
              chown 10000:10000 /opt/data/skills || true
              for d in /skills-staging/*/; do
                name="$(basename "$d")"
                rm -rf "/opt/data/skills/$name"
                cp -a "$d" "/opt/data/skills/$name"
                chown -R 10000:10000 "/opt/data/skills/$name"
              done
              echo "[init-skills] Olares skills flattened into /opt/data/skills:"
              ls -1 /skills-staging
          resources: {}
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home

      containers:
        # Gateway sidecar: messaging gateway + (optional) OpenAI-compat API.
        #
        # Wrapper loop: `hermes gateway run` exits clean when no platform
        # tokens are configured; without the loop PID 1 exits and the pod
        # crash-loops. The loop auto-restarts every 30s so `hermes setup` /
        # .env edits get picked up. The image entrypoint (tini + bootstrap)
        # still runs first each start.
        #
        # Sentinel restart: `hermes gateway restart` from the TUI can't reach
        # this container (PID namespaces are container-local), so the wrapper
        # polls /opt/data/.gateway-restart-requested. `touch` it from any
        # container on /opt/data to restart the gateway (short delay), also
        # honored during the post-crash backoff.
        #
        # No TCP port is bound by default (API server is opt-in), so the
        # probes test the data dir on disk instead of a port.
        - name: gateway
          image: "beclab/nousresearch-hermes-agent:v2026.5.16"
          imagePullPolicy: IfNotPresent
          args:
            - "/bin/bash"
            - "-c"
            - |
              set -u
              RETRY_DELAY="${HERMES_GATEWAY_RESTART_DELAY_SECONDS:-30}"
              SENTINEL="${HERMES_GATEWAY_RESTART_SENTINEL:-/opt/data/.gateway-restart-requested}"
              POLL="${HERMES_GATEWAY_SENTINEL_POLL_SECONDS:-2}"
              SENTINEL_DELAY="${HERMES_GATEWAY_SENTINEL_RESTART_DELAY_SECONDS:-3}"
              FLAG="/tmp/.gateway-wrapper-sentinel-fired"

              # Trap SIGTERM so pod delete tears down inner gateway + watcher
              # promptly instead of waiting on the outer sleep.
              cleanup() {
                echo "[gateway-wrapper] SIGTERM received, exiting"
                [ -n "${stub:-}"    ] && kill -TERM "$stub"    2>/dev/null || true
                [ -n "${watcher:-}" ] && kill -TERM "$watcher" 2>/dev/null || true
                [ -n "${child:-}"   ] && kill -TERM "$child"   2>/dev/null || true
                exit 0
              }
              trap cleanup TERM

              # Clear any stale sentinel/flag left over from a crashed wrapper
              rm -f "$SENTINEL" "$FLAG" 2>/dev/null || true

              # When the API server is disabled, bind :8642 with a stub that
              # serves /health + /health/detailed from gateway_state.json (so
              # the dashboard's GATEWAY_HEALTH_URL probe can detect liveness
              # cross-container) and returns 503 for everything else.
              if [ "${API_SERVER_ENABLED:-false}" != "true" ]; then
                echo "[gateway-wrapper] API server disabled, starting health-relay stub on :8642"
                python3 -c '
              import http.server, json, os
              STATE_PATH = os.environ.get("HERMES_HOME", "/opt/data") + "/gateway_state.json"
              DISABLED = {"error": "Core API services are currently disabled. Please enable them by setting API_SERVER_ENABLED=true."}
              DISABLED_BODY = json.dumps(DISABLED).encode()
              def read_state():
                try:
                  with open(STATE_PATH, "r") as f:
                    return json.load(f)
                except Exception:
                  return {}
              class H(http.server.BaseHTTPRequestHandler):
                def _send(self, code, body):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
                def do_GET(self):
                  path = self.path.split("?",1)[0].rstrip("/") or "/"
                  if path == "/health":
                    self._send(200, json.dumps({"status":"ok","platform":"hermes-agent"}).encode())
                  elif path == "/health/detailed":
                    rt = read_state()
                    payload = {
                      "status": "ok",
                      "platform": "hermes-agent",
                      "gateway_state": rt.get("gateway_state"),
                      "platforms": rt.get("platforms", {}),
                      "active_agents": rt.get("active_agents", 0),
                      "exit_reason": rt.get("exit_reason"),
                      "updated_at": rt.get("updated_at"),
                      "pid": rt.get("pid"),
                    }
                    self._send(200, json.dumps(payload).encode())
                  else:
                    self._send(503, DISABLED_BODY)
                do_POST = do_PUT = do_DELETE = do_PATCH = lambda s: s._send(503, DISABLED_BODY)
                def log_message(self, *a): pass
              http.server.HTTPServer(("0.0.0.0", 8642), H).serve_forever()
              ' &
                stub=$!
              fi

              while :; do
                echo "[gateway-wrapper] starting hermes gateway run (HERMES_HOME=${HERMES_HOME})"
                hermes gateway run &
                child=$!

                # Watcher: polls the sentinel; on touch kills the child and
                # records why (so the main loop picks the short delay).
                (
                  while kill -0 "$child" 2>/dev/null; do
                    if [ -f "$SENTINEL" ]; then
                      echo "[gateway-wrapper] restart requested via $SENTINEL"
                      rm -f "$SENTINEL" 2>/dev/null
                      : > "$FLAG"
                      kill -TERM "$child" 2>/dev/null
                      break
                    fi
                    sleep "$POLL"
                  done
                ) &
                watcher=$!

                wait "$child"
                rc=$?

                # Reap the watcher whether it triggered or self-exited
                kill "$watcher" 2>/dev/null || true
                wait "$watcher" 2>/dev/null || true

                if [ -f "$FLAG" ]; then
                  rm -f "$FLAG"
                  delay="$SENTINEL_DELAY"
                  reason="restart requested via sentinel"
                else
                  delay="$RETRY_DELAY"
                  reason="natural exit (code=${rc})"
                fi
                echo "[gateway-wrapper] gateway ${reason}; sleeping ${delay}s before restart"

                # Sleep, but let the sentinel short-circuit the backoff.
                end_ts=$(( $(date +%s) + delay ))
                while [ "$(date +%s)" -lt "$end_ts" ]; do
                  if [ -f "$SENTINEL" ]; then
                    echo "[gateway-wrapper] sentinel observed during backoff, restarting immediately"
                    rm -f "$SENTINEL" 2>/dev/null
                    break
                  fi
                  sleep 1
                done
              done
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
          env:
            # HOME on /opt/data so HOME-respecting CLIs persist + share config.
            - name: HOME
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_GATEWAY_RESTART_DELAY_SECONDS
              value: "30"
            - name: HERMES_GATEWAY_RESTART_SENTINEL
              value: "/opt/data/.gateway-restart-requested"
            - name: HERMES_GATEWAY_SENTINEL_POLL_SECONDS
              value: "2"
            - name: HERMES_GATEWAY_SENTINEL_RESTART_DELAY_SECONDS
              value: "3"
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            # olares-cli config/data — absolute (hermes rewrites HOME for
            # tool subprocesses, so HOME alone isn't enough).
            - name: OLARES_CLI_HOME
              value: /opt/data/.olares-cli
            - name: OLARES_CLI_DATA_DIR
              value: /opt/data/.olares-cli/data
            # API server: binds 0.0.0.0:8642 only when enabled AND key set
            # (fail-closed — no key means no unauthenticated bind).
            {{- $oe := .Values.olaresEnv | default dict }}
            {{- $apiEnabled := eq (toString (index $oe "API_SERVER_ENABLED")) "true" }}
            {{- $apiKey := index $oe "HERMES_API_SERVER_KEY" | default "" }}
            {{- if and $apiEnabled $apiKey }}
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: {{ $apiKey | quote }}
            {{- end }}
          startupProbe:
            exec:
              command: ["/bin/sh", "-c", "test -d /opt/data"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -d /opt/data"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            limits:
              cpu: "3"
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /usr/local/bin/python3
              name: cli-bin
              subPath: python3
              readOnly: true
            - mountPath: /usr/local/bin/restart-gateway
              name: cli-bin
              subPath: restart-gateway
              readOnly: true
            - mountPath: /dev/shm
              name: dshm
            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false

        # Dashboard sidecar: web UI on 9119, reads gateway health on localhost.
        # Flags: --host 0.0.0.0 (reachable via pod IP), --insecure (allow
        # non-localhost bind; safe behind Olares SSO ingress), --no-open
        # (no browser in container), --tui (in-browser Chat tab).
        - name: dashboard
          image: "beclab/nousresearch-hermes-agent:v2026.5.16"
          imagePullPolicy: IfNotPresent
          args:
            - "dashboard"
            - "--host"
            - "0.0.0.0"
            - "--insecure"
            - "--no-open"
            - "--tui"
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HOME
              value: /opt/data
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
            # Match gateway PATH so dashboard-side `hermes ...` sees brew.
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: OLARES_CLI_HOME
              value: /opt/data/.olares-cli
            - name: OLARES_CLI_DATA_DIR
              value: /opt/data/.olares-cli/data
          startupProbe:
            tcpSocket:
              port: 9119
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 9119
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            limits:
              cpu: "500m"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /usr/local/bin/python3
              name: cli-bin
              subPath: python3
              readOnly: true
            - mountPath: /usr/local/bin/restart-gateway
              name: cli-bin
              subPath: restart-gateway
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false

        # Workspace container for the TUI: `sleep infinity` so the terminal
        # entrance can `kubectl exec` in and run `hermes setup` / `hermes`.
        # `args` (not `command`) lets the image entrypoint bootstrap /opt/data
        # first, then exec into sleep. HERMES_HOME + PATH match the sidecars.
        - name: hermesagent
          image: "beclab/nousresearch-hermes-agent:v2026.5.16"
          imagePullPolicy: IfNotPresent
          args: ["sleep", "infinity"]
          env:
            - name: TERM
              value: xterm-256color
            - name: HOME
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: OLARES_CLI_HOME
              value: /opt/data/.olares-cli
            - name: OLARES_CLI_DATA_DIR
              value: /opt/data/.olares-cli/data
          resources:
            limits:
              cpu: "1"
              memory: 3Gi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /usr/local/bin/python3
              name: cli-bin
              subPath: python3
              readOnly: true
            - mountPath: /usr/local/bin/restart-gateway
              name: cli-bin
              subPath: restart-gateway
              readOnly: true
            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
      volumes:
        - name: app-data-home
          hostPath:
            path: "{{ .Values.userspace.appData }}/home"
            type: DirectoryOrCreate
        - name: brew-volume
          hostPath:
            path: "{{ .Values.userspace.appData }}/brew"
            type: DirectoryOrCreate
        - name: cli-bin
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
        - name: olares-home-dir
          hostPath:
            path: "{{ .Values.userspace.userData }}"
            type: DirectoryOrCreate
        {{- end }}
        {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
        - name: olares-external-dir
          hostPath:
            path: "{{ .Values.sharedlib }}"
            type: DirectoryOrCreate
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: hermesagent
  name: hermesdashboard
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "9119"
      port: 9119
      targetPort: 9119
  selector:
    io.kompose.service: hermesagent
---
# Gateway OpenAI-compatible API service. The gateway only binds when the API
# key is set, but the Service is always created so the `api` entrance has a
# stable DNS target.
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: hermesagent
  name: hermesgateway
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "8642"
      port: 8642
      targetPort: 8642
  selector:
    io.kompose.service: hermesagent
