# 3 runtime containers (gateway / dashboard / workspace) + init containers
# share /opt/data (hostPath). The s6-overlay v3 image MUST start as root (s6
# chowns /run + /opt/data, then s6-setuidgid-drops to hermes); pinning
# runAsUser breaks that drop, so we start root and let s6 drop to hermes.
# The custom image bakes hermes at UID/GID 1000 (= Olares user-data owner),
# so no HERMES_UID/GID override is needed: stage2's build-tree chown is a
# no-op (no overlayfs copy-up on boot) and the runtime identity (1000) can
# write the Olares user-data mounts.
{{- $hermesImage := "beclab/harveyff-hermes-agent:v2026.6.19-uid1000" -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: hermesagent
  name: "{{ .Release.Name }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: hermesagent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: hermesagent
        bytetrade.io/terminal: hermesagent
    spec:
      # Do NOT set runAsUser (breaks s6's drop); fsGroup keeps volumes at gid 1000.
      securityContext:
        fsGroup: 1000

      initContainers:
        # Chown /opt/data to 1000 before runtime (hostPath may start root-owned).
        - name: init-chmod-data
          image: "beclab/aboveos-busybox:1.37.0"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - "-c"
            - |
              mkdir -p /opt/data/.olares-cli/data
              chown -R 1000:1000 /opt/data || true
              chmod -R u+rwX,g+rwX /opt/data || true
              # Hook interactive shells into drop-to-hermes (kubectl exec is root).
              MARKER="# hermesagent: drop-to-hermes"
              for rc in /opt/data/.bashrc /opt/data/.profile; do
                if [ ! -f "$rc" ] || ! grep -qF "$MARKER" "$rc" 2>/dev/null; then
                  {
                    echo ""
                    echo "$MARKER"
                    echo '[ -f /etc/profile.d/99-drop-to-hermes.sh ] && . /etc/profile.d/99-drop-to-hermes.sh'
                  } >> "$rc"
                fi
              done
              # Keep brew + hermes on PATH after bash -l resets profile (hermes uid shells).
              PATH_MARKER="# hermesagent: brew-path"
              for rc in /opt/data/.bashrc /opt/data/.profile; do
                if ! grep -qF "$PATH_MARKER" "$rc" 2>/dev/null; then
                  {
                    echo ""
                    echo "$PATH_MARKER"
                    echo 'export HOMEBREW_PREFIX="${HOMEBREW_PREFIX:-/home/linuxbrew/.linuxbrew}"'
                    echo 'export HOMEBREW_NO_AUTO_UPDATE="${HOMEBREW_NO_AUTO_UPDATE:-1}"'
                    echo 'export PATH="/opt/hermes/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"'
                  } >> "$rc"
                fi
              done
              chown 1000:1000 /opt/data/.bashrc /opt/data/.profile 2>/dev/null || true
              echo "[init] /opt/data ready (owner=1000:1000, .olares-cli seeded)"
          resources: {}
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home

        # Materialize Linuxbrew + olares-cli + CLI shims onto the brew-volume.
        - name: init-install-brew
          image: "beclab/harveyff-openclaw-brew-base:2026.5.29-cli"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -uo pipefail
              if [ ! -d /brew-staging/.linuxbrew ]; then
                echo "[init-brew] FATAL: /brew-staging/.linuxbrew missing"
                exit 1
              fi
              mkdir -p /home/linuxbrew/.linuxbrew
              if cmp -s /brew-staging/.linuxbrew/.brew-base-build /home/linuxbrew/.linuxbrew/.brew-base-build 2>/dev/null; then
                echo "[init-brew] brew base up to date"
              else
                echo "[init-brew] materializing brew base..."
                cp -a /brew-staging/.linuxbrew/. /home/linuxbrew/.linuxbrew/
              fi

              # olares-cli ships in the brew base and arrives via the cp above.

              # python3 shim -> hermes venv.
              printf '#!/bin/sh\nexec /opt/hermes/.venv/bin/python3 "$@"\n' > /cli-bin/python3
              chmod 0755 /cli-bin/python3

              # restart-gateway: touch sentinel + wait (cross-container restart).
              printf '#!/bin/sh\nset -eu\nS="${HERMES_GATEWAY_RESTART_SENTINEL:-/opt/data/.gateway-restart-requested}"\ntouch "$S"\necho "[restart-gateway] sentinel touched at $S, waiting ~6s for gateway to come back..."\nsleep 6\necho "[restart-gateway] done"\n' > /cli-bin/restart-gateway
              chmod 0755 /cli-bin/restart-gateway

              # Neutralize 02-reconcile-profiles: its per-profile s6 logger
              # deadlocks on the shared /opt/data log lock across containers.
              printf '#!/bin/sh\nexit 0\n' > /cli-bin/02-reconcile-profiles
              chmod 0755 /cli-bin/02-reconcile-profiles
              # drop-to-hermes: interactive root kubectl exec re-execs as hermes (1000).
              printf '%s\n' \
                '#!/bin/sh' \
                '# Olares: drop interactive root shells to hermes (UID 1000).' \
                '[ "${_HERMES_DROP_TO_HERMES:-}" = 1 ] && return 0' \
                '[ "$(id -u)" != 0 ] && return 0' \
                'case "$-" in *i*) ;; *) [ -z "${PS1:-}" ] && return 0 ;; esac' \
                'S6_SUID=/command/s6-setuidgid' \
                '[ -x "$S6_SUID" ] || return 0' \
                'export _HERMES_DROP_TO_HERMES=1' \
                'export HOME=/opt/data' \
                'export OLARES_CLI_HOME="${OLARES_CLI_HOME:-/opt/data/.olares-cli}"' \
                'export OLARES_CLI_DATA_DIR="${OLARES_CLI_DATA_DIR:-/opt/data/.olares-cli/data}"' \
                'export HOMEBREW_PREFIX="${HOMEBREW_PREFIX:-/home/linuxbrew/.linuxbrew}"' \
                'export HOMEBREW_NO_AUTO_UPDATE="${HOMEBREW_NO_AUTO_UPDATE:-1}"' \
                'export PATH="/opt/hermes/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"' \
                'DROP_SHELL=/bin/bash' \
                '[ -x "$DROP_SHELL" ] || DROP_SHELL=/bin/sh' \
                'exec "$S6_SUID" hermes "$DROP_SHELL" -l' \
                > /cli-bin/drop-to-hermes
              chmod 0755 /cli-bin/drop-to-hermes

              chown -R 1000:1000 /home/linuxbrew || true
              echo "[init-brew] done"
          resources: {}
          volumeMounts:
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /cli-bin
              name: cli-bin

        # Flatten olares-* skills from the brew-base image (/skills-staging) into
        # /opt/data/skills (per-dir refresh; skipped if /skills-staging absent).
        - name: init-skills
          image: "beclab/harveyff-openclaw-brew-base:2026.5.29-cli"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              if [ ! -d /skills-staging ]; then
                echo "[init-skills] /skills-staging not in image; skipping (rebuild brew-base with skills to enable)"
                exit 0
              fi
              mkdir -p /opt/data/skills
              chown 1000:1000 /opt/data/skills || true
              for d in /skills-staging/*/; do
                name="$(basename "$d")"
                rm -rf "/opt/data/skills/$name"
                cp -a "$d" "/opt/data/skills/$name"
                chown -R 1000:1000 "/opt/data/skills/$name"
              done
              echo "[init-skills] Olares skills flattened into /opt/data/skills:"
              ls -1 /skills-staging
          resources: {}
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home

      containers:
        # Gateway sidecar. Wrapper loop auto-restarts `hermes gateway run` and
        # polls a sentinel so a TUI `gateway restart` elsewhere triggers a restart.
        - name: gateway
          image: "{{ $hermesImage }}"
          imagePullPolicy: IfNotPresent
          args:
            - "/bin/bash"
            - "-c"
            - |
              set -u
              RETRY_DELAY="${HERMES_GATEWAY_RESTART_DELAY_SECONDS:-30}"
              SENTINEL="${HERMES_GATEWAY_RESTART_SENTINEL:-/opt/data/.gateway-restart-requested}"
              POLL="${HERMES_GATEWAY_SENTINEL_POLL_SECONDS:-2}"
              SENTINEL_DELAY="${HERMES_GATEWAY_SENTINEL_RESTART_DELAY_SECONDS:-3}"
              FLAG="/tmp/.gateway-wrapper-sentinel-fired"

              # Trap SIGTERM so pod delete tears down children promptly.
              cleanup() {
                echo "[gateway-wrapper] SIGTERM received, exiting"
                [ -n "${stub:-}"    ] && kill -TERM "$stub"    2>/dev/null || true
                [ -n "${watcher:-}" ] && kill -TERM "$watcher" 2>/dev/null || true
                [ -n "${child:-}"   ] && kill -TERM "$child"   2>/dev/null || true
                exit 0
              }
              trap cleanup TERM

              # Clear any stale sentinel/flag left over from a crashed wrapper
              rm -f "$SENTINEL" "$FLAG" 2>/dev/null || true

              # API server disabled: bind :8642 with a stub serving /health[/detailed]
              # from gateway_state.json (for the dashboard probe), 503 otherwise.
              if [ "${API_SERVER_ENABLED:-false}" != "true" ]; then
                echo "[gateway-wrapper] API server disabled, starting health-relay stub on :8642"
                python3 -c '
              import http.server, json, os
              STATE_PATH = os.environ.get("HERMES_HOME", "/opt/data") + "/gateway_state.json"
              DISABLED = {"error": "Core API services are currently disabled. Please enable them by setting API_SERVER_ENABLED=true."}
              DISABLED_BODY = json.dumps(DISABLED).encode()
              def read_state():
                try:
                  with open(STATE_PATH, "r") as f:
                    return json.load(f)
                except Exception:
                  return {}
              class H(http.server.BaseHTTPRequestHandler):
                def _send(self, code, body):
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
                def do_GET(self):
                  path = self.path.split("?",1)[0].rstrip("/") or "/"
                  if path == "/health":
                    self._send(200, json.dumps({"status":"ok","platform":"hermes-agent"}).encode())
                  elif path == "/health/detailed":
                    rt = read_state()
                    payload = {
                      "status": "ok",
                      "platform": "hermes-agent",
                      "gateway_state": rt.get("gateway_state"),
                      "platforms": rt.get("platforms", {}),
                      "active_agents": rt.get("active_agents", 0),
                      "exit_reason": rt.get("exit_reason"),
                      "updated_at": rt.get("updated_at"),
                      "pid": rt.get("pid"),
                    }
                    self._send(200, json.dumps(payload).encode())
                  else:
                    self._send(503, DISABLED_BODY)
                do_POST = do_PUT = do_DELETE = do_PATCH = lambda s: s._send(503, DISABLED_BODY)
                def log_message(self, *a): pass
              http.server.HTTPServer(("0.0.0.0", 8642), H).serve_forever()
              ' &
                stub=$!
              fi

              while :; do
                echo "[gateway-wrapper] starting hermes gateway run (HERMES_HOME=${HERMES_HOME})"
                hermes gateway run &
                child=$!

                # Watcher: on sentinel touch, kill the child + flag the reason.
                (
                  while kill -0 "$child" 2>/dev/null; do
                    if [ -f "$SENTINEL" ]; then
                      echo "[gateway-wrapper] restart requested via $SENTINEL"
                      rm -f "$SENTINEL" 2>/dev/null
                      : > "$FLAG"
                      kill -TERM "$child" 2>/dev/null
                      break
                    fi
                    sleep "$POLL"
                  done
                ) &
                watcher=$!

                wait "$child"
                rc=$?

                # Reap the watcher whether it triggered or self-exited
                kill "$watcher" 2>/dev/null || true
                wait "$watcher" 2>/dev/null || true

                if [ -f "$FLAG" ]; then
                  rm -f "$FLAG"
                  delay="$SENTINEL_DELAY"
                  reason="restart requested via sentinel"
                else
                  delay="$RETRY_DELAY"
                  reason="natural exit (code=${rc})"
                fi
                echo "[gateway-wrapper] gateway ${reason}; sleeping ${delay}s before restart"

                # Sleep, but let the sentinel short-circuit the backoff.
                end_ts=$(( $(date +%s) + delay ))
                while [ "$(date +%s)" -lt "$end_ts" ]; do
                  if [ -f "$SENTINEL" ]; then
                    echo "[gateway-wrapper] sentinel observed during backoff, restarting immediately"
                    rm -f "$SENTINEL" 2>/dev/null
                    break
                  fi
                  sleep 1
                done
              done
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
          env:
            - name: HOME
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_GATEWAY_RESTART_DELAY_SECONDS
              value: "30"
            - name: HERMES_GATEWAY_RESTART_SENTINEL
              value: "/opt/data/.gateway-restart-requested"
            - name: HERMES_GATEWAY_SENTINEL_POLL_SECONDS
              value: "2"
            - name: HERMES_GATEWAY_SENTINEL_RESTART_DELAY_SECONDS
              value: "3"
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/opt/hermes/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: OLARES_CLI_HOME
              value: /opt/data/.olares-cli
            - name: OLARES_CLI_DATA_DIR
              value: /opt/data/.olares-cli/data
            # API server binds 0.0.0.0:8642 only when enabled AND a key is set.
            {{- $oe := .Values.olaresEnv | default dict }}
            {{- $apiEnabled := eq (toString (index $oe "API_SERVER_ENABLED")) "true" }}
            {{- $apiKey := index $oe "HERMES_API_SERVER_KEY" | default "" }}
            {{- if and $apiEnabled $apiKey }}
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: {{ $apiKey | quote }}
            {{- end }}
          startupProbe:
            exec:
              command: ["/bin/sh", "-c", "test -d /opt/data"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -d /opt/data"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            limits:
              cpu: "4"
              memory: 12Gi
            requests:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /usr/local/bin/python3
              name: cli-bin
              subPath: python3
              readOnly: true
            - mountPath: /usr/local/bin/restart-gateway
              name: cli-bin
              subPath: restart-gateway
              readOnly: true
            - mountPath: /etc/cont-init.d/02-reconcile-profiles
              name: cli-bin
              subPath: 02-reconcile-profiles
              readOnly: true
            - mountPath: /dev/shm
              name: dshm
            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
          # Hardening (gateway only for now; validate before extending). Caps are
          # the minimal set s6's root stage needs to chown + s6-setuidgid-drop.
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "FSETID", "SETUID", "SETGID", "KILL"]

        # Dashboard sidecar: web UI on 9119. --insecure binds non-localhost
        # behind the Olares SSO ingress.
        - name: dashboard
          image: "{{ $hermesImage }}"
          imagePullPolicy: IfNotPresent
          args:
            - "dashboard"
            - "--host"
            - "0.0.0.0"
            - "--insecure"
            - "--no-open"
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: HOME
              value: /opt/data
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/opt/hermes/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: OLARES_CLI_HOME
              value: /opt/data/.olares-cli
            - name: OLARES_CLI_DATA_DIR
              value: /opt/data/.olares-cli/data
          startupProbe:
            tcpSocket:
              port: 9119
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 9119
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            limits:
              cpu: "2"
              memory: 3Gi
            requests:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /usr/local/bin/python3
              name: cli-bin
              subPath: python3
              readOnly: true
            - mountPath: /usr/local/bin/restart-gateway
              name: cli-bin
              subPath: restart-gateway
              readOnly: true
            - mountPath: /etc/cont-init.d/02-reconcile-profiles
              name: cli-bin
              subPath: 02-reconcile-profiles
              readOnly: true
            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false

        # Workspace for the TUI: `sleep infinity` so the terminal can exec in
        # and run `hermes setup` / `hermes`.
        - name: hermesagent
          image: "{{ $hermesImage }}"
          imagePullPolicy: IfNotPresent
          args: ["sleep", "infinity"]
          env:
            - name: TERM
              value: xterm-256color
            - name: HOME
              value: /opt/data
            - name: HERMES_HOME
              value: /opt/data
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/opt/hermes/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: OLARES_CLI_HOME
              value: /opt/data/.olares-cli
            - name: OLARES_CLI_DATA_DIR
              value: /opt/data/.olares-cli/data
            # dash reads $ENV before interactive input (kubectl exec sh).
            - name: ENV
              value: /etc/profile.d/99-drop-to-hermes.sh
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            - mountPath: /home/linuxbrew
              name: brew-volume
            - mountPath: /usr/local/bin/python3
              name: cli-bin
              subPath: python3
              readOnly: true
            - mountPath: /usr/local/bin/restart-gateway
              name: cli-bin
              subPath: restart-gateway
              readOnly: true
            - mountPath: /etc/cont-init.d/02-reconcile-profiles
              name: cli-bin
              subPath: 02-reconcile-profiles
              readOnly: true
            - mountPath: /etc/profile.d/99-drop-to-hermes.sh
              name: cli-bin
              subPath: drop-to-hermes
              readOnly: true
            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
      volumes:
        - name: app-data-home
          hostPath:
            path: "{{ .Values.userspace.appData }}/home"
            type: DirectoryOrCreate
        - name: brew-volume
          hostPath:
            path: "{{ .Values.userspace.appData }}/brew"
            type: DirectoryOrCreate
        - name: cli-bin
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
        - name: olares-home-dir
          hostPath:
            path: "{{ .Values.userspace.userData }}"
            type: DirectoryOrCreate
        {{- end }}
        {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
        - name: olares-external-dir
          hostPath:
            path: "{{ .Values.sharedlib }}"
            type: DirectoryOrCreate
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: hermesagent
  name: hermesdashboard
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "9119"
      port: 9119
      targetPort: 9119
  selector:
    io.kompose.service: hermesagent
---
# Gateway OpenAI-compatible API service (stable DNS; binds only when API key set).
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: hermesagent
  name: hermesgateway
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "8642"
      port: 8642
      targetPort: 8642
  selector:
    io.kompose.service: hermesagent
