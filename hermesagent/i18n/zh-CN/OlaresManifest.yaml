metadata:
  title: Hermes Agent
  description: 与您一起成长的 AI Agent
spec:
  fullDescription: |
    **Nous Research 打造的自我进化型 AI Agent。** 它是唯一一个内置学习闭环的 Agent：从经验中生成技能、在使用中自我改进、可检索自己过往的对话，并在多次会话中不断加深对你的理解。在 $5 VPS、GPU 集群或无服务器基础设施上运行，成本几乎为零。它不绑定到您的笔记本电脑 — 从 Telegram 与它交谈，它在云 VM 上工作。

    使用任何您想要的模型 — [Nous Portal](https://portal.nousresearch.com)、[OpenRouter](https://openrouter.ai)（200+ 模型）、[NVIDIA NIM](https://build.nvidia.com)（Nemotron）、[Xiaomi MiMo](https://platform.xiaomimimo.com)、[z.ai/GLM](https://z.ai)、[Kimi/Moonshot](https://platform.moonshot.ai)、[MiniMax](https://www.minimax.io)、[Hugging Face](https://huggingface.co)、AWS Bedrock、Azure AI Foundry、LM Studio、GMI Cloud、OpenAI（含通过 Codex OAuth 的 GPT-5.5），或您自己的推理端点。切换只需 `hermes model` — 无需代码更改，无锁定。

    **核心功能**
    - 全新 React/Ink 终端 UI：多行编辑、斜杠命令补全、固定输入框、流式输出、状态栏带逐回合计时器与 git 分支、亮色主题、OSC-52 剪贴板。
    - 多通道消息网关，**已支持 20 个平台**：Telegram、Discord、Slack、WhatsApp、Signal、Email、Microsoft Teams、Google Chat、QQBot、腾讯元宝、Matrix、Mattermost、飞书、钉钉、IRC 等，单进程接入；内置语音备忘录转写；网关重启后会话自动恢复。
    - 学习闭环：Agent 自治记忆与技能生成、FTS5 会话搜索、Honcho 辩证式用户建模，兼容 agentskills.io 开放标准；内置 **自治 Curator** 后台 Agent 默认按 7 天周期为技能库打分、合并与清理。
    - **多 Agent Kanban 协作板**：可持久化、多 Profile 协同，内置心跳、重新认领、僵尸检测、重试预算与幻觉拦截，让 AI 团队真正把任务做完。
    - **`/goal`** 跨回合持续目标（Ralph loop）— Agent 不会忘记你交代的事。
    - **Checkpoints v2**：真正的剪枝 + 磁盘保护；可选启用按 Session 长期记忆的 OpenAI 兼容 API Server（`X-Hermes-Session-Key`）。
    - 定时任务：内置 cron 调度器，结果可下发到任意消息平台；新增 `no_agent` 仅运行脚本的看门狗模式。
    - 子 Agent 与并行：派生隔离子 Agent 并行工作；明确的 orchestrator 角色。
    - 内置技能：ComfyUI v5、TouchDesigner-MCP、Spotify、Google Meet、SearXNG 搜索、Shopify、视频理解（Gemini）等。
    - Provider / 传输层 / 网关平台 / Dashboard 全面插件化，无需 fork 即可扩展。
    - 安全加固：默认开启敏感信息脱敏；关闭 MCP OAuth 与 auth.json 的 TOCTOU 时间窗；浏览器工具云元数据 SSRF 防护；各平台精细化白名单；`.env` / `auth.json` / `state.db` 强制 `0600`。
    - 已本地化为 7 种语言（中文 / 日本語 / Deutsch / Español / Français / Українська / Türkçe），Dashboard 已支持中文。

    **使用提示**
    存储
    - 所有Hermes状态——配置、API密钥、会话（SQLite + FTS5）、技能、记忆、定时任务、日志、检查点——均存储于`/opt/data`（`HERMES_HOME`）。无需外部数据库。该目录通过主机卷在Pod重启和升级时持久化保留。

    首次设置
    - 打开`Hermes CLI`入口并运行`hermes setup`以启动交互式向导。它会将API密钥、模型提供商和通道令牌写入`/opt/data`。

    网关重启
    - `hermes gateway restart` 在容器化部署中无法正常工作。使用`touch /opt/data/.gateway-restart-requested`可终止正在运行的网关，加载最新配置，并在约5秒内重新上线。同一哨兵机制还会绕过崩溃后的30秒回退窗口。
  upgradeDescription: |
    将 Hermes Agent 从 0.13.0(2026.5.7) 升级到 0.14.0(2026.5.16)

    **主要变更**
    - **原生 Windows 支持（早期 Beta）** — 提供完整 PowerShell 安装器；无需 WSL，可在 cmd.exe/PowerShell 下直接运行（原生 PTY，基于 taskkill 的进程管理，自动安装 MinGit 等）
    - **官方 PyPI 包** — 现在可通过 pip install hermes-agent 官方安装（发布包内置 Ink TUI 和 shell 启动器）；无需 clone/git/shell 脚本
    - **极大提升冷启动速度（提升约19秒）** — 技能懒加载，重型依赖延迟加载，模型优先使用磁盘缓存查找，并行检查；hermes tools 启动时间从 14 秒降至不到 1.5 秒
    - **浏览器工具提速180倍** — browser_console 评估请求改为通过管理进程的持久 CDP WebSocket 路由，不再为每次请求启动新 DevTools 会话
    - **hermes proxy** — OpenAI 兼容本地代理，可将仅支持 OAuth 的订阅（Claude Pro、ChatGPT Pro、SuperGrok）以 OpenAI 兼容接口暴露，供 Codex、Aider、Cline、VS Code Continue 使用
    - **跨会话 Claude 1 小时输入缓存** — 通过 Anthropic、OpenRouter、Nous Portal 共享前缀缓存，加快恢复会话速度并降低重复请求成本
    - **新增 2 个消息平台与 MS Graph/Teams 基础** — 支持 LINE 和 SimpleX Chat 作为一等适配器（总计支持 22 个平台）；Microsoft Graph 授权/ Webhook 监听与 Teams 管道支持（可读写 Teams）
    - **Agent 运行时增强** — /handoffnow 可实时转交会话（消息、工具历史和上下文完整保留）；x_search 作为一等受控工具；vision_analyze 支持原始像素输入给视觉模型；computer_use 重构为面向 Provider 的 cua-driver 实现
    - **开发体验与安全增强** — 每次 write_file/patch 都赋能 LSP 语义诊断；每回合文件变动校验尾注，防止无声覆盖或写入丢失；新增供应链升级审计工具；阻止 sudo -S 暴力破解与危险调用
    - **生态系统与技能扩展** — 新增 9 个可选技能（Hyperliquid 永续/现货、Yahoo 财经、统一 EVM 多链、OSINT、轮询/爬取 RSS-GitHub 等）；Brave Search（免费额度）和 DuckDuckGo 支持网络搜索；Zed ACP 注册表集成 uvx；Hugging Face Skills Hub 默认可信入口

    完整发布说明请见：https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.16    