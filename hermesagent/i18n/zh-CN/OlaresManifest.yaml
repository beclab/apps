metadata:
  title: Hermes Agent
  description: 在 Olares 上提供独立 CLI 工作区与控制界面的个人 AI 助手。
spec:
  fullDescription: |
    Hermes Agent 是一个可克隆的个人 AI 助手应用，在 Olares 上同时提供
    独立 CLI 工作区与单独的控制界面。

    入口
    - `Hermes CLI`
      - 浏览器终端，连接到持久化工作区容器。
    - `Control UI`
      - Hermes Dashboard 与内嵌 TUI 聊天，通过独立代理服务提供。

    运行拓扑
    - 长驻工作区容器，用于终端会话
    - Dashboard sidecar，提供 Web UI 与 `/api/pty`
    - 尽力而为的 gateway sidecar，负责消息、定时任务与会话运行时
    - 终端辅助部署
    - Control UI 代理部署

    说明
    - 该应用支持克隆，适合个人或按工作区隔离使用。
    - 它不是 Olares Shared App。
    - 在未配置消息平台前，gateway sidecar 可能显示为 `stopped`。
    - OpenAI 兼容 API Server 默认关闭。
    - 模型提供商密钥由用户在安装后通过 Hermes 配置与 `.env` 自行管理。
