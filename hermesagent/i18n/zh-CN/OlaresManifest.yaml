metadata:
  title: Hermes Agent
  description: 与您一起成长的 AI Agent
spec:
  fullDescription: |
    **Nous Research 打造的自我进化型 AI Agent。** 它是唯一一个内置学习闭环的 Agent：从经验中生成技能、在使用中自我改进、可检索自己过往的对话，并在多次会话中不断加深对你的理解。在 $5 VPS、GPU 集群或无服务器基础设施上运行，成本几乎为零。它不绑定到您的笔记本电脑 — 从 Telegram 与它交谈，它在云 VM 上工作。

    **使用提示**
    网关重启
    - 运行 `restart-gateway` 即可重启网关并加载最新配置（`hermes gateway restart` 在容器化部署中无法工作）。

    存储
    - 所有Hermes状态——配置、API密钥、会话（SQLite + FTS5）、技能、记忆、定时任务、日志、检查点——均存储于`/opt/data`（`HERMES_HOME`）。无需外部数据库。该目录通过主机卷在Pod重启和升级时持久化保留。

    首次设置
    - 打开`Hermes CLI`入口并运行`hermes setup`以启动交互式向导。它会将API密钥、模型提供商和通道令牌写入`/opt/data`。

    **核心功能**
    - 全新 React/Ink 终端 UI：多行编辑、斜杠命令补全、固定输入框、流式输出、状态栏带逐回合计时器与 git 分支、亮色主题、OSC-52 剪贴板。
    - 多通道消息网关，**已支持 20 个平台**：Telegram、Discord、Slack、WhatsApp、Signal、Email、Microsoft Teams、Google Chat、QQBot、腾讯元宝、Matrix、Mattermost、飞书、钉钉、IRC 等，单进程接入；内置语音备忘录转写；网关重启后会话自动恢复。
    - 学习闭环：Agent 自治记忆与技能生成、FTS5 会话搜索、Honcho 辩证式用户建模，兼容 agentskills.io 开放标准；内置 **自治 Curator** 后台 Agent 默认按 7 天周期为技能库打分、合并与清理。
    - **多 Agent Kanban 协作板**：可持久化、多 Profile 协同，内置心跳、重新认领、僵尸检测、重试预算与幻觉拦截，让 AI 团队真正把任务做完。
    - **`/goal`** 跨回合持续目标（Ralph loop）— Agent 不会忘记你交代的事。
    - **Checkpoints v2**：真正的剪枝 + 磁盘保护；可选启用按 Session 长期记忆的 OpenAI 兼容 API Server（`X-Hermes-Session-Key`）。
    - 定时任务：内置 cron 调度器，结果可下发到任意消息平台；新增 `no_agent` 仅运行脚本的看门狗模式。
    - 子 Agent 与并行：派生隔离子 Agent 并行工作；明确的 orchestrator 角色。
    - 内置技能：ComfyUI v5、TouchDesigner-MCP、Spotify、Google Meet、SearXNG 搜索、Shopify、视频理解（Gemini）等。
    - Provider / 传输层 / 网关平台 / Dashboard 全面插件化，无需 fork 即可扩展。
    - 安全加固：默认开启敏感信息脱敏；关闭 MCP OAuth 与 auth.json 的 TOCTOU 时间窗；浏览器工具云元数据 SSRF 防护；各平台精细化白名单；`.env` / `auth.json` / `state.db` 强制 `0600`。
    - 已本地化为 7 种语言（中文 / 日本語 / Deutsch / Español / Français / Українська / Türkçe），Dashboard 已支持中文。

  upgradeDescription: |
    升级 Hermes 到 v0.17.0（v2026.6.19）

    **本次更新亮点**
    - **Hermes 支持 iMessage — 基于 Photon Spectrum，无需 Mac 中继** — 现在新增了基于 Photon 托管号池的 iMessage 平台插件。运行 `hermes photon login`，用设备码认证，Hermes 即可发送和接收 iMessage —— 无需把 Mac 扔在角落跑中继，也不用再维护 BlueBubbles 网桥。它定位于 BlueBubbles 的继任者：免费起步，无需自托管。如果你亲友都在蓝气泡聊天圈，Hermes 也能陪你畅聊。（#32348, #42582, #44713 — @teknium1）

    - **Raft — Hermes 以网关形式接入 Raft 代理网络** — 新增内置的 Raft 平台适配器，让 Hermes 可作为外部 Agent 通过 wake-channel 网桥接入 Raft。配置 RAFT_PROFILE，启动网桥，Raft 就能唤醒 Hermes 处理消息，实现全流程隐私保护唤醒：负载只包含元数据（事件ID、时间戳），永不携带消息正文。Hermes 可“现身”并工作的新维度。（#48210 — @xxchan, @teknium1）

    - **桌面版大幅进化** — v0.16.0 推出桌面版，v0.17.0 十余个 PR 持续深度提升：快捷键可自定义、操作系统级通知（按类型细分开关）、实时子 Agent 监控（在单独面板流式展示子 Agent 活动）、带预设的模型选择器、自动识别 RTL/双向文本、终端窗口可调整大小（遵循 VS Code 主题）、每线程独立草稿、多种 VS Code 主题一键安装。桌面版已真正走向生产力主力！（#45866, #40660, #47060, #46959, #43292, #44596 — @OutThisLife, @teknium1）

    - **异步/后台子 Agent —— 委托工作，还能继续操作** — 现在调用 delegate_task(background=true) 时，会异步派发一个后台子 Agent，立即返回句柄。你和模型可以先继续其它任务，等结果就绪，完整结果会自动以新一轮消息进入对话。可用于拉长的调研、多步流水式任务等，无需“卡死”在等待上。（#40946, #46968 — @teknium1）

    - **图片编辑支持 —— 不再仅能生成图片，还能编辑图片** — image_generate 工具现可编辑和处理输入图片，不再只能“从零生成”。传递已有图片和提示词，会自动路由到后端对应的图片编辑接口（跟 video_generate 用法一致），所有支持的平台适配。比如“把这个 logo 变蓝”“去掉背景”“草图变渲染图”都能一步搞定。（#48705 — @teknium1）

    - **自动化蓝图 —— 无需手写 cron 就能定时安排** — 选择一个自动化蓝图名称，Hermes 会向你提问所需参数，无需学习 cron 语法、也不用 slot=value 填参。一次性定义，原生适配所有渠道：Dashboard 表单、CLI/TUI/消息端斜杠命令、桌面对话、文档目录，都能直接用。“每天早上8点推送新闻简报” —— 现在仅需交互式回答几个问题，而不用背 0 8 * * * 。（#41309 — @teknium1）

    - **xAI Grok Composer 模型适配 Cursor** — grok-composer-2.5-fast 已加入 xAI OAuth 模型选择器，窗口拉满至 20 万字。Composer 是 Cursor 背后的速写代码模型 —— 如你有 xAI Grok 订阅，现在可直接 OAuth 接入 Hermes，无需单独 API 密钥。Grok 订阅计划、Hermes 代理循环、Composer 编码速度，三者合一。（#47908, #6f89e17 — @teknium1）

    - **仪表盘支持完整 profile 构建** — 直接在浏览器创建完整 Hermes profile：选模型、配技能、挂 MCP 服务器 —— 全程无需手动改 config.yaml。Dashboard 还整合了多 profile 管理，全球切换一目了然，每个 profile 一站式管理。（#39084, #44007 — @teknium1）

    - **技能商店大改版** — Dashboard 的技能中心重构：多源集成，独立 Featured 区块，完整技能预览+扫描安全每一项，从官方 taps（OpenAI、Anthropic、HuggingFace、NVIDIA）浏览和安装技能，体验不再是平铺列表，而是真·浏览式。 (#40384, #43398 — @teknium1)

    - **记忆工具重大升级 —— 批量原子操作** — 记忆工具新增 operations 队列，可一次性批量 add/replace/remove 编辑，并最终按字符数原子提交。模型可先释放空间再加新项（哪怕纯 add 会超限），原本脆弱的多步操作一键搞定。记忆更新更快、更易成功。（#48507 — @teknium1）

    - **Dashboard 登录安全加固** — Dashboard 认证全面升级：所有需 token 接口均已正确在 OAuth 封锁下返回 401，Websocket 认证严格用当前 Dashboard token，若 public_url 配置被 silent reject 也会给出安全警告。网络暴露 Dashboard 默认更安全。（#42578, #42578 — @benbarclay, @teknium1）

    - **官方 WhatsApp Business Cloud API 适配** — 除 Baileys 网桥外，Hermes 现已支持官方 WhatsApp Business Cloud API——Meta 官方托管、无桥进程、无需扫码。配置好 Business API 凭据，Hermes 能直接和 WhatsApp 对话，无需保持 QR 网桥进程存活。（#44331, #43921 — @jquesnelle, @teknium1）

    - **Telegram 富文本支持** — Bot API 10.1 富文本消息 —— Telegram 回复现已原生渲染富文本：格式更优，长消息处理更流畅，使用原生标记不再是平铺文本。默认启用，可选关闭；无须额外配置，Telegram 聊天焕然一新。（#44829, #45584, #45953 — @teknium1）

    - **Curator 成本优化 —— 常规巡检不再额外消耗 LLM** — 技能 curator 现在默认只巡检并清理废弃技能，不再每次自动触发 LLM 聚合，除非手动 opt-in（curator.consolidate: true 或 hermes curator run --consolidate）。确定性的惰性清理一直免费跑，带 LLM 的“构建伞式技能”分支现默认关闭。例行巡检，零 token 花费。（#47840 — @teknium1）

    完整更新日志：https://github.com/NousResearch/hermes-agent/releases/tag/v2026.6.19