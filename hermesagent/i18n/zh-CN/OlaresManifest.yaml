metadata:
  title: Hermes Agent
  description: 与您一起成长的 AI Agent
spec:
  fullDescription: |
    **Nous Research 打造的自我进化型 AI Agent。** 它是唯一一个内置学习闭环的 Agent：从经验中生成技能、在使用中自我改进、可检索自己过往的对话，并在多次会话中不断加深对你的理解。在 $5 VPS、GPU 集群或无服务器基础设施上运行，成本几乎为零。它不绑定到您的笔记本电脑 — 从 Telegram 与它交谈，它在云 VM 上工作。

    **使用提示**
    网关重启
    - 运行 `restart-gateway` 即可重启网关并加载最新配置（`hermes gateway restart` 在容器化部署中无法工作）。

    存储
    - 所有Hermes状态——配置、API密钥、会话（SQLite + FTS5）、技能、记忆、定时任务、日志、检查点——均存储于`/opt/data`（`HERMES_HOME`）。无需外部数据库。该目录通过主机卷在Pod重启和升级时持久化保留。

    首次设置
    - 打开`Hermes CLI`入口并运行`hermes setup`以启动交互式向导。它会将API密钥、模型提供商和通道令牌写入`/opt/data`。

    **核心功能**
    - 全新 React/Ink 终端 UI：多行编辑、斜杠命令补全、固定输入框、流式输出、状态栏带逐回合计时器与 git 分支、亮色主题、OSC-52 剪贴板。
    - 多通道消息网关，**已支持 20 个平台**：Telegram、Discord、Slack、WhatsApp、Signal、Email、Microsoft Teams、Google Chat、QQBot、腾讯元宝、Matrix、Mattermost、飞书、钉钉、IRC 等，单进程接入；内置语音备忘录转写；网关重启后会话自动恢复。
    - 学习闭环：Agent 自治记忆与技能生成、FTS5 会话搜索、Honcho 辩证式用户建模，兼容 agentskills.io 开放标准；内置 **自治 Curator** 后台 Agent 默认按 7 天周期为技能库打分、合并与清理。
    - **多 Agent Kanban 协作板**：可持久化、多 Profile 协同，内置心跳、重新认领、僵尸检测、重试预算与幻觉拦截，让 AI 团队真正把任务做完。
    - **`/goal`** 跨回合持续目标（Ralph loop）— Agent 不会忘记你交代的事。
    - **Checkpoints v2**：真正的剪枝 + 磁盘保护；可选启用按 Session 长期记忆的 OpenAI 兼容 API Server（`X-Hermes-Session-Key`）。
    - 定时任务：内置 cron 调度器，结果可下发到任意消息平台；新增 `no_agent` 仅运行脚本的看门狗模式。
    - 子 Agent 与并行：派生隔离子 Agent 并行工作；明确的 orchestrator 角色。
    - 内置技能：ComfyUI v5、TouchDesigner-MCP、Spotify、Google Meet、SearXNG 搜索、Shopify、视频理解（Gemini）等。
    - Provider / 传输层 / 网关平台 / Dashboard 全面插件化，无需 fork 即可扩展。
    - 安全加固：默认开启敏感信息脱敏；关闭 MCP OAuth 与 auth.json 的 TOCTOU 时间窗；浏览器工具云元数据 SSRF 防护；各平台精细化白名单；`.env` / `auth.json` / `state.db` 强制 `0600`。
    - 已本地化为 7 种语言（中文 / 日本語 / Deutsch / Español / Français / Українська / Türkçe），Dashboard 已支持中文。

  upgradeDescription: |
    Hermes Agent 应用升级到 v0.15.2（2026.5.29.2）

    主要变更：
    - 核心架构重构：run_agent.py 从 16,083 行精简至 3,821 行，并拆分为 14 个 agent/* 模块，提升可维护性与开发效率。
    - 显著性能提升：冷启动再优化，hermes --version 冷启动耗时降低 63%，每回合函数调用减少 47%，session_search 重写为无 LLM、零成本、速度提升约 4,500×。
    - Kanban 进化为多 Agent 平台：新增任务自动拆解、Swarm 拓扑、定时任务、任务级模型覆盖、每任务工作区、任务执行/运行检测端点。
    - 安全性与密钥管理增强：Hermes 新增防御 Promptware/Brainworm 风格攻击机制，Bitwarden Secrets Manager 支持以单一引导令牌替代多平台 API 密钥，实现来源标签和高效轮换。
    - 生态与集成扩展：加入技能包、ntfy 通知、OpenHands 编排、Nous 官方批准的 MCP 目录、Krea/FAL 图像生成提供商和更深入的 xAI 集成。

    查看完整更新日志：https://github.com/NousResearch/hermes-agent/releases/tag/v2026.5.29.2