metadata:
  title: Hermes Agent
  description: 与您一起成长的 AI Agent
spec:
  fullDescription: |
    **Nous Research 打造的自我进化型 AI Agent。** 它是唯一一个内置学习闭环的 Agent：从经验中生成技能、在使用中自我改进、可检索自己过往的对话，并在多次会话中不断加深对你的理解。在 $5 VPS、GPU 集群或无服务器基础设施上运行，成本几乎为零。它不绑定到您的笔记本电脑 — 从 Telegram 与它交谈，它在云 VM 上工作。

    使用任何您想要的模型 — [Nous Portal](https://portal.nousresearch.com)、[OpenRouter](https://openrouter.ai)（200+ 模型）、[NVIDIA NIM](https://build.nvidia.com)（Nemotron）、[Xiaomi MiMo](https://platform.xiaomimimo.com)、[z.ai/GLM](https://z.ai)、[Kimi/Moonshot](https://platform.moonshot.ai)、[MiniMax](https://www.minimax.io)、[Hugging Face](https://huggingface.co)、OpenAI，或您自己的推理端点。切换只需 `hermes model` — 无需代码更改，无锁定。

    **核心功能**
    - 真正的终端 UI：多行编辑、斜杠命令补全、会话历史、中断改向、工具输出流式展示。
    - 多通道消息网关：一个进程同时接入 Telegram / Discord / Slack / WhatsApp / Signal / Email，内置语音备忘录转写。
    - 学习闭环：Agent 自治记忆与技能生成、FTS5 会话搜索、Honcho 辩证式用户建模，兼容 agentskills.io 开放标准。
    - 定时任务：内置 cron 调度器，结果可下发到任意消息平台。
    - 子 Agent 与并行：派生隔离子 Agent 并行工作；通过 RPC 调用工具。
    - 任意模型：Nous Portal、OpenRouter（200+ 模型）、NVIDIA NIM、MiMo、GLM、Moonshot、MiniMax、Hugging Face、OpenAI、Anthropic，或您自己的推理端点，随意切换。

    **首次设置**
    打开 `Hermes CLI` 入口并运行 `hermes setup` 以启动交互式向导。它将 API 密钥、模型提供商和频道令牌写入 `/opt/data`，这在 pod 重启和升级时持久化。
