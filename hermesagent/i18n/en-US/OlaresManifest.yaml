metadata:
  title: Hermes Agent
  description: The agent that grows with you
spec:
  fullDescription: |
    **The self-improving AI agent built by [Nous Research](https://nousresearch.com).** It's the only agent with a built-in learning loop — it creates skills from experience, improves them during use, nudges itself to persist knowledge, searches its own past conversations, and builds a deepening model of who you are across sessions. Run it on a $5 VPS, a GPU cluster, or serverless infrastructure that costs nearly nothing when idle. It's not tied to your laptop — talk to it from Telegram while it works on a cloud VM.

    Use any model you want — [Nous Portal](https://portal.nousresearch.com), [OpenRouter](https://openrouter.ai) (200+ models), [NVIDIA NIM](https://build.nvidia.com) (Nemotron), [Xiaomi MiMo](https://platform.xiaomimimo.com), [z.ai/GLM](https://z.ai), [Kimi/Moonshot](https://platform.moonshot.ai), [MiniMax](https://www.minimax.io), [Hugging Face](https://huggingface.co), OpenAI, or your own endpoint. Switch with `hermes model` — no code changes, no lock-in.
    
    **Key Features**
    - Real Terminal UI with multiline editing, slash-command autocomplete, conversation history, interrupt-and-redirect, and streaming tool output.
    - Multi-channel Gateway: Telegram, Discord, Slack, WhatsApp, Signal and Email through one process; voice memo transcription included.
    - Closed learning loop: agent-curated memory, autonomous skill creation, FTS5 session search, Honcho dialectic user modeling. agentskills.io compatible.
    - Scheduled automations via a built-in cron scheduler.
    - Delegates and parallelizes work with isolated subagents.
    - Any model: Nous Portal, OpenRouter (200+ models), NVIDIA NIM, MiMo, GLM, Moonshot, MiniMax, Hugging Face, OpenAI, Anthropic, or your own endpoint.

    **First-time Setup**
    Open the `Hermes CLI` entrance and run `hermes setup` to launch the interactive wizard. It writes API keys, model providers, and channel tokens into `/opt/data`, which is persisted across pod restarts and upgrades.
