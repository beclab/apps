metadata:
  title: Falco
  description: 云原生运行时安全工具，用于检测异常行为。
spec:
  fullDescription: |
    ## 重要说明 ##
    这是一个共享应用。整个 Olares 系统只会安装一个服务实例。但每个用户仍需要安装桌面入口才能访问和使用由 Olares 管理员安装的服务。

    ## 概述 ##
    Falco 是一个面向 Linux 操作系统的云原生运行时安全工具。它旨在实时检测和警报异常行为及潜在安全威胁。

    Falco 的核心是一个内核监控和检测代理，它基于自定义规则观察系统调用等事件。Falco 可以通过集成容器运行时和 Kubernetes 的元数据来增强这些事件。

    # 功能
    * 基于系统调用监控的实时威胁检测
    * 用于定义安全策略的自定义规则引擎
    * 容器和 Kubernetes 感知，支持元数据增强
    * 支持现代 eBPF 驱动（无需内核模块）
    * 插件系统用于扩展数据源
    * 多种输出渠道：标准输出、文件、syslog、HTTP、gRPC
    * Prometheus 指标端点
    * CNCF 毕业项目，被众多组织用于生产环境
    * 健康检查 API 用于监控 Falco 状态

    注意：Falco 是一个内核级安全守护进程，需要特权访问才能正常工作，在标准容器环境中可能存在限制。
  upgradeDescription: |
    升级到 v0.43.0

    破坏性变更:
    * fix(userspace)!: 仅在调试构建中显示源配置路径 (#3787)

    次要变更:
    * 用于签名 DEB/RPM 包的 GPG 密钥已轮换
    * 弃用旧版 eBPF 探针、gVisor 引擎和 gRPC (#3763)

    Bug 修复:
    * 防止 output_program 中 popen() 失败时的空指针崩溃 (#3722)

    完整发布说明参见: https://github.com/falcosecurity/falco/releases/tag/0.43.0
