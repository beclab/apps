spec:
  versionName: '2.20.9'
  featuredImage: https://app.cdn.olares.com/appstore/n8n/promote_image_1v2.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/n8n/promote_image_1v2.webp
    - https://app.cdn.olares.com/appstore/n8n/promote_image_2v2.webp
    - https://app.cdn.olares.com/appstore/n8n/promote_image_3v2.webp
    - https://app.cdn.olares.com/appstore/n8n/promote_image_4v2.webp
  fullDescription: |
    n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, be available to self-host, and allow you to add your own custom functions, logic and apps. n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.

    **Available integrations**
    n8n has 200+ different nodes to automate workflows. The list can be found on: https://n8n.io/integrations

    **Build powerful workflows, really fast**
    - Handle really complex processes  
    - Simple debugging  
    - Use templates to get started fast  
    - Code when you need it, UI when you don't  
    - Reuse your work

    **Get peace of mind**
    - Connect to any system  
    - Customize error handling  
    - Horizontal scaling  
    - Host on your own infrastructure

    **Features**
    - Visual workflow editor
    - Run JavaScript
    - npm package import
    - Workflows can wait
    - Conditional logic and branching
    - Webhook triggers
    - Retry failed executions
    - Multi-trigger workflows
    - Source code available
    - User management
    - Create custom nodes
    - Encrypted credential store
    - Copy + paste workflows
    - Export workflows to JSON
    - Custom error workflows

  upgradeDescription: |
    Upgrade app version to 2.20.9

    **Version Upgrade**
    This upgrade brings n8n from 2.4.4 to 2.20.9, including the new features and improvements accumulated across recent versions.

    **Important Notes**
    - Node.js version requirement: 20.19 to 24.x
    - Database migrations will be automatically executed
    - Review workflow compatibility using migration tool (Settings > Migration Report)
    - Some workflows may need adjustments for n8n 2.x compatibility
    - Task runners are now mandatory in n8n 2.x; the deprecated `N8N_RUNNERS_ENABLED` env var has been removed from the configmap
    - Resource limits raised to better fit n8n 2.x (memory limit 2Gi -> 4Gi, CPU limit 1 -> 2 cores)
    - Reminder: since n8n 2.0, `N8N_BLOCK_ENV_ACCESS_IN_NODE` defaults to `true`, so Code nodes cannot read host env vars (e.g. `process.env.X`). The variable is now explicitly set to `"true"` in the n8n configmap; this matches the implicit default in the previous 2.4.4 release, so behavior is unchanged. If you need the old (pre-2.0) behavior of allowing env var access, change it to `"false"` in the configmap (reduces security).

    **Key Changes Since 2.4.4**

    AI & agentic workflows
    - Microsoft Agent 365 Trigger node: deploy n8n agents that show up as members of your team inside Microsoft 365 apps (2.20)
    - AI Builder enhancements: better remediation loops, schema handling, and expanded orchestrator steps (2.18 - 2.20)
    - Anthropic Chat Model: adaptive thinking mode for Claude Opus 4.7+ (2.20)
    - Human-in-the-loop for AI tool calls: require explicit approval before agents execute specific tools (2.6)
    - Chat node send-and-wait actions for multi-turn human interaction (2.5)

    Workflow editor
    - Visual diff in version history: compare any two versions side by side on the canvas (2.13)
    - Polling nodes now support 5-field cron expressions with step values (2.20)

    Governance & security (Enterprise)
    - Project-scoped external secrets with admin setup and team access (2.11, 2.13)
    - 1Password Connect Server as external secrets provider (2.12)
    - Multiple connections per external secrets provider (2.10)
    - Stronger external secrets validation and improved API auditability (2.8)
    - Personal space policies for sharing and workflow publishing (2.8)
    - Custom roles: assignments tab and more granular workflow scopes (2.8, 2.11)
    - Folder-based filtering in the push/pull dialog (2.13)

    Performance & stability
    - 30%-80% faster workflow and credential list loading for large-scale instances (2.10)
    - Performance improvements for instances with very large user counts (2.8)
    - Numerous core bug fixes through 2.20.9, including the latest ObservableObject proxy-layer fix

    Integrations
    - New credential auth and tests for Twilio, Pipedrive, Asana, Freshdesk, and Workable (2.19)
    - Alibaba Cloud Chat Model: credential-level URL field for AI gateway compatibility (2.18)

    **Deprecations**
    - Motorhead memory node deprecated; existing workflows continue to work (2.8)

    **Upgrade Steps**
    1. Backup all workflows and database
    2. Review migration report for compatibility issues
    3. Update configuration files
    4. Deploy new version
    5. Verify all workflows function correctly

    Check full release notes at: https://github.com/n8n-io/n8n/releases/tag/n8n%402.20.9

  developer: n8n
  website: https://n8n.io/
  sourceCode: https://github.com/n8n-io/n8n
  submitter: Olares
  locale:
