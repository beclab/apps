metadata:
  title: n8n
  description: n8n is an extendable workflow automation tool.

spec:
  fullDescription: |
    n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, be available to self-host, and allow you to add your own custom functions, logic and apps. n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.

    **Available integrations**
    n8n has 200+ different nodes to automate workflows. The list can be found on: https://n8n.io/integrations

    **Build powerful workflows, really fast**
    - Handle really complex processes  
    - Simple debugging  
    - Use templates to get started fast  
    - Code when you need it, UI when you don't  
    - Reuse your work

    **Get peace of mind**
    - Connect to any system  
    - Customize error handling  
    - Horizontal scaling  
    - Host on your own infrastructure

    **Features**
    - Visual workflow editor
    - Run JavaScript
    - npm package import
    - Workflows can wait
    - Conditional logic and branching
    - Webhook triggers
    - Retry failed executions
    - Multi-trigger workflows
    - Source code available
    - User management
    - Create custom nodes
    - Encrypted credential store
    - Copy + paste workflows
    - Export workflows to JSON
    - Custom error workflows

  upgradeDescription: |
    Upgrade n8n to 2.27.5 and enforce non-root deployment on Olares.

    **Version Upgrade (chart 1.0.19 → 1.1.0, app 2.26.9 → 2.27.5)**

    **Deployment Changes**
    - Image updated to official `n8nio/n8n:2.27.5`
    - Enforce pod-level `runAsUser` / `runAsGroup` 1000 so the main container no longer runs as root on Olares
    - Main container sets `runAsNonRoot: true`; init container still chowns appData as root before startup
    - Data volume remains at `/home/node/.n8n`; Service still exposes port 80 and forwards to 5678
    - HTTPS reverse-proxy env vars retained (`N8N_PROTOCOL`, `WEBHOOK_URL`, `N8N_EDITOR_BASE_URL`, `N8N_PROXY_HOPS`, `N8N_SECURE_COOKIE`)

    **Key Changes Since 2.26.9**
    - Instance AI builder, MCP OAuth2, Anthropic streaming, and execution-list performance improvements (2.27)
    - 2.27.0 adds a database index on `execution_entity` (may take several minutes on large instances)
    - 2.27.5 fixes startup failure from partially-installed community packages

    **Important Notes**
    - Database migrations run automatically on startup
    - Review workflow compatibility using the migration tool (Settings > Migration Report)

    Check full release notes at: https://github.com/n8n-io/n8n/releases/tag/n8n%402.27.5
