metadata:
  title: n8n
  description: n8n is an extendable workflow automation tool.

spec:
  fullDescription: |
    n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, be available to self-host, and allow you to add your own custom functions, logic and apps. n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.

    **Available integrations**
    n8n has 200+ different nodes to automate workflows. The list can be found on: https://n8n.io/integrations

    **Build powerful workflows, really fast**
    - Handle really complex processes  
    - Simple debugging  
    - Use templates to get started fast  
    - Code when you need it, UI when you don't  
    - Reuse your work

    **Get peace of mind**
    - Connect to any system  
    - Customize error handling  
    - Horizontal scaling  
    - Host on your own infrastructure

    **Features**
    - Visual workflow editor
    - Run JavaScript
    - npm package import
    - Workflows can wait
    - Conditional logic and branching
    - Webhook triggers
    - Retry failed executions
    - Multi-trigger workflows
    - Source code available
    - User management
    - Create custom nodes
    - Encrypted credential store
    - Copy + paste workflows
    - Export workflows to JSON
    - Custom error workflows

  upgradeDescription: |
    Upgrade n8n to 2.27.5 with official image and non-root deployment.

    **Deployment Changes**
    - Switched from `beclab/n8nio-n8n` to official `n8nio/n8n:2.27.5`
    - Removed root `securityContext` from the main container; it now runs as the image default user (`node`, UID 1000)
    - Data volume mount path changed from `/root/.n8n` to `/home/node/.n8n`
    - Added init container to `chown` appData to UID 1000 before startup
    - n8n listens on port 5678 internally; Service exposes port 80 and forwards to 5678
    - Added HTTPS reverse-proxy env vars (`N8N_PROTOCOL`, `WEBHOOK_URL`, `N8N_EDITOR_BASE_URL`, `N8N_PROXY_HOPS`, `N8N_SECURE_COOKIE`)
    - Enabled `N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS`
    - Raised resource limits for n8n 2.27 task runners (memory request 1Gi -> 2Gi, limit 4Gi -> 6Gi; CPU limit 2 -> 3 cores)

    **Important Notes**
    - Database migrations run automatically on startup; 2.27.0 adds an index on `execution_entity` that may take several minutes on large instances
    - `N8N_BLOCK_ENV_ACCESS_IN_NODE` remains `"true"`
    - Task runners remain mandatory in n8n 2.x; do not re-add deprecated `N8N_RUNNERS_ENABLED`

    **Bug Fixes in 2.27.5**
    - Prevent startup failure from partially-installed community packages

    Check full release notes at: https://github.com/n8n-io/n8n/releases/tag/n8n%402.27.5
