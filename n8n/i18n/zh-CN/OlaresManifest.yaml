metadata:
  title: n8n
  description: n8n 是一款可扩展的工作流自动化工具。

spec:
  fullDescription: |
    n8n 是一款可扩展的工作流自动化工具。n8n 采用开放源码，支持自托管，您还可以添加自定义功能和应用。n8n 的节点式架构让它具备高度的灵活性，能连接任何东西到一切。

    **海量工作流**
    n8n 提供超过 200 种不同节点用于自动化工作流。更多信息请见：https://n8n.io/integrations

    **快速构建强大的工作流程**
    - 处理复杂流程  
    - 简化调试  
    - 使用模板快速启动  
    - 需要编程时编码，不需要时用 UI  
    - 复用成果

    **安心无忧**
    - 接入任何系统  
    - 自定义错误处理  
    - 横向扩展  
    - 在自有基础设施上部署

    **功能**
    - 可视化工作流编辑器
    - 执行 JavaScript
    - 引入 npm 包
    - 工作流可暂停
    - 条件逻辑与分支
    - Webhook 触发
    - 重试失败任务
    - 多触发器工作流
    - 开放源代码
    - 用户管理
    - 制作自定义节点
    - 加密的凭证存储
    - 复制粘贴工作流
    - 工作流导出为 JSON
    - 定制错误处理流程

  upgradeDescription: |
    升级应用版本至 2.20.9

    **版本升级**
    本次升级将 n8n 从 2.4.4 更新至 2.20.9，包含多个版本累计的新功能与改进。

    **重要提示**
    - Node.js 版本要求：20.19 至 24.x
    - 数据库迁移将自动执行
    - 使用迁移工具检查工作流兼容性（设置 > 迁移报告）
    - 某些工作流可能需要调整以兼容 n8n 2.x
    - n8n 2.x 中 task runners 已强制启用，已废弃的 `N8N_RUNNERS_ENABLED` 环境变量已从 configmap 中移除
    - 为更好适配 n8n 2.x，资源上限已提升（内存上限 2Gi -> 4Gi，CPU 上限 1 -> 2 核）
    - 提示：自 n8n 2.0 起，`N8N_BLOCK_ENV_ACCESS_IN_NODE` 的默认值即为 `true`，Code 节点无法读取宿主机环境变量（如 `process.env.X`）。该变量现已在 n8n configmap 中显式写为 `"true"`，与上一个 2.4.4 版本的隐式默认行为一致，本次升级并未改变实际行为。若需要恢复 n8n 2.0 之前允许访问环境变量的旧行为，可将 configmap 中此变量改为 `"false"`（会降低安全性）。

    **自 2.4.4 起的主要变更**

    AI 与 Agent 工作流
    - Microsoft Agent 365 触发器节点：将 n8n agent 部署为 Microsoft 365 应用中的团队成员（2.20）
    - AI Builder 改进：更优的修复循环、schema 处理以及扩展的 orchestrator 步数（2.18 - 2.20）
    - Anthropic Chat Model：为 Claude Opus 4.7+ 增加自适应思考模式（2.20）
    - AI 工具调用的人工审批：在 agent 执行特定工具前要求显式批准（2.6）
    - Chat 节点新增「发送并等待回复」操作，支持多轮人机交互（2.5）

    工作流编辑器
    - 版本历史可视化对比：在画布上并排查看任意两个版本（2.13）
    - 轮询节点支持 5 字段 cron 表达式及步进值（2.20）

    治理与安全（企业版）
    - 项目级 External Secrets，支持管理员配置和团队访问（2.11、2.13）
    - 1Password Connect Server 作为 External Secrets 提供方（2.12）
    - 同一 External Secrets 提供方支持多连接（2.10）
    - 增强的 External Secrets 校验与更完善的 API 审计能力（2.8）
    - 个人空间策略：可控制分享与工作流发布（2.8）
    - 自定义角色：新增分配视图，更细化的工作流权限（2.8、2.11）
    - 推/拉对话框支持按文件夹过滤（2.13）

    性能与稳定性
    - 大规模实例的工作流与凭证列表加载速度提升 30%-80%（2.10）
    - 大量用户实例的性能改进（2.8）
    - 至 2.20.9 累计的多项核心 bug 修复，包括最新的 ObservableObject 代理层修复

    集成
    - 新增 Twilio、Pipedrive、Asana、Freshdesk、Workable 的凭证认证与测试（2.19）
    - 阿里云 Chat Model 增加凭证级 URL 字段以兼容 AI 网关（2.18）

    **已废弃**
    - Motorhead 记忆节点已废弃；现有工作流仍可继续运行（2.8）

    **升级步骤**
    1. 备份所有工作流和数据库
    2. 查看迁移报告以了解兼容性问题
    3. 更新配置文件
    4. 部署新版本
    5. 验证所有工作流正常运行

    完整发布说明请见：https://github.com/n8n-io/n8n/releases/tag/n8n%402.20.9
