metadata:
  title: n8n
  description: n8n 是一款可扩展的工作流自动化工具。

spec:
  fullDescription: |
    n8n 是一款可扩展的工作流自动化工具。n8n 采用开放源码，支持自托管，您还可以添加自定义功能和应用。n8n 的节点式架构让它具备高度的灵活性，能连接任何东西到一切。

    **海量工作流**
    n8n 提供超过 200 种不同节点用于自动化工作流。更多信息请见：https://n8n.io/integrations

    **快速构建强大的工作流程**
    - 处理复杂流程  
    - 简化调试  
    - 使用模板快速启动  
    - 需要编程时编码，不需要时用 UI  
    - 复用成果

    **安心无忧**
    - 接入任何系统  
    - 自定义错误处理  
    - 横向扩展  
    - 在自有基础设施上部署

    **功能**
    - 可视化工作流编辑器
    - 执行 JavaScript
    - 引入 npm 包
    - 工作流可暂停
    - 条件逻辑与分支
    - Webhook 触发
    - 重试失败任务
    - 多触发器工作流
    - 开放源代码
    - 用户管理
    - 制作自定义节点
    - 加密的凭证存储
    - 复制粘贴工作流
    - 工作流导出为 JSON
    - 定制错误处理流程

  upgradeDescription: |
    升级 n8n 至 2.27.5，切换官方镜像并以非 root 方式部署。

    **部署变更**
    - 镜像由 `beclab/n8nio-n8n` 切换为官方 `n8nio/n8n:2.27.5`
    - 移除主容器的 root `securityContext`，现以镜像默认用户（`node`，UID 1000）运行
    - 数据卷挂载路径由 `/root/.n8n` 改为 `/home/node/.n8n`
    - 新增 init 容器，启动前将 appData 目录 `chown` 为 UID 1000
    - n8n 内部监听 5678 端口；Service 对外暴露 80 并转发至 5678
    - 新增 HTTPS 反代环境变量（`N8N_PROTOCOL`、`WEBHOOK_URL`、`N8N_EDITOR_BASE_URL`、`N8N_PROXY_HOPS`、`N8N_SECURE_COOKIE`）
    - 启用 `N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS`
    - 为适配 n8n 2.27 task runner，提升资源上限（内存 request 1Gi -> 2Gi，limit 4Gi -> 6Gi；CPU limit 2 -> 3 核）

    **重要提示**
    - 启动时自动执行数据库迁移；2.27.0 为 `execution_entity` 添加索引，大规模实例可能需要数分钟
    - `N8N_BLOCK_ENV_ACCESS_IN_NODE` 保持为 `"true"`
    - n8n 2.x 中 task runners 仍强制启用，请勿重新添加已废弃的 `N8N_RUNNERS_ENABLED`

    **2.27.5 修复**
    - 防止部分安装的社区包导致启动失败

    完整发布说明请见：https://github.com/n8n-io/n8n/releases/tag/n8n%402.27.5
