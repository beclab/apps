metadata:
  title: n8n
  description: n8n 是一款可扩展的工作流自动化工具。

spec:
  fullDescription: |
    n8n 是一款可扩展的工作流自动化工具。n8n 采用开放源码，支持自托管，您还可以添加自定义功能和应用。n8n 的节点式架构让它具备高度的灵活性，能连接任何东西到一切。

    **海量工作流**
    n8n 提供超过 200 种不同节点用于自动化工作流。更多信息请见：https://n8n.io/integrations

    **快速构建强大的工作流程**
    - 处理复杂流程  
    - 简化调试  
    - 使用模板快速启动  
    - 需要编程时编码，不需要时用 UI  
    - 复用成果

    **安心无忧**
    - 接入任何系统  
    - 自定义错误处理  
    - 横向扩展  
    - 在自有基础设施上部署

    **功能**
    - 可视化工作流编辑器
    - 执行 JavaScript
    - 引入 npm 包
    - 工作流可暂停
    - 条件逻辑与分支
    - Webhook 触发
    - 重试失败任务
    - 多触发器工作流
    - 开放源代码
    - 用户管理
    - 制作自定义节点
    - 加密的凭证存储
    - 复制粘贴工作流
    - 工作流导出为 JSON
    - 定制错误处理流程

  upgradeDescription: |
    升级 n8n 至 2.27.5，并在 Olares 上强制非 root 部署。

    **版本升级（chart 1.0.19 → 1.1.0，应用 2.26.9 → 2.27.5）**

    **部署变更**
    - 镜像更新为官方 `n8nio/n8n:2.27.5`
    - Pod 级强制 `runAsUser` / `runAsGroup` 1000，避免主容器在 Olares 上以 root 运行
    - 主容器设置 `runAsNonRoot: true`；init 容器仍在启动前以 root chown appData
    - 数据卷保持 `/home/node/.n8n`；Service 仍对外 80 转发至 5678
    - 保留 HTTPS 反代环境变量（`N8N_PROTOCOL`、`WEBHOOK_URL`、`N8N_EDITOR_BASE_URL`、`N8N_PROXY_HOPS`、`N8N_SECURE_COOKIE`）

    **自 2.26.9 起的主要变更**
    - Instance AI Builder、MCP OAuth2、Anthropic 流式输出及执行列表性能改进（2.27）
    - 2.27.0 为 `execution_entity` 添加数据库索引（大规模实例可能需要数分钟）
    - 2.27.5 修复部分安装的社区包导致启动失败的问题

    **重要提示**
    - 启动时自动执行数据库迁移
    - 使用迁移工具检查工作流兼容性（设置 > 迁移报告）

    完整发布说明请见：https://github.com/n8n-io/n8n/releases/tag/n8n%402.27.5
