---
olaresManifest.version: 0.10.0
olaresManifest.type: app
metadata:
  name: audiobookshelf
  description: A self-hosted audiobook and podcast server.
  icon: https://app.cdn.olares.com/appstore/audiobookshelf/icon.png
  appid: audiobookshelf
  version: 1.0.8
  title: AudioBookShelf
  categories:
    - Fun
    - Entertainment
entrances:
  - name: audiobookshelf
    host: audiobookshelf
    icon: https://app.cdn.olares.com/appstore/audiobookshelf/icon.png
    port: 80
    title: AudioBookShelf
    openMethod: window
    authLevel: private
options:
  apiTimeout: 0
  allowedOutboundPorts:
    - 465
    - 587
  analytics:
    enabled: false
  dependencies:
    - name: olares
      type: system
      version: ">=1.10.1-0"
permission:
  appCache: false
  appData: true
  userData:
    - Home
spec:
  versionName: "2.32.1"
  featuredImage: https://app.cdn.olares.com/appstore/audiobookshelf/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/audiobookshelf/1.webp
    - https://app.cdn.olares.com/appstore/audiobookshelf/2.webp
    - https://app.cdn.olares.com/appstore/audiobookshelf/3.webp
    - https://app.cdn.olares.com/appstore/audiobookshelf/4.webp
  developer: "advplyr"
  website: https://www.audiobookshelf.org/
  sourceCode: https://github.com/advplyr/audiobookshelf
  fullDescription: |
    Audiobookshelf is a self-hosted audiobook and podcast server.

    Features
    - Fully open-source, including the android & iOS app (in beta)
    - Stream all audio formats on the fly
    - Search and add podcasts to download episodes w/ auto-download
    - Multi-user support w/ custom permissions
    - Keeps progress per user and syncs across devices
    - Auto-detects library updates, no need to re-scan
    - Upload books and podcasts w/ bulk upload drag and drop folders
    - Backup your metadata + automated daily backups
    - Progressive Web App (PWA)
    - Chromecast support on the web app and android app
    - Fetch metadata and cover art from several sources
    - Chapter editor and chapter lookup (using Audnexus API)
    - Merge your audio files into a single m4b
    - Embed metadata and cover image into your audio files
    - Basic ebook support and ereader
        - Epub, pdf, cbr, cbz
        - Send ebook to device (i.e. Kindle)
    - Open RSS feeds for podcasts and audiobooks
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://www.audiobookshelf.org/docs
  license:
    - text: GPL-3.0
      url: https://github.com/advplyr/audiobookshelf#GPL-3.0-1-ov-file
  requiredCpu: 200m
  limitedCpu: 1000m
  requiredMemory: 256Mi
  limitedMemory: 2048Mi
  requiredDisk: 50Mi
  upgradeDescription: |
    Upgrade app to v2.32.1. Changes from v2.25.1:

    Key changes:
    - New JWT authentication system with refresh tokens (v2.26.0)
    - Chapter editor enhancements with bulk chapter import
    - Book cover search now async with "Best" option (Audible + Google + FantLab)
    - HLS transcoding fix for AC3/EAC3 codecs
    - CORS origin whitelist support
    - Epub e-reader sepia theme
    - Upload progress indicator
    - Default token expiration extended (refresh 30d, access 1h)
    - OIDC auto redirect via query parameter
    - Multiple server crash fixes (Audible provider, FantLab timeout, transcode)
    - Various metadata matching and UI/UX improvements

    Full release notes: https://github.com/advplyr/audiobookshelf/releases/tag/v2.32.1
  supportArch:
    - amd64
    - arm64
