metadata:
  title: AudioBookShelf
  description: 自托管的有声读物和播客服务器
spec:
  fullDescription: |
    Audiobookshelf 是一个自托管的有声读物和播客服务器。

    功能
    - 完全开源，包含安卓和 iOS 应用（测试版）
    - 即时串流所有音频格式
    - 搜索并添加播客，下载剧集，并自动下载
    - 支持多用户，并可自定义权限
    - 保持每个用户的进度，并跨设备同步
    - 自动检测库更新，无需重新扫描
    - 使用拖放文件夹批量上传图书和播客
    - 备份元数据 + 自动每日备份
    - 渐进式 Web 应用 (PWA)
    - 网页应用和安卓应用均支持 Chromecast
    - 从多个来源获取元数据和封面
    - 章节编辑器和章节查找（使用 Audnexus API）
    - 将音频文件合并为单个 m4b 文件
    - 将元数据和封面图片嵌入音频文件
    - 基本电子书支持和电子阅读器
    - Epub、PDF、CBR、CBZ 格式
    - 将电子书发送至设备（例如 Kindle）
    - 为播客和有声读物打开 RSS 订阅
  upgradeDescription: |
    应用升级至 v2.32.1，自 v2.25.1 以来的主要变更：

    主要更新:
    - 全新 JWT 认证系统，支持 Refresh Token（v2.26.0）
    - 章节编辑器增强，支持批量章节导入
    - 书籍封面搜索改为异步，新增 "Best" 选项（Audible + Google + FantLab）
    - 修复 HLS 转码对 AC3/EAC3 编码失败的问题
    - 支持 CORS 来源白名单配置
    - Epub 阅读器新增棕褐色主题
    - 上传器显示进度指示器
    - 默认 Token 有效期延长（Refresh 30天，Access 1小时）
    - 登录页支持 OIDC 自动重定向
    - 修复多个服务器崩溃问题（Audible 提供者、FantLab 超时、转码）
    - 多项元数据匹配和界面体验改进

    完整升级说明请参阅: https://github.com/advplyr/audiobookshelf/releases/tag/v2.32.1
