metadata:
  title: Gemma4 12B Q8 (Ollama)
  description: "Gemma4 12B (Unsloth Dynamic UD-Q8_K_XL) multimodal local inference"

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth Dynamic quant from `unsloth/gemma-4-12b-it-GGUF` (`gemma-4-12b-it-UD-Q8_K_XL.gguf` + `mmproj-F16.gguf`).
    UD-Q8_K_XL targets higher fidelity than Q4 variants while staying practical on mid-size GPUs (~14GB weights on disk).
    Uses the GGUF embedded chat template for reliable tool calling and image input. Thinking enabled by default (OLLAMA_THINKING=""); clients can disable per request.

    Gemma 4 12B is a dense 12B-parameter instruction-tuned multimodal model.
