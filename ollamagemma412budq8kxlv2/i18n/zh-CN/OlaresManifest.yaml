metadata:
  title: Gemma4 12B Q8（Ollama）
  description: Gemma4 12B（Unsloth Dynamic UD-Q8_K_XL）多模态本地推理。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。
    用户流量通过代理流向 Ollama。

    **模型**
    使用来自 `unsloth/gemma-4-12b-it-GGUF` 的 Unsloth Dynamic 量化（`gemma-4-12b-it-UD-Q8_K_XL.gguf` + `mmproj-F16.gguf`）。
    UD-Q8_K_XL 在 Q4 系列之上追求更高精度，权重约 14GB，适合中等显存 GPU。
    使用 GGUF 内嵌对话模板，以支持工具调用与图片输入。默认开启思考（OLLAMA_THINKING=""），客户端可按需关闭以加速 agent/工具调用。

    Gemma 4 12B 为 Google DeepMind 的 120 亿参数稠密多模态指令模型。
