---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: ollamagemma412budq8kxlv2
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3-27B.png
  description: "Gemma4 12B (Unsloth Dynamic UD-Q8_K_XL) multimodal local inference"
  appid: ollamagemma412budq8kxlv2
  title: Gemma4 12B Q8 (Ollama)
  version: '1.0.2'
  categories:
    - AI
sharedEntrances:
  - name: ollamagemma412budq8kxlv2
    host: sharedentrances-api
    port: 0
    title: Gemma4 12B Q8
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3-27B.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Gemma4 12B Q8
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3-27B.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'gemma4:12b-it-ud-q8_K_XL'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth Dynamic quant from `unsloth/gemma-4-12b-it-GGUF` (`gemma-4-12b-it-UD-Q8_K_XL.gguf` + `mmproj-F16.gguf`).
    UD-Q8_K_XL targets higher fidelity than Q4 variants while staying practical on mid-size GPUs (~14GB weights on disk).
    Uses the GGUF embedded chat template (single-step files-API create) for reliable tool calling and image input. Thinking is enabled by default (OLLAMA_THINKING=""); clients can disable it per request for faster agent/tool loops.

    Gemma 4 12B is a dense instruction-tuned multimodal model from Google DeepMind (12B parameters).

    - Format: GGUF + mmproj (text + image)
    - Quantization: UD-Q8_K_XL (Unsloth Dynamic 2.0)
    - Context: 131072 (reduce if VRAM-constrained)
    - Backend: Ollama 0.30.10

  upgradeDescription: |
    Upgrade Ollama runtime to ollama/ollama:0.30.10.
    Upgrade Olares API proxy to beclab/harveyff-olares-ollama:v0.1.22 (OpenAI vision image_url forwarding).
  developer: Google (base) / Unsloth (GGUF)
  website: https://ai.google.dev/gemma
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma Terms of Use
      url: https://ai.google.dev/gemma/terms

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6200m
  requiredCpu: 500m
  requiredDisk: 50Mi
  limitedDisk: 80Gi
  limitedMemory: 28Gi
  requiredMemory: 3500Mi
  requiredGpu: 12Gi
  limitedGpu: 20Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamagemma412budq8kxlv2s
    shared: true
  - name: ollamagemma412budq8kxlv2
permission:
  appData: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamagemma412budq8kxlv2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0,<1.12.6'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamagemma412budq8kxlv2
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: KEEP_ALIVE
    required: true
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
{{- end }}
