---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    upstream whisperwebui_backend {
      server whisperwebui-svc.whisperwebuiv2server-shared:7860 max_fails=1 fail_timeout=2s;
      server download-svc.whisperwebuiv2server-shared:8090 backup;
    }

    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      location /config {
        proxy_pass http://whisperwebui-svc.whisperwebuiv2server-shared:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
        add_header Access-Control-Allow-Headers "deviceType,token,authorization,content-type,x-csrftoken";

        if ($request_method = 'OPTIONS') {
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
          add_header Access-Control-Allow-Headers "deviceType,token,authorization,content-type,x-csrftoken";
          return 204;
        }
      }

      location / {
        proxy_pass http://whisperwebui_backend;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_connect_timeout 600s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_body_timeout 3600s;
        client_max_body_size 500m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
        add_header Access-Control-Allow-Headers "deviceType,token,authorization,content-type,x-csrftoken";

        if ($request_method = 'OPTIONS') {
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
          add_header Access-Control-Allow-Headers "deviceType,token,authorization,content-type,x-csrftoken";
          return 204;
        }
      }
    }

    # Terminal entrance (:8081)
    server {
      listen 8081;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      client_max_body_size 10m;

      proxy_connect_timeout                          30s;
      proxy_send_timeout                             300s;
      proxy_read_timeout                             300s;
      proxy_set_header      Host                      $host;
      proxy_set_header      X-Forwarded-Host          $http_host;
      proxy_set_header      X-Real-IP                 $remote_addr;
      proxy_set_header      X-Forwarded-For           $proxy_add_x_forwarded_for;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      location / {
          resolver coredns.kube-system.svc.cluster.local valid=10s;
          proxy_pass http://terminal.whisperwebuiv2server-shared:80;
          proxy_connect_timeout 60s;
          proxy_read_timeout 300s;
          proxy_send_timeout 300s;
      }
    }

    # Whisper-WebUI API entrance (:8082)
    server {
      listen 8082;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      client_max_body_size 500m;

      proxy_buffering off;
      proxy_redirect off;
      proxy_connect_timeout                          600s;
      proxy_send_timeout                             3600s;
      proxy_read_timeout                             3600s;
      proxy_set_header      Host                      $host;
      proxy_set_header      X-Forwarded-Host          $http_host;
      proxy_set_header      X-Forwarded-Proto         $http_x_forwarded_proto;
      proxy_set_header      X-Real-IP                 $remote_addr;
      proxy_set_header      X-Forwarded-For           $proxy_add_x_forwarded_for;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      location /healthz {
          return 200 'ok';
          add_header Content-Type text/plain;
      }

      location / {
          resolver coredns.kube-system.svc.cluster.local valid=10s;
          proxy_pass http://whisperwebui-svc.whisperwebuiv2server-shared:8000;
          proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
          proxy_connect_timeout 600s;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
          client_max_body_size 500m;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: whisperwebuiweb
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: whisperwebuiweb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: whisperwebuiweb
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 8081
              protocol: TCP
            - containerPort: 8082
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
                  [ $http_code -ge 200 ] && [ $http_code -lt 500 ]
            initialDelaySeconds: 2
            timeoutSeconds: 3
            periodSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: whisperwebui-web-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    io.kompose.service: whisperwebuiweb
  ports:
    - name: ui
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: terminal
      protocol: TCP
      port: 8081
      targetPort: 8081
    - name: api
      protocol: TCP
      port: 8082
      targetPort: 8082
