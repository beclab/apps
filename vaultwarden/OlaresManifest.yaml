olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v1'
metadata:
  name: vaultwarden
  description: Alternative Bitwarden compatible server written in Rust.
  icon: https://app.cdn.olares.com/appstore/vaultwarden/icon.png
  appid: vaultwarden
  version: '1.0.1'
  title: Vaultwarden
  categories:
  - Productivity_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.36.0'
  fullDescription: |
    Vaultwarden is an alternative Bitwarden compatible server written in Rust, compatible with upstream Bitwarden clients.

    **Features**
    A nearly complete implementation of the Bitwarden Client API is provided, including:

    - [Personal Vault](https://bitwarden.com/help/managing-items/)
    - [Send](https://bitwarden.com/help/about-send/)
    - [Attachments](https://bitwarden.com/help/attachments/)
    - [Website icons](https://bitwarden.com/help/website-icons/)
    - [Personal API Key](https://bitwarden.com/help/personal-api-key/)
    - [Organizations](https://bitwarden.com/help/getting-started-organizations/)
      - [Collections](https://bitwarden.com/help/about-collections/),
        [Password Sharing](https://bitwarden.com/help/sharing/),
        [Member Roles](https://bitwarden.com/help/user-types-access-control/),
        [Groups](https://bitwarden.com/help/about-groups/),
        [Event Logs](https://bitwarden.com/help/event-logs/),
        [Admin Password Reset](https://bitwarden.com/help/admin-reset/),
        [Directory Connector](https://bitwarden.com/help/directory-sync/),
        [Policies](https://bitwarden.com/help/policies/)
    - [Multi/Two Factor Authentication](https://bitwarden.com/help/bitwarden-field-guide-two-step-login/)
      - [Authenticator](https://bitwarden.com/help/setup-two-step-login-authenticator/),
        [Email](https://bitwarden.com/help/setup-two-step-login-email/),
        [FIDO2 WebAuthn](https://bitwarden.com/help/setup-two-step-login-fido/),
        [YubiKey](https://bitwarden.com/help/setup-two-step-login-yubikey/),
        [Duo](https://bitwarden.com/help/setup-two-step-login-duo/)
    - [Emergency Access](https://bitwarden.com/help/emergency-access/)
    - [Vaultwarden Admin Backend](https://github.com/dani-garcia/vaultwarden/wiki/Enabling-admin-page)
    - [Modified Web Vault client](https://github.com/dani-garcia/bw_web_builds) (Bundled within our containers)
    
  developer: Dani Garcia
  website: https://github.com/dani-garcia/vaultwarden
  sourceCode: https://github.com/dani-garcia/vaultwarden
  submitter: Inverstar
  locale:
  - en-US
  - zh-CN
  requiredMemory: 16Mi
  limitedMemory: 256Mi
  requiredDisk: 128Mi
  limitedDisk: 1Gi
  requiredCpu: 0.05
  limitedCpu: 0.5
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
entrances:
- name: vaultwarden
  port: 80
  host: vaultwarden
  title: Vaultwarden
  icon: https://app.cdn.olares.com/appstore/vaultwarden/icon.png
  openMethod: window
envs:
  - envName: SIGNUPS_ALLOWED
    required: false
    editable: true
    applyOnChange: true
    type: bool
    default: "true"
  - envName: WEBSOCKET_ENABLED
    required: false
    editable: true
    applyOnChange: true
    type: bool
    default: "true"
  - envName: ADMIN_TOKEN
    required: false
    editable: true
    applyOnChange: true
    type: password
    default: ""
