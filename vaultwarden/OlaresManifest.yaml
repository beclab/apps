olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: vaultwarden
  description: Alternative Bitwarden compatible server written in Rust.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: vaultwarden
  version: '1.0.0'
  title: Vaultwarden
  categories:
  - Productivity_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.36.0'
  featuredImage: https://app.cdn.olares.com/appstore/memos/1.jpg
  promoteImage:
  - https://app.cdn.olares.com/appstore/memos/1.jpg
  fullDescription: |
    Vaultwarden is an alternative Bitwarden compatible server written in Rust, compatible with upstream Bitwarden clients.
  developer: Dani Garcia
  website: https://github.com/dani-garcia/vaultwarden
  sourceCode: https://github.com/dani-garcia/vaultwarden
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 16Mi
  limitedMemory: 256Mi
  requiredDisk: 128Mi
  limitedDisk: 1Gi
  requiredCpu: 0.05
  limitedCpu: 0.5
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.10.1-0'
entrances:
- name: vaultwarden
  port: 80
  host: vaultwarden
  title: Vaultwarden
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  openMethod: window
envs:
  - envName: SIGNUPS_ALLOWED
    required: false
    editable: true
    applyOnChange: true
    type: string
    default: "true"
  - envName: WEBSOCKET_ENABLED
    required: false
    editable: true
    applyOnChange: true
    type: string
    default: "true"
  - envName: ADMIN_TOKEN
    required: false
    editable: true
    applyOnChange: true
    type: password
    default: ""
