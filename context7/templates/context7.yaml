---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context7
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: context7
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: context7
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: context7
        bytetrade.io/terminal: context7
    spec:
      initContainers:
        - name: init-tools
          image: "docker.io/beclab/upstash-context7-mcp:2.1.4"
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache bash
              npm install -g ctx7
              cp -a /usr/local/* /mnt/tools/
              cp /bin/bash /mnt/tools/bin/bash
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: usr-local
              mountPath: /mnt/tools
      containers:
        - name: context7
          image: "docker.io/beclab/upstash-context7-mcp:2.1.4"
          securityContext:
            runAsUser: 1000
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: PORT
              value: "8080"
            {{- if .Values.olaresEnv.CONTEXT7_API_KEY }}
            - name: CONTEXT7_API_KEY
              value: "{{ .Values.olaresEnv.CONTEXT7_API_KEY }}"
            {{- end }}
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: usr-local
              mountPath: /usr/local
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: usr-local
          emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: context7
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: context7
spec:
  ports:
    - name: mcp
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: context7
status:
  loadBalancer: {}
