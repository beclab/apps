---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    # Terminal (primary entrance)
    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      client_max_body_size 10m;

      proxy_connect_timeout                          30s;
      proxy_send_timeout                             300s;
      proxy_read_timeout                             300s;
      proxy_set_header      host                      $host;
      proxy_set_header      x-forwarded-host          $http_host;
      proxy_set_header      x-real-ip                 $remote_addr;
      proxy_set_header      x-forwarded-for           $proxy_add_x_forwarded_for;

      proxy_http_version 1.1;
      proxy_set_header upgrade $http_upgrade;
      proxy_set_header connection "upgrade";

      location / {
          proxy_pass http://terminal:80;
          proxy_connect_timeout 60s;
          proxy_read_timeout 300s;
          proxy_send_timeout 300s;
      }
    }

    # MCP API (secondary entrance)
    server {
      listen 8081;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      client_max_body_size 10m;

      proxy_connect_timeout                          60s;
      proxy_send_timeout                             1800s;
      proxy_read_timeout                             1800s;
      proxy_set_header      host                      $host;
      proxy_set_header      x-forwarded-host          $http_host;
      proxy_set_header      x-real-ip                 $remote_addr;
      proxy_set_header      x-forwarded-for           $proxy_add_x_forwarded_for;

      proxy_http_version 1.1;
      proxy_set_header upgrade $http_upgrade;
      proxy_set_header connection "upgrade";

      location /healthz {
          return 200 'ok';
          add_header Content-Type text/plain;
      }

      location / {
          proxy_pass http://context7:8080;
          proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
          proxy_connect_timeout 60s;
          proxy_read_timeout 1800s;
          proxy_send_timeout 1800s;
          client_max_body_size 10m;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: context7ingress
  name: context7ingress
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: context7ingress
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: context7ingress
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 438
            items:
            - key: nginx.conf
              path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 8081
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: context7ingress
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: context7ingress
  ports:
    - name: terminal
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: mcp
      protocol: TCP
      port: 8081
      targetPort: 8081
