metadata:
  description: 唤醒您的家
  title: Home Assistant
spec:
  fullDescription: |
    Home Assistant 提供开源家居自动化，重视本地控制与隐私。由全球DIY爱好者和技术达人共同推动。非常适合在本地服务器上运行。

    功能介绍
    **兼容超1000个品牌**
    Home Assistant 能与逾千种设备和服务互联互通。启动后，Home Assistant 会自动在网络中查找并便捷配置识别到的设备。

    **强大的自动化**
    整合家中所有设备后，可利用 Home Assistant 强大的自动化引擎，让家居生活更智能。

    **系统可扩展**
    Home Assistant 的功能不止于此。安装其他应用，助您更好地管理家居。

    **数据保持本地**
    Home Assistant 的设备通讯本地完成，必要时才从云端获取数据。数据不存云端，全部本地处理。

    **移动应用**
    通过官方 Home Assistant 应用，您可以快速控制家中设备，及时接收家里的即时消息，甚至在 Apple Watch 上操作。
    应用还能用于家庭位置监控，加强自动化功能。数据直连家中，无第三方访问。

    **能源管理**
    通过 Home Assistant 的家庭能源管理功能，优化能源使用。洞察能源消耗，优化太阳能板性能，规划用电，节约开支。

  upgradeDescription: |
    升级应用版本至 2026.3.1
  
    Home Assistant 2026.3 带来了多项稳定性改进以及新的功能体验。
  
    升级亮点
    - 机器人吸尘器现在可以将清扫分区映射到 Home Assistant 的区域，实现按房间清扫。
    - 自动化新增 “Continue on Error（发生错误时继续执行）” 选项，可在 UI 中直接配置。
    - 能源面板改进：电力监控展示更清晰，并优化了提示信息显示。
    - Android 设备现在可以作为语音卫星使用，支持本地唤醒词检测。
    - Proxmox 集成新增 CPU、内存、磁盘使用率以及虚拟机状态传感器。
    - 新增 OneDrive for Business 作为备份存储位置。
    - 系统升级至 Python 3.14，并带来多项性能和稳定性优化。
    - 新增 50+ 集成，并对大量现有集成进行了改进。
  
    查看完整更新说明：
    https://www.home-assistant.io/blog/2026/03/04/release-20263/
