apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      upstream homeassistant {
        server 127.0.0.1:8123;
      }

      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      server {
        listen 8001;
        server_name _;

        client_max_body_size 0;
        proxy_connect_timeout 60s;

        location / {
          proxy_pass http://homeassistant;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          # The Olares entrance terminates HTTPS and forwards plain HTTP to this
          # sidecar, so $scheme is "http" here. Hard-code "https" so Home Assistant
          # sees the same scheme as the browser's https://<entrance>.olares.com
          # origin; otherwise the onboarding auth redirect/token exchange after
          # account creation fails.
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_buffering off;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
          add_header X-Frame-Options "";
        }
      }
    }
