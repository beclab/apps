metadata:
  title: DeepSeek-OCR-2 WebUI
  description: 开箱即用的 DeepSeek-OCR-2 Web 界面
spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，在 Olares 内部仅会部署一个服务。每个用户可以安装一个桌面入口进行访问或使用共享入口进行API调用。

    ## 应用概览 ##
    DeepSeek-OCR-WebUI 是一个基于 DeepSeek-OCR-2 模型（Visual Causal Flow）的智能图像识别 Web 应用程序，提供直观用户界面和强大的识别能力。
    
    主要特性：
    • DeepSeek-OCR-2 模型 - 基于 Visual Causal Flow 架构的新一代 OCR
    • 7 种识别模式，适用于不同场景
    • 支持批量处理多张图片
    • 边界框可视化 - 查找模式自动标注位置
    • 支持 PDF 上传和转换
    • 现代化直观的用户界面
    • 多语言支持（简体中文、繁体中文、英语、日语）
    • GPU 加速 - 基于 NVIDIA GPU 的高性能推理
    • 自动模型下载 - 内置 HuggingFace 模型下载器，支持进度追踪
    • ModelScope 备选 - HuggingFace 不可用时自动切换到 ModelScope
  upgradeDescription: |
    将模型下载器与 OCR 服务拆分为独立的 Deployment，提升资源隔离性和生命周期管理。