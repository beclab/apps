metadata:
  title: Bifrost
  description: 全球最快的企业级AI网关
spec:
  fullDescription: |
    Bifrost 是一款高性能的人工智能网关，它通过一个与 OpenAI 兼容的单一 API，统一了对 15 家以上供应商（包括 OpenAI、Anthropic、AWS Bedrock、Google Vertex 等）的访问。部署在数秒内完成，还能获得自动故障转移、负载均衡、语义缓存以及企业级功能。

    **主要特性**
    - 统一接口：通过一个与 OpenAI 兼容的单一 API，统一了对 15 家以上供应商（包括 OpenAI、Anthropic、AWS Bedrock、Google Vertex 等）的访问。
    - 高可用架构：无缝故障转移和负载均衡，确保零服务中断。
    - 语义缓存：基于语义相似度智能缓存响应，显著降低成本和延迟。
    - 多模态支持：统一支持文本、图像、音频和流式传输，所有功能都通过一个共同接口实现。
    - 企业控制：预算管理、SSO 集成、细粒度访问控制和端到端可观测性。
    - 零代码迁移：一键替换现有的 OpenAI/Anthropic/GenAI API，无需代码集成即可用于流行的 AI SDK。
  upgradeDescription: |
    **在升级前备份数据！**
    升级 Bifrost 版本至 1.5.13
    切换到文件配置模式并从 PostgreSQL 切换到 SQLite

    更新内容（截至 v1.5.13）：
    - MCP 服务器库：可浏览的 MCP 服务器目录，支持后台同步、搜索与筛选、安装面板，以及多 harness 的 agent 连接流程。
    - 复杂度路由：通过 complexity_tier 表达式按提示词复杂度路由请求，分析器可配置。
    - 密钥的 Vault 后端：敏感配置可存入 AWS Secrets Manager、GCP Secret Manager 或 HashiCorp Vault，作为 AES 加密之外的选择。
    - 按别名的服务商覆盖：密钥别名可覆盖 Azure 端点/API 版本、Anthropic 版本、Bedrock 区域/ARN、Vertex 项目/区域以及 Replicate 端点。
    - 虚拟密钥配额 API 支持按模型统计用量；新增 OTEL HTTP 层指标与按连接器的 span 过滤。
    - 通配符（"*"）允许列表现在能正确放行目录无法枚举的服务商的任意模型（自托管 vLLM/Ollama/SGL 及自定义服务商）。
    - 修复：开启面板密码认证时，虚拟密钥推理不再返回 401；并修复 Gemini 工具响应、OpenRouter cache_control 保留、Postgres 日志库筛选与分页等问题。

    完整发布说明请见：https://docs.getbifrost.ai/changelogs/v1.5.13
