
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: bifrost
spec:
  replicas: {{ .Values.workloads.bifrost.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: bifrost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: bifrost
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
          args:
            - |
              mkdir -p /app/data/logs
              # Seed the gateway config.json ONCE from the chart default if absent, then
              # leave it alone -> the file lives on the writable appData volume and is
              # USER-EDITABLE (no read-only mount). Upgrades from old releases are safe:
              # those shipped config.json as a read-only ConfigMap mount (never written
              # to appData), so on upgrade the file is absent here and gets seeded fresh
              # with the current SQLite wiring.
              if [ ! -f /app/data/config.json ]; then
                cp /etc/bifrost-default/config.json /app/data/config.json
              fi
              chown -R 1000:1000 /app/data
              chmod -R 755 /app/data
          resources: { }
          volumeMounts:
            - name: bifrost-data
              mountPath: /app/data
            # Read-only source for the one-time config.json seed above.
            - name: bifrost-config
              mountPath: /etc/bifrost-default
              readOnly: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: bifrost
          image: docker.io/beclab/maximhq-bifrost:v1.5.13
          envFrom:
            - configMapRef:
                name: bifrost-env
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.port | default 3000 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.port | default 3000 }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            # config.json is seeded once onto this volume by the init container and is
            # user-editable (no read-only mount); the gateway reads it from app-dir.
            - name: bifrost-data
              mountPath: /app/data

      restartPolicy: Always
      volumes:
        - name: bifrost-data
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appData }}'
        - name: bifrost-config
          configMap:
            name: bifrost-config

---
apiVersion: v1
kind: Service
metadata:
  name: bifrost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: bifrost
spec:
  ports:
    - name: "{{ .Values.port | default 3000 }}"
      port: {{ .Values.port | default 3000 }}
      targetPort: {{ .Values.port | default 3000 }}
      protocol: TCP
  selector:
    io.kompose.service: bifrost
status:
  loadBalancer: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-bifrost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: bifrost
spec:
  ports:
    - name: "{{ .Values.port | default 3000 }}"
      port: 80
      targetPort: {{ .Values.port | default 3000 }}
  selector:
    io.kompose.service: bifrost
status:
  loadBalancer: {}
