# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas.deployments in OlaresManifest).
#   vllmllmbasev3 — engine Deployment (== appid / Release.Name)
#   llminit        — llm-init / entrance Deployment
workloads:
  llminit:
    replicaCount: 1
  vllmllmbasev3:
    replicaCount: 1

# vLLM engine images by Olares accelerator mode (override in fork/preset if needed).
engine:
  images:
    nvidia: docker.io/vllm/vllm-openai:v0.24.0-cu129
    nvidiaArm64: docker.io/vllm/vllm-openai:v0.24.0-aarch64-cu129
    nvidiaGb10: docker.io/vllm/vllm-openai:latest-aarch64-cu130
