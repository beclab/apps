spec:
  versionName: 'gemma4:26b-a4b-it-ud-q4_K_XL'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Gemma 4 26B-A4B is a mixture-of-experts instruction-tuned model from Google DeepMind. This chart downloads **gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf** from [unsloth/gemma-4-26B-A4B-it-GGUF](https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF), registers it in Ollama as **gemma4:26b-a4b-it-ud-q4_K_XL**, and exposes the same Olares Ollama proxy flow as Qwen3.5 UD-Q4 charts.

    - Format: GGUF (text-only; vision/image input is not included to maximize context length and throughput)
    - Quantization: UD-Q4_K_XL (Unsloth Dynamic 2.0)
    - Context: 131072 (configured via Modelfile / Ollama env; reduce if VRAM-constrained)
    - Backend: Ollama 0.20.5

  upgradeDescription: |
    Upgrades bundled Ollama to [0.20.5](https://github.com/ollama/ollama/releases/tag/v0.20.5). Highlights: OpenClaw channel setup via `ollama launch openclaw` (WhatsApp, Telegram, Discord, etc.); flash attention for Gemma 4 on compatible GPUs; curl-based OpenCode installs detected at `~/.opencode/bin`; fix `/save` for safetensors-based model architectures.

  developer: Google (base) / Unsloth (GGUF)
  website: https://ai.google.dev/gemma
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma Terms of Use
      url: https://ai.google.dev/gemma/terms

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
