  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 60Gi
  limitedMemory: 40Gi
  requiredMemory: 4200Mi
  requiredGpu: 23Gi
  limitedGpu: 28Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
