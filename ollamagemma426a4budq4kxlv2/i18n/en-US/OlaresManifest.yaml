metadata:
  title: Gemma4 26B A4B UD-XL (Ollama)
  description: "Gemma4 26B A4B MoE (Unsloth Dynamic UD-Q4_K_XL) multimodal local inference"

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth Dynamic quant from `unsloth/gemma-4-26B-A4B-it-GGUF` (`gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf` + `mmproj-F16.gguf`).
    Mixed-precision UD quantization preserves quality near Q5_K_M while keeping decode throughput close to standard Q4_K_M, with full vision (mmproj) retained.
    Uses the GGUF embedded chat template for reliable tool calling and image input. Thinking enabled by default (OLLAMA_THINKING=""); clients can disable per request.

    Gemma 4 26B-A4B is a Mixture-of-Experts model: 26B total parameters with ~4B activated per token.

  upgradeDescription: |
    Add vision: `mmproj-F16.gguf` + embedded chat template for tools/vision. Disk hygiene + proxy v0.1.21, Ollama 0.30.0. Context 131072, KV cache q8_0.
