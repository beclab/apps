metadata:
  title: Gemma4 26B A4B UD-Q4(Ollama)
  description: Gemma 4 26B-A4B, Unsloth UD-Q4_K_XL GGUF, Ollama.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Gemma 4 26B-A4B is a mixture-of-experts instruction-tuned model from Google DeepMind. This chart downloads **gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf** from [unsloth/gemma-4-26B-A4B-it-GGUF](https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF), registers it in Ollama as **gemma4:26b-a4b-it-ud-q4_K_XL**, using the same Olares Ollama proxy pattern as the Qwen3.5 UD-Q4 charts.

    - Quantization: UD-Q4_K_XL (Unsloth Dynamic 2.0)
    - Context: 131072 (lower if VRAM is tight)
    - Backend: Ollama 0.20.0

  upgradeDescription: |
    Initial release aligned with ollamaqwen35a3budq4klv2 (HF single-file pull, Modelfile, optional KEEP_ALIVE preload). Ollama 0.20.0 for Gemma 4 compatibility.
