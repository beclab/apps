metadata:
  title: Gemma4 26B A4B UD-Q4(Ollama)
  description: Gemma 4 26B-A4B，Unsloth UD-Q4_K_XL GGUF，Ollama。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型 ##
    Gemma 4 26B-A4B 为 Google DeepMind 的混合专家（MoE）指令微调模型。本 Chart 从 [unsloth/gemma-4-26B-A4B-it-GGUF](https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF) 下载 **gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf**，在 Ollama 中注册为 **gemma4:26b-a4b-it-ud-q4_K_XL**，流程与 Qwen3.5 UD-Q4 系列 Ollama 应用一致。

    - 量化：UD-Q4_K_XL（Unsloth Dynamic 2.0）
    - 上下文：131072（可在显存不足时调低）
    - 后端：Ollama 0.20.3

