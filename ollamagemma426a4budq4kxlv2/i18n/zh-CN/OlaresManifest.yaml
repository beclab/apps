metadata:
  title: Gemma4 26B A4B UD-XL（Ollama）
  description: Gemma4 26B A4B MoE（Unsloth Dynamic UD-Q4_K_XL）多模态本地推理。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。
    用户流量通过代理流向 Ollama。

    **模型**
    使用来自 `unsloth/gemma-4-26B-A4B-it-GGUF` 的 Unsloth Dynamic 量化（`gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf` + `mmproj-F16.gguf`）。
    UD 混合精度量化在保持接近 Q5_K_M 的质量的同时，吞吐接近标准 Q4_K_M，并完整保留视觉能力（mmproj）。
    使用 GGUF 内嵌对话模板，以支持工具调用与图片输入。默认开启思考（OLLAMA_THINKING=""），客户端可按需关闭以加速 agent/工具调用。

    Gemma 4 26B-A4B 为混合专家（MoE）模型：总参数 26B，每 token 约激活 4B。

  upgradeDescription: |
    升级 Ollama 运行时至 ollama/ollama:0.30.10。
    升级 Olares API 代理至 beclab/harveyff-olares-ollama:v0.1.22（OpenAI vision image_url 转发）。
