# Olares chart renderer does not support Helm .Files.Get — keep content inline (sync with TradingAgents .env.example when updating).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tradingagents-dotenv-template
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: tradingagents
data:
  dotenv: |
    # LLM Providers (set the one you use)
    OPENAI_API_KEY=
    GOOGLE_API_KEY=
    ANTHROPIC_API_KEY=
    XAI_API_KEY=
    DEEPSEEK_API_KEY=
    DASHSCOPE_API_KEY=
    ZHIPU_API_KEY=
    OPENROUTER_API_KEY=
