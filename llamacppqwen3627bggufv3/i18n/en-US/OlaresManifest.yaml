metadata:
  description: "Qwen3.6-27B (GGUF Q4_K_M) served with llama.cpp."
  title: Qwen3.6-27B (llama.cpp)

spec:
  fullDescription: |
    **Model Overview**
    Qwen3.6-27B is a vision-language model from the Qwen series (Alibaba). It integrates multimodal understanding with a built-in vision encoder, supports very long context windows, and ships with thinking, tool-calling, and vision capabilities. This app serves the `Q4_K_M` GGUF build from `unsloth/Qwen3.6-27B-GGUF` via llama.cpp.

    Recommended as the default model for most scenarios, this model excels at agentic coding, multimodal vision, conversational interaction, and long-text processing. It also performs particularly well on automated terminal operations and code writing.

    **Preset Configuration**
    - Model: `unsloth/Qwen3.6-27B-GGUF:Q4_K_M` (with `mmproj-F16.gguf` projector for vision)
    - Capabilities: thinking, tools, vision
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0 --jinja -np 1` (128K context, full GPU offload, KV cache quantized to q8_0)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    
    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving the model when it's ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

