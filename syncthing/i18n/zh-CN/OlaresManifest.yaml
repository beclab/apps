metadata:
  title: Syncthing
  description: Syncthing 是一个开源的即时文件同步工具，支持在两台或多台计算机之间实时、安全、私密地同步文件。
spec:
  fullDescription: |
    Syncthing 是一个跨平台的文件同步客户端。它不需要将文件上传到第三方云服务器，而是通过点对点（P2P）加密连接，直接在您的多台设备（电脑、手机、NAS 等）之间同步文件。

    **主要功能：**
    - **安全与私密**：所有传输经过 TLS 加密，数据仅存储在您信任的设备上。
    - **简单易用**：内置直观的 Web GUI，便于配置和监控同步状态。
    - **多目录同步**：支持添加多个不同的文件夹，分别与不同的设备进行同步。
    - **局域网秒传**：在局域网内能够自动发现设备并以最高带宽进行高速同步。
