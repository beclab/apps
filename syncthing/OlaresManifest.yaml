olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v1'
metadata:
  name: syncthing
  description: Syncthing is a continuous file synchronization program. It synchronizes files between two or more computers in real time.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: syncthing
  version: '1.0.0'
  title: Syncthing
  categories:
  - Utilities_v112
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.27.12'
  fullDescription: |
    Syncthing is a continuous file synchronization program. It synchronizes files between two or more computers in real time, safely and privately.
  developer: Syncthing
  website: https://syncthing.net/
  sourceCode: https://github.com/syncthing/syncthing
  submitter: Inverstar
  locale:
  - en-US
  - zh-CN
  requiredMemory: 128Mi
  limitedMemory: 1024Mi
  requiredDisk: 128Mi
  limitedDisk: 10Gi
  requiredCpu: 0.1
  limitedCpu: 2
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0,<1.12.6'
entrances:
- name: syncthing-service
  port: 8384
  host: syncthing-service
  title: Syncthing
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  openMethod: window
ports:
- name: sync
  host: syncthing-service
  port: 22000
