metadata:
  title: WealthPilot
  description: AI-powered personal finance tracker with smart categorization, budgets, and spending predictions
spec:
  fullDescription: |
    WealthPilot is a self-hosted AI-powered personal finance tracker that helps you take control of your money with complete privacy.

    Features:
    - Smart AI Categorization: Automatically categorizes your transactions into 21 categories
    - Visual Dashboard: Beautiful charts showing spending trends and category breakdowns
    - Budget Management: Set monthly budgets per category with alerts
    - Savings Goals: Define objectives with target amounts and deadlines
    - CSV Import: Import transactions from any bank via CSV files
    - Spending Predictions: AI-powered predictions based on historical patterns
    - Anomaly Detection: Alerts about unusual transactions
    - Privacy First: All data stays on YOUR server
