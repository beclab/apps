metadata:
  title: WealthPilot
  description: 具备智能分类、预算与消费预测的 AI 个人理财追踪工具
spec:
  fullDescription: |
    WealthPilot 是一款自托管的 AI 个人理财追踪应用，帮助你在完全隐私的前提下掌控财务。

    **主要功能：**
    - 智能 AI 分类：自动将交易归入 21 个类别
    - 可视化仪表盘：展示消费趋势与分类占比
    - 预算管理：按类别设置月度预算并接收提醒
    - 储蓄目标：设定目标金额与截止日期并可视化进度
    - CSV 导入：从任意银行通过 CSV 导入交易
    - 消费预测：基于历史数据的 AI 预测，便于提前规划
    - 异常检测：对偏离日常消费的异常交易发出提醒
    - 隐私优先：所有数据保存在你自己的服务器上
