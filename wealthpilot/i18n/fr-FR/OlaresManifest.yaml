metadata:
  title: WealthPilot
  description: Suivi financier personnel propulsé par l'IA avec catégorisation intelligente, budgets et prévisions de dépenses
spec:
  fullDescription: |
    WealthPilot est un suivi financier personnel auto-hébergé propulsé par l'IA, pour maîtriser votre argent en toute confidentialité.

    Fonctionnalités :
    - Catégorisation intelligente : classe automatiquement vos transactions dans 21 catégories
    - Tableau de bord visuel : graphiques des tendances et répartition par catégorie
    - Gestion du budget : budgets mensuels par catégorie avec alertes
    - Objectifs d'épargne : montants cibles et échéances avec suivi visuel
    - Import CSV : importez les transactions de n'importe quelle banque
    - Prévisions de dépenses : prédictions basées sur l'historique
    - Détection d'anomalies : alertes sur les transactions inhabituelles
    - Confidentialité d'abord : toutes les données restent sur VOTRE serveur
