olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: wealthpilot
  description: AI-powered personal finance tracker with smart categorization, budgets, and spending predictions
  icon: https://phoenix--ai.com/static/wealthpilot-icon.svg
  appid: wealthpilot
  version: '1.0.0'
  title: WealthPilot
  categories:
  - Utilities
  - Productivity
permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: '1.0.0'
  fullDescription: |
    WealthPilot is a self-hosted AI-powered personal finance tracker that helps you take control of your money with complete privacy.

    **Features**

    Smart AI Categorization
    - Automatically categorizes your transactions into 21 categories using intelligent pattern matching. Supports French and English merchants.

    Visual Dashboard
    - Beautiful charts showing your spending trends, category breakdowns, and monthly comparisons at a glance.

    Budget Management
    - Set monthly budgets per category and get alerts when you're approaching your limits.

    Savings Goals
    - Define savings objectives with target amounts and deadlines. Track your progress visually.

    CSV Import
    - Import transactions from any bank via CSV files. Supports multiple date and amount formats.

    Spending Predictions
    - AI-powered predictions based on your historical spending patterns help you plan ahead.

    Anomaly Detection
    - Get alerted about unusual transactions that deviate significantly from your normal spending.

    **Privacy First**
    - All your financial data stays on YOUR server. No cloud, no third-party access, no tracking.
  developer: SecurePlatform45
  website: https://github.com/veyvey45-eng/wealthpilot
  sourceCode: https://github.com/veyvey45-eng/wealthpilot
  submitter: veyvey45-eng
  locale:
    - en-US
    - fr-FR
  requiredMemory: 256Mi
  limitedMemory: 512Mi
  requiredDisk: 128Mi
  limitedDisk: 1Gi
  requiredCpu: 100m
  limitedCpu: 1
  doc: https://github.com/veyvey45-eng/wealthpilot
  license:
  - text: MIT
    url: https://github.com/veyvey45-eng/wealthpilot/blob/main/LICENSE
  supportArch:
    - amd64
    - arm64
options:
  dependencies:
    - name: olares
      type: system
      version: '>=1.10.0-0'
entrances:
- authLevel: private
  host: wealthpilot-svc
  icon: https://raw.githubusercontent.com/veyvey45-eng/apps/main/wealthpilot/icon.png
  name: wealthpilot
  openMethod: window
  port: 8080
  title: WealthPilot
