apiVersion: apps/v1
kind: Deployment
metadata:
  name: wealthpilot
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: wealthpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: wealthpilot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: wealthpilot
    spec:
      containers:
        - name: wealthpilot
          image: docker.io/secureplatform45/wealthpilot:{{ .Values.image.version }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 128Mi
              cpu: 100m
          volumeMounts:
            - name: data
              mountPath: /app/data
      restartPolicy: Always
      volumes:
        - name: data
          hostPath:
            type: DirectoryOrCreate
            path: {{ .Values.userspace.appdata }}/wealthpilot

---
apiVersion: v1
kind: Service
metadata:
  name: wealthpilot-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: wealthpilot
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
