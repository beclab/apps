# Default values for merchant.
# Runtime values (postgres, redis, olaresEnv, user) are injected by the Olares
# installer at deploy time from OlaresManifest.yaml (middleware/envs) and system context.
workloads:
  merchant-pg-client:
    replicaCount: 1
  merchant-vc:
    replicaCount: 1
  merchant-ssi:
    replicaCount: 1
  merchant-vc-gateway:
    replicaCount: 1
  merchant:
    replicaCount: 1
  merchant-front:
    replicaCount: 1
