metadata:
  title: Jaaz
  description: AI设计Agent，Lovart的本地替代品
spec:
  fullDescription: |
    全球首款开源多模态创意Agent，兼顾隐私、本地使用和易用性，是 Lovart、Manus 和 Figma 的替代方案。

    主要功能
    智能提示Agent：Jaaz 由 LLM 提供支持，能够解读您的想法并生成优化的提示，助您创作高质量的图像或故事板。

    混合模型部署：可通过 Ollama、ComfyUI 以及 Replicate、OpenAI 或 Claude 等远程 API 与本地模型协同工作。可完全本地运行或连接到云端。

    轻松访问所有强大的 API：登录后，即可使用所有最新模型（gpt-image-1、flux kntext、google……）

    交互式图像编辑：支持通过 Flux Kontext 进行对象插入、风格迁移和多字符连贯性等高级操作，所有操作均可通过聊天控制。

    无限画布和故事板：只需拖放即可轻松设计布局、规划场景并创建视觉叙事流程。

    （即将推出）视频代理：通过 Wan2.1、Kling 等模型生成和编辑视频，与您的创意工作流程无缝集成。智能调用自定义的 comfyui 工作流程。

  upgradeDescription: |
    将应用版本对齐至上游 Jaaz v1.0.30，并刷新运行时镜像。

    **版本对齐**
    应用对外显示版本由 1.0.7 升级到 1.0.30，与上游官方版本保持一致
    （https://github.com/11cafe/jaaz/releases/tag/v1.0.30）。

    - 修复深色模式显示问题（上游提交 f5d7fdf，2025-11-09）
    - 修复深色模式 class 名称错误（上游提交 48f4b6e，2025-11-10）
    - LICENSE 同步更新（2025-08-27）

    **本次版本累计带入的上游主要能力（v1.0.8 → v1.0.30）**
    - 接入 Midjourney 模型
    - 新增 Magic Image 魔法图像生成
    - 顶部显示余额 / 积分（Credits）
    - 智能多模型自动选择
    - 视频生成工具
    - ComfyUI 工作流 Agent：可将 ComfyUI 工作流作为工具供 Agent 调用
    - 通过火山引擎接入字节 Seed 系列图像模型
    - 云端登录，直接使用 Flux、Google Imagen 4、Recraft 等模型
    - 优化无限画布体验与工具调用结果渲染
    - 大量图像生成、编码与稳定性修复