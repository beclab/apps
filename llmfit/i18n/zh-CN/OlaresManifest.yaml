metadata:
  title: LLMFit
  description: 网页控制台浏览硬件适配与模型评分；同时提供 REST API。
spec:
  fullDescription: |
    数百种模型与提供方，一条命令即可找到适合你硬件运行的方案。

    LLMFit 是一个终端工具，能够根据你系统的内存（RAM）、CPU 和 GPU 自动推荐合适的 LLM 模型。它会自动检测你的硬件，从质量、速度、适配度和上下文四个维度为每个模型评分，告诉你哪些模型能在你的设备上流畅运行。

    内置交互式 TUI（默认）和经典 CLI 模式。支持多 GPU 环境、MoE 架构、动态量化选择、推理速度测算，并兼容本地运行时（如 Ollama、llama.cpp、MLX、Docker Model Runner、LM Studio）。

    部署到 Olares 作为 REST API 服务后，能够为任何客户端提供基于硬件的模型推荐。

    # 功能特色
    * 检测系统内存、CPU 核心数和 GPU（支持 NVIDIA、AMD、Intel Arc、Apple Silicon、昇腾等）
    * 多 GPU 支持，自动聚合显存
    * 从质量、速度、适配度、上下文四个维度为模型打分
    * 支持动态量化选择（Q8_0 到 Q2_K）
    * 兼容 MoE（专家混合）架构
    * 支持基于真实 GPU 带宽的速度估算
    * 提供 REST API，支持筛选、排序和优选模型
    * 兼容 Ollama、llama.cpp、MLX 等本地运行时检测
    * 内置 200+ HuggingFace 模型数据库
    * 支持多场景过滤：通用、代码、推理、对话、多模态、嵌入
  upgradeDescription: |
    面向 Web 控制台：入口可见、浏览器窗口打开、文案更新。上游发布说明: https://github.com/AlexsJones/llmfit/releases
