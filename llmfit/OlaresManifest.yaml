olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: llmfit
  description: Right-sizes LLM models to your system hardware via REST API.
  icon: https://app.cdn.olares.com/appstore/llmfit/icon.png
  appid: llmfit
  version: '1.0.2'
  title: LLMFit
  categories:
  - Developer Tools
  - Utilities_v112
permission:
  appData: true
  appCache: true
sharedEntrances:
- name: llmfit
  host: sharedentrances-llmfit
  port: 0
  title: LLMFit
  icon: https://app.cdn.olares.com/appstore/llmfit/icon.png
  invisible: true
  authLevel: internal
entrances:
- name: llmfitclient
  port: 8080
  host: llmfitclient
  title: LLMFit
  icon: https://app.cdn.olares.com/appstore/llmfit/icon.png
  authLevel: private
  invisible: false
  openMethod: window
spec:
  versionName: '0.7.2'
  promoteImage:
    - https://app.cdn.olares.com/appstore/llmfit/1.webp
    - https://app.cdn.olares.com/appstore/llmfit/2.webp
  fullDescription: |
    Hundreds of models & providers. One command to find what runs on your hardware.

    LLMFit is a terminal tool that right-sizes LLM models to your system's RAM, CPU, and GPU. Detects your hardware, scores each model across quality, speed, fit, and context dimensions, and tells you which ones will actually run well on your machine.

    Ships with an interactive TUI (default) and a classic CLI mode. Supports multi-GPU setups, MoE architectures, dynamic quantization selection, speed estimation, and local runtime providers (Ollama, llama.cpp, MLX, Docker Model Runner, LM Studio).

    LLMFit right-sizes LLM models to your system's RAM, CPU, and GPU where visible to the workload (note: inside containers, GPU/RAM may reflect the pod limits, not the full node, unless you pass devices or overrides).

    # Features
    * Detects system RAM, CPU cores, and GPU (NVIDIA, AMD, Intel Arc, Apple Silicon, Ascend)
    * Multi-GPU support with aggregated VRAM
    * Scores models across 4 dimensions: Quality, Speed, Fit, Context
    * Dynamic quantization selection (Q8_0 through Q2_K)
    * MoE (Mixture-of-Experts) architecture aware
    * Speed estimation based on actual GPU memory bandwidth
    * Web Dashboard + REST API with filtering, sorting, and top-model selection
    * Supports Ollama, llama.cpp, MLX runtime provider detection
    * 200+ models from HuggingFace in database
    * Use-case filtering: General, Coding, Reasoning, Chat, Multimodal, Embedding
  upgradeDescription: |
    Oriented for Web Dashboard: visible app entrance, `openMethod: window`, dashboard-oriented copy. Server image aligned with v0.8.x line where applicable.

    Upstream release notes: https://github.com/AlexsJones/llmfit/releases
  developer: Alex Jones
  website: https://llmfit.axjns.dev/
  sourceCode: https://github.com/AlexsJones/llmfit
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/AlexsJones/llmfit#readme
  license:
  - text: MIT
    url: https://github.com/AlexsJones/llmfit/blob/main/LICENSE
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  requiredMemory: 200Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 0.2
  limitedCpu: 1
  {{- else }}
  requiredMemory: 100Mi
  limitedMemory: 500Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 100m
  limitedCpu: 500m
  {{- end }}
  supportArch:
  - amd64
  - arm64
  subCharts:
  - name: llmfitserver
    shared: true
  - name: llmfit
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- else }}
  - name: llmfit
    type: application
    version: '>=1.0.0'
    mandatory: true
{{- end }}
  appScope:
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
    - llmfit
{{- else }}
    clusterScoped: false
{{- end }}
