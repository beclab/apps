  fullDescription: |
    Hundreds of models & providers. One command to find what runs on your hardware.

    LLMFit is a tool that right-sizes LLM models to your system's RAM, CPU, and GPU. Detects your hardware, scores each model across quality, speed, fit, and context dimensions, and tells you which ones will actually run well on your machine.

    Ships with an web dashboard. Supports multi-GPU setups, MoE architectures, dynamic quantization selection, speed estimation, and local runtime providers (Ollama, llama.cpp, MLX, Docker Model Runner, LM Studio).

    # Features
    * Detects system RAM, CPU cores, and GPU (NVIDIA, AMD, Intel Arc, Apple Silicon, Ascend)
    * Multi-GPU support with aggregated VRAM
    * Scores models across 4 dimensions: Quality, Speed, Fit, Context
    * Dynamic quantization selection (Q8_0 through Q2_K)
    * MoE (Mixture-of-Experts) architecture aware
    * Speed estimation based on actual GPU memory bandwidth
    * Web Dashboard with filtering, sorting, and top-model selection
    * Supports Ollama, llama.cpp, MLX runtime provider detection
    * 200+ models from HuggingFace in database
    * Use-case filtering: General, Coding, Reasoning, Chat, Multimodal, Embedding
  upgradeDescription: |
    Upgrade to version 0.8.4
    
    What's Changed
    Add copy model name to clipboard feature by @commandlinetips in #280

    Full release notes: https://github.com/AlexsJones/llmfit/releases/tag/v0.8.4
  developer: Alex Jones
