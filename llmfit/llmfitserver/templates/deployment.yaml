{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: llmfit
  name: llmfit
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llmfit
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llmfit
    spec:
      containers:
        - name: llmfit
          image: "beclab/llmfit:v0.0.2"
          args: ["serve", "--host", "0.0.0.0", "--port", "8787"]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
          env:
            - name: LLMFIT_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: LLMFIT_DASHBOARD_PORT
              value: "8787"
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
            limits:
              cpu: 300m
              memory: 300Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: llmfit
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llmfit
spec:
  ports:
    - name: http
      port: 8787
      targetPort: 8787
  selector:
    io.kompose.service: llmfit

---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-llmfit
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llmfit
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8787
  selector:
    io.kompose.service: llmfit
status:
  loadBalancer: {}
{{- end }}
