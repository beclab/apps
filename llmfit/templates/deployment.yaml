---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: llmfit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmfit
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: llmfit
    spec:
      containers:
      - name: llmfit
        image: "beclab/llmfit:v1.0.1"
        imagePullPolicy: IfNotPresent
        args: ["serve", "--host", "0.0.0.0", "--port", "8787"]
        ports:
        - containerPort: 8787
        env:
        - name: LLMFIT_DASHBOARD_HOST
          value: "0.0.0.0"
        - name: LLMFIT_DASHBOARD_PORT
          value: "8787"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: all
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 40m
            memory: 40Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8787
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8787
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: llmfit-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: llmfit
  ports:
  - name: http
    port: 8787
    targetPort: 8787
