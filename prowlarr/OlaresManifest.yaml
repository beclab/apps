  fullDescription: |
    Prowlarr is an indexer manager/proxy built on the popular *arr .net/reactjs base stack to integrate with your various PVR apps. Prowlarr supports management of both Torrent Trackers and Usenet Indexers. It integrates seamlessly with Lidarr, Mylar3, Radarr, Readarr, and Sonarr offering complete management of your indexers with no per app Indexer setup required (we do it all).

    **Major Features Include**
    - Usenet support for 24 indexers natively, including Headphones VIP
    - Usenet support for any Newznab compatible indexer via "Generic Newznab"
    - Torrent support for over 500 trackers with more added all the time
    - Torrent support for any Torznab compatible tracker via "Generic Torznab"
    - Support for custom YML definitions via Cardigann that includes JSON and XML parsing
    - Indexer Sync to Lidarr/Mylar3/Radarr/Readarr/Sonarr, so no manual configuration of the other applications are required
    - Indexer history and statistics
    - Manual searching of Trackers & Indexers at a category level
    - Parameter based manual searching
    - Support for pushing multiple releases at once directly to your download clients from Prowlarr
    - Indexer health and status notifications
    - Per Indexer proxy support (SOCKS4, SOCKS5, HTTP, Flaresolverr)

  upgradeDescription: |
    Upgrade Prowlarr to version 2.4.0 (2026-06-09)
    Config changes: Entrance auth level changed to internal

    Upgrade Highlights:
    - [Major] Migrated to .NET 8; .NET 8.0.27 runtime bump
    - [qBittorrent] API key support; Basic auth support; login fixes for qBittorrent 5.2; cookie reuse for API calls
    - [New Features] Postgres connection string option; Basic Auth support for sync applications
    - [Indexer] MyAnonamouse and SecretCinema improvements; Newznab parameter fixes
    - [Fixes] PWA manifest images; don't send limit=0 to Newznab indexers

    Full release note: https://github.com/Prowlarr/Prowlarr/releases/tag/v2.4.0.5397

