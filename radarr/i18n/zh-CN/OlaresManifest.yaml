metadata:
  description: 一个为 Usenet 和 BitTorrent 用户设计的影视收集管理工具
  title: Radarr

spec:
  fullDescription: |
    Radarr 可以监控多个RSS源以获取新电影信息，并与客户端和索引器进行交互，以抓取、分类和重命名这些电影。你也可以通过配置使它在有更高质量格式可用时自动升级库中现有文件的质量。请注意，对于给定的电影，仅支持一种类型。如果您想要某部电影的4K版本和1080p版本，您将需要多个实例。

    **主要功能包括：**
    - 添加新电影时附带大量信息，如预告片、评分等。
    - 支持主要平台：Windows、Linux、macOS、树莓派等。
    - 可以监视您已有电影的更好质量版本，并进行自动升级，比如从 DVD 升级至蓝光
    - 自动处理下载失败，如果一个版本失败会尝试另一个版本
    - 手动搜索功能，让您可以选择任何版本或查看为什么某个版本没有被自动下载
    - 与 SABnzbd 和 NZBGet 完全集成
    - 自动搜索发布版本以及RSS同步
    - 自动导入下载的电影
    - 识别特别版、导演剪辑版等
    - 识别带有硬编码字幕的版本
    - 识别带有别名电影名称的版本
    - 支持并集成了SABnzbd、NZBGet、QBittorrent、Deluge、rTorrent、Transmission、uTorrent和其他下载客户端
    - 与Kodi和Plex完全集成（通知、库更新）
    - 导入元数据，如预告片或字幕
    - 添加元数据，如海报和信息，供Kodi等使用
    - 高级配置文件定制，使Radarr始终下载您想要的版本
    - 美观的用户界面

  upgradeDescription: |
    升级 Radarr 至版本 6.2.1（2026-06-09）
    配置变更：变更 olares 目录挂载路径 & 入口权限。
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 添加 Olares External 目录 & 挂载路径为 /olares/userdata/external
    - 入口权限变更为 internal

    升级亮点：
    - 【重大变更】迁移至 .NET 8；移除 Basic Auth，改用 Forms 认证
    - 【重大变更】质量配置文件的默认所需语言改为 Original；电影文件夹格式令牌验证规则调整
    - 【qBittorrent】支持 API 密钥；修复 qBittorrent 5.2 登录；支持 Basic 认证；API 调用复用认证 Cookie
    - 【新功能】Postgres 连接字符串选项；Simkl 动漫列表集成；Pushover TTL 设置；解析 GiLG 发布组标签
    - 【改进】.NET 8.0.27 运行时升级；减少视频流读取时的数据传输；SQLite 忙等待超时提升至 1000ms
    - 【修复】RFC 1918/私有 IPv6 已知网络；合集 API 错误；部分系统 URL 解析；路径尾斜杠导致备份下载失败；媒体信息质量修饰符

    详细版本信息请参考：https://github.com/Radarr/Radarr/releases/tag/v6.2.1.10461
