olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  radarr: 1

metadata:
  name: radarr
  description: A movie collection manager for Usenet and BitTorrent users.
  icon: https://app.cdn.olares.com/appstore/radarr/icon.png
  appid: radarr
  version: '1.0.13'
  title: Radarr
  categories:
  - Fun

permission:
  appData: true
  appCache: true
  userData:
  - Home
  externalData: true
spec:
  versionName: '6.2.1'
  promoteImage:
  - https://app.cdn.olares.com/appstore/radarr/1.webp
  - https://app.cdn.olares.com/appstore/radarr/2.webp
  - https://app.cdn.olares.com/appstore/radarr/3.webp
  fullDescription: |
    Radarr can monitor multiple RSS feeds for new movies and will interface with clients and indexers to grab, sort, and rename them. It can also be configured to automatically upgrade the quality of existing files in the library when a better quality format becomes available. Note that only one type of a given movie is supported. If you want both an 4k version and 1080p version of a given movie you will need multiple instances.

    **Major Features Include**
    - Adding new movies with lots of information, such as trailers, ratings, etc.
    - Support for major platforms: Windows, Linux, macOS, Raspberry Pi, etc.
    - Can watch for better quality of the movies you have and do an automatic upgrade. e.g. from DVD to Blu-Ray
    - Automatic failed download handling will try another release if one fails
    - Manual search so you can pick any release or to see why a release was not downloaded automatically
    - Full integration with SABnzbd and NZBGet
    - Automatically searching for releases as well as RSS Sync
    - Automatically importing downloaded movies
    - Recognizing Special Editions, Director's Cut, etc.
    - Identifying releases with hardcoded subs
    - Identifying releases with AKA movie names
    - SABnzbd, NZBGet, QBittorrent, Deluge, rTorrent, Transmission, uTorrent, and other download clients are supported and integrated
    - Full integration with Kodi and Plex (notifications, library updates)
    - Importing Metadata such as trailers or subtitles
    - Adding metadata such as posters and information for Kodi and others to use
    - Advanced customization for profiles, such that Radarr will always download the copy you want
    - A beautiful UI

  upgradeDescription: |

    Stop recursively chowning the whole Home on startup; only fix ownership on appData/config.
    Upgrade Radarr to version 6.2.1 (2026-06-09)
    Config changes: change olares directory mount path & entrance authlevel.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Add Olares External Directory & mount path to /olares/userdata/external
    - Entrance auth level changed to internal

    Upgrade Highlights:
    - [Major] Migrated to .NET 8; removed Basic Auth in favor of Forms authentication
    - [Major] Default wanted language for quality profiles changed to Original; validation changes for movie folder format tokens
    - [qBittorrent] API key support; login fixes for qBittorrent 5.2; Basic auth support; cookie reuse for API calls
    - [New Features] Postgres connection string option; Simkl Anime List integration; Pushover TTL setting; Parse Group GiLG release tag
    - [Improvements] .NET 8.0.27 runtime bump; reduced video stream data transfer; SQLite busy timeout increased to 1000ms
    - [Fixes] RFC 1918/private IPv6 known networks; collection API errors; URL parsing on some locales; backup download with trailing slash paths; quality modifier from media info

    Full release note: https://github.com/Radarr/Radarr/releases/tag/v6.2.1.10461

  developer: Radarr
  website: https://radarr.video/
  sourceCode: https://github.com/Radarr/Radarr
  submitter: Olares
  locale:
