olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  fastnotesync: 1
metadata:
  name: fastnotesync
  description: Fast Note Sync Service is a self-hosted platform designed for real-time synchronization of Obsidian notes.
  icon: https://app.cdn.olares.com/appstore/fastnotesync/icon2.png
  appid: fastnotesync
  version: '1.0.1'
  title: Fast Note Sync
  categories:
  - Productivity_v112
  - Utilities_v112
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '3.5.1'
  fullDescription: |
    Fast Note Sync Service is a high-performance, low-latency Obsidian note synchronization, online management, and remote REST API service platform.
  developer: HaierKeys
  website: https://github.com/haierkeys/fast-note-sync-service
  sourceCode: https://github.com/haierkeys/fast-note-sync-service
  submitter: Inverstar
  locale:
  - en-US
  - zh-CN
  requiredMemory: 32Mi
  limitedMemory: 512Mi
  requiredDisk: 128Mi
  limitedDisk: 10Gi
  requiredCpu: 0.05
  limitedCpu: 1
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: fastnotesync
  port: 9000
  host: fastnotesync
  title: Fast Note Sync
  icon: https://app.cdn.olares.com/appstore/fastnotesync/icon2.png
  openMethod: window
