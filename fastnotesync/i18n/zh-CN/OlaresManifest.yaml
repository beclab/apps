metadata:
  title: Fast Note Sync
  description: Fast Note Sync Service 是一个为 Obsidian 设计的高性能、低延迟的自托管笔记实时同步平台。
spec:
  fullDescription: |
    Fast Note Sync Service 是一个高性能、低延迟的 Obsidian 笔记同步、在线管理及远程 REST API 服务平台。基于 Golang + Websocket + React 构建。

    **主要功能：**
    - 支持 Obsidian Fast Note Sync 插件，提供多端秒级实时同步。
    - 完美的附件同步支持，支持大附件的分片上传和下载。
    - 原生支持 Model Context Protocol (MCP)，可无缝接入 Cherry Studio、Cursor 等 AI 客户端作为知识库。
    - 提供标准的 REST API 接口用于笔记自动增删改查。
    - 内置现代化的 Web 管理面板，方便管理用户、仓库及笔记，并支持历史版本和回收站。
    - 适配多种存储协议（如本地存储、S3、WebDAV 等）以及多种数据库（SQLite, MySQL, PostgreSQL）。
