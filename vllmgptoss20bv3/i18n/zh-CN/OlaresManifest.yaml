metadata:
  description: "使用 vLLM 运行 GPT-OSS-20B 模型。"
  title: GPT-OSS-20B (vLLM)

spec:
  fullDescription: |
    **模型简介**
    使用 vLLM 运行 GPT-OSS-20B，采用 OpenAI 开源权重模型 `openai/gpt-oss-20b`。开箱即用，支持思考与工具调用能力。

    **预设配置**
    - 模型：`openai/gpt-oss-20b`
    - 能力：思考、工具
    - 引擎参数：`--max-model-len 131072 --gpu-memory-utilization 0.9 --tensor-parallel-size 1 --max-num-batched-tokens 8192 --tool-call-parser openai --reasoning-parser openai_gptoss --enable-prefix-caching --enable-auto-tool-choice`
    - 所需显存：`23Gi`

    **工作流程说明**
    首先，`llm-init` 下载并准备模型，然后 vLLM 在模型准备好后启动服务。两个容器运行在同一 Pod 内，共享模型目录与就绪 sentinel。

    **技术栈说明**
    - **vLLM**（8000 端口）：运行模型并通过 API 提供服务
    - **llm-init**（8090 端口）：下载模型、展示进度，并通过 OpenAI API 代理到 vLLM

    **加速器模式**
    | 模式           | 设备             | 说明                                                         |
    |----------------|------------------|--------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存；可在 ENGINE_ARGS 中调整 `--gpu-memory-utilization` |
    | `nvidia-gb10`  | GPU (Spark)      | 与 `nvidia` 相同：`23Gi` 显存；`--gpu-memory-utilization` 由 ENGINE_ARGS 指定 |
    | `cpu`          | CPU              | 图表自动注入 `--device cpu`，禁用 GPU                        |

    **模型存储**
    所有模型文件存储在共享目录 `appCommon/huggingface`（挂载为 `/cache/hf/hub`），同类应用均使用此目录。

    **资源建议**
    - CPU、内存和 GPU 数量随图表自动配置，磁盘配额为固定
    - vLLM 加载模型可能需要数分钟，请保持应用 Running 直至就绪
    - 该模型需要至少 23Gi 显存的 GPU
