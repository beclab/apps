olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: vllmgptoss20bv3
  icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/gpt-oss-20b.png
  description: "GPT-OSS-20B served with vLLM."
  appid: vllmgptoss20bv3
  title: GPT-OSS-20B (vLLM)
  version: '1.0.2'
  categories:
    - AI
sharedEntrances:
  - name: vllmgptoss20bv3
    host: sharedentrances-api
    port: 0
    title: GPT-OSS-20B API
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/gpt-oss-20b.png
entrances:
  - name: vllmclient
    port: 8090
    host: download-svc
    title: GPT-OSS-20B
    icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/gpt-oss-20b.png
    openMethod: window
    authLevel: internal
#   vllmgptoss20bv3 — engine Deployment (== appid / Release.Name)
#   llminit        — llm-init / entrance Deployment
workloadReplicas:
  vllmgptoss20bv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: '0.24.0'
  upgradeDescription: |
    v1.0.2: bump llm-init to v1.3.1.
  fullDescription: |
    **Model Overview**
    GPT-OSS-20B served with vLLM, using the open-weight `openai/gpt-oss-20b` model. The model ships ready to run and supports thinking and tools.

    **Preset Configuration**
    - Model: `openai/gpt-oss-20b`
    - Capabilities: thinking, tools
    - Engine args: `--max-model-len 131072 --gpu-memory-utilization 0.9 --tensor-parallel-size 1 --max-num-batched-tokens 8192 --tool-call-parser openai --reasoning-parser openai_gptoss --enable-prefix-caching --enable-auto-tool-choice`
    - Required GPU memory: `23Gi`

    **How It Works**
    First, `llm-init` downloads the model and gets it ready, then vLLM starts serving the model when it's ready. Both containers run in the same Pod and share the model directory and readiness sentinel.

    **Stack**
    - **vLLM** (port 8000): runs the model and serves API requests
    - **llm-init** (port 8090): downloads the model, shows progress, and provides the OpenAI API, proxying to vLLM

    **Accelerator modes**
    | Mode           | Device            | Details                                                              |
    |----------------|-------------------|----------------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `--gpu-memory-utilization` tuned in ENGINE_ARGS |
    | `nvidia-gb10`  | GPU (Spark)       | Same as `nvidia`: `23Gi` GPU memory; `--gpu-memory-utilization` in ENGINE_ARGS |
    | `cpu`          | CPU only          | Chart injects `--device cpu`; disables GPU                           |

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - vLLM model loading can take several minutes. Keep the app Running until ready.
    - This model needs a GPU with at least 23Gi of memory.

  developer: vLLM
  website: https://vllm.ai/
  sourceCode: https://github.com/vllm-project/vllm
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://github.com/vllm-project/vllm/blob/main/LICENSE

  accelerator:
    #   cpu          — CPU-only inference; chart injects --device cpu, no GPU inject / gpumem
    #   nvidia       — discrete GPU; VLLM_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; VLLM_REQUIRED_GPU_MEMORY -> gpumem
    - mode: cpu
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
    - mode: nvidia
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
      requiredGPUMemory: "-1"
      limitedGPUMemory: "-1"
    - mode: nvidia-gb10
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "hf://openai/gpt-oss-20b"
  - envName: MODEL_NAME
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "openai/gpt-oss-20b"
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools"
  - envName: ENGINE_ARGS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "--max-model-len 131072 --gpu-memory-utilization 0.9 --tensor-parallel-size 1 --max-num-batched-tokens 8192 --tool-call-parser openai --reasoning-parser openai_gptoss --enable-prefix-caching --enable-auto-tool-choice"
  - envName: LOG_LEVEL
    required: false
    type: string
    editable: false
    applyOnChange: false
    default: "info"
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_SYSTEM_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: VLLM_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: VLLM_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: VLLM_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: VLLM_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: VLLM_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description: "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. Use `0` on CPU. On GPU modes, gpu-inject caps visible CUDA memory to this value."
    regex: "^[0-9]+(Gi|Mi)?$"
