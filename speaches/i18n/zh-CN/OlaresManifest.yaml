metadata:
  title: Speaches
  description: 兼容 OpenAI 的语音合成/语音识别服务器
spec:
  fullDescription: |
    Speaches 是一个兼容 OpenAI API 的服务器，支持流式转录、翻译和语音生成。语音转文字由 faster-whisper 提供支持，文字转语音则由 piper 和 Kokoro 实现。这个项目的目标是成为 TTS/STT 领域的 "Ollama"。

    *主要特性*
    - 基于 Kokoro 和 Piper 模型的文字转语音 (TTS)。
    - 基于 faster-whisper 的高质量语音转文字 (STT)。
    - 兼容 OpenAI API（/v1/audio/speech、/v1/audio/transcriptions 等）。
    - 内置 Gradio Web UI，可交互式测试 TTS/STT。
    - 内置终端，可通过命令行管理模型（下载、列表、删除模型）。
    - 支持 GPU 加速（NVIDIA CUDA），也支持纯 CPU 运行。
    - 提供共享入口，可与其他 Olares 应用无缝集成。

    *预装模型*
    - Kokoro-82M-v1.0-ONNX（TTS）— 轻量级、高质量语音合成。
    - faster-whisper-small（STT）— 快速准确的语音识别。
    - 可通过终端入口下载更多模型。

    *使用方法*
    - 打开 Speaches UI，通过 Gradio 界面交互式测试语音合成和语音识别。
    - 通过终端入口下载 HuggingFace 上的更多模型。
    - 其他 Olares 应用可通过共享入口或 API 入口调用服务。
    - API 完全兼容 OpenAI SDK 和各类库。
