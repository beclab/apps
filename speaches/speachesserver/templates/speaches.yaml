{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- $env := .Values.olaresEnv | default dict -}}
{{- $speachesGpu := ne (index $env "SPEACHES_GPU" | default "true") "false" }}
{{- $speachesDomainENV := split "," .Values.domain.speaches -}}
{{- $speachesDomain := index $speachesDomainENV "_0" -}}
{{- $topDomain := regexReplaceAll ".*?([^.]+\\.[^.]+)$" $speachesDomain "$1" -}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaches
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: speaches
  {{- if $speachesGpu }}
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: speaches
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: speaches
        bytetrade.io/terminal: speaches
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-chmod-speaches
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - |
              mkdir -p /hf-cache
              chown -R 1000:1000 /hf-cache || true
              chmod -R 777 /hf-cache || true
          resources: {}
          volumeMounts:
            - name: speaches-hf-cache
              mountPath: /hf-cache
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
        - name: download-models
          image: "docker.io/beclab/speaches-ai-speaches:0.8.2-cpu"
          env:
            - name: HF_HUB_CACHE
              value: "/home/ubuntu/.cache/huggingface/hub"
          command:
            - sh
            - '-c'
            - |
              hf_ok() {
                local d="$HF_HUB_CACHE/models--$(echo "$1" | tr '/' '--')"
                [ -d "$d/refs" ] && [ -d "$d/snapshots" ] \
                  && [ -n "$(ls -A "$d/snapshots/" 2>/dev/null)" ]
              }
              export HF_HUB_DISABLE_XET=1
              uv tool install huggingface-hub
              if hf_ok "Systran/faster-whisper-small"; then
                echo "STT model already exists, skipping."
              else
                echo "Downloading STT model (faster-whisper-small)..."
                hf download Systran/faster-whisper-small
              fi
              if hf_ok "speaches-ai/Kokoro-82M-v1.0-ONNX"; then
                echo "TTS model already exists, skipping."
              else
                echo "Downloading TTS model (Kokoro-82M)..."
                hf download speaches-ai/Kokoro-82M-v1.0-ONNX
              fi
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            - name: speaches-hf-cache
              mountPath: /home/ubuntu/.cache/huggingface/hub
      containers:
        - name: speaches
          {{- if $speachesGpu }}
          image: "docker.io/beclab/speaches-ai-speaches:0.8.2-cuda-12.4.1"
          {{- else }}
          image: "docker.io/beclab/speaches-ai-speaches:0.8.2-cpu"
          {{- end }}
          command:
            - sh
            - '-c'
            - |
              uv tool install huggingface-hub 2>/dev/null || true
              # Install misaki[zh] for proper Chinese phonemization.
              # Without it, kokoro_onnx delegates to phonemizer/espeak-ng which
              # rejects lang="zh" with RuntimeError, so any Chinese voice
              # (zf_*/zm_*) would crash. Install is idempotent and best-effort:
              # if PyPI is unreachable, the runtime patch below falls back to
              # espeak-ng's "cmn" code so the request still succeeds.
              if ! /home/ubuntu/speaches/.venv/bin/python -c "from misaki import zh" 2>/dev/null; then
                echo "=== Installing misaki[zh] for Chinese TTS support ==="
                uv pip install --python /home/ubuntu/speaches/.venv/bin/python --quiet 'misaki[zh]' 2>/dev/null \
                  || /home/ubuntu/speaches/.venv/bin/python -m pip install --no-cache-dir --quiet 'misaki[zh]' 2>/dev/null \
                  || echo "WARN: failed to install misaki[zh] - Chinese voices will fall back to espeak cmn"
              fi
              python3 << 'PATCH_EOF'
              import pathlib, json, os
              patched = []

              # whisper-1 alias: configurable via SPEACHES_WHISPER_MODEL env var
              # default: Systran/faster-whisper-small (pre-installed)
              # user can set to e.g. Systran/faster-whisper-large-v3 after downloading it
              whisper_model = os.environ.get('SPEACHES_WHISPER_MODEL', 'Systran/faster-whisper-small')
              f = pathlib.Path('/home/ubuntu/speaches/model_aliases.json')
              if f.exists():
                  a = json.loads(f.read_text())
                  if a.get('whisper-1') != whisper_model:
                      a['whisper-1'] = whisper_model
                      f.write_text(json.dumps(a, indent=2) + '\n')
                      patched.append(f'model_aliases.json (whisper-1 -> {whisper_model.split("/")[-1]})')

              # audio_chat.py: store transcript text directly instead of
              # audio.id cache ref (prevents KeyError on multi-turn chat);
              # also return dropdown+fn so app.py can bind demo.load
              f = pathlib.Path('/home/ubuntu/speaches/src/speaches/ui/tabs/audio_chat.py')
              s = f.read_text()
              o = s
              s = s.replace(
                  'audio=Audio(id=choice.message.audio.id),',
                  'content=choice.message.audio.transcript,',
              )
              s = s.replace(
                  'audio=Audio(id=audio_id),',
                  'content=text_chat_message.content,',
              )
              s = s.replace(
                  'openai_client = openai_client_from_gradio_req(request, config)',
                  'if not message["text"] and not message["files"]:\n            yield gr.ChatMessage(role="assistant", content="No content received. If you just recorded audio, it may still be uploading — please wait a moment and click the Send button again (no need to re-record).")\n            return\n        openai_client = openai_client_from_gradio_req(request, config)',
              )
              old_tail = 'tab.select(\n            update_chat_model_dropdown,\n            inputs=None,\n            outputs=[chat_model_dropdown],\n        )'
              new_tail = old_tail + '\n        return chat_model_dropdown, update_chat_model_dropdown'
              s = s.replace(old_tail, new_tail)
              if s != o:
                  f.write_text(s)
                  patched.append('audio_chat.py')

              # Write mic-fix JS (delays submit click while mic upload is pending)
              mic_fix_head = (
                  '<script>(function(){var _s=false;document.addEventListener("click",function(e){'
                  'if(_s){_s=false;return}'
                  'var b=e.target.closest&&e.target.closest(".submit-button");'
                  'if(!b)return;'
                  'if(!document.querySelector(".compact-audio"))return;'
                  'e.stopImmediatePropagation();e.preventDefault();'
                  'b.disabled=true;b.style.opacity="0.5";'
                  'setTimeout(function(){b.disabled=false;b.style.opacity="";_s=true;b.click()},3000)'
                  '},true)})()</script>'
              )
              pathlib.Path('/tmp/_mic_fix_head.html').write_text(mic_fix_head)

              # app.py: populate model dropdown + inject mic delay JS
              f = pathlib.Path('/home/ubuntu/speaches/src/speaches/ui/app.py')
              s = f.read_text()
              o = s
              s = s.replace(
                  'gr.Blocks(title="Speaches Playground")',
                  'gr.Blocks(title="Speaches Playground", head=open("/tmp/_mic_fix_head.html").read())',
              )
              s = s.replace(
                  'create_audio_chat_tab(config)',
                  '_dropdown, _update_fn = create_audio_chat_tab(config)\n        demo.load(_update_fn, None, [_dropdown])',
              )
              if s != o:
                  f.write_text(s)
                  patched.append('app.py')

              # chat.py: graceful fallback when audio.id not in cache
              f = pathlib.Path('/home/ubuntu/speaches/src/speaches/routers/chat.py')
              s = f.read_text()
              o = s
              s = s.replace(
                  'transcript = cache[message.audio.id]',
                  'transcript = cache.get(message.audio.id, "[audio transcript expired]")',
              )
              if s != o:
                  f.write_text(s)
                  patched.append('chat.py')

              # dependencies.py: disable 500 retry cascade (backport from v0.8.3)
              f = pathlib.Path('/home/ubuntu/speaches/src/speaches/dependencies.py')
              s = f.read_text()
              o = s
              s = s.replace('max_retries=1', 'max_retries=0')
              if s != o:
                  f.write_text(s)
                  patched.append('dependencies.py')

              # text_utils.py: drop the over-broad emoji range that wipes out
              # CJK / Hangul / Kana (U+24C2..U+1F251 covers the entire CJK
              # block, so any non-Latin input reaches generate_audio() empty
              # and a 0-byte mp3 is returned with HTTP 200). Upstream master
              # already removed this line; we backport the fix to v0.8.2.
              f = pathlib.Path('/home/ubuntu/speaches/src/speaches/text_utils.py')
              s = f.read_text()
              o = s
              s = s.replace('        "\\U000024c2-\\U0001f251"\n', '')
              if s != o:
                  f.write_text(s)
                  patched.append('text_utils.py (CJK-safe strip_emojis)')

              # kokoro/utils.py: route Chinese voices (zf_*/zm_*) through misaki[zh]
              # so they don't hit espeak-ng (which rejects lang="zh" and crashes
              # the /v1/audio/speech request). Falls back to espeak "cmn" if
              # misaki couldn't be installed at startup.
              f = pathlib.Path('/home/ubuntu/speaches/src/speaches/executors/kokoro/utils.py')
              s = f.read_text()
              o = s
              old_zh = '    async for audio_data, _ in kokoro_tts.create_stream(text, voice, lang=voice_language, speed=speed):'
              new_zh = (
                  '    if voice_language == "zh":\n'
                  '        try:\n'
                  '            if "_zh_g2p" not in globals():\n'
                  '                from misaki import zh as _misaki_zh\n'
                  '                globals()["_zh_g2p"] = _misaki_zh.ZHG2P(version=None)\n'
                  '            _phonemes, _ = globals()["_zh_g2p"](text)\n'
                  '            _stream = kokoro_tts.create_stream(_phonemes, voice, is_phonemes=True, speed=speed)\n'
                  '        except Exception as _e:\n'
                  '            logger.warning(f"misaki[zh] unavailable ({_e}); falling back to espeak cmn for Chinese TTS")\n'
                  '            _stream = kokoro_tts.create_stream(text, voice, lang="cmn", speed=speed)\n'
                  '    else:\n'
                  '        _stream = kokoro_tts.create_stream(text, voice, lang=voice_language, speed=speed)\n'
                  '    async for audio_data, _ in _stream:'
              )
              if old_zh in s:
                  s = s.replace(old_zh, new_zh)
              if s != o:
                  f.write_text(s)
                  patched.append('kokoro/utils.py (Chinese voice support)')

              if patched:
                  print(f'=== Speaches hotfix: patched {len(patched)} files ===')
                  for p in patched:
                      print(f'  - {p}')
              else:
                  print('=== Speaches hotfix: no patches needed ===')
              PATCH_EOF
              (
              python3 << 'WARMUP_EOF'
              import time, wave, sys, os, urllib.request

              _wm = os.environ.get('SPEACHES_WHISPER_MODEL', 'small')
              _is_small = any(k in _wm for k in ('small', 'tiny', 'base'))
              wait_secs = 60 if _is_small else 90
              for i in range(wait_secs):
                  try:
                      urllib.request.urlopen('http://localhost:8000/v1/models', timeout=2)
                      break
                  except Exception:
                      time.sleep(1)
              else:
                  print(f'=== Warm-up: server did not start in {wait_secs}s, skipping ===')
                  sys.exit(0)

              with wave.open('/tmp/_warmup.wav', 'wb') as w:
                  w.setnchannels(1)
                  w.setsampwidth(2)
                  w.setframerate(16000)
                  w.writeframes(b'\x00\x00' * 16000)

              from openai import OpenAI
              whisper_model = os.environ.get('SPEACHES_WHISPER_MODEL', 'Systran/faster-whisper-small')
              model_name = whisper_model.split('/')[-1]
              client = OpenAI(base_url='http://localhost:8000/v1', api_key='warmup',
                              timeout=60.0 if _is_small else 180.0)

              eta = '20-30s on GPU' if _is_small else '30-60s on GPU'
              print(f'=== Warm-up: loading STT model {model_name} (may take {eta} first run) ===')
              t = time.time()
              try:
                  client.audio.transcriptions.create(
                      file=open('/tmp/_warmup.wav', 'rb'),
                      model='whisper-1',
                      response_format='text',
                  )
                  print(f'=== Warm-up: STT ready ({time.time()-t:.1f}s) ===')
              except Exception as e:
                  print(f'=== Warm-up: STT failed ({e}) - will load on first use ===')

              print('=== Warm-up: loading TTS model ===')
              t = time.time()
              try:
                  client.audio.speech.create(model='tts-1', input='hello', voice='af_heart')
                  print(f'=== Warm-up: TTS ready ({time.time()-t:.1f}s) ===')
              except Exception as e:
                  print(f'=== Warm-up: TTS failed ({e}) - will load on first use ===')

              try:
                  os.remove('/tmp/_warmup.wav')
              except OSError:
                  pass
              print('=== Model warm-up complete ===')
              WARMUP_EOF
              ) &
              exec uvicorn --factory speaches.main:create_app
          env:
            - name: HF_HUB_CACHE
              value: "/home/ubuntu/.cache/huggingface/hub"
            - name: HF_HUB_DISABLE_XET
              value: "1"
            - name: SPEACHES_WHISPER_MODEL
              value: {{ index $env "SPEACHES_WHISPER_MODEL" | default "Systran/faster-whisper-small" | quote }}
            - name: LOOPBACK_HOST_URL
              value: "http://localhost:8000"
            - name: CHAT_COMPLETION_BASE_URL
              value: "http://d54536a50.shared.{{ $topDomain }}/v1"
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            {{- if $speachesGpu }}
            limits:
              cpu: "8"
              memory: 8Gi
              nvidia.com/gpu: 1
            requests:
              cpu: 500m
              memory: 2Gi
              nvidia.com/gpu: 1
            {{- else }}
            limits:
              cpu: "8"
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 2Gi
            {{- end }}
          volumeMounts:
            - name: speaches-hf-cache
              mountPath: /home/ubuntu/.cache/huggingface/hub
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: speaches-hf-cache
          hostPath:
            path: "{{ .Values.userspace.userData }}/Huggingface/speaches"
            type: DirectoryOrCreate
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: speaches
  name: speaches
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: speaches
status:
  loadBalancer: {}

---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: speaches
  name: sharedentrances-speaches
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    io.kompose.service: speaches
status:
  loadBalancer: {}
{{- end }}
