# Helm values for rendering gitlab/templates/gitlab.yaml (gitlab/gitlab 9.10.1).
# CE, slim install, namespaced RBAC for ingress (align with gitlabpure conventions).
# HorizontalPodAutoscaler manifests from helm output are removed in scripts/render-gitlab-template.py (static replicas instead).
# Ingress / GitLab external URLs: set domain.* in values.yaml (same style as legacy gitlab.yaml.v16.bak).
# Runner/KAS/webservice use in-cluster Workhorse URL; gitlab.yml host matches that FQDN (port 8181, http).
global:
  edition: ce
  application:
    allowClusterRoles: false
  ingress:
    configureCertmanager: false
certmanager-issuer:
  email: admin@example.com
installCertmanager: false
prometheus:
  install: false
gitlab-runner:
  install: true
# Note: gitlab chart 9.10.1 rejects nginx-ingress.rbac.scope=true (validates in NOTES).
redis:
  networkPolicy:
    enabled: false
postgresql:
  networkPolicy:
    enabled: false
