olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  gitlab-gitlab-runner: 1
  gitlab-gitlab-exporter: 1
  gitlab-gitlab-shell: 1
  gitlab-kas: 1
  gitlab-sidekiq-all-in-1-v2: 1
  gitlab-toolbox: 1
  gitlab-webservice-default: 1
  gitlab-minio: 1
  gitlab: 1
  gitlab-registry: 1
  gitlab-gitaly: 1
  gitlab-postgresql: 1
  gitlab-redis-master: 1
metadata:
  name: gitlab
  description: A web-based Git repository management tool.
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  appid: gitlab
  version: '1.0.13'
  title: GitLab
  categories:
  - Developer Tools

entrances:
- name: gitlab
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  openMethod: window
- name: minio
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab MinIO
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  invisible: true
- name: kas
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab KAS
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  invisible: true
- name: registry
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab Registry
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  invisible: true
- name: smartcard
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab Smartcard
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  invisible: true
- name: pages
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab Pages
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  invisible: true
- name: projectspages
  host: gitlab-nginx-ingress-controller
  port: 80
  title: GitLab Projects Pages
  icon: https://app.cdn.olares.com/appstore/gitlab/icon.png
  authLevel: public
  invisible: true
permission:
  appData: true
  appCache: true
middleware:
  redis:
    namespace: db0
  postgres:
    username: postgres
    databases:
    - name: gitlab
      distributed: true
spec:
  versionName: 18.10.1
  featuredImage: https://app.cdn.olares.com/appstore/gitlab/promote_image_1v2.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/gitlab/promote_image_1v2.webp
  - https://app.cdn.olares.com/appstore/gitlab/promote_image_2v2.webp
  - https://app.cdn.olares.com/appstore/gitlab/promote_image_3v2.webp
  - https://app.cdn.olares.com/appstore/gitlab/promote_image_4v2.webp
  fullDescription: |
    **IMPORTANT NOTE**
    The default username for admin is `root`.

    **OVERVIEW**
    GitLab is an open source end-to-end software development platform with built-in version control, issue tracking, code review, CI/CD, and more. With GitLab, teams can easily handle code hosting, version control, issue tracking, continuous integration, and deployment.

    **FEATURES**
    Plan
    - GitLab enables portfolio planning and management through epics, groups (programs) and milestones to organize and track progress.

    Create
    - With GitLab, You can create, view, and manage code and project data through powerful branching tools.

    Verify
    - GitLab's industry leading CI capabilities enables automated testing, Static Analysis Security Testing, Dynamic Analysis Security testing and code quality analysis to provide fast feedback to developers and testers.

    Package
    - The private, secure, container and package registry are built-in and preconfigured out-of-the box to work seamlessly with GitLab source code management and CI/CD pipelines.

    Secure
    - GitLab provides Static Application Security Testing (SAST), Dynamic Application Security Testing (DAST), Container Scanning, and Dependency Scanning to help you deliver secure applications along with license compliance.

    Deploy
    - With zero-touch Continuous Delivery (CD) built right into the pipeline, deployments can be automated to multiple environments like staging and production. With feature flags, built-in auditing/traceability, and on-demand environments, you'll be able to deliver faster and with more confidence than ever before.

    Monitor
    - Get feedback and the tools to help you reduce the severity and frequency of incidents so that you can release software frequently with confidence.

    Govern
    - GitLab helps users manage security vulnerabilities, policies, and compliance across their organization.

  upgradeDescription: |
    Add note for default admin username in description.

  developer: GitLab B.V.
  website: https://www.gitlab.com/
  sourceCode: https://gitlab.com/gitlab-org
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://about.gitlab.com/resources/
  requiredMemory: 8Gi
  limitedMemory: 20Gi
  requiredDisk: 512Mi
  limitedDisk: 10Gi
  requiredCpu: 2485m
  limitedCpu: 12
  supportArch:
  - amd64
options:
  allowMultipleInstall: true
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
  - envName: GITLAB_INITIAL_ROOT_PASSWORD
    required: true
    type: password
    editable: false
    applyOnChange: false
    description: |
      Initial password for GitLab administrator (username is always root). GitLab requires 8–128 characters; rejects known breached passwords; must not contain predictable words (e.g. gitlab, devops) or parts of your name/username/email. For user root, do not use a password containing the substring "root". Olares enforces length 8–128, at least one lowercase, one uppercase, one digit, one non-alphanumeric character, and blocks substrings gitlab, devops, root (case-insensitive). Breached-password checks only run inside GitLab at install time.
    regex: '^(?!.*[Gg][Ii][Tt][Ll][Aa][Bb])(?!.*[Dd][Ee][Vv][Oo][Pp][Ss])(?!.*[Rr][Oo][Oo][Tt])(?=.{8,128}$)(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).+$'
