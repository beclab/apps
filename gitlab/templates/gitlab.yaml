# Source: gitlab/templates/upgrade_check_hook.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: gitlab-gitlab-upgrade-check
  namespace: {{ .Release.Namespace }}
  labels:
    app: gitlab
    chart: gitlab-9.10.1
    release: gitlab
    heritage: Helm
    
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: gitlab
        chart: gitlab-9.10.1
        release: gitlab
        heritage: Helm
        
        

    spec:
      
      
      securityContext:
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
      
      containers:
        - name: run-check
          image: "beclab/gitlab-org-build-cng-gitlab-base:v18.10.1"
          command: ['/bin/sh', '/scripts/runcheck']          
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 65534
          env:
            - name: GITLAB_VERSION
              value: '18.10.1'
            - name: CHART_VERSION
              value: '9.10.1'
          volumeMounts:
            - name: chart-info
              mountPath: /chart-info
            - name: scripts
              mountPath: /scripts
            - name: postgresql-secret
              mountPath: /etc/secrets/postgresql
          resources:
            requests:
              cpu: 50m
      volumes:
      - name: chart-info
        configMap:
          name: gitlab-gitlab-chart-info
          optional: true
      - name: scripts
        configMap:
          name: gitlab-gitlab-upgrade-check
      - name: postgresql-secret
        secret:
          secretName: "gitlab-postgresql-password"
          optional: true
