  annotation-value-word-blocklist: "load_module,lua_package,_by_lua,location,root,proxy_pass,serviceaccount,{,},',\""
  # Pass client X-Forwarded-* through chain; GitLab trusted_proxies covers cluster CIDRs.
  use-forwarded-headers: "true"
  # Outer proxies (e.g. platform LB) may send RFC 7239 Forwarded with proto=http; Rack can prefer it over
  # X-Forwarded-Proto and break Rails CSRF. Map per public Host and set via Ingress snippet (no quotes in annotations).
  http-snippet: |
    map $host $gitlab_force_forwarded {
        {{ $gitlabDomain }} "proto=https;host={{ $gitlabDomain }}";
        {{ $kasDomain }} "proto=https;host={{ $kasDomain }}";
