apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-kas
  namespace: {{ .Release.Namespace }}
  labels:
    app: kas
    chart: kas-9.10.1
    release: gitlab
    heritage: Helm
    
  annotations:
    kubernetes.io/ingress.class: "gitlab-nginx"
    kubernetes.io/ingress.provider: "nginx"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/custom-http-errors: ""
    # TLS often terminates at outer proxy; inner hop is HTTP — disable ssl-redirect loop and tell GitLab the client used HTTPS.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Align Host with public name (Olares / in-cluster LB may send non-public Host); required for Rails CSRF after login.
    nginx.ingress.kubernetes.io/upstream-vhost: {{ $kasDomain | quote }}
    # No double-quotes in snippet: controller ConfigMap annotation-value-word-blocklist rejects ".
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Forwarded $gitlab_force_forwarded;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Ssl on;
      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header X-Forwarded-Host {{ $kasDomain }};

spec:
  ingressClassName: gitlab-nginx
  rules:
    - host: {{ $kasDomain }}
      http:
        paths:
          - path: "/k8s-proxy/"
            pathType: Prefix
            backend:
              service:
                name: gitlab-kas
                port:
                  number: 8154
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: gitlab-kas
                port:
                  number: 8150
  tls:
    - hosts:
      - {{ $kasDomain }}
      secretName: gitlab-wildcard-tls
