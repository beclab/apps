
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorzero
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: tensorzero
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: tensorzero
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: tensorzero
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
          args:
            - |
              mkdir -p /var/lib/clickhouse
              chown -R 1000:1000 /var/lib/clickhouse
              chmod -R 755 /var/lib/clickhouse
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: tensorzero-data
              mountPath: /var/lib/clickhouse
              subPath: clickhouse
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: clickhouse
          image: "docker.io/beclab/clickhouse-clickhouse-server:25.5"
          env:
            - name: CLICKHOUSE_USER
              value: "chuser"
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            - name: CLICKHOUSE_PASSWORD
              value: "chpassword"
          resources:
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 1Gi
          ports:
            - containerPort: 8123
              name: ch-http
            - containerPort: 9000
              name: ch-native
          volumeMounts:
            - name: tensorzero-data
              mountPath: /var/lib/clickhouse
              subPath: clickhouse
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "wget --spider --tries 1 http://chuser:chpassword@localhost:8123/ping"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "wget --spider --tries 1 http://chuser:chpassword@localhost:8123/ping"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 1

        - name: gateway
          image: docker.io/beclab/tensorzero-gateway:2026.4.0
          command: ["/bin/bash", "/etc/gateway/start.sh"]
          resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
          ports:
            - containerPort: 3000
              name: gateway
          volumeMounts:
            - name: gateway-startups
              mountPath: /etc/gateway/start.sh
              subPath: start.sh
            - name: gateway-startups
              mountPath: /app/config/tensorzero.toml
              subPath: tensorzero.toml
            - name: gateway-startups
              mountPath: /etc/gateway/env.sh
              subPath: env.sh
          # Postgres + ClickHouse migrations can take 60s+ on a cold start.
          # startupProbe gives the gateway up to 5 minutes (30 * 10s) to come
          # up before the liveness probe takes over, avoiding spurious restarts.
          startupProbe:
            httpGet:
              path: /status
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

        - name: ui
          image: docker.io/beclab/tensorzero-ui:2026.4.0
          env:
            - name: TENSORZERO_GATEWAY_URL
              value: "http://localhost:3000"
            - name: TENSORZERO_POSTGRES_URL
              value: "postgres://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.tensorzerodb }}?sslmode=disable"
          resources:
            limits:
              cpu: 1
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          ports:
            - containerPort: 4000
              name: ui
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 1

      restartPolicy: Always
      volumes:
        - name: tensorzero-data
          hostPath:
            type: DirectoryOrCreate
                {{- if .Values.sysVersion }}
                  {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appCache }}'
                  {{- else }}
            path: '{{ .Values.userspace.appCache }}/tensorzero'
                  {{- end }}
                {{- else }}
            path: '{{ .Values.userspace.appCache }}/tensorzero'
                {{- end }}
        - name: gateway-startups
          configMap:
            name: gateway-startups
            defaultMode: 0755

---
apiVersion: v1
kind: Service
metadata:
  name: tensorzero
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: tensorzero
spec:
  ports:
    - name: ch-http
      port: 8123
      targetPort: 8123
    - name: ch-native
      port: 9000
      targetPort: 9000
    - name: gateway
      port: 3000
      targetPort: 3000
    - name: ui
      port: 4000
      targetPort: 4000
  selector:
    io.kompose.service: tensorzero
status:
  loadBalancer: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-tensorzero
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: tensorzero
spec:
  ports:
    - name: "4000"
      port: 80
      targetPort: 4000
  selector:
    io.kompose.service: tensorzero
status:
  loadBalancer: {}
