metadata:
  title: TensorZero
  description: 面向工业级大语言模型（LLM）应用的开源技术栈
spec:
  fullDescription: |
    *TensorZero 是面向工业级大语言模型（LLM）应用的开源技术栈。它集成了 LLM 网关、可观测性、优化、评估与实验功能。*

    - 网关：通过统一的 API 访问所有主流 LLM 提供商，性能卓越（<1ms p99 延迟）
    - 可观测性：在数据库中保存推理数据和用户反馈，可通过程序或 UI 查看
    - 优化：收集指标与人工反馈，便于优化提示词、模型与推理策略
    - 评估：通过启发式算法、LLM 评审等方式基准测试单次推理或端到端流程
    - 实验：内置 AB 测试、路由、回退和重试功能，让你安心发布

    *功能特色*
    - LLM 网关：一次集成，便可访问所有主流 LLM 提供商
    - LLM 可观测性：深入调试单个 API 调用，或从宏观上监控不同模型和提示词随时间的表现 —— 这些都可以通过开源 TensorZero UI 实现
    - LLM 优化：轻松发送生产指标和人工反馈，优化提示词、模型及推理策略 —— 支持通过 UI 或编程方式
    - LLM 评估：对提示词、模型和推理策略进行横向比较，支持启发式和 LLM 评审的多样评估方式
    - LLM 实验：内置 AB 测试、路由、回退、重试等功能，满足正式环境上线需求
    - 更多：开源架构，既适合原型开发，也为最复杂的 LLM 应用及部署需求量身打造
