olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: tensorzero
  description: Open-source stack for industrial-grade LLM applications
  icon: https://app.cdn.olares.com/appstore/tensorzero/icon.png
  appid: tensorzero
  version: '1.0.5'
  title: TensorZero
  categories:
  - Utilities_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '2026.4.0'
  promoteImage:
    - https://app.cdn.olares.com/appstore/tensorzero/1.webp
    - https://app.cdn.olares.com/appstore/tensorzero/2.webp
    - https://app.cdn.olares.com/appstore/tensorzero/3.webp
  fullDescription: |
    TensorZero is an open-source stack for industrial-grade LLM applications. It unifies an LLM gateway, observability, optimization, evaluation, and experimentation.

    - Gateway: access every LLM provider through a unified API, built for performance (<1ms p99 latency)
    - Observability: store inferences and feedback in your database, available programmatically or in the UI
    - Optimization: collect metrics and human feedback to optimize prompts, models, and inference strategies
    - Evaluation: benchmark individual inferences or end-to-end workflows using heuristics, LLM judges, etc.
    - Experimentation: ship with confidence with built-in A/B testing, routing, fallbacks, retries, etc.

    *Features*
    - LLM Gateway:Integrate with TensorZero once and access every major LLM provider.
    - LLM Observability:Zoom in to debug individual API calls, or zoom out to monitor metrics across models and prompts over time — all using the open-source TensorZero UI.
    - LLM Optimization:Send production metrics and human feedback to easily optimize your prompts, models, and inference strategies — using the UI or programmatically.
    - LLM Evaluation:Compare prompts, models, and inference strategies using evaluations powered by heuristics and LLM judges.
    - LLM Experimentation:Ship with confidence with built-in A/B testing, routing, fallbacks, retries, etc.
    - & more:Build with an open-source stack well-suited for prototypes but designed from the ground up to support the most complex LLM applications and deployments.
  developer: TensorZero
  website: https://www.tensorzero.com/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1.75Gi
  limitedMemory: 7.5Gi
  requiredDisk: 512Mi
  limitedDisk: 2Gi
  requiredCpu: 0.5
  limitedCpu: 4.5
  doc: https://www.tensorzero.com/docs
  supportArch:
  - amd64
  - arm64
options:
  # Disable Olares gateway-level request timeout. TensorZero's /inference
  # proxies long LLM calls (large context, reasoning models, slow self-hosted
  # providers) that can routinely exceed Olares' default ~60s cap. Setting 0
  # delegates timeout enforcement to the in-app openresty (see ingress.yaml,
  # which uses 300s) instead of failing fast at the platform edge.
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
entrances:
  - authLevel: internal
    host: tensorzeroingress
    icon: https://app.cdn.olares.com/appstore/tensorzero/icon.png
    name: tensorzero
    openMethod: window
    port: 8080
    title: TensorZero
middleware:
  postgres:
    username: tensorzero
    databases:
      - name: tensorzerodb
        distributed: false
        extensions:
          - vector