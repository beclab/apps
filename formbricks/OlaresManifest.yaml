olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  formbricks: 1
metadata:
  name: formbricks
  description: Open Source Qualtrics Alternative
  icon: https://app.cdn.olares.com/appstore/formbricks/icon.png
  appid: formbricks
  version: '1.0.7'
  title: Formbricks
  categories:
  - Productivity_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '5.1.4'
  featuredImage: https://app.cdn.olares.com/appstore/formbricks/1.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/formbricks/1.webp
  - https://app.cdn.olares.com/appstore/formbricks/2.webp
  - https://app.cdn.olares.com/appstore/formbricks/3.webp
  - https://app.cdn.olares.com/appstore/formbricks/4.webp
  - https://app.cdn.olares.com/appstore/formbricks/5.webp
  fullDescription: |
    Formbricks provides a free and open source surveying platform. Gather feedback at every point in the user journey with beautiful in-app, website, link and email surveys. Build on top of Formbricks or leverage prebuilt data analysis capabilities.

    **Features**
    - Create conversion-optimized surveys with our no-code editor with several question types.
    - Choose from a variety of best-practice templates.
    - Launch and target your surveys to specific user groups without changing your application code.
    - Create shareable link surveys.
    - Invite your organization members to collaborate on your surveys.
    - Integrate Formbricks with Slack, Notion, Zapier, n8n and more.
    - All open source, transparent and self-hostable.
  upgradeDescription: |
    Storage: durable storage moved from `appCache` to `appData`. On first start after upgrade, an initContainer copies legacy `appCache` into `appData` when the destination is empty (marker: `.migration_from_appcache_done`). Old appCache data is left intact for rollback.

    Upgrade to Formbricks 5.1.4 (from 4.4.3). This is a major v5 upgrade.

    **Release notes**
    - Gate bulk invite behind Scale plan and rate-limit invites
    - Full changelog: https://github.com/formbricks/formbricks/compare/5.1.3...5.1.4

    **Stack changes (v5 baseline)**
    - Formbricks Hub and Cube are now required sidecars (analytics / feedback records)
    - App image: `beclab/formbricks-formbricks:5.1.4` (Hub `beclab/formbricks-hub:0.8.1`, Cube `v1.7.3`)
    - Startup runs Formbricks DB migrations, then Hub migrations, before the app starts

    **User-facing settings**
    - No new install prompts. Hub/Cube secrets and URLs are wired by the chart automatically.
    - Optional mail settings are unchanged (SMTP / `MAIL_FROM*`, mostly from Olares SMTP).

    **Before upgrading**
    - Back up your PostgreSQL database
    - Expect higher memory usage (Hub + Cube; Cube alone needs ~500MB headroom)

    Migration guide: https://formbricks.com/docs/self-hosting/advanced/migration
  developer: Formbricks GmbH
  website: https://formbricks.com
  sourceCode: https://github.com/formbricks/formbricks
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1.5Gi
  limitedMemory: 4Gi
  requiredDisk: 1Gi
  limitedDisk: 5Gi
  requiredCpu: 2
  limitedCpu: 5
  doc: https://formbricks.com/docs
  supportArch:
  - amd64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
  policies:
    # Link / pretty / personalized survey pages for external respondents
    - uriRegex: ^/(s|c|p)(/.*)?(\?.*)?$
      level: public
      oneTime: false
      validDuration: 3600s
      entranceName: formbricks
    # Public client APIs used by survey runtime / SDK
    - uriRegex: ^/api/v[12]/client(/.*)?(\?.*)?$
      level: public
      oneTime: false
      validDuration: 3600s
      entranceName: formbricks
    # Static assets and public storage needed to render shared surveys
    - uriRegex: ^/(_next|js|css|images|fonts|icons|storage|animated-bgs|public)(/.*)?(\?.*)?$|^/favicon\.ico(\?.*)?$
      level: public
      oneTime: false
      validDuration: 3600s
      entranceName: formbricks
entrances:
- name: formbricks
  port: 3000
  host: formbricks
  title: formbricks
  icon: https://app.cdn.olares.com/appstore/formbricks/icon.png
  openMethod: window
middleware:
  redis:
    namespace: formbricks
  postgres:
    username: formbricks
    databases:
    - name: formbricksdb
      distributed: false
      extensions:
        - vector
envs:
  - envName: MAIL_FROM
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS
  - envName: MAIL_FROM_NAME
    type: string
    required: false
    editable: true
    applyOnChange: true
  - envName: SMTP_HOST
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
  - envName: SMTP_PORT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
  - envName: SMTP_USER
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME
  - envName: SMTP_PASSWORD
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
