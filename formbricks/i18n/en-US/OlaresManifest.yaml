metadata:
  title: Formbricks
  description: Open Source Qualtrics Alternative
spec:
  fullDescription: |
    Formbricks provides a free and open source surveying platform. Gather feedback at every point in the user journey with beautiful in-app, website, link and email surveys. Build on top of Formbricks or leverage prebuilt data analysis capabilities.

    **Features**
    - Create conversion-optimized surveys with our no-code editor with several question types.
    - Choose from a variety of best-practice templates.
    - Launch and target your surveys to specific user groups without changing your application code.
    - Create shareable link surveys.
    - Invite your organization members to collaborate on your surveys.
    - Integrate Formbricks with Slack, Notion, Zapier, n8n and more.
    - All open source, transparent and self-hostable.
  upgradeDescription: |
    Upgrade to Formbricks 5.1.4 (from 4.4.3). This is a major v5 upgrade.

    **Release notes**
    - Gate bulk invite behind Scale plan and rate-limit invites
    - Full changelog: https://github.com/formbricks/formbricks/compare/5.1.3...5.1.4

    **Stack changes (v5 baseline)**
    - Formbricks Hub and Cube are now required sidecars (analytics / feedback records)
    - App image: `beclab/formbricks-formbricks:5.1.4` (Hub `beclab/formbricks-hub:0.8.1`, Cube `v1.7.3`)
    - Startup runs Formbricks DB migrations, then Hub migrations, before the app starts

    **User-facing settings**
    - No new install prompts. Hub/Cube secrets and URLs are wired by the chart automatically.
    - Optional mail settings are unchanged (SMTP / `MAIL_FROM*`, mostly from Olares SMTP).

    **Before upgrading**
    - Back up your PostgreSQL database
    - Expect higher memory usage (Hub + Cube; Cube alone needs ~500MB headroom)

    Migration guide: https://formbricks.com/docs/self-hosting/advanced/migration
