metadata:
  title: Formbricks
  description: 开源的 Qualtrics 替代方案
spec:
  fullDescription: |
    Formbricks 提供了一个免费且开源的调研平台。通过优美的应用内、网站、链接以及邮件问卷，您可以在用户旅程的每一个环节收集反馈。您可以基于 Formbricks 构建自定义功能，或利用内置的数据分析能力。

    **功能介绍**
    - 使用我们的零代码编辑器和多种题型，创建优化转化的问卷。
    - 从多种最佳实践模板中选择合适的问卷。
    - 无需更改应用程序代码，即可面向特定用户群体发布和定向问卷。
    - 创建可分享链接的问卷。
    - 邀请您组织的成员协作管理问卷。
    - 与 Slack、Notion、Zapier、n8n 等集成。
    - 完全开源、透明且支持自托管。
  upgradeDescription: |
    升级至 Formbricks 5.1.4（自 4.4.3）。这是一次重大的 v5 升级。

    **版本说明**
    - 批量邀请受 Scale 套餐限制，并对邀请进行限流
    - 完整变更：https://github.com/formbricks/formbricks/compare/5.1.3...5.1.4

    **运行栈变更（v5 基线）**
    - Formbricks Hub 与 Cube 现为必需 sidecar（分析 / feedback records）
    - 应用镜像：`beclab/formbricks-formbricks:5.1.4`（Hub `beclab/formbricks-hub:0.8.1`，Cube `v1.7.3`）
    - 启动时先执行 Formbricks 数据库迁移，再执行 Hub 迁移，然后启动应用

    **用户需要配置的项**
    - 无新增安装项。Hub/Cube 的密钥与 URL 由 chart 自动注入。
    - 可选邮件设置保持不变（SMTP / `MAIL_FROM*`，多数来自 Olares SMTP）。

    **升级前**
    - 请备份 PostgreSQL 数据库
    - 内存占用会升高（Hub + Cube；仅 Cube 约需额外 500MB）

    迁移指南：https://formbricks.com/docs/self-hosting/advanced/migration
