---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/unsloth/Qwen3.5-35B-A3B-GGUF/resolve/main/Qwen3.5-35B-A3B-Q4_K_M.gguf"
  MODEL_FILE: "Qwen3.5-35B-A3B-Q4_K_M.gguf"
  MODEL_ALIAS: "qwen3.5-35b-a3b"
  CONTEXT_SIZE: "32768"
  N_GPU_LAYERS: "99"
  THREADS: "4"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: llamacppqwen35a3b
  name: llamacppqwen35a3b
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppqwen35a3b
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppqwen35a3b
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              MODEL_PATH="/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Model already downloaded: $MODEL_PATH"
                ls -lh "$MODEL_PATH"
              else
                echo "Downloading model from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL"
                mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                echo "Download complete."
                ls -lh "$MODEL_PATH"
              fi
          envFrom:
            - configMapRef:
                name: llamacpp-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "ghcr.io/ggml-org/llama.cpp:server-cuda"
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--model"
            - "/models/$(MODEL_FILE)"
            - "--alias"
            - "$(MODEL_ALIAS)"
            - "--ctx-size"
            - "$(CONTEXT_SIZE)"
            - "--n-gpu-layers"
            - "$(N_GPU_LAYERS)"
            - "--threads"
            - "$(THREADS)"
          envFrom:
            - configMapRef:
                name: llamacpp-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 120
          resources:
            limits:
              cpu: "6"
              memory: 16Gi
            requests:
              cpu: 500m
              memory: 2Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: llamacppqwen35a3b
  name: llamacppqwen35a3b
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: llamacppqwen35a3b
status:
  loadBalancer: {}
