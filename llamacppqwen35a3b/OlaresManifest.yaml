olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  llamacppqwen35a3b: 1
metadata:
  name: llamacppqwen35a3b
  icon: https://app.cdn.olares.com/appstore/llm/llamacpp/llm/qwen.png
  description: "Qwen3.5 35B-A3B served via llama.cpp"
  appid: llamacppqwen35a3b
  title: Qwen3.5 35B-A3B Q4_K_M (lcpp)
  version: '1.0.3'
  categories:
    - AI
entrances:
  - name: llamacppqwen35a3b
    port: 8080
    host: llamacppqwen35a3b
    title: Qwen 35B-A3B llamacpp
    icon: https://app.cdn.olares.com/appstore/llm/llamacpp/llm/qwen.png
    openMethod: window
    authLevel: internal
spec:
  versionName: '1.0.2'
  fullDescription: |
    Qwen3.5 35B-A3B (MoE, 3B active) served via llama.cpp with Q4_K_M quantization.
    Downloads the GGUF model on first launch and caches it.
    Exposes an OpenAI-compatible API on port 8080.

  developer: aamsellem
  website: https://github.com/aamsellem/orales-market
  sourceCode: https://github.com/aamsellem/orales-market
  submitter: aamsellem
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/ggerganov/llama.cpp/blob/master/LICENSE

  accelerator:
    - mode: nvidia
      limitedCpu: 8000m
      requiredCpu: 1000m
      requiredDisk: 25Gi
      limitedDisk: 50Gi
      limitedMemory: 16Gi
      requiredMemory: 4Gi
      requiredGPUMemory: 1Gi
      limitedGPUMemory: 16Gi

  supportArch:
    - amd64
permission:
  appData: true
options:
  apiTimeout: 0
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
