---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: seatable-redis
spec:
  replicas: {{ (index .Values.workloads "seatable-redis").replicaCount }}
  selector:
    matchLabels:
      app: seatable-redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seatable-redis
    spec:
      containers:
        - name: seatable-redis
          image: "docker.io/beclab/redis:7.2.7-bookworm"
          command:
            - /bin/sh
            - -c
            - exec redis-server --requirepass "$REDIS_PASSWORD" --maxmemory 500mb --maxmemory-policy allkeys-lru
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 512Mi
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
