{{- $existing := (lookup "v1" "Secret" .Release.Namespace "seatable-secrets") -}}
{{- $jwt := "" -}}
{{- $secretKey := "" -}}
{{- $redisPass := "" -}}
{{- if $existing }}
  {{- $jwt = index $existing.data "JWT_PRIVATE_KEY" | default "" | b64dec -}}
  {{- $secretKey = index $existing.data "SECRET_KEY" | default "" | b64dec -}}
  {{- $redisPass = index $existing.data "REDIS_PASSWORD" | default "" | b64dec -}}
{{- end }}
{{- if not $jwt }}{{ $jwt = randAlphaNum 40 }}{{ end }}
{{- if not $secretKey }}{{ $secretKey = randAlphaNum 50 }}{{ end }}
{{- if not $redisPass }}{{ $redisPass = "seatable" }}{{ end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: seatable-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: seatable
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "seatable"
  SEATABLE_MYSQL_DB_PASSWORD: "seatable"
  INIT_SEATABLE_MYSQL_ROOT_PASSWORD: "seatable"
  REDIS_PASSWORD: {{ $redisPass | quote }}
  JWT_PRIVATE_KEY: {{ $jwt | quote }}
  SECRET_KEY: {{ $secretKey | quote }}
  SEATABLE_ADMIN_PASSWORD: {{ .Values.olaresEnv.ADMIN_PASSWORD | quote }}
  SEATABLE_EMAIL_HOST_PASSWORD: {{ .Values.olaresEnv.EMAIL_HOST_PASSWORD | default "" | quote }}
