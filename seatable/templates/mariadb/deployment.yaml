---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seatable-mysql
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ (index .Values.workloads "seatable-mysql").replicaCount }}
  selector:
    matchLabels:
      app: seatable-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seatable-mysql
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: seatable-mysql
          image: "docker.io/beclab/mariadb:11.4.3-noble"
          args: ["--innodb_snapshot_isolation=OFF"]
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - |
                    timeout 30 /usr/bin/mariadb-admin \
                      --user=root \
                      --password=$MYSQL_ROOT_PASSWORD \
                      shutdown || \
                    pkill -SIGTERM mariadbd
          env:
            - name: TZ
              value: "Etc/UTC"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seatable-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_LOG_CONSOLE
              value: "true"
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 3Gi
          livenessProbe:
            exec:
              command:
                - "/usr/local/bin/healthcheck.sh"
                - "--connect"
                - "--mariadbupgrade"
                - "--innodb_initialized"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - "/usr/local/bin/healthcheck.sh"
                - "--connect"
                - "--innodb_initialized"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            runAsUser: 0
      volumes:
        - name: mysql-data
          hostPath:
            path: "{{ .Values.userspace.appData }}/opt/seatable/mysql-data"
            type: DirectoryOrCreate
