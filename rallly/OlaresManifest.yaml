olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  rallly: 1
metadata:
  name: rallly
  description: Open-source scheduling and collaboration tool designed to make organizing events and meetings easier
  icon: https://app.cdn.olares.com/appstore/rallly/icon.png
  appid: rallly
  version: '1.0.12'
  title: Rallly
  categories:
    - Productivity_v112

permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: '4.11.1'
  featuredImage: https://app.cdn.olares.com/appstore/rallly/1.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/rallly/1.webp
  - https://app.cdn.olares.com/appstore/rallly/2.webp

  fullDescription: |
    Rallly is an open-source scheduling and collaboration tool designed to make organizing events and meetings easier.

    Schedule group meetings with friends, colleagues and teams. Create meeting polls to find the best date and time to organize an event based on your participants' availability. Save time and avoid back-and-forth emails.

    **Important Note**
    Magic-link login and email notifications need SMTP. Configure Olares mail/SMTP settings (or leave them empty if you only share poll links without email). Empty SMTP values are not injected into the container.
  upgradeDescription: |
    Upgrade to Rallly 4.11.1 (from 4.3.1). Chart 1.0.11 → 1.0.12.

    **Release notes**
    - 4.11.1: self-hosting fix — keep env validation out of the client bundle (fixes crash on every page in 4.11.0)
    - No configuration or database changes required for the 4.11.x fix
    - Full changelog: https://github.com/lukevella/rallly/compare/v4.3.1...v4.11.1

    **Chart / env changes**
    - Image: `lukevella/rallly:4.11.1`
    - `NEXT_PUBLIC_SELF_HOSTED` set to `true`
    - SMTP vars are only injected when Olares provides non-empty values
    - `SUPPORT_EMAIL` is always set (Olares SMTP from-address, or `noreply@<domain>` fallback)
    - Core vars unchanged: `SECRET_PASSWORD`, `NEXT_PUBLIC_BASE_URL`, `AUTH_URL`, `DATABASE_URL`, `DIRECT_DATABASE_URL`
  developer: lukevella
  website: https://rallly.co
  sourceCode: https://github.com/lukevella/rallly
  submitter: Olares
  doc: https://github.com/lukevella/rallly
  license:
  - text: AGPL-3.0
    url: https://github.com/lukevella/rallly?tab=AGPL-3.0-1-ov-file
  locale:
    - en-US
    - zh-CN
  requiredMemory: 300Mi
  limitedMemory: 2Gi
  requiredDisk: 256Mi
  limitedDisk: 1Gi
  requiredCpu: 1
  limitedCpu: 2
  supportArch:
    - amd64
options:
  allowedOutboundPorts:
  - 465
  - 587
  policies:
    - uriRegex: ^/(login|register)(/.*)?(\?.*)?$
      level: system
      oneTime: false
      validDuration: 3600s
      entranceName: rallly
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
entrances:
  - name: rallly
    port: 3000
    host: rallly-svc
    title: Rallly
    icon: https://app.cdn.olares.com/appstore/rallly/icon.png
    openMethod: window
    authLevel: public
middleware:
  postgres:
    username: rallly
    databases:
      - name: rallly

envs:
  - envName: SMTP_HOST
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
  - envName: SMTP_PORT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
  - envName: SMTP_USER
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME
  - envName: SMTP_PWD
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
  - envName: SMTP_SECURE
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SECURE
  - envName: SUPPORT_EMAIL
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS

