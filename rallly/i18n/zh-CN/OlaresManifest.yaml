metadata:
  title: Rallly
  description: 一款开源的日程安排和协作工具，旨在简化活动和会议的组织
spec:
  fullDescription: |
    Rallly 是一款开源的日程安排和协作工具，旨在简化活动和会议的组织。

    您可以与朋友、同事和团队安排小组会议。您可以创建会议投票，根据参与者的空闲时间，找到组织活动的最佳日期和时间。节省时间，避免来回邮件。

    **重要提示**
    魔法链接登录和邮件通知需要 SMTP。请在 Olares 中配置邮件/SMTP（若只通过分享链接投票、不需要邮件，可留空）。空的 SMTP 值不会注入到容器环境变量中。
  upgradeDescription: |
    升级至 Rallly 4.11.1（自 4.3.1）。Chart 1.0.11 → 1.0.12。

    **版本说明**
    - 4.11.1：自托管修复 — 环境变量校验不再进入客户端 bundle（修复 4.11.0 每页崩溃）
    - 4.11.x 修复无需额外配置或数据库变更
    - 完整变更：https://github.com/lukevella/rallly/compare/v4.3.1...v4.11.1

    **Chart / 环境变量变更**
    - 镜像：`lukevella/rallly:4.11.1`
    - `NEXT_PUBLIC_SELF_HOSTED` 设为 `true`
    - 仅当 Olares 提供非空值时才注入 SMTP 变量
    - `SUPPORT_EMAIL` 始终设置（优先 Olares 发件地址，否则回退 `noreply@<domain>`）
    - 核心变量不变：`SECRET_PASSWORD`、`NEXT_PUBLIC_BASE_URL`、`AUTH_URL`、`DATABASE_URL`、`DIRECT_DATABASE_URL`
