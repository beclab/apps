apiVersion: apps/v1
kind: Deployment
metadata:
  name: louter
  namespace: {{ .Release.Namespace }}
  labels:
    app: louter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: louter
  template:
    metadata:
      labels:
        app: louter
    spec:
      containers:
        - name: louter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 6188
              protocol: TCP
          env:
            - name: LOUTER_HOST
              value: "0.0.0.0"
            - name: LOUTER_PORT
              value: "6188"
            - name: LOUTER_DB_PATH
              value: "/app/data/louter.db"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: cache
              mountPath: /app/cache
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 6188
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 6188
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: data
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.userspace.appData }}/louter"
        - name: cache
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.userspace.appCache }}/louter"

---
apiVersion: v1
kind: Service
metadata:
  name: louter-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: louter
  ports:
    - name: http
      port: 6188
      targetPort: 6188
      protocol: TCP
