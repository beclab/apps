metadata:
  title: Gemma4 26B Q4_K_M (Ollama)
  description: "Gemma 4 26B (Ollama library, Q4_K_M) for efficient multimodal local inference"

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Ollama library model **gemma4:26b** (default Q4_K_M in the registry). Chart **OLLAMA_CONTEXT_LENGTH**: **65536** (64k).

    Gemma 4 26B is a mixture-of-experts model: strong quality for reasoning, coding, and multimodal (text + image) tasks with a smaller active parameter footprint than a dense model of similar capability.

    Instruction-tuned with support for tool calling; this install uses a 64k context limit for predictable VRAM (tune in ConfigMap if needed).

  upgradeDescription: |
    Upgrade Ollama runtime image to 0.23.2 (beclab/ollama-ollama).

    Upgrade Olares API proxy image to beclab/harveyff-olares-ollama:v0.1.19-fix3.
