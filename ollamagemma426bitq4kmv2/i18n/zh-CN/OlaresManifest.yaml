metadata:
  title: Gemma4 26B Q4_K_M（Ollama）
  description: Gemma4 26B（Ollama 官方库，Q4_K_M），高效多模态本地推理。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。
    用户流量通过代理流向 Ollama。

    **模型**
    使用 Ollama 官方库模型 **gemma4:26b**（仓库默认 Q4_K_M 量化）。本 chart 将 **OLLAMA_CONTEXT_LENGTH** 设为 **65536**（64k 上下文）。

    Gemma 4 26B 为混合专家（MoE）架构：在推理、编程与多模态（文本 + 图像）任务上表现强，相较同能力稠密模型激活参数量更小。

    经指令微调，支持工具调用；此处将上下文限制为 64k 以便显存可预期（可按硬件在 ConfigMap 中调高或调低）。

  upgradeDescription: |
    升级运行镜像：Ollama 引擎升至 0.23.2（beclab/ollama-ollama）。

    Olares API 代理镜像升至 beclab/harveyff-olares-ollama:v0.1.19-fix3。
