---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: ollamagemma426bitq4kmv2
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3.png
  description: "Gemma4 26B (Ollama library, Q4_K_M) for efficient multimodal local inference"
  appid: ollamagemma426bitq4kmv2
  title: Gemma4 26B Q4_K_M (Ollama)
  version: '1.0.6'
  categories:
    - AI
sharedEntrances:
  - name: ollamagemma426bitq4kmv2
    host: sharedentrances-api
    port: 0
    title: Gemma4 26B Q4_K_M
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Gemma4 26B Q4_K_M
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'gemma4:26b'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Ollama library model **gemma4:26b** (default Q4_K_M in the registry). This chart sets **OLLAMA_CONTEXT_LENGTH** to **65536** (64k).

    Gemma 4 26B is a mixture-of-experts model: strong quality for reasoning, coding, and multimodal (text + image) tasks with a smaller active parameter footprint than a dense model of similar capability.

    Instruction-tuned with support for tool calling; context is capped at 64k here for predictable VRAM use (raise or lower in ConfigMap if your hardware requires).

  upgradeDescription: |
    Upgrade Ollama runtime to ollama/ollama:0.30.10.
    Upgrade Olares API proxy to beclab/harveyff-olares-ollama:v0.1.22 (OpenAI vision image_url forwarding).
  developer: Google
  website: https://ai.google.dev/gemma
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma
      url: https://ai.google.dev/gemma/terms

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6500m
  requiredCpu: 500m
  requiredDisk: 50Mi
  limitedDisk: 60Gi
  limitedMemory: 40Gi
  requiredMemory: 4200Mi
  requiredGpu: 20Gi
  limitedGpu: 24Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamagemma426bitq4kmv2server
    shared: true
  - name: ollamagemma426bitq4kmv2
permission:
  appData: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamagemma426bitq4kmv2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamagemma426bitq4kmv2
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: KEEP_ALIVE
    required: true
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
{{- end }}
