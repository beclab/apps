---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-download-models
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-download-models
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-download-models
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download-models
          image: "docker.io/harveyff/hf-downloader-only:v0.0.7-amd"
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
          args:
            - "--tasks"
            - '{"tasks":[{"repo":"unsloth/Qwen3.5-4B-GGUF","file":"Qwen3.5-4B-UD-Q4_K_XL.gguf","ref":"main","outDir":"/data/models","doneNameTpl":".qwen35-4b.done"},{"repo":"unsloth/Qwen3.5-4B-GGUF","file":"mmproj-F32.gguf","ref":"main","outDir":"/data/models","doneNameTpl":".mmproj-qwen35.done"},{"repo":"fp16-guy/PicX_real","file":"picX_real.safetensors","ref":"main","outDir":"/data/models","doneNameTpl":".picx-real.done"},{"repo":"ggerganov/whisper.cpp","file":"ggml-large-v3-turbo.bin","ref":"main","outDir":"/data/models","doneNameTpl":".whisper.done"},{"repo":"koboldcpp/tts","file":"Qwen3-TTS-12Hz-1.7B-Base-q8_0.gguf","ref":"main","outDir":"/data/models","doneNameTpl":".tts-model.done"},{"repo":"koboldcpp/tts","file":"qwen3-tts-tokenizer-q8_0.gguf","ref":"main","outDir":"/data/models","doneNameTpl":".tts-tokenizer.done"}]}'
            - "--static"
            - "/app/static"
            - "--port"
            - "8090"
            - "--probe-url"
            - "/api/v1/info/version"
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: models
              mountPath: /data/models
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.userData }}/Huggingface/koboldcpp"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-download-models
  ports:
    - name: download-status
      port: 8090
      targetPort: 8090
  type: ClusterIP
