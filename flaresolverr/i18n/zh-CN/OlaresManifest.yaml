metadata:
  title: FlareSolverr
  description: 绕过 Cloudflare 和 DDoS-GUARD 保护的代理服务器。
spec:
  fullDescription: |
    FlareSolverr 是一个强大的代理服务器，旨在帮助应用程序自动绕过 Cloudflare 和其他反爬虫保护。它通过模拟真实的浏览器环境，使脚本和自动化工具能够访问受保护的网站，而不会被拦截。

    FlareSolverr 在后台自动解决 JavaScript 挑战和安全校验，使其能够可靠地访问通常限制自动请求的网站。这使它对于需要持续获取数据的网页爬虫工具、API 及应用尤为有用。

    FlareSolverr 以灵活性和高性能为核心，能够轻松集成到各种软件中，并支持多平台。其自动化的挑战解决系统可确保与受保护网站的通信顺畅、安全且不中断。

    使用 FlareSolverr，您可以：
    - 自定义代理设置：细致调整代理参数，包括轮换频率、地理位置和代理类型，以优化爬取性能与匿名性。
    - 实时调整：即时修改您的代理配置，以适应不断变化的爬取需求或网站防护策略。
    - 增强安全：利用高级功能，最大程度降低被检测的风险，确保您的爬取活动保持隐蔽。
    - 无缝集成：轻松将代理管理与现有工作流程和爬虫工具集成，实现高效、不中断的数据获取体验。
    - 全面控制：实时监控和调整代理使用情况，让您完全掌控数据的访问和采集方式。
  upgradeDescription: |
    架构已改为单服务部署，并通过 internal 入口机制提供内部 API 服务。

    完整发布说明参见: https://github.com/FlareSolverr/FlareSolverr/releases/tag/v3.4.6
