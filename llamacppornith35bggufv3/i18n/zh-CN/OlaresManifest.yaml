metadata:
  description: "使用 llama.cpp 运行 Ornith-1.0-35B（GGUF Q4_K_M）模型。"
  title: Ornith-1.0-35B (llama.cpp)

spec:
  fullDescription: |
    **模型简介**
    Ornith-1.0-35B 是 DeepReinforce 推出的开源 MoE 模型，专为智能体编码场景设计。采用自改进 RL 框架，联合学习解题轨迹与任务脚手架，支持思考与工具调用。本应用通过 llama.cpp 运行 `deepreinforce-ai/Ornith-1.0-35B-GGUF` 的 `Q4_K_M` GGUF 量化版本。

    适合以代码编写与自动化终端操作为核心的工作负载（智能体编码）。其自改进训练针对 SWE-bench、Terminal-Bench 等编码基准进行了优化。

    **预设配置**
    - 模型：`deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M`
    - 能力：思考、工具
    - 引擎参数：`-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0`（128K 上下文、全量 GPU 卸载、KV 缓存量化为 q8_0）
    - 所需显存：`23Gi`

    **加速器模式**
    | 模式           | 设备             | 说明                                        |
    |----------------|------------------|---------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存，`-ngl all` 完全利用 GPU   |
    | `nvidia-gb10`  | GPU (Spark)      | 类似上方，但显存由 pod 管理                  |
    
    **工作流程说明**
    首先，Model Console 下载并准备模型，然后 `llama.cpp` 在模型准备好后启动服务。这两个部分独立运行但共享文件与进度信息。

    **技术栈说明**
    - **llama.cpp**：运行模型并通过 8081 端口提供 API 服务
    - **Model Console**：下载模型，展示进度，并通过 8090 端口提供 OpenAI API，代理到 `llamacpp`

    **模型存储**
    所有模型文件存储在共享目录 `appCommon/huggingface`（挂载为 `/cache/hf/hub`），同类应用均使用此目录。

