metadata:
  description: "Ornith-1.0-35B (GGUF Q4_K_M) served with llama.cpp."
  title: Ornith-1.0-35B (llama.cpp)

spec:
  fullDescription: |
    **Model Overview**
    Ornith-1.0-35B is an open-source MoE model from DeepReinforce, built for agentic coding. It uses a self-improving RL framework that jointly learns solution rollouts and task-specific scaffolds, and supports thinking and tool calling. This app serves the `Q4_K_M` GGUF build from `deepreinforce-ai/Ornith-1.0-35B-GGUF` via llama.cpp.

    Recommended when your workload centers on code writing and automated terminal operations (agentic coding). Its self-improving training targets benchmarks such as SWE-bench and Terminal-Bench.

    **Preset Configuration**
    - Model: `deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M`
    - Capabilities: thinking, tools
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0` (128K context, full GPU offload, KV cache quantized to q8_0)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    
    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving the model when it's ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

