#   llamacppornith35bggufv3 — engine Deployment (== appid / Release.Name)
#   llminit                  — llm-init / entrance Deployment
workloadReplicas:
  llamacppornith35bggufv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M'
  fullDescription: |
    **Model Overview**
    Ornith-1.0-35B is an open-source MoE model from DeepReinforce, built for agentic coding. It uses a self-improving RL framework that jointly learns solution rollouts and task-specific scaffolds, and supports thinking and tool calling. This app serves the `Q4_K_M` GGUF build from `deepreinforce-ai/Ornith-1.0-35B-GGUF` via llama.cpp.

    Recommended when your workload centers on code writing and automated terminal operations (agentic coding). Its self-improving training targets benchmarks such as SWE-bench and Terminal-Bench.

    **Preset Configuration**
    - Model: `deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M`
    - Capabilities: thinking, tools
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0` (128K context, full GPU offload, KV cache quantized to q8_0)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving the model when it’s ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - This model needs a GPU with at least 23Gi of memory for full acceleration.

  developer: DeepReinforce
  website: https://deep-reinforce.com/ornith_1_0.html
  sourceCode: https://github.com/deepreinforce-ai/Ornith-1
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/deepreinforce-ai/Ornith-1/blob/main/LICENSE

  accelerator:
    #   nvidia       — discrete GPU; LLAMACPP_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: nvidia
      limitedCpu: "15360m"
      requiredCpu: "60m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "35Gi"
      requiredMemory: "20Gi"
      requiredGPUMemory: "23Gi"
      limitedGPUMemory: "24Gi"
    - mode: nvidia-gb10
      limitedCpu: "15360m"
      requiredCpu: "60m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "48Gi"
      requiredMemory: "32Gi"

  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE        # example: hf://unsloth/Qwen3-0.6B-GGUF --include Qwen3-0.6B-Q4_K_M.gguf
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "hf://deepreinforce-ai/Ornith-1.0-35B-GGUF --include ornith-1.0-35b-Q4_K_M.gguf"
    description:  "Example: hf://unsloth/Qwen3-0.6B-GGUF --include Qwen3-0.6B-Q4_K_M.gguf. The source to download your model. For models with split files, only include the first part; for vision-language models, add the projector with a comma, like `hf://<repo> --include model.gguf,hf://<repo> --include mmproj-F16.gguf`."
    regex: "^hf://"
  - envName: MODEL_NAME          # example: unsloth/Qwen3-0.6B-GGUF:Q4_K_M (-hf repo:quant)
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M"
    description:  "Example: unsloth/Qwen3-0.6B-GGUF:Q4_K_M. The name of your model in `owner/repo:quant` format"
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools"
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description:  "The model capabilities. Pick what your model supports, if no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: -c 8192 -ngl all -fa on
    required: true
    default: "-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0"
    type: string
    editable: true
    applyOnChange: true
    description:  "Example: -c 8192 -ngl all -fa on. Extra llama.cpp options, to fully use GPU, add `-ngl all`, for CPU, it adds `-ngl 0` automatically. You can also use values like `LLAMA_ARG_*=val`."
  - envName: LOG_LEVEL           # single-select: debug | info | warn | error
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "info"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: LLAMACPP_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description:  "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
