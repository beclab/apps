  name: llamacppornith35bggufv3
  icon: https://app.cdn.olares.com/appstore/llm/llamacpp/ornith.png
  description: "Ornith-1.0-35B (GGUF Q4_K_M) served with llama.cpp. Requires an NVIDIA GPU."
  appid: llamacppornith35bggufv3
  title: Ornith-1.0-35B (llama.cpp)
  version: '1.0.2'
  categories:
    - AI
sharedEntrances:
  - name: llamacppornith35bggufv3
    host: sharedentrances-api
    port: 0
    title: Ornith-1.0-35B
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/llamacpp/ornith.png
entrances:
