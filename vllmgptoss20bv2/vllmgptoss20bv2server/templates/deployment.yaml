{{- $gpuInfo := include "GPU.getGPUInfo" . | fromJson -}}
{{- $isSparkDGX := $gpuInfo.isSparkDGX -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm
  annotations:
    applications.app.bytetrade.io/gpu-inject: "vllm"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllm
    spec:
      initContainers:
        - name: download-tiktoken
          image: beclab/alpine:3.18
          envFrom:
            - configMapRef:
                name: vllm-config
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              : "${CDN_HOST:?CDN_HOST is required}"
              echo "Using CDN_HOST=${CDN_HOST}"

              mkdir -p /data/tiktoken

              if [ ! -s /data/tiktoken/o200k_base.tiktoken ] || [ ! -s /data/tiktoken/cl100k_base.tiktoken ]; then
                echo "Installing curl..."
                apk add --no-cache curl
              fi

              if [ ! -s /data/tiktoken/o200k_base.tiktoken ]; then
                echo "Downloading o200k_base.tiktoken"
                curl -fL --retry 3 "${CDN_HOST}/o200k_base.tiktoken" -o /data/tiktoken/o200k_base.tiktoken
              fi

              if [ ! -s /data/tiktoken/cl100k_base.tiktoken ]; then
                echo "Downloading cl100k_base.tiktoken"
                curl -fL --retry 3 "${CDN_HOST}/cl100k_base.tiktoken" -o /data/tiktoken/cl100k_base.tiktoken
              fi

              ls -lh /data/tiktoken
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: vllm
          image: "docker.io/vllm/vllm-openai:v0.18.0-cu130"
          command:
            - /bin/bash
            - -c
            - |
              DONE_FILE="/models/gpt-oss-20b/.gpt-oss-20b.done"
              echo "[vllm-wait] Waiting for $DONE_FILE ..."
              while [ ! -f "$DONE_FILE" ]; do
                echo "[vllm-wait] Model not ready, sleeping..."
                sleep 10
              done
              echo "[vllm-wait] Detected $DONE_FILE, starting vLLM server."
              
              echo "[vllm-start] Starting vLLM server..."
              _MEM_UTILS="/usr/local/lib/python3.12/dist-packages/vllm/utils/mem_utils.py"
              if [ -f "$_MEM_UTILS" ]; then
                sed -i 's/shared_sysmem_device_mem_sms = .*$/shared_sysmem_device_mem_sms = ()/' "$_MEM_UTILS"
                echo "[vllm-start] Patched vLLM mem_utils.py (shared_sysmem_device_mem_sms)"
              else
                echo "[vllm-start] WARN: $_MEM_UTILS missing, mem_utils patch skipped"
              fi
              python3 -m vllm.entrypoints.openai.api_server \
                --model "/models/gpt-oss-20b" \
{{- $gpuMemUtil := "0.9" -}}
{{- $maxModelLen := "auto" -}}
{{- if eq $isSparkDGX "true" -}}
{{- $gpuMemUtil = "0.88" -}}
{{- $maxModelLen = "8192" -}}
{{- end -}}
{{- with .Values.olaresEnv }}
                --gpu-memory-utilization {{ .GPU_MEMORY_UTILIZATION | default $gpuMemUtil }} \
                --max-model-len {{ .MAX_MODEL_LEN | default $maxModelLen }} \
{{- else }}
                --gpu-memory-utilization {{ $gpuMemUtil }} \
                --max-model-len {{ $maxModelLen }} \
{{- end }}
                --tensor-parallel-size 1 {{- if eq $isSparkDGX "true" }} \
                --enforce-eager \
                --max-num-seqs 8 \
                --no-enable-prefix-caching{{- end }}
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: VLLM_PORT
              value: "8000"
            - name: TIKTOKEN_ENCODINGS_BASE
              value: /data/tiktoken
            {{- if eq $isSparkDGX "true" }}
            - name: VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS
              value: "1"
            {{- end }}
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "18"
              memory: 32Gi
            requests:
              cpu: 500m
              memory: 18Gi
          volumeMounts:
            - mountPath: /models/gpt-oss-20b
              name: data
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.userspace.userData }}/Huggingface/openaigptoss20b"
            type: DirectoryOrCreate
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: vllm
