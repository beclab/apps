{{- $vllmDomainENV := split "," .Values.domain.vllmclient -}}
{{- $vllmDomain := index $vllmDomainENV "_0" -}}
{{- $gpuInfo := include "GPU.getGPUInfo" . | fromJson -}}
{{- $isSparkDGX := $gpuInfo.isSparkDGX -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  name: vllm
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm
  annotations:
    applications.app.bytetrade.io/gpu-inject: "vllm"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllm
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllm
    spec:
      initContainers:
        - name: download-tiktoken
          image: beclab/alpine:3.18
          envFrom:
            - configMapRef:
                name: vllm-config
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              : "${CDN_HOST:?CDN_HOST is required}"
              echo "Using CDN_HOST=${CDN_HOST}"

              mkdir -p /data/tiktoken

              if [ ! -s /data/tiktoken/o200k_base.tiktoken ] || [ ! -s /data/tiktoken/cl100k_base.tiktoken ]; then
                echo "Installing curl..."
                apk add --no-cache curl
              fi

              if [ ! -s /data/tiktoken/o200k_base.tiktoken ]; then
                echo "Downloading o200k_base.tiktoken"
                curl -fL --retry 3 "${CDN_HOST}/o200k_base.tiktoken" -o /data/tiktoken/o200k_base.tiktoken
              fi

              if [ ! -s /data/tiktoken/cl100k_base.tiktoken ]; then
                echo "Downloading cl100k_base.tiktoken"
                curl -fL --retry 3 "${CDN_HOST}/cl100k_base.tiktoken" -o /data/tiktoken/cl100k_base.tiktoken
              fi

              ls -lh /data/tiktoken
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: vllm
          image: "docker.io/vllm/vllm-openai:v0.17.1-cu130"
          command:
            - /bin/bash
            - -c
            - |
              DONE_FILE="/models/gpt-oss-20b/.gpt-oss-20b.done"
              echo "[vllm-wait] Waiting for $DONE_FILE ..."
              while [ ! -f "$DONE_FILE" ]; do
                echo "[vllm-wait] Model not ready, sleeping..."
                sleep 10
              done
              echo "[vllm-wait] Detected $DONE_FILE, starting vLLM server."
              
              echo "[vllm-start] Starting vLLM server..."
              python3 -m vllm.entrypoints.openai.api_server \
                --model "/models/gpt-oss-20b" \
{{- $gpuMemUtil := "0.9" -}}
{{- $maxModelLen := "auto" -}}
{{- if eq $isSparkDGX "true" -}}
{{- $gpuMemUtil = "0.88" -}}
{{- $maxModelLen := "8192" -}}
{{- end -}}
{{- with .Values.olaresEnv }}
                --gpu-memory-utilization {{ .GPU_MEMORY_UTILIZATION | default $gpuMemUtil }} \
                --max-model-len {{ .MAX_MODEL_LEN | default $maxModelLen }} \
{{- else }}
                --gpu-memory-utilization {{ $gpuMemUtil }} \
                --max-model-len {{ $maxModelLen }} \
{{- end }}
                --tensor-parallel-size 1
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: VLLM_PORT
              value: "8000"
            - name: TIKTOKEN_ENCODINGS_BASE
              value: /data/tiktoken
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "18"
              memory: 28Gi
            requests:
              cpu: 500m
              memory: 20Gi
          volumeMounts:
            - mountPath: /models/gpt-oss-20b
              name: data
            - name: data
              mountPath: /data
        - name: download-model
          image: "docker.io/beclab/harveyff-hf-downloader:v0.1.0"
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: VLLM_PROXY_TARGET
              value: http://localhost:8000
            - name: MODEL_NAME
              value: /models/gpt-oss-20b
            - name: APP_URL
              value: "https://{{ $vllmDomain }}"
          args:
            - "--repo"
            - "openai/gpt-oss-20b"
            - "--ref"
            - "main"
            - "--outdir"
            - "/data"
            - "--static"
            - "/app/static"
            - "--port"
            - "8090"
            - "--probe-url"
            - "/health"
            - "--done-name"
            - ".gpt-oss-20b.done"
          startupProbe:
            httpGet:
              path: /ping
              port: 8090
            initialDelaySeconds: 5
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "500Mi"
            limits:
              cpu: "1"
              memory: 1Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.userspace.userData }}/Huggingface/openaigptoss20b"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  name: download-svc
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm
spec:
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  selector:
    io.kompose.service: vllm
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  name: sharedentrances-api
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8090
  selector:
    io.kompose.service: vllm
status:
  loadBalancer: {}