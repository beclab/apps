{{- $vllmDomainENV := split "," .Values.domain.vllmclient -}}
{{- $vllmDomain := index $vllmDomainENV "_0" -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-download
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm-download
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vllm-download
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: vllm-download
    spec:
      containers:
        - name: download-model
          image: "docker.io/beclab/harveyff-hf-downloader:v0.1.0"
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: VLLM_PROXY_TARGET
              value: http://vllm-svc:8000
            - name: MODEL_NAME
              value: /models/gpt-oss-20b
            - name: APP_URL
              value: "https://{{ $vllmDomain }}"
          args:
            - "--repo"
            - "openai/gpt-oss-20b"
            - "--ref"
            - "main"
            - "--outdir"
            - "/data"
            - "--static"
            - "/app/static"
            - "--port"
            - "8090"
            - "--probe-url"
            - "/health"
            - "--done-name"
            - ".gpt-oss-20b.done"
          startupProbe:
            httpGet:
              path: /ping
              port: 8090
            initialDelaySeconds: 5
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "500Mi"
            limits:
              cpu: "1"
              memory: 1Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.userspace.userData }}/Huggingface/openaigptoss20b"
            type: DirectoryOrCreate
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm-download
spec:
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  selector:
    io.kompose.service: vllm-download

---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-api
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: vllm-download
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8090
  selector:
    io.kompose.service: vllm-download
