metadata:
  description: 提供独立技术，专为现代出版、会员、订阅和新闻简报设计。
  title: Ghost
spec:
  fullDescription: |
    Ghost 是一款强大的应用，专为专业出版者打造，帮助他们创建、分享并围绕内容发展业务。该应用配备现代化工具，用于构建网站、发布内容、发送新闻简报 & 向会员提供付费订阅。

    **简易网站设计**
    拥有对您网站和品牌的完全控制权。
    - 启动您的自定义网站，并根据需求调整设计设置，让您的品牌和风格完美契合。
    - 可在我们的主题市场挑选数百种自定义主题，或者完全由零自定义设计您的专属站点。
    - 您的个性品牌展示于前台，Ghost 默默运行于后台。

    **高级创作者工具**
    支持通过网页与电子邮件新闻简报同步发布内容。
    - 专为专业人士打造的编辑器。设计简洁，默认具备高级工作流。
    - 不再受笨拙工具栏或拖拽失误困扰。
    - 支持丰富媒体与动态内容卡片。
    - 内置新闻资讯推送功能。

    **拓展您的受众**
    将访问者转化为联系对象。
    - Ghost 内置的注册表单让您轻松将匿名访问者转为会员。
    - 用户可免费注册或选择购买付费订阅，支持您的创作工作，支持月付或年付高级会员。

    **开展您的业务**
    管理您的会员体系。
    - 了解谁在注册、谁进行了付费以及他们阅读了哪些内容，助您洞悉核心观众群体。
    内置分析功能。
    - 提供观众参与度的详细分析报告，让您了解哪些内容最受欢迎，谁是您的忠实粉丝。
    优惠与促销。
    - 通过激励优惠和推广活动吸引新订阅者，助力业务增长。

    **集成能力**
    您喜欢的所有应用、插件和工具都可与 Ghost 无缝集成。

  upgradeDescription: |
    - 修复了 TikTok 和 Instagram 用户名的验证问题 (24708) - Troy Ciesco
    - 修复了 Outlook 中的标题图片问题 (24665) - Troy Ciesco
    - 在管理员设置中添加员工邀请缺失的分页 - Jonatan Svennberg
    - 添加巴斯克语翻译 (24642) - Xabi

    完整更新日志请见：https://github.com/TryGhost/Ghost/releases/tag/v6.0.5
