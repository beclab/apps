  fullDescription: |
    DeerFlow 2.0 (Deep Exploration and Efficient Research Flow) is an open-source super agent harness that coordinates sub-agents, memory, and sandboxes for complex AI tasks. Built on LangGraph and LangChain, it is a ground-up rewrite of the original DeerFlow framework.
    Key Features
    Core Capabilities
    - Super Agent Harness
      * Coordinates sub-agents for parallel task execution
      * Sandbox-based code execution (Docker or local)
      * Persistent long-term memory across conversations
      * Extensible skills system (Markdown-based workflows)
    - LLM Integration
      * Supports integration of most models through litellm and LangChain
      * Support for open source models like Qwen, DeepSeek, etc.
      * OpenAI-compatible API interface
      * Multi-model support with thinking/vision capabilities
    Tools and MCP Integrations
    - Search and Retrieval
      * Web search via Tavily, Brave Search and more
      * Crawling with Jina
      * Advanced content extraction
    - MCP Seamless Integration
      * Expand capabilities for private domain access, knowledge graph, web browsing and more
      * Facilitates integration of diverse research tools and methodologies
    Human Collaboration
    - Human-in-the-loop
      * Supports interactive modification of research plans using natural language
      * Supports auto-acceptance of research plans
    - Report Post-Editing
      * Supports Notion-like block editing
      * Allows AI refinements, including AI-assisted polishing, sentence shortening, and expansion
      * Powered by tiptap
    Content Creation
    - Skills-based Workflows
      * Research reports, slide decks, web pages, and image generation
      * Custom skills for specialized workflows
      * Podcast script generation and audio synthesis
  developer: Bytedance Inc.
