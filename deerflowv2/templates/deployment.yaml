{{/*
Build comma-separated GATEWAY_CORS_ORIGINS from the Olares-injected
entrance domain (Values.domain.deerflowv2). The backend's CSRFMiddleware
checks the browser Origin against this allowlist on auth endpoints
(/api/v1/auth/{login/local,register,initialize,logout}); without it the
middleware falls back to comparing Origin against a request_origin
reconstructed from X-Forwarded-* headers, which fails as
"Cross-site auth request denied" whenever the proxy chain rewrites Host
between Olares entrance and clientproxy. Each entrance maps to https://
since Olares always terminates TLS upstream.
*/}}
{{- $rawDomains := "" -}}
{{- with .Values.domain -}}
  {{- $rawDomains = default "" (index . "deerflowv2") -}}
{{- end -}}
{{- $gatewayOrigins := list -}}
{{- range splitList "," $rawDomains }}
  {{/* trim whitespace AND any trailing "/" so we never emit
       https://example.com/ — backend's _normalize_origin() rejects any
       value with a non-empty path component (RFC 6454: Origin = scheme +
       host + port only), and a single trailing slash makes parsed.path
       == "/", silently dropping the entry from the allowlist. */}}
  {{- $h := trimSuffix "/" (trim .) -}}
  {{- if ne $h "" -}}
    {{- $gatewayOrigins = append $gatewayOrigins (printf "https://%s" $h) -}}
  {{- end -}}
{{- end -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deerflowv2-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: deerflowv2-backend
spec:
  replicas: {{ (index .Values.workloads "deerflowv2-backend").replicaCount }}
  selector:
    matchLabels:
      app: deerflowv2-backend
  # Recreate ensures only one backend pod runs at a time. RollingUpdate
  # would briefly run two pods (maxSurge:1) and avoid the zero-pod 502
  # window during upgrades, but two backend pods sharing the same
  # hostPath state (memory.json, .langgraph_api scratch dirs) and the
  # same PG checkpointer pool can race in subtle ways: concurrent
  # memory.json writes, LangGraph in-process run state diverging across
  # replicas, and rate-limiter dicts (login attempts / setup-status
  # cooldown) being per-process. The trade-off is a short 502 window
  # during upgrades; the readinessProbe + preStop + terminationGrace
  # below keep that window as small as possible (typically a few
  # seconds, just the new pod's uvicorn startup time).
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: deerflowv2-backend
    spec:
      # Default is 30s, but uvicorn needs to (a) finish in-flight
      # requests, (b) close the LangGraph postgres pool, and (c) close
      # the SQLAlchemy engine cleanly. Bumping to 45s leaves headroom
      # so SIGKILL doesn't truncate a long checkpointer write mid-run.
      terminationGracePeriodSeconds: 45
      initContainers:
        - name: init-config
          image: docker.io/beclab/harveyff-deerflow-backend:v2.0.7-pg
          command:
            - sh
            - -c
            - |
              set -e
              echo "Initializing DeerFlow 2.0 config..."

              if [ ! -f /config/config.yaml ]; then
                echo "Copying initial config.yaml..."
                cp /init-config/config.yaml /config/config.yaml
              else
                echo "config.yaml already exists, skipping copy."
                # Chart 1.0.9: switch the persistence backend on existing
                # installs from sqlite to postgres. The python migration
                # script (mounted from the same configmap) surgically
                # rewrites the `database:` block in place while preserving
                # every other field (custom `models:` etc.). Done in
                # python -- not sed/awk -- because top-level YAML block
                # replacement is fragile w.r.t. indentation, comments,
                # and key order. Idempotent: re-running on an already
                # migrated config.yaml is a no-op. The deer-flow image
                # already ships python3.12, no extra deps needed.
                python3 /init-config/migrate_database_to_postgres.py /config/config.yaml
                # Idempotent migration for chart >= 1.0.6: upstream PR #1547
                # gates the bash tool behind sandbox.allow_host_bash; without
                # the flag the LLM cannot pip/apt install runtime helpers and
                # OCR on uploaded images silently breaks. Existing users with
                # a 1.0.5-or-earlier config.yaml on persistent storage need
                # the flag injected here, since the new ConfigMap default
                # never touches their on-disk file.
                if grep -qE '^sandbox:' /config/config.yaml && ! grep -qE 'allow_host_bash' /config/config.yaml; then
                  echo "Migrating /config/config.yaml: enabling sandbox.allow_host_bash"
                  sed -i '/^sandbox:$/a\  allow_host_bash: true  # auto-added by chart 1.0.6 init: restores OCR/runtime-install path (upstream PR #1547)' /config/config.yaml
                fi

                # Chart 1.0.8 additions -- aligns existing config.yaml with
                # upstream's config.example.yaml v8. Each top-level key is
                # checked + appended individually so a partial migration
                # (operator hand-edited some sections, not others) still
                # gets the missing pieces. All appends are idempotent: if
                # the key is already present we leave it alone, even if its
                # value differs from our preferred default.
                if ! grep -qE '^log_level:' /config/config.yaml; then
                  echo "Migrating /config/config.yaml: appending log_level"
                  printf '\n%s\n' 'log_level: info  # chart 1.0.8: see deerflowv2-init-config' >> /config/config.yaml
                fi
                if ! grep -qE '^token_usage:' /config/config.yaml; then
                  echo "Migrating /config/config.yaml: appending token_usage"
                  printf '\n%s\n%s\n' \
                    '# chart 1.0.8: surface token counts in the workspace UI' \
                    'token_usage:' \
                    '  enabled: true' >> /config/config.yaml
                fi
                if ! grep -qE '^uploads:' /config/config.yaml; then
                  echo "Migrating /config/config.yaml: appending uploads (sourced from env vars)"
                  printf '\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n' \
                    '# chart 1.0.8: upload limits from deerflowv2-env-config UPLOADS_*' \
                    'uploads:' \
                    '  max_files: $UPLOADS_MAX_FILES' \
                    '  max_file_size: $UPLOADS_MAX_FILE_SIZE' \
                    '  max_total_size: $UPLOADS_MAX_TOTAL_SIZE' \
                    '  auto_convert_documents: false' \
                    '  pdf_converter: auto' >> /config/config.yaml
                fi
                if ! grep -qE '^run_events:' /config/config.yaml; then
                  echo "Migrating /config/config.yaml: appending run_events (persist traces to sqlite)"
                  printf '\n%s\n%s\n%s\n%s\n%s\n' \
                    '# chart 1.0.8: persist message + tool-call traces to sqlite so' \
                    '# token-usage history and run audit logs survive pod restarts.' \
                    'run_events:' \
                    '  backend: db' \
                    '  max_trace_content: 10240' >> /config/config.yaml
                fi
                if ! grep -qE '^circuit_breaker:' /config/config.yaml; then
                  echo "Migrating /config/config.yaml: appending circuit_breaker"
                  printf '\n%s\n%s\n%s\n%s\n' \
                    '# chart 1.0.8: stop hammering a dying provider after 5 failures' \
                    'circuit_breaker:' \
                    '  failure_threshold: 5' \
                    '  recovery_timeout_sec: 60' >> /config/config.yaml
                fi
                # Pin config_version: 8 so deer-flow stops logging the
                # outdated-config warning on every startup.
                if grep -qE '^config_version:' /config/config.yaml; then
                  sed -i 's/^config_version:.*/config_version: 8/' /config/config.yaml
                else
                  printf '\n%s\n' 'config_version: 8  # chart 1.0.8: matches upstream config.example.yaml' >> /config/config.yaml
                fi
              fi

              if [ ! -f /config/extensions_config.json ]; then
                echo "Copying initial extensions_config.json..."
                cp /init-config/extensions_config.json /config/extensions_config.json
              else
                echo "extensions_config.json already exists, skipping."
              fi

              mkdir -p /data/deer-flow
              mkdir -p /skills/public /skills/custom
              mkdir -p /langgraph-api
              # Chart >= 1.0.9: db lives in postgres now, the legacy sqlite
              # dir under /data/deer-flow/db is no longer mkdir'd. We do
              # NOT delete the existing file (if any) so operators can
              # still rescue data from it manually.

              # Chart-managed skill: image-ocr.
              # Always overwrite so chart bumps push updated skill content.
              # If an operator wants a custom OCR policy, they should edit
              # the SKILL.md frontmatter `name:` to a different value (e.g.
              # `image-ocr-local`); init only owns files literally named
              # `image-ocr` because that is the directory name we manage.
              # See configmap.yaml `image-ocr-skill.md` for the rationale.
              mkdir -p /skills/custom/image-ocr
              cp /init-config/image-ocr-skill.md /skills/custom/image-ocr/SKILL.md

              # The gateway/langgraph containers run as PUID/PGID=1000 (the
              # image flips to a non-root account at startup). hostPath dirs
              # created here as uid 0 stay owned by root, so the runtime
              # process cannot write memory.json / per-thread user-data /
              # .langgraph_api/ scratch files. chown unconditionally --
              # cheap, and harmless if the image actually stays as root.
              # (Database state lives in postgres now; only filesystem
              # state needs this treatment.)
              chown -R 1000:1000 /data/deer-flow /skills /config /langgraph-api

              echo "Init complete."
          volumeMounts:
            - name: init-config-vol
              mountPath: /init-config
            - name: config-volume
              mountPath: /config
            - name: data-volume
              mountPath: /data/deer-flow
            - name: skills-volume
              mountPath: /skills
            - name: langgraph-api-volume
              mountPath: /langgraph-api
          securityContext:
            runAsUser: 0
      containers:
        - name: gateway
          image: docker.io/beclab/harveyff-deerflow-backend:v2.0.7-pg
          command:
            - sh
            - -c
            - "cd /app/backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
          # Delay SIGTERM by 5s so K8s has time to (1) flip the pod's
          # readiness off, (2) propagate the endpoint removal to
          # kube-proxy / clientproxy, and (3) drain any in-flight
          # request. Without this, the pod stops accepting connections
          # the instant termination starts -- requests already routed to
          # this pod (but not yet read) get a TCP RST and surface as a
          # browser-side ECONNRESET / 502 mid-shutdown. With the Recreate
          # strategy this gives the proxy time to start returning a clean
          # 503 instead of yanking the TCP socket out from under in-flight
          # work. 5s matches the K8s "graceful pod termination" recipe
          # and the readinessProbe periodSeconds (so we wait at least one
          # full scrape cycle before killing uvicorn).
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          ports:
            - containerPort: 8001
              name: gateway
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          # K8s only routes Service traffic to a pod when its
          # readinessProbe passes. Without this block, the pod is
          # marked Ready as soon as the container starts (default
          # behavior), so during a rollout the new pod is added to the
          # service endpoint set BEFORE uvicorn finishes binding to
          # 8001 -- clientproxy gets `connection refused`, browsers
          # see a window of 502s. Tying readiness to /health (same
          # endpoint as startupProbe + livenessProbe) closes that
          # window: the pod only joins the endpoints when uvicorn is
          # actually serving. failureThreshold:3 is permissive enough
          # to ride out transient blips (a single missed scrape during
          # a long PG query) without flapping out of rotation.
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          env:
            - name: CI
              value: "true"
            - name: DEER_FLOW_HOME
              value: "/data/deer-flow"
            - name: DEER_FLOW_CONFIG_PATH
              value: "/config/config.yaml"
            - name: DEER_FLOW_EXTENSIONS_CONFIG_PATH
              value: "/config/extensions_config.json"
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deerflowv2-auth-secret
                  key: AUTH_JWT_SECRET
            # Trust X-Real-IP only when the TCP peer is in this CIDR --
            # used by routers/auth.py::_get_client_ip() for per-IP rate
            # limiting (login attempts + /api/v1/auth/setup-status 60s
            # cooldown). Without it, the gateway sees every browser
            # request as coming from the same clientproxy pod IP, so the
            # cooldown is global and the second tab/refresh on /setup
            # gets 429. 10.233.0.0/16 covers the standard Olares
            # cluster pod CIDR (kube-ovn + flannel default); the
            # clientproxy itself transparently forwards Olares
            # entrance's X-Real-IP (see clientproxy.yaml).
            - name: AUTH_TRUSTED_PROXIES
              value: "10.233.0.0/16"
            # Allowlist for CSRFMiddleware.is_allowed_auth_origin(). Built
            # from the Olares-injected entrance domain at chart-render time
            # (see header of this template). Required because the Olares
            # entrance proxy may rewrite Host before the request reaches
            # clientproxy, breaking the backend's request_origin
            # reconstruction and producing "Cross-site auth request denied"
            # 403s on /setup, /register, /login, /initialize.
            {{- if gt (len $gatewayOrigins) 0 }}
            - name: GATEWAY_CORS_ORIGINS
              value: {{ join "," $gatewayOrigins | quote }}
            {{- end }}
            # Olares postgres middleware — connection details populated by
            # the Olares chart values injector at install/upgrade time.
            #
            # DATABASE_URL — SQLAlchemy + **asyncpg** only. Do NOT add libpq
            # query params such as keepalives_* here; asyncpg rejects them and
            # the gateway will crash on startup (TypeError: unexpected keyword
            # argument 'keepalives').
            #
            # CHECKPOINTER_DATABASE_URL — LangGraph AsyncPostgresSaver +
            # **psycopg** (libpq). Same server/db as DATABASE_URL but with TCP
            # keepalive query params so idle connections are not silently dropped
            # by kube-proxy / NAT before psycopg's pool notices.
            #
            # config.yaml sets `database.postgres_url: $DATABASE_URL` and
            # `checkpointer_postgres_url: $CHECKPOINTER_DATABASE_URL`.
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.deerflow }}"
            - name: CHECKPOINTER_DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.deerflow }}?keepalives=1&keepalives_idle=30&keepalives_interval=10&keepalives_count=5"
          envFrom:
            - configMapRef:
                name: deerflowv2-env-config
          resources:
            requests:
              cpu: "50m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: data-volume
              mountPath: /data/deer-flow
            - name: skills-volume
              mountPath: /app/skills
            # On-demand legacy SQLite -> postgres migration tool. Mounted
            # only into the gateway container (not langgraph) since the
            # operator runs it via `kubectl exec deploy/... -c gateway`.
            # Uses items: projection so only the two migration files
            # appear under /migrate -- the rest of init-config (config.yaml,
            # the OCR skill, the database backend rewriter) does not leak
            # into the runtime filesystem. See configmap.yaml for the
            # script source and operator usage instructions.
            - name: migrate-vol
              mountPath: /migrate
        - name: langgraph
          image: docker.io/beclab/harveyff-deerflow-backend:v2.0.7-pg
          command:
            - sh
            - -c
            - "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
          # See gateway preStop for rationale.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          ports:
            - containerPort: 2024
              name: langgraph
          # See gateway readinessProbe for rationale. langgraph dev
          # exposes /ok (not /health) -- doc'd in deer-flow's
          # deployment-guide and operations-and-troubleshooting pages.
          # initialDelaySeconds is higher than gateway's because
          # `langgraph dev --no-reload --allow-blocking` does its
          # graph compilation + checkpoint pool warmup synchronously
          # at startup; on cold pulls this can take 20-30s before /ok
          # responds. failureThreshold:6 (= 30s of /ok failures)
          # tolerates a slow PG checkpointer pool initialisation.
          readinessProbe:
            httpGet:
              path: /ok
              port: 2024
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ok
              port: 2024
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          env:
            - name: CI
              value: "true"
            - name: DEER_FLOW_HOME
              value: "/data/deer-flow"
            - name: DEER_FLOW_CONFIG_PATH
              value: "/config/config.yaml"
            - name: DEER_FLOW_EXTENSIONS_CONFIG_PATH
              value: "/config/extensions_config.json"
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deerflowv2-auth-secret
                  key: AUTH_JWT_SECRET
            # See gateway container for rationale.
            - name: AUTH_TRUSTED_PROXIES
              value: "10.233.0.0/16"
            {{- if gt (len $gatewayOrigins) 0 }}
            - name: GATEWAY_CORS_ORIGINS
              value: {{ join "," $gatewayOrigins | quote }}
            {{- end }}
            # Mirror gateway env: plain DATABASE_URL for ORM, keepalive URL for
            # LangGraph checkpointer. See gateway container comments above.
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.deerflow }}"
            - name: CHECKPOINTER_DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.deerflow }}?keepalives=1&keepalives_idle=30&keepalives_interval=10&keepalives_count=5"
          envFrom:
            - configMapRef:
                name: deerflowv2-env-config
          resources:
            requests:
              cpu: "100m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: data-volume
              mountPath: /data/deer-flow
            - name: skills-volume
              mountPath: /app/skills
            - name: langgraph-api-volume
              mountPath: /app/backend/.langgraph_api
      volumes:
        - name: init-config-vol
          configMap:
            name: deerflowv2-init-config
        # Subset of init-config exposed to the gateway container at /migrate
        # for on-demand legacy SQLite -> postgres migration. Items projection
        # keeps the runtime mount clean (only the two migration files, no
        # config.yaml or skill content leaking in). 0755 lets the operator
        # `sh /migrate/migrate_legacy_sqlite.sh ...` directly without an
        # explicit `chmod +x`.
        - name: migrate-vol
          configMap:
            name: deerflowv2-init-config
            defaultMode: 0755
            items:
              - key: migrate_legacy_sqlite.sh
                path: migrate_legacy_sqlite.sh
              - key: migrate_legacy_sqlite.py
                path: migrate_legacy_sqlite.py
        - name: config-volume
          hostPath:
            path: '{{ .Values.userspace.appData }}/config'
            type: DirectoryOrCreate
        - name: data-volume
          hostPath:
            path: '{{ .Values.userspace.appData }}/deer-flow'
            type: DirectoryOrCreate
        - name: skills-volume
          hostPath:
            path: '{{ .Values.userspace.appData }}/skills'
            type: DirectoryOrCreate
        - name: langgraph-api-volume
          hostPath:
            path: '{{ .Values.userspace.appData }}/langgraph_api'
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: deerflowv2-backend-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: deerflowv2-backend
  ports:
    - name: gateway
      port: 8001
      targetPort: 8001
    - name: langgraph
      port: 2024
      targetPort: 2024
  type: ClusterIP
