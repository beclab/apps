# Persists DeerFlow's JWT signing secret across helm upgrades and reinstalls.
#
# - First install: helpers/`deerflowv2.authJwtSecret` generates `randAlphaNum 64`
#   and writes it here. The gateway and langgraph containers mount this Secret
#   via `secretKeyRef` and use it as `AUTH_JWT_SECRET` to sign session JWTs.
# - Later renders: `lookup` returns the existing Secret, the helper re-reads
#   the stored value, so `helm upgrade` never rotates the secret. Without
#   this, every chart bump would silently invalidate every active session.
# - `helm.sh/resource-policy: keep` keeps the Secret on `helm uninstall` so a
#   later reinstall reattaching the same `users.db` hostPath still validates
#   tokens that were issued before the uninstall.
#
# Operators who want to rotate the secret on purpose: delete this Secret
# manually, then `helm upgrade` — the helper will mint a fresh one and all
# users will be forced to sign in again.
apiVersion: v1
kind: Secret
metadata:
  name: deerflowv2-auth-secret
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: deerflowv2
    app.kubernetes.io/component: auth
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  AUTH_JWT_SECRET: {{ include "deerflowv2.authJwtSecret" . | b64enc | quote }}
