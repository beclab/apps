olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  appid: openedaispeechv3
  name: openedaispeechv3
  title: OpenedAI Speech
  description: An OpenAI API compatible text to speech server using Coqui AI and/or piper TTS as the backend.
  icon: https://app.cdn.olares.com/appstore/openedai/icon.png
  version: '1.1.10'
  categories:
  - AI
  - Creativity

permission:
  appData: true

sharedEntrances:
- name: openedaispeechv3
  title: OpenedAI Speech
  host: sharedentrances-api
  icon: https://app.cdn.olares.com/appstore/openedai/icon.png
  port: 0
  invisible: true
  authLevel: internal

entrances:
- authLevel: internal
  host: openedaispeech-proxy
  icon: https://app.cdn.olares.com/appstore/openedai/icon.png
  name: openedaispeechv3
  openMethod: window
  port: 8080
  title: OpenedAI Speech
  invisible: true

workloadReplicas:
  openedaispeechv3: 1
  openedaispeechv3client: 1

spec:
  versionName: '0.18.2'
  featuredImage: https://app.cdn.olares.com/appstore/openedai/1.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/openedai/1.webp
  - https://app.cdn.olares.com/appstore/openedai/2.webp
  - https://app.cdn.olares.com/appstore/openedai/3.webp
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    OpenedAI Speech is an OpenAI API compatible text to speech server.
    - Compatible with the OpenAI audio/speech API
    - Serves the /v1/audio/speech endpoint
    - Not affiliated with OpenAI in any way, does not require an OpenAI API Key
    - A free, private, text-to-speech server with custom voice cloning

    Multiple Default Voices Available:
    - tts-1: alloy, echo, fable, onyx, nova, and shimmer
    - tts-1-hd: alloy, echo, fable, onyx, nova, and shimmer

    Supports Various Formats
    - response in mp3, opus, aac, flac, wav and pcm
    - adjust speed between 0.25-4.0 (and more)

    **MODEL NOTE**
    No install-time model bundle. On first container start the upstream image downloads
    Piper and Coqui XTTS weights (~2GB) into persistent app data at `appData/voices`
    (mounted as `/app/voices`). Voice configuration lives in `appData/config`.
    Subsequent restarts reuse the data directory.

    - **`tts-1` (Piper)**: CPU only — choose **cpu** accelerator mode if you do not need GPU.
    - **`tts-1-hd` (XTTS)**: requires **nvidia** GPU (~4Gi VRAM); first HD request may be slow
      while the model loads into GPU memory.

  upgradeDescription: |
    Migrated OpenedAI Speech to the apiVersion v3 shared app pattern (openedaispeechv2 → openedaispeechv3).

    **What's Changed**

    - **Model provisioning**: unchanged — no llm-init or CDN pre-download; models are
      still fetched by the container on first start into `appCache/voices`.
    - **Architecture**: flattened the openedaispeechv2 / openedaispeechv2server sub-charts
      into a single chart; backends resolve within the release namespace (dropping the
      `*-shared` admin / non-admin split).
    - **Accelerator**: `cpu` mode for Piper (`tts-1`) only; `nvidia` mode for XTTS
      voice cloning / `tts-1-hd` (~4Gi VRAM).
    - **Scaling**: `workloadReplicas` declares the engine and nginx client workloads.

  developer: matatonic
  website: https://github.com/matatonic/openedai-speech
  sourceCode: https://github.com/matatonic/openedai-speech
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/matatonic/openedai-speech?tab=readme-ov-file#readme
  license:
  - text: AGPL-3.0
    url: https://github.com/matatonic/openedai-speech#AGPL-3.0-1-ov-file
  supportArch:
  - amd64
  - arm64
  onlyAdmin: true

  requiredCpu: 200m
  limitedCpu: "5"
  requiredMemory: 2560Mi
  limitedMemory: 9Gi
  requiredDisk: 3Gi
  limitedDisk: 10Gi
options:
  shared: true
  allowedOutboundPorts:
  - 80
  - 443
  conflicts:
  - name: openedaispeechv2
    type: application
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
