metadata:
  description: 高效 Usenet 下载应用
  title: Nzbget
spec:
  fullDescription: |
    NZBGet 是一个二进制下载器，根据 nzb 文件中提供的信息从 Usenet 下载文件。

    **关于本应用**

    原版 NZBGet 由 [nzbget/nzbget](https://github.com/nzbget/nzbget)（hugbug）维护。社区继任项目 [nzbgetcom/nzbget](https://github.com/nzbgetcom/nzbget) 继续开发，本 Olares 应用使用该版本。

    - 原版项目：https://github.com/nzbget/nzbget
    - 继任项目：https://github.com/nzbgetcom/nzbget

  upgradeDescription: |
    升级 NZBGet 至版本 26.2（2026-06-26）
    Config changes: unified download directory & entrance auth level.
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 添加 Olares External 目录挂载路径为 /olares/userdata/external
    - 保留旧版 /downloads 挂载以兼容已有配置
    - 新安装默认下载路径：Home/Downloads/nzbget
    - 入口认证级别更改为 internal
