apiVersion: v1
kind: ConfigMap
metadata:
  name: nzbget-init
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    homeDir="/olares/userdata/home"
    confFile="/config/nzbget.conf"
    defaultConf="/chart-defaults/nzbget.conf"

    mkdir -p "$homeDir/Downloads/nzbget/inter" \
      /config/nzb /config/queue /config/tmp /config/scripts
    touch /config/nzbget.log
    # Only app-created Downloads subtree + appData — never recurse the whole Home.
    chown -R 1000:1000 "$homeDir/Downloads/nzbget" /config

    if [ ! -f "$confFile" ]; then
      echo "First-time setup: copying default nzbget.conf into /config."
      cp "$defaultConf" "$confFile"
    else
      echo "Existing nzbget.conf found in /config."
    fi
