  fullDescription: |
    Open WebUI(Formerly Ollama WebUI) is an extensible, feature-rich, and user-friendly self-hosted WebUI designed to operate entirely offline. It supports various LLM runners, including Ollama and OpenAI-compatible APIs. For more information, be sure to check out our Open WebUI Documentation.

    **Key Features of Open WebUI**
    - Ollama/OpenAI API Integration: Effortlessly integrate OpenAI-compatible APIs for versatile conversations alongside Ollama models. Customize the OpenAI API URL to link with LMStudio, GroqCloud, Mistral, OpenRouter, and more.

    - Pipelines, Open WebUI Plugin Support: Seamlessly integrate custom logic and Python libraries into Open WebUI using Pipelines Plugin Framework. Launch your Pipelines instance, set the OpenAI URL to the Pipelines URL, and explore endless possibilities. Examples include Function Calling, User Rate Limiting to control access, Usage Monitoring with tools like Langfuse, Live Translation with LibreTranslate for multilingual support, Toxic Message Filtering and much more.

    - Responsive Design: Enjoy a seamless experience across Desktop PC, Laptop, and Mobile devices.

    - Progressive Web App (PWA) for Mobile: Enjoy a native app-like experience on your mobile device with our PWA, providing offline access on localhost and a seamless user interface.

    - Full Markdown and LaTeX Support: Elevate your LLM experience with comprehensive Markdown and LaTeX capabilities for enriched interaction.

    - Hands-Free Voice/Video Call: Experience seamless communication with integrated hands-free voice and video call features, allowing for a more dynamic and interactive chat environment.

    - Model Builder: Easily create Ollama models via the Web UI. Create and add custom characters/agents, customize chat elements, and import models effortlessly through Open WebUI Community integration.

    - Native Python Function Calling Tool: Enhance your LLMs with built-in code editor support in the tools workspace. Bring Your Own Function (BYOF) by simply adding your pure Python functions, enabling seamless integration with LLMs.

    - Local RAG Integration: Dive into the future of chat interactions with groundbreaking Retrieval Augmented Generation (RAG) support. This feature seamlessly integrates document interactions into your chat experience. You can load documents directly into the chat or add files to your document library, effortlessly accessing them using the # command before a query.

    - Web Search for RAG: Perform web searches using providers like SearXNG, Google PSE, Brave Search, serpstack, serper, Serply, DuckDuckGo and TavilySearch and inject the results directly into your chat experience.

    - Web Browsing Capability: Seamlessly integrate websites into your chat experience using the # command followed by a URL. This feature allows you to incorporate web content directly into your conversations, enhancing the richness and depth of your interactions.

    - Image Generation Integration: Seamlessly incorporate image generation capabilities using options such as AUTOMATIC1111 API or ComfyUI (local), and OpenAI's DALL-E (external), enriching your chat experience with dynamic visual content.

    - Many Models Conversations: Effortlessly engage with various models simultaneously, harnessing their unique strengths for optimal responses. Enhance your experience by leveraging a diverse set of models in parallel.

    - Role-Based Access Control (RBAC): Ensure secure access with restricted permissions; only authorized individuals can access your Ollama, and exclusive model creation/pulling rights are reserved for administrators.

    - Multilingual Support: Experience Open WebUI in your preferred language with our internationalization (i18n) support. Join us in expanding our supported languages! We're actively seeking contributors!

    - Continuous Updates: We are committed to improving Open WebUI with regular updates, fixes, and new features.

  upgradeDescription: |
    Upgrade Open WebUI to **v0.10.2** (chart **1.0.34**).

    Packaged (Olares chart)
    - **DB backup before upgrade (default on):** **`ENABLE_WEBUI_DB_BACKUP`** defaults to **`true`**. On each new chart version, before the app starts, if `webui.db` exists and `data/backups/webui_chart_<chart-version>.db` is not there yet, the init container copies it once (same appData volume). To **skip** backup for a rollout, set **`ENABLE_WEBUI_DB_BACKUP`** to **`false`** under Settings → Application → environment variables **before** upgrading.
    - **Schema migration:** v0.10.x includes database schema changes (reworked memory system, folder sharing, events); the bundled backup is strongly recommended before rolling out. Multi-worker or load-balanced deployments must be updated together — rolling updates are not supported.
    - **Persistent session key (default on):** **`ENABLE_WEBUI_SECRET_KEY_PERSIST`** remains **`true`**, keeping login sessions stable across restarts and upgrades via `data/.webui_secret_key` on the appData volume.
    - **Existing data:** Your database file under appData is kept; Open WebUI upgrades its schema automatically on startup.

    Open WebUI v0.9.6 → v0.10.2 — main changes

    **Major features (v0.10.0)**
    - **Share folders with your team:** share a folder and its chats with specific users, groups, or everyone (read/write); admins control this via a new "Folders Sharing" permission (off by default).
    - **Automatic context compaction:** long conversations can be summarized automatically to stay within a model's context window (off by default; configurable threshold and prompt).
    - **Open WebUI Computer agent support:** connect to Open WebUI Computer via its OpenAI-compatible gateway for full agent sessions with file, terminal, git, and web access.
    - **Reworked memory system:** distinct long-lived personal memories and per-conversation context, managed through structured add/update/delete flows.
    - **External knowledge bases:** back knowledge bases with external retrieval sources via configurable external knowledge connections.
    - **Event functions & webhooks:** new Event function plugin primitive hooks into system events (sign-ups, config changes, file uploads, etc.); administrators can route events as outbound webhooks from a new event settings page.
    - **Admin authentication panel:** LDAP and OAuth/OIDC settings now have a dedicated Authentication settings page.
    - **Much faster hybrid search** on large knowledge bases (native pgvector queries instead of loading entire collections into memory).

    **Security & access control (v0.10.0–v0.10.2)**
    - **Security advisories:** v0.10.0 and v0.10.2 include security and access-control fixes; updating production deployments promptly is recommended.
    - **Knowledge base write access enforced on upload;** API key, TTS, and image-edit permissions enforced on all endpoints; arena fallback respects model access rules.
    - **Path traversal, DNS rebinding, and session hardening:** heavily encoded paths rejected; image URL and web fetch fetches re-check destination addresses; revoked sessions rejected on WebSocket connections.
    - **Web search domain filtering (v0.10.2):** domain allow/block rules now match against the host, closing a gap where some URLs could slip past the filter.

    **New & improved (v0.10.0–v0.10.2)**
    - **Streamed reasoning display (v0.10.2):** models that emit thinking/reasoning show that content as it streams, in chat overview and exports.
    - **Folder uploads to knowledge bases (v0.10.2):** dragging or syncing a folder now recreates its subfolder structure instead of flattening files.
    - **Memory system context toggle (v0.10.2):** admins can keep memory tools available while choosing not to add stored memories to system context.
    - **API configs via environment:** per-connection Ollama and OpenAI API configs via **`OLLAMA_API_CONFIGS`** and **`OPENAI_API_CONFIGS`**; arena models via **`EVALUATION_ARENA_MODELS`**.
    - **Argon2 password hashing option,** optional encryption of valve values at rest, AWS RDS IAM database authentication, and configurable secret key length.
    - **New web search providers:** SERPHouse, Microsoft Web IQ; optional web search confirmation; speech-to-text multipart or base64 JSON format.

    **Reliability & fixes (selected)**
    - **Safer database upgrades (v0.10.2):** SQLite user-table migration no longer crashes or corrupts saved user settings.
    - **Fewer unexpected logouts (v0.10.2):** a single authorization error no longer signs you out while the session is still valid.
    - **Shared folder read-only chats (v0.10.1):** opening chats from shared folders no longer incorrectly signs users out.
    - **Non-admin settings save (v0.10.2):** non-admin users can again save interface settings (default model, theme).
    - **Python code execution (v0.10.2):** Pyodide sandbox startup failures fixed; tool dialogs no longer hang when dismissed.
    - **Chat search, notifications, and default model (v0.10.2):** search finds structured-output messages; notification previews show clean text; selected model persists after page reload.
    - **Sidebar chat timestamps (v0.10.2):** show last-active time instead of creation time.

    **Performance**
    - **Dramatically faster** knowledge-base file search, streaming, tool-call rendering, password hashing, model downloads, and hybrid search on large collections.
    - **Non-blocking** audio model loading, URL safety checks, uploads, and link fetches keep the server responsive under load.

    Full release notes:
    - https://github.com/open-webui/open-webui/releases/tag/v0.10.0
    - https://github.com/open-webui/open-webui/releases/tag/v0.10.1
    - https://github.com/open-webui/open-webui/releases/tag/v0.10.2

