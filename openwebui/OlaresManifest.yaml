  fullDescription: |
    Open WebUI(Formerly Ollama WebUI) is an extensible, feature-rich, and user-friendly self-hosted WebUI designed to operate entirely offline. It supports various LLM runners, including Ollama and OpenAI-compatible APIs. For more information, be sure to check out our Open WebUI Documentation.

    **Key Features of Open WebUI**
    - Ollama/OpenAI API Integration: Effortlessly integrate OpenAI-compatible APIs for versatile conversations alongside Ollama models. Customize the OpenAI API URL to link with LMStudio, GroqCloud, Mistral, OpenRouter, and more.

    - Pipelines, Open WebUI Plugin Support: Seamlessly integrate custom logic and Python libraries into Open WebUI using Pipelines Plugin Framework. Launch your Pipelines instance, set the OpenAI URL to the Pipelines URL, and explore endless possibilities. Examples include Function Calling, User Rate Limiting to control access, Usage Monitoring with tools like Langfuse, Live Translation with LibreTranslate for multilingual support, Toxic Message Filtering and much more.

    - Responsive Design: Enjoy a seamless experience across Desktop PC, Laptop, and Mobile devices.

    - Progressive Web App (PWA) for Mobile: Enjoy a native app-like experience on your mobile device with our PWA, providing offline access on localhost and a seamless user interface.

    - Full Markdown and LaTeX Support: Elevate your LLM experience with comprehensive Markdown and LaTeX capabilities for enriched interaction.

    - Hands-Free Voice/Video Call: Experience seamless communication with integrated hands-free voice and video call features, allowing for a more dynamic and interactive chat environment.

    - Model Builder: Easily create Ollama models via the Web UI. Create and add custom characters/agents, customize chat elements, and import models effortlessly through Open WebUI Community integration.

    - Native Python Function Calling Tool: Enhance your LLMs with built-in code editor support in the tools workspace. Bring Your Own Function (BYOF) by simply adding your pure Python functions, enabling seamless integration with LLMs.

    - Local RAG Integration: Dive into the future of chat interactions with groundbreaking Retrieval Augmented Generation (RAG) support. This feature seamlessly integrates document interactions into your chat experience. You can load documents directly into the chat or add files to your document library, effortlessly accessing them using the # command before a query.

    - Web Search for RAG: Perform web searches using providers like SearXNG, Google PSE, Brave Search, serpstack, serper, Serply, DuckDuckGo and TavilySearch and inject the results directly into your chat experience.

    - Web Browsing Capability: Seamlessly integrate websites into your chat experience using the # command followed by a URL. This feature allows you to incorporate web content directly into your conversations, enhancing the richness and depth of your interactions.

    - Image Generation Integration: Seamlessly incorporate image generation capabilities using options such as AUTOMATIC1111 API or ComfyUI (local), and OpenAI's DALL-E (external), enriching your chat experience with dynamic visual content.

    - Many Models Conversations: Effortlessly engage with various models simultaneously, harnessing their unique strengths for optimal responses. Enhance your experience by leveraging a diverse set of models in parallel.

    - Role-Based Access Control (RBAC): Ensure secure access with restricted permissions; only authorized individuals can access your Ollama, and exclusive model creation/pulling rights are reserved for administrators.

    - Multilingual Support: Experience Open WebUI in your preferred language with our internationalization (i18n) support. Join us in expanding our supported languages! We're actively seeking contributors!

    - Continuous Updates: We are committed to improving Open WebUI with regular updates, fixes, and new features.

  upgradeDescription: |
    Upgrade Open WebUI to **v0.9.5** (chart **1.0.28**).

    Packaged (Olares chart)
    - **CPU-only image:** this chart now ships the standard CPU image only. GPU annotations and the `-cuda` image variant have been removed; the deployment runs the non-GPU build regardless of node configuration.
    - **DB backup before upgrade (default on):** **`ENABLE_WEBUI_DB_BACKUP`** defaults to **`true`**. On each new chart version, before the app starts, if `webui.db` exists and `data/backups/webui_chart_<chart-version>.db` is not there yet, the init container copies it once (same appData volume). Same chart version restarts never duplicate that file. To **skip** backup for a rollout, set **`ENABLE_WEBUI_DB_BACKUP`** to **`false`** under Settings → Application → environment variables **before** upgrading.
    - **Schema migration:** v0.9.3 introduces database schema changes; the bundled backup is strongly recommended before rolling out. Multi-worker or load-balanced deployments must be updated together — rolling updates are not supported.
    - **After upgrade:** Leave **`true`** to keep automatic backups on future chart bumps, or set **`false`** if you do not want further backups until you enable it again.
    - **Helm without Olares UI:** use `backupWebuiDb.enabled` (defaults `false` in chart values); set `true` only when you want the backup init.
    - **Existing data:** Your database file under appData is kept; Open WebUI upgrades its schema automatically on startup.

    Open WebUI v0.9.3 → v0.9.5 — main changes

    **Security hardening (v0.9.5)**
    - **Redirect-based SSRF protection:** outbound HTTP requests (web fetch, image loading, OAuth discovery, tool servers, code interpreter) now block 3xx redirects by default via **`AIOHTTP_CLIENT_ALLOW_REDIRECTS`**, closing redirect paths into RFC 1918, loopback, and cloud-metadata endpoints.
    - **Iframe CSP:** admins can set **`IFRAME_CSP`** to constrain srcdoc iframes used by Artifacts, tool embeds, file previews, and citation modals.
    - **URL parser hardening:** validation now rejects backslash/tab/CR/LF characters that caused urllib vs aiohttp host disagreement (parser-confusion SSRF bypass).
    - **Profile image MIME allowlist:** data-URI profile images are restricted to PNG/JPEG/GIF/WEBP (configurable via `PROFILE_IMAGE_ALLOWED_MIME_TYPES`) with `X-Content-Type-Options: nosniff`, blocking stored-XSS via SVG.
    - **Permission tightening:** public sharing for skills and calendars is gated by dedicated permissions; tool source-code updates require `workspace.tools`/`workspace.tools_import`; channel message edits/deletes and pin actions enforce ownership and write access; feedback `user_id` spoofing is blocked.
    - **Read-only model params:** the per-model endpoint strips `params` (including system prompts) for callers without write access.
    - **Image generation URL validation:** generated image URLs go through `validate_url()` before fetching.

    **New & improved features (v0.9.3 → v0.9.5)**
    - **Granular markdown rendering (0.9.5):** user and assistant Markdown rendering can be disabled independently from Interface settings.
    - **Channel streaming and tools (0.9.5):** mentioning a model in a Channel now streams responses and supports the full chat pipeline (function calling, web search, image gen, user/MCP tools, filters, RAG).
    - **Terminal proxy headers (0.9.5):** admins can inject custom response headers via **`TERMINAL_PROXY_HEADERS`** (JSON).
    - **Voice Mode mute (0.9.3):** dedicated mute toggle with **M** shortcut and auto-unmute after assistant playback.
    - **Faster prompt and chat history loading (0.9.3):** accessible prompts/tags load in a single query; chat history maps load from normalized records.
    - **Delete from conversation menu / Scroll to Top (0.9.3):** new chat-menu actions for faster cleanup and navigation.
    - **Unified model unload (0.9.3):** admins can unload running models from the model selector; Ollama and llama.cpp show loaded-state indicators.
    - **Playground controls panel (0.9.3):** per-run controls (temperature, etc.) without changing model defaults.
    - **Calendar creation flow (0.9.3):** dedicated modal and sidebar quick-add.
    - **`USER_GROUPS` prompt variable (0.9.3):** system/template prompts can adapt to the caller's group memberships.
    - **Brave LLM Context web search (0.9.3):** new provider with configurable context token budget.
    - **Dynamic header template variables (0.9.3):** chat/message/user variables for connection and tool-server headers.
    - **MCP OAuth server URL (0.9.3):** separate OAuth server URL for tool servers with split auth endpoints.
    - **Assistant response editing & continuation (0.9.3):** edit reasoning blocks, tool calls, and text, then continue generation with full context.
    - **Replaceable tool embeds (0.9.3):** Pipes/Tools can overwrite previous rich-UI embeds via a `replace` flag.

    **Performance & UI**
    - **Health probes (0.9.3):** `/health` and readiness avoid blocking DB calls, reducing false unready transitions under DB pressure.
    - **Memory queries (0.9.3):** per-user memory lookups and deletions are now indexed.
    - **Function dependency installs (0.9.3):** skipped when already preinstalled and unchanged, cutting first-load delays.
    - **Rich text composer (0.9.3):** toolbar refresh deferred to next animation frame; less typing jank.
    - **Chat scroll on load (0.9.4):** opening a conversation now reliably scrolls to the bottom (fixes a 0.9.2 `content-visibility` regression).

    **Reliability & fixes (selected)**
    - **Notes (0.9.5):** create/open no longer fails with a TypeError on `is_pinned`.
    - **Legacy chat history self-healing (0.9.5):** broken parent-link graphs are detected and backfilled from embedded JSON.
    - **Filter selector reactivity (0.9.5):** model filter checkboxes derive state reactively from the current filter list.
    - **Background code execution (0.9.3):** no longer hangs when switching tabs/conversations; fails fast with a clear timeout.
    - **Direct-connection task generation (0.9.3):** title/tags/follow-up/emoji/query endpoints work with direct-connection models.
    - **MCP cleanup (0.9.3):** successful native MCP tool calls no longer get replaced by a 500 during cleanup.
    - **Streaming markdown (0.9.3):** forced final parse on completion prevents stale/partial output.
    - **Imported chats (0.9.3):** ChatGPT imports carry proper model/timestamp metadata and surface in Admin Analytics.
    - **Windows + PostgreSQL (0.9.3):** psycopg async uses a compatible event loop instead of Proactor.
    - **PDF previews (0.9.3):** text layer restored for selection and find-in-page.
    - **STT (0.9.3):** transcription is non-blocking; chunked STT limits worker concurrency without an external engine.
    - **Translations:** Chinese, Catalan, Filipino, Korean (0.9.3) and Portuguese (Brazil) (0.9.5) updated.

    **Changed**
    - **Signout uses POST (0.9.3):** custom clients/integrations must update logout calls.
    - **Removed unauthenticated retrieval status endpoint (0.9.5):** `GET /api/v1/retrieval/` removed as dead code.

    Full release notes: https://github.com/open-webui/open-webui/releases/tag/v0.9.5

