envs:
- envName: HF_HUB_OFFLINE
  required: false
  type: bool
  editable: true
  applyOnChange: true
  default: "false"
- envName: HF_TOKEN
  required: false
  applyOnChange: true
  valueFrom:
    envName: OLARES_USER_HUGGINGFACE_TOKEN
- envName: HF_ENDPOINT
  required: true
  applyOnChange: true
  valueFrom:
    envName: OLARES_USER_HUGGINGFACE_SERVICE
- envName: ENABLE_WEBUI_DB_BACKUP
  required: false
  type: bool
  editable: true
  applyOnChange: true
  default: "true"
  description: "Back up webui.db once per new chart version before the app starts (saved to data/backups/ on the same appData volume). Recommended before upgrades that include schema migrations. Set to false to skip the backup for a rollout."
- envName: ENABLE_WEBUI_SECRET_KEY_PERSIST
  required: false
  type: bool
  editable: true
  applyOnChange: true
  default: "true"
  description: "Persist the WebUI secret key to data/.webui_secret_key on the appData volume so login sessions survive restarts and upgrades. The secret key signs login tokens (JWT); keeping it stable also preserves data encrypted with it. Set to false to regenerate the key on every restart, which signs all users out each time the app restarts."
