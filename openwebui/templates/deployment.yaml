{{- $appDomainENV := split "," .Values.domain.openwebui -}}
{{- $appDomain := index $appDomainENV "_0" -}}
{{- $topDomain := regexReplaceAll ".*?([^.]+\\.[^.]+)$" $appDomain "$1" -}}
{{- $isNewVersion := and .Values.sysVersion (semverCompare ">=1.12.3-0" (toString .Values.sysVersion)) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: openwebui
{{- if .Values.GPU }}
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
{{- end }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      io.kompose.service: openwebui
  template:
    metadata:
      labels:
        io.kompose.service: openwebui
        io.kompose.network/chrome-default: "true"
    spec:
      restartPolicy: Always
      initContainers:
        - name: migrate-data
          image: 'docker.io/beclab/busybox:1.37'
          command: ['sh', '-c']
          args:
            - |
              VERSION="{{ .Chart.Version }}"
              MARKER="/new-data/.migration_done_${VERSION}"

              if [ -f "$MARKER" ]; then
                echo "Migration already completed for v${VERSION}, skipping."
                exit 0
              fi

              if [ -f /new-data/webui.db ]; then
                echo "Data already exists in appData, no migration needed."
                echo "Skipped - data already present at $(date)" > "$MARKER"
                exit 0
              fi

              if [ -d /old-data ] && [ -f /old-data/webui.db ]; then
                echo "Found old data in appCache, migrating to appData..."
                cp -a /old-data/. /new-data/
                if [ $? -eq 0 ]; then
                  echo "Migrated from appCache at $(date)" > "$MARKER"
                  echo "Migration completed successfully."
                else
                  echo "ERROR: Copy failed, will retry on next restart."
                  exit 1
                fi
              else
                echo "No old data found, fresh install."
                echo "Fresh install at $(date)" > "$MARKER"
              fi
          volumeMounts:
            - name: old-appdata
              mountPath: /old-data
              readOnly: true
            - name: appdata
              mountPath: /new-data
      containers:
        - name: openwebui
{{- if .Values.GPU }}
          image: 'docker.io/beclab/openwebui-open-webui:0.8.12-cuda'
{{- else }}
          image: 'docker.io/beclab/openwebui-open-webui:0.8.12'
{{- end }}
          ports:
            - containerPort: 8080

          livenessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5

          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            timeoutSeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30

          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
{{- if and .Values.olaresEnv (eq (lower (toString .Values.olaresEnv.HF_HUB_OFFLINE)) "false") }}
            - name: HF_HUB_OFFLINE
              value: "0"
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
{{- else }}
            - name: HF_HUB_OFFLINE
              value: "1"
{{- end }}
            - name: OLLAMA_BASE_URL
              {{- if $isNewVersion }}
              value: "http://d54536a50.shared.{{ $topDomain }}"
              {{- else }}
              value: "http://ollama.ollama-{{ .Values.admin }}:11434"
              {{- end }}
            - name: CORS_ALLOW_ORIGIN
              value: "*"
            - name: USER_AGENT
              value: "OpenWebUI/0.8.12"
            - name: WEBSOCKET_EVENT_CALLER_TIMEOUT
              value: "600"
            - name: RAG_EMBEDDING_ENGINE
              value: "ollama"

          resources:
            limits:
              cpu: "2"
{{- if and .Values.olaresEnv (eq (lower (toString .Values.olaresEnv.HF_HUB_OFFLINE)) "false") }}
              memory: 8Gi
{{- else }}
              memory: 3Gi
{{- end }}
            requests:
              cpu: 50m
              memory: 512Mi

          volumeMounts:
            - name: appdata
              mountPath: /app/backend/data
            - name: hf-cache
              mountPath: /app/backend/data/cache

      volumes:
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.userData }}/Huggingface/{{ .Release.Name }}"
            type: DirectoryOrCreate
        - name: appdata
          hostPath:
            path: "{{ .Values.userspace.appData }}/data"
            type: DirectoryOrCreate
        - name: old-appdata
          hostPath:
            path: "{{ .Values.userspace.appCache }}/data"
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: openwebui
spec:
  selector:
    io.kompose.service: openwebui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
