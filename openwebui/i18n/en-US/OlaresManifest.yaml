metadata:
  title: Open WebUI
  description: User-friendly WebUI for LLMs
spec:
  fullDescription: |
    Open WebUI(Formerly Ollama WebUI) is an extensible, feature-rich, and user-friendly self-hosted WebUI designed to operate entirely offline. It supports various LLM runners, including Ollama and OpenAI-compatible APIs. For more information, be sure to check out our Open WebUI Documentation.

    **Key Features of Open WebUI**
    - Ollama/OpenAI API Integration: Effortlessly integrate OpenAI-compatible APIs for versatile conversations alongside Ollama models. Customize the OpenAI API URL to link with LMStudio, GroqCloud, Mistral, OpenRouter, and more.

    - Pipelines, Open WebUI Plugin Support: Seamlessly integrate custom logic and Python libraries into Open WebUI using Pipelines Plugin Framework. Launch your Pipelines instance, set the OpenAI URL to the Pipelines URL, and explore endless possibilities. Examples include Function Calling, User Rate Limiting to control access, Usage Monitoring with tools like Langfuse, Live Translation with LibreTranslate for multilingual support, Toxic Message Filtering and much more.

    - Responsive Design: Enjoy a seamless experience across Desktop PC, Laptop, and Mobile devices.

    - Progressive Web App (PWA) for Mobile: Enjoy a native app-like experience on your mobile device with our PWA, providing offline access on localhost and a seamless user interface.

    - Full Markdown and LaTeX Support: Elevate your LLM experience with comprehensive Markdown and LaTeX capabilities for enriched interaction.

    - Hands-Free Voice/Video Call: Experience seamless communication with integrated hands-free voice and video call features, allowing for a more dynamic and interactive chat environment.

    - Model Builder: Easily create Ollama models via the Web UI. Create and add custom characters/agents, customize chat elements, and import models effortlessly through Open WebUI Community integration.

    - Native Python Function Calling Tool: Enhance your LLMs with built-in code editor support in the tools workspace. Bring Your Own Function (BYOF) by simply adding your pure Python functions, enabling seamless integration with LLMs.

    - Local RAG Integration: Dive into the future of chat interactions with groundbreaking Retrieval Augmented Generation (RAG) support. This feature seamlessly integrates document interactions into your chat experience. You can load documents directly into the chat or add files to your document library, effortlessly accessing them using the # command before a query.

    - Web Search for RAG: Perform web searches using providers like SearXNG, Google PSE, Brave Search, serpstack, serper, Serply, DuckDuckGo and TavilySearch and inject the results directly into your chat experience.

    - Web Browsing Capability: Seamlessly integrate websites into your chat experience using the # command followed by a URL. This feature allows you to incorporate web content directly into your conversations, enhancing the richness and depth of your interactions.

    - Image Generation Integration: Seamlessly incorporate image generation capabilities using options such as AUTOMATIC1111 API or ComfyUI (local), and OpenAI's DALL-E (external), enriching your chat experience with dynamic visual content.

    - Many Models Conversations: Effortlessly engage with various models simultaneously, harnessing their unique strengths for optimal responses. Enhance your experience by leveraging a diverse set of models in parallel.

    - Role-Based Access Control (RBAC): Ensure secure access with restricted permissions; only authorized individuals can access your Ollama, and exclusive model creation/pulling rights are reserved for administrators.

    - Multilingual Support: Experience Open WebUI in your preferred language with our internationalization (i18n) support. Join us in expanding our supported languages! We're actively seeking contributors!

    - Continuous Updates: We are committed to improving Open WebUI with regular updates, fixes, and new features.
  upgradeDescription: |
    Upgrade Open WebUI to **v0.9.6** (chart **1.0.30**).

    Packaged (Olares chart)
    - **Official image & persistent session key (default on):** this chart now uses the official `openwebui/open-webui` image, and **`ENABLE_WEBUI_SECRET_KEY_PERSIST`** defaults to **`true`**, persisting the WebUI secret key to `data/.webui_secret_key` on the appData volume (via `WEBUI_SECRET_KEY_FILE`) so logins survive restarts and future upgrades. Set it to **`false`** under Settings → Application → environment variables if you instead want every restart to regenerate the key and sign all users out. Because the key is initialized on this upgrade, you will be signed out once and need to log in again.
    - **DB backup before upgrade (default on):** **`ENABLE_WEBUI_DB_BACKUP`** defaults to **`true`**. On each new chart version, before the app starts, if `webui.db` exists and `data/backups/webui_chart_<chart-version>.db` is not there yet, the init container copies it once (same appData volume). Same chart version restarts never duplicate that file. To **skip** backup for a rollout, set **`ENABLE_WEBUI_DB_BACKUP`** to **`false`** under Settings → Application → environment variables **before** upgrading.
    - **Schema migration:** v0.9.6 includes database schema changes; the bundled backup is strongly recommended before rolling out. Multi-worker or load-balanced deployments must be updated together — rolling updates are not supported. Migrations are now resilient and skip tables/indexes/columns that already exist.
    - **After upgrade:** Leave **`true`** to keep automatic backups on future chart bumps, or set **`false`** if you do not want further backups until you enable it again.
    - **Helm without Olares UI:** use `backupWebuiDb.enabled` (defaults `false` in chart values); set `true` only when you want the backup init.
    - **Existing data:** Your database file under appData is kept; Open WebUI upgrades its schema automatically on startup.

    Open WebUI v0.9.5 → v0.9.6 — main changes

    **Security & access control (v0.9.6)**
    - **Security advisory:** this release bundles multiple security and access-control fixes; updating production deployments promptly is recommended.
    - **Cross-user data protection:** retrieval collections, knowledge-base search, chat file attachments, model knowledge files, and `image_url` file references now enforce per-file/per-knowledge access checks, blocking exfiltration of other users' files.
    - **Tool server enforcement:** the inline tool-server permission is now enforced on chat-completion requests, and API-key endpoint allow-lists match the routed path directly.
    - **SSRF & path hardening:** DNS-rebinding protection for outbound fetches, Playwright web-loader URL gating, OAuth profile-picture redirect control, terminal-proxy and cache-file path-traversal fixes, and collection-name validation.
    - **Script-injection fixes:** Mermaid diagrams and model profile images are sanitized/validated before display; cross-origin iframe embeds can only drive chat input when explicitly opted in.
    - **Reduced public exposure:** `/api/config` no longer leaks several feature flags to anonymous callers; system-prompt skip and code-interpreter permission bypasses are closed.

    **New & improved features**
    - **Smart directory sync for knowledge bases:** sync a local directory into a KB in one action; only added/modified files upload, removed files are cleaned up, with structure mirrored and per-file progress. New companion tool `oikb` syncs from local dirs, GitHub, S3, Confluence, and 40+ sources.
    - **Knowledge base folders & file renaming:** organize KB files into nested folders with breadcrumb navigation, and rename files in place.
    - **Filesystem tool for knowledge bases:** new built-in tool (enabled via **`ENABLE_KB_EXEC`**) lets models browse KBs with `ls`, `cat`, `grep`, `find`, `head`, `tail`, `sed`, and pipes.
    - **Emoji picker** in the rich-text toolbar, **per-chat skills toggle** from the Integrations menu, and **access preview** so admins can see which models/KBs/tools a user or group can reach.
    - **New backends:** Valkey vector database (**`VALKEY_URL`**), Linkup web search provider, Azure AI Foundry v1 with Entra ID, and wildcard (`*`) OAuth role mapping with optional **`OAUTH_AUTO_REDIRECT`** to SSO.
    - **MinerU file-type config (`MINERU_FILE_EXTENSIONS`)**, legacy `.doc` extraction, configurable MCP connect timeout (**`MCP_INITIALIZE_TIMEOUT`**), and a profile-image size cap (**`PROFILE_IMAGE_MAX_DATA_URI_SIZE`**).

    **Performance**
    - **Faster initial page loads, tool-enabled completions, and web search:** the config endpoint drops an unnecessary user-count query, referenced tools are batch-fetched, and SearXNG/Google PSE/Brave/Serper/Serpstack searches use non-blocking calls.
    - **Lighter Ollama connections** via a shared connection pool, fewer redundant Redis model-list writes, and cheaper websocket disconnect cleanup on large deployments.

    **Reliability & fixes (selected)**
    - **Web search reliability:** default loader fetches content again; the new **`USER_AGENT`** variable (set by this chart) avoids bot-detection blocks; Firecrawl and Kagi search fixed.
    - **Chat recovery:** corrupted message graphs from failed regenerations now open and self-repair; imported chats with missing folders appear correctly.
    - **ComfyUI image generation/editing** works again, including private/internal endpoints; image generation tolerates non-standard response headers.
    - **MCP tool servers** stay connected (OAuth sessions no longer wrongly refreshed) and discover advertised OAuth scopes.
    - **Knowledge search on PostgreSQL** handles very large documents; non-UTF-8 text/CSV uploads and null bytes in nested data are handled gracefully.
    - **Startup on non-Unicode consoles** (e.g. Windows) no longer crashes; database health checks recover after transient errors; first-admin signup after a reset is unblocked.

    **Changed**
    - **Tool-call iteration cap renamed:** **`CHAT_RESPONSE_MAX_TOOL_CALL_ITERATIONS`** replaces `CHAT_RESPONSE_MAX_TOOL_CALL_RETRIES` (kept as fallback); default raised 30 → 256, with `-1` for unlimited.
    - **`WEBUI_SECRET_KEY` hard requirement:** unsupported start methods (e.g. invoking uvicorn directly) refuse to start without it. Supported start methods used by this image set it automatically, so this chart is unaffected.

    Full release notes: https://github.com/open-webui/open-webui/releases/tag/v0.9.6
