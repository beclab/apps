metadata:
  title: Open WebUI
  description: 面向 LLMs 的友好网页界面
spec:
  fullDescription: |
    Open WebUI（前身为 Ollama WebUI）是一个可扩展、功能丰富且用户友好的自托管网页界面，支持完全离线运行。它支持多种 LLM 运行器，包括 Ollama 和兼容 OpenAI 的 API。欲了解更多信息，请务必查看我们的 Open WebUI 文档。

    **Open WebUI 的主要特性**
    - **Ollama/OpenAI API 集成**：轻松集成兼容 OpenAI 的 API，与 Ollama 模型一起展开精妙对话。自定义 OpenAI API URL，以连接 LMStudio、GroqCloud、Mistral、OpenRouter 等。
    - **Pipelines 和插件支持**：使用 Pipelines 插件框架，将自定义逻辑和 Python 库无缝集成到 Open WebUI 中。可进行函数调用、访问频率限制、Langfuse 监控、LibreTranslate 翻译、有害信息过滤等。
    - **响应式设计**：在台式电脑、笔记本电脑和移动设备上享受无缝体验。
    - **移动端 PWA**：通过渐进式 Web 应用 (PWA) 在移动设备上离线访问，体验流畅。
    - **Markdown 与 LaTeX 支持**：提升内容呈现的丰富度。
    - **语音/视频通话**：集成免提语音和视频通话功能。
    - **模型构建器**：通过 Web 界面轻松创建 Ollama 模型，支持自定义角色/代理。
    - **Python 函数调用工具**：在工具工作区中使用内置编辑器添加 Python 函数，与 LLM 无缝集成。
    - **本地 RAG 集成**：支持文档交互式聊天，使用 # 命令直接访问文档或库。
    - **RAG 网络搜索**：支持 SearXNG、Google PSE、Brave Search、DuckDuckGo、TavilySearch 等。
    - **网页浏览功能**：通过 # 命令后跟 URL 将网页内容融入对话。
    - **图像生成集成**：支持 AUTOMATIC1111、ComfyUI、本地或外部 DALL-E API。
    - **多模型对话**：可并行与多个模型交互，结合各自优势。
    - **RBAC 权限控制**：仅授权用户可访问和管理模型。
    - **多语言支持**：支持多语言国际化（i18n）。
    - **持续更新**：通过定期更新和社区贡献持续改进。

  upgradeDescription: |
    **升级版本：0.8.10**

    **重要变更**
    - 默认模式已切换为在线模式（HF_HUB_OFFLINE=false），以更好地支持语音等本地功能。如需切换回离线模式，请前往 设置 > 应用 > 管理环境变量，将 HF_HUB_OFFLINE 修改为 true。

    **新增功能**
    - **自定义 OIDC 登出端点**。管理员可通过 OPENID_END_SESSION_ENDPOINT 配置自定义 OpenID Connect 登出 URL，支持 AWS Cognito 等需要自定义端点的 OIDC 提供商。
    - **MariaDB Vector 支持**。新增 MariaDB Vector 作为向量数据库后端（VECTOR_DB=mariadb-vector），支持余弦与欧氏距离及可配置 HNSW 索引。
    - **任务消息截断**。发送给任务模型用于标题与标签生成的聊天消息现可通过提示模板过滤器截断，减少长对话的 token 消耗与处理时间。
    - **翻译更新**。葡萄牙语（巴西）、西班牙语和马来语翻译得到增强与扩展。

    **问题修复**
    - **Pipeline 过滤器 HTTP 错误**。Pipeline 入口/出口过滤器中的 HTTP 错误现会在解析响应前正确抛出，修复聊天负载被静默破坏的问题。
    - **知识库文件嵌入更新**。更新知识库文件不再在数据库中遗留旧嵌入，修复重复与过期搜索结果。
    - **文件列表稳定性**。文件列表排序现使用 created_at 并以 id 为次要排序，保证顺序一致并避免大量文件时页面崩溃。
    - **Teams Webhook 崩溃**。修复事件负载中缺少用户数据时 Teams Webhook 处理器的 TypeError。
    - **进程关闭处理**。主进程中的裸 except 已替换为正确异常处理，实现干净关闭。
    - **Docker 部署启动**。Docker 部署现可正常启动；已补充缺失的 OpenTelemetry 系统指标依赖。
    - **非管理员工具访问**。修复导致非管理员无法查看工具的 NameError，has_access 已正确导入。
    - **OAuth 错误处理**。OAuth 期间不再用裸 except 捕获 SystemExit 与 KeyboardInterrupt，支持干净关闭。
    - **异常错误信息**。修复三处错误异常抛出导致的混淆 TypeError，现显示正确错误描述。
    - **YAML 文件处理**。启用 Docling 时 YAML/YML 文件现被识别为文本并正确处理。
    - **时间范围月份名称**。当系统区域设置与浏览器语言不同时，时间范围标签中的月份名称现一致以英文显示。
    - **OAuth 错误 URL 编码**。含特殊字符的 OAuth 错误信息现正确进行 URL 编码，避免错误的重定向 URL。
    - **内部工具方法过滤**。工具不再向 LLM 暴露以下划线开头的内部方法。
    - **Azure TTS 语言区域提取**。Azure 文本转语音在 SSML 中现使用完整语言区域（如 en-US）而非不完整代码。
    - **Azure 语音转写错误**。Azure AI Speech 错误现显示用户友好信息而非通用连接错误。
    - **分析按组过滤**。Token 使用分析现正确遵循用户组过滤。
    - **网络搜索 favicon 回退**。外部 favicon 加载失败时，网络搜索来源现回退到默认 Open WebUI favicon。
    - **自定义模型回退**。基础模型不可用时自定义模型回退现可工作；基础模型 ID 从模型信息中正确获取。
    - **待发送消息图片显示**。排队消息中的图片现正确显示，不再为空白。
    - **文件元数据清理**。当元数据包含不可序列化对象时，文件上传不再因 JSON 序列化错误失败；插入数据库前对元数据进行清理。

    查看完整发布说明：
    https://github.com/open-webui/open-webui/releases/tag/v0.8.10
