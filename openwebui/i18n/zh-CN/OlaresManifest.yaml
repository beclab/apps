metadata:
  title: Open WebUI
  description: 面向 LLMs 的友好网页界面
spec:
  fullDescription: |
    Open WebUI（前身为 Ollama WebUI）是一个可扩展、功能丰富且用户友好的自托管网页界面，支持完全离线运行。它支持多种 LLM 运行器，包括 Ollama 和兼容 OpenAI 的 API。欲了解更多信息，请务必查看我们的 Open WebUI 文档。

    **Open WebUI 的主要特性**
    - **Ollama/OpenAI API 集成**：轻松集成兼容 OpenAI 的 API，与 Ollama 模型一起展开精妙对话。自定义 OpenAI API URL，以连接 LMStudio、GroqCloud、Mistral、OpenRouter 等。
    - **Pipelines 和插件支持**：使用 Pipelines 插件框架，将自定义逻辑和 Python 库无缝集成到 Open WebUI 中。可进行函数调用、访问频率限制、Langfuse 监控、LibreTranslate 翻译、有害信息过滤等。
    - **响应式设计**：在台式电脑、笔记本电脑和移动设备上享受无缝体验。
    - **移动端 PWA**：通过渐进式 Web 应用 (PWA) 在移动设备上离线访问，体验流畅。
    - **Markdown 与 LaTeX 支持**：提升内容呈现的丰富度。
    - **语音/视频通话**：集成免提语音和视频通话功能。
    - **模型构建器**：通过 Web 界面轻松创建 Ollama 模型，支持自定义角色/代理。
    - **Python 函数调用工具**：在工具工作区中使用内置编辑器添加 Python 函数，与 LLM 无缝集成。
    - **本地 RAG 集成**：支持文档交互式聊天，使用 # 命令直接访问文档或库。
    - **RAG 网络搜索**：支持 SearXNG、Google PSE、Brave Search、DuckDuckGo、TavilySearch 等。
    - **网页浏览功能**：通过 # 命令后跟 URL 将网页内容融入对话。
    - **图像生成集成**：支持 AUTOMATIC1111、ComfyUI、本地或外部 DALL-E API。
    - **多模型对话**：可并行与多个模型交互，结合各自优势。
    - **RBAC 权限控制**：仅授权用户可访问和管理模型。
    - **多语言支持**：支持多语言国际化（i18n）。
    - **持续更新**：通过定期更新和社区贡献持续改进。

  upgradeDescription: |
    **升级 Open WebUI 至 v0.9.5（Chart 1.0.28）**

    **本 Chart 打包说明（Olares）**
    - **仅 CPU 镜像：** 本次升级移除了 GPU 相关注入与 `-cuda` 镜像分支，仅打包标准 CPU 镜像，无论节点是否有 GPU 都运行非 GPU 版本。
    - **升级前数据库备份（默认开启）：** **`ENABLE_WEBUI_DB_BACKUP`** 默认 **`true`**。每个新 Chart 版本首次启动前，若存在 `webui.db` 且尚无 `data/backups/webui_chart_<chart 版本>.db`，init 容器会复制一份（仍在同一 appData 卷）；同一 Chart 版本重复重启不会重复生成该文件。若某次升级**不需要**备份，请在升级前在 **设置 → 应用 → 环境变量** 中将该项设为 **`false`**。
    - **库表迁移：** v0.9.3 包含数据库 schema 变更，强烈建议保留默认备份后再升级。多 worker / 多节点 / 负载均衡部署必须**同时**升级，不支持滚动升级。
    - **升级之后：** 保持 **`true`** 则后续 Chart 升级仍会按版本自动备份一次；改为 **`false`** 则之后不再备份，直到再次设为 **`true`**。
    - **纯 Helm：** 使用 `backupWebuiDb.enabled`（chart 默认 `false`）；需要备份 init 时再设为 `true`。
    - **已有数据：** appData 中的数据库文件会保留；Open WebUI 会在首次启动时自动完成库结构升级。

    **Open WebUI v0.9.3 → v0.9.5 主要更新**

    **安全加固（v0.9.5）**
    - **抵御 SSRF 重定向：** 所有出站 HTTP 请求（网页抓取、图片加载、OAuth 发现、工具服务器、代码解释器登录）默认禁用 3xx 重定向，通过新环境变量 **`AIOHTTP_CLIENT_ALLOW_REDIRECTS`** 控制，阻断重定向到 RFC 1918、回环地址、云元数据端点的攻击路径。
    - **Iframe CSP：** 管理员可通过 **`IFRAME_CSP`** 为 Artifacts、工具嵌入、文件预览、引用弹窗等 srcdoc iframe 配置 Content-Security-Policy。
    - **URL 解析加固：** URL 校验拒绝反斜杠、Tab、CR、LF 等会让 urllib 与 aiohttp 对 host 判断不一致的字符，关闭解析器混淆 SSRF 旁路。
    - **头像 MIME 白名单：** data URI 头像限制为 PNG/JPEG/GIF/WEBP（可通过 `PROFILE_IMAGE_ALLOWED_MIME_TYPES` 调整），并附加 `X-Content-Type-Options: nosniff`，阻断 SVG 等可执行内容造成的存储型 XSS。
    - **权限收紧：** 公共分享 Skills / Calendars 须由专用权限授予；工具源码更新需 `workspace.tools` / `workspace.tools_import` 权限；频道消息编辑/删除及置顶强制校验作者与写权限；评估反馈不再可伪造 `user_id`。
    - **只读模型参数保护：** 单模型接口对无写权限的调用方剥离 `params`（含系统提示）。
    - **图像生成 URL 校验：** 生成的图片 URL 在抓取前统一经过 `validate_url()` 校验。

    **新功能与增强（v0.9.3 → v0.9.5）**
    - **细粒度 Markdown 渲染（0.9.5）：** 可在「界面设置」中分别关闭用户消息和助手消息的 Markdown 渲染。
    - **频道流式与工具支持（0.9.5）：** 在 Channel 中 @ 模型即可获得流式回复，并支持完整聊天能力（函数调用、网页搜索、图像生成、用户/MCP 工具、过滤器、RAG）。
    - **Terminal 代理响应头（0.9.5）：** 管理员可通过 **`TERMINAL_PROXY_HEADERS`**（JSON）注入自定义响应头。
    - **Voice Mode 静音（0.9.3）：** 通话界面新增静音切换，快捷键 **M**，助手播放后自动取消静音。
    - **更快的 Prompt 与会话历史加载（0.9.3）：** 非管理员可访问的 Prompt / 标签使用单次数据库查询；会话历史优先从规范化消息表加载。
    - **会话菜单删除 / 回到顶部（0.9.3）：** 直接从聊天菜单删除当前会话并带确认；超长会话提供「回到顶部」入口。
    - **统一卸载模型（0.9.3）：** 管理员可从模型选择器卸载运行中的模型；Ollama / llama.cpp 显示加载状态。
    - **Playground 控制面板（0.9.3）：** 提供独立的 Controls 切换，按运行调节 temperature 等参数，不影响模型默认值。
    - **日历创建流程（0.9.3）：** 提供独立创建弹窗与侧边栏快速新增。
    - **`USER_GROUPS` 提示变量（0.9.3）：** 系统/模板提示词可根据用户分组自动适配。
    - **Brave LLM Context 搜索（0.9.3）：** 新增网页搜索提供商，可配置上下文 Token 预算。
    - **请求头模板变量（0.9.3）：** 自定义连接与工具服务器的 Header 可使用 chat/message/user 变量。
    - **MCP OAuth 服务器 URL（0.9.3）：** 静态工具服务器配置支持单独的 OAuth 服务器 URL，便于鉴权端点分离场景。
    - **助手回复编辑与续写（0.9.3）：** 可编辑思考块、工具调用、文本内容，并在编辑后继续生成（带完整上下文）。
    - **可替换的工具 Embed（0.9.3）：** Pipes / Tools 通过 `replace` 字段原地刷新富 UI 嵌入，避免堆叠。

    **性能与界面**
    - **健康探针（0.9.3）：** `/health` 与 readiness 不再阻塞 DB 调用，数据库压力下减少误判 unready。
    - **记忆查询（0.9.3）：** 用户维度的记忆查询/删除新增索引。
    - **函数依赖安装（0.9.3）：** 已预装且未变更时直接跳过，缩短首启与减少重复安装。
    - **富文本编辑器（0.9.3）：** 工具栏刷新延迟到下一帧，输入卡顿减少。
    - **会话打开滚动（0.9.4）：** 修复 0.9.2 因 `content-visibility` 导致初次打开未滚到底部的回归。

    **稳定性修复（节选）**
    - **Notes（0.9.5）：** 新建/打开不再因 `is_pinned` 引发 TypeError。
    - **历史会话自愈（0.9.5）：** 加载历史会话时自动检测断裂的父链并从嵌入的 JSON 历史回填到规范化表。
    - **过滤器响应式（0.9.5）：** 模型过滤复选框的状态从当前过滤器列表实时派生。
    - **后台代码执行（0.9.3）：** 切换会话/标签页不再挂起；断开/超时返回明确错误。
    - **直连模型任务生成（0.9.3）：** 标题/标签/追问/Emoji/查询等接口对直连模型正常工作。
    - **MCP 清理（0.9.3）：** 工具调用成功后不再被清理流程改写为 500。
    - **流式 Markdown（0.9.3）：** 生成结束时强制最终解析，避免残留过期输出。
    - **导入会话（0.9.3）：** ChatGPT 导入带正确模型/时间元数据，并写入 Admin Analytics 统计。
    - **Windows + PostgreSQL（0.9.3）：** psycopg async 使用兼容的事件循环替代 Proactor。
    - **PDF 预览（0.9.3）：** 恢复文本层，浏览器可选择/查找。
    - **STT（0.9.3）：** 转写改为非阻塞；无外部 STT 时限制并发，提升可靠性。
    - **翻译：** 中文、加泰罗尼亚语、菲律宾语、韩语（0.9.3）以及巴西葡萄牙语（0.9.5）更新。

    **变更**
    - **登出改为 POST（0.9.3）：** 自定义客户端/集成需相应更新登出调用。
    - **移除未鉴权检索状态接口（0.9.5）：** `GET /api/v1/retrieval/` 作为遗留代码移除。

    完整发布说明：https://github.com/open-webui/open-webui/releases/tag/v0.9.5
