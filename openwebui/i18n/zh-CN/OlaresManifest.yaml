metadata:
  title: Open WebUI
  description: 面向 LLMs 的友好网页界面
spec:
  fullDescription: |
    Open WebUI（前身为 Ollama WebUI）是一个可扩展、功能丰富且用户友好的自托管网页界面，支持完全离线运行。它支持多种 LLM 运行器，包括 Ollama 和兼容 OpenAI 的 API。欲了解更多信息，请务必查看我们的 Open WebUI 文档。

    **Open WebUI 的主要特性**
    - **Ollama/OpenAI API 集成**：轻松集成兼容 OpenAI 的 API，与 Ollama 模型一起展开精妙对话。自定义 OpenAI API URL，以连接 LMStudio、GroqCloud、Mistral、OpenRouter 等。
    - **Pipelines 和插件支持**：使用 Pipelines 插件框架，将自定义逻辑和 Python 库无缝集成到 Open WebUI 中。可进行函数调用、访问频率限制、Langfuse 监控、LibreTranslate 翻译、有害信息过滤等。
    - **响应式设计**：在台式电脑、笔记本电脑和移动设备上享受无缝体验。
    - **移动端 PWA**：通过渐进式 Web 应用 (PWA) 在移动设备上离线访问，体验流畅。
    - **Markdown 与 LaTeX 支持**：提升内容呈现的丰富度。
    - **语音/视频通话**：集成免提语音和视频通话功能。
    - **模型构建器**：通过 Web 界面轻松创建 Ollama 模型，支持自定义角色/代理。
    - **Python 函数调用工具**：在工具工作区中使用内置编辑器添加 Python 函数，与 LLM 无缝集成。
    - **本地 RAG 集成**：支持文档交互式聊天，使用 # 命令直接访问文档或库。
    - **RAG 网络搜索**：支持 SearXNG、Google PSE、Brave Search、DuckDuckGo、TavilySearch 等。
    - **网页浏览功能**：通过 # 命令后跟 URL 将网页内容融入对话。
    - **图像生成集成**：支持 AUTOMATIC1111、ComfyUI、本地或外部 DALL-E API。
    - **多模型对话**：可并行与多个模型交互，结合各自优势。
    - **RBAC 权限控制**：仅授权用户可访问和管理模型。
    - **多语言支持**：支持多语言国际化（i18n）。
    - **持续更新**：通过定期更新和社区贡献持续改进。

  upgradeDescription: |
    **升级 Open WebUI 至 v0.9.6（Chart 1.0.30）**

    **本 Chart 打包说明（Olares）**
    - **改用官方镜像 & 持久化会话密钥（默认开启）：** 本 Chart 现使用官方 `openwebui/open-webui` 镜像，**`ENABLE_WEBUI_SECRET_KEY_PERSIST`** 默认 **`true`**，通过 `WEBUI_SECRET_KEY_FILE` 将 WebUI 密钥持久化到 appData 卷的 `data/.webui_secret_key`，使登录态在重启与后续升级后保持有效。若希望每次重启都重新生成密钥、让所有用户登出，可在 **设置 → 应用 → 环境变量** 中将其设为 **`false`**。由于本次升级会初始化该密钥，升级后需重新登录一次，之后即保持稳定。
    - **升级前数据库备份（默认开启）：** **`ENABLE_WEBUI_DB_BACKUP`** 默认 **`true`**。每个新 Chart 版本首次启动前，若存在 `webui.db` 且尚无 `data/backups/webui_chart_<chart 版本>.db`，init 容器会复制一份（仍在同一 appData 卷）；同一 Chart 版本重复重启不会重复生成该文件。若某次升级**不需要**备份，请在升级前在 **设置 → 应用 → 环境变量** 中将该项设为 **`false`**。
    - **库表迁移：** v0.9.6 包含数据库 schema 变更，强烈建议保留默认备份后再升级。多 worker / 多节点 / 负载均衡部署必须**同时**升级，不支持滚动升级。迁移已增强容错，会跳过已存在的表/索引/列。
    - **升级之后：** 保持 **`true`** 则后续 Chart 升级仍会按版本自动备份一次；改为 **`false`** 则之后不再备份，直到再次设为 **`true`**。
    - **纯 Helm：** 使用 `backupWebuiDb.enabled`（chart 默认 `false`）；需要备份 init 时再设为 `true`。
    - **已有数据：** appData 中的数据库文件会保留；Open WebUI 会在首次启动时自动完成库结构升级。

    **Open WebUI v0.9.5 → v0.9.6 主要更新**

    **安全与访问控制（v0.9.6）**
    - **安全公告：** 本次发布包含多项安全与访问控制修复，建议尽快升级生产部署。
    - **跨用户数据保护：** 检索集合、知识库搜索、聊天文件附件、模型知识文件以及 `image_url` 文件引用现在均执行按文件/按知识库的访问校验，阻断窃取他人文件。
    - **工具服务器强制鉴权：** 内联工具服务器权限在聊天补全请求中强制生效；API Key 端点白名单按实际路由路径匹配。
    - **SSRF 与路径加固：** 出站抓取新增 DNS 重绑定防护、Playwright 网页加载器 URL 校验、OAuth 头像重定向控制，并修复 Terminal 代理与缓存文件的路径穿越、集合名校验。
    - **脚本注入修复：** Mermaid 图与模型头像在展示前经过净化/校验；跨源 iframe 嵌入仅在显式授权后才能操作聊天输入。
    - **降低公开信息暴露：** `/api/config` 不再向匿名调用方泄露若干特性开关；关闭系统提示跳过与代码解释器权限旁路。

    **新功能与增强**
    - **知识库目录智能同步：** 一键将本地目录同步进知识库，仅上传新增/修改文件、清理已删除文件，自动镜像目录结构并显示逐文件进度。新增配套工具 `oikb`，支持本地目录、GitHub、S3、Confluence 等 40+ 数据源。
    - **知识库文件夹与重命名：** 可将知识库文件组织为嵌套文件夹并提供面包屑导航，并可就地重命名文件。
    - **知识库文件系统工具：** 新增内置工具（通过 **`ENABLE_KB_EXEC`** 启用），让模型用 `ls`、`cat`、`grep`、`find`、`head`、`tail`、`sed` 及管道浏览知识库。
    - **表情选择器** 加入富文本工具栏，**按会话切换 Skills**（Integrations 菜单），**访问预览** 让管理员查看某用户/分组可访问的模型/知识库/工具。
    - **新增后端：** Valkey 向量数据库（**`VALKEY_URL`**）、Linkup 网页搜索、Azure AI Foundry v1 + Entra ID，以及通配（`*`）OAuth 角色映射与可选的 **`OAUTH_AUTO_REDIRECT`** 单点登录跳转。
    - **MinerU 文件类型配置（`MINERU_FILE_EXTENSIONS`）**、旧版 `.doc` 文本提取、可配置 MCP 连接超时（**`MCP_INITIALIZE_TIMEOUT`**），以及头像大小上限（**`PROFILE_IMAGE_MAX_DATA_URI_SIZE`**）。

    **性能**
    - **更快的首屏加载、带工具的补全与网页搜索：** config 接口去除多余的用户计数查询，引用的工具批量获取，SearXNG/Google PSE/Brave/Serper/Serpstack 搜索改为非阻塞。
    - **更轻量的 Ollama 连接** 复用共享连接池，减少 Redis 模型列表冗余写入，并在大规模部署中降低 websocket 断连清理开销。

    **稳定性修复（节选）**
    - **网页搜索可靠性：** 默认加载器恢复正常抓取；新环境变量 **`USER_AGENT`**（本 Chart 已设置）避免被机器人检测拦截；修复 Firecrawl 与 Kagi 搜索。
    - **会话恢复：** 失败重生成导致的损坏消息图现可正常打开并自愈；缺失文件夹的导入会话能正确显示。
    - **ComfyUI 图像生成/编辑** 恢复正常，含私有/内网端点；图像生成可容忍非标准响应头。
    - **MCP 工具服务器** 保持连接（OAuth 会话不再被错误刷新），并能发现服务器声明的 OAuth 作用域。
    - **PostgreSQL 知识库搜索** 可处理超大文档；非 UTF-8 文本/CSV 上传与嵌套数据中的空字节均能优雅处理。
    - **非 Unicode 控制台启动**（如 Windows）不再崩溃；数据库健康检查在瞬时错误后自动恢复；重置后首个管理员注册不再被阻塞。

    **变更**
    - **工具调用迭代上限改名：** **`CHAT_RESPONSE_MAX_TOOL_CALL_ITERATIONS`** 取代 `CHAT_RESPONSE_MAX_TOOL_CALL_RETRIES`（旧名作为回退保留）；默认值由 30 提高到 256，`-1` 表示不限制。
    - **`WEBUI_SECRET_KEY` 强制要求：** 不受支持的启动方式（如直接调用 uvicorn）未设置时将拒绝启动。本镜像使用的受支持启动方式会自动设置，故本 Chart 不受影响。

    完整发布说明：https://github.com/open-webui/open-webui/releases/tag/v0.9.6
