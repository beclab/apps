metadata:
  title: Open WebUI
  description: 面向 LLMs 的友好网页界面
spec:
  fullDescription: |
    Open WebUI（前身为 Ollama WebUI）是一个可扩展、功能丰富且用户友好的自托管网页界面，支持完全离线运行。它支持多种 LLM 运行器，包括 Ollama 和兼容 OpenAI 的 API。欲了解更多信息，请务必查看我们的 Open WebUI 文档。

    **Open WebUI 的主要特性**
    - **Ollama/OpenAI API 集成**：轻松集成兼容 OpenAI 的 API，与 Ollama 模型一起展开精妙对话。自定义 OpenAI API URL，以连接 LMStudio、GroqCloud、Mistral、OpenRouter 等。
    - **Pipelines 和插件支持**：使用 Pipelines 插件框架，将自定义逻辑和 Python 库无缝集成到 Open WebUI 中。可进行函数调用、访问频率限制、Langfuse 监控、LibreTranslate 翻译、有害信息过滤等。
    - **响应式设计**：在台式电脑、笔记本电脑和移动设备上享受无缝体验。
    - **移动端 PWA**：通过渐进式 Web 应用 (PWA) 在移动设备上离线访问，体验流畅。
    - **Markdown 与 LaTeX 支持**：提升内容呈现的丰富度。
    - **语音/视频通话**：集成免提语音和视频通话功能。
    - **模型构建器**：通过 Web 界面轻松创建 Ollama 模型，支持自定义角色/代理。
    - **Python 函数调用工具**：在工具工作区中使用内置编辑器添加 Python 函数，与 LLM 无缝集成。
    - **本地 RAG 集成**：支持文档交互式聊天，使用 # 命令直接访问文档或库。
    - **RAG 网络搜索**：支持 SearXNG、Google PSE、Brave Search、DuckDuckGo、TavilySearch 等。
    - **网页浏览功能**：通过 # 命令后跟 URL 将网页内容融入对话。
    - **图像生成集成**：支持 AUTOMATIC1111、ComfyUI、本地或外部 DALL-E API。
    - **多模型对话**：可并行与多个模型交互，结合各自优势。
    - **RBAC 权限控制**：仅授权用户可访问和管理模型。
    - **多语言支持**：支持多语言国际化（i18n）。
    - **持续更新**：通过定期更新和社区贡献持续改进。

  upgradeDescription: |
    **升级 Open WebUI 至 v0.10.2（Chart 1.0.34）**

    **本 Chart 打包说明（Olares）**
    - **升级前数据库备份（默认开启）：** **`ENABLE_WEBUI_DB_BACKUP`** 默认 **`true`**。每个新 Chart 版本首次启动前，若存在 `webui.db` 且尚无 `data/backups/webui_chart_<chart 版本>.db`，init 容器会复制一份（仍在同一 appData 卷）。若某次升级**不需要**备份，请在升级前在 **设置 → 应用 → 环境变量** 中将该项设为 **`false`**。
    - **库表迁移：** v0.10.x 包含数据库 schema 变更（重构的记忆系统、文件夹共享、事件系统等），强烈建议保留默认备份后再升级。多 worker / 多节点 / 负载均衡部署必须**同时**升级，不支持滚动升级。
    - **持久化会话密钥（默认开启）：** **`ENABLE_WEBUI_SECRET_KEY_PERSIST`** 保持 **`true`**，通过 appData 卷上的 `data/.webui_secret_key` 使登录态在重启与升级后保持稳定。
    - **已有数据：** appData 中的数据库文件会保留；Open WebUI 会在首次启动时自动完成库结构升级。

    **Open WebUI v0.9.6 → v0.10.2 主要更新**

    **重大功能（v0.10.0）**
    - **团队文件夹共享：** 可将文件夹及其中的会话共享给指定用户、分组或所有人（读/写权限）；管理员通过新的「Folders Sharing」权限控制（默认关闭）。
    - **自动上下文压缩：** 超长对话可自动摘要以保持在模型上下文窗口内（默认关闭，可配置阈值与提示词）。
    - **Open WebUI Computer 代理支持：** 通过 OpenAI 兼容网关连接 Open WebUI Computer，在本机运行含文件、终端、Git 与网页访问的完整代理会话。
    - **重构的记忆系统：** 区分长期个人记忆与会话级上下文，通过结构化增删改流程管理。
    - **外部知识库：** 通过可配置的外部知识连接，将知识库对接外部检索源。
    - **Event 函数与 Webhook：** 新增 Event 函数插件原语，可响应注册、配置变更、文件上传等系统事件；管理员可在新的事件设置页将事件路由为出站 Webhook。
    - **管理端认证面板：** LDAP 与 OAuth/OIDC 设置现拥有独立的 Authentication 设置页。
    - **大规模知识库混合搜索大幅加速**（pgvector 原生查询，不再将整个集合加载到内存）。

    **安全与访问控制（v0.10.0–v0.10.2）**
    - **安全公告：** v0.10.0 与 v0.10.2 包含多项安全与访问控制修复，建议尽快升级生产部署。
    - **知识库上传写入权限强制校验；** API Key、TTS、图像编辑等权限在所有端点强制执行；Arena 回退路径遵守模型访问规则。
    - **路径穿越、DNS 重绑定与会话加固：** 拒绝高度编码的路径；图片 URL 与网页抓取在连接时重新校验目标地址；已撤销会话在 WebSocket 连接上被拒绝。
    - **网页搜索域名过滤（v0.10.2）：** 允许/阻止规则现按主机名匹配，封堵此前部分 URL 可绕过过滤的漏洞。

    **新功能与增强（v0.10.0–v0.10.2）**
    - **流式推理展示（v0.10.2）：** 输出 thinking/reasoning 的模型现可流式展示推理内容，并在会话概览与导出中正确渲染。
    - **知识库文件夹上传（v0.10.2）：** 拖拽或同步文件夹时保留子目录结构，不再将所有文件扁平化。
    - **记忆系统上下文开关（v0.10.2）：** 管理员可保留记忆工具可用，同时选择不将已存记忆注入系统上下文。
    - **通过环境变量配置 API：** 各连接 Ollama/OpenAI 配置（**`OLLAMA_API_CONFIGS`**、**`OPENAI_API_CONFIGS`**）；Arena 模型（**`EVALUATION_ARENA_MODELS`**）。
    - **Argon2 密码哈希选项、** Valve 值静态加密（可选）、AWS RDS IAM 数据库认证、可配置密钥长度。
    - **新增网页搜索提供商：** SERPHouse、Microsoft Web IQ；可选搜索确认；语音转文字支持 multipart 或 base64 JSON。

    **稳定性修复（节选）**
    - **更安全的数据库升级（v0.10.2）：** SQLite 用户表迁移不再崩溃或损坏已保存的用户设置。
    - **减少意外登出（v0.10.2）：** 单次授权错误不再在会话仍有效时强制登出。
    - **共享文件夹只读会话（v0.10.1）：** 打开共享文件夹中的会话不再错误触发登出。
    - **非管理员保存设置（v0.10.2）：** 非管理员用户可再次保存界面设置（默认模型、主题等）。
    - **Python 代码执行（v0.10.2）：** 修复 Pyodide 沙箱启动失败；关闭工具对话框不再导致聊天无限等待。
    - **聊天搜索、通知与默认模型（v0.10.2）：** 搜索可找到结构化输出消息；通知预览显示清晰文本；刷新页面后所选模型不再被清空。
    - **侧边栏会话时间戳（v0.10.2）：** 显示最后活跃时间而非创建时间。

    **性能**
    - 知识库文件搜索、流式响应、工具调用渲染、密码哈希、模型下载与大规模混合搜索**显著加速**。
    - 音频模型加载、URL 安全检查、上传与链接抓取改为**非阻塞**，高负载下服务器更稳定。

    完整发布说明：
    - https://github.com/open-webui/open-webui/releases/tag/v0.10.0
    - https://github.com/open-webui/open-webui/releases/tag/v0.10.1
    - https://github.com/open-webui/open-webui/releases/tag/v0.10.2
