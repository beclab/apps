metadata:
  title: Qwen3-Coder 30B（Ollama）
  description: Qwen3-Coder 30B（Ollama 官方库），面向编程与 Agent 工具调用。

spec:
  fullDescription: |
    **使用须知**

    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。
    用户流量通过代理流向 Ollama。

    **模型**

    使用 Ollama 官方库模型 **[qwen3-coder:30b](https://ollama.com/library/qwen3-coder)**（约 19GB，默认 Q4_K_M）。本 chart 将 **OLLAMA_CONTEXT_LENGTH** 设为 **131072**（128k）。

    Qwen3-Coder 30B-A3B 为混合专家（MoE）编程模型（总参约 30.5B，每 token 激活约 3.3B），适合代码生成、改写与带工具调用的 Agent 工作流。原生上下文可更高，显存充足时可在 ConfigMap 中调高 **OLLAMA_CONTEXT_LENGTH**。

    可将 Claude Code 的 `ANTHROPIC_BASE_URL` 指向本应用共享入口，使用 Ollama 的 Anthropic 兼容 API（`/v1/messages`）。

  upgradeDescription: |
    升级 Ollama 运行时至 ollama/ollama:0.30.10。
    升级 Olares API 代理至 beclab/harveyff-olares-ollama:v0.1.22（OpenAI vision image_url 转发）。