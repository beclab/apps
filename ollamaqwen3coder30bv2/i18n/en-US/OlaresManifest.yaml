metadata:
  title: Qwen3-Coder 30B (Ollama)
  description: "Qwen3-Coder 30B (Ollama library) for coding and agentic tool use"

spec:
  fullDescription: |
    **IMPORTANT NOTE**

    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**

    Uses Ollama library model **[qwen3-coder:30b](https://ollama.com/library/qwen3-coder)** (~19GB, default Q4_K_M). Chart **OLLAMA_CONTEXT_LENGTH**: **131072** (128k).

    Qwen3-Coder 30B-A3B is a MoE coding model (~30.5B total, ~3.3B active per token) for code generation, editing, and tool-calling agents. Raise **OLLAMA_CONTEXT_LENGTH** in ConfigMap if you have more VRAM.

    Point Claude Code `ANTHROPIC_BASE_URL` at this app's shared entrance for Ollama's Anthropic-compatible `/v1/messages` API.

  upgradeDescription: |
    Ollama runtime: ollama/ollama:0.30.0. CUDA ComputeCache shared at Home/Ollama/.nv (all Ollama apps). Proxy API: beclab/harveyff-olares-ollama:v0.1.21.