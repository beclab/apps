---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: ollamaqwen3coder30bv2
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
  description: "Qwen3-Coder 30B (Ollama library) for agentic coding and tool use"
  appid: ollamaqwen3coder30bv2
  title: Qwen3-Coder 30B (Ollama)
  version: '1.0.5'
  categories:
    - AI
sharedEntrances:
  - name: ollamaqwen3coder30bv2
    host: sharedentrances-api
    port: 0
    title: Qwen3-Coder 30B
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Qwen3-Coder 30B
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/qwen3-14b.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'qwen3-coder:30b'
  fullDescription: |
    **IMPORTANT NOTE**

    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**

    Uses Ollama library model **qwen3-coder:30b** (~19GB, default Q4_K_M). This chart sets **OLLAMA_CONTEXT_LENGTH** to **131072** (128k).

    Qwen3-Coder 30B-A3B is a mixture-of-experts coding model (~30.5B total, ~3.3B active per token): strong for code generation, editing, and agent workflows with tool calling. Raise **OLLAMA_CONTEXT_LENGTH** in ConfigMap if you have more VRAM.

    Compatible with Claude Code via Ollama Anthropic-compatible API (`/v1/messages`) when pointed at this app's shared entrance.

  upgradeDescription: |
    Upgrade Ollama runtime to ollama/ollama:0.30.10.
    Upgrade Olares API proxy to beclab/harveyff-olares-ollama:v0.1.22 (OpenAI vision image_url forwarding).
  developer: Alibaba
  website: https://github.com/QwenLM/Qwen3-Coder
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://github.com/QwenLM/Qwen3-Coder/blob/main/LICENSE

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6500m
  requiredCpu: 500m
  requiredDisk: 50Mi
  limitedDisk: 60Gi
  limitedMemory: 40Gi
  requiredMemory: 4200Mi
  requiredGpu: 20Gi
  limitedGpu: 24Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamaqwen3coder30bv2server
    shared: true
  - name: ollamaqwen3coder30bv2
permission:
  appData: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaqwen3coder30bv2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0,<1.12.6'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaqwen3coder30bv2
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: KEEP_ALIVE
    required: true
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
{{- end }}
