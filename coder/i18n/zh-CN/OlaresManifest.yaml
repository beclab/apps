metadata:
  title: Coder
  description: 自托管的云开发环境。
spec:
  fullDescription: |
    Coder 是一个自托管的开源云开发环境，可与任何云、IDE、OS、Git 提供商和 IDP 配合使用。

    Coder 使组织能够在其公共或私有云基础架构中设置开发环境。云开发环境使用 Terraform 定义，通过安全的高速 Wireguard® 隧道连接，并在不使用时自动关闭以节省成本。 Coder 使工程团队能够灵活地将云用于对他们最有利的工作负载。
    
    产品特点：
    在 Terraform 中定义云开发环境
    - EC2 VM、Kubernetes Pod、Docker 容器等。
    
    自动关闭闲置资源以节省成本
    
    在几秒钟内（而不是几天）即可让开发人员入职
  upgradeDescription: |
    升级应用版本从 2.19.0 至 2.31.5

    主要更新：
    - AI 治理：AI Bridge 拦截日志、模型家族图标、Copilot 提供商支持
    - 任务系统：暂停/恢复命令和 UI 操作、暂停任务的日志快照、自动暂停通知
    - 开发容器：将资源关联到 coder_devcontainer，支持 Terraform 定义的开发容器子代理 ID
    - 共享工作区：从实验阶段升级为 Beta
    - CLI：组织列表/删除命令、令牌默认过期、登录令牌打印命令
    - 仪表盘：Geist 可变字体、预设下拉框增加图标和描述、工作区查询支持健康状态筛选
    - VPN：新增 Linux 平台 vpn-daemon 和 OS 网络栈支持
    - 安全性：加固 OAuth2 提供商、支持 client_secret_basic 认证
    - 网络：传输拨号超时后自动重试
    - 大量 Bug 修复和性能优化