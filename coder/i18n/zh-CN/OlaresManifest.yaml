metadata:
  title: Coder
  description: 自托管的云开发环境。
spec:
  fullDescription: |
    Coder 是一个自托管的开源云开发环境，可与任何云、IDE、OS、Git 提供商和 IDP 配合使用。

    Coder 使组织能够在其公共或私有云基础架构中设置开发环境。云开发环境使用 Terraform 定义，通过安全的高速 Wireguard® 隧道连接，并在不使用时自动关闭以节省成本。 Coder 使工程团队能够灵活地将云用于对他们最有利的工作负载。
    
    - 在 Terraform 中定义云开发环境
      - EC2 VM、Kubernetes Pod、Docker 容器等。
    - 自动关闭闲置资源以节省成本
    - 在几秒钟内（而不是几天）即可让开发人员入职
  upgradeDescription: |
    将应用版本从 2.31.5 升级到 2.31.9

    **更新日志**
    性能改进
    - 限制计数查询，审计/连接日志使用原生 UUID 操作（回溯 #23835）（#24129, 2f5d21d）
    
    其他更新
    - 回溯 Go 1.25.8 升级至 release/2.31（#23941, 2587364）
    - 回溯重要和关键级别的 Iron Bank 依赖修复（#24110, 960b8e7）

    完整发行说明：https://github.com/coder/coder/releases/tag/v2.31.9