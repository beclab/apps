metadata:
  title: DeepSeek-OCR2 WebUI V3
  description: 开箱即用的 DeepSeek-OCR-2 Web 界面
spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，在 Olares 内部仅会部署一个服务。每个用户可以安装一个桌面入口进行访问或使用共享入口进行API调用。

    **应用概览**
    DeepSeek-OCR-WebUI 是一个基于 DeepSeek-OCR-2 模型（Visual Causal Flow）的智能图像识别 Web 应用程序，提供直观用户界面和强大的识别能力。
    
    **主要特性：**
    - DeepSeek-OCR-2 模型 - 基于 Visual Causal Flow 架构的新一代 OCR
    - 7 种识别模式，适用于不同场景
    - 支持批量处理多张图片
    - 边界框可视化 - 查找模式自动标注位置
    - 支持 PDF 上传和转换
    - 现代化直观的用户界面
    - 多语言支持（简体中文、繁体中文、英语、日语）
    - GPU 加速 - 基于 NVIDIA GPU 的高性能推理
    - 自动模型下载 - 内置 HuggingFace 模型下载器，支持进度追踪
    - ModelScope 备选 - HuggingFace 不可用时自动切换到 ModelScope
  upgradeDescription: |
    v1.1.8：下载架构改造——用共享的 llm-init download-only 部署（镜像 llm-init:v1.2.4，
    默认 LFS）替换原自研下载器。模型改为落入跨应用共享 HF 缓存（App Common），OCR 引擎
    改为等待下载器 /readyz（替代 .done sentinel），/app/models 改为指向缓存快照的符号链接。
    声明 permission.appCommon: true，并将 nvidia-gb10 limitedMemory 提到 28Gi 以容纳下载器更大的内存上限。

    迁移 DeepSeek-OCR-2 WebUI 至 apiVersion v3 共享应用模式（deepseekocrwebuiv2 → deepseekocrwebuiv3）。

    **更新内容**

    - **架构**：扁平化子 chart；nginx clientproxy 上游改为同 namespace Service。
    - **扩缩容**：通过 `workloadReplicas` 声明 OCR、下载器与 web 代理副本数。
