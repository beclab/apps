metadata:
  title: DeepSeek-OCR2 WebUI V3
  description: Ready-to-use DeepSeek-OCR-2 Web UI
spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    DeepSeek-OCR-WebUI is an intelligent image recognition web application based on the DeepSeek-OCR-2 model (Visual Causal Flow), providing an intuitive user interface and powerful recognition capabilities.

    **Core Highlights**
    - DeepSeek-OCR-2 Model - Next-gen OCR powered by Visual Causal Flow architecture
    - 7 Recognition Modes - Document, OCR, Chart, Find, Freeform, etc.
    - Bounding Box Visualization - Find mode automatically annotates positions
    - Batch Processing - Support for multiple image sequential recognition
    - PDF Support - Upload PDF files, automatically convert to images
    - Modern UI - Cool gradient backgrounds and animation effects
    - Multilingual Support - Simplified Chinese, Traditional Chinese, English, Japanese
    - GPU Acceleration - High-performance inference based on NVIDIA GPU
    - Auto Model Download - Built-in HuggingFace model downloader with progress tracking
    - ModelScope Fallback - Auto-switch to ModelScope when HuggingFace is unavailable
  upgradeDescription: |
    v1.1.8: replaced the bespoke downloader with the shared llm-init download-only
    Deployment (image llm-init:v1.2.4, default LFS). The model now lands in the shared
    cross-app HF cache (App Common) and the OCR engine gates on /readyz; /app/models is a
    symlink farm over the cached snapshot. Declared permission.appCommon: true and raised
    nvidia-gb10 limitedMemory to 28Gi for the downloader's larger memory limit.

    Migrated DeepSeek-OCR-2 WebUI to apiVersion v3 shared app pattern (deepseekocrwebuiv2 → deepseekocrwebuiv3).

    **What's Changed**

    - **Architecture**: flattened sub-charts; nginx clientproxy upstreams target in-namespace Services.
    - **Scaling**: `workloadReplicas` for OCR, downloader, and web proxy workloads.
