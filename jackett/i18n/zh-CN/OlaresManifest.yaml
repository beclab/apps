metadata:
  title: Jackett
  description: 为你喜爱的BT服务器提供API支持
spec:
  upgradeDescription: |
    存储：持久化数据从 `appCache` 迁移至 `appData`。升级后首次启动时，若目标目录为空，initContainer 会将旧版 `appCache` 数据复制到 `appData`（标记文件：`.migration_from_appcache_done`）。旧 appCache 数据保留以便回滚。

    将 Jackett 从 v0.24.766 升级至 v0.24.2166，改用官方 `linuxserver/jackett` 镜像（支持 amd64/arm64）。

    移除针对 Olares < 1.12.3 的 appCache 路径分支逻辑；当前最低支持版本为 1.12.6。

    升级后 Jackett 可能提示「已开启外部访问但未设置管理员密码」。Docker/Olares 环境下属正常现象（须保持 External Access 开启）。可在 Jackett 设置中设置 Admin Password，或点击 dismiss 关闭提示——Olares 入口本身需要登录。请勿关闭 External Access，否则 Web UI 可能无法访问。
  fullDescription: |
    Jackett作为代理服务器工作：它将来自应用程序（如Sonarr、SickRage、CouchPotato、Mylar等）的查询转换为特定追踪器网站的HTTP查询，解析HTML响应，然后将结果发送回请求的软件。这允许获取最近上传的内容（如RSS）和执行搜索。Jackett是一个维护良好的索引器抓取与转换逻辑的单一存储库，减轻了其他应用程序的负担。