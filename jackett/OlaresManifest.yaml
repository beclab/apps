olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  jackett: 1
metadata:
  name: jackett
  description: API Support for your favorite torrent trackers
  icon: https://app.cdn.olares.com/appstore/jackett/icon.png
  appid: jackett
  version: '1.0.5'
  title: Jackett
  categories:
  - Utilities_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '0.24.2166'
  upgradeDescription: |
    Storage: durable storage moved from `appCache` to `appData`. On first start after upgrade, an initContainer copies legacy `appCache` into `appData` when the destination is empty (marker: `.migration_from_appcache_done`). Old appCache data is left intact for rollback.

    Bump Jackett from v0.24.766 to v0.24.2166 using the official `linuxserver/jackett` image (amd64/arm64).

    Drop legacy `sysVersion >= 1.12.3` appCache path branching; Olares minimum is now 1.12.6.

    After upgrade, Jackett may show a security banner about external access without an admin password. This is expected in Docker/Olares (External Access must stay enabled). Set an Admin Password in Jackett settings, or dismiss the banner — Olares entrance already requires login. Do not disable External Access or the Web UI may become unreachable.
  promoteImage:
  - https://app.cdn.olares.com/appstore/jackett/1.webp
  - https://app.cdn.olares.com/appstore/jackett/2.webp
  - https://app.cdn.olares.com/appstore/jackett/3.webp

  fullDescription: |
    Jackett works as a proxy server: it translates queries from apps (Sonarr, Radarr, SickRage, CouchPotato, Mylar3, Lidarr, DuckieTV, qBittorrent, Nefarious, NZBHydra2 etc.) into tracker-site-specific http queries, parses the html or json response, and then sends results back to the requesting software. This allows for getting recent uploads (like RSS) and performing searches. Jackett is a single repository of maintained indexer scraping & translation logic - removing the burden from other apps.
  developer: Jackett
  website: https://github.com/Jackett/Jackett
  sourceCode: https://github.com/Jackett/Jackett
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 128Mi
  limitedMemory: 1Gi
  requiredDisk: 128Mi
  limitedDisk: 1Gi
  requiredCpu: 0.25
  limitedCpu: 1
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: jackett
  port: 9117
  host: jackett
  title: Jackett
  icon: https://app.cdn.olares.com/appstore/jackett/icon.png
  openMethod: window
