metadata:
  title: Jupyter Notebook
  description: 用于交互式计算的 Jupyter Notebook v7。
spec:
  fullDescription: |
    Jupyter Notebook 是 Project Jupyter 旗下的笔记本创作应用。基于计算笔记本格式的强大能力，Jupyter Notebook 提供了快速、交互式的新方式，帮助您原型设计和讲解代码、探索与可视化数据，并与他人分享想法。

    笔记本将基于控制台的交互式计算方法拓展到一个全新的方向，提供适合记录完整计算过程的 Web 应用：开发、记录和执行代码，以及传达计算结果。Jupyter Notebook 由两个部分组成：
    - **Web 应用**：基于浏览器的编辑程序，用于交互式创作计算笔记本，提供快速交互环境，便于原型设计和讲解代码、探索与可视化数据，并与他人分享想法
    - **计算笔记本文档**：可分享的文档，将计算机代码、自然语言描述、数据，以及 3D 模型、图表、数学公式、图形和交互控件等丰富可视化内容结合在一起

    **功能特性：**
    - 在浏览器中编辑代码，支持自动语法高亮、缩进和 Tab 补全/内省。
    - 可在浏览器中执行代码，计算结果会附加在生成它们的代码旁。
    - 使用 HTML、LaTeX、PNG、SVG 等富媒体形式展示计算结果。例如，由 [matplotlib] 库渲染的出版级图表可内联显示。
    - 在浏览器中使用 [Markdown] 标记语言编辑富文本，为代码提供不限于纯文本的注释说明。
    - 可在 Markdown 单元格中轻松使用 LaTeX 编写数学公式，并由 MathJax 原生渲染。

    **补充说明：**
    - **多用户支持** — 每位 Olares 用户均可部署各自独立的 Jupyter Notebook 实例。
    - **可克隆实例** — 用户可根据需要灵活安装多个相互独立的 Jupyter Notebook 实例。
    - **CPU 或 NVIDIA GPU 模式** — 安装时可轻松选择 CPU 或 NVIDIA GPU 模式。GPU 模式默认需要 20Gi GPU 显存和 20Gi 容器内存限制。
