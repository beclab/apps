apiVersion: v3
olaresManifest.version: '0.12.0'
olaresManifest.type: app

metadata:
  name: jupyternotebook
  appid: jupyternotebook
  title: Jupyter Notebook
  description: Jupyter Notebook v7 for interactive computing.
  icon: https://app.cdn.olares.com/appstore/jupyterhub/icon.png
  version: 1.0.0
  categories:
  - Productivity_v112

entrances:
- name: jupyternotebook
  host: jupyternotebook
  port: 8888
  title: Jupyter Notebook
  authLevel: private
  openMethod: window

permission:
  appData: true
  userData:
  - Home

spec:
  versionName: '7.6.0'
  runAsUser: true
  supportArch:
  - amd64
  - arm64
  fullDescription: |
    Jupyter Notebook is a notebook authoring application, under the Project Jupyter umbrella. Built on the power of the computational notebook format, Jupyter Notebook offers fast, interactive new ways to prototype and explain your code, explore and visualize your data, and share your ideas with others.

    Notebooks extend the console-based approach to interactive computing in a qualitatively new direction, providing a web-based application suitable for capturing the whole computation process: developing, documenting, and executing code, as well as communicating the results. The Jupyter notebook combines two components:
    - **A web application**: A browser-based editing program for interactive authoring of computational notebooks which provides a fast interactive environment for prototyping and explaining code, exploring and visualizing data, and sharing ideas with others
    - **Computational Notebook documents**: A shareable document that combines computer code, plain language descriptions, data, rich visualizations like 3D models, charts, mathematics, graphs and figures, and interactive controls

    **Features:**
    - In-browser editing for code, with automatic syntax highlighting, indentation, and tab completion/introspection.
    - The ability to execute code from the browser, with the results of computations attached to the code which generated them.
    - Displaying the result of computation using rich media representations, such as HTML, LaTeX, PNG, SVG, etc. For example, publication-quality figures rendered by the [matplotlib] library, can be included inline.
    - In-browser editing for rich text using the [Markdown] markup language, which can provide commentary for the code, is not limited to plain text.
    - The ability to easily include mathematical notation within markdown cells using LaTeX, and rendered natively by MathJax.

    **Additional Notes:**
    - **Multi-User Support** — Each Olares user can deploy their own isolated instance of Jupyter Notebook.
    - **Cloneable Instances** — Users have the flexibility to install multiple, independent Jupyter Notebook instances as needed.
    - **CPU or NVIDIA GPU Modes** — Easily select either CPU or NVIDIA GPU mode during installation. GPU mode requires a default limit of 20Gi GPU memory and 20Gi container memory.

  developer: Project Jupyter
  website: https://jupyter.org/
  sourceCode: https://github.com/jupyter/docker-stacks
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  accelerator:
  - mode: cpu
    requiredCpu: "500m"
    limitedCpu: "4"
    requiredMemory: 1Gi
    limitedMemory: 8Gi
    requiredDisk: 2Gi
    limitedDisk: 20Gi
  - mode: nvidia
    requiredCpu: "1"
    limitedCpu: "8"
    requiredMemory: 8Gi
    limitedMemory: 20Gi
    requiredDisk: 2Gi
    limitedDisk: 20Gi
    requiredGPUMemory: 20Gi
    limitedGPUMemory: 20Gi

options:
  allowMultipleInstall: true
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
  apiTimeout: 0

workloadReplicas:
  jupyternotebook: 1
