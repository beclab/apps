---
olaresManifest.type: app
olaresManifest.version: '0.11.0'
metadata:
  name: karakeep
  description: A self-hostable bookmark-everything app with AI-based automatic tagging and search.
  icon: https://app.cdn.olares.com/appstore/karakeep/icon.png
  appid: karakeep
  version: '1.0.7'
  title: Karakeep
  categories:
  - Utilities_v112
  - Utilities
entrances:
- name: karakeep
  port: 3000
  host: karakeep
  title: Karakeep
  icon: https://app.cdn.olares.com/appstore/karakeep/icon.png
  openMethod: window
  authLevel: internal  
permission:
  appData: true
  appCache: true
spec:
  versionName: '0.32.0'
  fullDescription: |
    Karakeep (previously Hoarder) is a self-hostable bookmark-everything app for links, notes, images, and PDFs.

    It combines automatic metadata extraction, full text search, list collaboration, and AI-based automatic tagging to make saved content easier to organize and rediscover.

    Key capabilities:
    - Bookmark links, notes, images, and PDFs
    - Automatic fetch for title, description, and preview image
    - Full text search across saved content
    - AI tagging and summarization (supports local models via Ollama)
    - Rule-based automation and RSS ingestion
    - OCR for images, highlights, and bulk actions
    - Browser extensions, mobile apps, API, and webhooks
    - Self-hosting first with privacy-focused deployment

  developer: Localhost Labs Ltd.
  website: https://karakeep.app
  sourceCode: https://github.com/karakeep-app/karakeep
  submitter: Olares
  doc: https://docs.karakeep.app
  license:
  - text: AGPL-3.0
    url: https://github.com/karakeep-app/karakeep/blob/main/LICENSE
  locale:
  - en-US
  - zh-CN
  requiredMemory: 700Mi
  limitedMemory: 3Gi
  requiredDisk: 1Gi
  limitedDisk: 20Gi
  requiredCpu: 0.5
  limitedCpu: 3
  supportArch:
  - amd64
  - arm64
  supportClient:
    android: https://play.google.com/store/apps/details?id=app.hoarder.hoardermobile&pcampaignid=web_share
    ios: https://apps.apple.com/us/app/karakeep-app/id6479258022
options:
  apiTimeout: 0 
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
envs:
  - envName: NEXTAUTH_SECRET
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "Secret used by Karakeep auth. Set this for production."
  - envName: OPENAI_API_KEY
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "Secret API key for OpenAI-powered tagging and summarization."
  - envName: OLLAMA_BASE_URL
    type: url
    required: false
    applyOnChange: true
    editable: true
    description: "Base URL for local Ollama models used by Karakeep."
  - envName: INFERENCE_TEXT_MODEL
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "Model used for text inference (tags, summaries). Defaults to gemma3 for Ollama."
  - envName: INFERENCE_IMAGE_MODEL
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "Model used for image/vision inference. Must support vision when using Ollama (e.g. llava)."
  - envName: EMBEDDING_TEXT_MODEL
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "The model to be used for generating embeddings for the text."
  - envName: CRAWLER_VIDEO_DOWNLOAD
    required: false
    applyOnChange: true
    editable: true
    type: bool
    default: "false"
    description: "Whether to download videos from the page or not (using yt-dlp)"
  - envName: CRAWLER_VIDEO_DOWNLOAD_MAX_SIZE
    type: int
    required: false
    applyOnChange: true
    editable: true
    default: "-1"
    description: "The maximum file size for the downloaded video. The quality will be chosen accordingly. Use -1 to disable the limit."
  - envName: CRAWLER_VIDEO_DOWNLOAD_TIMEOUT_SEC
    type: int
    required: false
    applyOnChange: true
    editable: true
    default: "600"
    description: "THow long to wait for the video download to finish"    
  - envName: INFERENCE_OUTPUT_SCHEMA
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "plain"
    description: "Inference output format: structured, json, or plain. Use plain for models without structured output support."
    options:
    - title: Plain
      value: "plain"
    - title: Structured
      value: "structured"
    - title: JSON
      value: "json"
  - envName: INFERENCE_CONTEXT_LENGTH
    type: int
    required: false
    applyOnChange: true
    editable: true
    default: "4096"
    description: "Max number of tokens passed to the inference model. Content larger than this will be truncated. Also used as num_ctx for Ollama."
  - envName: INFERENCE_MAX_OUTPUT_TOKENS
    type: int
    required: false
    applyOnChange: true
    editable: true
    default: "4096"
    description: "Maximum number of tokens the inference model is allowed to generate. Higher values increase cost (OpenAI) and processing time (Ollama)."
  - envName: INFERENCE_JOB_TIMEOUT_SEC
    type: int
    required: false
    applyOnChange: true
    editable: true
    default: "180"
    description: "How long to wait for an inference job to finish before timing out. Increase if running large models on Ollama without powerful GPUs."
  - envName: USE_SYSTEM_SMTP_SETTINGS
    required: false
    applyOnChange: true
    editable: true
    type: bool
    default: "true"
    description: "Use system SMTP settings (when enabled, SMTP envs are managed by system envs)."
  - envName: SMTP_ENABLED
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_ENABLED
  - envName: SMTP_HOST
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
  - envName: SMTP_PORT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
  - envName: SMTP_USER
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME
  - envName: SMTP_PASSWORD
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
  - envName: SMTP_FROM
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS
  - envName: SMTP_TLS
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USE_TLS
  - envName: SMTP_SSL
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USE_SSL
  - envName: SMTP_SECURITY_PROTOCOLS
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SECURITY_PROTOCOLS

