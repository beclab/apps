metadata:
  title: Karakeep
  description: 面向个人与团队的数据收藏应用，支持 AI 自动标签与全文检索。
spec:
  fullDescription: |
    Karakeep（原名 Hoarder）是一个可自托管的“全类型收藏”应用，可统一保存链接、笔记、图片和 PDF。

    它集成了元数据自动抓取、全文检索、列表协作与 AI 自动标签能力，让你更快地整理和再次找到已保存内容。

    主要能力：
    - 收藏链接、笔记、图片和 PDF
    - 自动抓取标题、摘要与预览图
    - 对保存内容进行全文检索
    - AI 自动标签与摘要（支持通过 Ollama 使用本地模型）
    - 规则引擎自动化与 RSS 自动入库
    - 图片 OCR、高亮摘录与批量操作
    - 浏览器扩展、移动端应用、REST API 与 Webhooks
    - 自托管优先，强调数据自主可控
