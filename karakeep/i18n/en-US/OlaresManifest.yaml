metadata:
  title: Karakeep
  description: A self-hostable bookmark-everything app with AI-based automatic tagging and search.
spec:
  fullDescription: |
    Karakeep (previously Hoarder) is a self-hostable bookmark-everything app for links, notes, images, and PDFs.

    It combines automatic metadata extraction, full text search, list collaboration, and AI-based automatic tagging to make saved content easier to organize and rediscover.

    Key capabilities:
    - Bookmark links, notes, images, and PDFs
    - Automatic fetch for title, description, and preview image
    - Full text search across saved content
    - AI tagging and summarization (supports local models via Ollama)
    - Rule-based automation and RSS ingestion
    - OCR for images, highlights, and bulk actions
    - Browser extensions, mobile apps, API, and webhooks
    - Self-hosting first with privacy-focused deployment