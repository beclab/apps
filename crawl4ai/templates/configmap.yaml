---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crawl4ai-config
  namespace: {{ .Release.Namespace }}
data:
  OPENAI_API_KEY: ""
  DEEPSEEK_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GROQ_API_KEY: ""
  TOGETHER_API_KEY: ""
  MISTRAL_API_KEY: ""
  GEMINI_API_TOKEN: ""
  config.yml: |
    app:
      title: "Crawl4AI API"
      version: "1.0.0"
      host: "0.0.0.0"
      port: 11235
      reload: false
      workers: 1
      timeout_keep_alive: 300
    llm:
      provider: "openai/gpt-4o-mini"
    redis:
      host: "localhost"
      port: 6379
      db: 0
      password: ""
      task_ttl_seconds: 3600
      ssl: false
    rate_limiting:
      enabled: true
      default_limit: "1000/minute"
      trusted_proxies: []
      storage_uri: "memory://"
    security:
      enabled: false
      jwt_enabled: false
      api_token: ""
      https_redirect: false
      trusted_hosts: ["*"]
      headers:
        x_content_type_options: "nosniff"
        x_frame_options: "DENY"
        content_security_policy: "default-src 'self'"
        strict_transport_security: "max-age=63072000; includeSubDomains"
    crawler:
      base_config:
        simulate_user: true
        memory_threshold_percent: 95.0
        rate_limiter:
          enabled: true
          base_delay: [1.0, 2.0]
        timeouts:
          stream_init: 30.0
          batch_process: 300.0
        pool:
          max_pages: 40
          idle_ttl_sec: 300
        browser:
          kwargs:
            headless: true
            text_mode: true
          extra_args:
            - "--no-sandbox"
            - "--disable-dev-shm-usage"
            - "--disable-gpu"
            - "--disable-software-rasterizer"
            - "--allow-insecure-localhost"
            - "--ignore-certificate-errors"
    logging:
      level: "INFO"
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    observability:
      prometheus:
        enabled: true
        endpoint: "/metrics"
      health_check:
        endpoint: "/health"
    webhooks:
      enabled: true
      default_url: null
      data_in_payload: false
      retry:
        max_attempts: 5
        initial_delay_ms: 1000
        max_delay_ms: 32000
        timeout_ms: 30000
      headers:
        User-Agent: "Crawl4AI-Webhook/1.0"
