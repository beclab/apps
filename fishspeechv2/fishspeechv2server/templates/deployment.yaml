{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: fishspeech
  name: fishspeech
  namespace: '{{ .Release.Namespace }}'
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"  
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: fishspeech
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: fishspeech
    spec:
      initContainers:
      - name: init-chmod-data
        image: 'docker.io/beclab/aboveos-busybox:1.37.0'
        command:
          - sh
          - '-c'
          - |
            chown -R 1000:1000 /app-checkpoints /app-references /app-data-root /tmp-gradio /app-cache
            chmod -R 755 /app-checkpoints /app-references /app-data-root /tmp-gradio /app-cache
        resources: {}
        volumeMounts:
          - name: checkpoints
            mountPath: /app-checkpoints
          - name: references
            mountPath: /app-references
          - name: data
            mountPath: /app-data-root
          - name: output
            mountPath: /tmp-gradio
          - name: app-cache
            mountPath: /app-cache
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
      containers:
      - name: fishspeech
        image: "docker.io/beclab/harveyff-fishaudio-fish-speech:webui-cuda-cu129-20260422"
        workingDir: /app
        command:
          - /bin/bash
          - -c
          - |
            set -e
            DONE_FILE="/app/checkpoints/s2-pro/.s2-pro.done"
            echo "[wait] Waiting for $DONE_FILE ..."
            while [ ! -f "$DONE_FILE" ]; do
              echo "[wait] Model not ready, sleeping..."
              sleep 10
            done
            echo "[wait] Detected $DONE_FILE, starting fishspeech webui."
            mkdir -p "${TORCHINDUCTOR_CACHE_DIR:-/app-cache/torch-inductor}" "${TRITON_CACHE_DIR:-/app-cache/triton}" || true
            FP_FILE="/app-cache/.fingerprint"
            TORCH_VERSION_FILE="/app/.venv/lib/python3.12/site-packages/torch/version.py"
            if [ -f "$TORCH_VERSION_FILE" ]; then
              TORCH_FP=$(md5sum "$TORCH_VERSION_FILE" | awk '{print $1}')
            else
              TORCH_FP="no-torch"
            fi
            GPU_CC=$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader,nounits 2>/dev/null | head -n1 | tr -d '[:space:]' || true)
            GPU_CC=${GPU_CC:-unknown}
            NEW_FP="torch=${TORCH_FP}|cc=${GPU_CC}"
            OLD_FP=$(cat "$FP_FILE" 2>/dev/null || true)
            if [ "$OLD_FP" != "$NEW_FP" ]; then
              echo "[cache] fingerprint mismatch, clearing compile cache."
              echo "[cache]   old: ${OLD_FP:-<none>}"
              echo "[cache]   new: ${NEW_FP}"
              rm -rf /app-cache/torch-inductor /app-cache/triton
              mkdir -p /app-cache/torch-inductor /app-cache/triton
              echo "$NEW_FP" > "$FP_FILE"
            else
              echo "[cache] compile cache fingerprint unchanged: ${NEW_FP}"
            fi
            cd /app
            CMD_ARGS=()
            if [ "${COMPILE:-0}" = "1" ] || [ "${COMPILE:-0}" = "true" ]; then
              echo "[start] torch.compile enabled (first inference will be slow while compiling)."
              CMD_ARGS+=(--compile)
            fi
            exec /app/.venv/bin/python tools/run_webui.py \
              --llama-checkpoint-path "${LLAMA_CHECKPOINT_PATH:-checkpoints/s2-pro}" \
              --decoder-checkpoint-path "${DECODER_CHECKPOINT_PATH:-checkpoints/s2-pro/codec.pth}" \
              --decoder-config-name "${DECODER_CONFIG_NAME:-modded_dac_vq}" \
              "${CMD_ARGS[@]}"
        ports:
          - containerPort: 7860
            protocol: TCP
        env:
          - name: HF_ENDPOINT
            value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
          - name: COMPILE
            value: "1"
          - name: UV_NO_SYNC
            value: "1"
          - name: UV_FROZEN
            value: "1"
          - name: TORCHINDUCTOR_CACHE_DIR
            value: /app-cache/torch-inductor
          - name: TRITON_CACHE_DIR
            value: /app-cache/triton
        resources:
          limits:
            cpu: "5"
            memory: 35Gi
          requests:
            cpu: "500m"
            memory: 14Gi
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - mountPath: /root
          name: data
        - mountPath: /app/checkpoints
          name: checkpoints
        - mountPath: /app/references
          name: references
        - mountPath: /tmp/gradio
          name: output
        - mountPath: /app-cache
          name: app-cache
        - name: shm
          mountPath: /dev/shm
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      volumes:
      - hostPath:
          path: '{{ .Values.userspace.appCache }}/data'
          type: DirectoryOrCreate
        name: data
      - hostPath:
          path: '{{ .Values.userspace.appData }}/checkpoints'
          type: DirectoryOrCreate
        name: checkpoints
      - hostPath:
          path: '{{ .Values.userspace.appData }}/references'
          type: DirectoryOrCreate
        name: references
      - hostPath:
          path: '{{ .Values.userspace.userData }}/AI/output/{{ .Release.Name }}'
          type: DirectoryOrCreate
        name: output
      - hostPath:
          path: '{{ .Values.userspace.appCache }}/compile-cache'
          type: DirectoryOrCreate
        name: app-cache
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "2Gi"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-download-models
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-download-models
spec:
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-download-models
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download-model
          image: "docker.io/beclab/harveyff-hf-downloader-only:v0.0.7"
          env:
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
          args:
            - "--tasks"
            - '{"tasks":[{"repo":"fishaudio/s2-pro","file":"","ref":"main","outDir":"/data/models/s2-pro","doneNameTpl":".s2-pro.done"}]}'
            - "--static"
            - "/app/static"
            - "--port"
            - "8090"
            - "--probe-url"
            - "/gradio_api/info"
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: models
              mountPath: /data/models
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: "1"
              memory: 1Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/checkpoints"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-download-models
  ports:
    - name: download-status
      port: 8090
      targetPort: 8090
  type: ClusterIP

status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: fishspeech
  name: fishspeech
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
  - name: "7860"
    port: 7860
    targetPort: 7860
  selector:
    io.kompose.service: fishspeech
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: fishspeech
  name: sharedentrances-api
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
  - name: "sharedentrances-api"
    port: 80
    targetPort: 7860
  selector:
    io.kompose.service: fishspeech
status:
  loadBalancer: {}
{{- end }}

