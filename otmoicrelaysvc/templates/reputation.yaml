kind: ConfigMap
metadata:
  name: reputation-config
  namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: reputation-connector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reputation-connector
  template:
    metadata:
      labels:
        app: reputation-connector
    spec:
      initContainers:
      - name: wait-postgresql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-relay-db-postgresql-postgresql-ha-pgpool 5432; do echo waiting for postgresql; sleep 3; done']
      - name: wait-chain-bsc
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-chain-client-evm-bsc-server-9006 9100; do echo waiting for bsc client; sleep 3; done']
      - name: wait-chain-eth
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-chain-client-evm-eth-server-60 9100; do echo waiting for eth client; sleep 3; done']
      - name: wait-chain-opt
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-chain-client-evm-opt-server-614 9100; do echo waiting for opt client; sleep 3; done']
      - name: wait-chain-solana
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-chain-client-solana-solana-server-501 9100; do echo waiting for solana client; sleep 3; done']
      containers:
        - name: connector
          image: otmoic/reputation-suite:V2.2.2
          env:
          - name: DBUSER
            value: "postgres"
          - name: DBHOST
            value: "otmoic-relay-db-postgresql-postgresql-ha-pgpool"
          - name: DBPORT
            value: "5432"
          - name: DBPASS
            valueFrom:
              secretKeyRef:
                name: otmoic-relay-db-postgresql-postgresql-ha-postgresql
                key: password
          - name: "DBNAME"
            value: "otmoic_reputation"
          ports:
            - containerPort: 1234
          volumeMounts:
          - name: reputation-config
            mountPath: /src/config.toml
            subPath: config.toml
          command: ['npm', 'run', 'start-connector']
          resources: 
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      volumes:
        - name: reputation-config
          configMap:
            name: reputation-config
            defaultMode: 438
            items:
            - key: config.toml
              path: config.toml
          
---
apiVersion: v1
kind: Service
metadata:
  name: connector-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: reputation-connector
  ports:
    - protocol: TCP
      port: 1234
      targetPort: 1234    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: points-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: reputation-points
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reputation-points
  template:
    metadata:
      labels:
        app: reputation-points
    spec:
      initContainers:
      - name: wait-postgresql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-relay-db-postgresql-postgresql-ha-pgpool 5432; do echo waiting for postgresql; sleep 3; done']
      - name: wait-mongodb
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-relay-mongo-service 27017; do echo waiting for mongodb; sleep 3; done']
      containers:
        - name: points
          image: otmoic/reputation-suite:V2.2.2
          env:
          - name: DBUSER
            value: "postgres"
          - name: DBHOST
            value: "otmoic-relay-db-postgresql-postgresql-ha-pgpool"
          - name: DBPORT
            value: "5432"
          - name: DBPASS
            valueFrom:
              secretKeyRef:
                name: otmoic-relay-db-postgresql-postgresql-ha-postgresql
                key: password
          - name: "DBNAME"
            value: "otmoic_reputation"
          - name: MONGO_HOST
            value: "otmoic-relay-mongo-service"
          - name: MONGO_PORT
            value: "27017"
          - name: MONGO_USER
            valueFrom:
              secretKeyRef:
                name: otmoic-relay-mongo
                key: username
          - name: MONGO_PASS
            valueFrom:
              secretKeyRef:
                name: otmoic-relay-mongo
                key: password
          - name: MONGO_DB
            value: "Otmoic-Points"
          ports:
            - containerPort: 1235
          volumeMounts:
          - name: reputation-config
            mountPath: /src/config.toml
            subPath: config.toml
          command: ['npm', 'run', 'start-points']
          resources: 
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      volumes:
        - name: reputation-config
          configMap:
            name: reputation-config
            defaultMode: 438
            items:
            - key: config.toml
              path: config.toml
          
---
apiVersion: v1
kind: Service
metadata:
  name: points-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: reputation-points
  ports:
    - protocol: TCP
      port: 1235
      targetPort: 1235
---

  
