---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: ollamaniemotron3nano30ba3b
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/nemotron.png
  description: "NVIDIA Nemotron-3-Nano 30B A3B (Unsloth GGUF Q4_K_M) — MoE architecture activating ~3B params per token, optimized for agentic AI workflows on NVIDIA RTX GPUs"
  title: Nemotron-3-Nano 30B A3B (Ollama)
  version: '1.0.0'
  categories:
    - AI
sharedEntrances:
  - name: ollamaniemotron3nano30ba3b
    host: sharedentrances-api
    port: 0
    title: Nemotron-3-Nano 30B A3B
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/nemotron.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Nemotron-3-Nano 30B A3B
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/nemotron.png
    openMethod: window
    authLevel: internal
spec:
  versionName: 'nemotron3nano30b:a3b'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth GGUF model **nemotron3nano30b:a3b** (Q4_K_M quantization). This chart sets **OLLAMA_CONTEXT_LENGTH** to **131072** (128k).

    NVIDIA Nemotron-3-Nano 30B A3B is a mixture-of-experts model that achieves high-quality performance with significantly reduced parameter activation compared to dense models. It's optimized for agentic AI workflows and runs efficiently on NVIDIA RTX GPUs.

    The model features:
    - Mixture-of-Experts architecture activating ~3B parameters per token
    - Optimized for agentic AI workflows
    - Q4_K_M quantization for efficient local inference
    - Context window of 128k tokens
    - Backend: Ollama 0.30.4

  upgradeDescription: |
    Upgrade Ollama runtime image to ollama/ollama:0.30.4.

    Upgrade Olares API proxy image to beclab/harveyff-olares-ollama:v0.1.21.

  developer: NVIDIA / Unsloth (GGUF)
  website: https://huggingface.co/unsloth/Nemotron-3-Nano-30B-A3B-GGUF
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: NVIDIA Open Model License
      url: https://nvidia.com

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 15360m
  requiredCpu: 500m
  requiredDisk: 50Mi
  limitedDisk: 80Gi
  limitedMemory: 28Gi
  requiredMemory: 4200Mi
  requiredGpu: 16Gi
  limitedGpu: 24Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamaniemotron3nano30ba3bserver
    shared: true
  - name: ollamaniemotron3nano30ba3b
permission:
  appData: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaniemotron3nano30ba3b
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaniemotron3nano30ba3b
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: KEEP_ALIVE
    required: true
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
{{- end }}