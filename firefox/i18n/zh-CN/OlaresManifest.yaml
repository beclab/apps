metadata:
  description: Firefox 浏览器
  title: Firefox

spec:
  fullDescription: |
    Firefox 浏览器，也称为 Mozilla Firefox 或简称 Firefox，是由 Mozilla 基金会及其子公司 Mozilla 公司开发的免费开源网络浏览器。Firefox 使用 Gecko 布局引擎来呈现网页，该引擎实现了当前和预期的网络标准。

  upgradeDescription: |
    存储：持久化 `/config` 从 `appCache/firefox` 迁移至 `appData/firefox`。升级后首次启动时，若目标目录为空，initContainer 会将旧数据复制到 `appData/firefox`（标记文件：`.migration_from_appcache_done`）。旧 appCache 数据保留以便回滚。

    - 将 LinuxServer Firefox 升级至 2026 年 5 月底版本
