olaresManifest.version: '0.12.0'
metadata:
  name: firefox
  description: Firefox Browser
  icon: https://app.cdn.olares.com/appstore/firefox/icon.png
  appid: firefox
  version: '1.0.15'
  title: Firefox
  categories:
  - Utilities_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1151.0.1'
  fullDescription: |
    Firefox Browser, also known as Mozilla Firefox or simply Firefox, is a free and open-source web browser developed by the Mozilla Foundation and its subsidiary, the Mozilla Corporation. Firefox uses the Gecko layout engine to render web pages, which implements current and anticipated web standards.
  upgradeDescription: |
    Storage: durable `/config` moved from `appCache/firefox` to `appData/firefox`. On first start after upgrade, an initContainer copies legacy data into `appData/firefox` when the destination is empty (marker: `.migration_from_appcache_done`). Old appCache data is left intact for rollback.

    - Upgrade LinuxServer Firefox to the late-May 2026 release
  developer: Mozilla
  website: https://www.mozilla.org/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1Gi
  limitedMemory: 6Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: "500m"
  limitedCpu: "3"
  doc: https://support.mozilla.org/
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
  - envName: FIREFOX_HOMEPAGE
    type: url
    required: false
    editable: true
    applyOnChange: true
    default: "https://www.google.com"
    description: "URL opened when Firefox starts."
entrances:
- name: firefox
  port: 3000
  host: firefox
  title: Firefox
  icon: https://app.cdn.olares.com/appstore/firefox/icon.png
  openMethod: window
olaresManifest.type: app
apiVersion: 'v3'
workloadReplicas:
  firefox: 1
