apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.28.0 (c4137012e)
  creationTimestamp: null
  labels:
    io.kompose.service: firefox
  name: firefox
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.workloads.firefox.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: firefox
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.28.0 (c4137012e)
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: firefox
    spec:
      {{- $isOlaresOne := and .Values.deviceName (eq .Values.deviceName "Olares One") }}
      {{- $homepage := "https://www.google.com" }}
      {{- if and .Values.olaresEnv .Values.olaresEnv.FIREFOX_HOMEPAGE }}
      {{- $homepage = .Values.olaresEnv.FIREFOX_HOMEPAGE }}
      {{- end }}
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_done"

              if [ -f "$MARKER" ]; then
                echo "[migrate] marker present, skip."
                exit 0
              fi

              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi

              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache/firefox -> appData/firefox..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: config-legacy
              mountPath: /old-data
              readOnly: true
            - name: config
              mountPath: /new-data
      containers:
        - name: firefox
          image: "docker.io/beclab/linuxserver-firefox:1151.0.1"
          {{- if $isOlaresOne }}
          securityContext:
            privileged: true
          {{- end }}
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: FIREFOX_CLI
              value: {{ $homepage | quote }}
            {{- if $isOlaresOne }}
            - name: DRINODE
              value: /dev/dri/renderD128
            - name: DRI_NODE
              value: /dev/dri/renderD128
            {{- end }}
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "3"
              memory: 6Gi
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - containerPort: 3001
            - containerPort: 8082
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /home
              name: userdata
            - name: dshm
              mountPath: /dev/shm
            {{- if $isOlaresOne }}
            - mountPath: /dev/dri
              name: dev-dri
            {{- end }}
      restartPolicy: Always
      volumes:
        - name: config
          hostPath:
            type: DirectoryOrCreate
            path: {{ .Values.userspace.appData }}/firefox
        - name: config-legacy
          hostPath:
            type: DirectoryOrCreate
            path: {{ .Values.userspace.appCache }}/firefox
        - hostPath:
            path: '{{ .Values.userspace.userData }}'
            type: DirectoryOrCreate
          name: userdata
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if $isOlaresOne }}
        - name: dev-dri
          hostPath:
            path: /dev/dri
        {{- end }}
status: {}
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.28.0 (c4137012e)
  creationTimestamp: null
  labels:
    io.kompose.service: firefox
  name: firefox
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
    - name: "3001"
      port: 3001
      targetPort: 3001
      nodePort: 30002
  selector:
    io.kompose.service: firefox
status:
  loadBalancer: {}
