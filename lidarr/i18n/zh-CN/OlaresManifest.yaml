metadata:
  description: 为 Usenet 和 BitTorrent 用户设计的音乐管理工具
  title: Lidarr

spec:
  fullDescription: |
    Lidarr 可追踪多个 RSS 源，自动下载你喜欢的艺术家的新专辑，并通过客户端和索引器进行整理和重命名。当库中出现更高质量的格式时，系统也可以自动升级现有文件的质量。

    **主要功能包括：**
    - 支持各大平台：Windows、Linux、macOS、树莓派等。
    - 自动侦测新曲目。
    - 能扫描你的媒体库，下载任何缺失曲目。
    - 能自动检测并升级你已有曲目的质量。
    - 如果下载失败，系统会自动尝试其他版本。
    - 提供手动搜索功能，你可以自选版本或查看为什么某个版本未自动下载。
    - 曲目重命名功能可完全自定义。
    - 与 SABnzbd 和 NZBGet 完全集成。
    - 完美集成 Kodi 和 Plex，包括通知、库更新和元数据处理。
    - 全面支持特别版和多专辑发行。
    - 界面美观易用。

  upgradeDescription: |
    升级 Lidarr 至版本 3.1.0（2025-11-16）
    配置变更：调整 Olares 目录挂载路径及入口权限。
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 切换容器镜像为 linuxserver/lidarr
    - 入口权限变更为 internal

    升级亮点：
    - 【重大变更】迁移至 .NET 8；移除 Basic Auth，改用 Forms 认证
    - 【qBittorrent】修复 qBittorrent /login API 成功检查
    - 【改进】RFC 1918/私有 IPv6 已知网络；FluentMigrator 与 SQLite 更新
    - 【修复】音频文件检测使用正确文件路径

    详细版本信息请参考：https://github.com/Lidarr/Lidarr/releases/tag/v3.1.0.4875
