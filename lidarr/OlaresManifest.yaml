olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  lidarr: 1
metadata:
  name: lidarr
  description: A music collection manager for Usenet and BitTorrent users
  icon: https://app.cdn.olares.com/appstore/lidarr/icon.png
  appid: lidarr
  version: '1.0.14'
  title: Lidarr
  categories:
  - Fun

spec:
  versionName: '3.1.0'
  promoteImage:
  - https://app.cdn.olares.com/appstore/lidarr/1.webp
  - https://app.cdn.olares.com/appstore/lidarr/2.webp

  fullDescription: |
    Lidarr can monitor multiple RSS feeds for new albums from your favorite artists and will interface with clients and indexers to grab, sort, and rename them. It can also be configured to automatically upgrade the quality of existing files in the library when a better quality format becomes available.

    **Major Features Include:**
    - Support for major platforms: Windows, Linux, macOS, Raspberry Pi, etc.
    - Automatically detects new tracks.
    - Can scan your existing library and download any missing tracks.
    - Can watch for better quality of the tracks you already have and do an automatic upgrade.
    - Automatic failed download handling will try another release if one fails
    - Manual search so you can pick any release or to see why a release was not downloaded automatically
    - Fully configurable track renaming
    - Full integration with SABnzbd and NZBGet
    - Full integration with Kodi, Plex (notification, library update, metadata)
    - Full support for specials and multi-album releases
    - And a beautiful UI

  upgradeDescription: |

    Stop recursively chowning the whole Home on startup; only fix ownership on appData/config.
    Upgrade Lidarr to version 3.1.0 (2025-11-16)
    Config changes: change olares directory mount path & entrance authlevel.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Switch container image to linuxserver/lidarr
    - Entrance auth level changed to internal

    Upgrade Highlights:
    - [Major] Migrated to .NET 8; removed Basic Auth in favor of Forms authentication
    - [qBittorrent] Fixed qBittorrent /login API success check
    - [Improvements] RFC 1918/private IPv6 known networks; FluentMigrator and SQLite updates
    - [Fixes] Audio file detection uses correct file path

    Full release note: https://github.com/Lidarr/Lidarr/releases/tag/v3.1.0.4875

  developer: Lidarr
  website: https://lidarr.audio/
  sourceCode: https://github.com/Lidarr/Lidarr
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://wiki.servarr.com/
  legal:
  - text: Code of conduct
    url: https://github.com/Lidarr/Lidarr/blob/develop/CODE_OF_CONDUCT.md
  - text: Security policy
    url: https://github.com/Lidarr/Lidarr/security/policy
  license:
  - text: GPL-3.0
    url: https://github.com/Lidarr/Lidarr/blob/develop/LICENSE.md
  requiredMemory: 256Mi
  limitedMemory: 512Mi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.1
  limitedCpu: 0.5
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: lidarr-svc
  port: 8686
  host: lidarr-svc
  title: Lidarr
  icon: https://app.cdn.olares.com/appstore/lidarr/icon.png
  openMethod: window
  authLevel: internal
permission:
  appData: true
  appCache: true
  userData:
  - Home
