metadata:
  title: Pool CLI
  description: Poolside 终端 AI 编码助手
spec:
  fullDescription: |
    **概述**
    Pool 是 Poolside 的终端编码 Agent，可读取代码库、调用工具、编辑文件，并支持 MCP 服务器、Skills 和 AGENTS.md 项目指令。

    **主要功能**
    - 交互式终端 TUI，支持斜杠命令、文件模糊搜索、Shell 模式和多种审批模式。
    - 可通过自然语言进行真实文件编辑、Shell 执行和 Git 工作流。
    - 支持 MCP 工具集成和可复用的 Skills 工作流。
    - 通过 `pool exec` 支持脚本和 CI 的非交互自动化。
    - 预装工具链：Python、Node.js、Go、Rust、Java、PHP，以及 git、ripgrep、数据库客户端。
    - 可选 DinD（`ENABLE_DIND`，默认开启）：在终端内使用 `docker` / `docker compose`（特权 sidecar）。

    **设置说明**
    - **本地模型：** 将 `USE_LOCAL_LLM` 设为 `true`，`POOL_MODEL` 填你安装的模型名字（默认 `qwen3-coder:30b`），重启应用后直接运行 `pool-local` 或 `pool exec`。
    - **Poolside 云端：** 将 `USE_LOCAL_LLM` 设为 `false`，运行 `pool setup` 或配置 `POOLSIDE_API_KEY`。
    - **自托管 Poolside 平台：** 将 `USE_LOCAL_LLM` 设为 `false`，设置 `POOLSIDE_API_URL` 和 `POOLSIDE_API_KEY` / `POOLSIDE_TOKEN`。
