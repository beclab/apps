metadata:
  title: Pool CLI
  description: Poolside's coding agent that runs in your terminal
spec:
  fullDescription: |
    **Overview**
    Pool is Poolside's coding agent for the terminal. It reads your codebase, runs tools, edits files, and supports MCP servers, Skills, and AGENTS.md project instructions.

    **Key Features**
    - Interactive terminal TUI with slash commands, file fuzzy search, shell mode, and approval modes.
    - Real file edits, shell execution, and git workflows driven by natural language.
    - MCP tool integration and reusable Skills workflows.
    - Non-interactive automation via `pool exec` for scripts and CI.
    - Preinstalled toolchain: Python, Node.js, Go, Rust, Java, PHP, plus git, ripgrep, and database clients.
    - Optional Docker-in-Docker sidecar (`ENABLE_DIND`, default on): run `docker build`, `docker compose`, and containerized dev stacks from the terminal.

    **Setup Instructions**
    - **Local Model:** set `USE_LOCAL_LLM` to `true`, set `POOL_MODEL` to the exact model name you installed (default `qwen3-coder:30b`), restart the app, then run `pool-local` or `pool exec`.
    - **Poolside Cloud:** set `USE_LOCAL_LLM` to `false`, run `pool setup` (Log in with Poolside), or set `POOLSIDE_API_KEY`.
    - **Self-hosted Poolside platform:** set `USE_LOCAL_LLM` to `false`, set `POOLSIDE_API_URL` and `POOLSIDE_API_KEY` / `POOLSIDE_TOKEN`.