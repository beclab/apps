olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  pool: 1
  terminal: 1
metadata:
  name: pool
  icon: https://app.cdn.olares.com/appstore/pool/icon.png
  description: Poolside's coding agent that runs in your terminal
  appid: pool
  title: Pool CLI
  version: 1.0.4
  categories:
  - Developer Tools

entrances:
- name: terminal
  host: terminal
  port: 80
  title: Pool CLI
  icon: https://app.cdn.olares.com/appstore/pool/icon.png
  openMethod: window
  authLevel: internal
spec:
  versionName: '1.0.4'
  fullDescription: |
    **Overview**
    Pool is Poolside's coding agent for the terminal. It reads your codebase, runs tools, edits files, and supports MCP servers, Skills, and AGENTS.md project instructions.

    **Key Features**
    - Interactive terminal TUI with slash commands, file fuzzy search, shell mode, and approval modes.
    - Real file edits, shell execution, and git workflows driven by natural language.
    - MCP tool integration and reusable Skills workflows.
    - Non-interactive automation via `pool exec` for scripts and CI.
    - Preinstalled toolchain: Python, Node.js, Go, Rust, Java, PHP, plus git, ripgrep, and database clients.
    - Optional Docker-in-Docker sidecar (`ENABLE_DIND`, default on): run `docker build`, `docker compose`, and containerized dev stacks from the terminal.

    **Setup Instructions**
    - **Local Ollama (recommended on Olares):** set `USE_LOCAL_LLM` to `true`, set `POOL_MODEL` to the exact tag you pulled in Ollama (default `qwen3-coder:30b`), restart the app, then run `pool` or `pool exec` — the model is wired up automatically.
    - **Poolside Cloud:** set `USE_LOCAL_LLM` to `false`, run `pool setup` (Log in with Poolside), or set `POOLSIDE_API_KEY`.
    - **Self-hosted Poolside platform:** set `USE_LOCAL_LLM` to `false`, set `POOLSIDE_API_URL` and `POOLSIDE_API_KEY` / `POOLSIDE_TOKEN`.

  developer: Poolside
  website: https://poolside.ai
  sourceCode: https://github.com/poolsideai/pool
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://docs.poolside.ai/cli/pool
  license:
  - text: Proprietary
    url: https://poolside.ai/eula
  requiredMemory: 1Gi
  limitedMemory: 32Gi
  requiredDisk: 2Gi
  limitedDisk: 100Gi
  requiredCpu: 500m
  limitedCpu: 12
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
  - Home
  externalData: true
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
- envName: USE_LOCAL_LLM
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Use a local OpenAI-compatible API (Ollama on Olares) instead of Poolside Cloud"
- envName: POOLSIDE_STANDALONE_BASE_URL
  type: url
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Local LLM API base URL (OpenAI-compatible). Default when USE_LOCAL_LLM=true: http://ollama.ollama-<user>:11434/v1 — use http://ollama.ollamav3-<user>:11434/v1 if you run ollamav3"
- envName: POOLSIDE_API_URL
  type: url
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Poolside API URL for self-hosted deployments (leave empty for Poolside Cloud standalone mode)"
- envName: POOLSIDE_API_KEY
  type: password
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Poolside API key for cloud mode. Ignored when USE_LOCAL_LLM=true (uses placeholder 'ollama' for local Ollama)"
- envName: POOLSIDE_TOKEN
  type: password
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Alternative auth token for self-hosted Poolside deployments (used when POOLSIDE_API_KEY is not set)"
- envName: POOL_MODEL
  type: string
  required: false
  applyOnChange: true
  editable: true
  default: "qwen3-coder:30b"
  description: "Ollama model name when USE_LOCAL_LLM=true (use the exact tag from `ollama list`, e.g. qwen3-coder:30b). On startup it is aliased to pool's built-in default model so `pool exec` and interactive both use it automatically"
- envName: ENABLE_DIND
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "true"
  description: "Run a privileged Docker-in-Docker sidecar in the pod. Exposes docker CLI in the terminal via DOCKER_HOST=tcp://localhost:2375 (uses extra CPU/RAM/disk under app data). Disable if your environment forbids privileged containers"
- envName: ALLOW_HOME_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow Pool CLI to read/write the Olares Home directory"
- envName: ALLOW_EXTERNAL_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow Pool CLI to read/write the Olares External directory"
