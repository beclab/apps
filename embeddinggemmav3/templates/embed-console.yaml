{{- /* Console UI — embedconsole workload (S23). Image tag suffix -ui aligns with embed-server $embedTag. */ -}}
{{- $embedTag := "v0.0.9" -}}
{{- $consoleImage := printf "docker.io/beclab/embed-server:%s-ui" $embedTag -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: embed-console-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: embed-console
data:
  nginx.conf.template: |
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Olares: ClusterIP Service embedserver:8080 (same namespace)
        location /api/ {
            rewrite ^/api/?(.*)$ /$1 break;
            proxy_pass http://embedserver:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
  runtime-config.js.template: |
    window.__EMBED_API_UPSTREAM_DISPLAY__ = '${EMBED_API_UPSTREAM_DISPLAY}';
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedconsole
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: embed-console
spec:
  replicas: {{ .Values.workloads.embedconsole.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: embed-console
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: embed-console
    spec:
      restartPolicy: Always
      volumes:
        - name: console-nginx
          configMap:
            name: embed-console-nginx
            defaultMode: 0444
      containers:
        - name: embedconsole
          image: "{{ $consoleImage }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: EMBED_API_UPSTREAM
              value: "http://embedserver:8080"
            - name: EMBED_API_UPSTREAM_DISPLAY
              value: "embedserver:8080"
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: console-nginx
              mountPath: /etc/nginx/templates/nginx.conf.template
              subPath: nginx.conf.template
              readOnly: true
            - name: console-nginx
              mountPath: /usr/share/nginx/html/runtime-config.js.template
              subPath: runtime-config.js.template
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: console-svc
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: embed-console
spec:
  selector:
    io.kompose.service: embed-console
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
