{{- $embedclientDomainENV := split "," .Values.domain.embedclient -}}
{{- $embedclientDomain := index $embedclientDomainENV "_0" -}}
{{- $oe := .Values.olaresEnv | default dict -}}
{{- $hfEndpoint := $oe.HF_ENDPOINT | default "" -}}
{{- $hfToken := $oe.HF_TOKEN | default "" -}}
{{- $logLevel := $oe.LOG_LEVEL | default "info" -}}
{{- $runStateHostPath := printf "%s/llm-init-run/%s" .Values.userspace.appCache .Release.Name -}}
---
# llm-init download-only: fetch OV + ONNX EmbeddingGemma repos into App Common HF cache.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llminit
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: llm-init
spec:
  replicas: {{ .Values.workloads.llminit.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: llm-init
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llm-init
    spec:
      restartPolicy: Always
      volumes:
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appCommon }}/huggingface"
            type: DirectoryOrCreate
        - name: run-state
          hostPath:
            path: "{{ $runStateHostPath }}"
            type: DirectoryOrCreate
      initContainers:
        - name: init-chown
          image: docker.io/beclab/aboveos-busybox:1.37.0
          command:
            - sh
            - -c
            - "chown 1000:1000 /cache/hf/hub /run/llm-init || true"
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
            - name: run-state
              mountPath: /run/llm-init
          securityContext:
            runAsUser: 0
      containers:
        - name: llm-init
          image: docker.io/beclab/llm-init:v1.2.6
          imagePullPolicy: IfNotPresent
          env:
            - name: ENGINE_KIND
              value: ""
            - name: MODEL_NAME
              value: "wangzhong/embeddinggemma-300m-ov"
            - name: MODEL_MODE
              value: "embedding"
            - name: MODEL_SOURCE
              value: "hf://wangzhong/embeddinggemma-300m-ov,hf://wangzhong/embeddinggemma-300m-onnx-export"
{{- if $hfEndpoint }}
            - name: HF_ENDPOINT
              value: "{{ $hfEndpoint }}"
{{- end }}
{{- if $hfToken }}
            - name: HF_TOKEN
              value: "{{ $hfToken }}"
{{- end }}
            - name: RUN_DIR
              value: /run/llm-init
            - name: PORT
              value: "8090"
            - name: LOG_LEVEL
              value: "{{ $logLevel }}"
            - name: LOG_FORMAT
              value: json
            - name: APP_URL
              value: "https://{{ $embedclientDomain }}"
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /livez
              port: 8090
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /livez
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
            - name: run-state
              mountPath: /run/llm-init
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llm-init
spec:
  selector:
    io.kompose.service: llm-init
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-api
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: embed-server
spec:
  selector:
    io.kompose.service: embed-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
