# Engine wrapper aligned with llm-init deploy/wrappers/embed.sh + common.sh.
# Reads /run/llm-init/model_path (written by llm-init with --subdir) → EMBED_MODEL_DIR.
apiVersion: v1
kind: ConfigMap
metadata:
  name: embed-server-wrappers
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: embed-server
data:
  common.sh: |
    #!/bin/sh
    set -eu

    SENTINEL=${SENTINEL:-/run/llm-init/model_download_finish}
    MODEL_PATH_FILE=${MODEL_PATH_FILE:-/run/llm-init/model_path}
    WAIT_INTERVAL=${WAIT_INTERVAL:-5}
    WAIT_TIMEOUT=${WAIT_TIMEOUT:-3600}

    log() {
        printf '[wrapper-%s] %s\n' "${ENGINE:-engine}" "$*"
    }

    wait_for_sentinel() {
        elapsed=0
        while [ ! -f "$SENTINEL" ]; do
            if [ "$elapsed" -ge "$WAIT_TIMEOUT" ]; then
                log "timed out after ${WAIT_TIMEOUT}s waiting for $SENTINEL"
                exit 1
            fi
            log "waiting for $SENTINEL (elapsed=${elapsed}s)"
            sleep "$WAIT_INTERVAL"
            elapsed=$((elapsed + WAIT_INTERVAL))
        done
        log "sentinel $SENTINEL found after ${elapsed}s"
    }

    read_model_path() {
        if [ ! -f "$MODEL_PATH_FILE" ]; then
            log "model path file $MODEL_PATH_FILE not found"
            exit 1
        fi
        tr -d '\r\n' < "$MODEL_PATH_FILE"
    }

  embed.sh: |
    #!/bin/sh
    set -eu

    ENGINE=embed
    . "$(dirname "$0")/common.sh"

    wait_for_sentinel
    MODEL_PATH=$(read_model_path)
    export EMBED_MODEL_DIR="$MODEL_PATH"

    EMBED_SERVER_BIN="${EMBED_SERVER_BIN:-/usr/local/bin/embed_server}"
    if [ ! -x "$EMBED_SERVER_BIN" ]; then
        EMBED_SERVER_BIN="$(command -v embed_server 2>/dev/null || true)"
    fi
    if [ -z "$EMBED_SERVER_BIN" ] || [ ! -x "$EMBED_SERVER_BIN" ]; then
        log "embed_server binary not found (checked /usr/local/bin/embed_server, \$PATH, \$EMBED_SERVER_BIN)"
        exit 127
    fi

    log "starting embed_server model_dir=$MODEL_PATH model_id=${MODEL_ID:-unset} port=${EMBED_PORT:-8080}"
    exec "$EMBED_SERVER_BIN" "$@"
