metadata:
  title: EmbeddingGemma
  description: "基于 IREmbeddingServer 的 EmbeddingGemma-300M 文本向量服务（OpenVINO / ONNX）"

spec:
  fullDescription: |
    **EmbeddingGemma-300M** 文本向量服务，由 EmbeddingServer 提供支持。在 8080 端口提供兼容 OpenAI 的 `/v1/embeddings` 和 `/v1/models` 接口。

    **加速器模式**
    | Olares 模式 | 镜像 | 后端 | `EMBED_DEVICE` |
    |-------------|------|------|----------------|
    | `intel` | `embed-server:v0.1.0-ov-intel` | OpenVINO IR | `igpu` |
    | `cpu` | `embed-server:v0.1.0-onnx-cpu` | ONNX CPU EP | `cpu` |
    | `nvidia` | `embed-server:v0.1.0-onnx-cuda12/13` | ONNX CUDA EP | `cuda` |
    | `nvidia-gb10` | `embed-server:v0.1.0-onnx-cuda13-gb10-arm64` | ONNX CUDA EP | `cuda` |

    **模型下载**
    首次启动时，llm-init 从统一 Hugging Face 仓库下载到 App Common 缓存：
    - [beclab/embeddinggemma-300m](https://huggingface.co/beclab/embeddinggemma-300m)
    - `intel` 模式：仅 `openvino/` 子目录
    - 其他模式：仅 `onnx/` 子目录

    **设备挂载**
    - `intel`：`/dev/dri`, `/sys/class/drm` 用于 Intel iGPU
    - `nvidia` / `nvidia-gb10`：通过 Olares 调度器注入 GPU

    **技术栈**
    - **embed-server**（`beclab/embed-server:v0.1.0`，内部 8080）：Rust 向量推理。
    - **llm-init**（`beclab/llm-init:test_v1`，`ENGINE_KIND=embed`，8090）：模型下载、进度 UI 与 OpenAI API 代理。
