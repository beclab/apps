metadata:
  title: EmbeddingGemma
  description: "EmbeddingGemma-300M text embeddings via IREmbeddingServer (OpenVINO / ONNX)"

spec:
  fullDescription: |
    **EmbeddingGemma-300M** text embedding service powered by EmbeddingServer. Serves OpenAI-compatible `/v1/embeddings` and `/v1/models` on port 8080.

    **Accelerator modes**
    | Olares mode | Image | Backend | `EMBED_DEVICE` |
    |-------------|-------|---------|----------------|
    | `intel` | `embed-server:v0.1.0-ov-intel` | OpenVINO IR | `igpu` |
    | `cpu` | `embed-server:v0.1.0-onnx-cpu` | ONNX CPU EP | `cpu` |
    | `nvidia` | `embed-server:v0.1.0-onnx-cuda12/13` | ONNX CUDA EP | `cuda` |
    | `nvidia-gb10` | `embed-server:v0.1.0-onnx-cuda13-gb10-arm64` | ONNX CUDA EP | `cuda` |

    **Model download**
    On first start, llm-init downloads from the unified Hugging Face repo into App Common cache:
    - [beclab/embeddinggemma-300m](https://huggingface.co/beclab/embeddinggemma-300m)
    - `intel` mode: `openvino/` subdirectory only
    - All other modes: `onnx/` subdirectory only

    **Device mounts**
    - `intel`: `/dev/dri`, `/sys/class/drm` for Intel iGPU stack
    - `nvidia` / `nvidia-gb10`: GPU injection via Olares scheduler

    **Stack**
    - **embed-server** (`beclab/embed-server:v0.1.0`, internal port 8080): Rust embedding inference.
    - **llm-init** (`beclab/llm-init:test_v1`, `ENGINE_KIND=embed`, port 8090): download, progress UI, and OpenAI API proxy.
