# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   embeddinggemmav3 — embed-server engine Deployment (== appid / Release.Name)
#   llminit            — llm-init download-only sidecar
#   embedconsole       — Web Console (nginx + React SPA, S21)
#
# Console image and resources live in templates/embed-console.yaml (inline $embedTag /
# $embedImage, same pattern as embed-server.yaml), not in this values file.
workloads:
  embedconsole:
    replicaCount: 1
  llminit:
    replicaCount: 1
  embeddinggemmav3:
    replicaCount: 1
