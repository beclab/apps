metadata:
  description: 面向新闻组和 BitTorrent 用户的智能 PVR。
  title: Sonarr

spec:
  fullDescription: |
    Sonarr 是面向新闻组和 BitTorrent 用户的 PVR 应用。它可以监控多个 RSS 源来获取你喜爱节目的新剧集，并会自动抓取、分类和重命名这些剧集。当有更高质量的格式可用时，它还可以被配置为自动升级已下载文件的质量。

    **功能特性:**
    - 日历：在一个便捷的位置查看所有即将播出的剧集。
    - 手动搜索：找到所有的发布版本，选择你想要的，并直接发送到你的下载客户端。
    - 自动处理失败的下载：Sonarr 让下载失败成为过去。受密码保护的发布版本、缺失的修复块或几乎任何其他原因？不用担心。Sonarr 会自动阻止该版本并尝试另一个，直到找到一个可用的版本。

  upgradeDescription: |
    升级 Sonarr 至版本 4.0.18（2026-06-24）
    配置变更：调整 Olares 目录挂载路径及入口权限。
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 切换容器镜像为 linuxserver/sonarr
    - 入口权限变更为 internal

    升级亮点：
    - 【qBittorrent】回移植 qBittorrent 修复；API 调用复用认证 Cookie
    - 【修复】改进 qBittorrent 5.x 登录及下载客户端集成

    详细版本信息请参考：https://github.com/Sonarr/Sonarr/releases/tag/v4.0.18.2971
