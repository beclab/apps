olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  sonarr: 1
metadata:
  name: sonarr
  description: Smart PVR for newsgroup and bittorrent users.
  icon: https://app.cdn.olares.com/appstore/sonarr/icon.png
  appid: sonarr
  version: '1.0.16'
  title: Sonarr
  categories:
  - Fun

permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '4.0.18'
  promoteImage:
  - https://app.cdn.olares.com/appstore/sonarr/1.webp
  - https://app.cdn.olares.com/appstore/sonarr/2.webp
  - https://app.cdn.olares.com/appstore/sonarr/3.webp
  fullDescription: |
    Sonarr is a PVR for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new episodes of your favorite shows and will grab, sort and rename them. It can also be configured to automatically upgrade the quality of files already downloaded when a better quality format becomes available.

    **Features:**
    - Calendar: See all your upcoming episodes in one convenient location.
    - Manual Search: Find all the releases, choose the one you want and send it right to your download client.
    - Automatic Failed Download Handling: Sonarr makes failed downloads a thing of the past. Password protected releases, missing repair blocks or virtually any other reason? no worries. Sonarr will automatically block the release and try another one until it finds one that works.

  upgradeDescription: |

    Stop recursively chowning the whole Home on startup; only fix ownership on appData/config.
    Upgrade Sonarr to version 4.0.18 (2026-06-24)
    Config changes: change olares directory mount path & entrance authlevel.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Switch container image to linuxserver/sonarr
    - Entrance auth level changed to internal

    Upgrade Highlights:
    - [qBittorrent] Backport qBittorrent fixes; reuse authentication cookies for qBittorrent API calls
    - [Fixes] Login and download client integration improvements for qBittorrent 5.x

    Full release note: https://github.com/Sonarr/Sonarr/releases/tag/v4.0.18.2971

  developer: Sonarr
  website: https://sonarr.tv/
  sourceCode: https://github.com/Sonarr/Sonarr
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://wiki.servarr.com/sonarr
  legal:
  - text: Security policy
    url: https://github.com/Sonarr/Sonarr/security/policy
  license:
  - text: GPL-3.0
    url: https://github.com/Sonarr/Sonarr/blob/develop/LICENSE.md
  requiredMemory: 32Mi
  limitedMemory: 256Mi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.1
  limitedCpu: 1
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: sonarr-svc
  port: 8989
  host: sonarr-svc
  title: Sonarr
  icon: https://app.cdn.olares.com/appstore/sonarr/icon.png
  openMethod: window
  authLevel: internal
