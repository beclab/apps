apiVersion: v1
kind: ConfigMap
metadata:
  name: init-config
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    # appData/config only — do not recurse the whole Home (user media libraries).
    chown -R 1000:1000 /config

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: sonarr
spec:
  replicas: {{ .Values.workloads.sonarr.replicaCount }}
  selector:
    matchLabels:
      app: sonarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      initContainers:
      - name: init-sonarr
        image: "docker.io/beclab/aboveos-busybox:1.37.0"
        command:
          - sh
          - '-c'
          - |
            sh /init.sh
        volumeMounts:
        - mountPath: /olares/userdata/home
          name: home
        - mountPath: /config
          name: sonarr-config
        - name: init-config
          mountPath: /init.sh
          subPath: init.sh
        securityContext:
          runAsUser: 0
      containers:
      - env:
        - name: PGID
          value: "1000" 
        - name: PUID
          value: "1000" 
        - name: UMASK
          value: "002" 
        - name: TZ
          value: Etc/UTC
        name: sonarr
        image: "linuxserver/sonarr:4.0.18"
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            cpu: 1000m
            memory: 256Mi
        ports:
        - containerPort: 8989
        volumeMounts:
        - mountPath: /config
          name: sonarr-config
        - name: home
          mountPath: /olares/userdata/home
        - name: home
          mountPath: /home

      volumes:
      - name: sonarr-config
        hostPath:
          type: DirectoryOrCreate
          path: {{ .Values.userspace.appData }} 
      - name: home
        hostPath:
          type: Directory
          path: {{ .Values.userspace.userData }}
      - name: init-config
        configMap:
          name: init-config
          defaultMode: 438
          items:
          - key: init.sh
            path: init.sh

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: 8989
      targetPort: 8989
