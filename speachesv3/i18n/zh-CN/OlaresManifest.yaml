metadata:
  title: Speaches
  description: 兼容 OpenAI 的语音合成/语音识别服务器
spec:
  fullDescription: |
    Speaches 是一个兼容 OpenAI API 的服务器，支持流式转录、翻译和语音生成。语音转文字由 faster-whisper 提供支持，文字转语音则由 piper 和 Kokoro 实现。这个项目的目标是成为 TTS/STT 领域的 "Ollama"。

    **主要特性**
    - 基于 Kokoro 和 Piper 模型的文字转语音 (TTS)。
    - 基于 faster-whisper 的高质量语音转文字 (STT)。
    - 兼容 OpenAI API（/v1/audio/speech、/v1/audio/transcriptions 等）。
    - 内置 Gradio Web UI，可交互式测试 TTS/STT。
    - 内置终端，可通过命令行管理模型（下载、列表、删除模型）。
    - 支持 GPU 加速（NVIDIA CUDA），也支持纯 CPU 运行。
    - 提供共享入口，可与其他 Olares 应用无缝集成。

    **模型存储（App Common 共享）**
    HF 模型存放在跨应用共享的 App Common 存储 `appCommon/huggingface` 中，挂载到容器内固定路径
    `/cache/hf/hub`。由一个 llm-init download-only 边车将预装的 STT/TTS 模型下载到该存储；
    Speaches 挂载同一存储，并在两个模型均就绪后才启动。

    **预装模型**
    - Kokoro-82M-v1.0-ONNX（TTS）— 轻量级、高质量语音合成。
    - faster-whisper-small（STT）— 快速准确的语音识别。
    - 可通过终端入口下载更多模型。

    **使用方法**
    - 打开 Speaches UI，通过 Gradio 界面交互式测试语音合成和语音识别。
    - 通过终端入口下载 HuggingFace 上的更多模型。
    - 其他 Olares 应用可通过共享入口或 API 入口调用服务。
    - API 完全兼容 OpenAI SDK 和各类库。
  upgradeDescription: |
    Speaches（引擎 0.8.2）的 V3 共享应用迁移。
    - 将 speachesserver / speaches 子 chart 扁平化为单一 chart。
    - 引擎 Deployment 现以 appid 命名（speachesv3）；nginx 入口（speachesingress）与终端
      拆分为独立工作负载，均通过 workloadReplicas 声明。
    - 模型改为存放在跨应用共享的 App Common 存储 appCommon/huggingface（固定 /cache/hf/hub），
      取代原先的 per-user Huggingface/speaches 目录。
    - 新增 llm-init download-only 边车，将预装 STT/TTS 模型下载到共享存储；引擎等待两个模型
      就绪后再启动。
    - HF 镜像/令牌通过 valueFrom 从用户的系统 HF 账号注入。
