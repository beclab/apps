olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: speachesv3
  icon: https://app.cdn.olares.com/appstore/speaches/icon.png
  description: OpenAI-compatible TTS/STT server
  appid: speachesv3
  title: Speaches
  version: '1.1.8'
  categories:
    - Utilities_v112
    - AI
sharedEntrances:
  - name: speaches
    host: sharedentrances-speaches
    port: 0
    title: Speaches API
    icon: https://app.cdn.olares.com/appstore/speaches/icon.png
    invisible: true
    authLevel: internal
entrances:
  - name: speaches
    port: 8080
    host: speachesingress
    title: Speaches
    icon: https://app.cdn.olares.com/appstore/speaches/icon.png
    openMethod: window
    authLevel: internal
  - name: speachesterminal
    port: 8081
    host: speachesingress
    title: Speaches Terminal
    icon: https://app.cdn.olares.com/appstore/speaches/terminal.png
    openMethod: window
    authLevel: internal
  - name: speachesapi
    port: 8082
    host: speachesingress
    title: Speaches API
    icon: https://app.cdn.olares.com/appstore/speaches/icon.png
    invisible: true
    openMethod: window
    authLevel: internal
# Declares every workload's replica count (flat map; keys = Deployment
# metadata.name). Keys MUST match rendered workload names and values.yaml
# workloads.<name>:
#   speachesv3         — speaches engine Deployment (== appid / Release.Name)
#   speachesdownloader — llm-init download-only model fetcher
#   speachesingress    — nginx entrance proxy
#   terminal           — model-management terminal
workloadReplicas:
  speachesv3: 1
  speachesdownloader: 1
  speachesingress: 1
  terminal: 1
permission:
  appData: true
  appCache: true   # llm-init sentinel/run-state under appCache/llm-init-run/<release>
  # STT/TTS HF models live in the shared cross-app App Common store
  # (appCommon/huggingface, mounted at the fixed /cache/hf/hub container path).
  appCommon: true
spec:
  onlyAdmin: true
  versionName: '0.8.2'
  promoteImage:
  - https://app.cdn.olares.com/appstore/speaches/1.webp
  - https://app.cdn.olares.com/appstore/speaches/2.webp
  fullDescription: |
    Speaches is an OpenAI API-compatible server supporting streaming transcription, translation, and speech generation. Speach-to-Text is powered by faster-whisper and for Text-to-Speech piper and Kokoro are used. This project aims to be Ollama, but for TTS/STT models.

    **Key Features**
    - Text-to-Speech powered by Kokoro and Piper models.
    - Speech-to-Text powered by faster-whisper for high-quality transcription.
    - OpenAI-compatible API (/v1/audio/speech, /v1/audio/transcriptions, etc.).
    - Built-in Gradio Web UI for interactive testing.
    - Built-in Terminal for CLI model management (download, list, remove models).
    - GPU acceleration support (NVIDIA CUDA) with CPU fallback.
    - Shared entrance for seamless integration with other Olares apps.

    **Model storage (App Common, shared)**
    HF models live in the shared cross-app App Common store `appCommon/huggingface`,
    mounted at the fixed container path `/cache/hf/hub`. An llm-init download-only
    sidecar fetches the pre-installed STT/TTS models into that store using the
    standard `models--owner--repo/snapshots/<sha>/` layout, so every HF-based app
    shares a single deduplicated view of downloaded models. Speaches mounts the
    same store and waits until both models are present before it starts.

    **Pre-installed Models**
    - Kokoro-82M-v1.0-ONNX (TTS) — lightweight, high-quality speech synthesis.
    - faster-whisper-small (STT) — fast and accurate speech recognition.
    - Additional models can be downloaded via the Terminal entrance.

    **Usage**
    - Open the Speaches UI to test TTS/STT interactively via the Gradio interface.
    - Use the Terminal to download additional models from HuggingFace.
    - Other Olares apps can call the API via the shared entrance or the API entrance.
    - API is fully compatible with OpenAI SDKs and libraries.
  developer: Speaches AI
  website: https://speaches.ai/
  sourceCode: https://github.com/speaches-ai/speaches
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://speaches.ai/
  license:
    - text: MIT
      url: https://github.com/speaches-ai/speaches/blob/main/LICENSE
  upgradeDescription: |
    V3 shared-app migration of Speaches (engine 0.8.2).
    - Added nvidia-gb10 (GB10/Spark) accelerator support; on Spark unified memory the GPU is carved from requiredMemory, so nvidia-gb10 requiredMemory is 12Gi (>= the 8Gi GPU need). On nvidia-gb10 the speaches container also raises its memory request/limit (10Gi/19Gi) since the GPU working set lives in pod RAM; discrete GPU keeps 6Gi/18Gi.
    - Flattened the speachesserver / speaches sub-charts into a single chart.
    - The engine Deployment is now named after the appid (speachesv3); the nginx
      entrance (speachesingress) and terminal are separate workloads, all declared
      via workloadReplicas.
    - Models now live in the shared cross-app App Common store appCommon/huggingface
      (fixed /cache/hf/hub), replacing the per-user Huggingface/speaches directory.
    - A new llm-init download-only sidecar (ENGINE_KIND empty) downloads the
      pre-installed STT/TTS models into the shared store; the engine waits until
      both are present, then starts.
    - HF mirror/token are sourced from the user's system HF account via valueFrom.
  accelerator:
  # Olares validates per mode, summing ALL app containers (initContainers
  # excluded): Σ requests.cpu <= requiredCpu, Σ requests.memory <= requiredMemory,
  # Σ limits.cpu <= limitedCpu, Σ limits.memory <= limitedMemory.
  # Running containers (GPU mode, SPEACHES_GPU=true):
  #   container          req cpu / mem      lim cpu / mem
  #   speaches (gpu)     500m / 6Gi         4000m / 18Gi
  #   llm-init           100m / 128Mi       500m  / 1Gi
  #   nginx ingress      10m  / 64Mi        100m  / 256Mi
  #   terminal nginx     5m   / 100Mi       50m   / 100Mi
  #   terminal apiserver 5m   / 100Mi       50m   / 512Mi
  #   --------------------------------------------------------
  #   Σ                  620m / ~6.39Gi     4700m / ~19.85Gi
  - mode: nvidia
    requiredCpu: 700m
    limitedCpu: 5000m
    requiredMemory: 6.5Gi
    limitedMemory: 21Gi
    requiredDisk: 2Gi
    limitedDisk: 100Gi
    requiredGPUMemory: 8Gi
    limitedGPUMemory: 16Gi
  # GB10/Spark (arm64) unified memory: there are no GPU-memory fields; GPU
  # memory is carved from requiredMemory (HAMi gpumem == requiredMemory on
  # Spark). The nvidia mode needs 8Gi GPU, so requiredMemory is 12Gi here
  # (>= 8Gi GPU + inference/process headroom); 6.5Gi would OOM the STT/TTS model.
  - mode: nvidia-gb10
    requiredCpu: 700m
    limitedCpu: 5000m
    requiredMemory: 12Gi
    limitedMemory: 21Gi
    requiredDisk: 2Gi
    limitedDisk: 100Gi
  # CPU mode: the manifest is validated against the SAME rendered container
  # resources as nvidia (the default render uses SPEACHES_GPU=true -> the GPU
  # branch, 4000m/18Gi lim, 500m/6Gi req), so this mode's CPU/RAM ceilings must
  # match nvidia. Only the GPU-memory fields are dropped. When SPEACHES_GPU=false
  # the speaches container is smaller (4000m/12Gi lim, 500m/4Gi req) and still fits.
  - mode: cpu
    requiredCpu: 700m
    limitedCpu: 5000m
    requiredMemory: 6.5Gi
    limitedMemory: 21Gi
    requiredDisk: 2Gi
    limitedDisk: 100Gi
  supportArch:
    - amd64
    - arm64
options:
  shared: true
  apiTimeout: 0
  onlyAdmin: true
  conflicts:
    - name: speaches
      type: application
  allowedOutboundPorts:
    - 80
    - 443
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
envs:
  - envName: SPEACHES_GPU
    required: false
    applyOnChange: true
    type: bool
    editable: true
    default: "true"
    description: "GPU acceleration enabled by default. Set to 'false' for CPU-only mode if you don't have an NVIDIA GPU."
  - envName: SPEACHES_WHISPER_MODEL
    required: false
    applyOnChange: true
    type: string
    editable: true
    default: "Systran/faster-whisper-small"
    description: "Whisper STT model for the whisper-1 alias. Default: Systran/faster-whisper-small (pre-installed). To use a larger model, download it via Terminal first, then set this to e.g. Systran/faster-whisper-large-v3."
  - envName: CHAT_COMPLETION_BASE_URL
    required: false
    applyOnChange: true
    type: string
    editable: true
    default: ""
    description: "OpenAI-compatible LLM API base URL for the Audio Chat tab (must end with /v1). Leave empty to use the cluster default; set a custom URL to use your own LLM provider. Not needed for Speech-to-Text / Text-to-Speech."
  # Hugging Face mirror / token: system-sourced, NOT install-dialog fields.
  # v3 forbids referencing OLARES_USER_* names inside chart template files; the
  # sanctioned pattern declares app-local names here and pulls the system value
  # in via valueFrom. Templates reference .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE / .HF_TOKEN.
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
