# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas.deployments in OlaresManifest).
#   speachesv3         — speaches engine Deployment (== appid / Release.Name)
#   speachesdownloader — llm-init download-only model fetcher
#   speachesingress    — nginx entrance proxy (UI / Terminal / API)
#   terminal           — model-management terminal
workloads:
  terminal:
    replicaCount: 1
  speachesingress:
    replicaCount: 1
  speachesdownloader:
    replicaCount: 1
  speachesv3:
    replicaCount: 1
