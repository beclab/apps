metadata:
  title: EmbeddingGemma (Ollama)
  description: 谷歌 300M 参数向量模型，用于检索、语义相似度等任务。
spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型概览 ##
    EmbeddingGemma 是谷歌基于 Gemma 3 的 300M 参数嵌入模型，用于搜索、检索、分类、聚类和语义相似度。在 100+ 语言、3200+ 亿 token 上训练，适合端侧与 CPU 部署。
  upgradeDescription: |
    升级 Ollama 至 0.20.3，代理升级至 v0.1.18-fix1。
