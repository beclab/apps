---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: ollamaembeddinggemmav2
  icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3.png
  description: Google's 300M parameter embedding model for search, retrieval, and semantic similarity.
  appid: ollamaembeddinggemmav2
  title: EmbeddingGemma (Ollama)
  version: '1.0.2'
  categories:
    - AI
sharedEntrances:
  - name: ollamaembeddinggemmav2
    host: sharedentrances-api
    port: 0
    title: EmbeddingGemma
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: EmbeddingGemma
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3.png
    openMethod: window
    authLevel: internal

spec:
  versionName: 'embeddinggemma'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    EmbeddingGemma is a 300M parameter embedding model from Google built on Gemma 3 technology. It produces vector representations of text for search, retrieval, classification, clustering, and semantic similarity tasks. Trained on 320+ billion tokens across 100+ languages, optimized for on-device and CPU deployment.

  upgradeDescription: |
    Upgrade Ollama to 0.20.3 and proxy to v0.1.18-fix1.

  developer: Google
  website: https://ai.google.dev/
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma License
      url: https://ollama.com/library/embeddinggemma

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6200m
  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 500Gi
  limitedMemory: 20Gi
  requiredMemory: 4200Mi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamaembeddinggemmav2server
    shared: true
  - name: ollamaembeddinggemmav2
permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamaembeddinggemmav2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamaembeddinggemmav2
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: KEEP_ALIVE
    required: false
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
{{- end }}
