---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: chatterboxtts
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatterboxtts
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: chatterboxtts
    spec:
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: chatterboxtts
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: chatterboxtts-config
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "12288"
            limits:
              cpu: "4"
              memory: 12Gi
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "12288"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: huggingface
              mountPath: /data/huggingface
            - name: torch
              mountPath: /data/torch
            - name: reference-voices
              mountPath: /data/reference-voices
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: huggingface
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/huggingface"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/huggingface"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/huggingface"
            {{- end }}
            type: DirectoryOrCreate
        - name: torch
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/torch"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/torch"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/torch"
            {{- end }}
            type: DirectoryOrCreate
        - name: reference-voices
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: "{{ .Values.userspace.appData }}/reference-voices"
              {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/reference-voices"
              {{- end }}
            {{- else }}
            path: "{{ .Values.userspace.appData }}/{{ .Release.Name }}/reference-voices"
            {{- end }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: chatterboxtts-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: chatterboxtts
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
