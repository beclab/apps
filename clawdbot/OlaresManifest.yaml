  - zh-CN
  doc: https://docs.openclaw.ai/start/getting-started
  license:
  - text: MIT
    url: https://github.com/openclaw/openclaw#MIT-1-ov-file
  requiredMemory: 1.5Gi
  limitedMemory: 8.5Gi
  requiredDisk: 50Mi
  limitedDisk: 10Gi
  requiredCpu: 1.5
