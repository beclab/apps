  appCache: true
  userData:
  - Home
  externalData: true
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
- envName: ALLOW_HOME_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow OpenClaw to access Home directory on Olares"
- envName: ALLOW_EXTERNAL_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow OpenClaw to access External directory on Olares"
- envName: GOG_KEYRING_PASSWORD
  type: password
  required: false
  applyOnChange: true
  editable: true
  default: "olares"
  description: "Passphrase for the gog CLI keyring. You will need to re-authenticate after changing this value."
