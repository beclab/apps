  fullDescription: |
    **OpenClaw** is a _personal AI assistant_ you run on your own devices.
    It answers you on the channels you already use. It can speak and listen on macOS/iOS/Android, and can render a live Canvas you control. The Gateway is just the control plane — the product is the assistant.

    If you want a personal, single-user assistant that feels local, fast, and always-on, this is it.

    **Tips**
    Gateway Restart
    - `openclaw gateway restart` does NOT work in containerized deployments. Use `restart-gateway` to tear down the running gateway, pick up the latest config, and come back online within ~5 seconds. The same sentinel also short-circuits the post-crash 30-second backoff window.

    Supported channels include: 
    WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, IRC, Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr, Synology Chat, Tlon, Twitch, Zalo, Zalo Personal, WeChat, QQ, WebChat.

    **Highlights**
    - **[Local-first Gateway](https://docs.openclaw.ai/gateway)** — single control plane for sessions, channels, tools, and events.
    - **[Multi-channel inbox](https://docs.openclaw.ai/channels)** — WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, BlueBubbles (iMessage), iMessage (legacy), IRC, Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr, Synology Chat, Tlon, Twitch, Zalo, Zalo Personal, WeChat, QQ, WebChat, macOS, iOS/Android.
    - **[Multi-agent routing](https://docs.openclaw.ai/gateway/configuration)** — route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).
    - **[Voice Wake](https://docs.openclaw.ai/nodes/voicewake) + [Talk Mode](https://docs.openclaw.ai/nodes/talk)** — wake words on macOS/iOS and continuous voice on Android (ElevenLabs + system TTS fallback).
    - **[Live Canvas](https://docs.openclaw.ai/platforms/mac/canvas)** — agent-driven visual workspace with [A2UI](https://docs.openclaw.ai/platforms/mac/canvas#canvas-a2ui).
    - **[First-class tools](https://docs.openclaw.ai/tools)** — browser, canvas, nodes, cron, sessions, and Discord/Slack actions.
    - **[Companion apps](https://docs.openclaw.ai/platforms/macos)** — macOS menu bar app + iOS/Android [nodes](https://docs.openclaw.ai/nodes).
    - **[Onboarding](https://docs.openclaw.ai/start/wizard) + [skills](https://docs.openclaw.ai/tools/skills)** — onboarding-driven setup with bundled/managed/workspace skills.

  upgradeDescription: |
    OpenClaw upgraded to 2026.6.5
    **Highlights**
    - **Channel reply safety was improved**: QQBot now strips model reasoning / thinking scaffolding before native delivery, preventing raw `<thinking>` content from leaking into user-facing channel replies.
    - **MCP tool-result compatibility was strengthened**: MCP outputs such as `resource_link`, `resource`, `audio`, malformed images, and future non-text / non-image blocks are coerced at the materialization boundary, reducing Anthropic 400 errors and preventing poisoned session history.
    - **Anthropic and agent recovery became more reliable**: extended-thinking sessions now recover after prompt-cache expiry or Gateway restarts because stream-start events wait for `message_start`, allowing pre-generation signature errors to trigger the existing retry path.
    - **Search and provider support expanded**: Parallel is now bundled as a `web_search` provider, with `PARALLEL_API_KEY` discovery, guarded endpoint handling, cache-safe session IDs, onboarding picker support, and documentation.
    - **Google Vertex and provider-model resolution were fixed**: Google Vertex ADC users regain static catalog rows and runtime model resolution, while single-provider cooldown recovery, memory adapter checks, model visibility, and catalog metadata are more reliable.
    - **Channels, auth, and plugin state became more durable**: Matrix adds voice-note preflight and thread-aware reads / replies; auth profiles now live in SQLite; official npm plugin install records retain trusted pins; prerelease fallback checks avoid carrying stale integrity values.
    - **Gateway, macOS, and upgrade paths are safer**: macOS node mode no longer silently reconnects away from a healthy direct Gateway session; legacy cron JSON stores migrate during doctor preflight; WhatsApp startup waits are bounded and disabled accounts are torn down on config reload.
    - **Release, CI, and E2E validation were tightened**: the project moved to `YYYY.M.PATCH` monthly patch numbering and strengthened Docker, Playwright, plugin lifecycle, QA Lab, provider, cron, session, sandbox, and Gateway validation boundaries.

    For detailed release notes, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.6.5

