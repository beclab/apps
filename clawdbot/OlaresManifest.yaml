  fullDescription: |
    **OpenClaw** is a _personal AI assistant_ you run on your own devices.
    It answers you on the channels you already use. It can speak and listen on macOS/iOS/Android, and can render a live Canvas you control. The Gateway is just the control plane — the product is the assistant.

    If you want a personal, single-user assistant that feels local, fast, and always-on, this is it.

    **Tips**
    Gateway Restart
    - `openclaw gateway restart` does NOT work in containerized deployments. Use `restart-gateway` to tear down the running gateway, pick up the latest config, and come back online within ~5 seconds. The same sentinel also short-circuits the post-crash 30-second backoff window.

    Supported channels include: 
    WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, IRC, Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr, Synology Chat, Tlon, Twitch, Zalo, Zalo Personal, WeChat, QQ, WebChat.

    **Highlights**
    - **[Local-first Gateway](https://docs.openclaw.ai/gateway)** — single control plane for sessions, channels, tools, and events.
    - **[Multi-channel inbox](https://docs.openclaw.ai/channels)** — WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, BlueBubbles (iMessage), iMessage (legacy), IRC, Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr, Synology Chat, Tlon, Twitch, Zalo, Zalo Personal, WeChat, QQ, WebChat, macOS, iOS/Android.
    - **[Multi-agent routing](https://docs.openclaw.ai/gateway/configuration)** — route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).
    - **[Voice Wake](https://docs.openclaw.ai/nodes/voicewake) + [Talk Mode](https://docs.openclaw.ai/nodes/talk)** — wake words on macOS/iOS and continuous voice on Android (ElevenLabs + system TTS fallback).
    - **[Live Canvas](https://docs.openclaw.ai/platforms/mac/canvas)** — agent-driven visual workspace with [A2UI](https://docs.openclaw.ai/platforms/mac/canvas#canvas-a2ui).
    - **[First-class tools](https://docs.openclaw.ai/tools)** — browser, canvas, nodes, cron, sessions, and Discord/Slack actions.
    - **[Companion apps](https://docs.openclaw.ai/platforms/macos)** — macOS menu bar app + iOS/Android [nodes](https://docs.openclaw.ai/nodes).
    - **[Onboarding](https://docs.openclaw.ai/start/wizard) + [skills](https://docs.openclaw.ai/tools/skills)** — onboarding-driven setup with bundled/managed/workspace skills.

  upgradeDescription: |
    OpenClaw upgraded from 2026.5.28 to 2026.6.1

    **Highlights**
    - **Agent and CLI runtime recovery is more reliable**: Interrupted tool calls, stale session bindings, compaction handoffs, and media delivery retries now recover more cleanly, with better preservation of Codex state, tool results, and session metadata.
    - **Channel and mobile delivery are steadier**: Telegram, WhatsApp, iMessage, Slack, Discord, Microsoft Teams, Google Chat, Google Meet, and iOS realtime Talk received stronger request, retry, login, and message-delivery handling.
    - **Skill Workshop and skill governance were expanded**: The release adds a fuller Skill Workshop guide, Control UI flow, proposal lists, today views, revision handoff, file previews, approval/quarantine/rollback mechanisms, and `skill_workshop` agent-tool support.
    - **Plugin and integration surfaces grew**: Tokenjuice and the GitHub Copilot Agent Runtime were externalized as official install-on-demand plugins, while SecretRef plugin manifests, SQLite-backed plugin install indexes, Workboard orchestration, and hosted iOS push relay support were added or improved.
    - **Provider, model, and media support improved**: MiniMax M3 support was added, Google/Vertex, OpenRouter, Foundry, Copilot Claude 1M, and OpenAI Responses metadata handling was improved, and more timeout boundaries were added for media downloads, OAuth, TTS, music, polling, and local service probes.
    - **Chat and Control UI experience was refined**: Chat sends are preserved during startup and history loading, streaming deltas arrive incrementally, drafts remain local while typing, first-output latency is traced, and composer controls are calmer and more resilient.
    - **Performance and state storage were optimized**: Skills, session metadata, Gateway runtime state, plugin metadata, memory watchers, and store writes now do less repeated work; iMessage monitor state, inbound queues, and plugin install ledgers are moving toward SQLite-backed storage to reduce duplicate filesystem scanning after restarts.
    - **Release, CI, Docker, and E2E validation are more bounded**: Release, plugin install, diagnostics, cross-OS validation, and Docker cleanup paths now cap more logs, response bodies, probes, polling, and child-workflow waits so failures produce bounded diagnostic evidence instead of stalling.

    For detailed release notes, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.6.1

