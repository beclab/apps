  fullDescription: |
    ### Overview
    OpenClaw is your personal AI assistant that runs on your own computer or server, giving you full control over your data and configuration.

    ### Key Features
    Local-first Gateway
    - Single control plane for sessions, channels, tools, and events.

    Multi-channel Inbox
    - Supports WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, Microsoft Teams, Matrix, Zalo, WebChat, macOS, iOS/Android.

    Multi-agent Routing
    - Route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).

    Voice Wake + Talk Mode
    - Always-on speech for macOS/iOS/Android with ElevenLabs support.

    Live Canvas
    - Agent-driven visual workspace with A2UI.

    First-class Tools
    - Browser, canvas, nodes, cron, sessions, and Discord/Slack actions.

    Companion Apps
    - macOS menu bar app + iOS/Android nodes.

    Skills System
    - Wizard-driven setup with bundled/managed/workspace skills.

    Persistent Memory
    - Stores conversation history and context locally as markdown files.
  upgradeDescription: |
    Application upgraded from version 2026.4.5 to 2026.4.9

    Major changes:
    Memory/Dreaming: 
    - Added a grounded REM backfill lane using historical paths, integrating diary commit/reset flows and live short-term promotion, enabling old daily notes to integrate into Dreams and durable memory.

    Control UI/Diary View: 
    - Introduced a structured diary view with timeline navigation, backfill/reset controls, traceable dreaming summaries, and a "Scene" lane with promotion hints.

    Browser Security Hardening: 
    - Re-run blocked-destination safety checks after interaction-driven main-frame navigations to prevent bypassing SSRF quarantine.

    Environment Variable Security: 
    - Block runtime-control and browser-control override env vars from untrusted workspace .envfiles.

    Node Exec Event Sanitization: 
    - Mark remote node execution events as untrusted system events and sanitize command/output text before enqueuing to prevent injection of trusted content.

    Plugin Auth Choice Isolation: 
    - Prevent untrusted workspace plugins from colliding with bundled provider auth-choice IDs during non-interactive onboarding, keeping operator secrets secure.

    Android Pairing Recovery: 
    - Clear stale setup-code auth on new QR scans and bootstrap sessions from fresh pairing, ensuring reliable "scan-once" Android pairing recovery.

    Gateway Startup Optimization: 
    - Wait for Matrix sync readiness before marking startup successful and route fatal Matrix sync stops through channel-level restart handling instead of crashing the gateway.

    Slack Media Fix: 
    - Preserve bearer auth across same-origin files.slack.comredirects so that image attachments load correctly again.

    Reply Run Improvement: 
    - Use the active runtime snapshot for queued reply runs and resolve SecretRefs before preflight helpers touch config.

    For detailed updates, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.4.9

