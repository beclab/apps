  fullDescription: |
    # Overview
    OpenClaw is your personal AI assistant that runs on your own computer or server, giving you full control over your data and configuration.

    # Key Features
    Local-first Gateway
    - Single control plane for sessions, channels, tools, and events.

    Multi-channel Inbox
    - Supports WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, Microsoft Teams, Matrix, Zalo, WebChat, macOS, iOS/Android.

    Multi-agent Routing
    - Route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).

    Voice Wake + Talk Mode
    - Always-on speech for macOS/iOS/Android with ElevenLabs support.

    Live Canvas
    - Agent-driven visual workspace with A2UI.

    First-class Tools
    - Browser, canvas, nodes, cron, sessions, and Discord/Slack actions.

    Companion Apps
    - macOS menu bar app + iOS/Android nodes.

    Skills System
    - Wizard-driven setup with bundled/managed/workspace skills.

    Persistent Memory
    - Stores conversation history and context locally as markdown files.
  upgradeDescription: |
    Application upgraded from version 2026.4.1 to 2026.4.5

    Major changes:
    New Tools & Media Generation:
    - Added built-in video_generateand music_generatetools, supporting media creation through various providers (e.g., xAI, Runway, Google Lyria).
    - Integrated ComfyUI workflow plugin for workflow-based image, video, and music generation.
    
    New Providers & Integrations:
    - Added bundled support for multiple new AI providers and services including Qwen, Fireworks AI, StepFun, MiniMax TTS, and Ollama Web Search.
    - Enhanced Amazon Bedrock support with new Mantle model support and improved credential auto-discovery.
    
    Core Features & Experience:
    - Multilingual Control UI: Added localized UI support for over a dozen languages in the control panel.
    - Experimental "Memory/Dreaming": Introduced short-term recall promotion, multilingual conceptual tagging, and configurable aging controls.
    - Prompt Caching Optimizations: Significantly improved system prompt fingerprint stability for higher cache hit rates and reduced redundancy.
    - Legacy Config Aliases Removed: Cleaned up old config paths (e.g., talk.voiceId). Migration available via openclaw doctor --fix.
    
    Channel & Communication Improvements:
    - Execution Approvals: Added native exec-approval prompts for iOS, Matrix, and other platforms.
    - Numerous Fixes: Applied many stability, media handling, and message formatting fixes for channels like Telegram, Discord, Slack, WhatsApp, and Matrix.
    
    Security & Hardening:
    - Enhanced security in areas like plugin tool allowlists, gateway device-pairing scoping, and preventing environment variable injection pivots.
    - Unified and hardened webhook secret comparison logic across multiple channels (e.g., Synology Chat, Zalo).
    
    Agents & Task Flow:
    - Restored and enhanced the core "Task Flow" substrate with managed child task spawning and durable flow state.
    - Improved Claude CLI integration, including a loopback MCP bridge and more secure runtime environment isolation.

    For detailed updates, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.4.5
