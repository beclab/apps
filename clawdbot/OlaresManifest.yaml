  fullDescription: |
    # Overview
    OpenClaw is your personal AI assistant that runs on your own computer or server, giving you full control over your data and configuration.

    # Key Features
    Local-first Gateway
    - Single control plane for sessions, channels, tools, and events.

    Multi-channel Inbox
    - Supports WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, Microsoft Teams, Matrix, Zalo, WebChat, macOS, iOS/Android.

    Multi-agent Routing
    - Route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).

    Voice Wake + Talk Mode
    - Always-on speech for macOS/iOS/Android with ElevenLabs support.

    Live Canvas
    - Agent-driven visual workspace with A2UI.

    First-class Tools
    - Browser, canvas, nodes, cron, sessions, and Discord/Slack actions.

    Companion Apps
    - macOS menu bar app + iOS/Android nodes.

    Skills System
    - Wizard-driven setup with bundled/managed/workspace skills.

    Persistent Memory
    - Stores conversation history and context locally as markdown files.
  upgradeDescription: |
    Deployment changes: 
    - supports sandbox, allowing OpenClaw to create sandbox containers
    - new terminal, improved connection stability and features

    Application upgraded from version 2026.3.23 to 2026.4.1

    Major changes:
    Breaking - Deprecated Integration Removal: Removed the deprecated qwen-portal-authOAuth integration; users must migrate to Model Studio using --auth-choice modelstudio-api-key.

    Breaking - Configuration Management: Dropped automatic migrations for configs older than two months. Very old legacy keys will now fail validation instead of being silently rewritten on load.
    
    Core Feature - xAI/Grok Integration Enhancement: Moved the bundled xAI provider to the new Responses API, added first-class x_searchsupport, and automatically enables the Grok plugin when web-search is configured, streamlining the setup.
    
    New Provider Support - MiniMax Image Generation: Added an image generation provider for MiniMax's image-01model, supporting both text-to-image and image-to-image editing with aspect ratio control.
    
    Plugin System Enhancement - Tool Approval Hooks: Plugins can now implement an async requireApprovalhook to pause tool execution and prompt the user for approval via the /approvecommand or platform-specific interactions (e.g., Telegram buttons).
    
    Architecture & Runtime - Memory Management: Moved the pre-compaction memory flush plan behind the active memory plugin's contract, allowing memory-core to own flush prompts and target-path policy instead of using hardcoded logic.
    
    Configuration & Deployment - Container Simplification: Simplified Podman container setup around the current rootless user and documented the openclaw --container <name> ...host-CLI workflow.
    
    User Experience - Model Catalog Update: Trimmed the MiniMax model catalog to the M2.7 model only, removing legacy models like M2, M2.1, and M2.5.

    For detailed updates, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.4.1    
