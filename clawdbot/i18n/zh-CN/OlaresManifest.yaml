metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    **OpenClaw** 是一个可以在您自己的设备上运行的 _个人 AI 助手_。
    它会在您常用的聊天渠道中为您答疑解惑。支持在 macOS/iOS/Android 上语音对话，以及实时渲染您可控的 Canvas 画布。Gateway 只是管理和调度面板，真正的产品是您的 AI 助手本身。

    如果您想要一款本地化、响应迅速、始终在线的个人单用户助手，这就是最佳之选。

    **使用提示**
    网关重启
    - `openclaw gateway restart` 在容器化部署中无法正常工作。使用 `restart-gateway` 可终止正在运行的网关，加载最新配置，并在约 5 秒内重新上线。同一哨兵机制还会绕过崩溃后的 30 秒回退窗口。

    支持的渠道包括：
    WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、IRC、Microsoft Teams、Matrix、飞书、LINE、Mattermost、Nextcloud Talk、Nostr、群晖聊天、Tlon、Twitch、Zalo、Zalo Personal、微信、QQ、WebChat。

    **主要亮点**
    - **[本地优先 Gateway](https://docs.openclaw.ai/gateway)** —— 为会话、渠道、工具和事件等提供统一的控制面板
    - **[多渠道统一收件箱](https://docs.openclaw.ai/channels)** —— 集成 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、BlueBubbles（iMessage）、iMessage（旧版）、IRC、Microsoft Teams、Matrix、飞书、LINE、Mattermost、Nextcloud Talk、Nostr、群晖聊天、Tlon、Twitch、Zalo、Zalo Personal、微信、QQ、WebChat、macOS、iOS/Android
    - **[多智能体路由](https://docs.openclaw.ai/gateway/configuration)** —— 支持将不同渠道/账号/联系人分配到不同的智能体（独立会话和工作区）
    - **[语音唤醒](https://docs.openclaw.ai/nodes/voicewake) + [对话模式](https://docs.openclaw.ai/nodes/talk)** —— 支持在 macOS/iOS 上通过唤醒词激活、Android 端持续语音对话（支持 ElevenLabs 及系统 TTS 备用通道）
    - **[实时 Canvas 画布](https://docs.openclaw.ai/platforms/mac/canvas)** —— 智能体可驱动的可视化工作区，支持 [A2UI](https://docs.openclaw.ai/platforms/mac/canvas#canvas-a2ui)
    - **[一流工具集](https://docs.openclaw.ai/tools)** —— 集成浏览器、画布、节点、定时任务（cron）、会话管理及 Discord/Slack 操作
    - **[配套应用](https://docs.openclaw.ai/platforms/macos)** —— 覆盖 macOS 菜单栏应用 和 iOS/Android [节点工具](https://docs.openclaw.ai/nodes)
    - **[引导配置](https://docs.openclaw.ai/start/wizard) + [技能体系](https://docs.openclaw.ai/tools/skills)** —— 提供完善的引导流程，内置/可管理/可扩展的技能体系

  upgradeDescription: |
    OpenClaw 已升级至 2026.6.9

    **主要亮点**
    - 更丰富的 Telegram 消息投递：Telegram 现已支持富文本 HTML，保留富文本 Markdown 与贴纸路径，更加真实地渲染进度草稿和命令输出，安全地规范化 HTML 表格，保持提及和异步处理程序在正确路径上投递。 (#93286, #93164, #93124, #93364, #93130, #93088, #93281, #94891, #94856) 感谢 @obviyus、@vincentkoc、@goutamadwant、@kesslerio、@NianJiuZst、@SweetSophia、@Marvinthebored、@aaajiao、@zhangqueping 以及 @jairrab 的贡献。
    - 更可靠的智能体恢复：重试、终端处理、压缩后的使用、会话历史修复以及回复一致性机制，现在可让更多中断或部分回合顺利抵达最终完整的结果。 (#92191, #93073, #93228, #93084, #93469, #93291, #90943) 感谢 @ai-hpc、@lml2468、@fuller-stack-dev、@Hollychou924、@leno23、@de1tydev、@425072024、@wuwahe3、@drvoss、@yetval、@sandieman2 和 @vincentkoc 的贡献。
    - 更强大的 Codex 集成：Codex 获得了自动插件审批、GPT-5.3 Spark OAuth 路由、远程节点动态工具执行以及更可靠的应用服务端销毁和终端回显。 (#92625, #89133, #93654, #91767, #93287) 感谢 @kevinslin、@VACInc、@vincentkoc、@JPKay-AI 和 @aliahnaf2013-max 的贡献。
    - 独立的官方服务插件：外部服务包现已成为一流的 npm 发布包，外部安装的渠道插件会在 Gateway 启动时自动加载，StepFun 也可通过 npm 与 ClawHub 获得。 (#93470) 感谢 @sunlit-deng、@cxdnicole 和 @vincentkoc 的贡献。
    - 更强大的网页和原生客户端：控制台 UI 新增会话工作区栏与扩展健康监测，iOS 支持 Watch 控制，Android 支持展示聊天上下文。 (#92856, #91952, #93387, #92837) 感谢 @Solvely-Colin、@jalehman、@joshavant 和 @Tosko4 的贡献。
    - 更实用的搜索和技能：Codex Hosted Search 已上线，无需密钥的搜索服务默认保持选择加入，ClawHub 技能安装持续保有已验证的来源信誉。 (#93446, #93616, #93283, #93506) 感谢 @fuller-stack-dev、@davemorin、@momothemage、@nmccready-tars 以及 @vincentkoc 的贡献。

    详细发布说明请参见：https://github.com/openclaw/openclaw/releases/tag/v2026.6.9