metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    # 应用概览
    OpenClaw 是一款运行在您自己电脑或服务器上的个人 AI 助手，让您完全掌控数据和配置。

    # 主要功能
    本地优先网关
    - 统一的会话、频道、工具和事件控制面板。

    多渠道收件箱
    - 支持 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、Microsoft Teams、Matrix、Zalo、WebChat、macOS、iOS/Android。

    多代理路由
    - 将入站频道/账户/对等方路由到隔离的代理（工作区 + 每代理会话）。

    语音唤醒 + 对话模式
    - 支持 macOS/iOS/Android 上的持续语音功能，集成 ElevenLabs。

    实时画布
    - 代理驱动的可视化工作区，支持 A2UI。

    一流的工具
    - 浏览器、画布、节点、定时任务、会话以及 Discord/Slack 操作。

    伴侣应用
    - macOS 菜单栏应用 + iOS/Android 节点。

    技能系统
    - 向导式设置，支持捆绑/托管/工作区技能。

    持久化记忆
    - 以 Markdown 文件形式本地存储对话历史和上下文。
  upgradeDescription: |
    修改部署方式，现在CLI和Gateway部署在不同容器内，保证在Gateway重启时，CLI不会受到影响。
    应用升级从版本 2026.3.1 升级到 2026.3.23

    重要改动：
    Control UI 仪表板重写：推出全新的模块化界面，包含命令面板、移动端优化和增强的聊天工具。
    快速模式统一：为 OpenAI/GPT-5.4 和 Anthropic/Claude 模型引入统一的、可配置的会话级快速模式切换。
    安全基础加固：
     - 设备配对改用短期令牌，不再在配对载荷中嵌入共享凭证。
     - 禁用工作区插件的隐式自动加载，需显式信任才能执行。
    模型插件架构扩展：将 Ollama、vLLM 和 SGLang 集成到新的提供商插件架构中，实现更模块化的核心集成。
    新增 Kubernetes 支持：提供了包含原始清单和部署文档的 Kubernetes 入门安装路径。
    代理控制增强：新增 sessions_yield功能，允许编排器立即结束当前轮次并携带负载到下一轮，提升控制灵活性。

    详细更新内容请参见：https://github.com/openclaw/openclaw/releases/tag/v2026.3.23