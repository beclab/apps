metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    # 应用概览
    OpenClaw 是一款运行在您自己电脑或服务器上的个人 AI 助手，让您完全掌控数据和配置。

    # 主要功能
    本地优先网关
    - 统一的会话、频道、工具和事件控制面板。

    多渠道收件箱
    - 支持 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、Microsoft Teams、Matrix、Zalo、WebChat、macOS、iOS/Android。

    多代理路由
    - 将入站频道/账户/对等方路由到隔离的代理（工作区 + 每代理会话）。

    语音唤醒 + 对话模式
    - 支持 macOS/iOS/Android 上的持续语音功能，集成 ElevenLabs。

    实时画布
    - 代理驱动的可视化工作区，支持 A2UI。

    一流的工具
    - 浏览器、画布、节点、定时任务、会话以及 Discord/Slack 操作。

    伴侣应用
    - macOS 菜单栏应用 + iOS/Android 节点。

    技能系统
    - 向导式设置，支持捆绑/托管/工作区技能。

    持久化记忆
    - 以 Markdown 文件形式本地存储对话历史和上下文。
  upgradeDescription: |
    应用升级：从版本 2026.4.1 升级到 2026.4.5
    
    重要改动：
    新工具与媒体生成：
    - 新增内置 video_generate（视频生成）和 music_generate（音乐生成）工具，支持通过多种提供商（如xAI、Runway、Google Lyria）创建媒体内容。
    - 集成 ComfyUI 工作流插件，支持基于工作流的图像、视频和音乐生成。
    
    新提供商与集成：
    - 新增捆绑支持 Qwen、Fireworks AI、StepFun、MiniMax TTS、Ollama Web Search 等多个AI模型和服务提供商。
    - 增强 Amazon Bedrock 支持，新增 Mantle 模型支持，并改进凭证自动发现。
    
    核心功能与体验：
    - 控制UI多语言化：为控制面板新增十多种语言界面支持。
    - 实验性“记忆/梦境”功能：引入短期记忆提升、多语言概念标记和可配置的回忆衰减控制。
    - 提示缓存优化：大幅改进系统提示指纹的稳定性，提高缓存命中率，减少冗余。
    - 移除旧版配置别名：清理了如 talk.voiceId等旧配置路径，需通过 openclaw doctor --fix迁移。
    
    渠道与通信改进：
    - 执行批准：为 iOS、Matrix 等平台新增了原生执行批准通知功能。
    - 多项修复：针对 Telegram、Discord、Slack、WhatsApp、Matrix 等渠道进行了大量稳定性、媒体处理和消息格式修复。
    
    安全性与加固：
    - 增强插件工具允许列表、网关设备配对范围控制、防止环境变量注入攻击等多处安全措施。
    - 统一并加固了多个渠道（如Synology Chat、Zalo）的Webhook令牌比较逻辑。
    
    代理与任务流：
    - 恢复并增强了核心“任务流”基础功能，支持托管子任务生成和持久化流程状态。
    - Claude CLI 集成改进，包括环回MCP桥接和更安全的运行时环境隔离。

    详细更新内容请参见：https://github.com/openclaw/openclaw/releases/tag/v2026.4.5