metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    ### 应用概览
    OpenClaw 是一款运行在您自己电脑或服务器上的个人 AI 助手，让您完全掌控数据和配置。

    ### 主要功能
    本地优先网关
    - 统一的会话、频道、工具和事件控制面板。

    多渠道收件箱
    - 支持 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、Microsoft Teams、Matrix、Zalo、WebChat、macOS、iOS/Android。

    多代理路由
    - 将入站频道/账户/对等方路由到隔离的代理（工作区 + 每代理会话）。

    语音唤醒 + 对话模式
    - 支持 macOS/iOS/Android 上的持续语音功能，集成 ElevenLabs。

    实时画布
    - 代理驱动的可视化工作区，支持 A2UI。

    一流的工具
    - 浏览器、画布、节点、定时任务、会话以及 Discord/Slack 操作。

    伴侣应用
    - macOS 菜单栏应用 + iOS/Android 节点。

    技能系统
    - 向导式设置，支持捆绑/托管/工作区技能。

    持久化记忆
    - 以 Markdown 文件形式本地存储对话历史和上下文。
  upgradeDescription: |
    应用升级：从版本 2026.4.5 升级到 2026.4.9
    
    重要改动：
    内存/梦境系统：
    - 新增基于历史路径的REM回填通道，集成日记提交/重置流程与实时短期记忆提升，使旧日记能融入梦境和长期记忆。
    
    控制UI/日记视图：
    - 新增结构化日记视图，支持时间线导航、回填控制、可追溯的梦境摘要，以及带提升提示的“场景”通道。

    浏览器安全加固：
    - 在交互驱动的主框架导航后重新执行安全目标检查，防止绕过SSRF隔离。

    环境变量安全限制：
    - 阻止不受信任的工作区 .env文件设置运行时控制、浏览器控制覆盖等敏感环境变量。

    节点执行事件清理：
    - 将远程节点执行事件标记为不可信系统事件，并在入队前清理其命令/输出文本，防止注入恶意内容。

    插件授权选择隔离：
    - 防止不受信任的工作区插件在非交互式配置期间与捆绑提供商的授权ID冲突，保护操作员密钥。

    Android配对恢复：
    - 清理过期的设置代码认证，从全新配对启动会话，确保“扫描一次”的Android配对能可靠恢复。

    网关启动流程优化：
    - 等待Matrix同步就绪后再标记启动成功，并将致命的Matrix同步停止交由通道级重启处理，避免整个网关崩溃。

    Slack媒体处理修复：
    - 在同域 files.slack.com重定向时保留Bearer认证，确保图片附件能正常加载。

    回复运行机制改进：
    - 为排队的回复运行使用活动运行时快照，并在预检助手触及配置前解析密钥引用。

    详细更新内容请参见：https://github.com/openclaw/openclaw/releases/tag/v2026.4.9