metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    # 应用概览
    OpenClaw 是一款运行在您自己电脑或服务器上的个人 AI 助手，让您完全掌控数据和配置。

    # 主要功能
    本地优先网关
    - 统一的会话、频道、工具和事件控制面板。

    多渠道收件箱
    - 支持 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、Microsoft Teams、Matrix、Zalo、WebChat、macOS、iOS/Android。

    多代理路由
    - 将入站频道/账户/对等方路由到隔离的代理（工作区 + 每代理会话）。

    语音唤醒 + 对话模式
    - 支持 macOS/iOS/Android 上的持续语音功能，集成 ElevenLabs。

    实时画布
    - 代理驱动的可视化工作区，支持 A2UI。

    一流的工具
    - 浏览器、画布、节点、定时任务、会话以及 Discord/Slack 操作。

    伴侣应用
    - macOS 菜单栏应用 + iOS/Android 节点。

    技能系统
    - 向导式设置，支持捆绑/托管/工作区技能。

    持久化记忆
    - 以 Markdown 文件形式本地存储对话历史和上下文。
  upgradeDescription: |
    部署修改：
    - 支持沙盒，允许 OpenClaw 创建沙盒容器。
    - 新的终端，改进连接稳定性和功能。
    应用升级：从版本 2026.3.23 升级到 2026.4.1

    重要改动：
    重大变更 - 移除旧版集成：移除了已弃用的 qwen-portal-authOAuth 集成，用户需迁移至 Model Studio 并使用 --auth-choice modelstudio-api-key进行身份验证。

    重大变更 - 配置管理：不再自动迁移超过两个月前的旧配置，非常古老的遗留配置键现在会直接导致验证失败，而不是在加载时被重写。
    
    核心功能 - xAI/Grok 集成增强：将内置的 xAI 提供商切换至新的 Responses API，并原生集成 x_search功能。现在，配置了网页搜索后，Grok 插件会自动启用，无需手动切换。
    
    新提供商支持 - MiniMax 图像生成：新增了对 MiniMax image-01模型的支持，可用于文生图和图生图编辑，并支持控制宽高比。
    
    插件系统增强 - 工具执行审批：插件现在可以通过新的 async requireApproval钩子，在执行工具前暂停并请求用户批准。用户可通过 /approve命令或各平台（如Telegram、Discord）的交互界面进行审批。
    
    架构与运行时 - 内存管理：将内存压缩前的刷新逻辑移至活动内存插件中，使内存核心仅负责刷新提示和目标路径策略，不再硬编码核心逻辑。
    
    配置与部署 - 容器简化：简化了 Podman 容器的设置流程，围绕当前的无根用户进行配置，并更新了文档以推荐使用 openclaw --container <name> ...的主机CLI工作流。
    
    用户体验 - 模型目录更新：精简了 MiniMax 的模型目录，仅保留最新的 M2.7 模型，移除了旧版的 M2、M2.1 等模型。

    详细更新内容请参见：https://github.com/openclaw/openclaw/releases/tag/v2026.4.1