metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    # 应用概览
    OpenClaw 是一款运行在您自己电脑或服务器上的个人 AI 助手，让您完全掌控数据和配置。

    # 主要功能
    本地优先网关
    - 统一的会话、频道、工具和事件控制面板。

    多渠道收件箱
    - 支持 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、Microsoft Teams、Matrix、Zalo、WebChat、macOS、iOS/Android。

    多代理路由
    - 将入站频道/账户/对等方路由到隔离的代理（工作区 + 每代理会话）。

    语音唤醒 + 对话模式
    - 支持 macOS/iOS/Android 上的持续语音功能，集成 ElevenLabs。

    实时画布
    - 代理驱动的可视化工作区，支持 A2UI。

    一流的工具
    - 浏览器、画布、节点、定时任务、会话以及 Discord/Slack 操作。

    伴侣应用
    - macOS 菜单栏应用 + iOS/Android 节点。

    技能系统
    - 向导式设置，支持捆绑/托管/工作区技能。

    持久化记忆
    - 以 Markdown 文件形式本地存储对话历史和上下文。
  upgradeDescription: |
    升级至版本 2026.3.1

    重要说明：
    如果您是从 2026.2.25 之前的版本升级，请参阅以下文档，以解决升级后控制界面无法启动的问题。
    https://docs.olares.com/use-cases/openclaw.html#upgrade-notes

    新功能与更新
    AI模型默认：将Antropic Claude 4.6系列模型的默认思考等级设置为自适应。
    容器健康检查：为 Docker/Kubernetes 探针新增内置 HTTP 接口（/health, /ready 等）。
    Android 节点扩展：新增节点命令（camera.list、device.permissions/health、notifications.actions）及工具操作。
    Discord 话题线程生命周期：将固定生命周期（TTL）替换为可自定义的空闲时长（idleHours）和线程会话最大存活时间控制。
    Telegram 私聊话题：支持为每个私聊配置主题，并可细粒度路由会话。
    UI & 工具：Web UI 增加德语支持，集成新的 diffsplugin 工具以渲染差异视图，并改进了 Cron 页的国际化。

    重点修复与改进
    平台与可靠性：修复 Windows 下插件安装问题（spawn EINVAL）、LINE 语音消息转录，以及 Android 节点在相机和通知上的稳定性。
    渠道专项修复：
    飞书：提升了回复/多媒体处理、多账号路由、富文本解析、API 配额控制和系统提示泄漏防护。
    Slack：修复目标账号公告路由及原生指令注册。
    Telegram：提升出站消息分段发送与语音回传能力。
    智能体与网关：增强 OpenAI/Codex WebSocket 流式传输、子智能体补全事件、故障转移错误分类与网关连接洪泛管控。
    定时与投递：新增低上下文自动化运行模式，修正 UI 中投递模式设置。
    配置与命令行：全新 openclaw 配置文件命令，并修正密钥/认证配置处理。

    安全更新
    飞书 Webhook 防护：上线速率限制，防止未认证 Webhook 请求导致内存无限增长。

    完整发布说明详见：https://github.com/openclaw/openclaw/releases/tag/v2026.2.26
