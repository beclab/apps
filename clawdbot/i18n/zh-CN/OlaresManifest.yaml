metadata:
  title: OpenClaw
  description: 支持多渠道收件箱的个人 AI 助手

spec:
  fullDescription: |
    **概述**
    **OpenClaw** 是一个可以在您自己的设备上运行的 _个人 AI 助手_。
    它会在您常用的聊天渠道中为您答疑解惑。支持在 macOS/iOS/Android 上语音对话，以及实时渲染您可控的 Canvas 画布。Gateway 只是管理和调度面板，真正的产品是您的 AI 助手本身。

    如果您想要一款本地化、响应迅速、始终在线的个人单用户助手，这就是最佳之选。

    支持的渠道包括：WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、iMessage、BlueBubbles、IRC、Microsoft Teams、Matrix、飞书、LINE、Mattermost、Nextcloud Talk、Nostr、群晖聊天、Tlon、Twitch、Zalo、Zalo Personal、微信、QQ、WebChat。

    **主要亮点**

    - **[本地优先 Gateway](https://docs.openclaw.ai/gateway)** —— 为会话、渠道、工具和事件等提供统一的控制面板
    - **[多渠道统一收件箱](https://docs.openclaw.ai/channels)** —— 集成 WhatsApp、Telegram、Slack、Discord、Google Chat、Signal、BlueBubbles（iMessage）、iMessage（旧版）、IRC、Microsoft Teams、Matrix、飞书、LINE、Mattermost、Nextcloud Talk、Nostr、群晖聊天、Tlon、Twitch、Zalo、Zalo Personal、微信、QQ、WebChat、macOS、iOS/Android
    - **[多智能体路由](https://docs.openclaw.ai/gateway/configuration)** —— 支持将不同渠道/账号/联系人分配到不同的智能体（独立会话和工作区）
    - **[语音唤醒](https://docs.openclaw.ai/nodes/voicewake) + [对话模式](https://docs.openclaw.ai/nodes/talk)** —— 支持在 macOS/iOS 上通过唤醒词激活、Android 端持续语音对话（支持 ElevenLabs 及系统 TTS 备用通道）
    - **[实时 Canvas 画布](https://docs.openclaw.ai/platforms/mac/canvas)** —— 智能体可驱动的可视化工作区，支持 [A2UI](https://docs.openclaw.ai/platforms/mac/canvas#canvas-a2ui)
    - **[一流工具集](https://docs.openclaw.ai/tools)** —— 集成浏览器、画布、节点、定时任务（cron）、会话管理及 Discord/Slack 操作
    - **[配套应用](https://docs.openclaw.ai/platforms/macos)** —— 覆盖 macOS 菜单栏应用 和 iOS/Android [节点工具](https://docs.openclaw.ai/nodes)
    - **[引导配置](https://docs.openclaw.ai/start/wizard) + [技能体系](https://docs.openclaw.ai/tools/skills)** —— 提供完善的引导流程，内置/可管理/可扩展的技能体系

  upgradeDescription: |
    OpenClaw 已从 2026.4.9 版本升级至 2026.4.21

    主要更新内容:
    - 新增 Active Memory 插件（v2026.4.12）：全新可选的 Active Memory 子代理插件会在每次回复前自动检索相关偏好与历史上下文，无需手动记忆命令。
    - 集成 LM Studio 本地模型提供商（v2026.4.12）：内置 LM Studio 支持上手引导、运行时模型发现、流式预加载、本地/自托管 OpenAI 兼容模型嵌入检索。
    - 集成原生 OpenAI Codex 提供商（v2026.4.12）：将 codex/gpt-* 模型统一由 Codex 验权、本地线程和压缩模块接管，与常规 openai/gpt-* 路径隔离。
    - Anthropic 默认升级为 Claude Opus 4.7（v2026.4.15）：所有 Anthropic 相关、opus 别名与 Claude CLI 默认均已升级至 Opus 4.7。
    - 支持 Google Gemini 文本转语音（v2026.4.15）：Gemini TTS 加入集成 google 插件，支持语音选择、WAV 格式回复及 PCM 通话输出。
    - Moonshot/Kimi 默认升级为 kimi-k2.6（v2026.4.20）：Moonshot 网络搜索和多媒体理解界面现以 kimi-k2.6 为默认，kimi-k2.5 作为兼容保留。
    - Mattermost 实时草稿预览（v2026.4.20）：思考中、工具处理中及部分文本会合并为单一草稿流式推送，处理完成后自动定稿。
    - OpenAI 图片生成功能默认用 gpt-image-2（v2026.4.21）：集成图片生成及媒体测试现以 gpt-image-2 为默认，并在文档/元数据中展示 2K/4K 分辨率选项。
    - 安全性修复：所有权命令身份强制（v2026.4.21）：修复当 enforceOwnerForCommands=true 且 commands.ownerAllowFrom 未设置时，非所有者通过宽松判断访问所有者命令的权限提升问题。
    - 会话维护及 OOM 预防（v2026.4.20）：默认启用内置会话数量与时效上限，加载时超大存储会被裁剪，防止会话积压导致内存溢出。

    详细更新内容请参见：https://github.com/openclaw/openclaw/releases/tag/v2026.4.21