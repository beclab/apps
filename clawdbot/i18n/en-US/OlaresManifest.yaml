metadata:
  title: OpenClaw
  description: Personal AI Assistant with Multi-channel Inbox Support
spec:
  fullDescription: |
    # Overview
    OpenClaw is your personal AI assistant that runs on your own computer or server, giving you full control over your data and configuration.

    # Key Features
    Local-first Gateway
    - Single control plane for sessions, channels, tools, and events.

    Multi-channel Inbox
    - Supports WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, Microsoft Teams, Matrix, Zalo, WebChat, macOS, iOS/Android.

    Multi-agent Routing
    - Route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).

    Voice Wake + Talk Mode
    - Always-on speech for macOS/iOS/Android with ElevenLabs support.

    Live Canvas
    - Agent-driven visual workspace with A2UI.

    First-class Tools
    - Browser, canvas, nodes, cron, sessions, and Discord/Slack actions.

    Companion Apps
    - macOS menu bar app + iOS/Android nodes.

    Skills System
    - Wizard-driven setup with bundled/managed/workspace skills.

    Persistent Memory
    - Stores conversation history and context locally as markdown files.
  upgradeDescription: |
    upgrade to version 2026.3.1
    
    Important:
    If you upgraded from a version earlier than 2026.2.25, please refer to the following documentation to resolve any issues where the Control UI fails to start after the upgrade.
    https://docs.olares.com/use-cases/openclaw.html#upgrade-notes

    New Features & Updates
    AI Model Defaults: Set the default thinking level to adaptivefor Anthropic Claude 4.6 models.
    Container Health Checks: Added built-in HTTP endpoints (/health, /ready, etc.) for Docker/Kubernetes probes.
    Android Node Expansion: Added new node commands (camera.list, device.permissions/health, notifications.actions) and tool actions.
    Discord Thread Lifecycle: Replaced fixed TTL with configurable idle time (idleHours) and max age controls for thread-bound sessions.
    Telegram DM Topics: Added per-direct-message topic configuration and routing for finer-grained session control.
    UI & Tools: Added German locale support to the Web UI, introduced a new diffsplugin tool for rendering diffs, and improved Web UI Cron page i18n.
    
    Key Fixes & Improvements
    Platform & Reliability: Fixed plugin install issues on Windows (spawn EINVAL), LINE voice message transcription, and Android node reliability for camera and notifications.
    Channel-Specific Fixes:
    Feishu: Major improvements for reply/media handling, multi-account routing, rich-text parsing, API quota controls, and system prompt leakage.
    Slack: Fixed announce target account routing and native command registration.
    Telegram: Improved outbound message chunking and voice fallback behavior.
    Agents & Gateway: Enhanced OpenAI/Codex WebSocket streaming, subagent completion events, failover error classification, and gateway connection flood control.
    Cron & Delivery: Added a lightweight context mode for automation runs and fixed delivery mode settings in the UI.
    Configuration & CLI: New openclaw config filecommand and fixes for secrets/auth profile handling.
    
    Security Updates
    Feishu Webhook Protection: Added rate-limit state bounding to prevent unbounded memory growth from unauthenticated webhook requests.

    Full release note at: https://github.com/openclaw/openclaw/releases/tag/v2026.3.1