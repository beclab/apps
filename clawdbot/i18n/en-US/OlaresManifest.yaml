metadata:
  title: OpenClaw
  description: Personal AI Assistant with Multi-channel Inbox Support
spec:
  fullDescription: |
    # Overview
    OpenClaw is your personal AI assistant that runs on your own computer or server, giving you full control over your data and configuration.

    # Key Features
    Local-first Gateway
    - Single control plane for sessions, channels, tools, and events.

    Multi-channel Inbox
    - Supports WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, Microsoft Teams, Matrix, Zalo, WebChat, macOS, iOS/Android.

    Multi-agent Routing
    - Route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).

    Voice Wake + Talk Mode
    - Always-on speech for macOS/iOS/Android with ElevenLabs support.

    Live Canvas
    - Agent-driven visual workspace with A2UI.

    First-class Tools
    - Browser, canvas, nodes, cron, sessions, and Discord/Slack actions.

    Companion Apps
    - macOS menu bar app + iOS/Android nodes.

    Skills System
    - Wizard-driven setup with bundled/managed/workspace skills.

    Persistent Memory
    - Stores conversation history and context locally as markdown files.
  upgradeDescription: |
    Deployment changes: The CLI and Gateway are now deployed in separate containers, ensuring that the CLI remains unaffected when the Gateway restarts.
    
    Application upgraded from version 2026.3.1 to 2026.3.23

    Major changes:
    Control UI/Dashboard Rewrite: Introduced a new modular interface with a command palette, mobile optimization, and enhanced chat tools.
    Unified Fast Mode: Added configurable session-level fast toggles for both OpenAI/GPT-5.4 and Anthropic/Claude models.
    Core Security Hardening:
    - Device pairing switched to short-lived bootstrap tokens, removing embedded shared credentials.
    - Disabled implicit auto-loading of workspace plugins, requiring explicit trust for execution.
    Provider Plugin Architecture Expansion: Migrated Ollama, vLLM, and SGLang to the new provider-plugin architecture for more modular core wiring.
    New Kubernetes Support: Added a starter installation path for Kubernetes with raw manifests and deployment docs.
    Enhanced Agent Control: Introduced sessions_yieldfunction, allowing orchestrators to immediately end the current turn and carry a payload to the next.

    For detailed updates, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.3.23    