metadata:
  title: OpenClaw
  description: Personal AI Assistant with Multi-channel Inbox Support
spec:
  fullDescription: |
    **Overview**
    **OpenClaw** is a _personal AI assistant_ you run on your own devices.
    It answers you on the channels you already use. It can speak and listen on macOS/iOS/Android, and can render a live Canvas you control. The Gateway is just the control plane — the product is the assistant.

    If you want a personal, single-user assistant that feels local, fast, and always-on, this is it.

    Supported channels include: WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, iMessage, BlueBubbles, IRC, Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr, Synology Chat, Tlon, Twitch, Zalo, Zalo Personal, WeChat, QQ, WebChat.


    **Highlights**

    - **[Local-first Gateway](https://docs.openclaw.ai/gateway)** — single control plane for sessions, channels, tools, and events.
    - **[Multi-channel inbox](https://docs.openclaw.ai/channels)** — WhatsApp, Telegram, Slack, Discord, Google Chat, Signal, BlueBubbles (iMessage), iMessage (legacy), IRC, Microsoft Teams, Matrix, Feishu, LINE, Mattermost, Nextcloud Talk, Nostr, Synology Chat, Tlon, Twitch, Zalo, Zalo Personal, WeChat, QQ, WebChat, macOS, iOS/Android.
    - **[Multi-agent routing](https://docs.openclaw.ai/gateway/configuration)** — route inbound channels/accounts/peers to isolated agents (workspaces + per-agent sessions).
    - **[Voice Wake](https://docs.openclaw.ai/nodes/voicewake) + [Talk Mode](https://docs.openclaw.ai/nodes/talk)** — wake words on macOS/iOS and continuous voice on Android (ElevenLabs + system TTS fallback).
    - **[Live Canvas](https://docs.openclaw.ai/platforms/mac/canvas)** — agent-driven visual workspace with [A2UI](https://docs.openclaw.ai/platforms/mac/canvas#canvas-a2ui).
    - **[First-class tools](https://docs.openclaw.ai/tools)** — browser, canvas, nodes, cron, sessions, and Discord/Slack actions.
    - **[Companion apps](https://docs.openclaw.ai/platforms/macos)** — macOS menu bar app + iOS/Android [nodes](https://docs.openclaw.ai/nodes).
    - **[Onboarding](https://docs.openclaw.ai/start/wizard) + [skills](https://docs.openclaw.ai/tools/skills)** — onboarding-driven setup with bundled/managed/workspace skills.

  upgradeDescription: |
    OpenClaw upgraded from version 2026.4.9 to 2026.4.21

    Major changes:
    - Active Memory Plugin Added (v2026.4.12): A new optional Active Memory sub-agent plugin automatically retrieves relevant preferences and past context before each reply, eliminating the need for manual memory commands.
    - LM Studio Local Model Provider (v2026.4.12): A bundled LM Studio provider enables onboarding, runtime model discovery, stream preload, and memory-search embeddings for local/self-hosted OpenAI-compatible models.
    - Native OpenAI Codex Provider (v2026.4.12): A bundled Codex provider routes codex/gpt-* models through Codex-managed auth, native threads, and compaction, keeping them separate from the standard openai/gpt-* path.
    - Anthropic Default Upgraded to Claude Opus 4.7 (v2026.4.15): All Anthropic selections, opus aliases, and Claude CLI defaults are updated to Claude Opus 4.7.
    - Google Gemini Text-to-Speech Support (v2026.4.15): Gemini TTS is added to the bundled google plugin, with voice selection, WAV reply output, and PCM telephony output.
    - Moonshot/Kimi Default Upgraded to kimi-k2.6 (v2026.4.20): Bundled Moonshot web search and media-understanding surfaces now default to kimi-k2.6, while kimi-k2.5 remains available for compatibility.
    - Mattermost Streaming Draft Preview (v2026.4.20): Thinking activity, tool activity, and partial reply text are streamed into a single draft preview post that finalizes in place when safe.
    - OpenAI Image Generation Defaults to gpt-image-2 (v2026.4.21): The bundled image-generation provider and live media smoke tests now default to gpt-image-2, with 2K/4K size hints advertised in docs and tool metadata.
    - Security Fix: Owner Command Identity Enforcement (v2026.4.21): Fixed a privilege escalation where non-owner senders could reach owner-only commands through a permissive fallback when enforceOwnerForCommands=true and commands.ownerAllowFrom is unset.
    - Session Maintenance & OOM Prevention (v2026.4.20): Built-in session entry cap and age pruning are enforced by default, and oversized stores are pruned at load time to prevent cron/executor session backlogs from causing gateway out-of-memory errors.

    For detailed updates, please see: https://github.com/openclaw/openclaw/releases/tag/v2026.4.21