olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: nemoclaw
  icon: https://app.cdn.olares.com/appstore/nemoclaw/icon.png
  description: NVIDIA NemoClaw - AI Coding Agent with Sandbox Isolation
  appid: nemoclaw
  title: NemoClaw
  version: 1.0.6
  categories:
  - Developer Tools
  - Productivity_v112
entrances:
# The Terminal entrance goes through the nemoclawweuiingress nginx gate on
# :8081 (NOT directly to the terminal Service). The gate runs a tiny Lua
# readiness probe against nemoclaw:18789/_probe; while `.nemoclaw-cli-ready`
# is absent it proxies to install-ui.py (install-progress HTML), and only
# falls through to the real terminal Service once openclaw CLI is usable
# inside the sandbox. This prevents users from landing on a bash shell
# where `openclaw` / `nemoclaw` are still not installed.
- name: terminal
  port: 8081
  host: nemoclawweuiingress
  title: NemoClaw CLI
  icon: https://app.cdn.olares.com/appstore/nemoclaw/icon.png
  openMethod: window
  authLevel: internal
- name: webtui
  host: nemoclawweuiingress
  port: 8080
  icon: https://app.cdn.olares.com/appstore/nemoclaw/icon.png
  title: OpenClaw Web UI
  openMethod: window
  authLevel: internal
spec:
  versionName: '0.0.36'
  fullDescription: |
    # Overview
    NemoClaw is NVIDIA's AI coding agent that runs on Kubernetes with Docker-in-Docker
    for secure sandbox isolation. It connects to any OpenAI-compatible LLM endpoint
    (including NVIDIA Dynamo) to provide an autonomous coding assistant.

    Official docs: [NemoClaw](https://docs.nvidia.com/nemoclaw/latest/index.html), [Remote dashboard / CHAT_UI_URL](https://docs.nvidia.com/nemoclaw/latest/deployment/deploy-to-remote-gpu.html#remote-dashboard-access).

    # Entrances
    - **NemoClaw CLI** — Terminal; run `nemoclaw my-assistant connect` then `openclaw tui` (see [Quickstart](https://docs.nvidia.com/nemoclaw/latest/get-started/quickstart.html)).
    - **OpenClaw Web UI** — Service **nemoclaw:18789** → pod **18790**. By default **18790** relays to **127.0.0.1:18789** (workspace OpenClaw once the gateway is up). After **`nemoclaw my-assistant connect`** and OpenClaw inside the sandbox, the chart switches **18790** to relay via the sandbox. Set **CHAT_UI_URL** or rely on Olares **domain.webtui** (entrance **name: webtui**); patches **`allowedOrigins`** and **`gateway.trustedProxies`** (reduces **403** behind HTTPS). Optional **OPENCLAW_TRUSTED_PROXIES** if 403 persists. If the Control UI shows **gateway token missing**, run **`nemoclaw my-assistant gateway-token --quiet`** inside the **nemoclaw** pod (or after Terminal connect) and paste the value into **Control UI → Settings** (or append **`#token=<paste>`** to the dashboard URL if your OpenClaw build supports it).

    # OpenShell gateway
    No separate browser entry — use the Terminal and `openshell status` / `openshell doctor` on the CLI. Port **8080** remains on Service **nemoclaw** for port-forward or internal use.

    # openclaw.json export
    The chart mounts **/openclaw-config** on the workspace container and copies the sandbox **openclaw.json** there about every **10 minutes** (read-only mirror for backup/inspection). On disk this is **`openclaw-config/`** next to **home** and **workspace** under the app’s **app data** volume (same PVC as `userspace.appData`). Edits there are **not** auto-applied into the sandbox; use `docker cp` from the Terminal if you need to push changes back.

    # Web UI (CHAT_UI_URL)
    Per NVIDIA, the browser origin should match **CHAT_UI_URL** or **domain.webtui** (scheme + host, no path). If neither is set, only `http://127.0.0.1:18789` may work inside the sandbox.

    # Key Features
    Docker-in-Docker Sandbox
    - Runs code in isolated Docker containers for safety.

    Flexible LLM Backend
    - Connects to any OpenAI-compatible API endpoint via configurable environment variables.

    NVIDIA Dynamo Integration
    - First-class support for NVIDIA Dynamo inference endpoints via socat DNS bridge.
  upgradeDescription: |
    Initial release of NemoClaw on Olares.
  developer: NVIDIA
  website: https://github.com/NVIDIA/NemoClaw
  sourceCode: https://github.com/NVIDIA/NemoClaw
  submitter: harveyff
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/NVIDIA/NemoClaw
  license:
  - text: Apache-2.0
    url: https://github.com/NVIDIA/NemoClaw/blob/main/LICENSE
  # Must cover the sum of container `resources.limits` across every
  # pod this chart creates (nemoclaw main + docker-in-docker sidecar +
  # nemoclawweuiingress + terminal). Current totals:
  #   CPU mem
  #   4c  8Gi  nemoclaw main
  #   8c  24Gi docker-in-docker (docker build, k3s, openclaw gateway,
  #            inference pods — biggest budget consumer by far)
  #   0.5 512M nemoclawweuiingress nginx
  #   0.5 512M terminal nginx
  #   0.5 1Gi  terminal apiserver
  #   ---
  #   13.5c 34Gi total -> limitedCpu/limitedMemory must be >= these
  #                       (we add ~15% headroom below so small per-pod
  #                       bumps don't require a manifest edit).
  requiredMemory: 4Gi
  limitedMemory: 40Gi
  requiredDisk: 256Mi
  limitedDisk: 20Gi
  requiredCpu: 2
  limitedCpu: 16
  supportArch:
  - amd64
permission:
  appData: true
  appCache: true
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.5-0'
envs:
  - envName: DYNAMO_HOST
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Backend LLM endpoint as host:port. Only used by the legacy in-pod socat proxy on :8000; leave empty to skip (NemoClaw's modern path goes via OpenShell's inference.local). Example: 42726b5b0.shared.olares.com:80"
  - envName: NEMOCLAW_PROVIDER
    type: string
    required: true
    applyOnChange: true
    editable: true
    default: "custom"
    description: "NemoClaw provider: build|openai|anthropic|anthropicCompatible|gemini|ollama|custom|nim-local|vllm. Use `custom` for any OpenAI-compatible /v1 endpoint (vLLM / Ollama's /v1 / Dynamo). NemoClaw's non-interactive onboard curl-validates the endpoint, so you MUST supply a reachable provider + URL + model at install time."
  - envName: NEMOCLAW_ENDPOINT_URL
    type: string
    required: true
    applyOnChange: true
    editable: true
    default: ""
    description: "REQUIRED. OpenAI-compatible base URL including /v1 suffix (e.g. http://<ollama-host>/v1 or https://api.openai.com/v1). Must be reachable from this pod at install time — onboard curl-probes both Responses and Chat Completions APIs. Post-install you can rewire the sandbox to go through OpenShell's inference.local via `openclaw config --section model`."
  - envName: NEMOCLAW_MODEL
    type: string
    required: true
    applyOnChange: true
    editable: true
    default: ""
    description: "REQUIRED. LLM model id (must appear in GET {NEMOCLAW_ENDPOINT_URL}/models). Examples: gemma4:26b-a4b-it-ud-q4_K_XL, llama3.1:8b, gpt-4o-mini."
  - envName: COMPATIBLE_API_KEY
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "unused"
    description: "API key for the LLM endpoint. Defaults to `unused` (fine for Ollama/Dynamo which don't check auth); replace with a real key for OpenAI/Anthropic/etc."
  - envName: CHAT_UI_URL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "HTTPS origin for Web UI (must match browser address bar). Empty = https:// + first host from domain.webtui (Olares entrance name webtui). Patches gateway.controlUi.allowedOrigins."
  - envName: OPENCLAW_EXTRA_ALLOWED_ORIGINS
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Comma-separated extra origins for gateway.controlUi.allowedOrigins (e.g. alternate Olares URLs)."
  - envName: OPENCLAW_TRUSTED_PROXIES
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Optional comma-separated extra IPs/CIDRs for gateway.trustedProxies if Web UI returns 403 behind Olares (e.g. Pod CIDR). Defaults add 127.0.0.1 and ::1."
  - envName: NEMOCLAW_OPENCLAW_INFERENCE_API
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Optional override for OpenClaw `models.providers.inference.api` inside the sandbox (rewritten on every gateway ensure loop). Empty = do not change OpenClaw's onboard value. If chat/completions negotiation mismatches your stack, try `openai-completions` or `openai-chat-completions` (exact strings depend on backend). Does not change NEMOCLAW_MODEL."
  - envName: NEMOCLAW_OPENCLAW_MAX_AGENT_TIMEOUT
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Optional max value (seconds) for `agents.defaults.timeoutSeconds` when NemoClaw rewrites `/sandbox/.openclaw/openclaw.json` on every gateway ensure loop. Empty = 300. Local large quants (e.g. 27B+) often need 600-1200+ to avoid OpenClaw surfacing `reason=timeout` / generic `network connection error` while `curl` to https://inference.local/v1/models still returns 200. Must be 60-3600 if set."
  - envName: NEMOCLAW_OPENCLAW_VERSION
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Pin the OpenClaw version inside the sandbox (e.g. `2026.5.2`). Empty = use whatever NemoClaw bakes (currently floor 2026.4.24 from NemoClaw v0.0.37 blueprint). On change, chart runs `npm install -g openclaw@<ver>` inside the sandbox + restarts the gateway; sticky via /workspace/.nemoclaw-openclaw-pin. Use this to pull fixes that landed in OpenClaw npm releases newer than the blueprint floor (e.g. NemoClaw issue #3145 TUI duplicate-message — likely improved by 2026.4.26 dedupe + 2026.5.x WS-ping fixes)."
  - envName: NEMOCLAW_POLICY_TIER
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "open"
    description: "OpenShell network policy tier for preset packs (discord/slack/npm/…). `open` (default) = npm + pypi + huggingface + brew + brave + slack + discord + telegram + jira + outlook; `balanced` = npm/pypi/huggingface/brew/brave only; `restricted` = baseline only (chart skips tier reconcile). Chart v1.7.16+ runs **`nemoclaw <sandbox> policy-add <preset> --yes`** in the background after the k3s sandbox pod exists whenever **`NEMOCLAW_POLICY_MODE` is not `skip`** — so presets still apply even if **`/workspace/.nemoclaw-installed` skipped onboard [8/8]**. Inspect live policy with **`openshell policy get <sandbox> --full`** (openshell 0.0.36 — there is no `policy show`). Extra hosts: **`openshell policy update <sandbox> --add-endpoint <host>:443:read-write:rest:enforce`**. Docs: https://docs.nvidia.com/nemoclaw/latest/reference/network-policies.html"
  - envName: NEMOCLAW_POLICY_MODE
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "suggested"
    description: "How non-interactive onboarding reconciles tier-derived presets with already-applied ones. `suggested` (default) — additive: applies tier defaults + keeps presets you previously added with `nemoclaw policy-add`. `custom` — pair with NEMOCLAW_POLICY_PRESETS to make an explicit list authoritative (anything not listed gets removed). `skip` — leaves the applied set untouched, does NOT apply tier defaults, AND disables the chart background **`nemoclaw … policy-add`** tier reconcile (freeze hand-curated policy)."
  - envName: NEMOCLAW_POLICY_RECONCILE_WAIT_ITER
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Optional max polls (2s between polls) waiting for the k3s sandbox pod before **`nemoclaw … policy-add`** tier reconcile runs. Empty = 180 (~6 minutes). Raise only if the sandbox pod is very slow to appear."
  - envName: NEMOCLAW_SANDBOX_HTTP_PROXY
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Manual override for the openshell-sandbox HTTP egress proxy URL (e.g. `http://10.200.0.1:3128`). Empty = chart auto-detects by probing the user-netns default route gateway IP on ports 3128/8080/1080. The proxy is needed by user-netns processes (the `openclaw gateway` runs there) to reach in-cluster Service IPs like Olares shared inference; bypass for public hosts is controlled separately via NO_PROXY (see NEMOCLAW_SANDBOX_NO_PROXY_EXTRA). Override only when auto-detection picks the wrong port or the proxy listens on a non-default address."
  - envName: NEMOCLAW_SANDBOX_NO_PROXY_EXTRA
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Comma-separated extra hosts to bypass the sandbox HTTP proxy (no spaces, e.g. `mirror.aliyun.com,my-feeds.cn`). Appends to the chart's curated default list (npm/yarn/pypi/github/huggingface/openai/anthropic/docker/quay/maven/crates etc.). Bypassing the proxy is preferable for public registries because openshell 0.0.36's HTTPS MITM mangles %-encoded URLs for scoped npm packages (e.g. @clack%2fprompts → `Empty reply from server`). Hosts added here ALSO need to be in the OpenShell network policy — bypass alone won't get past the iptables drop. Add via `openshell policy update <sandbox> --add-endpoint <host>:443:read-only:rest:enforce` (or by including a preset that covers them via NEMOCLAW_POLICY_TIER)."
  - envName: NEMOCLAW_GATEWAY_NETNS
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "auto"
    description: "Which net namespace the OpenClaw gateway runs in. The user/sandbox netns is a closed network whose only default route is the openshell HTTP egress proxy (10.200.0.1:3128); HTTP REST + LLM calls work via HTTP_PROXY but Node's `ws` library never honors HTTP_PROXY for the WSS upgrade, so messaging-channel sidecars (Discord/Slack/Telegram/Feishu/Outlook) cannot reach gateway.discord.gg / wss-primary.slack.com etc. while the gateway runs there — gateway.out shows `fetch failed` + `Gateway websocket closed: 1006` no matter how generous NO_PROXY or `openshell policy` is. The agent netns has direct cluster + public routes, so the gateway can reach channel WSS endpoints from there at the cost of TUI concurrency (TUI lives in user netns and shows `gateway disconnected: closed | idle` — WebUI keeps working via sandbox-tunnel.sh). Values: `auto` (default; agent IFF any `channels.<name>.enabled=true` exists in `/sandbox/.openclaw/openclaw.json`, otherwise user), `agent` (force agent — channels work, TUI does not), `user` (force chart v1.7.10 default — TUI+WebUI both work but channels cannot connect to public WSS)."
  - envName: NEMOCLAW_GATEWAY_DOCKER_PORT
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "8080"
    description: "Docker host port for OpenShell gateway (docker ps). Cluster Service port 8080 targets this."
  - envName: NEMOCLAW_GATEWAY_SCHEME
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "http"
    description: "Ingress to gateway: http + openshell --plaintext (default, works behind nginx). Use https if gateway stays TLS."
  - envName: NEMOCLAW_GATEWAY_RECREATE
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "0"
    description: "Set to 1 to pass --recreate on openshell gateway start (fresh cluster). This tears down the gateway container and removes local cluster image tags; the next start must re-pull from ghcr.io (or your NEMOCLAW_OPENSHELL_CLUSTER_IMAGE_MIRROR). Leave 0 on air-gapped / flaky-registry nodes unless you understand the re-pull requirement."
  - envName: NEMOCLAW_OPENSHELL_CLUSTER_IMAGE
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "beclab/hys2023-openshell-cluster:v1.16"
    description: "Image nemoclaw onboard pulls for OpenShell gateway cluster. Default points at the beclab custom fork (policy disabled at source, direct egress — no MITM proxy). NemoClaw's onboard.ts forcibly sets OPENSHELL_CLUSTER_IMAGE=ghcr.io/nvidia/openshell/cluster:<NEMOCLAW_OPENSHELL_VERSION> before spawning `openshell gateway start`, so env-var overrides don't survive. Workaround: after pulling this image, the chart aliases it via `docker tag` to that exact ghcr ref; openshell's ensure_image() inspects locally, finds the alias, and never pulls upstream. Override to ghcr.io/nvidia/openshell/cluster:<tag> to use the upstream copy verbatim."
  - envName: NEMOCLAW_OPENSHELL_CLUSTER_IMAGE_MIRROR
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Fallback image ref pulled when ghcr.io is unreachable; retagged locally as NEMOCLAW_OPENSHELL_CLUSTER_IMAGE so onboard's internal docker pull hits cache. Example: ghcr.nju.edu.cn/nvidia/openshell/cluster:0.0.36"
  - envName: NEMOCLAW_PREFLIGHT_CLUSTER_PULL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "1"
    description: "Set to 0 to skip docker pull before first install (not recommended if ghcr.io is slow)."
  - envName: NEMOCLAW_PREFER_MIRROR
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "0"
    description: "When 1, the 5a/5 pre-pull tries the _MIRROR variants first (cluster / sandbox-base / node) before falling back to ghcr.io / docker.io. Saves ~90s per image on cold starts in regions where the upstream is slow or blocked. No-op if the corresponding _MIRROR env is empty."
  - envName: NEMOCLAW_OPENSHELL_VERSION
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "v0.0.36"
    description: "OpenShell CLI release tag installed by NVIDIA/OpenShell install.sh. Must satisfy NemoClaw's MIN_VERSION..MAX_VERSION (currently 0.0.36). Bump this together with NEMOCLAW_OPENSHELL_CLUSTER_IMAGE."
  - envName: NEMOCLAW_INSTALL_TAG
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "main"
    description: "Git branch or tag of NVIDIA/NemoClaw for nemoclaw.sh (uses `git clone --depth 1 --branch <ref>`). MUST be a remote branch/tag name — a 40-char commit SHA is rejected by git (\"Remote branch … not found\"). Default `main` carries PR #2484 (OpenClaw 2026.4.24 Dockerfile Patch 4 + generate-openclaw-config build-context). Older tags v0.0.26–v0.0.29 fail sandbox image step 17/54. Pin a release tag here once upstream ships one past #2484. Empty = latest (risky)."
  - envName: NEMOCLAW_INSTALL_HOMEBREW
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "1"
    description: "Pre-install Linuxbrew into /sandbox/.linuxbrew for skills that need `brew install`. Clones Homebrew directly inside the k3s sandbox via git or tarball fallback. Set to 0 to disable. ~130MB first run."
  - envName: NEMOCLAW_HOMEBREW_GIT_URL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Optional. Git clone URL for Homebrew/brew (default https://github.com/Homebrew/brew.git). Set to an internal mirror if the sandbox cannot reach GitHub; otherwise cold-reset leaves brew missing and `brew: command not found`."
  - envName: NEMOCLAW_HOMEBREW_BOTTLE_DOMAIN
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Optional. Override brew's bottle + portable-ruby download origin. Default is https://ghcr.io (Homebrew upstream). NOTE: Homebrew 4.x fetches portable-ruby via an OCI blob path (/v2/homebrew/portable-ruby/.../blobs/sha256:*), so classic China mirrors (TUNA/USTC/Aliyun) that only mirror the /homebrew-bottles tarball layout will return 404 for portable-ruby. Only useful if you have a GHCR-compatible mirror. Propagated as HOMEBREW_BOTTLE_DOMAIN + HOMEBREW_ARTIFACT_DOMAIN + HOMEBREW_API_DOMAIN into /etc/environment and /etc/profile.d/nemoclaw-brew-temp.sh inside the sandbox."
  - envName: NEMOCLAW_GOPROXY
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "https://goproxy.cn,direct"
    description: "Value for GOPROXY inside the sandbox. Default is goproxy.cn (community CDN in China) with direct fallback. Set to `direct` to disable the proxy, or to an internal Athens server URL for air-gapped / corporate setups. GOSUMDB is hard-wired to `off` because sum.golang.org is frequently blocked and a stale sumdb failure would otherwise wedge every `go build`. Used by the prefetched Go toolchain installed at /sandbox/.local/go during skill-env."
  - envName: ALLOW_EXTERNAL_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Mount Olares' External shared library (userspace.sharedlib) into the workspace container at /home/userdata/external so skills that run inside `nemoclaw my-assistant connect` can read/write shared media via OpenShell's workspace bind. Leave disabled unless a skill explicitly needs it."
  - envName: GOG_KEYRING_PASSWORD
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Passphrase for the gog CLI keyring (GOG_KEYRING_BACKEND=file). Leave EMPTY (recommended) to auto-generate a unique 8-char random value on first install — the chart stores it in the Helm-managed `nemoclaw-gog-keyring` Secret so it survives `helm upgrade` and pod restarts; uninstalling keeps the Secret (resource-policy: keep) so a later reinstall can still decrypt an existing keyring. Set a custom value here only if you want to pin it explicitly (changing it invalidates any already-authenticated `gog` session — re-run `gog auth add`)."
