# Patches sandbox ~/.openclaw/openclaw.json:
#   patch_origins.py            -> gateway.trustedProxies (reverse-proxy 403) + controlUi.allowedOrigins
#   patch_inference_baseurl.py  -> models.providers.inference.baseUrl (see below)
#
# Why patch_inference_baseurl.py exists:
# During nemoclaw [3/8] onboard the installer records inference provider with
#   models.providers.inference.baseUrl = https://inference.local/v1
# (OpenShell's internal reverse-proxy alias). That host, however, is NOT
# resolvable from inside the my-assistant pod's netns on at least one known
# Olares node layout (getent hosts inference.local -> NXDOMAIN), so the
# gateway then fails every chat turn with:
#   [model-fallback/decision] reason=timeout detail=Connection error
#   Embedded agent failed before reply: LLM request failed: network connection error
# TUI-vs-WebUI was asymmetric only because TUI in some setups picks a
# non-`inference/` model (OpenShell local provider) while WebUI always hits
# `inference/<model>`. We force baseUrl back to the URL the user actually
# typed (NEMOCLAW_ENDPOINT_URL), which is what nemoclaw.sh probes in preflight
# (/models 200) and therefore the one we already know is reachable.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw-patch-origins
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: nemoclaw
data:
  patch_origins.py: |
    import json, os, glob

    def merge_trusted():
        out = ["127.0.0.1", "::1"]
        extra = os.environ.get("OPENCLAW_TRUSTED_PROXIES", "").strip()
        if extra:
            out.extend([x.strip() for x in extra.split(",") if x.strip()])
        seen, uniq = set(), []
        for x in out:
            if x not in seen:
                seen.add(x)
                uniq.append(x)
        return uniq

    trusted_list = merge_trusted()
    csv = os.environ.get("ORIGIN_CSV", "").strip()
    origins = [x.strip() for x in csv.split(",") if x.strip()]

    paths = []
    # NemoClaw sandbox pod: canonical config path (workspace / clamp also target this).
    for p in ("/sandbox/.openclaw/openclaw.json",):
        if os.path.isfile(p) and p not in paths:
            paths.append(p)
    paths.extend(glob.glob("/home/*/.openclaw/openclaw.json"))
    for p in ("/root/.openclaw/openclaw.json", "/home/node/.openclaw/openclaw.json"):
        if os.path.isfile(p) and p not in paths:
            paths.append(p)

    for path in paths:
        try:
            with open(path, "r", encoding="utf-8") as f:
                d = json.load(f)
            g = d.setdefault("gateway", {})
            changed = False

            tp = g.get("trustedProxies")
            if not isinstance(tp, list):
                tp = []
                g["trustedProxies"] = tp
            for ip in trusted_list:
                if ip not in tp:
                    tp.append(ip)
                    changed = True

            if origins:
                c = g.setdefault("controlUi", {})
                a = c.setdefault("allowedOrigins", [])
                for o in origins:
                    if o not in a:
                        a.append(o)
                        changed = True

            if changed:
                with open(path, "w", encoding="utf-8") as f:
                    json.dump(d, f, ensure_ascii=False, indent=2)
                    f.write("\n")
                print("patched", path)
        except Exception as e:
            print("skip", path, e)
  patch_inference_baseurl.py: |
    # Rewrite models.providers.inference.baseUrl so WebUI turns that route
    # through `inference/<model>` reach the reachable OpenAI-compatible
    # endpoint instead of the unresolvable https://inference.local alias.
    #
    # Inputs (env):
    #   NEMOCLAW_ENDPOINT_URL   required; same value the operator typed in
    #                           OlaresManifest (already probed by preflight).
    #                           Must end in /v1; if missing we auto-append
    #                           (matches the preflight auto-correct in
    #                           deployment.yaml).
    #
    # Behavior:
    #   - Only rewrites if the stored baseUrl equals the inference.local
    #     alias (or its /v1 form) OR is empty/missing. We never overwrite
    #     a baseUrl the user has already hand-picked to something else.
    #   - Prints 'patched <path> inference.baseUrl=<url>' on mutation so
    #     sandbox-ensure-gateway's SHA256 diff flips _cfg_changed=1 and
    #     forces a gateway restart (see configmap-sandbox-bridge.yaml).
    import json, os, glob

    raw = os.environ.get("NEMOCLAW_ENDPOINT_URL", "").strip()
    if not raw:
        print("skip patch_inference_baseurl: NEMOCLAW_ENDPOINT_URL unset")
        raise SystemExit(0)
    # Normalize to /v1 suffix (NemoClaw gateway calls `${baseUrl}/chat/completions`).
    if raw.endswith("/v1") or raw.endswith("/v1/"):
        target = raw.rstrip("/")
    else:
        target = raw.rstrip("/") + "/v1"

    # baseUrls we are willing to overwrite: anything pointing at the
    # OpenShell internal alias that may not resolve, or empty.
    stale_hosts = {
        "https://inference.local/v1",
        "https://inference.local/v1/",
        "http://inference.local/v1",
        "http://inference.local/v1/",
        "https://inference.local",
        "http://inference.local",
        "",
    }

    paths = []
    for p in ("/sandbox/.openclaw/openclaw.json",):
        if os.path.isfile(p) and p not in paths:
            paths.append(p)
    paths.extend(glob.glob("/home/*/.openclaw/openclaw.json"))
    for p in ("/root/.openclaw/openclaw.json", "/home/node/.openclaw/openclaw.json"):
        if os.path.isfile(p) and p not in paths:
            paths.append(p)

    for path in paths:
        try:
            with open(path, "r", encoding="utf-8") as f:
                d = json.load(f)
            m = d.setdefault("models", {})
            # Preserve merge semantics NemoClaw onboard already uses.
            m.setdefault("mode", "merge")
            provs = m.setdefault("providers", {})
            inf = provs.setdefault("inference", {})
            cur = (inf.get("baseUrl") or "").strip()
            # Only touch when stored value is the unresolvable alias or empty.
            if cur in stale_hosts and cur != target:
                inf["baseUrl"] = target
                inf.setdefault("apiKey", "unused")
                inf.setdefault("api", "openai-completions")
                with open(path, "w", encoding="utf-8") as f:
                    json.dump(d, f, ensure_ascii=False, indent=2)
                    f.write("\n")
                print("patched", path, "inference.baseUrl=" + target)
            else:
                print("noop", path, "inference.baseUrl=" + (cur or "<unset>"))
        except Exception as e:
            print("skip", path, e)
