# Scripts that bridge external chat clients (pod :18790) to OpenClaw's gateway
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw-sandbox-bridge
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: nemoclaw
data:
  # Idempotently ensures `openclaw gateway` is running inside the sandbox pod.
  sandbox-ensure-gateway.sh: |
    #!/bin/sh
    set -u
    CLUSTER_CTR="${CLUSTER_CTR:-openshell-cluster-nemoclaw}"
    NS="${NS:-openshell}"
    SBX="${SBX:-my-assistant}"
    # Interactive sessions (`nemoclaw my-assistant connect`) land as the non-root
    SBX_USER="${SBX_USER:-sandbox}"

    health_ok() {
      # Probe gateway readiness from the agent container by TCP-connecting to
      docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- sh -c '
        _agent=$(readlink /proc/self/ns/net 2>/dev/null)
        _pick=""
        if [ -n "$_agent" ] && command -v nsenter >/dev/null 2>&1; then
          for _name in openshell sshd ssh node openclaw bash; do
            for _cand in $(ps -ef 2>/dev/null | awk -v n="$_name" "index(\$0,n) && !/awk/ && !/grep/ {print \$2}"); do
              [ -r "/proc/$_cand/ns/net" ] || continue
              _ns=$(readlink "/proc/$_cand/ns/net" 2>/dev/null) || continue
              if [ -n "$_ns" ] && [ "$_ns" != "$_agent" ]; then _pick=$_cand; break 2; fi
            done
          done
        fi
        if [ -n "$_pick" ]; then
          nsenter --net="/proc/$_pick/ns/net" -- timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/18789" >/dev/null 2>&1 && exit 0
        fi
        timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/18789" >/dev/null 2>&1
      ' >/dev/null 2>&1
    }

    # Do NOT exit early when health_ok: nemoclaw onboard starts the gateway before chat-ui-bridge
    # runs this script, and we would skip the .bashrc / PATH hooks forever (brew: command not found).

    echo "[sandbox-gw] shell rc + gateway check inside ${SBX} (user ${SBX_USER})..."
    # Forward GOG_KEYRING_* from the nemoclaw pod (bound via Secret in deployment.yaml)
    GKP="${GOG_KEYRING_PASSWORD:-}"
    # gateway.controlUi.allowedOrigins: forward CHAT_UI_URL + extras into the sandbox
    # so patch_origins.py (same logic as workspace /opt/nemoclaw/patch_origins.py) can merge.
    _ORIG_CSV="${CHAT_UI_URL:-}"
    if [ -n "${OPENCLAW_EXTRA_ALLOWED_ORIGINS:-}" ]; then
      if [ -n "$_ORIG_CSV" ]; then
        _ORIG_CSV="${_ORIG_CSV},${OPENCLAW_EXTRA_ALLOWED_ORIGINS}"
      else
        _ORIG_CSV="${OPENCLAW_EXTRA_ALLOWED_ORIGINS}"
      fi
    fi
    _TPCSV="${OPENCLAW_TRUSTED_PROXIES:-}"
    # models.providers.inference.baseUrl self-heal uses NEMOCLAW_ENDPOINT_URL
    # (the same value the operator typed in OlaresManifest, already validated
    # as reachable in deployment.yaml preflight [4/5]). Must be forwarded into
    _NEM_EP="${NEMOCLAW_ENDPOINT_URL:-}"
    # Single-quoted remote body: avoids the host re-parsing a double-quoted string (where backticks
    # in comments became command substitution and destroyed runuser / LAUNCH).
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      env "SBX_USER=${SBX_USER:-sandbox}" "GOG_KEYRING_PASSWORD=${GKP}" "GOG_KEYRING_BACKEND=file" \
      "ORIGIN_CSV=${_ORIG_CSV}" "OPENCLAW_TRUSTED_PROXIES=${_TPCSV}" \
      "NEMOCLAW_ENDPOINT_URL=${_NEM_EP}" \
      "NEMOCLAW_SANDBOX_HTTP_PROXY=${NEMOCLAW_SANDBOX_HTTP_PROXY:-}" \
      "NEMOCLAW_SANDBOX_NO_PROXY_EXTRA=${NEMOCLAW_SANDBOX_NO_PROXY_EXTRA:-}" \
      "NEMOCLAW_GATEWAY_NODE_OPTIONS=${NEMOCLAW_GATEWAY_NODE_OPTIONS:-}" \
      "NEMOCLAW_GATEWAY_NETNS=${NEMOCLAW_GATEWAY_NETNS:-agent}" sh -c '
      set -u
      cd /sandbox || exit 1
      # Pick a pid in a non-agent netns (= user/sandbox netns where openshell-spawned
      _netns_pick_pid() {
        _np_agent=$(readlink /proc/self/ns/net 2>/dev/null) || return 1
        for _np_n in openshell sshd ssh node openclaw bash; do
          for _np_c in $(ps -ef 2>/dev/null | awk -v n="$_np_n" "index(\$0,n) && !/awk/ && !/grep/ {print \$2}"); do
            [ -r "/proc/$_np_c/ns/net" ] || continue
            _np_ns=$(readlink "/proc/$_np_c/ns/net" 2>/dev/null) || continue
            if [ -n "$_np_ns" ] && [ "$_np_ns" != "$_np_agent" ]; then
              echo "$_np_c"
              return 0
            fi
          done
        done
        for _np_l in /proc/[0-9]*/ns/net; do
          [ -r "$_np_l" ] || continue
          _np_ns=$(readlink "$_np_l" 2>/dev/null) || continue
          if [ -n "$_np_ns" ] && [ "$_np_ns" != "$_np_agent" ]; then
            echo "$_np_l" | awk -F/ "{print \$3}"
            return 0
          fi
        done
        return 1
      }
      _health_via_netns() {
        # Returns 0 if 127.0.0.1:18789 accepts a TCP connection in the expected
        case "${NEMOCLAW_GATEWAY_NETNS:-agent}" in
          agent)
            timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/18789" >/dev/null 2>&1
            return $?
            ;;
        esac
        _hv_pid=$(_netns_pick_pid 2>/dev/null) || true
        if [ -n "$_hv_pid" ] && command -v nsenter >/dev/null 2>&1; then
          nsenter --net="/proc/$_hv_pid/ns/net" -- timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/18789" >/dev/null 2>&1 && return 0
        fi
        timeout 3 bash -c "exec 3<>/dev/tcp/127.0.0.1/18789" >/dev/null 2>&1
      }
      mkdir -p /sandbox /sandbox/.openclaw /sandbox/.openclaw-data /sandbox/.nemoclaw /sandbox/.config /sandbox/inbox /sandbox/.local/bin /sandbox/.openclaw/tasks 2>/dev/null || true
      touch /sandbox/.openclaw-data/gateway.out 2>/dev/null || true
      chown -R "$SBX_USER:$SBX_USER" /sandbox/.openclaw /sandbox/.openclaw-data /sandbox/.nemoclaw /sandbox/.config /sandbox/inbox /sandbox/.local/bin /sandbox/.openclaw/tasks 2>/dev/null || true
      # Self-heal stuck session locks (common cause of "agent卡住/不返回").
      find /sandbox/.openclaw-data/agents -type f -name "*.jsonl.lock" -delete 2>/dev/null || true
      # Optional: tune OpenClaw inference provider API + token limits.
      _cfg_changed=0
      if [ -f /sandbox/.openclaw/openclaw.json ]; then
        mkdir -p /sandbox/.nemoclaw 2>/dev/null || true
        _pre=""
        if command -v sha256sum >/dev/null 2>&1; then
          _pre=$(sha256sum /sandbox/.openclaw/openclaw.json 2>/dev/null | awk "{print \$1}")
        fi
        # clamp lives on the workspace pod at /opt/nemoclaw -- NOT mounted inside the sandbox.
        # chat-ui-bridge + skill-env stage a copy under /sandbox/.nemoclaw/ so this succeeds.
        if [ -f /sandbox/.nemoclaw/clamp-openclaw-config.py ]; then
          python3 /sandbox/.nemoclaw/clamp-openclaw-config.py /sandbox/.openclaw/openclaw.json >/dev/null 2>&1 || true
        fi
        if [ -f /sandbox/.nemoclaw/patch_origins.py ]; then
          # Keep stdout so we see "patched <path>" in bridge logs; also
          python3 /sandbox/.nemoclaw/patch_origins.py 2>/dev/null || true
        fi
        # Self-heal models.providers.inference.baseUrl.
        if [ -f /sandbox/.nemoclaw/patch_inference_baseurl.py ] && [ -n "${NEMOCLAW_ENDPOINT_URL:-}" ]; then
          python3 /sandbox/.nemoclaw/patch_inference_baseurl.py 2>/dev/null || true
        fi
        if [ -n "$_pre" ] && command -v sha256sum >/dev/null 2>&1; then
          _post=$(sha256sum /sandbox/.openclaw/openclaw.json 2>/dev/null | awk "{print \$1}")
          if [ -n "$_post" ] && [ "$_pre" != "$_post" ]; then
            _cfg_changed=1
            echo "[sandbox-gw] openclaw.json mutated by clamp/patch_origins/patch_inference_baseurl; gateway restart required for new allowedOrigins / trustedProxies / inference.baseUrl to take effect"
          fi
        fi
        # Visible sanity line -- so we can see what the gateway WILL pick
        if command -v python3 >/dev/null 2>&1; then
          python3 -c "import json,sys; d=json.load(open(sys.argv[1])); g=d.get(\"gateway\",{}) or {}; c=g.get(\"controlUi\",{}) or {}; ao=c.get(\"allowedOrigins\") or []; tp=g.get(\"trustedProxies\") or []; print(\"[sandbox-gw] openclaw.json controlUi.allowedOrigins=\"+json.dumps(ao)+\" trustedProxies=\"+json.dumps(tp))" \
            /sandbox/.openclaw/openclaw.json 2>/dev/null || true
        fi
        chown "$SBX_USER:$SBX_USER" /sandbox/.openclaw/openclaw.json 2>/dev/null || true
      fi
      # Always sync PATH hooks first (idempotent). Runs even when gateway is already healthy.
      for _bf in /sandbox/.bashrc /sandbox/.profile /sandbox/.bash_profile; do
        touch "$_bf" 2>/dev/null || true
        chown "$SBX_USER:$SBX_USER" "$_bf" 2>/dev/null || true
        grep -q nemoclaw-linuxbrew-path-v3 "$_bf" 2>/dev/null || printf "%s\n" \
          "# nemoclaw-linuxbrew-path-v3" \
          "export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin:\$PATH" >> "$_bf"
        grep -q nemoclaw-xdg-gogcli "$_bf" 2>/dev/null || printf "%s\n" \
          "# nemoclaw-xdg-gogcli" \
          "export XDG_CONFIG_HOME=/sandbox/.config" >> "$_bf"
        if [ -f /etc/profile.d/nemoclaw-linuxbrew.sh ]; then
          grep -q nemoclaw-linuxbrew-rc "$_bf" 2>/dev/null || printf "%s\n" \
            "# nemoclaw-linuxbrew-rc" \
            "[ -f /etc/profile.d/nemoclaw-linuxbrew.sh ] && . /etc/profile.d/nemoclaw-linuxbrew.sh" >> "$_bf"
        fi
      done
      # NOTE: every line in this block -- including these comments -- runs
      if [ -x /sandbox/.linuxbrew/Homebrew/bin/brew ]; then
        mkdir -p /sandbox/.local/bin /sandbox/.linuxbrew/bin \
                 /sandbox/.local/var/homebrew/locks \
                 /sandbox/.linuxbrew/var/homebrew/locks \
                 /sandbox/.linuxbrew/Homebrew/var/homebrew/locks
        _bw=/sandbox/.nemoclaw/brew-local-wrapper.sh
        if [ -f "$_bw" ]; then
          cp "$_bw" /sandbox/.local/bin/brew
          cp "$_bw" /sandbox/.linuxbrew/bin/brew
        else
          rm -f /sandbox/.local/bin/brew /sandbox/.linuxbrew/bin/brew 2>/dev/null || true
          {
            printf "%s\n" "#!/bin/sh"
            printf "%s\n" "export HOMEBREW_PREFIX=/sandbox/.linuxbrew"
            printf "%s\n" "export HOMEBREW_REPOSITORY=/sandbox/.linuxbrew/Homebrew"
            printf "%s\n" "export HOMEBREW_CELLAR=/sandbox/.linuxbrew/Cellar"
            printf "%s\n" "export HOMEBREW_NO_ENV_FILTERING=1"
            printf "%s\n" "REAL=/sandbox/.linuxbrew/Homebrew/bin/brew"
            printf "%s\n" "if [ \"\$1\" = install ]; then shift; _tf=\${TMPDIR:-/tmp/homebrew-tmp}/nemoclaw-brew-wrap.\$\$; :>\"\$_tf\"; _t=0; for _p in \"\$@\"; do _c=\$_p; while [ \${#_c} -ge 2 ] && [ \"\${_c%\\\"}\" != \"\$_c\" ] && [ \"\${_c#\\\"}\" != \"\$_c\" ]; do _c=\${_c#\\\"}; _c=\${_c%\\\"}; done; case \"\$_c\" in steipete/tap/gogcli|steipete/tap/gog|gogcli|openclaw/tap/gogcli) _c=openclaw/tap/gogcli; _t=1;; esac; printf '%s\\n' \"\$_c\" >>\"\$_tf\"; done; set --; while IFS= read -r _l; do [ -n \"\$_l\" ] && set -- \"\$@\" \"\$_l\"; done <\"\$_tf\"; rm -f \"\$_tf\"; [ \"\$_t\" = 1 ] && \"\$REAL\" tap openclaw/tap 2>/dev/null || true; exec \"\$REAL\" install \"\$@\"; fi"
            printf "%s\n" "if [ \"\$1\" = tap ]; then shift; _tf=\${TMPDIR:-/tmp/homebrew-tmp}/nemoclaw-brew-wrap.\$\$; :>\"\$_tf\"; for _p in \"\$@\"; do _c=\$_p; while [ \${#_c} -ge 2 ] && [ \"\${_c%\\\"}\" != \"\$_c\" ] && [ \"\${_c#\\\"}\" != \"\$_c\" ]; do _c=\${_c#\\\"}; _c=\${_c%\\\"}; done; case \"\$_c\" in steipete/tap*|openclaw/tap*) _c=openclaw/tap;; esac; printf '%s\\n' \"\$_c\" >>\"\$_tf\"; done; set --; while IFS= read -r _l; do [ -n \"\$_l\" ] && set -- \"\$@\" \"\$_l\"; done <\"\$_tf\"; rm -f \"\$_tf\"; exec \"\$REAL\" tap \"\$@\"; fi"
            printf "%s\n" "exec \"\$REAL\" \"\$@\""
          } > /sandbox/.local/bin/brew
          cp /sandbox/.local/bin/brew /sandbox/.linuxbrew/bin/brew
        fi
        chmod 0755 /sandbox/.local/bin/brew /sandbox/.linuxbrew/bin/brew 2>/dev/null || true
        chown "$SBX_USER:$SBX_USER" /sandbox/.local/bin/brew /sandbox/.linuxbrew/bin/brew 2>/dev/null || true
        chown -R "$SBX_USER:$SBX_USER" /sandbox/.local 2>/dev/null || true
      fi
      # Self-heal Homebrew permissions. `brew vendor-install ruby` (triggered
      if id "$SBX_USER" >/dev/null 2>&1 && [ -d /sandbox/.linuxbrew ]; then
        mkdir -p /sandbox/.linuxbrew/var/homebrew/locks \
                 /sandbox/.linuxbrew/Homebrew/var/homebrew/locks \
                 /sandbox/.linuxbrew/Homebrew/Library/Caches/Homebrew \
                 /sandbox/.linuxbrew/Homebrew/Library/Homebrew/vendor/portable-ruby \
                 /sandbox/.local/var/homebrew/locks 2>/dev/null || true
        # Recreate portable-ruby/current symlink if missing (see skill-env for why).
        VDIR=/sandbox/.linuxbrew/Homebrew/Library/Homebrew/vendor/portable-ruby
        if [ -d "$VDIR" ] && [ ! -e "$VDIR/current" ]; then
          RV=$(ls -1 "$VDIR" 2>/dev/null | awk "/^[0-9]+\\.[0-9]+\\.[0-9]+$/{print; exit}")
          if [ -n "$RV" ] && [ -x "$VDIR/$RV/bin/ruby" ]; then
            (cd "$VDIR" && ln -sfn "$RV" current) 2>/dev/null || true
          fi
        fi
        chown -R "$SBX_USER:$SBX_USER" /sandbox/.linuxbrew /sandbox/.local 2>/dev/null || true
        chmod -R u+rwX /sandbox/.linuxbrew 2>/dev/null || true
        chmod -R u+rwX /sandbox/.local 2>/dev/null || true
        [ -L "$VDIR/current" ] && chown -h "$SBX_USER:$SBX_USER" "$VDIR/current" 2>/dev/null || true
        # Flush stale lockfiles. Homebrew acquires flock on vendor-install;
        # bridge skill-env and interactive `openclaw config --section skills`
        # can race — drop locks when no brew/vendor-install is running.
        _brew_busy=0
        if pgrep -f "[b]rew vendor-install" >/dev/null 2>&1 || \
           pgrep -f "[H]omebrew.*vendor-install" >/dev/null 2>&1; then
          _brew_busy=1
        fi
        for _ld in /sandbox/.linuxbrew/var/homebrew/locks \
                   /sandbox/.linuxbrew/Homebrew/var/homebrew/locks \
                   /sandbox/.local/var/homebrew/locks; do
          [ -d "$_ld" ] || continue
          find "$_ld" -maxdepth 1 -type f ! -user "$SBX_USER" \
            -print -delete 2>/dev/null | sed "s#^#[sandbox-brew-lock] stale: #" || true
          if [ "$_brew_busy" = "0" ]; then
            find "$_ld" -maxdepth 1 -type f \
              -print -delete 2>/dev/null | sed "s#^#[sandbox-brew-lock] cleared (no brew running): #" || true
          fi
        done
      fi
      # /var/tmp self-heal (see skill-env). Cheap idempotent re-check so an image
      mkdir -p /var/tmp 2>/dev/null || true
      chmod 1777 /var/tmp 2>/dev/null || true
      if id "$SBX_USER" >/dev/null 2>&1; then
        find /var/tmp -mindepth 1 -maxdepth 1 ! -user "$SBX_USER" -print \
          -exec rm -rf {} + 2>/dev/null || true
      fi
      # Staleness criterion: XDG_CONFIG_HOME absent -> gog/openclaw skill subprocesses
      # would be sanitized to /tmp/.config and miss keyring tokens. Force restart.
      _gw_pid=""
      _gw_pid=$(pgrep -f "openclaw[- ]gateway" 2>/dev/null | head -1) || true
      if [ -z "$_gw_pid" ]; then
        _gw_pid=$(ps -eo pid,comm 2>/dev/null \
                  | awk '"'"'$2 ~ /^openclaw[- ]gateway$/ || $2 == "openclaw-gateway" {print $1; exit}'"'"')
      fi
      _gw_stale=0
      if [ -n "$_gw_pid" ] && [ -r "/proc/$_gw_pid/environ" ]; then
        if ! tr "\0" "\n" < "/proc/$_gw_pid/environ" 2>/dev/null \
             | grep -qiE "^XDG_CONFIG_HOME=/sandbox"; then
          _gw_stale=1
          echo "[sandbox-gw] running gateway pid=$_gw_pid lacks XDG_CONFIG_HOME under /sandbox; forcing restart"
        fi
      fi
      # Config mutation staleness: openclaw gateway does NOT re-read
      if [ "${_cfg_changed:-0}" = "1" ]; then
        _gw_stale=1
        echo "[sandbox-gw] openclaw.json changed; forcing gateway restart to pick up allowedOrigins / trustedProxies"
      fi
      #
      if _health_via_netns; then
        if [ "${_gw_stale:-0}" = "1" ]; then
          echo "[sandbox-gw] gateway healthy but openclaw.json/env stale; restarting to pick up config (inference.baseUrl / allowedOrigins / env)"
        else
          echo "[sandbox-gw] gateway already healthy (TCP); rc hooks applied"
          exit 0
        fi
      else
        [ "$_gw_stale" = "1" ] || echo "[sandbox-gw] gateway not responding; restarting..."
      fi
      openclaw gateway stop 2>/dev/null || true
      ps -eo pid,command 2>/dev/null | awk '"'"'/openclaw[- ]gateway/ && !/awk/ {print $1}'"'"' | while read -r _pid; do
        kill -9 "$_pid" 2>/dev/null || true
      done
      sleep 1
      # GOG_KEYRING_BACKEND + GOG_KEYRING_PASSWORD MUST be in openclaw gateway process
      GOG_ENV=""
      if [ -n "${GOG_KEYRING_PASSWORD:-}" ]; then
        GOG_ENV="GOG_KEYRING_BACKEND=file GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}"
      fi
      # OpenClaw binary selection (chart NEMOCLAW_OPENCLAW_VERSION pin support).
      # When the chart-side helper has installed a pinned version (npm prefix
      OPENCLAW_BIN=openclaw
      _PIN_PATH_PREFIX=""
      if [ -f /sandbox/.openclaw-pinned-marker ] && [ -x /sandbox/.local/bin/openclaw ]; then
        OPENCLAW_BIN=/sandbox/.local/bin/openclaw
        _PIN_PATH_PREFIX="/sandbox/.local/bin:"
        _PIN_VER=$(head -1 /sandbox/.openclaw-pinned-marker 2>/dev/null | tr -d "\r\n ")
        echo "[sandbox-gw] using pinned openclaw at /sandbox/.local/bin/openclaw (NEMOCLAW_OPENCLAW_VERSION=${_PIN_VER:-<unknown>})"
      fi
      #
      _detect_sandbox_proxy() {
        _dsp_pid="$1"
        [ -n "$_dsp_pid" ] || return 1
        command -v nsenter >/dev/null 2>&1 || return 1
        _dsp_gw=$(nsenter --net="/proc/${_dsp_pid}/ns/net" -- ip -4 route show default 2>/dev/null | awk "/^default/ {print \$3; exit}")
        [ -n "$_dsp_gw" ] || return 1
        for _dsp_port in 3128 8080 1080; do
          if nsenter --net="/proc/${_dsp_pid}/ns/net" -- timeout 2 bash -c "exec 3<>/dev/tcp/${_dsp_gw}/${_dsp_port}" >/dev/null 2>&1; then
            echo "http://${_dsp_gw}:${_dsp_port}"
            return 0
          fi
        done
        return 1
      }
      _build_proxy_env() {
        _bpe_url="$1"
        [ -n "$_bpe_url" ] || return 0
        _bpe_host=$(echo "$_bpe_url" | sed -E "s|^https?://||; s|:.*$||")
        _bpe_no="127.0.0.1,localhost,::1"
        [ -n "$_bpe_host" ] && _bpe_no="${_bpe_no},${_bpe_host}"
        # Public-Internet egress hosts that the openclaw plugin loader (and
        _bpe_pub="registry.npmjs.org,.npmjs.org,registry.yarnpkg.com,registry.npmmirror.com,registry.npm.taobao.org,npm.aliyun.com,unpkg.com,cdn.jsdelivr.net,cdnjs.cloudflare.com,esm.sh"
        _bpe_pub="${_bpe_pub},pypi.org,files.pythonhosted.org,mirrors.aliyun.com,pypi.tuna.tsinghua.edu.cn,pypi.douban.com"
        _bpe_pub="${_bpe_pub},github.com,.github.com,raw.githubusercontent.com,objects.githubusercontent.com,codeload.github.com,api.github.com,github-releases.githubusercontent.com"
        _bpe_pub="${_bpe_pub},api.openai.com,api.anthropic.com,openrouter.ai,api.together.xyz,generativelanguage.googleapis.com,huggingface.co,cdn-lfs.huggingface.co,hf.co"
        _bpe_pub="${_bpe_pub},docker.io,registry-1.docker.io,ghcr.io,quay.io,gcr.io,mcr.microsoft.com,k8s.gcr.io,registry.k8s.io"
        _bpe_pub="${_bpe_pub},storage.googleapis.com,fonts.googleapis.com,fonts.gstatic.com,blob.core.windows.net,s3.amazonaws.com,.cloudfront.net"
        _bpe_pub="${_bpe_pub},crates.io,static.crates.io,proxy.golang.org,sum.golang.org,repo1.maven.org,repo.maven.apache.org,rubygems.org"
        _bpe_pub="${_bpe_pub},developer.nvidia.com,download.nvidia.com,catalog.ngc.nvidia.com"
        # Messaging channel realtime hosts. WSS upgrades are mangled by the
        _bpe_pub="${_bpe_pub},gateway.discord.gg,discord.com,cdn.discordapp.com,media.discordapp.net,discordapp.com"
        _bpe_pub="${_bpe_pub},slack.com,wss-primary.slack.com,wss-mobile.slack.com,files.slack.com,edgeapi.slack.com"
        _bpe_pub="${_bpe_pub},api.telegram.org,telegram.org,telegra.ph,t.me"
        _bpe_pub="${_bpe_pub},open.feishu.cn,open.larksuite.com,passport.feishu.cn,passport.larksuite.com,internal-api-lark-api.feishu.cn,internal-api-lark-api.larksuite.com"
        _bpe_pub="${_bpe_pub},work.weixin.qq.com,qyapi.weixin.qq.com,api.line.me,api-data.line.me"
        _bpe_pub="${_bpe_pub},login.microsoftonline.com,graph.microsoft.com,outlook.office.com,outlook.live.com"
        _bpe_pub="${_bpe_pub},api.atlassian.com,id.atlassian.com,gateway.atlassian.com"
        _bpe_no="${_bpe_no},${_bpe_pub}"
        if [ -n "${NEMOCLAW_SANDBOX_NO_PROXY_EXTRA:-}" ]; then
          _bpe_no="${_bpe_no},${NEMOCLAW_SANDBOX_NO_PROXY_EXTRA}"
        fi
        echo "http_proxy=$_bpe_url https_proxy=$_bpe_url HTTP_PROXY=$_bpe_url HTTPS_PROXY=$_bpe_url no_proxy=$_bpe_no NO_PROXY=$_bpe_no"
      }
      # TLS trust bundle for sandbox HTTPS MITM (openshell egress proxy re-signs TLS).
      _build_openshell_tls_stack_env() {
        if [ -r /etc/openshell-tls/ca-bundle.pem ]; then
          echo "SSL_CERT_FILE=/etc/openshell-tls/ca-bundle.pem SSL_CERT_DIR=/etc/ssl/certs NODE_EXTRA_CA_CERTS=/etc/openshell-tls/ca-bundle.pem GIT_SSL_CAINFO=/etc/openshell-tls/ca-bundle.pem REQUESTS_CA_BUNDLE=/etc/openshell-tls/ca-bundle.pem CURL_CA_BUNDLE=/etc/openshell-tls/ca-bundle.pem"
        elif [ -r /etc/ssl/certs/ca-certificates.crt ]; then
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt SSL_CERT_DIR=/etc/ssl/certs"
        fi
      }
      _TLS_STACK_ENV=$(_build_openshell_tls_stack_env)
      [ -z "$_TLS_STACK_ENV" ] || echo "[sandbox-gw] TLS stack env for MITM proxy (gateway children): ${_TLS_STACK_ENV}"
      # Manual override (rarely needed; only set when openshell or Olares
      # operators ship a non-default sandbox proxy that detection cannot
      # reach -- e.g. a different listen port or off-default netns layout):
      _PROXY_ENV=""
      if [ -n "${NEMOCLAW_SANDBOX_HTTP_PROXY:-}" ]; then
        _PROXY_ENV=$(_build_proxy_env "$NEMOCLAW_SANDBOX_HTTP_PROXY")
        echo "[sandbox-gw] sandbox egress proxy from NEMOCLAW_SANDBOX_HTTP_PROXY env: ${NEMOCLAW_SANDBOX_HTTP_PROXY}"
      fi
      # Discord gateway WSS can fail intermittently with:
      _NODE_OPTIONS_VALUE="${NEMOCLAW_GATEWAY_NODE_OPTIONS:---dns-result-order=ipv4first --network-family-autoselection-attempt-timeout=5000}"
      _NODE_OPTIONS_VALUE=$(printf "%s" "$_NODE_OPTIONS_VALUE" | tr -d "\"")
      _NODE_DNS_ENV="NODE_OPTIONS=\"${_NODE_OPTIONS_VALUE}\""
      LAUNCH="HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config ${GOG_ENV} ${_TLS_STACK_ENV} ${_PROXY_ENV} ${_NODE_DNS_ENV} PATH=${_PIN_PATH_PREFIX}/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin nohup ${OPENCLAW_BIN} gateway run --port 18789 --bind loopback --auth none --allow-unconfigured >>/sandbox/.openclaw-data/gateway.out 2>&1 </dev/null"
      # OpenShell >= 0.0.36 puts processes started via "nemoclaw my-assistant connect"
      AGENT_NETNS=$(readlink /proc/self/ns/net 2>/dev/null)

      #
      _decide_gateway_netns() {
        _dgn_mode="${NEMOCLAW_GATEWAY_NETNS:-agent}"
        case "$_dgn_mode" in
          agent)
            GW_NETNS_MODE=agent
            GW_NETNS_REASON="explicit NEMOCLAW_GATEWAY_NETNS=agent (TUI will be unavailable; WebUI + messaging channels work)"
            return 0
            ;;
          user)
            GW_NETNS_MODE=user
            GW_NETNS_REASON="explicit NEMOCLAW_GATEWAY_NETNS=user (TUI + WebUI work; messaging channels cannot reach public WSS)"
            return 0
            ;;
          auto|"")
            ;;
          *)
            echo "[sandbox-gw] WARN: NEMOCLAW_GATEWAY_NETNS=${_dgn_mode} unrecognized; treating as auto" >&2
            ;;
        esac
        # auto branch: scan openclaw.json for any non-default channel that is enabled.
        GW_NETNS_MODE=user
        GW_NETNS_REASON="auto: no enabled non-default channel in openclaw.json (TUI+WebUI concurrency preserved)"
        if [ -f /sandbox/.openclaw/openclaw.json ] && command -v python3 >/dev/null 2>&1; then
          _dgn_chans=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); ch=(d.get(\"channels\") or {}); en=[k for k,v in ch.items() if k!=\"defaults\" and isinstance(v,dict) and v.get(\"enabled\") is True]; print(\",\".join(sorted(en)))" /sandbox/.openclaw/openclaw.json 2>/dev/null) || _dgn_chans=""
          if [ -n "$_dgn_chans" ]; then
            GW_NETNS_MODE=agent
            GW_NETNS_REASON="auto: channels enabled in openclaw.json: ${_dgn_chans} (user netns has no public route; ws lib ignores HTTPS_PROXY)"
          fi
        fi
      }
      GW_NETNS_MODE=user
      GW_NETNS_REASON="(uninitialized)"
      _decide_gateway_netns
      echo "[sandbox-gw] gateway netns choice: ${GW_NETNS_MODE} -- ${GW_NETNS_REASON}"

      USER_NETNS_PID=""
      if [ "$GW_NETNS_MODE" = "user" ] && [ -n "$AGENT_NETNS" ] && command -v nsenter >/dev/null 2>&1; then
        # Prefer well-known names first (cheap, deterministic). Fall through to a
        # full /proc walk only if none match.
        for _name in openshell sshd ssh node openclaw bash; do
          # ps options vary across busybox/distro -- keep -ef portable.
          for _cand in $(ps -ef 2>/dev/null | awk -v n="$_name" "index(\$0,n) && !/awk/ && !/grep/ {print \$2}"); do
            [ -r "/proc/$_cand/ns/net" ] || continue
            _ns=$(readlink "/proc/$_cand/ns/net" 2>/dev/null) || continue
            if [ -n "$_ns" ] && [ "$_ns" != "$AGENT_NETNS" ]; then
              USER_NETNS_PID="$_cand"
              echo "[sandbox-gw] netns picker: matched name=${_name} pid=${_cand} (ns=${_ns} != agent ${AGENT_NETNS})"
              break 2
            fi
          done
        done
        if [ -z "$USER_NETNS_PID" ]; then
          for _link in /proc/[0-9]*/ns/net; do
            [ -r "$_link" ] || continue
            _ns=$(readlink "$_link" 2>/dev/null) || continue
            if [ -n "$_ns" ] && [ "$_ns" != "$AGENT_NETNS" ]; then
              USER_NETNS_PID=$(echo "$_link" | awk -F/ "{print \$3}")
              echo "[sandbox-gw] netns picker: /proc walk matched pid=${USER_NETNS_PID} (ns=${_ns} != agent ${AGENT_NETNS})"
              break
            fi
          done
        fi
      fi
      if [ -n "$USER_NETNS_PID" ]; then
        # Auto-detect sandbox egress proxy from the picked user netns
        # (skip if operator already pinned NEMOCLAW_SANDBOX_HTTP_PROXY above).
        if [ -z "$_PROXY_ENV" ]; then
          _PROXY_URL=$(_detect_sandbox_proxy "$USER_NETNS_PID" 2>/dev/null) || true
          if [ -n "$_PROXY_URL" ]; then
            _PROXY_ENV=$(_build_proxy_env "$_PROXY_URL")
            echo "[sandbox-gw] sandbox egress proxy detected: ${_PROXY_URL} (probed via user-netns default route + TCP); injecting http_proxy/https_proxy into gateway env so LLM calls route through it"
          else
            _DSP_GW=$(nsenter --net="/proc/${USER_NETNS_PID}/ns/net" -- ip -4 route show default 2>/dev/null | awk "/^default/ {print \$3; exit}")
            echo "[sandbox-gw] WARN: no sandbox egress proxy reachable from user netns (default-gw=${_DSP_GW:-<none>}; tried ports 3128/8080/1080). Gateway will start without http_proxy and LLM calls to in-cluster Service IPs will fail. Set NEMOCLAW_SANDBOX_HTTP_PROXY env on the nemoclaw deployment to override (e.g. http://10.200.0.1:3128)."
          fi
          # Re-render LAUNCH now that _PROXY_ENV is known.
          LAUNCH="HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config ${GOG_ENV} ${_TLS_STACK_ENV} ${_PROXY_ENV} ${_NODE_DNS_ENV} PATH=${_PIN_PATH_PREFIX}/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin nohup ${OPENCLAW_BIN} gateway run --port 18789 --bind loopback --auth none --allow-unconfigured >>/sandbox/.openclaw-data/gateway.out 2>&1 </dev/null"
        fi
        echo "[sandbox-gw] launching gateway via nsenter into user netns (pid=${USER_NETNS_PID}) so TUI (also in user netns) can reach 127.0.0.1:18789 directly"
        if command -v runuser >/dev/null 2>&1; then
          nsenter --net="/proc/${USER_NETNS_PID}/ns/net" -- runuser -u "$SBX_USER" -- sh -c "$LAUNCH & sleep 2; exit 0"
        else
          nsenter --net="/proc/${USER_NETNS_PID}/ns/net" -- su - "$SBX_USER" -s /bin/sh -c "cd /sandbox; $LAUNCH & sleep 2; exit 0"
        fi
      else
        # Agent-netns launch path. Two sub-cases:
        if [ "$GW_NETNS_MODE" = "agent" ]; then
          echo "[sandbox-gw] launching gateway in agent netns (${GW_NETNS_REASON}); WebUI works via sandbox-tunnel.sh, TUI in user netns will show -- gateway disconnected: closed | idle -- by design"
        else
          echo "[sandbox-gw] WARN: no user-netns process detected yet; launching gateway in agent netns (TUI may show -- gateway disconnected: closed | idle -- until a user-netns process spawns)"
        fi
        if command -v runuser >/dev/null 2>&1; then
          runuser -u "$SBX_USER" -- sh -c "$LAUNCH & sleep 2; exit 0"
        else
          su - "$SBX_USER" -s /bin/sh -c "cd /sandbox; $LAUNCH & sleep 2; exit 0"
        fi
      fi
      exit 0
    ' 2>&1 | sed 's/^/[sandbox-gw] /'

    for i in $(seq 1 45); do
      if health_ok; then
        echo "[sandbox-gw] up after ${i}s"
        exit 0
      fi
      sleep 1
    done

    echo "[sandbox-gw] gateway still not responding after 45s; last log tail:"
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      tail -40 /sandbox/.openclaw-data/gateway.out 2>&1 | sed 's/^/[sandbox-gw] /'
    exit 1

  # Per-connection stdio<->TCP bridge used as socat EXEC target.
  sandbox-tunnel.sh: |
    #!/bin/sh
    CLUSTER_CTR="${CLUSTER_CTR:-openshell-cluster-nemoclaw}"
    NS="${NS:-openshell}"
    SBX="${SBX:-my-assistant}"
    PORT="${1:-18789}"
    # Rules learned the hard way (all tested):
    NODE_EXPR='const PORT=Number(process.env.TUNNEL_PORT||18789);const s=require("net").connect(PORT,"127.0.0.1");let done=false;function bye(c){if(done)return;done=true;try{process.stdout.end(()=>process.exit(c));}catch(_){process.exit(c);}}s.on("error",()=>bye(1));s.on("end",()=>bye(0));s.on("close",()=>bye(0));process.stdin.on("end",()=>{try{s.end();}catch(_){}setTimeout(()=>bye(0),15000);});process.stdin.on("error",()=>{});process.stdin.pipe(s,{end:false});s.pipe(process.stdout,{end:false});'
    exec docker exec -i "$CLUSTER_CTR" \
      kubectl -n "$NS" exec -i "$SBX" -c agent -- \
      env TUNNEL_PORT="$PORT" NODE_EXPR="$NODE_EXPR" sh -c '
        HEX_PORT=$(printf "%04X" "$TUNNEL_PORT")
        # 1) Same netns path: fast path for chat (openclaw gateway listens here).
        if grep -qE "^ *[0-9]+: [0-9A-F]+:${HEX_PORT} " /proc/net/tcp /proc/net/tcp6 2>/dev/null; then
          exec node -e "$NODE_EXPR"
        fi
        # 2) Well-known-name fast path: gog auth / openclaw listen on oauth/gateway ports.
        for name_pat in "gog auth" "openclaw-gatewa" "openclaw gateway"; do
          TPID=$(ps -eo pid,args 2>/dev/null | awk -v p="$name_pat" "index(\$0,p)&&!/awk/{print \$1;exit}")
          if [ -n "$TPID" ] && [ -r "/proc/$TPID/ns/net" ] \
             && grep -qE "^ *[0-9]+: [0-9A-F]+:${HEX_PORT} " \
                "/proc/$TPID/net/tcp" "/proc/$TPID/net/tcp6" 2>/dev/null; then
            exec nsenter --net=/proc/$TPID/ns/net -- node -e "$NODE_EXPR"
          fi
        done
        # 3) Fallback: walk /proc with strict column-aligned grep so we do not
        #    false-positive on HEX appearing in tx_queue / inode columns.
        SEEN=""
        for link in /proc/[0-9]*/ns/net; do
          [ -r "$link" ] || continue
          INO=$(readlink "$link" 2>/dev/null)
          case " $SEEN " in *" $INO "*) continue ;; esac
          SEEN="$SEEN $INO"
          PID=$(echo "$link" | awk -F/ "{print \$3}")
          if grep -qE "^ *[0-9]+: [0-9A-F]+:${HEX_PORT} " \
             "/proc/$PID/net/tcp" "/proc/$PID/net/tcp6" 2>/dev/null; then
            exec nsenter --net=/proc/"$PID"/ns/net -- node -e "$NODE_EXPR"
          fi
        done
        echo "[tunnel] no netns listens on port $TUNNEL_PORT" >&2
        exit 1
      '

  # Template for the sandbox's ~/.bash_profile. `__GOG_KEYRING_PASSWORD__` is the
  sandbox-bash-profile.tpl: |
    # nemoclaw-skill-env (managed; do not edit)
    # HOMEBREW_* knobs + HOMEBREW_CC/HOMEBREW_CXX/CC/CXX are written to /etc/environment
    export PATH="/sandbox/.local/bin:/sandbox/.local/go/bin:/sandbox/go/bin:$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin:$PATH"
    export GOG_KEYRING_BACKEND=file
    export GOG_KEYRING_PASSWORD='__GOG_KEYRING_PASSWORD__'
    # end-nemoclaw-skill-env

  # Runtime OpenClaw npm pin (NEMOCLAW_OPENCLAW_VERSION); canonical: files/pin-openclaw-in-sandbox.sh
  pin-openclaw-in-sandbox.sh: |
    #!/bin/sh
    # Pin sandbox runtime OpenClaw to NEMOCLAW_OPENCLAW_VERSION (post-build npm upgrade).
    # Canonical copy — also embedded as pin-openclaw-in-sandbox.sh in configmap-sandbox-bridge.yaml.
    set -u
    
    CLUSTER_CTR="${CLUSTER_CTR:-openshell-cluster-nemoclaw}"
    NS="${NS:-openshell}"
    SBX="${SBX:-my-assistant}"
    LOG="${NEMOCLAW_PIN_LOG_PREFIX:-[openclaw-pin]}"
    RESTART_GW="${NEMOCLAW_PIN_RESTART_GATEWAY:-0}"
    VERBOSE="${NEMOCLAW_PIN_VERBOSE:-0}"
    
    # Prefix log lines without sed (LOG may contain / | [ ] which break sed s///).
    _pin_log_pipe() {
      _pfx="${1:-}"
      while IFS= read -r _ln || [ -n "$_ln" ]; do
        printf '%s %s\n' "$_pfx" "$_ln"
      done
    }

    _agent_container_running() {
      docker exec "$CLUSTER_CTR" kubectl -n "$NS" get pod "$SBX" \
        -o 'jsonpath={.status.containerStatuses[?(@.name=="agent")].state.running.startedAt}' 2>/dev/null \
        | grep -q .
    }
    
    _want="${NEMOCLAW_OPENCLAW_VERSION:-}"
    _want="${_want#v}"
    _sentinel=/workspace/.nemoclaw-openclaw-pin
    
    if [ "${1:-}" = "--check-only" ]; then
      [ -z "$_want" ] && exit 0
      _have=""
      if [ -f "$_sentinel" ]; then
        _have=$(head -1 "$_sentinel" 2>/dev/null | tr -d '\r\n ')
      fi
      [ "$_have" = "$_want" ] || exit 1
      _agent_container_running || exit 1
      _kx="docker exec $CLUSTER_CTR kubectl -n $NS exec $SBX -c agent --"
      _live=$($_kx env PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin" \
        sh -c 'openclaw --version 2>/dev/null | head -1 | awk "{for(i=1;i<=NF;i++) if (\$i ~ /^v?[0-9]+\\.[0-9]+\\./) {print \$i; exit}}" | tr -d "v"' 2>/dev/null | tr -d '\r\n ')
      [ "$_live" = "$_want" ] && exit 0
      exit 1
    fi
    
    if [ ! -f /workspace/.nemoclaw-installed ]; then
      exit 0
    fi

    if ! _agent_container_running; then
      echo "${LOG} sandbox pod ${NS}/${SBX} agent container not running; skip pin this tick (sandbox may be creating or rebuilding)"
      exit 1
    fi
    
    if [ -z "$_want" ]; then
      docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
        sh -c 'test -f /sandbox/.openclaw-pinned-marker && rm -f /sandbox/.openclaw-pinned-marker && echo "removed pin marker (env cleared)" || true' \
        2>/dev/null | _pin_log_pipe "$LOG" || true
      rm -f "$_sentinel" 2>/dev/null || true
      if [ "$VERBOSE" = "1" ]; then
        echo "${LOG} NEMOCLAW_OPENCLAW_VERSION unset — using sandbox build pin; no runtime upgrade"
      fi
      exit 0
    fi
    
    _have=""
    if [ -f "$_sentinel" ]; then
      _have=$(head -1 "$_sentinel" 2>/dev/null | tr -d '\r\n ')
    fi
    
    _kx="docker exec $CLUSTER_CTR kubectl -n $NS exec $SBX -c agent --"
    _live=$($_kx env PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin" \
      sh -c 'openclaw --version 2>/dev/null | head -1 | awk "{for(i=1;i<=NF;i++) if (\$i ~ /^v?[0-9]+\\.[0-9]+\\./) {print \$i; exit}}" | tr -d "v"' 2>/dev/null | tr -d '\r\n ')
    
    if [ -n "$_live" ] && [ "$_live" = "$_want" ]; then
      if [ "$_have" != "$_want" ]; then
        mkdir -p /workspace 2>/dev/null || true
        printf "%s\n" "$_want" > "$_sentinel"
      fi
      $_kx python3 /sandbox/.nemoclaw/patch-openclaw-gog-skill.py 2>/dev/null \
        2>&1 | _pin_log_pipe "${LOG}:gog-skill" || true
      if [ "$VERBOSE" = "1" ]; then
        echo "${LOG} live sandbox openclaw=${_live} matches NEMOCLAW_OPENCLAW_VERSION=${_want}; no action"
      fi
      exit 0
    fi
    
    echo "${LOG} DRIFT: live sandbox openclaw=${_live:-<unknown>} vs NEMOCLAW_OPENCLAW_VERSION=${_want}; pinning via npm install -g openclaw@${_want}"
    
    # Gateway holds dist/extensions open; npm global upgrade then hits ENOTEMPTY if we
    # install while it is still running. Stop it before rm/npm (restart after success).
    echo "${LOG} stopping sandbox gateway before npm upgrade"
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      sh -c '
        pkill -9 -f "openclaw[- ]gateway" 2>/dev/null || true
        sleep 2
        pgrep -fa "openclaw[- ]gateway" 2>/dev/null && echo "WARN: gateway still alive after pkill -9" || echo "gateway stopped"
      ' 2>&1 | _pin_log_pipe "$LOG" || true
    
    _ok=0
    _log_capture=$($_kx sh -c "
        set -e
        VER=\"${_want}\"
        install_flags='--no-fund --no-audit --prefer-online --force'
        cleanup_targets='/usr/local/lib/node_modules/openclaw /sandbox/.local/lib/node_modules/openclaw /tmp/npm-global/lib/node_modules/openclaw'
        npm cache clean --force >/dev/null 2>&1 || true
        for d in \$cleanup_targets; do rm -rf \"\$d\" 2>/dev/null || true; done
        sleep 1
        if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
          for d in \$cleanup_targets; do sudo rm -rf \"\$d\" 2>/dev/null || true; done
          sudo npm install -g \$install_flags \"openclaw@\$VER\" 2>&1
        elif [ -w /usr/local/lib ]; then
          npm install -g \$install_flags \"openclaw@\$VER\" 2>&1
        else
          echo 'system /usr/local not writable; falling back to /sandbox/.local prefix'
          rm -rf /sandbox/.local/lib/node_modules/openclaw /tmp/npm-global/lib/node_modules/openclaw 2>/dev/null || true
          mkdir -p /sandbox/.local
          NPM_CONFIG_PREFIX=/sandbox/.local npm install -g \$install_flags \"openclaw@\$VER\" 2>&1
          ln -sf /sandbox/.local/bin/openclaw /usr/local/bin/openclaw 2>/dev/null \
            || echo 'note: cannot symlink /usr/local/bin/openclaw (read-only); /sandbox/.local/bin/openclaw must come first in gateway PATH'
        fi
        _ver_out=\$(openclaw --version 2>&1 | head -1) || _ver_out='<exec failed>'
        echo \"post-install: \$_ver_out\"
        case \"\$_ver_out\" in
          *\"\$VER\"*) ;;
          *)
            echo \"FAIL: --version output does not contain \$VER (got: \$_ver_out)\"
            exit 11
            ;;
        esac
        _probe=\"const Module=require('module');const r=Module.createRequire('/usr/local/lib/node_modules/openclaw/');try{const p=r.resolve('openclaw');console.log('resolve OK:',p);}catch(e){if(e&&e.code==='MODULE_NOT_FOUND'){const r2=Module.createRequire('/sandbox/.local/lib/node_modules/openclaw/');try{const p=r2.resolve('openclaw');console.log('resolve OK:',p);}catch(e2){console.error('resolve FAIL:',e2&&e2.message);process.exit(12);}}else{console.error('resolve FAIL:',e&&e.message);process.exit(12);}}\"
        node -e \"\$_probe\"
      " 2>&1) && _ok=1
    
    printf '%s\n' "$_log_capture" | _pin_log_pipe "$LOG"
    
    if [ "$_ok" != "1" ]; then
      echo "${LOG} WARN: openclaw upgrade to ${_want} did NOT pass post-install verify; next tick will retry"
      exit 1
    fi
    
    mkdir -p /workspace 2>/dev/null || true
    printf "%s\n" "$_want" > "$_sentinel"
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      sh -c "printf '%s\n' '${_want}' > /sandbox/.openclaw-pinned-marker && chown sandbox:sandbox /sandbox/.openclaw-pinned-marker 2>/dev/null; ls -l /sandbox/.openclaw-pinned-marker 2>&1" \
      2>&1 | _pin_log_pipe "${LOG} marker:"
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      python3 /sandbox/.nemoclaw/patch-openclaw-gog-skill.py 2>/dev/null \
      2>&1 | _pin_log_pipe "${LOG}:gog-skill" || true
    
    if [ "$RESTART_GW" = "1" ]; then
      echo "${LOG} killing existing gateway so new openclaw binary launches"
      docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
        sh -c '
          pkill -9 -f "openclaw[- ]gateway" 2>/dev/null
          sleep 1
          pgrep -fa "openclaw[- ]gateway" 2>/dev/null && echo "WARN: gateway still alive after pkill -9" || echo "gateway gone"
        ' 2>&1 | _pin_log_pipe "$LOG"
      echo "${LOG} forcing gateway restart"
      sh /opt/nemoclaw/sandbox-ensure-gateway.sh 2>&1 | _pin_log_pipe "${LOG} gw:"
    fi
    
    exit 0
  # Gog shim (Olares hydration has no Helm .Files — edit files/gog-shim-reconcile.sh then re-embed here).
  # Brew wrapper: steipete/tap/gogcli -> openclaw/tap/gogcli for openclaw skills.
  # Brew wrapper: steipete/tap/gogcli -> openclaw/tap/gogcli for openclaw skills.
  # Brew wrapper: steipete/tap/gogcli -> openclaw/tap/gogcli for openclaw skills.
  brew-local-wrapper.sh: |
    #!/bin/sh
    # nemoclaw-brew-wrapper:v2
    # Redirect steipete/tap/gogcli -> openclaw/tap/gogcli for openclaw config --section skills.
    # Strips extra quotes OpenClaw sometimes passes (avoids ""openclaw/tap/gogcli"").
    set -u
    export HOMEBREW_PREFIX=/sandbox/.linuxbrew
    export HOMEBREW_REPOSITORY=/sandbox/.linuxbrew/Homebrew
    export HOMEBREW_CELLAR=/sandbox/.linuxbrew/Cellar
    export HOMEBREW_NO_AUTO_UPDATE=1
    export HOMEBREW_NO_ENV_HINTS=1
    export HOMEBREW_NO_ANALYTICS=1
    export HOMEBREW_NO_ENV_FILTERING=1
    : "${HOMEBREW_TEMP:=/tmp/homebrew-tmp}"; export HOMEBREW_TEMP
    : "${HOMEBREW_CACHE:=/tmp/homebrew-cache}"; export HOMEBREW_CACHE
    : "${HOMEBREW_LOGS:=/tmp/homebrew-logs}"; export HOMEBREW_LOGS
    : "${TMPDIR:=/tmp/homebrew-tmp}"; export TMPDIR
    mkdir -p "$HOMEBREW_TEMP" "$HOMEBREW_CACHE" "$HOMEBREW_LOGS" 2>/dev/null || true
    
    REAL=/sandbox/.linuxbrew/Homebrew/bin/brew
    
