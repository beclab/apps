      chmod 1777 /tmp/homebrew-tmp /tmp/homebrew-cache /tmp/homebrew-logs 2>/dev/null || true
      BP="$SBX_HOME/.bash_profile"
      [ -f "$BP" ] || touch "$BP"
      if grep -q "nemoclaw-skill-env" "$BP" 2>/dev/null; then
        awk "/^# nemoclaw-skill-env \(managed; do not edit\)/{s=1;next} /^# end-nemoclaw-skill-env/{s=0;next} !s{print}" \
          "$BP" > "$BP.new" && mv "$BP.new" "$BP"
