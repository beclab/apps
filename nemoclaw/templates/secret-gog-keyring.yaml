# Persists the gog CLI keyring passphrase across helm upgrades.
# - First install: helpers generate `randAlphaNum 8` and write it here.
# - Later renders: `lookup` returns the Secret, helpers re-read the stored
#   value, so `helm upgrade` never rotates the passphrase (rotation would
#   leave the on-disk `~/.config/gog/` keyring unreadable until the user
#   re-runs `gog auth add`).
# - User pins: setting olaresEnv.GOG_KEYRING_PASSWORD in the Olares UI
#   overrides both the Secret and the fresh random path on every reconcile.
apiVersion: v1
kind: Secret
metadata:
  name: nemoclaw-gog-keyring
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: nemoclaw
    app.kubernetes.io/component: gog-keyring
  annotations:
    # Tell Helm to keep the Secret around on uninstall so a later
    # reinstall can reuse the passphrase and still decrypt an existing
    # keyring on the workspace hostPath.
    helm.sh/resource-policy: keep
type: Opaque
data:
  password: {{ include "nemoclaw.gogKeyringPassword" . | b64enc | quote }}
