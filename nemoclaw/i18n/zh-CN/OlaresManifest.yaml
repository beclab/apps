metadata:
  title: NemoClaw
  description: NVIDIA NemoClaw - 具有沙盒隔离的 AI 编程代理
spec:
  fullDescription: |
    **产品概述**
    NVIDIA NemoClaw 是一个开源参考架构，旨在更安全、便捷地运行 [OpenClaw](https://openclaw.ai) 常驻助理。
    它会安装 [NVIDIA OpenShell](https://github.com/NVIDIA/OpenShell) 运行时，该组件是 NVIDIA Agent Toolkit 的一部分，为运行自主代理提供了更高的安全保障。

    > **Alpha 版本软件**
    >
    > NemoClaw 从 2026 年 3 月 16 日起以早期预览版提供。该软件尚未达到生产可用水平，接口、API 和行为在设计迭代过程中可能随时发生变化。项目的发布旨在收集反馈，促进早期试用。在项目演进阶段，我们欢迎社区提出问题和讨论。

    官方文档: [NemoClaw 中文文档](https://docs.nvidia.com/nemoclaw/latest/index.html)，[远程面板 / CHAT_UI_URL](https://docs.nvidia.com/nemoclaw/latest/deployment/deploy-to-remote-gpu.html#remote-dashboard-access)。

    **Olares**
    - **CLI** — 终端入口：`nemoclaw my-assistant connect` 后执行 `openclaw tui`。OpenShell：`openshell status` / `openshell doctor`。
    - **Web UI** — 配置 **CHAT_UI_URL** 或 Olares **domain.webtui**；Chart 会写入 **allowedOrigins**。网关令牌：`nemoclaw my-assistant gateway-token --quiet`。
    - **环境变量** — 必填：**NEMOCLAW_PROVIDER**、**NEMOCLAW_ENDPOINT_URL**（含 /v1）、**NEMOCLAW_MODEL**。可选：**NEMOCLAW_OPENCLAW_VERSION**（默认固定 OpenClaw 版本）、策略层级/模式、网关 netns 等。完整说明见英文主清单。

  upgradeDescription: |
    Olares Chart **1.0.12**：沙盒内 OpenClaw 运行时升级至 **2026.5.20**（原 2026.5.7）。

    **OpenClaw**
    - 默认 **NEMOCLAW_OPENCLAW_VERSION** 为 **2026.5.20**。Onboard 完成后，Chart 在沙盒内执行 `npm install -g openclaw@2026.5.20` 并重启网关，CLI、Web UI 与频道侧车将使用新版本。
    - **构建期与运行期分离：** 新增 **NEMOCLAW_OPENCLAW_BUILD_VERSION**（默认 `2026.4.24`，对应 NemoClaw v0.0.38 Patch 4），与运行期版本独立；首次安装仍使用经测试的构建钉扎，安装结束后再升级到 2026.5.20。