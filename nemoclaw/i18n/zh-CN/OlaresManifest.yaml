metadata:
  title: NemoClaw
  description: NVIDIA NemoClaw - 具有沙盒隔离的 AI 编程代理
spec:
  fullDescription: |
    # 应用概览
    NemoClaw 是 NVIDIA 的 AI 编程代理，在 Kubernetes 上运行，使用 Docker-in-Docker
    实现安全的沙盒隔离。它可以连接任何 OpenAI 兼容的 LLM 端点
    （包括 NVIDIA Dynamo）来提供自主编程助手。

    # 主要功能
    Docker-in-Docker 沙盒
    - 在隔离的 Docker 容器中运行代码，确保安全性。

    灵活的 LLM 后端
    - 通过可配置的环境变量连接任何 OpenAI 兼容 API 端点。

    Kubernetes 原生
    - 专为 K8s 部署设计，具有合理的资源管理。

    NVIDIA Dynamo 集成
    - 通过 socat DNS 桥接原生支持 NVIDIA Dynamo 推理端点。

    非交互式安装
    - 通过官方 NemoClaw 安装程序完全自动化安装。

    入口说明（详见 [NemoClaw 文档](https://docs.nvidia.com/nemoclaw/latest/index.html)）
    - **Terminal**：`nemoclaw my-assistant connect` 后 `openclaw tui`；CLI 上使用 `openshell status`（无单独网关浏览器入口）。
    - **OpenClaw Web UI**：浏览器控制台；配置 **CHAT_UI_URL** 或使用 Olares **domain.webtui**（入口 name：**webtui**）；Chart 会写入 **gateway.controlUi.allowedOrigins**。可选 **OPENCLAW_EXTRA_ALLOWED_ORIGINS**（逗号分隔多个源站）。

    # 配置说明
    Olares 应用环境变量：
    - CHAT_UI_URL / domain.webtui：与浏览器地址栏一致的源站（scheme+主机）。
    - OPENCLAW_EXTRA_ALLOWED_ORIGINS：额外允许的 origin。
    - NEMOCLAW_PROVIDER（必填）：LLM provider。最常用 `custom`（任意 OpenAI 兼容端点），也支持 ollama/openai/anthropic/gemini/build 等。
    - NEMOCLAW_ENDPOINT_URL（必填）：OpenAI 兼容 /v1 端点，须能在安装期被 Pod 访问到。Ollama 请在原地址后追加 `/v1`。
    - NEMOCLAW_MODEL（必填）：模型 id，须能在 `GET {ENDPOINT}/models` 中列出。
    - COMPATIBLE_API_KEY：API key，默认 `unused`（Ollama 不校验）。
    - NEMOCLAW_OPENCLAW_INFERENCE_API（可选）：若设置，会在网关自检循环中改写沙盒内 OpenClaw 配置 `models.providers.inference.api`。留空则保持 onboard 写入的默认值；仅当你的推理栈需要特定 OpenClaw API 模式时再填。
    - NEMOCLAW_OPENCLAW_MAX_AGENT_TIMEOUT（可选）：网关口径改写 `agents.defaults.timeoutSeconds` 的上限（秒）。留空=300；本机大模型首包/生成常超过 5 分钟时可填 600-1200+，缓解日志里 `reason=timeout` 而 `curl` 到 inference 仍 200 的情况。
    - DYNAMO_HOST：可选，旧版 socat 代理用，默认留空即禁用。
  upgradeDescription: |
    NemoClaw 在 Olares 上的首次发布。
    从官方 NVIDIA NemoClaw Kubernetes 清单移植。
