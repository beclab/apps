metadata:
  title: NemoClaw
  description: NVIDIA NemoClaw - AI Coding Agent with Sandbox Isolation
spec:
  fullDescription: |
    **Overview**
    NVIDIA NemoClaw is an open source reference stack that simplifies running [OpenClaw](https://openclaw.ai) always-on assistants more safely.
    It installs the [NVIDIA OpenShell](https://github.com/NVIDIA/OpenShell) runtime, part of NVIDIA Agent Toolkit, which provides additional security for running autonomous agents.

    > **Alpha software**
    >
    > NemoClaw is available in early preview starting March 16, 2026. This software is not production-ready. Interfaces, APIs, and behavior may change without notice as we iterate on the design. The project is shared to gather feedback and enable early experimentation. We welcome issues and discussion from the community while the project evolves.

    Official docs: [NemoClaw](https://docs.nvidia.com/nemoclaw/latest/index.html), [Remote dashboard / CHAT_UI_URL](https://docs.nvidia.com/nemoclaw/latest/deployment/deploy-to-remote-gpu.html#remote-dashboard-access).

    **Olares**
    - **CLI** — Terminal; `nemoclaw my-assistant connect` then `openclaw tui`. OpenShell: `openshell status` / `openshell doctor`.
    - **Web UI** — Set **CHAT_UI_URL** or Olares **domain.webtui**; chart patches **allowedOrigins**. Gateway token: `nemoclaw my-assistant gateway-token --quiet`.
    - **Env** — Required: **NEMOCLAW_PROVIDER**, **NEMOCLAW_ENDPOINT_URL** (/v1), **NEMOCLAW_MODEL**. Optional: **NEMOCLAW_OPENCLAW_VERSION** (default pinned OpenClaw), policy tier/mode, gateway netns. See the English manifest for full descriptions.
