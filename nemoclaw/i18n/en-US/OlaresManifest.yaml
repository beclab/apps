metadata:
  title: NemoClaw
  description: NVIDIA NemoClaw - AI Coding Agent with Sandbox Isolation
spec:
  fullDescription: |
    # Overview
    NemoClaw is NVIDIA's AI coding agent that runs on Kubernetes with Docker-in-Docker
    for secure sandbox isolation. It connects to any OpenAI-compatible LLM endpoint
    (including NVIDIA Dynamo) to provide an autonomous coding assistant.

    # Key Features
    Docker-in-Docker Sandbox
    - Runs code in isolated Docker containers for safety.

    Flexible LLM Backend
    - Connects to any OpenAI-compatible API endpoint via configurable environment variables.

    Kubernetes Native
    - Designed for K8s deployment with proper resource management.

    NVIDIA Dynamo Integration
    - First-class support for NVIDIA Dynamo inference endpoints via socat DNS bridge.

    Non-Interactive Setup
    - Fully automated installation via the official NemoClaw installer.

    Entrances (see [NemoClaw docs](https://docs.nvidia.com/nemoclaw/latest/index.html))
    - **Terminal** — `nemoclaw my-assistant connect` then `openclaw tui`; `openshell status` on CLI (no separate gateway browser entry).
    - **OpenClaw Web UI** — Browser Control UI; set **CHAT_UI_URL** or Olares **domain.webtui** (entrance name **webtui**); chart patches **gateway.controlUi.allowedOrigins**. Optional **OPENCLAW_EXTRA_ALLOWED_ORIGINS** (comma-separated).

    # Configuration
    Olares app settings:
    - CHAT_UI_URL / domain.webtui: Web UI origin (must match browser).
    - OPENCLAW_EXTRA_ALLOWED_ORIGINS: Extra allowed origins if needed.
    - NEMOCLAW_PROVIDER (required): LLM provider. Most users want `custom` (any OpenAI-compatible endpoint); also supports ollama/openai/anthropic/gemini/build/etc.
    - NEMOCLAW_ENDPOINT_URL (required): OpenAI-compatible /v1 base URL. Must be reachable from this pod at install time. For Ollama hosts, append /v1.
    - NEMOCLAW_MODEL (required): Model id listed by GET {ENDPOINT}/models.
    - COMPATIBLE_API_KEY: API key, default `unused` (Ollama doesn't check auth).
    - NEMOCLAW_OPENCLAW_INFERENCE_API (optional): If set, NemoClaw rewrites OpenClaw sandbox config `models.providers.inference.api` on each gateway health loop. Leave empty to keep onboard defaults; use only when your inference stack requires a specific OpenClaw API mode.
    - NEMOCLAW_OPENCLAW_MAX_AGENT_TIMEOUT (optional): Cap for `agents.defaults.timeoutSeconds` on each ensure loop. Empty = 300s; use 600-1200+ for very slow local models when logs show `reason=timeout` but `curl https://inference.local/v1/models` is 200.
    - DYNAMO_HOST: Optional legacy socat proxy; empty disables it.
  upgradeDescription: |
    Initial release of NemoClaw on Olares.
    Ported from the official NVIDIA NemoClaw Kubernetes manifest.
