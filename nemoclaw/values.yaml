# Local helm overrides (`helm install -f values.yaml`). Olares injects userspace.appData at deploy.
# NEMOCLAW_OPENCLAW_BUILD_VERSION = Docker build pin (Patch 4). NEMOCLAW_OPENCLAW_VERSION = runtime pin.

olaresEnv:
  NEMOCLAW_OPENCLAW_VERSION: "2026.5.20"
  NEMOCLAW_OPENCLAW_BUILD_VERSION: "2026.4.24"
  NEMOCLAW_INSTALL_TAG: "v0.0.38"
  # NEMOCLAW_PROVIDER: custom
  # NEMOCLAW_ENDPOINT_URL: "http://your-llm-host/v1"
  # NEMOCLAW_MODEL: "your-model"
