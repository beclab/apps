metadata:
  title: Immich
  description: High performance self-hosted photo and video management solution.
spec:
  fullDescription: |
    **OVERVIEW**
    Immich is a self-hosted photo and video management solution that allows you to back up your precious memories directly from your mobile phone.

    Here are some key features:
    **Web Portal and Mobile App**
    Immich provides a user-friendly web interface and a mobile app for both iOS and Android. You can easily browse, organize, and manage your media files.

    **Automatic Backup**
    Immich ensures that your photos and videos are automatically backed up, just like Google Photos. Say goodbye to manual uploads!

    **Bulk Upload**
    Need to transfer a large batch of files? Immich supports bulk uploads, making it efficient to migrate your existing media.

    **Partner Sharing**
    Share specific albums or memories with friends and family. Immich lets you collaborate and reminisce together.

    **Facial Recognition**
    Immich can recognize faces in your photos, making it easier to find specific people or moments.

    **Reverse Geocoding**
    Wondering where a particular photo was taken? Immich adds location information to your media.

  upgradeDescription: |
    Upgrade app version from v2.6.2 to v2.7.5
    
    Welcome to Immich v2.7.5. This upgrade covers the v2.7.x release series, including enhancements to the asset viewer, security improvements, deduplication improvements, and numerous bug fixes.
    
    Highlights (v2.7.0):
    
    Remove from Album (Asset Viewer):
    A new "Remove from album" action is available in the asset viewer for both album and asset owners.
    
    Editor Shortcuts:
    Press 'e' to open the editor, '[' or ']' to rotate +/- 90 degrees, and 'ENTER' to save and close.
    
    Create Face On-the-Fly:
    You can now create a new face/person directly from the face tagging editor interface.
    
    Deduplication Improvements:
    The server now automatically suggests which asset to keep based on image size and EXIF data, and synchronizes metadata including albums, favorites, rating, description, visibility, location, and tags.
    
    Helmet Configuration (CSP):
    You can now opt in to a Content Security Policy by setting IMMICH_HELMET_FILE=true. Custom policies are also supported via a configuration file path.
    
    Version Check Infrastructure:
    Version checks now use version.immich.cloud instead of github.com for improved privacy.
    
    Notable Bug Fixes:
    - Live photo and video download in Safari now works correctly.
    - Escape HTML in Panorama Photo Viewer (XSS fix).
    - Rate limit and deduplication added to version check.
    - Image rendering fixes on mobile app.
    - People search fixed for 3 or less characters.

    Full release notes: https://github.com/immich-app/immich/releases/tag/v2.7.5
