metadata:
  title: Immich
  description: High performance self-hosted photo and video management solution.
spec:
  fullDescription: |
    ## OVERVIEW ##  
    Immich is a self-hosted photo and video management solution that allows you to back up your precious memories directly from your mobile phone.

    Here are some key features:
    - Web Portal and Mobile App:
    Immich provides a user-friendly web interface and a mobile app for both iOS and Android. You can easily browse, organize, and manage your media files.

    - Automatic Backup
    Immich ensures that your photos and videos are automatically backed up, just like Google Photos. Say goodbye to manual uploads!

    - Bulk Upload
    Need to transfer a large batch of files? Immich supports bulk uploads, making it efficient to migrate your existing media.

    - Partner Sharing
    Share specific albums or memories with friends and family. Immich lets you collaborate and reminisce together.

    - Facial Recognition
    Immich can recognize faces in your photos, making it easier to find specific people or moments.

    - Reverse Geocoding
    Wondering where a particular photo was taken? Immich adds location information to your media.

  upgradeDescription: |
    Upgrade app version from v2.5.2 to v2.6.2
    
    Welcome to Immich v2.6.2, This release is a collection of more than 350 commits over 6 weeks. I know, it is an eternity between releases compared to our previous era. This version focuses on bug fixes and enhancements across the app to provide a more delightful and smoother experience to you. This release also prepares for the next major release in the coming month, which will remove the old timeline implementation. 
    
    Let's dive into the highlights of the release:
    Map Side Panel (Web): 
    Clicking on a cluster of assets in the map view now opens a mini-timeline side panel for easier viewing and bulk actions.
        
    Shared Link Presets: 
    The interface for setting shared link expiration has been improved with presets for easier understanding.
    
    Administration & Security:
    - New Admin Command: A new immich-admin schema-checkcommand has been added to validate database schema.
    - OAuth Enhancement: Added support for reading profile claims directly from the ID token, enabling compatibility with providers like Microsoft ADFS that lack a userinfo endpoint.
    
    Notable Bug Fixes:
      - Cast videos now automatically loop.
      - Correctly extract make and model from Sony XAVC video files.
      - Fixed escape key handling on web, the health check endpoint in maintenance mode, timeline rendering for RTL languages (e.g., Arabic, Hebrew), and more.

    Full release notes: https://github.com/immich-app/immich/releases/tag/v2.6.2
