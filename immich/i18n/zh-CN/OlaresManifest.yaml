metadata:
  description: 高性能自建照片视频管理方案。
  title: Immich
spec:
  fullDescription: |
    ## 应用概览 ##
    Immich 允许您直接从手机备份重要回忆。

    主要功能包括：
    - 网页和移动应用：
    Immich 提供便捷的网页界面及 iOS 和 Android 应用。轻松浏览、整理和管理媒体文件。

    - 自动备份
    像 Google Photos 一样，Immich 自动备份您的照片和视频。再也不用手动上传了！

    - 批量上传
    需要传输大量文件？Immich 支持批量上传，迁移媒体高效便捷。

    - 分享给伙伴
    与亲友分享特定相册或记忆。 Immich 让您能够共同协作和回顾。

    - 人脸识别
    Immich 能识别照片中的人脸，帮您轻松找到特定人或时刻。

    - 逆地理编码
    想知道某张照片的拍摄地点？Immich 会为您的媒体添加地点信息。

  upgradeDescription: |
    应用版本从 v2.5.2 升级至 v2.6.2

    欢迎使用 Immich v2.6.2。本次发布历时 6 周，包含超过 350 次提交。我们知道，这是相较以往版本间隔较长的一次。本版本聚焦于修复 BUG 并提升体验，致力于为您带来更顺畅、更贴心的使用感受。同时，此版本也为下月即将推出的大版本做准备（将移除旧版时间轴实现）。

    下面是本次发布的重点内容：

    地图侧边栏（Web）：
    在地图视图中点击资产聚合点，现可打开迷你时间轴侧边栏，便于查看和批量操作。

    分享链接预设：
    设置分享链接过期时间时，界面新增预设选项，理解更直观。

    管理与安全性：
    - 新命令：新增 immich-admin schema-check 命令，用于验证数据库 schema。
    - OAuth 增强：支持直接从 ID token 读取用户信息，提升对像 Microsoft ADFS 等无 userinfo 端点服务的兼容性。

    重要问题修复：
      - 投屏视频现在可自动循环播放。
      - 可正确提取索尼 XAVC 视频文件的相机品牌和型号。
      - 修复网页端 ESC 键响应、维护模式健康检查接口、RTL 语言时间轴渲染（如阿拉伯语/希伯来语）等问题。

    完整发布说明: https://github.com/immich-app/immich/releases/tag/v2.6.2
