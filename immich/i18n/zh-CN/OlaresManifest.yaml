metadata:
  description: 高性能自建照片视频管理方案。
  title: Immich
spec:
  fullDescription: |
    **应用概览**
    Immich 是一个自建的照片和视频管理方案，允许您直接从手机备份重要回忆。

    主要功能包括：
    **网页和移动应用**
    Immich 提供便捷的网页界面及 iOS 和 Android 应用。轻松浏览、整理和管理媒体文件。

    **自动备份**
    像 Google Photos 一样，Immich 自动备份您的照片和视频。再也不用手动上传了！

    **批量上传**
    需要传输大量文件？Immich 支持批量上传，迁移媒体高效便捷。

    **分享给伙伴**
    与亲友分享特定相册或记忆。 Immich 让您能够共同协作和回顾。

    **人脸识别**
    Immich 能识别照片中的人脸，帮您轻松找到特定人或时刻。

    **逆地理编码**
    想知道某张照片的拍摄地点？Immich 会为您的媒体添加地点信息。

  upgradeDescription: |
    应用版本从 v2.6.2 升级至 v2.7.5

    欢迎使用 Immich v2.7.5。本次升级涵盖 v2.7.x 系列版本，包括资产查看器增强、安全改进、去重功能改进以及大量 Bug 修复。

    重点内容（v2.7.0）：

    从相册中移除（资产查看器）：
    资产查看器中新增"从相册中移除"操作，相册所有者和资产所有者均可使用。

    编辑器快捷键：
    按 'e' 打开编辑器，'[' 或 ']' 旋转 +/- 90 度，'ENTER' 保存并关闭。

    即时创建人脸：
    现可在人脸标记编辑器界面中直接创建新的人脸/人物。

    去重功能改进：
    服务器现可根据图像大小和 EXIF 数据自动建议保留哪个资产，并自动同步元数据（包括相册、收藏、评分、描述、可见性、位置和标签）。

    Helmet 配置（CSP）：
    现可通过设置 IMMICH_HELMET_FILE=true 启用内容安全策略（CSP）。也支持通过配置文件路径自定义策略。

    版本检查基础设施：
    版本检查现使用 version.immich.cloud 替代 github.com，提升隐私保护。

    重要问题修复：
      - Safari 中实况照片和视频下载现已正常工作。
      - 修复全景照片查看器中的 HTML 转义问题（XSS 修复）。
      - 版本检查添加速率限制和去重。
      - 移动端图片渲染修复。
      - 修复 3 个字符及以下的人物搜索问题。

    完整发布说明: https://github.com/immich-app/immich/releases/tag/v2.7.5
