olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: codex
  icon: https://app.cdn.olares.com/appstore/codex/icon.png
  description: OpenAI's lightweight coding agent that runs in your terminal
  appid: codex
  title: Codex CLI
  version: 1.0.2
  categories:
  - Developer Tools
  - Productivity_v112
  - Utilities
entrances:
- name: terminal
  host: terminal
  port: 80
  title: Codex CLI
  icon: https://app.cdn.olares.com/appstore/codex/icon.png
  openMethod: window
  authLevel: internal
spec:
  versionName: '0.125.0'
  fullDescription: |
    **Overview**
    Codex CLI is OpenAI's lightweight, open-source coding agent that runs locally in your terminal. It understands your codebase, executes routine tasks through natural language, and helps you ship faster while staying in flow.

    **Key Features**
    - Terminal-native TUI with streaming tool output, slash commands, interrupt-and-redirect, and rich diff review.
    - Real file edits, shell execution, git workflows, and test runs driven by natural language.
    - MCP-compatible tool calling and reusable agent instructions via AGENTS.md / `.codex/skills`.
    - Works with a ChatGPT Plus / Pro / Business / Edu / Enterprise plan (OAuth) or an OpenAI API key.
    - Workspace image ships common language runtimes and build toolchains (Python, Node.js, Go, Rust, OpenJDK 21, Ruby, PHP, Lua) plus database clients (PostgreSQL, MySQL/MariaDB, Redis), git-lfs, protobuf compiler, Gradle, tmux, dig/ss/nc, shellcheck, clang-format/tidy, graphviz, and extra -dev headers (libpq, MySQL client, curl, ICU, LDAP) so agents can run typical dev commands without root.
    - Optional Docker-in-Docker sidecar (`ENABLE_DIND`, default on): run `docker build`, `docker compose`, and containerized dev stacks from the terminal.

    **First-time Setup**
    Open the `Codex CLI` entrance and run `codex` to launch the OAuth login flow ("Sign in with ChatGPT"), or set `OPENAI_API_KEY` in the app environment variables and restart.

  upgradeDescription: |
    Terminal upgraded to `beclab/terminal:v0.0.11`: file upload support — paste
    screenshots, drag-and-drop files, or click the upload button to send files
    into the terminal session.

    Workspace memory raised (limit 16Gi -> 24Gi, request 256Mi -> 2Gi) to reduce
    out-of-memory crashes during heavy agent/build sessions.

    Base image `beclab/harveyff-codex-base` upgraded to 0.5.4.

    New:
    - Built-in `olares-cli` (vendor binary, full command set) on PATH.
    - Olares skill pack (cluster, dashboard, files, market, settings, shared)
      copied into `~/.codex/skills` at pod start via `init-skills`, so the agent
      can operate Olares without manual setup.
    - Expanded toolbox: `gh`, `ping`/`lsof`, `lrzsz` (sz/rz), `tree`, `nano`,
      `tcpdump`, `traceroute`, `httpie`, `aria2`, and common debug/network tools.
    - Optional Docker-in-Docker sidecar (`ENABLE_DIND`, default on): `docker` /
      `docker compose` in the terminal (privileged sidecar; extra app-data disk).

    Skills note: `init-skills` only refreshes directories that match the built-in
    Olares pack (same folder names). Your other skills under `~/.codex/skills` are
    left untouched. If you edited an Olares skill in place, those changes are
    overwritten on the next pod restart when the directory name matches.

  developer: OpenAI
  website: https://chatgpt.com/codex
  sourceCode: https://github.com/openai/codex
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/openai/codex/tree/main/docs
  license:
  - text: Apache-2.0
    url: https://github.com/openai/codex/blob/main/LICENSE
  requiredMemory: 3Gi
  limitedMemory: 44Gi
  requiredDisk: 1Gi
  limitedDisk: 50Gi
  requiredCpu: 500m
  limitedCpu: 12
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
    - Home
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.5-0'
envs:
  - envName: OPENAI_API_KEY
    type: password
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "OpenAI API key (leave empty to use interactive 'Sign in with ChatGPT' OAuth login)"
  - envName: OPENAI_BASE_URL
    type: url
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Custom OpenAI-compatible API endpoint (optional, for proxies or self-hosted gateways)"
  - envName: CODEX_MODEL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: ""
    description: "Override the default model (e.g. gpt-5-codex). Leave empty to use the Codex default."
  - envName: ENABLE_DIND
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "true"
    description: "Run a privileged Docker-in-Docker sidecar in the pod. Exposes docker CLI in the terminal via DOCKER_HOST=tcp://localhost:2375 (uses extra CPU/RAM/disk under app data). Disable if your environment forbids privileged containers"
  - envName: ALLOW_HOME_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Allow Codex CLI to read/write the Olares Home directory"
  - envName: ALLOW_EXTERNAL_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Allow Codex CLI to read/write the Olares External directory"
