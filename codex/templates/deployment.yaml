# Codex CLI on Olares
#
# Architecture:
#   - Base image: beclab/harveyff-codex-base (Ubuntu 24.04 with
#     common CLI deps pre-installed, non-root user UID 1000 baked in).
#   - initContainers:
#       * init-chmod-data (root): ensures /opt/data is owned by 1000:1000.
#       * init-skills (root): flattens baked Olares skills into ~/.codex/skills.
#       * init-install-codex (UID 1000): downloads the codex native
#         binary from the matching GitHub Release tarball into
#         /opt/data/.local/bin/ on first run for this version, then
#         leaves a versioned sentinel so subsequent restarts skip the
#         download and start instantly.
#       * init-docker-cli (optional, ENABLE_DIND): copies docker CLI +
#         compose/buildx plugins into a shared emptyDir.
#   - Optional docker-dind sidecar (ENABLE_DIND, default on): privileged
#     dockerd on tcp://localhost:2375; main container gets DOCKER_HOST.
#   - Main container runs as UID 1000 with all Linux capabilities
#     dropped and privilege escalation forbidden. The entrypoint is
#     `sleep infinity`; the real work happens when the Olares terminal
#     entrance kubectl-execs into this container.
#   - /opt/data is the single source of truth: ~/.codex (sessions,
#     auth.json, skills, config.toml) and .local/bin/codex. All
#     persisted through the app-data-home hostPath volume.
#   - Auto-updates are disabled de facto: upgrades go through chart
#     version bumps, which change the sentinel filename and trigger a
#     fresh download.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: codex
  name: "{{ .Release.Name }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: codex
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: codex
        bytetrade.io/terminal: codex
    spec:
      securityContext:
        fsGroup: 1000

      initContainers:
        # Fix ownership of the PVC so the non-root runtime user can
        # write to it. Root is required here because hostPath volumes
        # land on disk with root ownership on first create.
        - name: init-chmod-data
          image: "beclab/ubuntu:24.04"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /opt/data/.local/bin /opt/data/.codex/skills /opt/data/.install-state
              chown -R 1000:1000 /opt/data
              chmod -R 0755 /opt/data
              echo "[init-chmod-data] /opt/data owned by 1000:1000"
          resources: {}
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home

        # Flatten Olares skills from /skills-staging into Codex's
        # user skills dir (~/.codex/skills = /opt/data/.codex/skills).
        - name: init-skills
          image: "beclab/harveyff-codex-base:0.5.4"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -u
              if [ ! -d /skills-staging ]; then
                echo "[init-skills] /skills-staging not in image; skipping"
                exit 0
              fi
              mkdir -p /opt/data/.codex/skills
              for d in /skills-staging/*/; do
                name="$(basename "$d")"
                rm -rf "/opt/data/.codex/skills/$name"
                cp -a "$d" "/opt/data/.codex/skills/$name"
                chown -R 1000:1000 "/opt/data/.codex/skills/$name"
              done
              echo "[init-skills] Olares skills installed under /opt/data/.codex/skills:"
              ls -1 /skills-staging
          resources: {}
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home

        # First-run only (per appVersion): download the codex native
        # binary from the matching GitHub Release tarball into the
        # shared /opt/data PVC. Runs as UID 1000 since the installer
        # only writes under $HOME. A versioned sentinel file makes
        # subsequent Pod starts skip the download; bumping appVersion
        # in Chart.yaml automatically forces a re-download.
        - name: init-install-codex
          image: "beclab/harveyff-codex-base:0.5.4"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /opt/data
            - name: JAVA_HOME
              value: /usr/lib/jvm/java-21-openjdk-current
            - name: CODEX_VERSION
              value: "{{ .Chart.AppVersion }}"
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              SENTINEL="$HOME/.install-state/codex-${CODEX_VERSION}"
              mkdir -p "$HOME/.install-state" "$HOME/.local/bin"

              if [ -x "$HOME/.local/bin/codex" ] && [ -f "$SENTINEL" ]; then
                echo "[init-install-codex] cached binary found (installed $(cat "$SENTINEL"))"
                "$HOME/.local/bin/codex" --version
                exit 0
              fi

              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64|amd64)  TARGET="x86_64-unknown-linux-musl" ;;
                aarch64|arm64) TARGET="aarch64-unknown-linux-musl" ;;
                *) echo "[init-install-codex] unsupported arch: $ARCH" >&2; exit 1 ;;
              esac

              URL="https://github.com/openai/codex/releases/download/rust-v${CODEX_VERSION}/codex-${TARGET}.tar.gz"
              echo "[init-install-codex] downloading $URL"

              TMPDIR="$(mktemp -d)"
              trap 'rm -rf "$TMPDIR"' EXIT

              curl -fSL --retry 5 --retry-delay 3 -o "$TMPDIR/codex.tar.gz" "$URL"
              tar -xzf "$TMPDIR/codex.tar.gz" -C "$TMPDIR"

              # The release tarball contains a single binary entry whose
              # name includes the target triple, e.g. codex-x86_64-unknown-linux-musl.
              BIN="$(find "$TMPDIR" -maxdepth 2 -type f -name "codex-${TARGET}" | head -n1)"
              if [ -z "$BIN" ]; then
                echo "[init-install-codex] could not locate extracted codex binary" >&2
                ls -la "$TMPDIR" >&2
                exit 1
              fi

              install -m 0755 "$BIN" "$HOME/.local/bin/codex"
              date -u +%Y-%m-%dT%H:%M:%SZ > "$SENTINEL"
              echo "[init-install-codex] installed codex ${CODEX_VERSION} for ${TARGET}"
              "$HOME/.local/bin/codex" --version
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
        {{- if eq (toString .Values.olaresEnv.ENABLE_DIND) "true" }}
        - name: init-docker-cli
          image: "docker.io/beclab/docker:29.3.0-dind"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              # docker CLI itself
              cp /usr/local/bin/docker /docker-cli/docker
              # CLI plugins (docker compose / buildx). The dind image ships
              # these under one of the standard cli-plugins dirs; copy whatever
              # exists into the shared dir so the main container can find them.
              mkdir -p /docker-cli/cli-plugins
              for d in /usr/local/libexec/docker/cli-plugins \
                       /usr/local/lib/docker/cli-plugins \
                       /usr/libexec/docker/cli-plugins \
                       /usr/lib/docker/cli-plugins; do
                [ -d "$d" ] || continue
                cp "$d"/docker-compose /docker-cli/cli-plugins/ 2>/dev/null || true
                cp "$d"/docker-buildx  /docker-cli/cli-plugins/ 2>/dev/null || true
              done
              echo "[init-docker-cli] copied:" && ls -la /docker-cli /docker-cli/cli-plugins
          resources: {}
          volumeMounts:
            - mountPath: /docker-cli
              name: docker-cli-bin
        {{- end }}

      containers:
        # Workspace container. kubectl exec from the beclab terminal
        # apiserver lands here as UID 1000. HOME/PATH are set on env so
        # login / non-login / interactive / non-interactive shells all
        # see the codex binary on PATH.
        - name: codex
          image: "beclab/harveyff-codex-base:0.5.4"
          imagePullPolicy: IfNotPresent
          workingDir: /opt/data
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: Etc/UTC
            - name: TERM
              value: xterm-256color
            - name: HOME
              value: /opt/data
            - name: JAVA_HOME
              value: /usr/lib/jvm/java-21-openjdk-current
            - name: PATH
              value: "/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: CODEX_HOME
              value: /opt/data/.codex
            {{- with .Values.olaresEnv.OPENAI_API_KEY }}
            - name: OPENAI_API_KEY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.olaresEnv.OPENAI_BASE_URL }}
            - name: OPENAI_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.olaresEnv.CODEX_MODEL }}
            - name: CODEX_MODEL
              value: {{ . | quote }}
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ENABLE_DIND) "true" }}
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            {{- end }}
          command:
            - sleep
            - infinity
          resources:
            limits:
              cpu: "4"
              memory: 24Gi
            requests:
              cpu: 100m
              memory: 2Gi
          volumeMounts:
            - mountPath: /opt/data
              name: app-data-home
            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
            {{- if eq (toString .Values.olaresEnv.ENABLE_DIND) "true" }}
            - mountPath: /usr/local/bin/docker
              name: docker-cli-bin
              subPath: docker
              readOnly: true
            - mountPath: /usr/local/lib/docker/cli-plugins
              name: docker-cli-bin
              subPath: cli-plugins
              readOnly: true
            {{- end }}
        {{- if eq (toString .Values.olaresEnv.ENABLE_DIND) "true" }}
        - name: docker-dind
          image: "docker.io/beclab/docker:29.3.0-dind"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          command:
            - dockerd
            - --host
            - tcp://0.0.0.0:2375
            - --host
            - unix:///var/run/docker.sock
            - --mtu=1450
          ports:
            - containerPort: 2375
          startupProbe:
            exec:
              command:
                - docker
                - info
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - docker
                - info
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 5
          resources:
            limits:
              cpu: "8"
              memory: 16Gi
            requests:
              cpu: 200m
              memory: 512Mi
          volumeMounts:
            - mountPath: /var/lib/docker
              name: dind-storage
            # Share the workspace at the SAME path so bind-mounts resolve
            # correctly inside dockerd.
            - mountPath: /opt/data
              name: app-data-home
        {{- end }}

      restartPolicy: Always
      volumes:
        - name: app-data-home
          hostPath:
            path: "{{ .Values.userspace.appData }}/home"
            type: DirectoryOrCreate
        {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
        - name: olares-home-dir
          hostPath:
            path: "{{ .Values.userspace.userData }}"
            type: DirectoryOrCreate
        {{- end }}
        {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
        - name: olares-external-dir
          hostPath:
            path: "{{ .Values.sharedlib }}"
            type: DirectoryOrCreate
        {{- end }}
        {{- if eq (toString .Values.olaresEnv.ENABLE_DIND) "true" }}
        - name: docker-cli-bin
          emptyDir: {}
        - name: dind-storage
          hostPath:
            path: "{{ .Values.userspace.appData }}/docker"
            type: DirectoryOrCreate
        {{- end }}
