metadata:
  title: Codex CLI
  description: OpenAI 官方原版的终端 AI 编码助手
spec:
  fullDescription: |
    **概述**
    Codex CLI 是 OpenAI 官方推出的开源终端智能编码助手。它能够理解你的代码库，通过自然语言执行日常任务，帮助你更高效地开发和保持专注。

    **主要功能**
    - 基于终端的原生 TUI，支持工具实时输出流、斜杠命令、中断与重定向、丰富的差异审查体验。
    - 可通过自然语言进行真实文件编辑、Shell 执行、Git 工作流和测试操作。
    - 兼容 MCP 工具调用，可复用 AGENTS.md / `.codex/skills` 中的智能体指令。
    - 支持通过 ChatGPT Plus / Pro / Business / Edu / Enterprise 计划（OAuth 登录）或 OpenAI API 密钥使用。
    - 工作区镜像预装常见语言运行时与构建工具链（Python、Node.js、Go、Rust、OpenJDK 21、Ruby、PHP、Lua），以及数据库客户端（PostgreSQL、MySQL/MariaDB、Redis）、git-lfs、protobuf 编译器、Gradle、tmux、dig/ss/nc、shellcheck、clang-format/tidy、graphviz，以及各类常见 -dev 头文件（libpq、MySQL 客户端、curl、ICU、LDAP）等，便于在无 root 下完成常见开发任务。
    - 可选 Docker-in-Docker 边车（`ENABLE_DIND`，默认开启）：在终端中直接运行 `docker build`、`docker compose` 等容器化开发命令（特权边车容器）。

    **首次设置**
    打开 `Codex CLI` 入口并运行 `codex`，开启 OAuth 登录流程（“使用 ChatGPT 登录”）；也可在应用环境变量中配置 `OPENAI_API_KEY`，然后重启应用。
  upgradeDescription: |
    终端升级至 `beclab/terminal:v0.0.11`：新增文件上传功能——可粘贴截图、拖拽文件，
    或点击上传按钮将文件发送到终端会话。

    工作区内存上调（上限 16Gi → 24Gi，请求 256Mi → 2Gi），减少高强度 Agent/构建
    场景下的内存不足崩溃。

    基础镜像 `beclab/harveyff-codex-base` 升级至 0.5.4。

    新增：
    - 内置 `olares-cli`（vendor 裸二进制，完整子命令）已加入 PATH。
    - 启动时由 `init-skills` 将 Olares 技能包（cluster、dashboard、files、market、
      settings、shared）复制到 `~/.codex/skills`，Agent 可开箱操作 Olares。
    - 扩充工具箱：`gh`、`ping`/`lsof`、`lrzsz`（sz/rz）、`tree`、`nano`、`tcpdump`、
      `traceroute`、`httpie`、`aria2` 及常用网络/调试工具。
    - 可选 Docker-in-Docker 边车（`ENABLE_DIND`，默认开启）：终端内可用 `docker` /
      `docker compose`（特权边车，额外占用 app data 磁盘）。

    关于 Skills：`init-skills` 仅按目录名覆盖镜像内置的 Olares 技能（同名目录会
    在每次 Pod 启动时用镜像版本替换）；`~/.codex/skills` 下其余自定义技能不会被
    删除。若你曾就地修改过某个 Olares 技能目录，下次重启后会被还原为镜像自带版本。
