spec:
  versionName: '0.24.0'
  featuredImage: https://app.cdn.olares.com/appstore/comfyui/1.png
  promoteImage:
  - https://app.cdn.olares.com/appstore/comfyui/1.png
  - https://app.cdn.olares.com/appstore/comfyui/2.png
  - https://app.cdn.olares.com/appstore/comfyui/3.png
  - https://app.cdn.olares.com/appstore/comfyui/4.png
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared version of ComfyUI. Only one service will be installed across the entire Olares system. However, every user still needs to install an desktop entry to access and use the service installed by the Olares Admin.

    **OVERVIEW**
    The most powerful and modular stable diffusion GUI and backend.
    This ui will let you design and execute advanced stable diffusion pipelines using a graph/nodes/flowchart based interface.

    **Features**
    
    - Nodes/graph/flowchart interface to experiment and create complex Stable Diffusion workflows without needing to code anything.
    - NOTE: There are many more models supported than the list below, if you want to see what is supported see our templates list inside ComfyUI.
    - Image Models
      - SD1.x, SD2.x ([unCLIP](https://comfyanonymous.github.io/ComfyUI_examples/unclip/))
      - [SDXL](https://comfyanonymous.github.io/ComfyUI_examples/sdxl/), [SDXL Turbo](https://comfyanonymous.github.io/ComfyUI_examples/sdturbo/)
      - [Stable Cascade](https://comfyanonymous.github.io/ComfyUI_examples/stable_cascade/)
      - [SD3 and SD3.5](https://comfyanonymous.github.io/ComfyUI_examples/sd3/)
      - Pixart Alpha and Sigma
      - [AuraFlow](https://comfyanonymous.github.io/ComfyUI_examples/aura_flow/)
      - [HunyuanDiT](https://comfyanonymous.github.io/ComfyUI_examples/hunyuan_dit/)
      - [Flux](https://comfyanonymous.github.io/ComfyUI_examples/flux/)
      - [Lumina Image 2.0](https://comfyanonymous.github.io/ComfyUI_examples/lumina2/)
      - [HiDream](https://comfyanonymous.github.io/ComfyUI_examples/hidream/)
      - [Qwen Image](https://comfyanonymous.github.io/ComfyUI_examples/qwen_image/)
      - [Hunyuan Image 2.1](https://comfyanonymous.github.io/ComfyUI_examples/hunyuan_image/)
      - [Flux 2](https://comfyanonymous.github.io/ComfyUI_examples/flux2/)
      - [Z Image](https://comfyanonymous.github.io/ComfyUI_examples/z_image/)
    - Image Editing Models
      - [Omnigen 2](https://comfyanonymous.github.io/ComfyUI_examples/omnigen/)
      - [Flux Kontext](https://comfyanonymous.github.io/ComfyUI_examples/flux/#flux-kontext-image-editing-model)
      - [HiDream E1.1](https://comfyanonymous.github.io/ComfyUI_examples/hidream/#hidream-e11)
      - [Qwen Image Edit](https://comfyanonymous.github.io/ComfyUI_examples/qwen_image/#edit-model)
    - Video Models
      - [Stable Video Diffusion](https://comfyanonymous.github.io/ComfyUI_examples/video/)
      - [Mochi](https://comfyanonymous.github.io/ComfyUI_examples/mochi/)
      - [LTX-Video](https://comfyanonymous.github.io/ComfyUI_examples/ltxv/)
      - [Hunyuan Video](https://comfyanonymous.github.io/ComfyUI_examples/hunyuan_video/)
      - [Wan 2.1](https://comfyanonymous.github.io/ComfyUI_examples/wan/)
      - [Wan 2.2](https://comfyanonymous.github.io/ComfyUI_examples/wan22/)
      - [Hunyuan Video 1.5](https://docs.comfy.org/tutorials/video/hunyuan/hunyuan-video-1-5)
    - Audio Models
      - [Stable Audio](https://comfyanonymous.github.io/ComfyUI_examples/audio/)
      - [ACE Step](https://comfyanonymous.github.io/ComfyUI_examples/audio/)
    - 3D Models
      - [Hunyuan3D 2.0](https://docs.comfy.org/tutorials/3d/hunyuan3D-2)
    - Asynchronous Queue system
    - Many optimizations: Only re-executes the parts of the workflow that changes between executions.
    - Smart memory management: can automatically run large models on GPUs with as low as 1GB vram with smart offloading.
    - Works even if you don't have a GPU with: ```--cpu``` (slow)
    - Can load ckpt and safetensors: All in one checkpoints or standalone diffusion models, VAEs and CLIP models.
    - Safe loading of ckpt, pt, pth, etc.. files.
    - Embeddings/Textual inversion
    - [Loras (regular, locon and loha)](https://comfyanonymous.github.io/ComfyUI_examples/lora/)
    - [Hypernetworks](https://comfyanonymous.github.io/ComfyUI_examples/hypernetworks/)
    - Loading full workflows (with seeds) from generated PNG, WebP and FLAC files.
    - Saving/Loading workflows as Json files.
    - Nodes interface can be used to create complex workflows like one for [Hires fix](https://comfyanonymous.github.io/ComfyUI_examples/2_pass_txt2img/) or much more advanced ones.
    - [Area Composition](https://comfyanonymous.github.io/ComfyUI_examples/area_composition/)
    - [Inpainting](https://comfyanonymous.github.io/ComfyUI_examples/inpaint/) with both regular and inpainting models.
    - [ControlNet and T2I-Adapter](https://comfyanonymous.github.io/ComfyUI_examples/controlnet/)
    - [Upscale Models (ESRGAN, ESRGAN variants, SwinIR, Swin2SR, etc...)](https://comfyanonymous.github.io/ComfyUI_examples/upscale_models/)
    - [GLIGEN](https://comfyanonymous.github.io/ComfyUI_examples/gligen/)
    - [Model Merging](https://comfyanonymous.github.io/ComfyUI_examples/model_merging/)
    - [LCM models and Loras](https://comfyanonymous.github.io/ComfyUI_examples/lcm/)
    - Latent previews with [TAESD](#how-to-show-high-quality-previews)
    - Works fully offline: core will never download anything unless you want to.
    - Optional API nodes to use paid models from external providers through the online [Comfy API](https://docs.comfy.org/tutorials/api-nodes/overview) disable with: `--disable-api-nodes`
    - [Config file](extra_model_paths.yaml.example) to set the search paths for models.

    Workflow examples can be found on the [Examples page](https://comfyanonymous.github.io/ComfyUI_examples/)

  upgradeDescription: |    
    ComfyUI upgrade to version 0.26.0

    Key Changes:
    - **[New Model Support]** Added support for Qwen3-VL text generation, SCAIL-2 multi-reference, Krea2, Boogu-Image, Bernini-R (Wan Video), and Depth Anything 3; partner API nodes updated with Kling V3-Turbo, Luma Rays 3.2, and HappyHorse 1.1
    - **[3D Enhancements]** New `Load3DAdvanced`, `PreviewGaussianSplat`, and `PreviewPointCloud` nodes; `Load3D` now accepts output/temp paths; 3D preview node inputs and outputs reordered for cleaner display
    - **[Video & Audio]** Audio nodes consolidated into a unified `SaveAudioAdvanced` node; added 10-bit video output support; fixed nondeterministic crash and edge bleed in unaligned-width video decode; `SaveWEBM` now supports alpha channel saving
    - **[Memory & Performance]** New `--high-ram` startup flag; dynamic VRAM management upgraded with `--reserve-vram` / `--vram-headroom`; `cuda malloc` auto-enabled on CUDA 130+; LTX2 models gain context window sampling support
    - **[API & Backend]** New job cancellation endpoints (`POST /api/jobs/{job_id}/cancel`); Assets API gains cursor-based pagination and `job_ids` filter; new `--enable-telemetry` CLI flag and `--debug-hang` diagnostic option
    - **[Nodes & Workflow]** New `Color` primitive node; Save nodes now expose output sockets; multiple nodes renamed and recategorized; Qwen3-VL can now be used as a Flux2 Klein text encoder
    - **[Security & Stability]** Training dataset shards now loaded with `weights_only=True`; fixed Ideogram fp8 crash, Flux KV cache split-batch crash, and image grid rendering bug

    Full release note at: https://github.com/Comfy-Org/ComfyUI/releases/tag/v0.26.0

