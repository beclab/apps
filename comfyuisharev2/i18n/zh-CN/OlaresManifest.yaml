metadata:
  description: 功能最强大、模块化程度最高的 Stable Diffusion GUI 和后台。
  title: ComfyUI 共享版
  fullDescription: |
    ## 重要提示 ##
    本应用是 ComfyUI 共享版本，在 Olares 内部仅会部署一个服务。注意，每个用户仍需要安装一个桌面入口才能访问和使用 Olares 管理员安装的服务。

    ## 应用概览 ##
    功能最强大、模块化程度最高的 Stable Diffusion GUI 和后台。

    这款 UI 让您通过图形、节点和流程图界面设计并执行
    高级 Stable Diffusion 项目。

    功能特点
    - 节点/图形/流程图界面，无需任何代码即可实验和创建复杂的稳定扩散工作流。
    - 图像模型
      * SD1.x, SD2.x,
      * SDXL, SDXL Turbo
      * Stable Cascade
      * SD3 and SD3.5
      * Pixart Alpha and Sigma
      * AuraFlow
      * HunyuanDiT
      * Flux
      * Lumina Image 2.0
      * HiDream
      * Cosmos Predict2
      * Qwen Image
    - 图像编辑模型
      * Omnigen 2
      * Flux Kontext
      * HiDream E1.1
      * Qwen Image Edit
    - 视频模型
      * Stable Video Diffusion
      * Mochi
      * LTX-Video
      * Hunyuan Video
      * Nvidia Cosmos and Cosmos Predict2
      * Wan 2.1
      * Wan 2.2
    - 音频模型  
      * Stable Audio
      * ACE Step
    - 3D 模型
      * Hunyuan3D 2.0
    - 异步队列系统
    - 多项优化：仅在工作流变化部分重新执行
    - 智能内存管理：即使在显存低至 1GB 的 GPU 上也能自动运行模型。
    - 即使没有 GPU，也能使用：--cpu（速度慢）
    - 可以加载 ckpt、safetensors 和 diffusers 模型/检查点。独立的 VAE 和 CLIP 模型。
    - 嵌入技术/文本反转
    - Loras（标准型、locon 与 loha 版本）
    - 超网络技术
    - 从生成的 PNG 文件中加载完整工作流程（包括种子信息）。
    - 以 Json 文件格式保存/加载工作流程。
    - 节点界面可以用来创建复杂的工作流程，例如用于高分辨率修复或更高级的工作流程。
    - 区域组合技术
    - 使用常规和专用模型进行修复。
    - ControlNet 和 T2I-适配器
    - 放大模型（包括 ESRGAN、ESRGAN 变体、SwinIR、Swin2SR 等）
    - unCLIP 模型
    - GLIGEN
    - 模型合并
    - LCM 模型和 Loras
    - SDXL Turbo
    - 使用 TAESD 进行 Latent 预览
    - 启动速度极快。
    - 完全离线操作：永不下载任何内容。
    - 可选 API 节点，可通过在线 Comfy API 使用外部提供商提供的付费模型。
    - 配置文件用于设定模型的搜索路径。

  upgradeDescription: |
    ComfyUI 升级到版本 0.17.2

    0.17.0 版本更新内容如下
    refactor(assets)：模块化架构 + 异步两阶段扫描器 & 后台资源初始化（@luke-mino-altherr #12621）
    comfy-aimdo 0.2.9（@rattus128 #12840）
    延迟导入资源初始化，打印部分包版本（@comfyanonymous #12841）
    修复包裹模型的 lora 文本编码加载（@kijai #12852）
    更新工作流模版至 v0.9.18（@comfyui-wiki #12857）
    fix(manager)：改进 comfyui-manager 未安装时的安装引导，并将管理器版本升级到 v4.1b2（@ltdrdata #12810）
    新增节点可添加 flux 模型 pre attn patch 的能力（@comfyanonymous #12861）
    model_detection：深度克隆已编辑权重（@rattus128 #12862）
    OOM_EXCEPTION 扩展为 AcceleratorError 形式（@rattus128 #12835）
    main：启用 python faulthandler（@rattus128 #12868）
    支持模型 patch 添加清理函数（@comfyanonymous #12878）
    为 qwen 图像模型添加 pre attention 和 post input patch（@comfyanonymous #12879）
    comfy-aimdo 0.2.10（@rattus128 #12890）
    feat(api-nodes)：增加 Reve Image 节点（@bigcat88 #12848）
    fix：适配 torch < 2.8.0 时守护 torch.AcceleratorError（@adiborochov #12874）
    修复部分模型 batch_size > 1 时的 bug（@comfyanonymous #12892）
    comfyui-frontend-package 升级到 1.41.15（@comfy-pr-bot #12891）
    comfyui-frontend-package 升级到 1.41.16（@comfy-pr-bot #12894）
    comfy-kitchen 版本升级到 0.2.8（@comfyanonymous #12895）
    支持 flux 2 klein kv cache 模型：使用 FluxKVCache 节点（@comfyanonymous #12905）
    新增 painter 节点（@jtydhr88 #12294）
    fix：浮点 gradient_stops 使用前端兼容格式（@jtydhr88 #12789）
    更新工作流模版至 v0.9.21（@comfyui-wiki #12908）
    降低 kv cache 内存占用（@comfyanonymous #12909）
    前端从 1.41.16 升级到 1.41.18（@christian-byrne #12910）
    feat：新增 CacheProvider API 用于外部分布式缓存（@deepme987 #12056）
    回滚“新增 CacheProvider API 用于外部分布式缓存”功能（@comfyanonymous #12912）
    修复音频提取及截断相关问题（@PxTicks #12652）

    完整发布说明见：https://github.com/Comfy-Org/ComfyUI/releases/tag/v0.17.2