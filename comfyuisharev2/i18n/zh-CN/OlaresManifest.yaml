metadata:
  description: 功能最强大、模块化程度最高的 Stable Diffusion GUI 和后台。
  title: ComfyUI 共享版
spec:
  fullDescription: |
    **重要提示**  
    这是 ComfyUI 的共享版本。在整个 Olares 系统中只会安装一个服务。但每位用户仍需安装桌面入口，才能访问和使用由 Olares 管理员安装的服务。

    **概述**  
    这是目前最强大、最模块化的 Stable Diffusion 图形界面和后端。通过节点/流程图的接口，您可以可视化设计和执行复杂的 Stable Diffusion 流程，无需任何编程经验。

    **主要功能**
    
    - 节点/流程图界面，无需编程即可自由实验和创建复杂的 Stable Diffusion 工作流
    - 温馨提示：不仅仅限于下列模型，如需完整支持列表，请参见 ComfyUI 内置模板列表
    - 图像生成模型
      - SD1.x, SD2.x ([unCLIP](https://comfyanonymous.github.io/ComfyUI_examples/unclip/))
      - [SDXL](https://comfyanonymous.github.io/ComfyUI_examples/sdxl/), [SDXL Turbo](https://comfyanonymous.github.io/ComfyUI_examples/sdturbo/)
      - [Stable Cascade](https://comfyanonymous.github.io/ComfyUI_examples/stable_cascade/)
      - [SD3 and SD3.5](https://comfyanonymous.github.io/ComfyUI_examples/sd3/)
      - Pixart Alpha and Sigma
      - [AuraFlow](https://comfyanonymous.github.io/ComfyUI_examples/aura_flow/)
      - [HunyuanDiT](https://comfyanonymous.github.io/ComfyUI_examples/hunyuan_dit/)
      - [Flux](https://comfyanonymous.github.io/ComfyUI_examples/flux/)
      - [Lumina Image 2.0](https://comfyanonymous.github.io/ComfyUI_examples/lumina2/)
      - [HiDream](https://comfyanonymous.github.io/ComfyUI_examples/hidream/)
      - [Qwen Image](https://comfyanonymous.github.io/ComfyUI_examples/qwen_image/)
      - [Hunyuan Image 2.1](https://comfyanonymous.github.io/ComfyUI_examples/hunyuan_image/)
      - [Flux 2](https://comfyanonymous.github.io/ComfyUI_examples/flux2/)
      - [Z Image](https://comfyanonymous.github.io/ComfyUI_examples/z_image/)
    - 图像编辑模型
      - [Omnigen 2](https://comfyanonymous.github.io/ComfyUI_examples/omnigen/)
      - [Flux Kontext](https://comfyanonymous.github.io/ComfyUI_examples/flux/#flux-kontext-image-editing-model)
      - [HiDream E1.1](https://comfyanonymous.github.io/ComfyUI_examples/hidream/#hidream-e11)
      - [Qwen Image Edit](https://comfyanonymous.github.io/ComfyUI_examples/qwen_image/#edit-model)
    - 视频生成模型
      - [Stable Video Diffusion](https://comfyanonymous.github.io/ComfyUI_examples/video/)
      - [Mochi](https://comfyanonymous.github.io/ComfyUI_examples/mochi/)
      - [LTX-Video](https://comfyanonymous.github.io/ComfyUI_examples/ltxv/)
      - [Hunyuan Video](https://comfyanonymous.github.io/ComfyUI_examples/hunyuan_video/)
      - [Wan 2.1](https://comfyanonymous.github.io/ComfyUI_examples/wan/)
      - [Wan 2.2](https://comfyanonymous.github.io/ComfyUI_examples/wan22/)
      - [Hunyuan Video 1.5](https://docs.comfy.org/tutorials/video/hunyuan/hunyuan-video-1-5)
    - 音频模型
      - [Stable Audio](https://comfyanonymous.github.io/ComfyUI_examples/audio/)
      - [ACE Step](https://comfyanonymous.github.io/ComfyUI_examples/audio/)
    - 3D模型
      - [Hunyuan3D 2.0](https://docs.comfy.org/tutorials/3d/hunyuan3D-2)
    - 异步队列系统
    - 多项优化：仅重新执行工作流中发生变化的部分，提高效率
    - 智能内存管理：最低1GB显存即可运行大模型，支持智能卸载
    - 即使没有GPU也可运行：使用 `--cpu` 参数（较慢）
    - 支持加载ckpt和safetensors：可用整合模型或独立扩散模型、VAE、CLIP模型
    - 支持安全加载ckpt、pt、pth等文件
    - 支持Embedding/文本反演
    - [Lora（常规、locon、loha）](https://comfyanonymous.github.io/ComfyUI_examples/lora/)
    - [超网络 Hypernetworks](https://comfyanonymous.github.io/ComfyUI_examples/hypernetworks/)
    - 可从生成的PNG、WebP、FLAC文件中加载包含种子的完整工作流
    - 工作流可保存/加载为Json文件
    - 节点界面可创建如[二次放大修复（Hires fix）](https://comfyanonymous.github.io/ComfyUI_examples/2_pass_txt2img/)等复杂流程，或更高级应用
    - [区域合成](https://comfyanonymous.github.io/ComfyUI_examples/area_composition/)
    - 支持[修复(Inpainting)](https://comfyanonymous.github.io/ComfyUI_examples/inpaint/)，适用于常规与修复模型
    - 支持[ControlNet 与 T2I-Adapter](https://comfyanonymous.github.io/ComfyUI_examples/controlnet/)
    - [超分辨与放大模型（ESRGAN、SwinIR、Swin2SR等）](https://comfyanonymous.github.io/ComfyUI_examples/upscale_models/)
    - [GLIGEN](https://comfyanonymous.github.io/ComfyUI_examples/gligen/)
    - [模型融合](https://comfyanonymous.github.io/ComfyUI_examples/model_merging/)
    - [LCM模型与Lora](https://comfyanonymous.github.io/ComfyUI_examples/lcm/)
    - [TAESD](#how-to-show-high-quality-previews) 潜变量预览
    - 可完全离线运行：除非用户需求，否则核心不会下载任何资源
    - 可选API节点：通过[Comfy API](https://docs.comfy.org/tutorials/api-nodes/overview)在线调用付费模型，可通过 `--disable-api-nodes` 禁用
    - [配置文件](extra_model_paths.yaml.example)用于自定义模型搜索路径

    工作流示例请参考 [示例页面](https://comfyanonymous.github.io/ComfyUI_examples/)

  upgradeDescription: |    
    配置更新：
    - 修复 nunchaku 兼容性问题
    
    ComfyUI 升级至 0.19.3 版本

    更新内容
    - nodes_textgen: 为 LTX 实现 use_default_template by @rattus128 in #13451
    - fix(api-nodes): 修正 StabilityAI 价格徽章 by @bigcat88 in #13454
    - [合作节点] 新增 "arrow-1.1" 和 "arrow-1.1-max" SVG 模型 by @bigcat88 in #13447
    - 工作流模板升级至 v0.9.57 by @comfyui-wiki in #13455
    - [合作节点] 使 Hunyuan3D 文本和图像转3D 的 "obj" 输出变为可选 by @bigcat88 in #13449

    完整发布说明详见：https://github.com/Comfy-Org/ComfyUI/releases/tag/v0.19.3