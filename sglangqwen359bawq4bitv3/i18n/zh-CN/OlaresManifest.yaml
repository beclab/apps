metadata:
  description: "使用 SGLang 运行 Qwen3.5-9B（AWQ-4bit）模型。"
  title: Qwen3.5-9B (SGLang)

spec:
  fullDescription: |
    **模型简介**
    Qwen3.5-9B 是阿里巴巴 Qwen 系列的稠密视觉语言模型，在 9B 体量下支持思考、工具调用与视觉能力。本应用通过 SGLang 运行 `cyankiwi/Qwen3.5-9B-AWQ-4bit` 的 `AWQ-4bit` 量化权重。

    适合在较低资源占用下获得较强多模态能力的场景。Qwen3.5 模型支持思考、工具与视觉，可用于对话与智能体工作流。

    **预设配置**
    - 模型：`cyankiwi/Qwen3.5-9B-AWQ-4bit`
    - 能力：思考、工具、视觉
    - 引擎参数：`--context-length 65536 --mem-fraction-static 0.85 --chunked-prefill-size 4096 --reasoning-parser qwen3 --tool-call-parser qwen3_coder`
    - 所需显存：`23Gi`
    - SGLang 擅长前缀缓存与结构化输出（JSON、工具调用、智能体），因此默认启用前缀缓存。

    **加速器模式**
    | 模式           | 设备             | 说明                                                         |
    |----------------|------------------|--------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存；在 ENGINE_ARGS 中调节 `--mem-fraction-static` |
    | `nvidia-gb10`  | GPU (Spark)      | 与 `nvidia` 相同：`23Gi` 显存，由 pod 管理                    |
    
    **工作流程说明**
    首先，Model Console 下载并准备模型，然后 SGLang 在模型准备好后启动服务。两个部分运行在不同 Deployment 中，但通过 App Common 存储共享 HF 缓存与运行状态。

    **技术栈说明**
    - **SGLang**（30000 端口）：运行模型并通过 API 提供服务
    - **Model Console**（8090 端口）：下载模型、展示进度，并通过 OpenAI API 代理到 SGLang

    **模型存储**
    所有模型文件存储在共享目录 `appCommon/huggingface`（挂载为 `/cache/hf/hub`），同类应用均使用此目录。

