olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: sglangqwen359bawq4bitv3
  icon: https://app.cdn.olares.com/appstore/llm/sgl/qwen.png
  description: "Qwen3.5-9B (AWQ-4bit) served with SGLang."
  appid: sglangqwen359bawq4bitv3
  title: Qwen3.5-9B (SGLang)
  version: '1.0.5'
  categories:
    - AI
sharedEntrances:
  - name: sglangqwen359bawq4bitv3
    host: sharedentrances-api
    port: 0
    title: Qwen3.5-9B
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/sgl/qwen.png
entrances:
  - name: sglangclient
    port: 8090
    host: download-svc
    title: Qwen3.5-9B
    icon: https://app.cdn.olares.com/appstore/llm/sgl/qwen.png
    openMethod: window
    authLevel: internal
#   sglangqwen359bawq4bitv3 — engine Deployment (== appid / Release.Name)
#   llminit          — llm-init / entrance Deployment
workloadReplicas:
  sglangqwen359bawq4bitv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'cyankiwi/Qwen3.5-9B-AWQ-4bit'
  upgradeDescription: |
    v1.0.5: bump llm-init to v1.3.1.
  fullDescription: |
    **Model Overview**
    Qwen3.5-9B is a dense vision-language model from the Qwen series (Alibaba). It supports thinking, tool calling, and vision in a compact 9B footprint. This app serves the `AWQ-4bit` quantized weights from `cyankiwi/Qwen3.5-9B-AWQ-4bit` via SGLang.

    A practical choice when you need a capable multimodal model with lower resource requirements. Qwen3.5 models support thinking, tools, and vision for chat and agent workflows.

    **Preset Configuration**
    - Model: `cyankiwi/Qwen3.5-9B-AWQ-4bit`
    - Capabilities: thinking, tools, vision
    - Engine args: `--context-length 65536 --mem-fraction-static 0.85 --chunked-prefill-size 4096 --reasoning-parser qwen3 --tool-call-parser qwen3_coder`
    - Required GPU memory: `23Gi`
    - SGLang excels at prefix caching and structured output (JSON, tool calls, agents); prefix caching is enabled by default.


    **Accelerator modes**
    | Mode           | Device            | Details                                                              |
    |----------------|-------------------|----------------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; tune `--mem-fraction-static` in ENGINE_ARGS  |
    | `nvidia-gb10`  | GPU (Spark)       | Same as `nvidia`: `23Gi` memory, managed by the pod                  |
    
    **How It Works**
    First, Model Console downloads the model and gets it ready, then SGLang starts serving the model when it's ready. These two parts run in separate Deployments but share the HF cache and run-state via App Common storage.

    **Stack**
    - **SGLang** (port 30000): runs the model and serves API requests
    - **Model Console** (port 8090): downloads the model, shows progress, and provides the OpenAI API, proxying to SGLang

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.


  developer: Alibaba
  website: https://qwen.ai/home
  sourceCode: https://github.com/QwenLM/Qwen3
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://huggingface.co/Qwen/Qwen3.5-9B

  accelerator:
    #   nvidia       — discrete GPU; SGLANG_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: nvidia
      limitedCpu: "15360m"
      requiredCpu: "1400m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "42Gi"
      requiredMemory: "8Gi"
      requiredGPUMemory: "23Gi"
      limitedGPUMemory: "24Gi"
    - mode: nvidia-gb10
      limitedCpu: "15360m"
      requiredCpu: "1400m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "48Gi"
      requiredMemory: "32Gi"

  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE        # example: hf://openai/gpt-oss-20b
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "hf://cyankiwi/Qwen3.5-9B-AWQ-4bit"
    description: "Example: hf://openai/gpt-oss-20b. The HuggingFace source to download your model. Use a repo with `.safetensors` weights. Optionally append `--include <file>` or `--revision <sha>`."
    regex: "^hf://"
  - envName: MODEL_NAME          # example: openai/gpt-oss-20b
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "cyankiwi/Qwen3.5-9B-AWQ-4bit"
    description: "Example: openai/gpt-oss-20b. The name of your model — use the string after `hf://` in MODEL_SOURCE. This is also used as the OpenAI alias and SGLang `--model-path`."
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools,vision"
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description: "The model capabilities. Pick what your model supports. If no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: --context-length 65536 --mem-fraction-static 0.85 --chunked-prefill-size 4096 --reasoning-parser gpt-oss --tool-call-parser gpt-oss
    required: true
    default: "--context-length 65536 --mem-fraction-static 0.85 --chunked-prefill-size 4096 --reasoning-parser qwen3 --tool-call-parser qwen3_coder"
    type: string
    editable: true
    applyOnChange: true
    description: "Example: --context-length 65536 --mem-fraction-static 0.85 --chunked-prefill-size 4096 --reasoning-parser gpt-oss --tool-call-parser gpt-oss. Extra SGLang CLI flags. Separate multiple --key value pairs with spaces. Adjust parsers to match your model family."
  - envName: LOG_LEVEL
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "info"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: SGLANG_CPU_REQUEST    # default: 1150m
    required: true
    default: "1150m"
    type: string
    editable: false
    applyOnChange: false
  - envName: SGLANG_MEMORY_REQUEST # default: 7Gi
    required: true
    default: "7Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: SGLANG_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: SGLANG_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: SGLANG_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description: "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
