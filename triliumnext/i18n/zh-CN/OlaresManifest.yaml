metadata:
  title: TriliumNext
  description: TriliumNext 是一个强大的个人知识库管理工具，支持层级笔记、富文本编辑、关系图谱及高度可定制的脚本脚本。
spec:
  fullDescription: |
    TriliumNext 是一个个人知识库程序。它能够帮助您构建高度结构化的层级笔记，拥有强大的编辑、关联和扩展能力。

    **主要功能：**
    - **层级笔记**：支持无限深度的层级笔记分类，便于整理复杂的知识体系。
    - **Markdown与富文本**：内置功能丰富的 WYSIWYG 富文本编辑器，支持 Markdown 快捷输入、Mermaid 图表、数学公式等。
    - **笔记关系图谱**：自动分析笔记之间的链接，生成可视化的关联图谱。
    - **强大的脚本支持**：支持使用 JavaScript (前端和后端) 扩展笔记功能，实现自动化任务。
    - **版本控制与安全**：内置笔记版本历史管理，并支持对敏感笔记进行高强度加密。
