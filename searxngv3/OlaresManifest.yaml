olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: searxngv3
  icon: https://app.cdn.olares.com/appstore/searxng/icon.png
  description: Search without being tracked.
  appid: searxngv3
  title: SearXNG
  version: '1.1.6'
  categories:
    - Productivity_v112
    - Utilities_v112

sharedEntrances:
  - name: searxngv3
    title: SearXNG
    host: sharedentrances-api
    icon: https://app.cdn.olares.com/appstore/searxng/icon.png
    port: 0
    invisible: true
    authLevel: internal

entrances:
  - authLevel: internal
    host: searxngv3
    icon: https://app.cdn.olares.com/appstore/searxng/icon.png
    name: searxngv3
    openMethod: window
    port: 8080
    title: SearXNG

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   searxngv3 — SearXNG engine Deployment (must match metadata.name / appid)
workloadReplicas:
  searxngv3: 1

spec:
  versionName: '2026.5.10'
  featuredImage: https://app.cdn.olares.com/appstore/searxng/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/searxng/1.webp
    - https://app.cdn.olares.com/appstore/searxng/2.webp
    - https://app.cdn.olares.com/appstore/searxng/3.webp

  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. However, every user still needs to install an desktop entry to access and use the service installed by the Olares Admin.

    **OVERVIEW**
    SearXNG is a free internet metasearch engine which aggregates results from more than 70 search services. Users are neither tracked nor profiled. Additionally, SearXNG can be used over Tor for online anonymity.

    **Why use it?**
    - SearXNG may not offer you as personalized results as Google, but it doesn't generate a profile about you.
    - SearXNG doesn't care about what you search for, never shares anything with a third-party, and it can't be used to compromise you.
    - SearXNG is free software, the code is 100% open, and everyone is welcome to make it better.

    **Features**
    - self hosted
    - no user tracking / no profiling
    - script & cookies are optional
    - secure, encrypted connections
    - about 200 search engines
    - about 60 translations
    - about 100 well maintained instances on searx.space
    - easy integration of search engines
    - professional development: CI, quality assurance & automated tested UI

  upgradeDescription: |
    Migrated SearXNG to apiVersion v3 shared app pattern (searxngv2 → searxngv3).

    **What's Changed**

    - **Multi-install**: the Deployment now uses {{ .Release.Name }} so allowMultipleInstall installs don't collide on workload names.

    - **Architecture**: flattened sub-charts into a single chart; removed the
      nginx clientproxy layer — the entrance routes directly to the SearXNG
      Service on port 8080.
    - **Scaling**: `workloadReplicas` declares replica count for the `searxngv3`
      engine workload.
    - **Runtime**: SearXNG image `2026.5.10-df1f24fb7` with inherited engine
      list and language-agnostic search defaults.

  developer: SearXNG team
  website: https://docs.searxng.org/
  sourceCode: https://github.com/searxng/searxng
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://docs.searxng.org/
  license:
    - text: AGPL-3.0
      url: https://github.com/searxng/searxng#AGPL-3.0-1-ov-file

  requiredMemory: 2Gi
  requiredDisk: 50Mi
  requiredCpu: 0.25
  limitedMemory: 10240Mi
  limitedCpu: '4'

  supportArch:
    - amd64
    - arm64
  onlyAdmin: true

permission:
  appData: true
  appCache: true

middleware:
  redis:
    namespace: searxngv3

options:
  shared: true
  conflicts:
    - name: searxngv2
      type: application
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
