{{- /*
  server.secret_key handling.
  We mount settings.yml directly at /etc/searxng/settings.yml, which bypasses
  the image entrypoint that normally replaces the placeholder "ultrasecretkey"
  with an openssl-generated random value. So we must inject a real key here.

  To keep user preference cookies valid across upgrades, we read the previous
  ConfigMap (if any), extract the existing secret_key, and reuse it.  Only on
  first install (or if the previous value was still the placeholder) do we
  generate a fresh random key.
*/ -}}
{{- $existingCM := lookup "v1" "ConfigMap" .Release.Namespace "searxng-config" }}
{{- $secretKey := "" }}
{{- if $existingCM }}
  {{- $oldSettings := index $existingCM.data "settings.yml" | default "" }}
  {{- $match := regexFind "secret_key: \"[^\"]+\"" $oldSettings }}
  {{- if $match }}
    {{- $secretKey = $match | trimPrefix "secret_key: \"" | trimSuffix "\"" }}
  {{- end }}
{{- end }}
{{- if or (not $secretKey) (eq $secretKey "ultrasecretkey") }}
  {{- $secretKey = randAlphaNum 64 }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: {{ .Release.Namespace }}
data:
  settings.yml: |
    # ============================================================================
    # Inherit the bundled /usr/local/searxng/searx/settings.yml (engine list,
    # named networks, doi_resolvers, categories_as_tabs, plugins, checker tests,
    # etc.) and only override values that are operator- or environment-specific.
    # This keeps the engine list in sync with the SearXNG image automatically.
    # ============================================================================
    use_default_settings: true

    general:
      instance_name: "SearXNG"
      debug: false
      privacypolicy_url: false
      donation_url: false
      contact_url: false
      enable_metrics: true

    search:
      # Keep "all" so we do NOT pass Accept-Language to upstream engines.
      # With "auto", a zh-CN client would never see English-only sites such as
      # olares.com or docs.olares.com because Google ranks them below local
      # Chinese blog mentions in zh-CN region.
      default_lang: "all"
      safe_search: 0
      autocomplete: ""
      formats: [html, csv, json, rss]
      # Make the suspension after a transient 429 / captcha short so an engine
      # bounces back quickly instead of being out of rotation for an hour.
      suspended_times:
        SearxEngineAccessDenied: 600
        SearxEngineCaptcha: 600
        SearxEngineTooManyRequests: 600
        cf_SearxEngineCaptcha: 1800
        cf_SearxEngineAccessDenied: 1800
        recaptcha_SearxEngineCaptcha: 1800

    server:
      port: 8888
      bind_address: "0.0.0.0"
      base_url: false
      # The Olares nginx in front of us already authenticates traffic, and the
      # kubelet liveness probe + OpenWebUI come from inside the cluster.  The
      # SearXNG limiter would 429 those, so we disable it here (matches 1.0.6).
      limiter: false
      public_instance: false
      # Auto-generated by the chart, preserved across upgrades via Helm lookup.
      secret_key: "{{ $secretKey }}"
      image_proxy: false
      http_protocol_version: "1.0"
      method: "POST"
      default_http_headers:
        X-Content-Type-Options: nosniff
        X-Download-Options: noopen
        X-Robots-Tag: noindex, nofollow
        Referrer-Policy: no-referrer

    valkey:
      # Searxng caches search results and rate-limit state in valkey/redis.
      # Olares provisions a per-app valkey via middleware.redis in OlaresManifest.
      url: redis://:{{ .Values.redis.password }}@{{ .Values.redis.host }}:{{ .Values.redis.port }}/0

    ui:
      default_theme: simple
      center_alignment: false
      query_in_title: false
      infinite_scroll: false

    outgoing:
      request_timeout: 10.0
      max_request_timeout: 15.0
      retries: 1
      pool_connections: 100
      pool_maxsize: 20
      enable_http2: true
      # To route outbound search traffic through a residential proxy (great for
      # defeating Bing/Google bot detection from server IPs), uncomment below:
      # proxies:
      #   all://: socks5h://user:pass@proxy.example.com:1080

    # ============================================================================
    # Per-engine overrides.  Merged by `name` on top of the upstream engine list.
    # Only engines that need an API key, a custom base_url, or a parameter that
    # differs from upstream defaults are listed here.  Everything else inherits
    # from the bundled settings.yml.
    #
    # ---- HOW TO ENABLE OPTIONAL API KEYS (operator-only) ----
    # Several engines have a paid/free API key that switches them from
    # HTML-scraping to an official API, yielding more stable and complete
    # results.  Keys are intentionally NOT pre-filled - each operator should
    # provision their own to avoid sharing quota.  To enable:
    #
    #   1. kubectl edit configmap searxng-config -n <release-namespace>
    #   2. Find the engine block below, uncomment the relevant lines, and
    #      paste your key (replace EMPTY_PLACEHOLDER).  For engines where the
    #      key changes the engine module (youtube / flickr / wolframalpha),
    #      also swap `engine: foo_noapi` for `engine: foo_api` / `foo`.
    #   3. kubectl rollout restart deploy/searxngv3 -n <release-namespace>
    #
    # Note: ConfigMap edits made by hand will be reverted on the next app
    # upgrade.  For a persistent setup, fork the chart and bake the keys into
    # this template directly.
    # ============================================================================
    engines:
      # annas archive requires base_url to be set explicitly.
      - name: annas archive
        engine: annas_archive
        shortcut: aa
        base_url: https://annas-archive.org
        timeout: 8.0

      # YouTube
      # ---------------------------------------------------------------
      # Without a key:  HTML scraping (default below).
      # With a key:     official Data API v3, 10000 units/day (~100 searches).
      # Get a key at https://console.developers.google.com/project
      # To enable, comment out `engine: youtube_noapi` and uncomment the
      # two lines below it, filling in api_key.
      - name: youtube
        shortcut: yt
        engine: youtube_noapi
        # engine: youtube_api
        # api_key: ""

      # Flickr
      # ---------------------------------------------------------------
      # Without a key:  HTML scraping (default below).
      # With a key:     official Flickr API.
      # Get a key at https://www.flickr.com/services/apps/create/
      - name: flickr
        shortcut: fl
        categories: images
        engine: flickr_noapi
        # engine: flickr
        # api_key: ""

      # Wolfram|Alpha
      # ---------------------------------------------------------------
      # Without a key:  HTML "noapi" mode (default below).
      # With a key:     official API, structured infobox results.
      # Get an App ID at https://products.wolframalpha.com/api/
      - name: wolframalpha
        shortcut: wa
        engine: wolframalpha_noapi
        # engine: wolframalpha_api
        # api_key: ""
        timeout: 6.0
        categories: general

      # MyMemory Translated
      # ---------------------------------------------------------------
      # Without a key:  1000 words/day quota.
      # With a key:     larger quota.
      # Get a key at https://mymemory.translated.net/doc/keygen.php
      - name: mymemory translated
        engine: translated
        shortcut: tl
        timeout: 5.0
        # api_key: ""

      # Wallhaven
      # ---------------------------------------------------------------
      # Without a key:  SFW results only.
      # With a key:     NSFW results unlocked, larger quota.
      # Get a key at https://wallhaven.cc/settings/account
      - name: wallhaven
        engine: wallhaven
        shortcut: wh
        # api_key: ""

      # Stack Exchange family
      # ---------------------------------------------------------------
      # Shared `api_key` across stackoverflow / askubuntu / superuser.
      # Without a key:  300 req/day anonymous quota (shared globally per IP).
      # With a key:     10000 req/day per registered app.
      # Register an app at https://stackapps.com/apps/oauth/register
      - name: stackoverflow
        engine: stackexchange
        shortcut: st
        api_site: 'stackoverflow'
        categories: [it, q&a]
        # api_key: ""

      - name: askubuntu
        engine: stackexchange
        shortcut: ubuntu
        api_site: 'askubuntu'
        categories: [it, q&a]
        # api_key: ""

      - name: superuser
        engine: stackexchange
        shortcut: su
        api_site: 'superuser'
        categories: [it, q&a]
        # api_key: ""

  limiter.toml: |
    [botdetection]
    # Empty list: SearXNG uses remote_addr directly, suppressing the kubelet
    # livenessProbe warning "X-Forwarded-For nor X-Real-IP header is set!".
    # The main limiter is disabled (server.limiter=false), so this only affects
    # how bot detection logs the source IP.
    trusted_proxies = []
    ipv4_prefix = 32
    ipv6_prefix = 48
