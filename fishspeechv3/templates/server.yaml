---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: fishspeech
  name: {{ .Release.Name }}
  namespace: '{{ .Release.Namespace }}'
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: {{ .Values.workloads.fishspeechv3.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: fishspeech
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: fishspeech
    spec:
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_done"
              if [ -f "$MARKER" ]; then echo "[migrate] marker present, skip."; exit 0; fi
              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi
              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache -> appData..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: data-legacy
              mountPath: /old-data
              readOnly: true
            - name: data
              mountPath: /new-data
        - name: init-chmod-data
          image: 'docker.io/beclab/aboveos-busybox:1.37.0'
          command:
            - sh
            - '-c'
            - |
              chown -R 1000:1000 /app-checkpoints /app-references /app-data-root /tmp-gradio /app-cache
              chmod -R 755 /app-checkpoints /app-references /app-data-root /tmp-gradio /app-cache
          resources: {}
          volumeMounts:
            - name: checkpoints
              mountPath: /app-checkpoints
            - name: references
              mountPath: /app-references
            - name: data
              mountPath: /app-data-root
            - name: output
              mountPath: /tmp-gradio
            - name: app-cache
              mountPath: /app-cache
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
      - name: fishspeech
        image: "docker.io/beclab/harveyff-fishaudio-fish-speech:webui-cuda-cu129-20260422"
        workingDir: /app
        command:
          - /bin/bash
          - -c
          - |
            set -e
            CACHE=/cache/hf/hub
            READYZ="http://download-svc.{{ .Release.Namespace }}.svc.cluster.local:8090/readyz"

            # Gate on the llm-init downloader (download-only mode) reporting the
            # repo present. /readyz flips to 200 only once the fishaudio/s2-pro
            # repo is fully on disk, replacing the old .s2-pro.done sentinel.
            echo "[wait] Waiting for llm-init downloader (/readyz)..."
            until /app/.venv/bin/python - "$READYZ" <<'RDY_EOF' 2>/dev/null
            import sys, urllib.request
            try:
                with urllib.request.urlopen(sys.argv[1], timeout=5) as r:
                    sys.exit(0 if r.status == 200 else 1)
            except Exception:
                sys.exit(1)
            RDY_EOF
            do
              echo "[wait] downloader not ready yet..."
              sleep 10
            done
            echo "[wait] downloader ready; materialising /app/checkpoints/s2-pro from HF cache."

            # llm-init writes the standard HF cache snapshot layout
            # ($CACHE/models--fishaudio--s2-pro/snapshots/<sha>/...), but the
            # webui loads a flat checkpoints/s2-pro dir. Point that path at the
            # resolved snapshot; the snapshot's internal blob symlinks are
            # relative to $CACHE (mounted here at the same path) so codec.pth and
            # the rest resolve transparently.
            REPO_DIR="$CACHE/models--fishaudio--s2-pro"
            if [ -f "$REPO_DIR/refs/main" ]; then
              SNAP="$REPO_DIR/snapshots/$(cat "$REPO_DIR/refs/main")"
            else
              SNAP="$(ls -d "$REPO_DIR"/snapshots/*/ 2>/dev/null | head -1)"
            fi
            mkdir -p /app/checkpoints
            ln -sfn "${SNAP%/}" /app/checkpoints/s2-pro
            echo "[wait] checkpoint ready at /app/checkpoints/s2-pro, starting fishspeech webui."
            mkdir -p "${TORCHINDUCTOR_CACHE_DIR:-/app-cache/torch-inductor}" "${TRITON_CACHE_DIR:-/app-cache/triton}" || true
            FP_FILE="/app-cache/.fingerprint"
            TORCH_VERSION_FILE="/app/.venv/lib/python3.12/site-packages/torch/version.py"
            if [ -f "$TORCH_VERSION_FILE" ]; then
              TORCH_FP=$(md5sum "$TORCH_VERSION_FILE" | awk '{print $1}')
            else
              TORCH_FP="no-torch"
            fi
            GPU_CC=$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader,nounits 2>/dev/null | head -n1 | tr -d '[:space:]' || true)
            GPU_CC=${GPU_CC:-unknown}
            NEW_FP="torch=${TORCH_FP}|cc=${GPU_CC}"
            OLD_FP=$(cat "$FP_FILE" 2>/dev/null || true)
            if [ "$OLD_FP" != "$NEW_FP" ]; then
              echo "[cache] fingerprint mismatch, clearing compile cache."
              echo "[cache]   old: ${OLD_FP:-<none>}"
              echo "[cache]   new: ${NEW_FP}"
              rm -rf /app-cache/torch-inductor /app-cache/triton
              mkdir -p /app-cache/torch-inductor /app-cache/triton
              echo "$NEW_FP" > "$FP_FILE"
            else
              echo "[cache] compile cache fingerprint unchanged: ${NEW_FP}"
            fi
            cd /app
            CMD_ARGS=()
            if [ "${COMPILE:-0}" = "1" ] || [ "${COMPILE:-0}" = "true" ]; then
              echo "[start] torch.compile enabled (first inference will be slow while compiling)."
              CMD_ARGS+=(--compile)
            fi
            exec /app/.venv/bin/python tools/run_webui.py \
              --llama-checkpoint-path "${LLAMA_CHECKPOINT_PATH:-checkpoints/s2-pro}" \
              --decoder-checkpoint-path "${DECODER_CHECKPOINT_PATH:-checkpoints/s2-pro/codec.pth}" \
              --decoder-config-name "${DECODER_CONFIG_NAME:-modded_dac_vq}" \
              "${CMD_ARGS[@]}"
        ports:
          - containerPort: 7860
            protocol: TCP
        env:
          - name: HF_ENDPOINT
            value: "{{ .Values.olaresEnv.HF_ENDPOINT }}"
          - name: COMPILE
            value: "1"
          - name: UV_NO_SYNC
            value: "1"
          - name: UV_FROZEN
            value: "1"
          - name: TORCHINDUCTOR_CACHE_DIR
            value: /app-cache/torch-inductor
          - name: TRITON_CACHE_DIR
            value: /app-cache/triton
        resources:
          limits:
            cpu: "5"
            memory: 35Gi
          requests:
            cpu: "500m"
            memory: 14Gi
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - mountPath: /root
          name: data
        - mountPath: /app/checkpoints
          name: checkpoints
        # Shared cross-app HF Hub cache (App Common), populated by the llm-init
        # downloader. Read here to point checkpoints/s2-pro at the snapshot.
        - mountPath: /cache/hf/hub
          name: hf-cache
        - mountPath: /app/references
          name: references
        - mountPath: /tmp/gradio
          name: output
        - mountPath: /app-cache
          name: app-cache
        - name: shm
          mountPath: /dev/shm
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      volumes:
      - hostPath:
          path: '{{ .Values.userspace.appCache }}/data'
          type: DirectoryOrCreate
        name: data-legacy
      - hostPath:
          path: '{{ .Values.userspace.appData }}/data'
          type: DirectoryOrCreate
        name: data
      # checkpoints/s2-pro is now an ephemeral symlink into the shared HF cache,
      # rebuilt on every start; the real model bytes live in hf-cache below.
      - name: checkpoints
        emptyDir: {}
      - name: hf-cache
        hostPath:
          path: '{{ .Values.userspace.appCommon }}/huggingface'
          type: DirectoryOrCreate
      - hostPath:
          path: '{{ .Values.userspace.appData }}/references'
          type: DirectoryOrCreate
        name: references
      - hostPath:
          path: '{{ .Values.userspace.userData }}/AI/output/{{ .Release.Name }}'
          type: DirectoryOrCreate
        name: output
      - hostPath:
          path: '{{ .Values.userspace.appCache }}/compile-cache'
          type: DirectoryOrCreate
        name: app-cache
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "2Gi"
{{/* llm-init in download-only mode (ENGINE_KIND empty): no engine is started
       or proxied; llm-init degrades to a pure model downloader that drops the
       fishaudio/s2-pro repo into the shared cross-app HF Hub cache (App Common,
       fixed /cache/hf/hub). The webui mounts the same store and waits on /readyz
       before pointing checkpoints/s2-pro at the snapshot (see above). This
       replaces the bespoke harveyff-hf-downloader Job. */ -}}
{{- $oe := .Values.olaresEnv | default dict -}}
{{- $hfToken := $oe.HF_TOKEN | default "" -}}
{{- /* Per-release run-state hostPath so concurrent clones on the same node do
       not collide on the sentinel. */ -}}
{{- $runStateHostPath := printf "%s/llm-init-run/%s" .Values.userspace.appCache .Release.Name -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fishspeechv3download
  namespace: {{ .Release.Namespace }}
  labels:
    app: fishspeechv3download
spec:
  replicas: {{ .Values.workloads.fishspeechv3download.replicaCount }}
  selector:
    matchLabels:
      app: fishspeechv3download
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fishspeechv3download
    spec:
      restartPolicy: Always
      volumes:
        # Shared cross-app HF Hub cache (App Common); image bakes HF_HUB_CACHE=/cache/hf/hub.
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appCommon }}/huggingface"
            type: DirectoryOrCreate
        # Per-release sentinel / run-state dir (App Cache).
        - name: run-state
          hostPath:
            path: "{{ $runStateHostPath }}"
            type: DirectoryOrCreate
      initContainers:
        # hostPath dirs are created root-owned; llm-init runs as UID 1000.
        - name: init-chown
          image: docker.io/beclab/aboveos-busybox:1.37.0
          command:
            - sh
            - -c
            - "chown 1000:1000 /cache/hf/hub /run/llm-init || true"
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
            - name: run-state
              mountPath: /run/llm-init
          securityContext:
            runAsUser: 0
      containers:
        - name: llm-init
          # v1.3.1: nullengine download-only, default LFS (hf_xet off unless
          # HF_ENABLE_XET=true) for stable download memory.
          image: docker.io/beclab/llm-init:v1.3.1
          imagePullPolicy: IfNotPresent
          env:
            # Empty ENGINE_KIND selects download-only mode (nullengine).
            - name: ENGINE_KIND
              value: ""
            # Download-only still requires MODEL_NAME + MODEL_MODE placeholders;
            # the repo to fetch comes entirely from MODEL_SOURCE.
            - name: MODEL_NAME
              value: "fishaudio/s2-pro"
            - name: MODEL_MODE
              value: "chat"
            # Single full repo (no --include); must be hf://.
            - name: MODEL_SOURCE
              value: "hf://fishaudio/s2-pro"
            # Always wire the Olares HF mirror (manifest requires HF_ENDPOINT).
            - name: HF_ENDPOINT
              value: "{{ $oe.HF_ENDPOINT }}"
{{- if $hfToken }}
            - name: HF_TOKEN
              value: "{{ $hfToken }}"
{{- end }}
            # Keep concurrency low; LFS is the image default.
            - name: MAX_CONCURRENT_DOWNLOADS
              value: "1"
            - name: RUN_DIR
              value: /run/llm-init
            - name: PORT
              value: "8090"
            - name: LOG_FORMAT
              value: json
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /livez
              port: 8090
            periodSeconds: 30
            timeoutSeconds: 5
          # Readiness on /livez (process up), not /readyz (model ready), so the
          # downloader stays scheduled and serving progress while downloading.
          readinessProbe:
            httpGet:
              path: /livez
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
            - name: run-state
              mountPath: /run/llm-init
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              # `hf download` runs a python subprocess in this cgroup; 4Gi gives
              # the huggingface_hub CLI headroom on multi-GB model downloads.
              memory: 4Gi

---
# Internal progress / health surface (no entrance). The webui waits on /readyz
# here before reading the shared cache; the nginx entrance uses this Service as
# the download dashboard upstream until the app comes up.
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: fishspeechv3download
spec:
  selector:
    app: fishspeechv3download
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: fishspeech
  name: fishspeech
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
  - name: "7860"
    port: 7860
    targetPort: 7860
  selector:
    io.kompose.service: fishspeech
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: fishspeech
  name: sharedentrances-api
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
  - name: "sharedentrances-api"
    port: 80
    targetPort: 7860
  selector:
    io.kompose.service: fishspeech
status:
  loadBalancer: {}
