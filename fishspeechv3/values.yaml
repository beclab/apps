# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   fishspeechv3         — Fish Speech WebUI engine Deployment (name: {{ .Release.Name }} == appid)
#   fishspeechv3download — llm-init download-only Deployment (shared HF cache)
#   fishspeechclient     — nginx entrance Deployment
workloads:
  fishspeechclient:
    replicaCount: 1
  fishspeechv3download:
    replicaCount: 1
  fishspeechv3:
    replicaCount: 1
