metadata:
  title: Fish Speech
  description: SOTA Open Source TTS
spec:
  fullDescription: |
    **IMPORTANT NOTE**  
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    True human-like Text-to-Speech and Voice Cloning

    Bundled checkpoint: [fishaudio/s2-pro](https://huggingface.co/fishaudio/s2-pro) — Fish Audio's latest pro-tier release of the expressive TTS / voice-cloning family.
    
    FishAudio-S2 Pro is an expressive text-to-speech (TTS) and voice cloning model developed by Fish Audio, designed to generate speech that sounds natural, realistic, and emotionally rich — not robotic, not flat, and not constrained to studio-style narration.
    
    FishAudio-S2 Pro focuses on how humans actually speak: with emotion, variation, pauses, and intent.

    Features
    - Zero-shot & Few-shot TTS: Input a 10 to 30-second vocal sample to generate high-quality TTS output.

    - Multilingual & Cross-lingual Support: Simply copy and paste multilingual text into the input box—no need to worry about the language. Currently supports English, Japanese, Korean, Chinese, French, German, Arabic, and Spanish.

    - No Phoneme Dependency: The model has strong generalization capabilities and does not rely on phonemes for TTS. It can handle text in any language script.

    - Highly Accurate: Achieves a low CER (Character Error Rate) of around 0.4% and WER (Word Error Rate) of around 0.8% for Seed-TTS Eval.

    - Fast: Accelerated by torch compile, the real-time factor is approximately 1:7 on an Nvidia RTX 4090 GPU.

    - WebUI Inference: Features an easy-to-use, Gradio-based web UI compatible with Chrome, Firefox, Edge, and other browsers.
    
    - GUI Inference: Offers a PyQt6 graphical interface that works seamlessly with the API server. Supports Linux, Windows, and macOS.

  upgradeDescription: |
    Switched model provisioning to the shared llm-init downloader: replaced the bespoke downloader Job with an `llm-init:v1.2.4` download-only Deployment (`fishspeechv3download`) that fetches fishaudio/s2-pro into the shared cross-app Hugging Face cache (App Common, `/cache/hf/hub`); the WebUI now waits on the downloader's `/readyz` and symlinks `checkpoints/s2-pro` to the HF snapshot. The `fishspeechclient` nginx entrance serves the download dashboard and auto-reloads into the Gradio WebUI when ready. Added the `appCommon` permission. Previously migrated Fish Speech to the apiVersion v3 shared app pattern (fishspeechv2 → fishspeechv3).
