olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: fishspeechv3
  icon: https://app.cdn.olares.com/appstore/fishspeech/icon.png
  description: SOTA Open Source TTS
  appid: fishspeechv3
  title: Fish Speech
  version: '1.1.8'
  categories:
  - AI

sharedEntrances:
- name: fishspeechv3
  title: Fish Speech
  host: sharedentrances-api
  icon: https://app.cdn.olares.com/appstore/fishspeech/icon.png
  port: 0
  invisible: true
  authLevel: internal

entrances:
- authLevel: internal
  host: fishspeechclient
  icon: https://app.cdn.olares.com/appstore/fishspeech/icon.png
  name: fishspeechclient
  openMethod: window
  port: 8080
  title: Fish Speech

workloadReplicas:
  fishspeechv3: 1
  fishspeechv3download: 1
  fishspeechclient: 1

permission:
  appData: true
  appCache: true
  # appCommon: shared cross-app HF Hub cache (/cache/hf/hub) populated by the
  # llm-init downloader and read by the WebUI to materialise checkpoints/s2-pro.
  appCommon: true
  userData:
  - Home

spec:
  versionName: 'webui-cuda-cu129-20260422'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    True human-like Text-to-Speech and Voice Cloning

    Bundled checkpoint: [fishaudio/s2-pro](https://huggingface.co/fishaudio/s2-pro) — Fish Audio's latest pro-tier release of the expressive TTS / voice-cloning family.

    FishAudio-S2 Pro is an expressive text-to-speech (TTS) and voice cloning model developed by Fish Audio, designed to generate speech that sounds natural, realistic, and emotionally rich — not robotic, not flat, and not constrained to studio-style narration.

    FishAudio-S2 Pro focuses on how humans actually speak: with emotion, variation, pauses, and intent.

    Features
    - Zero-shot & Few-shot TTS: Input a 10 to 30-second vocal sample to generate high-quality TTS output.

    - Multilingual & Cross-lingual Support: Simply copy and paste multilingual text into the input box—no need to worry about the language. Currently supports English, Japanese, Korean, Chinese, French, German, Arabic, and Spanish.

    - No Phoneme Dependency: The model has strong generalization capabilities and does not rely on phonemes for TTS. It can handle text in any language script.

    - Highly Accurate: Achieves a low CER (Character Error Rate) of around 0.4% and WER (Word Error Rate) of around 0.8% for Seed-TTS Eval.

    - Fast: Accelerated by torch compile, the real-time factor is approximately 1:7 on an Nvidia RTX 4090 GPU.

    - WebUI Inference: Features an easy-to-use, Gradio-based web UI compatible with Chrome, Firefox, Edge, and other browsers.

    - GUI Inference: Offers a PyQt6 graphical interface that works seamlessly with the API server. Supports Linux, Windows, and macOS.

  upgradeDescription: |
    Switched model provisioning to the shared llm-init downloader.

    **What's Changed**

    - **Download architecture**: replaced the bespoke `harveyff-hf-downloader`
      Job with an `llm-init:v1.2.4` download-only Deployment
      (`fishspeechv3download`). The fishaudio/s2-pro checkpoint now lands in the
      shared cross-app Hugging Face cache (App Common, `/cache/hf/hub`) instead
      of a per-app App Data copy, so it is de-duplicated across apps and survives
      reinstalls. Defaults to stable LFS downloads (hf_xet off).
    - **Readiness gate**: the WebUI waits on the downloader's `/readyz` (repo on
      disk) instead of the old `.s2-pro.done` sentinel, then points
      `checkpoints/s2-pro` at the resolved HF snapshot via symlink.
    - **Entrance**: the `fishspeechclient` nginx entrance now serves the llm-init
      download dashboard while the model downloads and auto-reloads into the
      Gradio WebUI once both the model is on disk and the app is answering;
      llm-init control-plane paths are pinned to the downloader.
    - **Permissions**: added `appCommon` for the shared HF cache.

    Previously: migrated Fish Speech to the apiVersion v3 shared app pattern
    (fishspeechv2 → fishspeechv3), flattening the sub-charts into a single chart
    with the WebUI engine Deployment named after the release and a
    `fishspeechclient` nginx entrance. Runtime image
    `beclab/harveyff-fishaudio-fish-speech:webui-cuda-cu129-20260422`, bundled
    checkpoint fishaudio/s2-pro, CUDA 12.9 (cu129) for Blackwell (sm_120) support.

  developer: Fish Audio
  website: https://speech.fish.audio/
  sourceCode: https://github.com/fishaudio/fish-speech
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://speech.fish.audio/
  license:
  - text: Apache-2.0
    url: https://github.com/fishaudio/fish-speech/blob/main/LICENSE
  supportArch:
  - amd64
  onlyAdmin: true

  requiredCpu: "1"
  limitedCpu: "7"
  requiredMemory: 16Gi
  limitedMemory: 40Gi
  requiredDisk: 50Mi
  limitedDisk: 50Gi
envs:
- envName: HF_TOKEN
  required: true
  applyOnChange: true
  valueFrom:
    envName: OLARES_USER_HUGGINGFACE_TOKEN
- envName: HF_ENDPOINT
  required: true
  applyOnChange: true
  valueFrom:
    envName: OLARES_USER_HUGGINGFACE_SERVICE

options:
  shared: true
  apiTimeout: 0
  conflicts:
  - name: fishspeechv2
    type: application
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
