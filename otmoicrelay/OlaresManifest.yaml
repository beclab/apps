olaresManifest.version: '0.7.2' 
olaresManifest.type: app
metadata:
  name: otmoicrelay
  description: Otmoic Relay
  icon: https://file.bttcdn.com/appstore/transmission/icon.png
  appid: otmoicrelay
  version: 2.5.0
  title: Otmoic-Relay
  categories:
  - Blockchain
permission:
  appData: true
  appCache: true
spec:
  versionName: 2.5.0
  fullDescription: Otmoic Relay
  developer: ByteTrade
  submitter: ByteTrade
  language:
  - en
  requiredMemory: 2Gi
  limitedMemory: 80Gi
  requiredDisk: 128Mi
  limitedDisk: 2560Mi
  requiredCpu: 0.2
  limitedCpu: 16
  supportArch:
  - amd64
options:
  dependencies:
  - name: terminus
    type: system
    version: '>=0.3.7-0'
  policies:
    - uriRegex: ^/(ping|relay|socket.io|connect|app|upload|get_application_schema|get_presentation_definition|relay-admin-panel/kyc|relay-admin-panel/lpnode_admin_panel|reputation/)
      level: public
      oneTime: false
      validDuration: 3600s
      entranceName: traefik

entrances:
- name: traefik
  port: 80
  host: traefik
  title: Otmoic Relay
  icon: https://file.bttcdn.com/appstore/transmission/icon.png
  authLevel: private
terminusManifest.type: app
