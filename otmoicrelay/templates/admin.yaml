# Source: otmoic-relay-adminpanel/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: relay-adminpanel-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: relay-adminpanel
  type: ClusterIP
  ports:
    - protocol: TCP
      name: relay-admin-panel-api
      port: 9101
      targetPort: 9101
---
# Source: otmoic-relay-adminpanel/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-adminpanel
  namespace: {{ .Release.Namespace }}
  labels:
    app: relay-adminpanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay-adminpanel
  template:
    metadata:
      labels:
        app: relay-adminpanel
    spec:
      initContainers:
      - name: wait-postgresql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-relay-db-postgresql-postgresql-ha-pgpool 5432; do echo waiting for postgresql; sleep 3; done']
      - name: wait-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otmoic-relay-db-redis-master 6379; do echo waiting for redis; sleep 3; done']
      volumes:
      - name: document
        hostPath:
          type: DirectoryOrCreate
          path: {{ .Values.userspace.appData}}/otmoicrelay
      containers:
      - name: relay-adminpanel
        image: otmoic/relay-admin:V2.5.0
        ports:
          - containerPort: 9101
        resources:
          requests:
            cpu: 1m
            memory: 1Mi
          limits:
            cpu: 200m
            memory: 512Mi
        env:
          - name: POSTGRES_USERNAME
            value: "postgres"
          - name: POSTGRES_HOST
            value: "otmoic-relay-db-postgresql-postgresql-ha-pgpool"
          - name: POSTGRES_PORT
            value: "5432"
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: otmoic-relay-db-postgresql-postgresql-ha-postgresql
                key: password
          - name: REDIS_PWD
            valueFrom:
              secretKeyRef:
                name: otmoic-relay-db-redis
                key: redis-password
          - name: REDIS_PORT
            value: "6379"
          - name: REDIS_HOST
            value: otmoic-relay-db-redis-master
        volumeMounts:
        - name: document
          mountPath: /admin-panel/app

