metadata:
  title: AnythingLLM
  description: 您一直在寻找的全方位AI应用程序。
spec:
  fullDescription: |
    AnythingLLM： 您一直在寻找的全方位AI应用程序。
    与您的文档聊天，使用AI代理，高度可配置，多用户，无需繁琐的设置。

    AnythingLLM 是一个全栈应用程序，可以将任何文档、资源（如网址链接、音频、视频）或内容片段转换为上下文，以便任何大语言模型（LLM）在聊天期间作为参考使用。此应用程序允许您选择使用哪个LLM或向量数据库，同时支持多用户管理并设置不同权限。

    AnythingLLM的一些酷炫特性
    - 多用户实例支持和权限管理
    - 工作区内的智能体Agent（浏览网页、运行代码等）
    - 为您的网站定制的可嵌入聊天窗口
    - 支持多种文档类型（PDF、TXT、DOCX等）
    - 通过简单的用户界面管理向量数据库中的文档
    - 两种对话模式：聊天和查询。聊天模式保留先前的对话记录。查询模式则是针对您的文档做简单问答
    - 聊天中会提供所引用的相应文档内容
    - 100%云部署就绪。
    - 部署你自己的LLM模型
    - 管理超大文档时高效、低耗。只需要一次就可以嵌入（Embedding）一个庞大的文档或文字记录。比其他文档聊天机器人解决方案节省90%的成本。
    - 全套的开发人员API，用于自定义集成！
  upgradeDescription: |
    升级至版本 1.14.1

    性能与稳定性
    - 修复 embedder 内存泄漏，避免服务端进程反复重载。
    - 长对话场景下前端性能大幅提升。
    - API 错误信息更清晰，并修复 Mistral embedder 编码问题。

    新功能
    - 支持将聊天导出为 PDF、JSON、Markdown 等格式。
    - 支持复制聊天链接，便于在桌面端/自托管实例中通过 deeplink 重新打开。
    - 通过 Tinyscribe 引擎重新支持在聊天中上传音频和视频。
    - Agent 流程变量高亮显示，并支持自定义 Agent 技能的请求审批。

    Provider 变更
    - 上游移除了维护停滞的 DPAIS 和 HuggingFace provider。
    - Cohere 集成迁移至 OpenAI 兼容 SDK。

    其他修复
    - 修复浅色模式下 toast 主题显示异常。
    - 修复网页抓取与摘要流程中的 EventEmitter 泄漏。
    - Bedrock Claude Opus 4.8 不再发送不支持的 temperature 参数。

    说明：升级后不再默认预配置 Ollama 作为 LLM/Embedding provider，请在设置中自行配置。

    完整升级说明请参阅: https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.14.1
