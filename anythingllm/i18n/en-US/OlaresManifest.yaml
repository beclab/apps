metadata:
  title: AnythingLLM
  description: The all-in-one AI app you were looking for.
spec:
  fullDescription: |
    AnythingLLM: The all-in-one AI app you were looking for.
    Chat with your docs, use AI Agents, hyper-configurable, multi-user, & no frustrating set up required.

    AnythingLLM is a full-stack application that enables you to turn any document, resource, or piece of content into context that any LLM can use as references during chatting. This application allows you to pick and choose which LLM or Vector Database you want to use as well as supporting multi-user management and permissions.

    Cool features of AnythingLLM:
    - Custom AI Agents
    - No-code AI Agent builder
    - Multi-modal support (both closed and open-source LLMs!)
    - Multi-user instance support and permissioning Docker version only
    - Agents inside your workspace (browse the web, etc)
    - Custom Embeddable Chat widget for your website Docker version only
    - Multiple document type support (PDF, TXT, DOCX, etc)
    - Simple chat UI with Drag-n-Drop funcitonality and clear citations.
    - 100% Cloud deployment ready.
    - Works with all popular closed and open-source LLM providers.
    - Built-in cost & time-saving measures for managing very large documents compared to any other chat UI.
    - Full Developer API for custom integrations!
  upgradeDescription: |
    Upgrade to version 1.14.1

    Performance & reliability
    - Fixed embedder memory leak that caused repeated reloads in the server process.
    - Major frontend performance improvements for long-running chats.
    - Better API error messages and Mistral embedder encoding fixes.

    New features
    - Export chats as PDF, JSON, Markdown, and more from the chat UI.
    - Copy chat link for deeplinking back into desktop/self-hosted sessions.
    - Re-enabled audio and video uploads in chat via the Tinyscribe engine.
    - Agent flow variable highlighting and request approval for custom agent skills.

    Provider changes
    - Removed unmaintained DPAIS and HuggingFace providers upstream.
    - Cohere integration migrated to the OpenAI-compatible SDK.

    Other fixes
    - Fixed toast theme resolution in light mode.
    - Fixed EventEmitter leak in web-scraping and summarize flows.
    - Bedrock Claude Opus 4.8 no longer sends unsupported temperature params.

    Note: LLM and embedding providers are no longer preconfigured to Ollama. Configure them in Settings after upgrade.

    Full release notes: https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.14.1
