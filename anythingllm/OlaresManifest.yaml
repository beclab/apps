  fullDescription: |
    AnythingLLM: The all-in-one AI app you were looking for.
    Chat with your docs, use AI Agents, hyper-configurable, multi-user, & no frustrating set up required.

    AnythingLLM is a full-stack application that enables you to turn any document, resource, or piece of content into context that any LLM can use as references during chatting. This application allows you to pick and choose which LLM or Vector Database you want to use as well as supporting multi-user management and permissions.

    Cool features of AnythingLLM
    - Custom AI Agents
    - No-code AI Agent builder
    - Multi-modal support (both closed and open-source LLMs!)
    - Multi-user instance support and permissioning Docker version only
    - Agents inside your workspace (browse the web, etc)
    - Custom Embeddable Chat widget for your website Docker version only
    - Multiple document type support (PDF, TXT, DOCX, etc)
    - Simple chat UI with Drag-n-Drop funcitonality and clear citations.
    - 100% Cloud deployment ready.
    - Works with all popular closed and open-source LLM providers.
    - Built-in cost & time-saving measures for managing very large documents compared to any other chat UI.
    - Full Developer API for custom integrations!
  upgradeDescription: |
    Upgrade to version 1.11.1

    Homepage Redesign
    - The main homepage has been completely redesigned to be more modern and user-friendly.

    Native Tool Calling
    - Completely overhauled how @agent tool calling works with native tool calling support.
    - Run complex, multi-step tool calls with your LLM provider and model.
    - Automatically supported for Ollama, LM Studio, and the built-in LLM provider.
    - 100x better responses from even small tool-calling models.

    Lemonade by AMD Integration
    - First class support for Lemonade by AMD, an open-source local model runtime optimized for AMD GPUs and NPUs.

    Other Changes (v1.11.0)
    - New dedicated dark theme option with system preference support.
    - Desktop overlay panel with OS-level application awareness.
    - Web push notifications support.
    - SambaNova and PrivateModeAI LLM provider integrations.
    - Fixed GitLab connector infinite loop and rate limit crash.
    - Fixed Gemini agent 400 error on tool call responses.

    Full release notes: https://github.com/Mintplex-Labs/anything-llm/releases/tag/v1.11.1
  developer: Mintplex Labs
  website: https://anythingllm.com/
