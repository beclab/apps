spec:
  versionName: "1.11.1"
  featuredImage: https://app.cdn.olares.com/appstore/anythingllm/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/anythingllm/1.webp
    - https://app.cdn.olares.com/appstore/anythingllm/2.webp
    - https://app.cdn.olares.com/appstore/anythingllm/3.webp
    - https://app.cdn.olares.com/appstore/anythingllm/4.webp
