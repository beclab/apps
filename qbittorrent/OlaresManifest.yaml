  fullDescription: |
    qBittorrent is a well established open-source BitTorrent client. qBittorrent features a light footprint, whilst providing all the features you may need. It uses the high-tech libtorrent-rasterbar library, which means greater download and upload speed, as well as excellent support of the latest features in the BitTorrent protocol.

    **FEATURES**
    - Polished µTorrent-like User Interface
    - No Ads
    - Well-integrated and extensible Search Engine
      - Simultaneous search in many Torrent search sites
      - Category-specific search requests (e.g. Books, Music, Software)
    - RSS feed support with advanced download filters (incl. regex)
    - Many Bittorrent extensions supported:
      - Magnet links
      - Distributed hash table (DHT), peer exchange protocol (PEX), local peer discovery (LSD)
      - Private torrents
      - Encrypted connections
      - and many more...
    - Remote control through Web user interface, written with AJAX
      - Nearly identical to the regular GUI
    - Sequential downloading (Download in order)
    - Advanced control over torrents, trackers and peers
      - Torrents queueing and prioritizing
      - Torrent content selection and prioritizing
    - Bandwidth scheduler
    - Torrent creation tool
    - IP Filtering (eMule & PeerGuardian format compatible)
    - IPv6 compliant
    - UPnP / NAT-PMP port forwarding support
    - Available on all platforms: Windows, Linux, macOS, FreeBSD, OS/2
    - Available in ~70 languages

  upgradeDescription: |

    Stop recursively chowning the whole Home on startup; only fix ownership on Downloads/qBittorrent and appData.
    Upgrade qBittorrent to version 5.2.2(2026-06-25)
    Config changes: add External directory to download path.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Change default Olares External Directory mount path to /olares/userdata/external
    
    Upgrade Highlights:
    - [Security] Multiple security fixes: prevented local file access in WebAPI/RSS/Search modules (v5.1.2); patched SSRF via HTTP redirection (v5.2.1); restricted X-Forwarded-Host header to reverse proxy mode only to prevent host spoofing (v5.2.2)
    - [New Features] Status bar now shows free disk space and external IP address; tracker list can be fetched from a URL; per-category share limits; optional system reboot on download completion; advanced "Tracker status" filter added
    - [WebUI Overhaul] Major WebUI rewrite: virtual list rendering for significantly improved performance with large torrent queues; new torrent creation UI; redesigned login form; Basic Auth and API Key authentication; configurable display density
    - [WebAPI & Search] New endpoints: app/processInfo, setComment; API Key auth support; SOCKS4/SOCKS4a proxy for search engine; multiple simultaneous searches with persistent history and tab sessions
    - [Stability Fixes] Fixed empty folders left after deleting/moving torrents; stale lockfile causing startup failures; getrandom() crashes on specific Linux setups; premature reannounce before interface changes are applied
    - [Platform Support] Windows NSIS installer adds native ARM64 build; Linux gains D-Bus file manager integration; AppImages now natively support Wayland

    Full changelog: https://www.qbittorrent.org/news#mon-jun-15th-2026---qbittorrent-v5.2.2-release

