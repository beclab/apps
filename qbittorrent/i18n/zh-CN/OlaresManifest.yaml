metadata:
  description: 免费的 BitTorrent 下载工具
  title: qBittorrent
spec:
  fullDescription: |
    qBittorrent 是一个成熟的开源 BitTorrent 客户端。qBittorrent 具有轻量级的特点，同时提供您可能需要的所有功能。它使用高科技的 libtorrent-rasterbar 库，这意味着更高的下载和上传速度，以及对 BitTorrent 协议最新功能的出色支持。

    **主要功能**
    - 精心设计的类 µTorrent 用户界面
    - 无广告
    - 集成良好且可扩展的搜索引擎
      - 在多个种子搜索网站同时搜索
      - 特定类别的搜索请求（如书籍、音乐、软件）
    - 支持 RSS 订阅，具有高级下载过滤器（正则表达式）
    - 支持多种 Bittorrent 扩展：
      - 磁力链接
      - 分布式哈希表（DHT）、对等交换协议（PEX）、本地对等发现（LSD）
      - 私有种子
      - 加密连接
      - 以及更多...
    - 通过基于 AJAX 的 Web 用户界面进行远程控制
      - 几乎与常规 GUI 相同
    - 顺序下载（按顺序下载）
    - 对种子、追踪器和对等节点的高级控制
      - 种子队列和优先级设置
      - 种子内容选择和优先级设置
    - 带宽调度器
    - 种子创建工具
    - IP 过滤（兼容 eMule 和 PeerGuardian 格式）
    - 兼容 IPv6
    - 支持 UPnP / NAT-PMP 端口转发
    - 可用于所有平台：Windows、Linux、macOS、FreeBSD、OS/2
    - 提供约 70 种语言版本

  upgradeDescription: |
    升级 qBittorrent 至版本 5.2.2（2026-06-25）
    配置变更：新增 External 目录到下载路径。
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 变更默认 Olares External 目录挂载路径为 /olares/userdata/external

    升级亮点：
    - 【安全性】多项安全修复：防止通过 WebAPI/RSS/搜索模块访问本地文件（v5.1.2）；修补通过 HTTP 重定向的 SSRF 漏洞（v5.2.1）；限制 X-Forwarded-Host 头仅反向代理模式可用，防止主机伪造（v5.2.2）
    - 【新功能】状态栏现在显示可用磁盘空间和外部 IP 地址；支持通过 URL 获取追踪器列表；按分类设定共享限制；下载完成后可选系统重启；增加高级“Tracker 状态”筛选
    - 【WebUI 大幅升级】WebUI 主要重写：虚拟列表渲染显著提升大种子队列的性能；新建种子界面；全新登录表单；支持 Basic Auth 和 API 密钥认证；可配置显示密度
    - 【WebAPI & 搜索】新增端点：app/processInfo、setComment；支持 API 密钥认证；搜索引擎支持 SOCKS4/SOCKS4a 代理；多任务并行搜索，持久保存历史与标签页会话
    - 【稳定性修复】修复删除/移动种子后残留空文件夹；修复锁文件导致的启动失败；修复特定 Linux 设置下 getrandom() 崩溃；修复接口变更前提早重新通告的问题
    - 【平台支持】Windows NSIS 安装包加入原生 ARM64 构建；Linux 增加 D-Bus 文件管理器集成；AppImage 现已原生支持 Wayland

    完整更新日志：https://www.qbittorrent.org/news#mon-jun-15th-2026---qbittorrent-v5.2.2-release
