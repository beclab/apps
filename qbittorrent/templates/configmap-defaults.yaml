apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-defaults
  namespace: {{ .Release.Namespace }}
data:
  # linuxserver/docker-qbittorrent@libtorrentv1-release-5.1.4_v1.2.20-ls112
  # root/defaults/qBittorrent.conf + Olares path/WebUI overrides
  qBittorrent.conf: |
    [AutoRun]
    enabled=false
    program=

    [LegalNotice]
    Accepted=true

    [Preferences]
    Connection\UPnP=false
    Connection\PortRangeMin=6881
    Downloads\SavePath=/olares/userdata/home/Downloads/qBittorrent
    Downloads\ScanDirsV2=@Variant(\0\0\0\x1c\0\0\0\0)
    Downloads\TempPath=/olares/userdata/home/Downloads/qBittorrent/incomplete/
    WebUI\Address=*
    WebUI\ServerDomains=*
    WebUI\Port=8080
    WebUI\CSRFProtection=false
    WebUI\HostHeaderValidation=false
    WebUI\LocalHostAuth=false
    WebUI\AuthSubnetWhitelistEnabled=true
    WebUI\AuthSubnetWhitelist=0.0.0.0/0, ::/0
