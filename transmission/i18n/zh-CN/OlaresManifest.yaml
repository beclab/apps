metadata:
  description: 跨平台 BitTorrent 下载客户端
  title: Transmission
spec:
  fullDescription: |
    Transmission 是一个快速、简单且免费的 BitTorrent 客户端。

    **功能亮点**
    简单且强大
    - Transmission 设计注重易用性和强大功能。我们已经为用户预设了默认配置，开箱即用；只需几步即可设置高级功能，比如监视目录、不良节点屏蔽列表和网页界面。

    原生系统集成
    - 与许多跨平台应用不同，Transmission 能够无缝地与您的操作系统集成。


    开源与隐私保护
    - 与某些 BitTorrent 客户端不同，Transmission 不以盈利为目的“套路”用户：没有工具栏、弹窗广告、Flash 广告、Twitter 工具或其他捆绑内容。不限制部分功能做收费版本。源代码完全开放。我们不会跟踪用户，我们的网站和论坛也没有第三方广告或分析代码。

    界面简洁，功能丰富
    - Transmission 提供用户真正需要的 BitTorrent 客户端功能，并配以易用的界面：隐私保护、网页界面、完善的节点通信、Tracker 编辑、速度限制等。

  upgradeDescription: |
    此版本仅包含漏洞修复大家对 4.0.x 版本的反馈非常有帮助 -- 感谢所有的建议、错误报告和 PR！

    4.0.5 版本的新特性

    亮点
    - 修复了 4.0.0 版本中 UDP 通告中 IP 地址字段未按网络字节顺序编码的错误。
    [BEP-15]. (6132)
    - 修复了在某些语言环境下错误转义 JSON 字符串的问题。(#6005, #6133)
    - 修复了4.0.4 版本中为设置低上传带宽限制的用户导致下载速度降低
     的问题(6134)

    所有平台
    - 修复了无法编辑磁力链接上的 tracker 的错误。(5957)
    - 修复了通过 HTTPS URL 添加种子文件后，HTTP tracker 通告和刮削有时会失败的问题。
    (5969)
    - 在 RPC 响应中，将种子的默认排序顺序更改为与 Transmission
    3.00 匹配。(5604)
    - 修复了在某些群晖设备上 tr_sys_path_copy() 的行为问题。(5974)

    macOS 客户端
    - 从源代码构建时支持 Sonoma 系统。(#6016, #6051)
    - 修复了在分组列表中长组名过早被截断的问题。(6104)

    Qt 客户端
    - 修复：仅为监视目录中的文件添加 .added 后缀。(5705)

    GTK 客户端
    - 修复了在 GTK 4 中从"最近使用"部分打开种子文件时崩溃的问题。
    (#6131, #6142)

    发布说明请访问：https://github.com/transmission/transmission/releases/tag/4.0.5
