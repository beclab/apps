metadata:
  title: Transmission
  description: Transmission is a cross-platform BitTorrent client
spec:
  fullDescription: |
    Transmission is a fast, easy, and free BitTorrent client.

    **Features**
    Easy & Powerful
    - Transmission is designed for easy, powerful use. We've set the defaults to just work and it only takes a few clicks to configure advanced features like watch directories, bad peer blocklists, and the web interface.

    Native for Your System
    - Unlike many cross-platform applications, Transmission integrates seamlessly with your operating system.

    Lightweight & Lightning Fast
    - Transmission has one of the lowest memory & resource footprints of any major BitTorrent client. Transmission's light overhead is one reason why it is so well suited for home NAS and media servers.

    Open Source & Privacy Focused
    - Unlike some BitTorrent clients, Transmission doesn't play games with its users to make money: Transmission doesn't bundle toolbars, pop-up ads, flash ads, twitter tools, or anything else. It doesn't hold some features back for a payware version. Its source code is available for anyone to review. We don't track our users, and our website and forums have no third-party ads or analytics.

    Sleek & Feature Rich
    - The features you want from a BitTorrent client with an easy-to-use interface: privacy protection, a web interface, full peer communications, tracker editing, speed limits, and more.
  upgradeDescription: |
    Upgrade Transmission to version 4.1.2 (2025-06-02)
    Config changes: unified download directory & entrance auth level.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Add Olares External Directory mount path to /olares/userdata/external
    - Keep legacy /downloads mount for existing configurations
    - Seed default download paths via settings.json for new installs: Home/Downloads/transmission
    - Entrance auth level changed to internal
    - Switch container image to linuxserver/transmission

    Upgrade Highlights:
    - [Highlights] Fixed 4.1.0 bug that could cause duplicate HTTP announces to trackers
    - [All Platforms] Fixed downloads stalled at 99%; fixed 4.1.0 TCP peer connection regression; fixed upgrade overwriting utp_enabled/tcp_enabled; reject invalid benc data; added HTTP clickjacking safeguards; UTF-8 peer client name sanitization
    - [Web Client] Fixed timestamp display in dropdowns; fixed incorrect torrent status after reconnecting
    - [Qt/GTK] Fixed 4.1.0 crashes and settings migration issues
    - [macOS] Fixed 4.1.0 memory leak; improved UI CPU usage

    Full release note: https://github.com/transmission/transmission/releases/tag/4.1.2
