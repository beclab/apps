apiVersion: v1
kind: ConfigMap
metadata:
  name: transmission-init
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    homeDir="/olares/userdata/home"
    downloadDir="$homeDir/Downloads/transmission"
    confFile="/appdata-root/config/settings.json"
    defaultConf="/chart-defaults/settings.json"

    mkdir -p "$downloadDir/incomplete" \
      "$homeDir/Downloads/complete" \
      "$homeDir/Downloads/incomplete" \
      /appdata-root/config /appdata-root/watch
    # Only app-created Downloads paths + appData — never recurse the whole Home.
    chown -R 1000:1000 "$downloadDir" \
      "$homeDir/Downloads/complete" \
      "$homeDir/Downloads/incomplete" \
      /appdata-root

    if [ ! -f "$confFile" ]; then
      echo "First-time setup: copying default settings.json into /config."
      cp "$defaultConf" "$confFile"
    else
      echo "Existing settings.json found in /config."
    fi
