metadata:
  description: "Qwopus3.6-27B-v2 MTP IQ4_XS served with llama.cpp."
  title: Qwopus3.6-27B MTP (llama.cpp)

spec:
  fullDescription: |
    **Model Overview**
    Qwopus3.6-27B-v2 is a community fine-tuned variant of Qwen3.6-27B with built-in Multi-Token Prediction (MTP) heads, published by Jackrong on Hugging Face. It supports thinking and tool calling and is optimized for structured logic output. This app serves the `IQ4_XS` GGUF build from `Jackrong/Qwopus3.6-27B-v2-MTP-GGUF` via llama.cpp (text-only preset, no vision/mmproj).

    Recommended when you need high token generation speed, or when your workload requires strict structured output and DevOps-style tasks. This community build is tuned for compact, well-formed outputs in those scenarios.

    **Preset Configuration**
    - Model: `Jackrong/Qwopus3.6-27B-v2-MTP-GGUF:IQ4_XS`
    - Capabilities: thinking, tools
    - Engine args: `-c 100352 -ngl all -fa on -ctk q8_0 -ctv q8_0 --jinja -np 1 --spec-type draft-mtp --spec-draft-n-max 2` (98K context, MTP draft-2, full GPU offload, q8_0 KV cache)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    | `cpu`          | CPU only          | Adds `-ngl 0`; disables GPU and MTP speedup      |

    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving when ready. MTP (`--spec-type draft-mtp`) uses the model's built-in draft head to predict multiple tokens per step for higher decode throughput.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - `IQ4_XS` weights are ~15.4 GiB; this preset targets GPUs with at least 23Gi for 98K context + MTP.
    - MTP adds modest VRAM overhead; if OOM at full 98K context, reduce `-c` (e.g. `-c 65536`).
