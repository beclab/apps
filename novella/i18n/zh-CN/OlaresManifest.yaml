metadata:
  description: 具有 AI 自动完成功能的 Notion 风格所见即所得编辑器
  title: Novel
spec:
  fullDescription: |
    Novel 是一个基于网络的开源所见即所得（WYSIWYG）编辑器，灵感来自 Notion，提供 AI 驱动的自动完成功能。

    它特别适用于那些撰写长篇内容（如论文或报告）的人，并帮助他们在写作过程中保持一致的语气和风格。

    **主要特点：**
    - 所见即所得编辑：提供用户友好的编辑体验，用户可以实时看到内容的呈现效果。

    - AI 自动完成：
    运用 AI 驱动的自动完成功能，在用户输入时提供相关的词语、短语和句子建议。

    - 开源：
    允许开发者根据自己的需求贡献、定制和扩展工具的功能。

  upgradeDescription: |
    AI 凭证改从 Olares 全局设置（设置 → 集成 → OpenAI / 自定义 OpenAI）注入容器环境变量，不再挂载 /src/.env。

    OPENAI_API_KEY 优先使用 OLARES_USER_CUSTOM_OPENAI_APIKEY，否则用 OLARES_USER_OPENAI_APIKEY；OPENAI_BASE_URL 来自 OLARES_USER_CUSTOM_OPENAI_SERVICE（留空则走 OpenAI 官方默认地址）。
