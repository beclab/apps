# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   whisperwebuiv3         — Gradio engine Deployment (name: {{ .Release.Name }} == appid)
#   whisperwebuiv3download — llm-init download-only Deployment (shared HF cache)
#   whisperwebuiv3client     — nginx entrance Deployment (UI + terminal + API proxy)
#   terminal               — in-pod shell entrance
workloads:
  terminal:
    replicaCount: 1
  whisperwebuiv3client:
    replicaCount: 1
  whisperwebuiv3download:
    replicaCount: 1
  whisperwebuiv3:
    replicaCount: 1
