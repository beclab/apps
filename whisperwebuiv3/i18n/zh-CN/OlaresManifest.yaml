metadata:
  title: Whisper-WebUI
  description: 基于 whisper 模型的 Web 界面，可轻松生成字幕。
spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，在 Olares 内部仅会部署一个服务。

    **前置条件**
    安装前请配置 **HF_TOKEN** 和 **HF_ENDPOINT**。管理员 Token 须已在 Hugging Face 接受以下受限仓库条款：
    - `pyannote/speaker-diarization-3.1`
    - `pyannote/segmentation-3.0`

    llm-init 预下载：`Systran/faster-whisper-large-v2`、`pyannote/speaker-diarization-3.1`、`pyannote/segmentation-3.0`。

    **性能说明**
    安装后首次转写可能较慢（模型载入 GPU），后续请求会更快。

    **应用概览**
    基于 Gradio 的 Whisper 浏览器界面。您可以将其用作简易字幕生成器！

    **功能亮点**
    选择您想要使用的 Whisper 实现：
    - openai/whisper
    - SYSTRAN/faster-whisper（默认使用）
    - Vaibhavs10/insanely-fast-whisper

    从各种来源生成字幕，包括：
    - 文件
    - YouTube
    - 麦克风录音

    目前支持的字幕格式：
    - SRT
    - WebVTT
    - txt（仅限文本文件，无时间线）

    语音转文本
    - 从其他语言到英语（使用 Whisper 的端到端语音转文本翻译功能）

    文本转文本翻译
    - 使用 Facebook NLLB 模型翻译字幕文件
    - 使用 DeepL API 翻译字幕文件

    使用 Silero VAD 预处理音频输入。

    使用 UVR 预处理音频输入以分离背景音乐。

    使用 pyannote 模型进行说话人区分后处理

  upgradeDescription: |
    将 Whisper-WebUI 迁移到 apiVersion v3 共享应用模式，模型下载改为 llm-init（whisperwebuiv2 → whisperwebuiv3）。以 llm-init:v1.2.4 替换 CDN tar.zst downloader-init，从 HF 拉取 Systran/faster-whisper-large-v2 与 pyannote 仓库到共享 App Common 缓存；引擎通过符号链接读取并等待 /readyz。扁平化子 chart，nginx 入口支持下载完成后自动刷新，新增 accelerator、appCommon 与 workloadReplicas。说话人分离（pyannote）需 HF token 已接受条款。
