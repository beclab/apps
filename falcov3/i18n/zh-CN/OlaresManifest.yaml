metadata:
  title: Falco
  description: 云原生运行时安全工具，用于检测异常行为。
spec:
  fullDescription: |
    **重要说明**
    这是一个共享应用。整个 Olares 系统只会安装一个服务实例。但每个用户仍需要安装桌面入口才能访问和使用由 Olares 管理员安装的服务。

    **概述**
    Falco 是一个面向 Linux 操作系统的云原生运行时安全工具。它旨在实时检测和警报异常行为及潜在安全威胁。

    Falco 的核心是一个内核监控和检测代理，它基于自定义规则观察系统调用等事件。Falco 可以通过集成容器运行时和 Kubernetes 的元数据来增强这些事件。

    **功能**
    * 基于系统调用监控的实时威胁检测
    * 用于定义安全策略的自定义规则引擎
    * 容器和 Kubernetes 感知，支持元数据增强
    * 支持现代 eBPF 驱动（无需内核模块）
    * 插件系统用于扩展数据源
    * 多种输出渠道：标准输出、文件、syslog、HTTP、gRPC
    * Prometheus 指标端点
    * CNCF 毕业项目，被众多组织用于生产环境
    * 健康检查 API 用于监控 Falco 状态

    注意：Falco 是一个内核级安全守护进程，需要特权访问才能正常工作，在标准容器环境中可能存在限制。
  upgradeDescription: |
    迁移 Falco 至 apiVersion v3 共享应用模式（falco → falcov3）。

    **更新内容**

    - **架构**：将 falco/falcoserver 子 chart 扁平化为单一 chart；将 nginx 入口 Deployment/Service 重命名为 falcov3，以匹配 appid 满足 v3 工作负载校验。
    - **扩缩容**：通过 `workloadReplicas` 声明 falcov3 入口与 falco-central 工作负载副本数。
    - **运行时**：Falco 0.43.0，falcosidekick 2.33.0，falcosidekick-ui 2.3.0。
