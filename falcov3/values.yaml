# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest). DaemonSets (falco-agent,
# falco-plugin-installer) have no replica count and are not listed.
#   falcov3       — nginx entrance Deployment (must match metadata.name / appid)
#   falcocentral  — falcosidekick + webui + redis Deployment
workloads:
  falcocentral:
    replicaCount: 1
  falcov3:
    replicaCount: 1
# Additional Falco rule files.
# Keys are file names and values are full rule file contents.
# They will be mounted to /etc/falco/rules.d/<file-name>.
# Falco default rules remain enabled; custom rules are loaded in addition.
customRules: {}

# Disable built-in Falco rules by name.
# Example:
# disabledRules:
#   - Terminal shell in container
#   - Write below etc
disabledRules: []
