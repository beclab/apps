olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: falcov3
  description: Cloud Native Runtime Security tool for detecting abnormal behavior.
  icon: https://app.cdn.olares.com/appstore/falco/icon.png
  appid: falcov3
  version: '1.1.5'
  title: Falco
  categories:
    - Developer Tools

entrances:
  - authLevel: internal
    host: falcov3
    icon: https://app.cdn.olares.com/appstore/falco/icon.png
    name: falcov3
    openMethod: window
    port: 2802
    title: Falco

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   falcov3       — nginx entrance Deployment (must match metadata.name / appid)
#   falcocentral  — falcosidekick + webui + redis Deployment
# DaemonSets (falco-agent, falco-plugin-installer) carry no replica count.
workloadReplicas:
  falcov3: 1
  falcocentral: 1

permission:
  appData: true
  appCache: true

spec:
  versionName: '0.43.0'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. However, every user still needs to install a desktop entry to access and use the service installed by the Olares Admin.

    **OVERVIEW**
    Falco is a cloud native runtime security tool for Linux operating systems. It is designed to detect and alert on abnormal behavior and potential security threats in real-time.

    At its core, Falco is a kernel monitoring and detection agent that observes events, such as syscalls, based on custom rules. Falco can enhance these events by integrating metadata from the container runtime and Kubernetes.

    **Features**
    * Real-time threat detection based on syscall monitoring
    * Custom rule engine for defining security policies
    * Container and Kubernetes-aware with metadata enrichment
    * Support for modern eBPF driver (no kernel module required)
    * Plugin system for extending data sources
    * Multiple output channels: stdout, file, syslog, HTTP, gRPC
    * Prometheus metrics endpoint
    * CNCF graduated project used in production by various organizations
    * Health check API for monitoring Falco status

    Note: Falco is a kernel-level security daemon. It requires privileged access to function properly and may have limitations in standard container environments.

  upgradeDescription: |
    Migrated Falco to apiVersion v3 shared app pattern (falco → falcov3).

    **What's Changed**

    - **Multi-install**: the falcoclient Deployment now uses {{ .Release.Name }} so allowMultipleInstall installs don't collide on workload names.

    - **Architecture**: flattened the falco/falcoserver sub-charts into a single
      chart; renamed the nginx entrance Deployment/Service to `falcov3` so it
      matches appid for v3 workload verification.
    - **Scaling**: `workloadReplicas` declares replica counts for the `falcov3`
      entrance and `falcocentral` (sidekick + webui + redis) workloads.
      DaemonSets (`falco-agent`, `falco-plugin-installer`) carry no replicas.
    - **Runtime**: Falco `0.43.0`, falcosidekick `2.33.0`, falcosidekick-ui
      `2.3.0`.

  developer: Falco Authors
  website: https://falco.org/
  sourceCode: https://github.com/falcosecurity/falco
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://falco.org/docs/
  license:
    - text: Apache-2.0
      url: https://github.com/falcosecurity/falco/blob/master/LICENSE

  requiredMemory: 512Mi
  limitedMemory: 3Gi
  requiredDisk: 256Mi
  limitedDisk: 2Gi
  requiredCpu: 0.5
  limitedCpu: 2

  supportArch:
    - amd64
    - arm64
  onlyAdmin: true

envs:
  - envName: FALCOSIDEKICK_UI_TTL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "72h"
    description: "TTL for keys stored in Redis"
  - envName: FILE_OUTPUT
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Enable Falco file output"

options:
  shared: true
  conflicts:
    - name: falco
      type: application
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
