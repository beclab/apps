olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: ollamallmbasev3
  icon: https://app.cdn.olares.com/appstore/ollama/icon.png
  description: "Generic Ollama engine base. Pick any Ollama library model at install via env."
  appid: ollamallmbasev3
  title: Ollama Engine Base
  version: '1.3.4'
  categories:
    - AI
sharedEntrances:
  - name: ollamallmbasev3
    host: sharedentrances-api
    port: 0
    title: Ollama
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/ollama/icon.png
entrances:
  - name: ollamaclient
    port: 8090
    host: download-svc
    title: Ollama
    icon: https://app.cdn.olares.com/appstore/ollama/icon.png
    openMethod: window
    authLevel: internal
#   ollamallmbasev3 — engine Deployment (== appid / Release.Name)
#   llminit          — llm-init / entrance Deployment
workloadReplicas:
  ollamallmbasev3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: '0.30.11'
  upgradeDescription: |
    Bump llm-init to v1.2.8.
  fullDescription: |
    **IMPORTANT NOTE**  
    This app is a template and cannot be used on its own. To use it, set the environment variables below to connect a specific model.

    **Environment Variables Setup Guide**
    - `MODEL_SOURCE`: `ollama://<model>:<tag>`. The Ollama library source to pull your model, for example `ollama://qwen3.5:2b` or `ollama://gemma3:27b`. Browse models at https://ollama.com/library.
    - `MODEL_NAME`: `<model>:<tag>`. The name of your model — use the string after `ollama://` in `MODEL_SOURCE`, for example `qwen3.5:2b`. This is also used as the OpenAI alias.
    - `MODEL_MODE`: `chat` or `embedding`. Use `chat` for conversational models; use `embedding` for embedding models.
    - `MODEL_SUPPORTS`: Model capability options (Vision / Tools / Thinking / None). Pick what your model supports. Check the model page on ollama.com/library for capabilities.
    - `ENGINE_ARGS`: `OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1`. Extra Ollama daemon options. Separate multiple `key=value` pairs with spaces. If `OLLAMA_KEEP_ALIVE` is omitted, the chart defaults to `-1` (keep model in VRAM). See https://github.com/ollama/ollama/blob/main/docs/faq.mdx.
    - `LOG_LEVEL`: `debug`, `info`, `warn`, or `error`. Log level for the llm-init container.
    - `OLLAMA_REQUIRED_GPU_MEMORY`: `8Gi`, `8192`, or `8192Mi`. Model memory needed, enter `0` for CPU mode. On NVIDIA, this sets `nvidia.com/gpumem` in MiB; on Spark, sets pod memory.

    **How It Works**
    First, `llm-init` pulls your model from the Ollama library and gets it ready, then the Ollama daemon starts serving the model when it's ready. These two parts run separately but share files and progress info.

    **Stack**
    - **Ollama daemon** (port 11434): pulls and serves the model
    - **llm-init** (port 8090): drives model pull, shows progress, and provides the OpenAI API, proxying to Ollama

    **Accelerator modes**
    | Mode           | Device            | Details                                                              |
    |----------------|-------------------|----------------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Set `OLLAMA_REQUIRED_GPU_MEMORY`; Ollama uses GPU by default         |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod                         |
    | `cpu`          | CPU only          | Chart injects `OLLAMA_NUM_GPU=0`; disables GPU                       |

    **Model Storage**
    All pulled models are stored in a shared folder at `appCommon/ollama`. All Ollama-based apps share this location, so blobs deduplicate by digest across installs.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - For large models (e.g. gemma3:27b), set `OLLAMA_CONTEXT_LENGTH` and `OLLAMA_KV_CACHE_TYPE` in `ENGINE_ARGS` to balance context length and VRAM usage.

  developer: Ollama
  website: https://ollama.com/
  sourceCode: https://github.com/ollama/ollama
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/ollama/ollama#MIT-1-ov-file

  accelerator:
    #   cpu          — CPU-only inference; chart injects OLLAMA_NUM_GPU=0, no GPU inject / gpumem
    #   nvidia       — discrete GPU; OLLAMA_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: cpu
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
    - mode: nvidia
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
      requiredGPUMemory: "-1"
      limitedGPUMemory: "-1"
    - mode: nvidia-gb10
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  allowMultipleInstall: true
  shared: true
  templateOnly: true
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  - envName: MODEL_SOURCE        # example: ollama://qwen3.5:2b
    required: true
    type: string
    editable: true
    applyOnChange: true
    description: "Example: ollama://qwen3.5:2b. The Ollama library source to pull your model. Use `ollama://<model>:<tag>` format. Browse models at https://ollama.com/library."
    regex: "^ollama://"
  - envName: MODEL_NAME          # example: qwen3.5:2b
    required: true
    type: string
    editable: true
    applyOnChange: true
    description: "Example: qwen3.5:2b. The name of your model — use the string after `ollama://` in MODEL_SOURCE. This is also used as the OpenAI alias."
  - envName: MODEL_MODE
    required: true
    type: string
    editable: true
    applyOnChange: true
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    default: ""
    type: string
    editable: true
    applyOnChange: true
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description: "The model capabilities. Pick what your model supports; check ollama.com/library for details. If no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1
    required: true
    default: ""
    type: string
    editable: true
    applyOnChange: true
    description: "Example: OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=65536 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1. Extra Ollama daemon options. Separate multiple key=value pairs with spaces. Chart defaults OLLAMA_KEEP_ALIVE=-1 when omitted."
  - envName: LOG_LEVEL
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "debug"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: OLLAMA_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    description: "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. Use `0` on CPU. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
