# Engine wrapper script, mounted into the Ollama daemon container at
# /llm-init/wrappers. Exports ENGINE_ARGS, starts ollama serve, then preloads
# the install-time model into VRAM after llm-init pull (name from MODEL_SOURCE).
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-init-wrappers
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: ollama
data:
  ollama.sh: |
    #!/bin/sh
    set -eu

    ENGINE=ollama
    log() { printf '[wrapper-%s] %s\n' "$ENGINE" "$*"; }

    engine_args_export_env() {
        args="${ENGINE_ARGS:-}"
        [ -z "$args" ] && return 0
        # shellcheck disable=SC2086
        set -- $args
        for tok in "$@"; do
            case "$tok" in
                *=*) export "$tok" && log "engine_args export: $tok" ;;
                *)   log "engine_args drop non-KV token: $tok" ;;
            esac
        done
    }

    # Ollama names are model:tag. MODEL_SOURCE (ollama://qwen3.5:4b) is authoritative;
    # MODEL_NAME may use a hyphen (qwen3.5-4b) which show/run will not resolve.
    add_model_candidate() {
        cand="$1"
        [ -z "$cand" ] && return 0
        case " ${OLLAMA_MODEL_CANDIDATES:-} " in
            *" ${cand} "*) return 0 ;;
        esac
        OLLAMA_MODEL_CANDIDATES="${OLLAMA_MODEL_CANDIDATES:+${OLLAMA_MODEL_CANDIDATES} }${cand}"
    }

    normalize_keep_alive() {
        case "${OLLAMA_KEEP_ALIVE:-}" in
            '-1s$1') export OLLAMA_KEEP_ALIVE=-1 ;;
        esac
    }

    build_model_candidates() {
        OLLAMA_MODEL_CANDIDATES=""
        case "${MODEL_SOURCE:-}" in
            ollama://*)
                ref="${MODEL_SOURCE#ollama://}"
                ref="${ref%% *}"
                add_model_candidate "$ref"
                ;;
        esac
        add_model_candidate "${MODEL_NAME:-}"
        mn="${MODEL_NAME:-}"
        case "$mn" in
            *:*) ;;
            *)
                base="${mn%-*}"
                tag="${mn##*-}"
                if [ -n "$base" ] && [ -n "$tag" ] && [ "$base" != "$mn" ]; then
                    add_model_candidate "${base}:${tag}"
                fi
                ;;
        esac
        log "preload candidates: ${OLLAMA_MODEL_CANDIDATES:-<none>}"
    }

    find_ready_model() {
        for cand in $OLLAMA_MODEL_CANDIDATES; do
            if ollama show "$cand" >/dev/null 2>&1; then
                printf '%s' "$cand"
                return 0
            fi
        done
        return 1
    }

    preload_via_api() {
        model="$1"
        host="${OLLAMA_HOST#http://}"
        host="${host#https://}"
        case "${MODEL_MODE:-chat}" in
            embedding|embed)
                if ollama embed "$model" "warmup" >/dev/null 2>&1; then
                    return 0
                fi
                ;;
        esac
        # Load weights into VRAM; keep_alive inherits OLLAMA_KEEP_ALIVE (default -1).
        ollama run "$model" "Hello" >/dev/null 2>&1
    }

    preload_model() {
        case "${OLLAMA_PRELOAD:-true}" in
            false|FALSE|0|no|NO|off|OFF)
                log "preload disabled (OLLAMA_PRELOAD=$OLLAMA_PRELOAD)"
                return 0
                ;;
        esac
        if [ -z "${OLLAMA_MODEL_CANDIDATES:-}" ]; then
            log "preload skipped: no model candidates (set MODEL_SOURCE / MODEL_NAME)"
            return 0
        fi

        timeout="${OLLAMA_PRELOAD_TIMEOUT:-3600}"
        elapsed=0
        ready_model=""
        log "waiting for model (ollama show, llm-init pull, timeout=${timeout}s)..."
        while [ -z "$ready_model" ]; do
            ready_model=$(find_ready_model 2>/dev/null || true)
            if [ -n "$ready_model" ]; then
                break
            fi
            if [ "$elapsed" -ge "$timeout" ]; then
                log "WARN: preload timed out after ${timeout}s (model not ready)"
                return 0
            fi
            sleep 5
            elapsed=$((elapsed + 5))
        done
        log "model $ready_model ready after ${elapsed}s"

        log "preloading $ready_model (mode=${MODEL_MODE:-chat})..."
        start=$(date +%s)
        set +e
        preload_via_api "$ready_model"
        rc=$?
        set -e
        end=$(date +%s)
        if [ "$rc" -eq 0 ]; then
            log "preload completed in $((end - start))s"
        else
            log "WARN: preload failed (exit $rc); daemon still running"
        fi
    }

    export OLLAMA_HOST="${OLLAMA_HOST:-0.0.0.0:11434}"
    engine_args_export_env
    normalize_keep_alive
    export OLLAMA_KEEP_ALIVE="${OLLAMA_KEEP_ALIVE:--1}"
    build_model_candidates

    log "starting ollama serve on $OLLAMA_HOST"
    ollama serve "$@" &
    SERVER_PID=$!
    trap 'kill "$SERVER_PID" 2>/dev/null; wait "$SERVER_PID" 2>/dev/null; exit 0' INT TERM

    until ollama list >/dev/null 2>&1; do
        sleep 1
    done
    log "ollama API ready"

    preload_model

    wait "$SERVER_PID"
