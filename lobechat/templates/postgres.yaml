apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobehub-postgres
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: lobehub-postgres
spec:
  replicas: {{ (index .Values.workloads "lobehub-postgres").replicaCount }}
  selector:
    matchLabels:
      app: lobehub-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: lobehub-postgres
    spec:
      containers:
        - name: postgres
          image: "docker.io/paradedb/paradedb:latest-pg17"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "lobehub"
            - name: POSTGRES_USER
              value: "lobehub"
            - name: POSTGRES_PASSWORD
              value: "lobehub"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: TZ
              value: Etc/UTC
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2000Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.userspace.appData }}/postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: lobehub-postgres
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: lobehub-postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: lobehub-postgres
