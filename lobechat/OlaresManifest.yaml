      url: https://github.com/lobehub/lobehub/blob/canary/LICENSE
  requiredMemory: 1512Mi
  requiredDisk: 4Gi
  requiredCpu: 700m
  limitedMemory: 5000Mi
  limitedCpu: 6000m
  supportArch:
