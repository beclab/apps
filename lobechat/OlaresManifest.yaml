  name: lobechat
  icon: https://app.cdn.olares.com/appstore/lobehub/icon.png
  description: The ultimate space to find, build, and collaborate with agent teammates.
  title: LobeHub
  version: "1.0.13"
  appid: lobehub
  categories:
    - Utilities_v112

entrances:
  - name: lobehub
    host: lobehub
    port: 80
    icon: https://app.cdn.olares.com/appstore/lobehub/icon.png
    title: LobeHub
    authLevel: private
    openMethod: window
spec:
  versionName: "2.1.56"
  featuredImage: https://app.cdn.olares.com/appstore/lobehub/image01.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/lobehub/image01.webp
    - https://app.cdn.olares.com/appstore/lobehub/image02.webp
    - https://app.cdn.olares.com/appstore/lobehub/image04.webp
    - https://app.cdn.olares.com/appstore/lobehub/image05.webp
    - https://app.cdn.olares.com/appstore/lobehub/image06.webp
    - https://app.cdn.olares.com/appstore/lobehub/image07.webp
    - https://app.cdn.olares.com/appstore/lobehub/image08.webp
  fullDescription: |
    LobeHub is the ultimate space for work and life — to find, build, and collaborate with agent teammates that grow with you.
    LobeHub is taking agent harness to the next level — enabling multi-agent collaboration, effortless agent team design, and introducing agents as the unit of work interaction.

    **Create: Agents as the Unit of Work**
    Building a personalized AI team starts with the Agent Builder. Describe what you need once, and the agent setup starts right away with auto-configurations.
    - Unified Intelligence: Seamlessly access any model and any modality—all under your control.
    - 10,000+ Skills: Connect your agents to the skills you use every day with a library of MCP-compatible plugins.

    **Collaborate: Scale New Forms of Collaboration Networks**
    LobeHub introduces Agent Groups, allowing you to work with agents like real teammates.
    - Pages: Write and refine content with multiple agents in one place with a shared context.
    - Schedule: Schedule runs and let agents do the work at the right time, even while you are away.
    - Project: Organize work by project to keep everything structured and easy to track.
    - Workspace: A shared space for teams to collaborate with agents.

    **Evolve: Co-evolution of Humans and Agents**
    LobeHub features Personal Memory that builds a clear understanding of your needs.
    - Continual Learning: Your agents learn from how you work, adapting their behavior to act at the right moment.
    - White-Box Memory: Structured, editable memory, giving you full control over what they remember.

    **MCP Plugin One-Click Installation & Marketplace**
    Browse a growing library of MCP plugins to expand your AI's capabilities and streamline your workflows.

    **Multi-Model Service Provider Support**
    OpenAI, Anthropic, Google, DeepSeek, Ollama, Bedrock, HuggingFace, OpenRouter, Cloudflare Workers AI, GitHub and more.

    **More Highlights**
    - File Upload / Knowledge Base
    - Smart Internet Search
    - Chain of Thought visualization
    - Branching Conversations
    - Artifacts Support
    - Model Visual Recognition
    - TTS & STT Voice Conversation
    - Text to Image Generation
    - Plugin System (Function Calling) and Agent Market
    - Local / Remote PostgreSQL database
    - Multi-User Management with Better Auth
    - Progressive Web App (PWA) and Mobile Adaptation
    - Custom Themes
  upgradeDescription: |
    Major upgrade: rebrand from LobeChat to LobeHub, upgrading from
    v2.1.18 to v2.1.56 with the official `lobehub/lobehub` image.

    Highlights since 2.1.18:
    - Agent Groups, Pages, Schedule, Project and Workspace collaboration primitives
    - Personal Memory with white-box, editable memory model
    - MCP plugin one-click installation and MCP Marketplace
    - Better Auth based multi-user management
    - Server-side PostgreSQL with pgvector for knowledge base

    Important: this release also changes the app id from `lobechat` to
    `lobehub`. Olares treats this as a new install rather than an
    in-place upgrade. To migrate existing chat history and files, follow
    the migration guide in the release notes.
  developer: LobeHub
  website: https://lobehub.com/
  sourceCode: https://github.com/lobehub/lobehub
  submitter: Olares
  locale:
