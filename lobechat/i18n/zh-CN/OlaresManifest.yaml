metadata:
  title: LobeHub
  description: 寻找、构建并与不断成长的智能体伙伴协作的终极工作与生活空间。
spec:
  fullDescription: |
    LobeHub 是一个面向工作与生活的终极空间，让你寻找、构建并与不断成长的智能体伙伴一起协作。
    LobeHub 把智能体协作能力推向新阶段：支持多智能体协同、轻松搭建智能体团队，并将“智能体”作为工作交互的基本单元。

    **Create：以智能体为工作单元**
    通过 Agent Builder 构建你的专属 AI 团队，只需描述一次需求，智能体即可自动配置并立即可用。
    - 统一智能：无缝接入任意模型与任意模态，掌控所有调用。
    - 10,000+ 技能：通过 MCP 兼容插件库，将日常工具接入你的智能体。

    **Collaborate：构建新的协作网络**
    LobeHub 提供 Agent Groups（智能体小组），让你像真实队友一样与智能体协作。
    - Pages：多智能体在共享上下文中共同写作与精修。
    - Schedule：定时执行任务，离线也能让智能体替你处理。
    - Project：按项目组织工作，结构清晰、便于跟踪。
    - Workspace：团队共享的智能体协作空间，权限与可见性清晰。

    **Evolve：人与智能体的共同进化**
    LobeHub 提供 Personal Memory（个人记忆），帮助智能体逐步理解你的偏好与需求。
    - 持续学习：智能体根据你的工作方式自主调整行为，在合适的时机出手。
    - 白盒记忆：结构化、可编辑的记忆，记什么由你决定。

    **MCP 插件一键安装与市场**
    浏览不断增长的 MCP 插件库，扩展 AI 能力，让工作流更加流畅。

    **多模型服务商支持**
    OpenAI、Anthropic、Google、DeepSeek、Ollama、Bedrock、HuggingFace、OpenRouter、Cloudflare Workers AI、GitHub 等。

    **更多亮点**
    - 文件上传 / 知识库
    - 智能联网搜索
    - 思维链 (CoT) 可视化
    - 分支对话
    - Artifacts 支持
    - 模型视觉识别
    - TTS / STT 语音对话
    - 文生图
    - 插件系统 (Function Calling) 与助手市场
    - 本地 / 远端 PostgreSQL 数据库
    - 基于 Better Auth 的多用户管理
    - PWA 与移动端适配
    - 自定义主题
  upgradeDescription: |
    重大升级：品牌从 LobeChat 升级为 LobeHub，版本从 v2.1.18 升级到 v2.1.56，
    并切换到官方镜像 `lobehub/lobehub`。

    自 2.1.18 以来的关键更新：
    - Agent Groups、Pages、Schedule、Project、Workspace 协作原语
    - Personal Memory（白盒、可编辑的记忆模型）
    - MCP 插件一键安装与 MCP 市场
    - 基于 Better Auth 的多用户管理
    - 服务端 PostgreSQL + pgvector，支撑知识库与向量检索

    注意：本次同时把 appid 从 `lobechat` 改为 `lobehub`。Olares 会按
    "新装" 处理，而不是原地升级。如需迁移已有的聊天记录和上传文件，
    请按发布说明里的迁移指南操作。
