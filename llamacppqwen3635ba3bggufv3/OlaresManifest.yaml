#   llamacppqwen3635ba3bggufv3 — engine Deployment (== appid / Release.Name)
#   llminit                  — llm-init / entrance Deployment
workloadReplicas:
  llamacppqwen3635ba3bggufv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_XS'
  fullDescription: |
    **Model Overview**
    Qwen3.6-35B-A3B is a Mixture-of-Experts vision-language model from the Qwen series (Alibaba), with 35B total parameters and about 3B active per token. It features a built-in vision encoder, very long context support, and ships with thinking, tool-calling, and vision capabilities. This app serves the `UD-IQ4_XS` GGUF build from `unsloth/Qwen3.6-35B-A3B-GGUF` via llama.cpp.

    Well suited for multimodal workloads that need long context and vision understanding. The Qwen3.6 35B series natively supports extended context windows and includes a vision encoder for image-and-text tasks.

    **Preset Configuration**
    - Model: `unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_XS` (with `mmproj-F16.gguf` projector for vision)
    - Capabilities: thinking, tools, vision
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0` (128K context, full GPU offload, KV cache quantized to q8_0)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving the model when it’s ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - This model needs a GPU with at least 23Gi of memory for full acceleration.

  developer: Alibaba
  website: https://qwen.ai/home
  sourceCode: https://github.com/QwenLM/Qwen3
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Apache-2.0
      url: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF

  accelerator:
    #   nvidia       — discrete GPU; LLAMACPP_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: nvidia
      limitedCpu: "15360m"
      requiredCpu: "1100m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "35Gi"
      requiredMemory: "22Gi"
      requiredGPUMemory: "23Gi"
      limitedGPUMemory: "24Gi"
    - mode: nvidia-gb10
      limitedCpu: "15360m"
      requiredCpu: "1100m"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "48Gi"
      requiredMemory: "32Gi"

  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE        # example: hf://unsloth/Qwen3-0.6B-GGUF --include Qwen3-0.6B-Q4_K_M.gguf
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "hf://unsloth/Qwen3.6-35B-A3B-GGUF --include Qwen3.6-35B-A3B-UD-IQ4_XS.gguf,hf://unsloth/Qwen3.6-35B-A3B-GGUF --include mmproj-F16.gguf"
    description:  "Example: hf://unsloth/Qwen3-0.6B-GGUF --include Qwen3-0.6B-Q4_K_M.gguf. The source to download your model. For models with split files, only include the first part; for vision-language models, add the projector with a comma, like `hf://<repo> --include model.gguf,hf://<repo> --include mmproj-F16.gguf`."
    regex: "^hf://"
  - envName: MODEL_NAME          # example: unsloth/Qwen3-0.6B-GGUF:Q4_K_M (-hf repo:quant)
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_XS"
    description:  "Example: unsloth/Qwen3-0.6B-GGUF:Q4_K_M. The name of your model in `owner/repo:quant` format"
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools,vision"
    multiSelect: true
    splitter: ","
    options:
    - title: Vision
      value: vision
    - title: Tools
      value: tools
    - title: Thinking
      value: thinking
    - title: None
      value: none
    description:  "The model capabilities. Pick what your model supports, if no extra capabilities, pick None."
  - envName: ENGINE_ARGS         # example: -c 8192 -ngl all -fa on
    required: true
    default: "-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0"
    type: string
    editable: true
    applyOnChange: true
    description:  "Example: -c 8192 -ngl all -fa on. Extra llama.cpp options, to fully use GPU, add `-ngl all`, for CPU, it adds `-ngl 0` automatically. You can also use values like `LLAMA_ARG_*=val`."
  - envName: LOG_LEVEL           # single-select: debug | info | warn | error
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "info"
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: LLAMACPP_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description:  "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
