metadata:
  description: "Qwen3.6-35B-A3B (GGUF UD-IQ4_XS) served with llama.cpp. Requires an NVIDIA GPU."
  title: Qwen3.6-35B-A3B (llama.cpp)

spec:
  fullDescription: |
    **Model Overview**
    Qwen3.6-35B-A3B is a Mixture-of-Experts vision-language model from the Qwen series (Alibaba), with 35B total parameters and about 3B active per token. It features a built-in vision encoder, very long context support, and ships with thinking, tool-calling, and vision capabilities. This app serves the `UD-IQ4_XS` GGUF build from `unsloth/Qwen3.6-35B-A3B-GGUF` via llama.cpp.

    Well suited for multimodal workloads that need long context and vision understanding. The Qwen3.6 35B series natively supports extended context windows and includes a vision encoder for image-and-text tasks.

    **Preset Configuration**
    - Model: `unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_XS` (with `mmproj-F16.gguf` projector for vision)
    - Capabilities: thinking, tools, vision
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0` (128K context, full GPU offload, KV cache quantized to q8_0)
    - Required GPU memory: `23Gi`

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    **How It Works**
    First, Model Console downloads the model and gets it ready, then `llama.cpp` starts serving the model when it's ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **Model Console**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - This model needs a GPU with at least 23Gi of memory for full acceleration.
