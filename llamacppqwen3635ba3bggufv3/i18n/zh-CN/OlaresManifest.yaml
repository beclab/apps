metadata:
  description: "使用 llama.cpp 运行 Qwen3.6-35B-A3B（GGUF UD-IQ4_XS）模型。需要 NVIDIA GPU。"
  title: Qwen3.6-35B-A3B (llama.cpp)

spec:
  fullDescription: |
    **模型简介**
    Qwen3.6-35B-A3B 是阿里巴巴 Qwen 系列的 MoE 视觉语言模型，总参数量 35B、每次激活约 3B。内置视觉编码器，支持超长上下文，开箱即用支持思考、工具调用与视觉能力。本应用通过 llama.cpp 运行 `unsloth/Qwen3.6-35B-A3B-GGUF` 的 `UD-IQ4_XS` GGUF 量化版本。

    适合需要长上下文与视觉理解的多模态工作负载。Qwen3.6 35B 系列原生支持扩展上下文窗口，并配备视觉编码器以处理图文任务。

    **预设配置**
    - 模型：`unsloth/Qwen3.6-35B-A3B-GGUF:UD-IQ4_XS`（含 `mmproj-F16.gguf` 视觉投影文件）
    - 能力：思考、工具、视觉
    - 引擎参数：`-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0`（128K 上下文、全量 GPU 卸载、KV 缓存量化为 q8_0）
    - 所需显存：`23Gi`

    **加速器模式**
    | 模式           | 设备             | 说明                                        |
    |----------------|------------------|---------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存，`-ngl all` 完全利用 GPU   |
    | `nvidia-gb10`  | GPU (Spark)      | 类似上方，但显存由 pod 管理                  |
    **工作流程说明**
    首先，Model Console 下载并准备模型，然后 `llama.cpp` 在模型准备好后启动服务。这两个部分独立运行但共享文件与进度信息。

    **技术栈说明**
    - **llama.cpp**：运行模型并通过 8081 端口提供 API 服务
    - **Model Console**：下载模型，展示进度，并通过 8090 端口提供 OpenAI API，代理到 `llamacpp`

    **模型存储**
    所有模型文件存储在共享目录 `appCommon/huggingface`（挂载为 `/cache/hf/hub`），同类应用均使用此目录。

    **资源建议**
    - CPU、内存和 GPU 数量随图表自动配置，磁盘配额为固定
    - 该模型需要至少 23Gi 显存的 GPU 才能完全加速
