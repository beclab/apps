metadata:
  description: GenAI 应用的创新引擎
  title: Dify

spec:
  fullDescription: |
    **重要提示**
    本应用是 Dify 共享版本，在 Olares 内部仅会部署一个服务。注意，每个用户仍需要安装一个桌面入口才能访问和使用 Olares 管理员安装的服务。

    安装后，该 Olares 服务器内的所有用户都能共同使用这同一个应用服务。使用共享应用不仅能方便用户数据的共享与互通，也能有效降低维护和运行资源的占用。

    **迁移说明**
    如果您使用的是旧版本的 Dify，它可能与 Dify v1.0 或更高版本冲突。我们建议您备份数据，卸载旧版本，然后安装此最新版本。

    **应用概览**
    Dify 是一个开源的 LLM 应用开发平台。其直观界面融合了 AI 工作流、RAG pipeline、代理能力、模型管理、可观测性功能等，让您能快速从原型转向生产。

  upgradeDescription: |
    迁移 Dify 至 apiVersion v3 共享应用模式（difyv2 → difyv3）。

    **更新内容**

    - **架构**：扁平化子 chart，移除 nginx clientproxy，入口直连 Dify nginx 80 端口。
    - **扩缩容**：通过 `workloadReplicas` 声明所有 Dify 工作负载副本数（api、worker、web、nginx、redis、weaviate、sandbox、ssrf-proxy、plugin-daemon）。
    - **运行时**：Dify v1.13.3，继承 Olares 打包修复。
