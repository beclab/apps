metadata:
  title: Paperclip
  description: 面向 AI 代理公司的开源编排平台。
spec:
  fullDescription: |
    **首次管理员设置**
    应用首次启动后，在浏览器打开 Paperclip 地址，注册或登录账号，然后在设置页面选择 **Claim this instance**（认领此实例）即可成为首个管理员。

    **应用概览**
    Paperclip 是一个 Node.js 服务器和 React UI，用于编排 AI 代理团队来运营业务。接入你自己的代理，分配目标，通过一个仪表盘追踪代理的工作和成本。

    如果说 OpenClaw 是一个员工，那 Paperclip 就是整个公司。

    **功能**
    - 接入任何代理 - 任何代理、任何运行时、一个组织架构（OpenClaw、Claude Code、Codex、Cursor）
    - 目标对齐 - 每个任务都追溯到公司使命
    - 心跳机制 - 代理按计划唤醒、检查工作并行动
    - 成本控制 - 每个代理的月度预算，自动执行
    - 多公司 - 一次部署，多个公司，完全数据隔离
    - 工单系统 - 每次对话都可追踪，完整的工具调用跟踪和审计日志
    - 治理 - 批准招聘、覆盖策略、暂停或终止任何代理
    - 组织架构 - 层级、角色、汇报关系
    - 移动端适配 - 随时随地监控和管理
    - 支持外部 PostgreSQL 生产部署
  upgradeDescription: |
    Paperclip 版本更新：升级到 v2026.609.0
    配置更新：为本地代理添加内置依赖包

    主要亮点：
    - 公司制品：你团队的代理生成的文件、媒体和文档现在是一级对象。全新的公司范围“制品”页面会按任务栈自动分组，并索引所有 issue 与运行过程中产生的工作产物。支持上传及丰富的回放（如视频缩略图），便于你无需逐个打开 issue 即可检查代理产出。 (#7621, #7654, #7667, #7248, @cryppadotta)
    - 可折叠侧边栏及接管面板：主导航栏现可收缩为常驻的窄栏并支持悬停/聚焦浮现，使上下文页面（尤其是公司设置及插件页面）获得更多水平空间，同时主导航仍可随时一键访问。 (#7824, @cryppadotta)
    - 富媒体工单附件及视频支持：现在工单可添加视频附件，并以丰富的内嵌预览形式渲染，包括独立 PWA 浏览器控制和嵌入式视频播放，让录屏和多媒体直接呈现在讨论串中，而不再只是下载链接。 (#7361, #7360, @cryppadotta)
    - 复选框确认交互：工单讨论可请求成员或用户通过结构化复选框确认一种或多种选项，并支持 API、CLI、插件和 UI 的一致校验——自由文本的“其他”也会渲染成合适的链接。 (#7649, @cryppadotta)
    - 信息架构焕新（实验性）：提供可选的视觉焕新，使高频工作流更易浏览。实例设置现归属公司设置下，相关配置更易发现。 (#7543, @scotttong; #7680, @cryppadotta)
    - 自动化 PR 质量与安全审核：commitperclip 现已对所有 PR 自动运行质量与安全门槛检查——包括关联 issue、测试覆盖率、完整模板及锁文件检查，并进行去重搜索，使贡献者能收到快速、统一反馈，维护者将精力集中于关键审核。还针对不信任内容贡献者新增低信任审核权限预设，极大提升安全性。 (#6469, @brandonburr; #7632, #7530, @cryppadotta)

    完整发布说明请见：https://github.com/paperclipai/paperclip/releases/tag/v2026.609.0
