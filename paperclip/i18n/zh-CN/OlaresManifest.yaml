metadata:
  title: Paperclip
  description: 面向 AI 代理公司的开源编排平台。
spec:
  fullDescription: |
    # 首次管理员设置
    应用首次启动后，请在 Paperclip 容器中执行 `pnpm paperclipai auth bootstrap-ceo --base-url "https://<你的 Paperclip 域名>"` 以生成首个管理员邀请链接，并打开该链接创建实例管理员账号。

    # 应用概览
    Paperclip 是一个 Node.js 服务器和 React UI，用于编排 AI 代理团队来运营业务。接入你自己的代理，分配目标，通过一个仪表盘追踪代理的工作和成本。

    如果说 OpenClaw 是一个员工，那 Paperclip 就是整个公司。

    # 功能
    * 接入任何代理 - 任何代理、任何运行时、一个组织架构（OpenClaw、Claude Code、Codex、Cursor）
    * 目标对齐 - 每个任务都追溯到公司使命
    * 心跳机制 - 代理按计划唤醒、检查工作并行动
    * 成本控制 - 每个代理的月度预算，自动执行
    * 多公司 - 一次部署，多个公司，完全数据隔离
    * 工单系统 - 每次对话都可追踪，完整的工具调用跟踪和审计日志
    * 治理 - 批准招聘、覆盖策略、暂停或终止任何代理
    * 组织架构 - 层级、角色、汇报关系
    * 移动端适配 - 随时随地监控和管理
    * 支持外部 PostgreSQL 生产部署
  upgradeDescription: |
    升级到 v0.3.1

    亮点:
    * Gemini CLI 适配器 - 完整的本地适配器支持
    * 运行记录优化 - Markdown 渲染、标准输出折叠、身份信息脱敏
    * 收件箱改进 - 标签页优化、徽章计数、移动端布局
    * 改进的引导向导
    * 默认最大轮次提升至 300

    完整发布说明参见: https://github.com/paperclipai/paperclip/releases/tag/v0.3.1
