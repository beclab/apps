metadata:
  description: 生产力平台，让您掌控一切
  title: Nextcloud
spec:
  fullDescription: |
    Nextcloud 让您随时随地掌控数据。
     在自家服务器、合作伙伴或信任的数据中心存储文档、日历、联系人和照片。

    **这样做的魅力何在？**
    - 数据访问 在您选择的服务器上存放文件、联系人、日历和对话等。
    - 数据同步 在各个设备间保持文件、联系人、日历等数据的同步。
    - 数据分享 让他人可以查看或合作您选择分享的内容。
    - 应用扩展 通过安装 Calendar, Contacts, Mail, Video Chat 等应用增强功能，这些都可以在我们的 App Store 发现。
    - 加强安全 我们通过加密技术、HackerOne 赏金计划和双因素认证来保护您的数据安全。

  upgradeDescription: |
    问题修复更新（v1.0.14）

    修复内容
    - 修复日历、通讯录等 CalDAV/CardDAV 功能一直加载或报错（如 `findAllCalendars`、`_extractAdvertisedDavFeatures`）
    - 反向代理不再对 `/remote.php/dav/` 等 API 路径的 OPTIONS 请求直接返回 204，DAV 响应头可正常从 Nextcloud 透传

    说明：Nextcloud 仍为 31.0.4，本次无应用版本升级。
