metadata:
  description: 开源的协作维基和文档软件。
  title: Docmost

spec:
  fullDescription: |
    Docmost 是一款开源的协作维基和文档软件，可作为 Notion 和 Confluence 等工具的替代方案。无论你是在管理维基、知识库，还是复杂的项目文档，Docmost 都能为你提供高效创建、协作和知识分享的所需工具。Docmost 完全自托管，可以在无外部依赖的闭环环境中运行。

    Docmost 支持 Spaces（空间）功能。你可以根据需求为不同团队、项目或部门创建独立的空间，并为每个空间设置专属权限。同时通过可选的企业版，Docmost 还能满足更大组织的需求，诸如单点登录（SSO）、AI、API 接口等高级功能。

    **功能亮点**
    - **协作实时编辑器：** 可多人实时协作编辑页面。
    - **Spaces（空间）：** 通过团队、项目或部门对页面分组，更好地协作管理。
    - **权限管理：** 通过直观的权限设置，精细控制工作区和空间内容访问。
    - **用户组（Groups）：** 通过用户组进行统一权限分配。
    - **嵌套导航：** 侧边栏支持页面的嵌套、排序、拖拽移动。
    - **表格：** 插入和编辑表格，支持列宽调整、单元格合并、表头/列、单元格背景色等高级功能。
    - **流程图/图表：** 内置支持 Draw.io、Excalidraw 和 Mermaid 绘图工具。
    - **数学公式：** 使用 KaTeX 编写行内和块级数学公式。
    - **提示块与折叠块：** 通过提示/折叠区块让内容更有条理。
    - **评论功能：** 页面可添加评论，更好地沟通和反馈。
    - **历史版本：** 完整的版本历史记录，支持追踪修改和恢复旧版本。
    - **公开分享：** 支持公开分享页面，任何有链接的人都可访问。
    - **全文搜索：** 页面支持全文搜索、空间/类型多维过滤。
    - **文件附件：** 页面可添加文件附件，方便引用与分享。
    - **导入/导出：** 支持 Markdown/HTML 格式页面导入与导出。
      - ZIP 压缩包导入
      - Notion 导入
      - Confluence 导入（企业版）
      - DOCX 导入（企业版）
    - **导出 PDF：** 通过浏览器打印功能生成页面 PDF。
    - **@提及：** 编辑器内可直接@团队成员或页面。
    - **Markdown 快捷键：** 编辑器支持直接输入 Markdown 语法并自动转换为富文本。
    - **键盘快捷键：** 丰富的快捷键支持格式切换、导航和编辑操作。
    - **深色模式：** 可在亮色、暗色与系统主题之间自由切换。
    - **阅读/编辑模式：** 支持设置页面默认只读模式，防止误编辑。
    - **多语言：** 支持 12 种以上语言切换。

