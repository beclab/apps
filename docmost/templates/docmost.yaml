apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: docmost
spec:
  replicas: {{ .Values.workloads.docmost.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: docmost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: docmost
    spec:
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_done"

              if [ -f "$MARKER" ]; then
                echo "[migrate] marker present, skip."
                exit 0
              fi

              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi

              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache -> appData..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: docmost-data-legacy
              mountPath: /old-data
              readOnly: true
            - name: docmost-data
              mountPath: /new-data
      containers:
        - name: docmost
          image: "docker.io/beclab/docmost-docmost:0.21.0"
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: DISPLAY
              value: ":0"
            - name: APP_URL
              value: 'https://{{ last (splitList "," .Values.domain.docmost) }}'
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: docmost
                  key: app-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.docmost}}?schema=public"
            - name: REDIS_URL
              value: "redis://docmost-redis:6379/0"
          envFrom:
            - configMapRef:
                name: docmost-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/data/storage
              name: docmost-data
              subPath: docmost
      restartPolicy: Always
      volumes:
        - name: docmost-data
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appData }}'
        - name: docmost-data-legacy
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appCache }}'
---
apiVersion: v1
kind: Service
metadata:
  name: docmost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: docmost
spec:
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
  selector:
    io.kompose.service: docmost
status:
  loadBalancer: {}
