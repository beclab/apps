metadata:
  title: Agent Zero
  description: 智能体 AI 框架
spec:
  fullDescription: |
    一个与您共同成长和学习的个人有机智能体框架
    - Agent Zero 不是一个预设的智能体框架，它被设计为动态、有机地成长，并在您使用过程中不断学习。
    - Agent Zero 完全透明、可读、易于理解、可定制且具有高度交互性。
    - Agent Zero 以计算机为工具，帮助完成您的各种任务。

    主要特性
    - 动态成长机制：不是固定、预定义的框架，会在您使用过程中自主进化和学习，逐渐更符合您的需求。
    - 全能任务助手：自动收集信息、执行代码和命令，并利用持久记忆更快更可靠地解决任务。
    - 深度计算机赋能：以操作系统为核心工具，可自主编写代码和使用终端，支持自定义工具扩展，兼容性极强。
    - 多智能体协作：采用分级结构，上级智能体分配任务，下级智能体进行细化和执行，确保所有智能体专注、高效，保持上下文简洁。
    - 极致可定制性：无硬编码限制。可自由修改系统提示词、工具模板和通信逻辑，适用于任何场景。