metadata:
  title: Agent Zero
  description: Agentic AI Framework
spec:
  fullDescription: |
    A personal, organic agentic framework that grows and learns with you
    - Agent Zero is not a predefined agentic framework. It is designed to be dynamic, organically growing, and learning as you use it.
    - Agent Zero is fully transparent, readable, comprehensible, customizable, and interactive.
    - Agent Zero uses the computer as a tool to accomplish its (your) tasks.

    Key Features
    - Dynamic Growth Mechanism: Not a fixed, pre-defined framework. It evolves and learns autonomously as you use it, becoming more tailored to your needs over time.
    - Full-Featured Task Assistant: Automatically gathers information, executes code and commands, and leverages persistent memory to solve tasks faster and more reliably.
    - Deep Computer Empowerment: Uses the operating system as a core tool, can autonomously write code and use the terminal, supports custom tool extensions, and boasts exceptional compatibility.
    - Multi-Agent Collaboration: A hierarchical structure where superior agents assign tasks and subordinate agents break them down for execution, keeping all agents focused and context clean.
    - Extreme Customizability: No hard-coded limitations. System prompts, tool templates, and communication logic can all be freely modified to fit any scenario.