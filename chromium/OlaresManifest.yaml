olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  chromium: 1
metadata:
  name: chromium
  description: The open-source projects behind the Google Chrome browser
  icon: https://app.cdn.olares.com/appstore/chromium/icon.png
  appid: chromium
  version: '1.0.12'
  title: Chromium
  categories:
  - Utilities_v112

permission:
  appData: true
  appCache: true
spec:
  versionName: '20260527'
  fullDescription: |
    **About**
    Chromium is an open-source browser project that aims to build a safer, faster, and more stable way for all users to experience the web.

  upgradeDescription: |
    Storage: durable `/config` moved from `appCache` to `appData`. On first start after upgrade, an initContainer copies legacy `appCache/config` into `appData/config` when the destination is empty (marker: `.migration_from_appcache_done`). Old appCache data is left intact for rollback.

    Drop legacy `sysVersion >= 1.12.3` appCache path branching; Olares minimum is now 1.12.6.

  developer: Google
  website: https://www.chromium.org/chromium-projects/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1Gi
  limitedMemory: 6Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: "500m"
  limitedCpu: "2"
  doc: https://chromium.googlesource.com/chromium/src/+/main/docs/README.md
  license:
  - text: BSD,
    url: https://chromium.googlesource.com/chromium/src/+/HEAD/LICENSE
  supportArch:
  - amd64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
  - envName: CHROME_HOMEPAGE
    type: url
    required: false
    editable: true
    applyOnChange: true
    default: "https://www.google.com"
    description: "URL opened when Chromium starts (Kasm: homepage; Olares One Selkies: appended after GPU flags)."
entrances:
- name: chromium
  port: 3000
  host: chromium
  title: Chromium
  icon: https://app.cdn.olares.com/appstore/chromium/icon.png
  openMethod: window
