metadata:
  title: MacOS
  description: 在 Olares 上运行 MacOS

spec:
  fullDescription: |
    此应用可帮助您在 Olares 上运行 MacOS。
    基于 dockur 的 MacOS Docker 容器实现。

    **功能**
    - KVM 加速
    - 基于 Web 的查看器
    - 自动下载

    **支持的 macOS 版本**
    - macOS 14
    - macOS 13
    - macOS 12
    - macOS 11
  upgradeDescription: |
    存储：持久卷从 `appCache` 迁移至 `appData`。升级后首次启动时，若 appData 为空，initContainer 会将旧 appCache 内容复制到 appData（标记文件：`.migration_from_appcache_storage_done`）；旧 appCache 数据保留以便回滚。

    虚拟机磁盘存储从 appCache 根目录迁移到 appData/storage。
