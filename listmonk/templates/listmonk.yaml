apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: listmonk
  name: listmonk
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.workloads.listmonk.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: listmonk
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: listmonk
    spec:
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_done"

              if [ -f "$MARKER" ]; then
                echo "[migrate] marker present, skip."
                exit 0
              fi

              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi

              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache -> appData..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: uploads-legacy
              mountPath: /old-data
              readOnly: true
            - name: uploads
              mountPath: /new-data
      containers:
        - env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: DISPLAY
              value: ':0'
            - name: LISTMONK_app__address
              value: '0.0.0.0:9000'
            - name: LISTMONK_db__host
              value: '{{ .Values.postgres.host }}'
            - name: LISTMONK_db__port
              value: '{{ .Values.postgres.port }}'
            - name: LISTMONK_db__user
              value: '{{ .Values.postgres.username }}'
            - name: LISTMONK_db__password
              value: '{{ .Values.postgres.password }}'
            - name: LISTMONK_db__database
              value: '{{ .Values.postgres.databases.listmonk }}'
            - name: LISTMONK_db__ssl_mode
              value: "disable"
          command:
            - /bin/sh
            - '-c'
          args:
            - |
              ./listmonk --install --idempotent --yes --config '' && \
              ./listmonk --upgrade --yes --config '' && \
              ./listmonk --config ''
          image: "docker.io/beclab/listmonk-listmonk:v4.1.0"
          name: listmonk
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          ports:
            - containerPort: 9000
          volumeMounts:
            - mountPath: /listmonk/uploads
              name: uploads
              subPath: uploads
      restartPolicy: Always
      volumes:
        - name: uploads
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appData }}'
        - name: uploads-legacy
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appCache }}'
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: listmonk
  name: listmonk
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "9000"
      port: 9000
      targetPort: 9000
  selector:
    io.kompose.service: listmonk
status:
  loadBalancer: {}
