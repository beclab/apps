# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   whisperservicev3         — WhisperX FastAPI engine Deployment (name: {{ .Release.Name }} == appid)
#   whisperservicev3download — llm-init download-only Deployment (shared HF cache)
#   whisperserviceclient     — nginx entrance Deployment
workloads:
  whisperserviceclient:
    replicaCount: 1
  whisperservicev3download:
    replicaCount: 1
  whisperservicev3:
    replicaCount: 1
