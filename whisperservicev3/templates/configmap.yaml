---
apiVersion: v1
kind: ConfigMap
metadata:
  name: whisperapi-config
  namespace: {{ .Release.Namespace }}
data:
  # Flat env names consumed by whisperX-FastAPI 0.8.0 (pydantic-settings reads
  # these directly; nested whisper__WHISPER_MODEL form also works).
  WHISPER_MODEL: "large-v3"
  DEFAULT_LANG: "en"
  DEVICE: "cuda"
  COMPUTE_TYPE: "float16"
  LOG_LEVEL: "INFO"
