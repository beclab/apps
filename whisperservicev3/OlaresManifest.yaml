olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: whisperservicev3
  icon: https://app.cdn.olares.com/appstore/whisperwebui/icon.png
  description: FastAPI service on top of WhisperX
  appid: whisperservicev3
  title: Whisper API
  version: '1.1.8'
  categories:
  - AI
  - Utilities_v112

sharedEntrances:
- name: whisperservicev3
  title: Whisper API
  host: sharedentrances-api
  icon: https://app.cdn.olares.com/appstore/whisperwebui/icon.png
  port: 0
  invisible: true
  authLevel: internal

entrances:
- authLevel: internal
  host: whisperapi-web-svc
  icon: https://app.cdn.olares.com/appstore/whisperwebui/icon.png
  name: whisperservicev3
  openMethod: window
  port: 8080
  title: Whisper API

workloadReplicas:
  whisperservicev3: 1
  whisperservicev3download: 1
  whisperserviceclient: 1

permission:
  appData: true
  appCache: true
  # appCommon: shared cross-app HF Hub cache (/cache/hf/hub) populated by the
  # llm-init downloader (faster-whisper + pyannote) and read by the engine.
  appCommon: true
  userData:
  - Home

spec:
  versionName: '0.8.0'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **PREREQUISITES**
    Before installing, configure **HF_TOKEN** (mapped from your Olares Hugging Face token) and **HF_ENDPOINT**. The installing admin's token must have **accepted the terms of use** on Hugging Face for these gated repositories:
    - `pyannote/speaker-diarization-3.1`
    - `pyannote/segmentation-3.0`

    Models are downloaded at install time via llm-init into the shared HF cache:
    - `Systran/faster-whisper-large-v3` (ASR, default)
    - `pyannote/speaker-diarization-3.1` and `pyannote/segmentation-3.0` (speaker diarization)
    - `jonatasgrosman/wav2vec2-large-xlsr-53-chinese-zh-cn` (Chinese word-level alignment)

    **PERFORMANCE NOTE**
    The first transcription after install may take noticeably longer while models are loaded into GPU memory; subsequent requests are faster.

    **OVERVIEW**
    The whisperX API is a tool for enhancing and analyzing audio content. This API provides a suite of services for processing audio and video files, including transcription, alignment, diarization, and combining transcript with diarization results.

    Available Services
    **Speech-to-Text (/speech-to-text)**
    - Upload audio/video files for transcription
    - Supports multiple languages and Whisper models

    **Speech-to-Text URL (/speech-to-text-url)**
    - Transcribe audio/video from URLs
    - Same features as direct upload

    **Individual Services:**
    - Transcribe (/service/transcribe): Convert speech to text
    - Align (/service/align): Align transcript with audio
    - Diarize (/service/diarize): Speaker diarization
    - Combine (/service/combine): Merge transcript with diarization

    **Task Management:**
    - Get all tasks (/task/all)
    - Get task status (/task/{identifier})

    **Health Check Endpoints:**
    - Basic health check (/health): Simple service status check
    - Liveness probe (/health/live): Verifies if application is running
    - Readiness probe (/health/ready): Checks if application is ready to accept requests (includes database connectivity check)

  upgradeDescription: |
    Migrated Whisper API to the apiVersion v3 shared app pattern and switched
    model provisioning to the shared llm-init downloader (whisperservicev2 →
    whisperservicev3).

    **What's Changed**

    - **Runtime**: now runs the upstream image
      `beclab/pavelzbornik-whisperx-fastapi:0.8.0` (whisperX-FastAPI 0.8.0); nltk
      data and the VAD weight are baked into the image.
    - **Model download**: replaced the bespoke `downloader-init` CDN tar.zst
      bundle with an `llm-init:v1.2.4` download-only Deployment
      (`whisperservicev3download`) that fetches the Hugging Face repos
      (`Systran/faster-whisper-large-v3`, `pyannote/speaker-diarization-3.1`,
      `pyannote/segmentation-3.0`) into the shared cross-app HF cache (App Common,
      `/cache/hf/hub`). The engine reads them via `HF_HUB_CACHE` and gates on the
      downloader's `/readyz`. The English alignment torchaudio weight is pulled
      lazily by whisperX on first word-level alignment and cached in a persistent
      `/root/.cache` hostPath. Diarization (pyannote) is gated — the admin HF
      token must have accepted its terms.
    - **Architecture**: flattened the whisperservicev2 / whisperservicev2server
      sub-charts into a single chart. The engine Deployment is named after the
      release (`{{ .Release.Name }}` == appid); the nginx entrance Deployment is
      `whisperserviceclient`. Backends resolve within the release namespace
      (dropping the `*-shared` admin / non-admin split).
    - **Accelerator**: moved the GPU requirement into the accelerator modes list
      (nvidia only; amd64-only app); raised `limitedMemory` to 24Gi to fit the
      engine + downloader + nginx within the envelope.
    - **Scaling**: `workloadReplicas` declares the `whisperservicev3` engine,
      `whisperservicev3download` downloader, and `whisperserviceclient` nginx
      entrance workloads.

  developer: pavelzbornik
  website: https://github.com/pavelzbornik/whisperX-FastAPI
  sourceCode: https://github.com/pavelzbornik/whisperX-FastAPI
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/pavelzbornik/whisperX-FastAPI
  license:
  - text: MIT License
    url: https://github.com/pavelzbornik/whisperX-FastAPI?tab=MIT-1-ov-file
  supportArch:
  - amd64
  onlyAdmin: true

  requiredCpu: "1"
  limitedCpu: "5"
  requiredMemory: 3Gi
  limitedMemory: 24Gi
  requiredDisk: 12Gi
  limitedDisk: 20Gi
envs:
- envName: HF_TOKEN
  required: true
  applyOnChange: true
  valueFrom:
    envName: OLARES_USER_HUGGINGFACE_TOKEN
- envName: HF_ENDPOINT
  required: true
  applyOnChange: true
  valueFrom:
    envName: OLARES_USER_HUGGINGFACE_SERVICE

options:
  shared: true
  apiTimeout: 0
  conflicts:
  - name: whisperservicev2
    type: application
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
