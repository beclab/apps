metadata:
  title: FreshRSS
  description: 一款免费、可自托管的订阅源聚合器。
spec:
  fullDescription: |
    FreshRSS 是一个自托管的 RSS 与 Atom 订阅源聚合器。它轻量、易用、功能强大且可定制。

    功能亮点
    - 数据自主可控 ：支持自托管部署，让用户无需依赖第三方即可完全掌控自己的数据，保障隐私和安全。
    - 开源及持续稳定更新 ：采用 AGPL 3 许可证开源，拥有活跃的社区，从 2023 年至 2024 年持续迭代和更新，稳定性有保障。
    - 多源内容聚合 ：可聚合网站 RSS/Atom 订阅源、播客及视频频道，并可对没有官方订阅源的网站进行抓取，生成自定义订阅源。
    - 高效内容管理 ：支持搜索与保存查询、基于规则生成新订阅源，并支持标记、收藏及分类文章，便于内容管理。
    - 实时同步与迁移 ：基于 WebSub 实现内容实时同步，支持 OPML 格式的订阅列表导入导出。
    - 灵活自定义与权限管理 ：提供主题与扩展自定义功能，支持多用户权限管理，满足不同使用需求。
    - 全终端高效适配 ：采用响应式设计，兼容电脑与手机，可高效管理百万级文章及 5 万+ 订阅源。
    - 多语言支持与集成 ：支持 15+ 种语言，并提供 API 接口，便于第三方客户端或自有系统接入。
    - 低门槛部署 ：部署门槛低，兼容主流 Web 服务器，配有详细安装文档，新手也能轻松上手。
  upgradeDescription: |
    升级应用版本至 1.28.1

    本次发布主要集中在 Bug 修复，特别是针对 1.28.0 版本的回归问题。

    新功能亮点：
    - 新增关闭注册时的自定义提示信息
    - 在 Apache 访问日志（包括 Docker 日志）中添加用户名：支持 GReader API 和反向代理的 HTTP Basic Auth

    性能改进：
    - 禁用 Ajax 请求中用户标签的文章计数（未使用）

    Bug 修复：
    - 修复用户查询（已保存搜索）应用于过滤器时的意外展开
    - 修复标签过滤操作的编码问题
    - 修复标签搜索
    - 修复匿名刷新禁用时使用 token 刷新订阅源的问题
    - 修复通过 token 访问 RSS 和 OPML 的问题
    - 修复 MySQL/MariaDB transliterator_transliterate 回退问题
    - 修复 MySQL/MariaDB 索引提示回归问题
    - 修复"下一篇未读文章"快捷键
    - 修复自定义 session.cookie-lifetime
    - 修复更改订阅源 URL 时的订阅源验证按钮

    完整发布说明：https://github.com/FreshRSS/FreshRSS/releases/tag/1.28.1