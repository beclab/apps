---
apiVersion: v1
kind: ConfigMap
metadata:
  name: firecrawl-config
  namespace: {{ .Release.Namespace }}
data:
  REDIS_URL: "redis://firecrawl-redis-svc:6379"
  REDIS_RATE_LIMIT_URL: "redis://firecrawl-redis-svc:6379"
  PLAYWRIGHT_MICROSERVICE_URL: "http://playwright-svc:3000/scrape"
  HOST: "0.0.0.0"
  PORT: "3002"
  BULL_AUTH_KEY: "CHANGEME"
  USE_DB_AUTHENTICATION: "false"
  OPENAI_API_KEY: {{ .Values.olaresEnv.OPENAI_API_KEY | default "" | quote }}
  OPENAI_BASE_URL: {{ .Values.olaresEnv.OPENAI_BASE_URL | default "" | quote }}
  OLLAMA_BASE_URL: {{ .Values.olaresEnv.OLLAMA_BASE_URL | default "" | quote }}
  MODEL_NAME: {{ .Values.olaresEnv.MODEL_NAME | default "" | quote }}
  POSTHOG_API_KEY: ""
  NUQ_DATABASE_URL: postgres://postgres:postgres@nuq-postgres:5432/postgres
