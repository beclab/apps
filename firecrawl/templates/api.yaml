apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: firecrawl
  namespace: "{{ .Release.Namespace }}"
  name: firecrawl
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: firecrawl
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: firecrawl
    spec:
      initContainers:
        - name: check-depends
          image: "docker.io/beclab/wait-for:0.1.0"
          args:
            - "-it"
            - >-
              firecrawl-redis-svc:6379,playwright-svc:3000,nuq-postgres:5432
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      containers:
        - command:
            - node
            - dist/src/index.js
          name: api
          image: "docker.io/beclab/firecrawl-api:v2.9.0"
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: firecrawl-config
          env:
            - name: FLY_PROCESS_GROUP
              value: "app"
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 2Gi
              cpu: 2
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: firecrawl
  name: firecrawl-api-svc
  namespace: "{{ .Release.Namespace }}"
spec:
  selector:
    io.kompose.service: firecrawl
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
