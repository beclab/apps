apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: playwright-service
  name: playwright-service
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: playwright-service
  template:
    metadata:
      labels:
        io.kompose.service: playwright-service
    spec:
      containers:
        - name: playwright
          image: "docker.io/beclab/firecrawl-playwright-service:v2.9.0"
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: firecrawl-config
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 4Gi
              cpu: 2
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: playwright-service
  name: playwright-svc
  namespace: "{{ .Release.Namespace }}"
spec:
  selector:
    io.kompose.service: playwright-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
