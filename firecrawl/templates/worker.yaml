apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: worker
  namespace: "{{ .Release.Namespace }}"
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: worker
  template:
    metadata:
      labels:
        io.kompose.service: worker
    spec:
      initContainers:
        - name: check-depends
          image: "docker.io/beclab/wait-for:0.1.0"
          args:
            - "-it"
            - >-
              firecrawl-redis-svc:6379,nuq-postgres:5432
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      containers:
        - name: worker
          command:
            - node
            - dist/src/services/queue-worker.js
          image: "docker.io/beclab/firecrawl-api:v2.9.0"
          envFrom:
            - configMapRef:
                name: firecrawl-config
          env:
            - name: FLY_PROCESS_GROUP
              value: "worker"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f queue-worker.js >/dev/null"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 2Gi
              cpu: 2
      restartPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: nuq-worker
  namespace: "{{ .Release.Namespace }}"
  name: nuq-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nuq-worker
  template:
    metadata:
      labels:
        io.kompose.service: nuq-worker
    spec:
      initContainers:
        - name: check-depends
          image: "docker.io/beclab/wait-for:0.1.0"
          args:
            - "-it"
            - >-
              firecrawl-redis-svc:6379,playwright-svc:3000,nuq-postgres:5432
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      containers:
        - name: nuq-worker
          command:
            - node
            - dist/src/services/worker/nuq-worker.js
          image: "docker.io/beclab/firecrawl-api:v2.9.0"
          envFrom:
            - configMapRef:
                name: firecrawl-config
          env:
            - name: FLY_PROCESS_GROUP
              value: "nuq-worker"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f nuq-worker.js >/dev/null"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 4Gi
              cpu: 4
      restartPolicy: Always
