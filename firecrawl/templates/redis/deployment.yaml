---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: firecrawl-redis
spec:
  replicas: {{ .Values.workloads.firecrawl.replicaCount }}
  selector:
    matchLabels:
      app: firecrawl-redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: firecrawl-redis
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_done"
              if [ -f "$MARKER" ]; then echo "[migrate] marker present, skip."; exit 0; fi
              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi
              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache -> appData..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: redis-data-legacy
              mountPath: /old-data
              readOnly: true
            - name: redis-data
              mountPath: /new-data
        - name: init-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              echo "[Init] Fixing permissions on /data..."
              chown -R 1000:1000 /data
              chmod -R 770 /data
          resources: {}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
      containers:
        - name: firecrawl-redis
          image: "docker.io/beclab/aboveos-redis:7"
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 1000m
              memory: 1000Mi
          ports:
            - containerPort: 6379
          volumeMounts:
            - mountPath: /data
              name: redis-data
      volumes:
        - name: redis-data-legacy
          hostPath:
            type: DirectoryOrCreate
            path: {{ .Values.userspace.appCache }}/redis
        - name: redis-data
          hostPath:
            path: {{ .Values.userspace.appData }}/redis
            type: DirectoryOrCreate
