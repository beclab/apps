olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: xinferencev3
  icon: https://app.cdn.olares.com/appstore/xinference/icon.png
  description: Model Serving Made Easy
  appid: xinferencev3
  title: Xinference
  version: '1.0.5'
  categories:
    - Utilities_v112

sharedEntrances:
  - name: xinferencev3
    title: Xinference
    host: sharedentrances-api
    icon: https://app.cdn.olares.com/appstore/xinference/icon.png
    port: 0
    invisible: true
    authLevel: internal
entrances:
  # Entrance routes directly to the Xinference engine Service on :9997 (no nginx
  # proxy layer), mirroring the searxngv3 v3 pattern.
  - authLevel: internal
    host: xinference
    icon: https://app.cdn.olares.com/appstore/xinference/icon.png
    name: xinferencev3
    openMethod: window
    port: 9997
    title: Xinference
# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   xinferencev3 — Xinference engine Deployment (== appid / Release.Name)
workloadReplicas:
  xinferencev3: 1
permission:
  appData: true
  appCache: true
spec:
  onlyAdmin: true
  versionName: '2.10.0'
  featuredImage: https://app.cdn.olares.com/appstore/xinference/1.jpg
  promoteImage:
  - https://app.cdn.olares.com/appstore/xinference/1.jpg
  - https://app.cdn.olares.com/appstore/xinference/2.jpg
  - https://app.cdn.olares.com/appstore/xinference/3.jpg
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    **OVERVIEW**
    Xorbits Inference(Xinference) is a powerful and versatile library designed to serve language, speech recognition, and multimodal models. With Xorbits Inference, you can effortlessly deploy and serve your or state-of-the-art built-in models using just a single command. Whether you are a researcher, developer, or data scientist, Xorbits Inference empowers you to unleash the full potential of cutting-edge AI models.

    Key Features
    Model Serving Made Easy: Simplify the process of serving large language, speech recognition, and multimodal models. You can set up and deploy your models for experimentation and production with a single command.

    State-of-the-Art Models: Experiment with cutting-edge built-in models using a single command. Inference provides access to state-of-the-art open-source models!

    Heterogeneous Hardware Utilization: Make the most of your hardware resources with ggml. Xorbits Inference intelligently utilizes heterogeneous hardware, including GPUs and CPUs, to accelerate your model inference tasks.

    Flexible API and Interfaces: Offer multiple interfaces for interacting with your models, supporting OpenAI compatible RESTful API (including Function Calling API), RPC, CLI and WebUI for seamless model management and interaction.

    Distributed Deployment: Excel in distributed deployment scenarios, allowing the seamless distribution of model inference across multiple devices or machines.

    Built-in Integration with Third-Party Libraries: Xorbits Inference seamlessly integrates with popular third-party libraries including LangChain, LlamaIndex, Dify, and Chatbox.

  upgradeDescription: |
    V3 shared-app migration of Xinference (engine 2.10.0).
    - Flattened the xinferencev2server / xinferencev2 sub-charts into a single chart.
    - Removed the nginx clientproxy layer; the entrance routes directly to the
      engine Service on port 9997.
    - Raised engine memory limit to 40Gi and /dev/shm to 8Gi for large-model launch.
    - The engine Deployment is named after the appid (xinferencev3) and declared
      via workloadReplicas.
    - Removed the admin-only conditional guards; GPU is declared via spec.accelerator.
    - HF mirror is sourced from the user's system HF account via valueFrom.
  developer: Xorbits Inc.
  website: https://xinference.com/
  sourceCode: https://github.com/xinference/xinference
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://inference.readthedocs.io/en/latest/user_guide/index.html
  license:
  - text: Apache-2.0
    url: https://github.com/xorbitsai/inference#Apache-2.0-1-ov-file
  accelerator:
  # Olares validates per mode, summing ALL app containers (initContainers
  # excluded): Σ requests.cpu <= requiredCpu, Σ requests.memory <= requiredMemory,
  # Σ limits.cpu <= limitedCpu, Σ limits.memory <= limitedMemory.
  #   container          req cpu / mem      lim cpu / mem
  #   xinference (gpu)   1000m / 6Gi        5000m / 40Gi
  #   --------------------------------------------------------
  #   Σ                  1000m / 6Gi        5000m / 40Gi
  - mode: nvidia
    requiredCpu: 1000m
    limitedCpu: 6000m
    requiredMemory: 6Gi
    limitedMemory: 41Gi
    requiredDisk: 1Gi
    limitedDisk: 500Gi
    requiredGPUMemory: 4Gi
    limitedGPUMemory: 22Gi
  supportArch:
    - amd64
options:
  shared: true
  apiTimeout: 0
  onlyAdmin: true
  conflicts:
    - name: xinferencev2
      type: application
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
envs:
  # Hugging Face mirror: system-sourced, NOT an install-dialog field. v3 forbids
  # referencing OLARES_USER_* names inside chart template files; declare an
  # app-local name here and pull the system value in via valueFrom. Templates
  # reference .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE.
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
