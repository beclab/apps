metadata:
  title: Qwen3.6 35B A3B UD-KM（Ollama）
  description: Qwen3.6 35B A3B MoE（Unsloth Dynamic UD-Q4_K_M）多模态本地推理。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。
    用户流量通过代理流向 Ollama。

    **模型**
    使用来自 `unsloth/Qwen3.6-35B-A3B-GGUF` 的 Unsloth Dynamic 量化（`Qwen3.6-35B-A3B-UD-Q4_K_M.gguf` + `mmproj-F16.gguf`）。
    UD 混合精度量化在保持接近 Q5_K_M 的质量的同时，吞吐接近标准 Q4_K_M，并完整保留视觉能力（mmproj）。
    使用 GGUF 内嵌对话模板，以支持工具调用与图片输入。

    Qwen3.6-35B-A3B 为混合专家（MoE）模型：总参数 35B，每 token 仅激活 3B。

  upgradeDescription: |
    新增视觉：`mmproj-F16.gguf` + 内嵌对话模板以支持 tools/vision。代理 v0.1.21，Ollama 0.30.0。上下文 131072，KV cache q8_0。
