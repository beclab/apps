metadata:
  title: Qwen3.6 35B A3B UD-KM (Ollama)
  description: "Qwen3.6 35B A3B MoE (Unsloth Dynamic UD-Q4_K_M) multimodal local inference"

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth Dynamic quant from `unsloth/Qwen3.6-35B-A3B-GGUF` (`Qwen3.6-35B-A3B-UD-Q4_K_M.gguf` + `mmproj-F16.gguf`).
    Mixed-precision UD quantization preserves quality near Q5_K_M while keeping decode throughput close to standard Q4_K_M, with full vision (mmproj) retained.
    Uses the GGUF embedded chat template for reliable tool calling and image input.

    Qwen3.6-35B-A3B is a Mixture-of-Experts model: 35B total parameters with only 3B activated per token.

  upgradeDescription: |
    Aadd: `mmproj-F16.gguf` + embedded chat template for tools/vision. Proxy v0.1.21, Ollama 0.30.0. Context 131072, KV cache q8_0.
