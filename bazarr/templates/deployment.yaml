apiVersion: v1
kind: ConfigMap
metadata:
  name: init-config
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    # appData/config only — do not recurse the whole Home (user media libraries).
    chown -R 1000:1000 /config

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: bazarr
spec:
  replicas: {{ .Values.workloads.bazarr.replicaCount }}
  selector:
    matchLabels:
      app: bazarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      initContainers:
      - name: init-bazarr
        image: "docker.io/beclab/aboveos-busybox:1.37.0"
        command:
          - sh
          - '-c'
          - |
            sh /init.sh
        volumeMounts:
        - mountPath: /olares/userdata/home
          name: home
        - mountPath: /olares/userdata/external
          name: external-data
        - mountPath: /config
          name: bazarr-config
        - name: init-config
          mountPath: /init.sh
          subPath: init.sh
        securityContext:
          runAsUser: 0
      containers:
      - env:
        - name: PGID
          value: "1000" 
        - name: PUID
          value: "1000" 
        - name: UMASK
          value: "002" 
        - name: TZ
          value: Etc/UTC
        name: bazarr
        image: "linuxserver/bazarr:1.5.6"
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 6767
        volumeMounts:
        - mountPath: /config
          name: bazarr-config
        - name: home
          mountPath: /olares/userdata/home
        - name: external-data
          mountPath: /olares/userdata/external
      volumes:
      - name: bazarr-config
        hostPath:
          type: DirectoryOrCreate
          path: {{ .Values.userspace.appData }}
      - name: home
        hostPath:
          type: Directory
          path: {{ .Values.userspace.userData }}
      - name: external-data
        hostPath:
          type: DirectoryOrCreate
          path: "{{ .Values.sharedlib }}"
      - name: init-config
        configMap:
          name: init-config
          defaultMode: 438
          items:
          - key: init.sh
            path: init.sh

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: 6767
      targetPort: 6767
