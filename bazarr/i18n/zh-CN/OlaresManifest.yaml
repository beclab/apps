metadata:
  description: Sonarr 和 Radarr 的字幕管理伴侣。
  title: Bazarr
spec:
  fullDescription: |
    Bazarr 是 Sonarr 和 Radarr 的配套应用。根据你的需求管理和下载字幕。你可以按电视剧或电影设置偏好，Bazarr 会为你自动处理一切。
    
    请注意，Bazarr 不会扫描磁盘来检测电视剧和电影：它仅处理 Sonarr 和 Radarr 中索引的电视剧和电影。
    
    主要功能包括：
    - 支持主要平台：Windows、Linux、macOS、Raspberry Pi 等
    - 从 Sonarr 自动添加新的系列和剧集
    - 从 Radarr 自动添加新电影
    - 根据电视剧或电影配置字幕语言
    - 扫描现有图书馆内外的字幕，并下载任何缺失的字幕
    - 记录从何处及何时下载的历史
    - 手动搜索功能，可按需下载字幕
    - 当发现更好的字幕时，更新之前下载的字幕
    - 能够从磁盘删除外部字幕
    - 目前支持 184 种字幕语言，包括强制/外语字幕（取决于提供者）
    - 基于 Sonarr 的美观用户界面

  upgradeDescription: |
    升级 Bazarr 至版本 1.5.6（2026-02-26）
    配置变更：调整 Olares 目录挂载路径及入口权限。
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 添加 Olares External 目录 & 挂载路径为 /olares/userdata/external
    - 切换容器镜像为 linuxserver/bazarr
    - 入口权限变更为 internal

    升级亮点：
    - 【安全性】General 设置新增 hostname 配置，防止 hostname 投毒漏洞
    - 【性能】异步任务队列与字幕上传/下载流程；移除阻塞式进度监控，避免前端卡死
    - 【新功能】字幕变更后刷新 Plex 库；WhisperAI 音频延迟检测；SubX 代理 Subdivx 拉美西语；备份事件流支持
    - 【Provider】改进 subdl、opensubtitlescom、Gestdown、Assrt、subssabbz；移除已不支持的 subdivx；集成 SubX API 密钥
    - 【修复】Windows 非英文系统后处理；可升级字幕历史逻辑重构；Titulky 429 限流处理

    详细版本信息请参考：https://github.com/morpheus65535/bazarr/releases/tag/v1.5.6
