metadata:
  title: Bazarr
  description: A companion subtitle manager to Sonarr and Radarr.
spec:
  fullDescription: |
    Bazarr is a companion application to Sonarr and Radarr. It manages and downloads subtitles based on your requirements. You define your preferences by TV show or movie and Bazarr takes care of everything for you.

    Be aware that Bazarr doesn't scan disk to detect series and movies: It only takes care of the series and movies that are indexed in Sonarr and Radarr.

    Major Features Include:
    - Support for major platforms: Windows, Linux, macOS, Raspberry Pi, etc.
    - Automatically add new series and episodes from Sonarr
    - Automatically add new movies from Radarr
    - Series or movies based configuration for subtitles languages
    - Scan your existing library for internal and external subtitles and download any missing
    - Keep history of what was downloaded from where and when
    - Manual search so you can download subtitles on demand
    - Upgrade subtitles previously downloaded when a better one is found
    - Ability to delete external subtitles from disk
    - Currently support 184 subtitles languages with support for forced/foreign subtitles (depending of providers)
    - And a beautiful UI based on Sonarr
  upgradeDescription: |
    Upgrade Bazarr to version 1.5.6 (2026-02-26)
    Config changes: change olares directory mount path & entrance authlevel.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Add Olares External Directory & mount path to /olares/userdata/external
    - Switch container image to linuxserver/bazarr
    - Entrance auth level changed to internal

    Upgrade Highlights:
    - [Security] Added hostname setting in General settings to prevent hostname poisoning vulnerability
    - [Performance] Async job queue and subtitle upload/download workflows; removed blocking progress monitoring to prevent frontend freezing
    - [New Features] Plex library refresh after subtitle changes; WhisperAI audio delay detection; SubX proxy for Subdivx Latam Spanish; backup event stream support
    - [Providers] Improved subdl, opensubtitlescom, Gestdown, Assrt, subssabbz; removed unsupported subdivx provider; added SubX API key integration
    - [Fixes] Windows non-English post-processing; upgradable subtitle history logic refactor; Titulky 429 throttling

    Full release note: https://github.com/morpheus65535/bazarr/releases/tag/v1.5.6
