metadata:
  title: NocoDB
  description: Open Source Airtable Alternative.
spec:
  fullDescription: |
    NocoDB allows building no-code database solutions with ease of spreadsheets.

    NocoDB provides an intuitive spreadsheet interface for creating online databases, either from scratch or by connecting to databases. You can turns any MySQL, PostgreSQL, SQL Server, SQLite & MariaDB into a smart spreadsheet and access your data through interactive UIs like Kanban, Form, and Gallery, or via API and SQL.


    Features

    * Rich spreadsheet interface with multiple views and variant cell types.

    * Share bases / views with team.

    * Fine-grained Access Control at different levels.

    * Connect seamlessly to your chat, email, storage service for workflow automations.

    * Programmatic invoke actions using REST APIs or NocoDB SDK.

    * Sync your schema changes outside NocoDB GUI.

    * All the user operation logs are kept under Audit.
  upgradeDescription: |
    ## 0.301.3 Bug Fix Release ##
    This release includes **security fixes**; upgrading is recommended. It also focuses on stability and bug fixes across the platform.

    ## Key fixes ##
    * **Data & Sync**: Fix Noco desync from datasource; fix "id field unique constraint violation" when adding records; fix PATCH on SingleSelect/Checkbox wiping colOptions or returning 500; fix getCellValue returning reference count for Links fields.
    * **Self-hosted & API**: Fix ERR_BASE_NOT_FOUND for API v1 after 0.301.2; fix table not appearing in UI list; fix MCP queryRecords time filter clarity; fix Super Admin / Editor / Viewer export and permissions.
    * **Frontend & UX**: Fix frontend crash on HTTP + IP access (Secure Context / crypto.randomUUID); fix dark mode comment badges hidden until row clicked; fix CSV export URI for attachments and Chinese character encoding; fix lazy loading removed from views for smoother loading.
    * **Webhooks & Integrations**: Fix webhook receiving incomplete data (missing lookup and link fields) in v3 API; fix insert webhook to include all fields.
    * **Other**: Formula validation, cross-base link lookup sort, cache clear, batchInsert meta limit on SQLite, signed URL encoding, managed app UI and ACL improvements, filter/sort validation, and more.

    You can view full release note at https://github.com/nocodb/nocodb/releases/tag/0.301.3
