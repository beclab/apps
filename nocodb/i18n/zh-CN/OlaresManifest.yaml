metadata:
  description: Airtable 开源替代产品。
  title: NocoDB
spec:
  fullDescription: |
    NocoDB 使得构建无代码数据库解决方案像使用电子表格一样简单。

    NocoDB 提供了一个直观的电子表格界面，用户可以从零开始或者连接现有数据库来创建在线数据库。您可以把 MySQL、PostgreSQL、SQL Server、SQLite 和 MariaDB 等数据库转换成智能电子表格，并通过看板、表单、画廊等交互式界面或通过 API 和 SQL 访问数据。

    功能介绍
    * 多视图和多元单元格类型的电子表格界面。
    * 与团队共享数据库和视图。
    * 提供多层次的细致访问控制。
    * 与聊天、邮件和存储服务无缝结合，实现工作流自动化。
    * 通过 REST API 或 NocoDB SDK 进行编程操作。
    * 在 NocoDB GUI 外同步架构更改。
    * 保存所有用户操作的审计日志。

  upgradeDescription: |
    ## 0.301.3 错误修复版本 ##
    本版本包含**安全修复**，建议尽快升级。同时针对平台稳定性和多项错误修复。

    ## 主要修复 ##
    * **数据与同步**：修复 Noco 与数据源不同步；修复添加记录时的「id 字段唯一约束冲突」；修复 SingleSelect/Checkbox 的 PATCH 清除 colOptions 或返回 500；修复 Links 字段 getCellValue 返回引用计数的问题。
    * **自托管与 API**：修复 0.301.2 后 API v1 的 ERR_BASE_NOT_FOUND；修复表未出现在 UI 列表；修复 MCP queryRecords 时间筛选说明；修复 Super Admin / Editor / Viewer 的导出与权限。
    * **前端与体验**：修复 HTTP + IP 访问时前端崩溃（Secure Context / crypto.randomUUID）；修复深色模式下评论角标需点击行才显示；修复 CSV 导出附件 URI 及中文乱码；移除视图懒加载以提升加载流畅度。
    * **Webhook 与集成**：修复 v3 API 中 Webhook 接收数据不完整（缺少 lookup、link 字段）；修复插入 Webhook 包含全部字段。
    * **其他**：公式校验、跨库链接 lookup 排序、缓存清理、SQLite 下 batchInsert meta 限制、签名 URL 编码、托管应用 UI 与 ACL 改进、筛选/排序校验等。

    完整发布说明可在 https://github.com/nocodb/nocodb/releases/tag/0.301.3 查阅。

