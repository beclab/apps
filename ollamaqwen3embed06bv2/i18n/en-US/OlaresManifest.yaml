metadata:
  title: Qwen3 Embedding 0.6B (Ollama)
  description: "Qwen3 Embedding 0.6B model for search, retrieval, and semantic similarity"
spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL OVERVIEW ##
    Qwen3-Embedding is a 0.6B parameter text embedding model from the Qwen3 family by Alibaba. It generates high-quality vector representations for search, retrieval, classification, clustering, and semantic similarity tasks.

    Key features:

    Multilingual Support: Trained on a broad set of languages for strong cross-lingual embedding and retrieval performance.

    Compact and Efficient: At 0.6B parameters the model is lightweight and GPU-accelerated, delivering fast inference with low resource usage.

    High-Quality Embeddings: Produces dense vector representations that capture semantic meaning effectively for downstream tasks like RAG, search, and clustering.

    Matryoshka Representation: Supports flexible embedding dimensions, allowing trade-offs between performance and efficiency.

  upgradeDescription: |
    Initial release with Ollama 0.20.6.
