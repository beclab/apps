metadata:
  title: Qwen3 Embedding 0.6B (Ollama)
  description: Qwen3 Embedding 0.6B 向量模型，用于搜索、检索和语义相似度任务。
spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型概览 ##
    Qwen3-Embedding 是阿里巴巴 Qwen3 系列的 0.6B 参数文本嵌入模型，可生成高质量的向量表示，用于搜索、检索、分类、聚类和语义相似度任务。

    主要特性：

    多语言支持：基于广泛语言集训练，具备强大的跨语言嵌入和检索性能。

    紧凑高效：仅 0.6B 参数，模型轻量，支持 GPU 加速，推理速度快，资源占用低。

    高质量嵌入：生成稠密向量表示，有效捕捉语义信息，适用于 RAG、搜索和聚类等下游任务。

    俄罗斯套娃表示：支持灵活的嵌入维度，可在性能和效率之间进行权衡。

  upgradeDescription: |
    首次发布，搭载 Ollama 0.20.6。
