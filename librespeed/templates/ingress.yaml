---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log  /opt/bitnami/openresty/nginx/logs/error.log;

      # ----------------------------------------------------------------------
      # Speed-test specific tuning
      # ----------------------------------------------------------------------
      # Upload tests can push hundreds of MB to several GB depending on the
      # client's connection speed and the configured test duration.
      client_max_body_size 0;

      # Streaming proxy is mandatory: buffering would distort throughput
      # measurements (clients sample bytes/sec at the socket level) and
      # would also pin the entire upload body to disk/memory before
      # forwarding it to the PHP backend.
      proxy_request_buffering off;
      proxy_buffering         off;

      proxy_http_version 1.1;
      proxy_connect_timeout 30s;
      proxy_send_timeout    300s;
      proxy_read_timeout    300s;

      proxy_set_header host                 $host;
      proxy_set_header x-forwarded-host     $http_host;
      proxy_set_header x-real-ip            $remote_addr;
      proxy_set_header x-forwarded-for      $proxy_add_x_forwarded_for;
      proxy_set_header x-forwarded-proto    $scheme;
      proxy_set_header upgrade              $http_upgrade;
      proxy_set_header connection           "upgrade";

      location / {
          proxy_pass http://librespeed:{{ .Values.port | default 8080 }};
          proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librespeedingress
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: librespeedingress
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: librespeedingress
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: librespeedingress
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: librespeedingress
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: librespeedingress
  ports:
    - name: librespeedingress
      protocol: TCP
      port: 8080
      targetPort: 8080
