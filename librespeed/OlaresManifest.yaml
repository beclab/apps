olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  librespeedingress: 1
  librespeed: 1
metadata:
  name: librespeed
  description: Free and Open Source Speedtest.
  icon: https://app.cdn.olares.com/appstore/librespeed/icon.png
  appid: librespeed
  version: '1.0.3'
  title: LibreSpeed
  categories:
  - Utilities_v112

permission:
  appData: true
spec:
  versionName: '6.1.0'
  fullDescription: |
    No Flash, No Java, No Websocket, No Bullshit.

    This is a very lightweight speed test implemented in Javascript, using XMLHttpRequest and Web Workers.    

    **Features**
    - Download
    - Upload
    - Ping
    - Jitter
    - IP Address, ISP, distance from server (optional)
    - Telemetry (optional)
    - Results sharing (optional)
    - Multiple Points of Test (optional)
    - Connection stability test with latency charting, loss tracking, threshold alerts, and CSV export
  developer: Federico Dossena
  website: https://librespeed.org/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 384Mi
  limitedMemory: 1.5Gi
  requiredDisk: 128Mi
  limitedDisk: 1Gi
  requiredCpu: 0.2
  limitedCpu: 2.0
  doc: https://github.com/librespeed/speedtest
  license:
  - text: LGPL-3.0
    url: https://github.com/librespeed/speedtest/blob/master/LICENSE
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- authLevel: internal
  name: librespeed
  port: 8080
  host: librespeedingress
  title: LibreSpeed
  icon: https://app.cdn.olares.com/appstore/librespeed/icon.png
  openMethod: window
middleware:
  postgres:
    username: librespeed
    databases:
      - name: librespeeddb
        distributed: false
envs:
  - envName: MODE
    type: string
    required: false
    editable: true
    applyOnChange: true
    default: "dual"
    description: "LibreSpeed run mode. 'dual' (recommended) = this Olares is both the local test point AND the UI for picking remote test points listed in servers.json. 'standalone' = local test point only; UI shows Local only (your servers.json edits are preserved but not used until you switch back). 'frontend' = no local backend; all tests go to remote servers in servers.json — the Local entry pointing at this Olares is filtered out automatically. 'backend' = no UI; this container only exposes PHP endpoints so OTHER LibreSpeed instances can use it as a remote test point — opening the app entrance in this mode shows nothing useful, and external users need Public authentication (see docs)."
    options:
      - title: "Dual — local test point + remote servers (default, recommended)"
        value: "dual"
      - title: "Standalone — local test point only"
        value: "standalone"
      - title: "Frontend — UI only, all tests go to remote servers"
        value: "frontend"
      - title: "Backend — no UI, expose this Olares as a remote test point for others"
        value: "backend"
  - envName: TELEMETRY
    type: bool
    required: false
    editable: true
    applyOnChange: true
    default: "true"
    description: "Persist every test result to the bundled PostgreSQL database. Enables result-sharing (permalink/image) and the /results/stats.php history page. Has no effect in 'backend' mode (no UI to record from)."
  - envName: PASSWORD
    type: password
    required: false
    editable: true
    applyOnChange: true
    default: ""
    description: "Password for the /results/stats.php history page. Leave empty (default) = anyone who can open the URL can log in with a blank password and view all history. Set at least 6 characters to restrict access."
    regex: '^$|^[\w\-!@#$%^&*()+={}\[\]:,.?~]{6,}$'
  - envName: GDPR_EMAIL
    type: email
    required: false
    editable: true
    applyOnChange: true
    default: ""
    description: "Email shown in the privacy policy for GDPR data-deletion requests. Leave empty if you don't publicly expose this instance."
  - envName: IPINFO_APIKEY
    type: password
    required: false
    editable: true
    applyOnChange: true
    default: ""
    description: "Optional ipinfo.io API token. Without it, only the bundled offline GeoIP database is used. With it, telemetry and shared results include richer location/ISP data and distance to the test point. The main speed-test UI only shows your IP. Get a free token at https://ipinfo.io/signup."
