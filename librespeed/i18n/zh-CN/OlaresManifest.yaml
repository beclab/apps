metadata:
  title: LibreSpeed
  description: 免费且开源的网络测速工具。
spec:
  fullDescription: |
    无 Flash、无 Java、无 WebSocket、无废话。

    这是一个非常轻量的网络测速工具，使用 Javascript 实现，使用 XMLHttpRequest 和 Web Workers。    
    
    **功能**
    - 下载
    - 上传
    - 延迟
    - 抖动
    - IP 地址、ISP、服务器距离（可选）
    - 遥测（可选）
    - 结果分享（可选）
    - 多个测试点（可选）
    - 连接稳定性测试，包括延迟图表、损失跟踪、阈值警报和 CSV 导出
