{{- $vllmclientDomainENV := split "," .Values.domain.vllmclient -}}
{{- $vllmclientDomain := index $vllmclientDomainENV "_0" -}}
{{- /* vLLM loads HF models only: MODEL_SOURCE must be hf://. ENGINE_ARGS is
       mirrored here only so llm-init's /api/config reflects it. */ -}}
{{- $oe := .Values.olaresEnv | default dict -}}
{{- $modelSource := $oe.MODEL_SOURCE | default "" -}}
{{- $modelName := $oe.MODEL_NAME | default "" -}}
{{- $modelMode := $oe.MODEL_MODE | default "" -}}
{{- /* MODEL_SUPPORTS is a multi-select of coarse capability GROUPS (vision /
       tools / thinking / embedding). Expand each group one-to-many into the
       supports_* keys llm-init validates against its gateway AllSupports mirror,
       then re-join into the CSV the container env expects. "none" is the
       required-field fallback (no extra capabilities); legacy "embedding"
       token is kept as an alias. Unknown tokens pass through verbatim so a raw supports_* key still
       works. */ -}}
{{- $supportsGroups := dict
      "vision" "supports_vision"
      "tools" "supports_function_calling,supports_parallel_function_calling,supports_tool_choice"
      "thinking" "supports_reasoning,supports_reasoning_effort"
      "none" ""
      "embedding" "" -}}
{{- $modelSupports := $oe.MODEL_SUPPORTS | default "" -}}
{{- $expandedSupports := list -}}
{{- range $tok := splitList "," $modelSupports -}}
{{- $tok = trim $tok -}}
{{- if $tok -}}
{{- if hasKey $supportsGroups $tok -}}
{{- $mapped := index $supportsGroups $tok -}}
{{- if $mapped -}}
{{- $expandedSupports = append $expandedSupports $mapped -}}
{{- end -}}
{{- else -}}
{{- $expandedSupports = append $expandedSupports $tok -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- $modelSupports = join "," $expandedSupports -}}
{{- $gpuType := .Values.gpu | default "" -}}
{{- if not $gpuType -}}
{{- $gpuType = .Values.GPU.Type | default "nvidia" -}}
{{- end -}}
{{- $isCpuMode := eq $gpuType "cpu" -}}
{{- $engineArgs := $oe.ENGINE_ARGS | default "" -}}
{{- $engineArgs = include "vllmgemma412bitawqint4v3.engineArgs" (dict "Args" $engineArgs "IsCpu" $isCpuMode) -}}
{{- $logLevel := $oe.LOG_LEVEL | default "debug" -}}
{{- /* HF_ENDPOINT / HF_TOKEN: OlaresManifest valueFrom injects HF_ENDPOINT from
       OLARES_SYSTEM_HUGGINGFACE_SERVICE and HF_TOKEN from the user HF account;
       empty -> huggingface.co with no auth. */ -}}
{{- $hfEndpoint := $oe.HF_ENDPOINT | default "" -}}
{{- $hfToken := $oe.HF_TOKEN | default "" -}}
{{- /* Per-release hostPath under App Common so concurrent clones and multi-node
       engine pods share the same sentinel / model_path. */ -}}
{{- $runStateHostPath := printf "%s/huggingface/llm-init-run/%s" .Values.userspace.appCommon .Release.Name -}}
---
# Split into two Deployments to decouple readiness:
#   - llm-init (this file, no GPU): downloads the HF model, writes the sentinel,
#       serves the progress UI + OpenAI /v1/* proxy on :8090.
#   - vllm (templates/vllm.yaml, GPU): waits on the sentinel, loads MODEL_NAME on :8000.
# The entrance (download-svc) is reachable as soon as llm-init is up, so the
# dashboard shows download progress instead of sitting in "initializing".
# emptyDir cannot span Pods, so hf-cache + run-state are hostPath, mounted by
# both. llm-init runs as UID 1000, so the init container chowns them first.
apiVersion: apps/v1
kind: Deployment
metadata:
  # Static name — engine Deployment uses {{ .Release.Name }} for allowMultipleInstall.
  name: llminit
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: llm-init
spec:
  replicas: {{ .Values.workloads.llminit.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: llm-init
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llm-init
    spec:
      restartPolicy: Always
      volumes:
        # Shared cross-app HF Hub cache (App Common); image bakes HF_HUB_CACHE.
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appCommon }}/huggingface"
            type: DirectoryOrCreate
        # Per-release sentinel + model_path handshake dir (App Common).
        - name: run-state
          hostPath:
            path: "{{ $runStateHostPath }}"
            type: DirectoryOrCreate
      initContainers:
        # hostPath dirs are created root-owned; llm-init runs as UID 1000.
        - name: init-chown
          image: docker.io/beclab/aboveos-busybox:1.37.0
          command:
            - sh
            - -c
            - "mkdir -p /cache/hf/hub/.locks /cache/hf/hub/vllm-cache /cache/hf/hub/.nv/ComputeCache && chown -R 1000:1000 /cache/hf/hub /run/llm-init || true"
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
            - name: run-state
              mountPath: /run/llm-init
          securityContext:
            runAsUser: 0
      containers:
        - name: llm-init
          # v1.2.4 defaults to the stable LFS download path (hf_xet disabled
          # unless HF_ENABLE_XET=true); LFS streams each file to disk with a
          # bounded RAM footprint, avoiding the hf_xet OOM (huggingface_hub#3300).
          image: docker.io/beclab/llm-init:v1.3.1
          imagePullPolicy: IfNotPresent
          env:
            - name: ENGINE_KIND
              value: vllm
            - name: MODEL_NAME
              value: "{{ $modelName }}"
            - name: MODEL_SOURCE
              value: "{{ $modelSource }}"
            - name: MODEL_MODE
              value: "{{ $modelMode }}"
{{- if $modelSupports }}
            - name: MODEL_SUPPORTS
              value: "{{ $modelSupports }}"
{{- end }}
            - name: ENGINE_ARGS
              value: "{{ $engineArgs }}"
{{- if $hfEndpoint }}
            - name: HF_ENDPOINT
              value: "{{ $hfEndpoint }}"
{{- end }}
{{- if $hfToken }}
            - name: HF_TOKEN
              value: "{{ $hfToken }}"
{{- end }}
            - name: RUN_DIR
              value: /run/llm-init
            - name: PORT
              value: "8090"
            - name: LOG_LEVEL
              value: "{{ $logLevel }}"
            - name: LOG_FORMAT
              value: json
            - name: APP_URL
              value: "https://{{ $vllmclientDomain }}"
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /livez
              port: 8090
            periodSeconds: 30
            timeoutSeconds: 5
          # Readiness on /livez (process up), not /readyz (model ready), so the
          # progress UI is served while the model is still downloading.
          readinessProbe:
            httpGet:
              path: /livez
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
            - name: run-state
              mountPath: /run/llm-init
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # LFS download (v1.2.4 default) streams each file to disk with a
              # bounded footprint, but `hf download` still runs a python
              # subprocess in this cgroup; 4Gi gives the huggingface_hub CLI
              # comfortable headroom on large sharded models.
              cpu: 500m
              memory: 4Gi
---
# llm-init download/progress + OpenAI proxy surface (app entrance backend).
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llm-init
spec:
  selector:
    io.kompose.service: llm-init
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-api
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llm-init
spec:
  selector:
    io.kompose.service: llm-init
  ports:
    - name: http
      port: 80
      targetPort: 8090
  type: ClusterIP
