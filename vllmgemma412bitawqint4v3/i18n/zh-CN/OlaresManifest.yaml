metadata:
  description: "使用 vLLM 运行 Gemma-4-12B（AWQ-INT4）模型。"
  title: Gemma-4-12B (vLLM)

spec:
  fullDescription: |
    **模型简介**
    Gemma-4-12B-it 是 Google Gemma 4 系列的指令微调视觉语言模型，支持多模态理解、思考、工具调用与视觉能力。本应用通过 vLLM 运行 `cyankiwi/gemma-4-12B-it-AWQ-INT4` 的 `AWQ-INT4` 量化权重。

    适合图文结合的多模态任务。Gemma 4 系列面向视觉与语言的广泛多模态理解场景设计。

    **预设配置**
    - 模型：`cyankiwi/gemma-4-12B-it-AWQ-INT4`
    - 能力：思考、工具、视觉
    - 引擎参数：`--max-model-len 65536 --gpu-memory-utilization 0.9 --tensor-parallel-size 1 --max-num-batched-tokens 8192 --tool-call-parser qwen3_coder --reasoning-parser qwen3 --enable-prefix-caching --enable-auto-tool-choice`
    - 所需显存：`23Gi`

    **加速器模式**
    | 模式           | 设备             | 说明                                                         |
    |----------------|------------------|--------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存；在 ENGINE_ARGS 中调节 `--gpu-memory-utilization` |
    | `nvidia-gb10`  | GPU (Spark)      | 与 `nvidia` 相同：`23Gi` 显存；在 ENGINE_ARGS 中调节 `--gpu-memory-utilization` |
    | `cpu`          | CPU              | 图表自动注入 `--device cpu`，禁用 GPU                        |

    **工作流程说明**
    首先，Model Console 下载并准备模型，然后 vLLM 在模型准备好后启动服务。两个容器运行在同一 Pod 内，共享模型目录与就绪 sentinel。

    **技术栈说明**
    - **vLLM**（8000 端口）：运行模型并通过 API 提供服务
    - **Model Console**（8090 端口）：下载模型、展示进度，并通过 OpenAI API 代理到 vLLM

    **模型存储**
    所有模型文件存储在共享目录 `appCommon/huggingface`（挂载为 `/cache/hf/hub`），同类应用均使用此目录。

    **资源建议**
    - CPU、内存和 GPU 数量随图表自动配置，磁盘配额为固定
    - vLLM 模型加载可能需要数分钟，请保持应用 Running 直至就绪
    - 该模型需要至少 23Gi 显存的 GPU
