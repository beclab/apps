  - zh-CN
  doc: https://komga.org/docs
  license:
  - text: MIT
    url: https://github.com/gotson/komga?tab=MIT-1-ov-file
  requiredMemory: 2Gi
  limitedMemory: 6Gi
  requiredDisk: 10Mi
  limitedDisk: 5Gi
  requiredCpu: 1
  limitedCpu: 4
  supportArch:
