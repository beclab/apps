olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: komga
  description: A media server for your comics, mangas, BDs, magazines and eBooks.
  icon: https://app.cdn.olares.com/appstore/komga/icon.png
  appid: komga
  version: '1.0.7'
  title: Komga
  categories:
  - Fun
  - Utilities
entrances:
- name: komga
  port: 8080
  host: komga-web-svc
  title: Komga
  icon: https://app.cdn.olares.com/appstore/komga/icon.png
  authLevel: internal
  openMethod: window
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.24.1'
  featuredImage: https://app.cdn.olares.com/appstore/komga/1.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/komga/1.webp
  - https://app.cdn.olares.com/appstore/komga/2.webp
  - https://app.cdn.olares.com/appstore/komga/3.webp
  - https://app.cdn.olares.com/appstore/komga/4.webp
  
  fullDescription: |    
    Komga is a media server for your comics, mangas, BDs, magazines and eBooks.

    Features
    - Browse libraries, series and books via a responsive web UI that works on desktop, tablets and phones
    - Organize your library with collections and read lists
    - Edit metadata for your series and books
    - Import embedded metadata automatically
    - Webreader with multiple reading modes
    - Manage multiple users, with per-library access control, age restrictions, and labels restrictions
    - Offers a REST API, many community tools and scripts can interact with Komga
    - Download book files, whole series, or read lists
    - Duplicate files detection
    - Duplicate pages detection and removal
    - Import books from outside your libraries directly into your series folder
    - Import ComicRack cbl read lists
  upgradeDescription: |
    Upgrade from version 1.22.0 to version 1.24.1
    
    Key Changes
    Database Changes
    - WAL Mode Enabled by Default: SQLite databases now use Write-Ahead Logging (WAL) mode by default for improved performance and concurrency
    - Local Filesystem Requirement: Added configuration check at startup to ensure SQLite databases are located on a local filesystem
    - Remote Filesystem Block: Application will stop if database files are detected on remote filesystems (CIFS or NFS)
    
    Component Updates
    - Multiple Component Releases: Updates across various components including:
      - epubmodule
      - webui(web interface)
      - api(backend API)
      - kobointegration
      - dockercontainer support
      - komga-traydesktop application

    Latest release note at: https://github.com/gotson/komga/releases/tag/v1.24.1

  developer: gotson
  website: https://komga.org/
  sourceCode: https://github.com/gotson/komga
  submitter: Olares
  locale:
