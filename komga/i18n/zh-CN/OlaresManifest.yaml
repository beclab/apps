metadata:
  title: Komga
  description: 漫画、漫画、 BD、杂志和电子书的媒体服务器。
spec:
  fullDescription: |
    Komga 是一款媒体服务器，可存储您的漫画、漫画、BD、杂志和电子书。

    功能
    - 通过可在桌面、平板电脑和手机上运行的响应式 Web UI 浏览图书馆、系列和书籍
    - 使用收藏和阅读列表整理您的图书馆
    - 编辑系列和书籍的元数据
    - 自动导入嵌入式元数据
    - 提供多种阅读模式的 Web 阅读器
    - 管理多个用户，并设置每个图书馆的访问权限、年龄限制和标签限制
    - 提供 REST API，许多社区工具和脚本可以与 Komga 交互
    - 下载书籍文件、整个系列或阅读列表
    - 重复文件检测
    - 重复页面检测和删除
    - 将图书馆外部的书籍直接导入到您的系列文件夹中
    - 导入 ComicRack 的 cbl 阅读列表
  
  upgradeDescription: |
    从版本 1.22.0 升级到版本 1.24.1
    
    主要变更
    数据库相关变更
    - 默认启用 WAL 模式: SQLite 数据库现在默认启用写前日志（WAL）模式，以提升性能和并发性
    - 本地文件系统要求: 启动时增加配置检测，确保 SQLite 数据库位于本地文件系统
    - 禁止远程文件系统: 如果检测到数据库文件位于远程文件系统（如 CIFS 或 NFS），应用将停止运行
    
    组件更新
    - 多组件版本发布：多个组件获得了更新，包括：
      - epubmodule（电子书模块）
      - webui（网页界面）
      - api（后端 API）
      - kobointegration（Kobo 集成）
      - dockercontainer support（Docker 容器支持）
      - komga-traydesktop application（Komga 桌面托盘应用）

    最新发布说明见: https://github.com/gotson/komga/releases/tag/v1.24.1
