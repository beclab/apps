olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  elasticsearch: 1
  infinity: 1
  minio: 1
  ragflow: 1
  redis: 1
metadata:
  name: ragflow
  description: An open-source RAG engine based on deep document understanding.
  icon: https://app.cdn.olares.com/appstore/ragflow/icon.png
  appid: ragflow
  version: '1.0.27'
  title: RAGFlow
  categories:
  - Productivity_v112

entrances:
- name: ragflow
  host: ragflow
  port: 80
  title: RAGFlow
  icon: https://app.cdn.olares.com/appstore/ragflow/icon.png
  authLevel: private
  openMethod: window
permission:
  appData: true
  appCache: true
spec:
  versionName: '0.26.1'
  featuredImage: https://app.cdn.olares.com/appstore/ragflow/1.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/ragflow/1.webp
  - https://app.cdn.olares.com/appstore/ragflow/2.webp
  - https://app.cdn.olares.com/appstore/ragflow/3.webp
  - https://app.cdn.olares.com/appstore/ragflow/4.webp
  - https://app.cdn.olares.com/appstore/ragflow/5.webp
  fullDescription: |
    What is RAGFlow?
    RAGFlow is an open-source RAG (Retrieval-Augmented Generation) engine based on deep document understanding. It offers a streamlined RAG workflow for businesses of any scale, combining LLM (Large Language Models) to provide truthful question-answering capabilities, backed by well-founded citations from various complex formatted data.

    **Key Features**
    "Quality in, quality out"
    - Deep document understanding-based knowledge extraction from unstructured data with complicated formats.
    - Finds "needle in a data haystack" of literally unlimited tokens.

    Template-based chunking
    - Intelligent and explainable.
    - Plenty of template options to choose from.

    Grounded citations with reduced hallucinations
    - Visualization of text chunking to allow human intervention.
    - Quick view of the key references and traceable citations to support grounded answers.

    Compatibility with heterogeneous data sources
    - Supports Word, slides, excel, txt, images, scanned copies, structured data, web pages, and more.

    Automated and effortless RAG workflow
    - Streamlined RAG orchestration catered to both personal and large businesses.
    - Configurable LLMs as well as embedding models.
    - Multiple recall paired with fused re-ranking.
    - Intuitive APIs for seamless integration with business.
  upgradeDescription: |
    Storage: durable volumes (ragflow logs, infinity, minio, redis, elasticsearch) moved from `appCache` to `appData` subpaths. On first start after upgrade, initContainers copy legacy appCache contents into appData when destinations are empty (unique `.migration_from_appcache_*_done` markers per volume). Old appCache data is left intact for rollback.

    Drop legacy `sysVersion >= 1.12.3` appCache path branching; Olares minimum is now 1.12.6.

    Packaged changes (chart 1.0.25)
    - Upgraded RAGFlow to v0.26.1 and Infinity to v0.7.0 (official docker.io/infiniflow images).
    - Fixed Infinity startup: use args instead of command for -f /infinity_conf.toml (K8s entrypoint compatibility).
    - Added startup/readiness probes on /api/v1/system/healthz so the entrance opens only after the backend and dependencies are ready.
    - Added liveness probe on /api/v1/system/ping to avoid restarts when a dependency blips.
    - Removed Ollama provider dependency.
    - Configure LLM and embedding models in RAGFlow settings after install or upgrade.

    Previous release (app v0.24.0)
    - Memory: Introduces APIs and SDK for developer integration, adds extraction log display.
    - Dataset: Added batch Metadata management, renamed "ToC" to "PageIndex".
    - Agent: New Chat-like conversation management interface, multi-Sandbox mechanism.
    - Chat: New "Thinking" mode, optimized deep-research retrieval strategies.
    - Admin: Support for multiple Admin accounts, model connection test feature.
    - Model: New models including Kimi 2.5, Stepfun 3, doubao-embedding-vision.
    - Ecosystem: OceanBase database support, PaddleOCR-VL support.
    - Data sources: Zendesk, Bitbucket, MySQL, PostgreSQL, Seafile.

    Configuration changes
    - Increased upload size limit from 128M to 1024M.
    - Added Admin API nginx route (port 9381).
    - Frontend migrated from UmiJs to Vite (internal, no user action needed).

    Full release note at: https://github.com/infiniflow/ragflow/releases/tag/v0.24.0

  developer: InfiniFlow
  website: https://ragflow.io/
  sourceCode: https://github.com/infiniflow/ragflow
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://ragflow.io/docs/dev/
  license:
  - text: Apache-2.0
    url: https://github.com/infiniflow/ragflow#Apache-2.0-1-ov-file
  requiredMemory: 7680Mi
  limitedMemory: 28Gi
  requiredDisk: 56Mi
  limitedDisk: 1Gi
  requiredCpu: 3150m
  limitedCpu: 13
  supportArch:
  - amd64
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
  - name: mysql
    type: middleware
    version: '>=8.0.0'
middleware:
  mysql:
    username: rag_flow
    databases:
      - name: rag_flow
envs:
  - envName: HF_ENDPOINT
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE