apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.workloads.redis.replicaCount }}
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate         
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
      - name: migrate-appcache-to-appdata
        image: "docker.io/beclab/busybox:1.37"
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            set -e
            SOURCE=/old-data
            DEST=/new-data
            MARKER="${DEST}/.migration_from_appcache_redis_done"

            if [ -f "$MARKER" ]; then
              echo "[migrate] marker present, skip."
              exit 0
            fi

            if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_redis_done$' || true)" ]; then
              echo "[migrate] appData already has data, skip."
              echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              exit 0
            fi

            if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
              echo "[migrate] copying appCache/redis -> appData/redis..."
              cp -a "$SOURCE"/. "$DEST"/
              echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              echo "[migrate] done; legacy appCache left intact for rollback."
            else
              echo "[migrate] no legacy data, fresh install."
              echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
            fi
        volumeMounts:
          - name: redis-data-legacy
            mountPath: /old-data
            readOnly: true
          - name: redis-data
            mountPath: /new-data
      - name: init-chmod-data
        image: "docker.io/beclab/aboveos-busybox:1.37.0"
        command:
          - sh
          - '-c'
          - |
            chown -R 1000:1000 /data
        resources: {}
        volumeMounts:
          - name: redis-data
            mountPath: /data
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
      containers:
      - name: redis
        image: "docker.io/beclab/valkey-valkey:8"
        command: ["redis-server", "--requirepass", "infini_rag_flow", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          limits:
            cpu: "1"
            memory: 1000Mi
          requests:
            cpu: 50m
            memory: 512Mi
      volumes:
      - hostPath:
          path: '{{ .Values.userspace.appData }}/redis'
          type: DirectoryOrCreate
        name: redis-data
      - hostPath:
          path: '{{ .Values.userspace.appCache }}/redis'
          type: DirectoryOrCreate
        name: redis-data-legacy
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
