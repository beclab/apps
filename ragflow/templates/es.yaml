apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.workloads.elasticsearch.replicaCount }}
  selector:
    matchLabels:
      app: elasticsearch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_es_done"

              if [ -f "$MARKER" ]; then
                echo "[migrate] marker present, skip."
                exit 0
              fi

              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_es_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi

              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache/es -> appData/es..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: esdata-legacy
              mountPath: /old-data
              readOnly: true
            - name: esdata
              mountPath: /new-data
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /usr/share/elasticsearch/data
          volumeMounts:
            - name: esdata
              mountPath: /usr/share/elasticsearch/data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: elasticsearch
          image: "docker.io/beclab/elasticsearch-elasticsearch:8.11.3"
          env:
            - name: ELASTIC_PASSWORD
              value: infini_rag_flow
            - name: TZ
              value: Asia/Shanghai
            - name: network.host
              value: 0.0.0.0
            - name: http.port
              value: "9200"
            - name: node.name
              value: es01
            - name: bootstrap.memory_lock
              value: "false"
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: xpack.security.transport.ssl.enabled
              value: "false"
            - name: cluster.routing.allocation.disk.watermark.low
              value: 5gb
            - name: cluster.routing.allocation.disk.watermark.high
              value: 3gb
            - name: cluster.routing.allocation.disk.watermark.flood_stage
              value: 2gb
          ports:
            - containerPort: 9200
          resources:
            limits:
              cpu: "4"
              memory: 10Gi
            requests:
              cpu: "2"
              memory: 5Gi
          volumeMounts:
            - name: esdata
              mountPath: /usr/share/elasticsearch/data
      volumes:
      - name: esdata
        hostPath:
          path: '{{ .Values.userspace.appData }}/es'
          type: DirectoryOrCreate
      - name: esdata-legacy
        hostPath:
          path: '{{ .Values.userspace.appCache }}/es'
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: es01
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 9200
      targetPort: 9200
  selector:
    app: elasticsearch
