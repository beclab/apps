apiVersion: v1
kind: ConfigMap
metadata:
  name: config-scripts
  namespace: {{ .Release.Namespace }}
data:
  copy-config.sh: |
    #!/bin/bash

    new_dir="/config-new"
    source_dir="/config"

    if [ -z "$(ls -A $new_dir)" ]; then
        echo "Directory $new_dir is empty. Copying contents from $source_dir..."
        cp -r $source_dir/* $new_dir
        echo "Contents copied successfully."
    else
        echo "Directory $new_dir is not empty, no action needed."
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: jellyfin
spec:
  replicas: {{ .Values.workloads.jellyfin.replicaCount }}
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
        applications.app.bytetrade.io/macvlan-init: "true"
    spec:
      {{- $hwAccel := eq (toString (.Values.olaresEnv.ENABLE_HW_ACCEL | default "false")) "true" }}
      {{- if $hwAccel }}
      securityContext:
        supplementalGroups:
          - {{ .Values.olaresEnv.VIDEO_GID | default "44" | int }}
          - {{ .Values.olaresEnv.RENDER_GID | default "994" | int }}
      {{- end }}
      volumes:
        - name: home
          hostPath:
            type: Directory
            path: {{ .Values.userspace.userData }}
        {{- if $hwAccel }}
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        {{- end }}
        - hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}/config'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/jellyfin/config'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/jellyfin/config'
            {{- end }}
            type: DirectoryOrCreate
          name: config
        - hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}/cache'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/jellyfin/cache'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/jellyfin/cache'
            {{- end }}
            type: DirectoryOrCreate
          name: cache
        - hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/jellyfin'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/jellyfin'
            {{- end }}
            type: DirectoryOrCreate
          name: app-data-root
        - name: external
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.sharedlib }}"
        - name: config-scripts
          configMap:
            name: config-scripts
            defaultMode: 438
            items:
            - key: copy-config.sh
              path: copy-config.sh
      initContainers:
        - name: init-config
          image: "docker.io/beclab/jellyfin-jellyfin:10.11.11"
          resources: {}
          command: ["/bin/bash", "-c", "chmod +x /scripts/copy-config.sh & bash /scripts/copy-config.sh"]
          volumeMounts:
          - name: config
            mountPath: /config-new
          - name: config-scripts
            mountPath: /scripts/copy-config.sh
            subPath: copy-config.sh
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - |
              # appData only — do not recurse the whole Home (user media libraries).
              chown -R 1000:1000 /app-data-root
          resources: {}
          volumeMounts:
            - name: home
              mountPath: /olares/userdata/home
            - name: app-data-root
              mountPath: /app-data-root
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0

      containers:
        - name: jellyfin
          image: "docker.io/beclab/jellyfin-jellyfin:10.11.11"
          imagePullPolicy: IfNotPresent
          {{- if $hwAccel }}
          # hostPath makes /dev/dri visible; privileged is required on Olares/k3s
          # so the device cgroup allows open() on the DRM render node.
          securityContext:
            privileged: true
          {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 4000m
              memory: 4Gi
          ports:
          - containerPort: 8096
          volumeMounts:
          - name: home
            mountPath: /olares/userdata/home
          - name: home
            mountPath: /home
          - name: config
            mountPath: /config
          - name: cache
            mountPath: /cache
          - name: external
            mountPath: /olares/userdata/external
          - name: external
            mountPath: /external
          {{- if $hwAccel }}
          - name: dri
            mountPath: /dev/dri
          {{- end }}
          env:
          - name: PGID
            value: "1000" 
          - name: PUID
            value: "1000" 
          - name: UMASK
            value: "002" 
          - name: TZ
            value: Etc/UTC
          

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: 8096
      targetPort: 8096
      
