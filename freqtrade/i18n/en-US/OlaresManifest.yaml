metadata:
  title: Freqtrade
  description: Free, open source crypto trading bot
spec:
  fullDescription: |
    Freqtrade is a free and open source crypto trading bot written in Python. It is designed to support all major exchanges and be controlled via Telegram or webUI. It contains backtesting, plotting and money management tools as well as strategy optimization by machine learning.

    **Disclaimer**
    This software is for educational purposes only. Do not risk money which you are afraid to lose. USE THE SOFTWARE AT YOUR OWN RISK. THE AUTHORS, OLARES AND ALL AFFILIATES ASSUME NO RESPONSIBILITY FOR YOUR TRADING RESULTS.

    **Quick Guide**
    > Please refer to tutorial on Olares Docs for detailed guide (https://docs.olares.com/use-cases/)
    
    This app runs two trading bots, an backtest webserver, and FreqUI on one entrance:
    - Spot bot API: this page URL + /api-spot (e.g. https://your-app.olares.com/api-spot)
    - Futures bot API: this page URL + /api-future (e.g. https://your-app.olares.com/api-future)
    - Backtest / download-data API (separate data): this page URL + /api-backtest/ (e.g. https://your-app.olares.com/api-backtest).

    Open this app to get FreqUI. To connect a bot, add it in FreqUI and set API URL to /api-spot, /api-future, or /api-backtest, and log in with username "admin", password "admin". 
    
    Create secrets for exchange access: centralized exchanges (e.g., Binance) require key and secret, while decentralized exchanges (e.g., Hyperliquid) use walletAddress and privateKey. For example, create freqtrade-hyperliquid-secret (walletAddress, privateKey) to enable live trading for spot and futures. 
    
    Config and strategy files are stored in app data: each instance has its own directory at the app root — freqtrade-spot/, freqtrade-future/, and optionally freqtrade-backtest/ (each with config/config.json and strategies/*.py). Set "strategy" in config.json to the class name of the strategy file (e.g. Strategy001 ). You can add multiple .py files and switch by editing config; then stop and start the bot from FreqUI to apply changes.
    
    **Supported Spot Exchanges**
    - Binance
    - BingX
    - Bitget
    - Bitmart
    - Bybit
    - Gate.io
    - HTX
    - Hyperliquid (A decentralized exchange, or DEX)
    - Kraken
    - OKX
    - MyOKX (OKX EEA)
    - potentially many others. (We cannot guarantee they will work)
    
    **Supported Futures Exchanges**
    - Binance
    - Bitget
    - Gate.io
    - Hyperliquid (A decentralized exchange, or DEX)
    - OKX
    - Bybit
    - Kraken

    **Features**
    - Based on Python 3.11+: For botting on any operating system - Windows, macOS and Linux.
    - Persistence: Persistence is achieved through sqlite.
    - Dry-run: Run the bot without paying money.
    - Backtesting: Run a simulation of your buy/sell strategy.
    - Strategy Optimization by machine learning: Use machine learning to optimize your buy/sell strategy parameters with real exchange data.
    - Adaptive prediction modeling: Build a smart strategy with FreqAI that self-trains to the market via adaptive machine learning methods. Learn more
    - Whitelist crypto-currencies: Select which crypto-currency you want to trade or use dynamic whitelists.
    - Blacklist crypto-currencies: Select which crypto-currency you want to avoid.
    - Builtin WebUI: Builtin web UI to manage your bot.
    - Manageable via Telegram: Manage the bot with Telegram.
    - Display profit/loss in fiat: Display your profit/loss in fiat currency.
    - Performance status report: Provide a performance status of your current trades.