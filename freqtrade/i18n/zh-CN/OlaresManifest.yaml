metadata:
  title: Freqtrade
  description: 免费、开源的加密货币交易机器人
spec:
  fullDescription: |
    Freqtrade 是一个用 Python 编写的免费、开源的加密货币交易机器人。它旨在支持所有主流交易所，并可以通过 Telegram 或 WebUI 控制。它内置了回测、图表绘制和资金管理工具，并可通过机器学习对策略进行优化。

    **免责声明**
    本软件仅用于教育目的。请不要投入您无法承受亏损的资金。使用本软件风险自负。作者、OLARES 及其所有关联方对您的交易结果概不负责。

    **快速指南**
    > 详细教程请参见 Olares Docs（https://docs.olares.com/use-cases/）

    此应用运行两个交易机器人、一个回测 Web 服务器，和一个入口的 FreqUI：
    - 现货机器人 API：本页面 URL + /api-spot（如 https://your-app.olares.com/api-spot）
    - 合约机器人 API：本页面 URL + /api-future（如 https://your-app.olares.com/api-future）
    - 回测/数据下载 API（独立数据）：本页面 URL + /api-backtest/（如 https://your-app.olares.com/api-backtest）

    打开此应用可以访问 FreqUI。要连接机器人，在 FreqUI 中添加并将 API URL 设置为 /api-spot、/api-future 或 /api-backtest，用户名和密码均为 "admin"。

    创建用于交易所访问的密钥：中心化交易所（如 Binance）需要 key 和 secret，去中心化交易所（如 Hyperliquid）使用 walletAddress 和 privateKey。例如，创建 freqtrade-hyperliquid-secret（walletAddress, privateKey）即可开启现货和合约的实盘交易。

    配置文件和策略文件存储在应用数据中：每个实例在应用根目录下有自己的目录 — freqtrade-spot/、freqtrade-future/，以及可选的 freqtrade-backtest/（每个包含 config/config.json 和 strategies/*.py）。在 config.json 中设置 "strategy" 为策略文件的类名（如 Strategy001）。你可以添加多个 .py 文件，并通过编辑配置文件切换，之后在 FreqUI 中停止并重启机器人以生效。

    **支持的现货交易所**
    - Binance（币安）
    - BingX
    - Bitget
    - Bitmart
    - Bybit（币安易）
    - Gate.io（芝麻开门）
    - HTX（火币）
    - Hyperliquid（去中心化交易所 DEX）
    - Kraken（海妖）
    - OKX
    - MyOKX（OKX EEA）
    - 以及可能的其他交易所（无法保证所有均可用）

    **支持的合约交易所**
    - Binance（币安）
    - Bitget
    - Gate.io（芝麻开门）
    - Hyperliquid（去中心化交易所 DEX）
    - OKX
    - Bybit
    - Kraken（海妖）

    **功能特色**
    - 基于 Python 3.11+：可在 Windows、macOS 及 Linux 任意操作系统上运行交易机器人
    - 持久化存储：基于 sqlite 实现数据持久化
    - 模拟交易：无需资金也能运行机器人
    - 回测功能：模拟买入/卖出策略效果
    - 策略参数机器学习优化：用真实交易所数据通过机器学习优化策略参数
    - 自适应预测建模：用 FreqAI 智能构建策略，自动适应市场进行自我训练和学习
    - 加白名单：选择可交易的加密货币或使用动态白名单
    - 加黑名单：选择不想交易的加密货币
    - 内置 WebUI：可视化界面管理机器人
    - 支持 Telegram 管理：可用 Telegram 管理机器人
    - 以法币显示盈亏：以法币显示盈亏情况
    - 性能状态报告：提供当前交易的性能报告