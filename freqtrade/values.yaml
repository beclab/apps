image:
  version: '2026.3'

# FreqUI image tag (avoid latest; use explicit, traceable version).
frequiVersion: '2.2.3'

# Webserver for FreqUI download-data + backtest; data under {appData}/freqtrade-backtest/. FreqUI API URL: <app>/api-backtest/
backtest:
  enabled: true

# hostPath: {appData}/freqtrade-spot/, freqtrade-future/, freqtrade-backtest/ (when enabled).
userspace:
  appData: ""

# CORS origins for Spot Bot API (FreqUI login). For port-8081 Futures API, CORS is set to ["*"] so FreqUI (from any origin) can connect.
# Include your app base URL and with :8080 if FreqUI is opened with port (e.g. https://your-app.olares.com and https://your-app.olares.com:8080).
apiServer:
  corsOrigins: []
