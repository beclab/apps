apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: freqtrade
  name: '{{ .Release.Name }}'
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: freqtrade
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: freqtrade
    spec:
      containers:
        - name: freqtrade
          image: "docker.io/freqtradeorg/frequi:2.2.3"
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          env:
            - name: TZ
              value: Etc/UTC
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: freqtrade
  name: frequi
  namespace: '{{ .Release.Namespace }}'
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 80
  selector:
    io.kompose.service: freqtrade
