---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-backtest
  name: freqtrade-backtest
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: freqtrade-backtest
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.service: freqtrade-backtest
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /data /config /strategies /freqtrade/user_data/data /freqtrade/user_data/logs /freqtrade/user_data/backtest_results
              chown -R 1000:1000 /data /config /strategies /freqtrade/user_data
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-dir
              mountPath: /config
            - name: strategies-dir
              mountPath: /strategies
            - name: candle-data
              mountPath: /freqtrade/user_data/data
          securityContext:
            runAsUser: 0
        - name: init-seed-config-and-strategies
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              if [ ! -f /config/config.json ]; then cp /tmp/default-config/config.json /config/config.json; chown 1000:1000 /config/config.json; fi
              if [ ! -f /strategies/Strategy001.py ]; then cp /tmp/default-strategies/Strategy001.py /strategies/Strategy001.py; chown 1000:1000 /strategies/Strategy001.py; fi
          volumeMounts:
            - name: config-dir
              mountPath: /config
            - name: strategies-dir
              mountPath: /strategies
            - name: default-config
              mountPath: /tmp/default-config
              readOnly: true
            - name: default-strategies
              mountPath: /tmp/default-strategies
              readOnly: true
          securityContext:
            runAsUser: 0
      containers:
        - name: freqtrade
          image: "docker.io/freqtradeorg/freqtrade:2026.3"
          args:
            - webserver
            - --config
            - /freqtrade/config/config.json
            - --logfile
            - /freqtrade/user_data/logs/freqtrade-webserver.log
          ports:
            - containerPort: 8082
          startupProbe:
            httpGet:
              path: /api/v1/ping
              port: 8082
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8082
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 3Gi
          env:
            - name: FT_CONFIG
              value: "/freqtrade/config/config.json"
            - name: FT_USERDATA_DIR
              value: "/freqtrade/user_data"
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-dir
              mountPath: /freqtrade/config
            - name: strategies-dir
              mountPath: /freqtrade/user_data/strategies
            - name: candle-data
              mountPath: /freqtrade/user_data/data
      restartPolicy: Always
      volumes:
        - name: data
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-backtest'
            type: DirectoryOrCreate
        - name: config-dir
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-backtest/config'
            type: DirectoryOrCreate
        - name: strategies-dir
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-backtest/strategies'
            type: DirectoryOrCreate
        - name: candle-data
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-backtest/data'
            type: DirectoryOrCreate
        - name: default-config
          configMap:
            name: freqtrade-backtest-config
        - name: default-strategies
          configMap:
            name: freqtrade-strategy
status: {}

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-backtest
  name: freqtrade-backtest
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  selector:
    io.kompose.service: freqtrade-backtest
status:
  loadBalancer: {}



