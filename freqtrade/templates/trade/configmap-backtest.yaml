{{- if and .Values.backtest .Values.backtest.enabled }}
# Webserver mode: FreqUI download-data + backtest via /api-backtest/ (independent hostPath freqtrade-backtest/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: freqtrade-backtest-config
  namespace: {{ .Release.Namespace }}
data:
  config.json: |
    {
      "max_open_trades": 3,
      "stake_currency": "USDT",
      "stake_amount": 20,
      "dry_run": true,
      "dry_run_wallet": 1000,
      "timeframe": "5m",
      "tradable_balance_ratio": 0.95,
      "cancel_open_orders_on_exit": true,
      "process_throttle_secs": 5,
      "process_only_new_candles": false,
      "db_url": "sqlite:////data/tradesv3.sqlite",
      "entry_pricing": {
        "price_side": "other",
        "use_order_book": true,
        "order_book_top": 1,
        "check_depth_of_market": { "enabled": false, "bids_to_ask_delta": 1 }
      },
      "exit_pricing": {
        "price_side": "other",
        "use_order_book": true,
        "order_book_top": 1
      },
      "order_types": {
        "entry": "market",
        "exit": "market",
        "stoploss": "market",
        "stoploss_on_exchange": false
      },
      "loglevel": "info",
      "exchange": {
        "name": "okx",
        "walletAddress": "",
        "privateKey": "",
        "key": "",
        "secret": "",
        "ccxt_config": { "enableRateLimit": true },
        "ccxt_async_config": { "enableRateLimit": true },
        "pair_whitelist": ["BTC/USDT", "ETH/USDT"],
        "pair_blacklist": []
      },
      "pairlists": [
        { "method": "StaticPairList" }
      ],
      "api_server": {
        "enabled": true,
        "listen_ip_address": "0.0.0.0",
        "listen_port": 8082,
        "username": "admin",
        "password": "admin",
        "jwt_secret_key": "backtestJwtSecretChangeMeInAppData123",
        "CORS_origins": {{ if .Values.apiServer.corsOrigins }}{{ toJson .Values.apiServer.corsOrigins }}{{ else }}["*"]{{ end }},
        "cors_origins": {{ if .Values.apiServer.corsOrigins }}{{ toJson .Values.apiServer.corsOrigins }}{{ else }}["*"]{{ end }},
        "verbosity": "error",
        "enable_openapi": true
      },
      "bot_name": "freqtrade-backtest",
      "initial_state": "stopped",
      "strategy": "Strategy001"
    }
{{- end }}
