apiVersion: v1
kind: ConfigMap
metadata:
  name: freqtrade-spot-config
  namespace: {{ .Release.Namespace }}
data:
  config.json: |
    {
      "max_open_trades": 10,
      "stake_currency": "USDC",
      "stake_amount": 20,
      "dry_run": true,
      "dry_run_wallet": 1000,
      "timeframe": "5m",
      "tradable_balance_ratio": 0.95,
      "cancel_open_orders_on_exit": true,
      "process_throttle_secs": 5,
      "process_only_new_candles": false,
      "db_url": "sqlite:////data/tradesv3.sqlite",
      "entry_pricing": {
        "price_side": "other",
        "use_order_book": true,
        "order_book_top": 1,
        "check_depth_of_market": { "enabled": false, "bids_to_ask_delta": 1 }
      },
      "exit_pricing": {
        "price_side": "other",
        "use_order_book": true,
        "order_book_top": 1
      },
      "order_types": {
        "entry": "market",
        "exit": "market",
        "stoploss": "market",
        "stoploss_on_exchange": false
      },
      "stoploss_on_exchange_interval": 5,
      "loglevel": "debug",
      "unfilledtimeout": {
        "entry": 10,
        "exit": 10,
        "unit": "minutes"
      },
      "minimal_roi": { "0": 1000 },
      "exchange": {
        "name": "hyperliquid",
        "walletAddress": "",
        "privateKey": "",
        "key": "",
        "secret": "",
        "ccxt_config": {
          "enableRateLimit": true,
          "options": { "defaultType": "swap" }
        },
        "ccxt_async_config": {
           "enableRateLimit": true,
          "options": { "defaultType": "swap" }
        },
        "pair_whitelist": ["BTC/USDC", "ETH/USDC"],
        "pair_blacklist": []
      },
      "pairlists": [
        { "method": "StaticPairList" }
      ],
      "api_server": {
        "enabled": true,
        "listen_ip_address": "0.0.0.0",
        "listen_port": 8080,
        "username": "admin",
        "password": "admin",
        "jwt_secret_key": "somethingRandomSomethingRandom123",
        "CORS_origins": {{ if .Values.apiServer.corsOrigins }}{{ toJson .Values.apiServer.corsOrigins }}{{ else }}["*"]{{ end }},
        "cors_origins": {{ if .Values.apiServer.corsOrigins }}{{ toJson .Values.apiServer.corsOrigins }}{{ else }}["*"]{{ end }},
        "verbosity": "error",
        "enable_openapi": true
      },
      "bot_name": "freqtrade-spot",
      "initial_state": "running",
      "force_entry_enable": true,      
      "strategy": "Strategy001"
    }
