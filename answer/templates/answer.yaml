{{- $answerDomainENV := split  ","  .Values.domain.answer -}}
{{- $answerDomain := index $answerDomainENV "_0" -}}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: answer
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: answer
spec:
  replicas: {{ .Values.workloads.answer.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: answer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: answer
    spec:
      initContainers:
        - name: migrate-appcache-to-appdata
          image: "docker.io/beclab/busybox:1.37"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              SOURCE=/old-data
              DEST=/new-data
              MARKER="${DEST}/.migration_from_appcache_done"

              if [ -f "$MARKER" ]; then
                echo "[migrate] marker present, skip."
                exit 0
              fi

              # Destination already has content (ignore our marker name if present).
              if [ -n "$(ls -A "$DEST" 2>/dev/null | grep -v '^\.migration_from_appcache_done$' || true)" ]; then
                echo "[migrate] appData already has data, skip."
                echo "skipped existing dest at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                exit 0
              fi

              if [ -n "$(ls -A "$SOURCE" 2>/dev/null || true)" ]; then
                echo "[migrate] copying appCache -> appData..."
                cp -a "$SOURCE"/. "$DEST"/
                echo "migrated from appCache at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
                echo "[migrate] done; legacy appCache left intact for rollback."
              else
                echo "[migrate] no legacy data, fresh install."
                echo "fresh install at $(date -Iseconds 2>/dev/null || date)" > "$MARKER"
              fi
          volumeMounts:
            - name: answer-data-legacy
              mountPath: /old-data
              readOnly: true
            - name: answer-data
              mountPath: /new-data
      containers:
        - name: answer
          image: "docker.io/apache/answer:2.0.1"
          env:
            - name: INSTALL_PORT
              value: "80"
            - name: AUTO_INSTALL
              value: "true"
            - name: DB_TYPE
              value: "postgres"
            - name: DB_USERNAME
              value: {{ .Values.postgres.username }}
            - name: DB_PASSWORD
              value: {{ .Values.postgres.password }}
            - name: DB_HOST
              value: {{ .Values.postgres.host }}
            - name: DB_NAME
              value: {{ .Values.postgres.databases.answerdb }}
            - name: LANGUAGE
              value: en-US
            - name: SITE_NAME
              value: Apache Answer
            - name: SITE_URL
              value: 'https://{{ $answerDomain }}'
            - name: CONTACT_EMAIL
              value: {{ .Values.olaresEnv.CONTACT_EMAIL }}
            - name: ADMIN_NAME
              value: {{ .Values.olaresEnv.ADMIN_NAME }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.olaresEnv.ADMIN_PASSWORD }}
            - name: ADMIN_EMAIL
              value: {{ .Values.olaresEnv.ADMIN_EMAIL }}
            - name: EXTERNAL_CONTENT_DISPLAY
              value: always_display
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_PATH
              value: /data/log
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          ports:
            - containerPort: 80
          volumeMounts:
            - name: answer-data
              mountPath: /data
      restartPolicy: Always
      volumes:
        - name: answer-data
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appData }}'
        - name: answer-data-legacy
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appCache }}'
---
apiVersion: v1
kind: Service
metadata:
  name: answer
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: answer
spec:
  ports:
    - protocol: TCP
      port: 9080
      targetPort: 80
  selector:
    io.kompose.service: answer
status:
  loadBalancer: {}
