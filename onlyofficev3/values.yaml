image:
  version: 'latest'

# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest):
#   onlyofficev3     — ONLYOFFICE DocumentServer (name: {{ .Release.Name }} == appid)
#   jwtgeter         — JWT helper service
#   onlyofficeclient — example/web node app
#   onlyofficeproxy  — nginx entrance proxy
workloads:
  onlyofficeproxy:
    replicaCount: 1
  onlyofficeclient:
    replicaCount: 1
  jwtgeter:
    replicaCount: 1
  onlyofficev3:
    replicaCount: 1
