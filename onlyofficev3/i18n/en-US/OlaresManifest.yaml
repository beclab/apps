metadata:
  title: OnlyOffice
  description: Run your private office with the ONLYOFFICE
spec:
  fullDescription: |
    ONLYOFFICE Docs is a free collaborative online office suite comprising viewers and editors for texts, spreadsheets and presentations, forms and PDF, fully compatible with Office Open XML formats: .docx, .xlsx, .pptx and enabling collaborative editing in real time.

    **IMPORTANT NOTE**
    When starting ONLYOFFICE for the first time, navigate to ControlHub. In the onlyoffice pod, open the terminal of the 'onlyoffice' container. Enter the command `supervisorctl start ds:example`. Then, return to the welcome page and click on 'go to test example' to try it out.

    ONLYOFFICE Docs includes the following editors:
    **ONLYOFFICE Document Editor**
    **ONLYOFFICE Spreadsheet Editor**
    **ONLYOFFICE Presentation Editor**
    **ONLYOFFICE Form Creator**
    **ONLYOFFICE PDF editor, reader & converter**

    The editors allow you to create, edit, save and export text, spreadsheet and presentation documents and additionally have the features:
    **Collaborative editing**
    **Hieroglyph support**
    **Reviewing**
    **Spell-checking**
  upgradeDescription: |
    Migrated ONLYOFFICE to apiVersion v3 shared app pattern (onlyofficev2 → onlyofficev3).

    **What's Changed**

    - **Architecture**: flattened the onlyofficev2/onlyofficev2server sub-charts
      into a single chart; the DocumentServer Deployment is now named after the
      release (`{{ .Release.Name }}` == appid) for v3 workload verification, and
      the nginx entrance Deployment is `onlyofficeproxy`. Backend references now
      resolve within the release namespace instead of the old `*-shared` cross-namespace names.
    - **Scaling**: `workloadReplicas` declares replica counts for the
      `onlyofficev3` DocumentServer, `jwtgeter`, `onlyofficeclient` and
      `onlyofficeproxy` entrance workloads.
    - **Runtime**: ONLYOFFICE DocumentServer 9.2.0 (unchanged).
