metadata:
  description: 运行您的私有 Office
  title: OnlyOffice
spec:
  fullDescription: |
    ONLYOFFICE Docs 是一款免费的在线协作办公套件，包含文本、电子表格和演示文稿的查看器和编辑器，以及表单和 PDF 工具。它完全兼容包含 docx、.xlsx、.pptx 在内的 Office Open XML 格式，并支持实时协作编辑。

    **IMPORTANT NOTE**
    首次启动 ONLYOFFICE 时，请导航至 ControlHub。在 onlyoffice pod 中，打开 'onlyoffice' 容器的终端。输入命令 `supervisorctl start ds:example`。然后，返回欢迎页面并点击"go to test example"来尝试。

    ONLYOFFICE Docs 包含以下编辑器：
    **ONLYOFFICE Document Editor**
    **ONLYOFFICE Spreadsheet Editor**
    **ONLYOFFICE Presentation Editor**
    **ONLYOFFICE Form Creator**
    **ONLYOFFICE PDF editor, reader & converter**

    这些编辑器允许您创建、编辑、保存和导出文本、电子表格和演示文稿文档，并且还具有以下特性：
    **Collaborative editing**
    **Hieroglyph support**
    **Reviewing**
    **Spell-checking**

  upgradeDescription: |
    已将 ONLYOFFICE 迁移至 apiVersion v3 共享应用模式（onlyofficev2 → onlyofficev3）。

    **变更内容**

    - **架构**：将 onlyofficev2/onlyofficev2server 子 chart 扁平化合并为单一 chart；
      DocumentServer 的 Deployment 现以发布名命名（`{{ .Release.Name }}` == appid），
      以通过 v3 工作负载校验；nginx 入口 Deployment 命名为 `onlyofficeproxy`。
      后端引用现在在发布所在命名空间内解析，不再使用旧的 `*-shared` 跨命名空间名称。
    - **扩缩容**：`workloadReplicas` 为 `onlyofficev3` DocumentServer、`jwtgeter`、
      `onlyofficeclient` 与 `onlyofficeproxy` 入口工作负载声明副本数。
    - **运行时**：ONLYOFFICE DocumentServer 9.2.0（保持不变）。
