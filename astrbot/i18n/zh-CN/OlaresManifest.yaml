metadata:
  title: AstrBot
  description: 易上手的多平台 LLM 聊天机器人及开发框架

spec:
  fullDescription: |
    **默认账户密码**
    用户名：astrbot
    密码：安装时通过 `ASTRBOT_DASHBOARD_INITIAL_PASSWORD` 指定（至少 8 位，需包含大小写字母和数字）。首次登录后请修改。

    **应用概览**
    AstrBot 是一个松耦合、异步、支持多消息平台部署、具有易用的插件系统和完善的大语言模型（LLM）接入功能的聊天机器人及开发框架。

    **主要功能**
    大模型对话
    - 支持接入多种大模型服务。支持多模态、工具调用、MCP、原生知识库、人设等功能。
    
    多消息平台支持
    - 支持接入 QQ、企业微信、微信公众号、飞书、Telegram、钉钉、Discord、KOOK 等平台。支持速率限制、白名单、百度内容审核。
    
    Agent
    - 完善适配的 Agentic 能力。支持多轮工具调用、内置沙盒代码执行器、网页搜索等功能。
    
    插件扩展
    - 深度优化的插件机制，支持开发插件扩展功能，社区插件生态丰富。
    
    WebUI
    - 可视化配置和管理机器人，功能齐全。
  upgradeDescription: |
    升级 AstrBot 至 4.26.6，并支持安装时指定管理面板密码。

    **版本升级（chart 1.0.8 → 1.0.9，应用 3.5.26 → 4.26.6）**

    **部署变更**
    - 镜像由 `beclab/soulter-astrbot:v3.5.26` 更换为官方 `soulter/astrbot:v4.26.6`
    - 移除 Olares `<1.12.3` 的 hostPath 兼容分支；路径统一为当前 appData 布局（Olares >= 1.12.6）
    - 新增必填环境变量 `ASTRBOT_DASHBOARD_INITIAL_PASSWORD` 与可选 `ASTRBOT_RESET_DASHBOARD_PASSWORD`
    - 启动引导脚本写入安装密码时将 `password_change_required` 设为 false，登录后不再强制改密

    **重要说明**
    - 密码要求：至少 8 位，且包含大写、小写和数字
    - 用户名仍为 `astrbot`
    - 将 `ASTRBOT_RESET_DASHBOARD_PASSWORD` 临时设为 true 可在下次启动按安装密码重设

    完整发行说明：https://github.com/AstrBotDevs/AstrBot/releases/tag/v4.26.6
