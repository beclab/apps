olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  astrbot: 1
metadata:
  name: astrbot
  icon: https://app.cdn.olares.com/appstore/astrbot/icon.png
  description: Easy-to-use Multi-platform LLM Chatbot & Development Framework
  appid: astrbot
  title: AstrBot
  version: 1.0.9
  categories:
  - Developer Tools

entrances:
- name: astrbot
  host: astrbot
  port: 6185
  icon:  https://app.cdn.olares.com/appstore/astrbot/icon.png
  title: AstrBot
  authLevel: private
  openMethod: default
spec:
  versionName: '4.26.6'
  featuredImage: https://app.cdn.olares.com/appstore/astrbot/1.webp
  promoteImage:
  - https://app.cdn.olares.com/appstore/astrbot/1.webp
  - https://app.cdn.olares.com/appstore/astrbot/2.webp
  - https://app.cdn.olares.com/appstore/astrbot/3.webp
  - https://app.cdn.olares.com/appstore/astrbot/4.webp
  fullDescription: |    
    **Default credentials**
    Username: astrbot
    Password: set at install via `ASTRBOT_DASHBOARD_INITIAL_PASSWORD` (min 8 chars, must include uppercase, lowercase, and a digit). Change it after first login.

    **Overview**
    AstrBot is a loosely coupled, asynchronous chatbot and development framework that supports multi-platform deployment, featuring an easy-to-use plugin system and comprehensive Large Language Model (LLM) integration capabilities.

    **Key Features**
    LLM Conversations
    - Supports various LLMs including OpenAI API, Google Gemini, Llama, Deepseek, ChatGLM, etc. Enables local model deployment via Ollama/LLMTuner. Features multi-turn dialogues, personality contexts, multimodal capabilities (image understanding), and speech-to-text (Whisper).

    Multi-platform Integration
    - Supports QQ (OneBot), QQ Channels, WeChat (Gewechat), Feishu, and Telegram. Planned support for DingTalk, Discord, WhatsApp, and Xiaomi Smart Speakers. Includes rate limiting, whitelisting, keyword filtering, and Baidu content moderation.

    Agent Capabilities
    - Native support for code execution, natural language TODO lists, web search. Integrates with Dify Platform for easy access to Dify assistants/knowledge bases/workflows.

    Plugin System
    - Optimized plugin mechanism with minimal development effort. Supports multiple installed plugins.

    Web Dashboard
    - Visual configuration management, plugin controls, logging, and WebChat interface for direct LLM interaction.

    High Stability & Modularity
    - Event bus and pipeline architecture ensures high modularization and loose coupling.
  upgradeDescription: |
    Upgrade AstrBot to 4.26.6 with install-time dashboard password support.

    **Version Upgrade (chart 1.0.8 → 1.0.9, app 3.5.26 → 4.26.6)**

    **Deployment Changes**
    - Image updated from `beclab/soulter-astrbot:v3.5.26` to official `soulter/astrbot:v4.26.6`
    - Removed legacy Olares `<1.12.3` hostPath branches; paths always use the current appData layout (Olares >= 1.12.6)
    - Added required env `ASTRBOT_DASHBOARD_INITIAL_PASSWORD` and optional `ASTRBOT_RESET_DASHBOARD_PASSWORD`
    - Startup bootstrap applies the install password with `password_change_required=false`, so login no longer forces a second password change

    **Important Notes**
    - Password policy: at least 8 characters, with uppercase, lowercase, and a digit
    - Username remains `astrbot`
    - Set `ASTRBOT_RESET_DASHBOARD_PASSWORD=true` once to re-apply the install password on next start

    Full release notes: https://github.com/AstrBotDevs/AstrBot/releases/tag/v4.26.6
  developer: AstrBot
  website: https://astrbot.app/
  sourceCode: https://github.com/AstrBotDevs/AstrBot
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://docs.astrbot.app/
  license:
  - text: AGPL-3.0
    url: https://github.com/AstrBotDevs/AstrBot#AGPL-3.0-1-ov-file
  requiredMemory: 1Gi
  limitedMemory: 2Gi
  requiredDisk: 50Mi
  limitedDisk: 10Gi
  requiredCpu: 1
  limitedCpu: 2
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
  - Home
options:
  apiTimeout: 0  
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
- envName: ASTRBOT_DASHBOARD_INITIAL_PASSWORD
  type: password
  required: true
  editable: true
  applyOnChange: true
  regex: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$'
  description: Dashboard initial password (min 8 chars, uppercase + lowercase + digit)
- envName: ASTRBOT_RESET_DASHBOARD_PASSWORD
  type: bool
  required: false
  default: "false"
  editable: true
  applyOnChange: true
  description: Set true once to re-apply ASTRBOT_DASHBOARD_INITIAL_PASSWORD on next start
