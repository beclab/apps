apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    lua_shared_dict healthcheck 1m;
    resolver coredns.kube-system.svc.cluster.local valid=10s;

    init_worker_by_lua_block {
      if ngx.worker.id() ~= 0 then return end

      local function check_backends(premature)
        if premature then return end
        local hc = ngx.shared.healthcheck

        if not hc:get("main_ready") then
          local sock = ngx.socket.tcp()
          sock:settimeout(2000)
          local ok = sock:connect("sdwebuiforgeneov2.sdwebuiforgeneov2server-shared.svc.cluster.local", 7860)
          if ok then
            sock:close()
            hc:set("main_ready", true)
          end
        end

        if not hc:get("main_ready") then
          local sock2 = ngx.socket.tcp()
          sock2:settimeout(2000)
          local ok2 = sock2:connect("download-svc.sdwebuiforgeneov2server-shared.svc.cluster.local", 8090)
          if ok2 then
            sock2:close()
            hc:set("download_ready", true)
          else
            hc:set("download_ready", false)
          end
        end

        ngx.timer.at(3, check_backends)
      end
      ngx.timer.at(1, check_backends)
    }

    server {
        listen 8080;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        set $main_backend "sdwebuiforgeneov2.sdwebuiforgeneov2server-shared.svc.cluster.local:7860";
        set $download_backend "download-svc.sdwebuiforgeneov2server-shared.svc.cluster.local:8090";

        location /progress {
            set $backend "";
            access_by_lua_block {
              if ngx.shared.healthcheck:get("download_ready") then
                ngx.var.backend = ngx.var.download_backend
              else
                ngx.header["Content-Type"] = "application/json"
                ngx.say('{"status":"waiting"}')
                return ngx.exit(200)
              end
            }
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            add_header Access-Control-Allow-Origin *;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        location = /sdapi/v1/options {
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
            proxy_pass http://$main_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 502 504 = @probe_not_ready;
            log_by_lua_block {
              if ngx.status == 200 then
                ngx.shared.healthcheck:set("main_ready", true)
              end
            }
        }

        location @probe_not_ready {
            default_type application/json;
            return 503 '{"error":"service not ready"}';
        }

        location / {
            set $backend "";
            access_by_lua_block {
              if ngx.shared.healthcheck:get("main_ready") then
                ngx.var.backend = ngx.var.main_backend
              elseif ngx.shared.healthcheck:get("download_ready") then
                ngx.var.backend = ngx.var.download_backend
              else
                ngx.header["Content-Type"] = "text/html; charset=utf-8"
                ngx.say([[<!DOCTYPE html>
    <html><head><meta charset="utf-8"><title>SD WebUI Forge Neo</title>
    <style>body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#1a1a2e;color:#e0e0e0;font-family:system-ui,sans-serif}
    .c{text-align:center}.spinner{width:48px;height:48px;border:4px solid #333;border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
    @keyframes spin{to{transform:rotate(360deg)}}h1{font-size:1.5rem;margin-bottom:8px}p{color:#888;font-size:0.95rem}</style></head>
    <body><div class="c"><div class="spinner"></div><h1>Initializing...</h1><p>Waiting for services to start. This page will refresh automatically.</p></div>
    <script>setTimeout(function(){location.reload()},5000)</script></body></html>]])
                return ngx.exit(200)
              end
            }

            proxy_pass http://$backend;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 1800s;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            add_header X-Frame-Options "";
            add_header Access-Control-Allow-Origin *;
            if ($request_method = 'OPTIONS') { return 204; }
        }
    }

    server {
        listen 8081;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7861;
        }
    }

    server {
        listen 8082;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7862;
        }
    }

    server {
        listen 8083;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7863;
        }
    }

    server {
        listen 8084;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7864;
        }
    }

    server {
        listen 8085;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7865;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: sdwebuiforgeentrance
  name: {{ .Release.Name }}
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: sdwebuiforgeentrance
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: sdwebuiforgeentrance
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
            - containerPort: 8081
            - containerPort: 8082
            - containerPort: 8083
            - containerPort: 8084
            - containerPort: 8085
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
                  [ $http_code -ge 200 ] && [ $http_code -lt 500 ]
            initialDelaySeconds: 2
            timeoutSeconds: 3
            periodSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: sdwebuiforgeentrance
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: sdwebuiforgeentrance
  ports:
    - name: '8080'
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: '8081'
      protocol: TCP
      port: 8081
      targetPort: 8081
    - name: '8082'
      protocol: TCP
      port: 8082
      targetPort: 8082
    - name: '8083'
      protocol: TCP
      port: 8083
      targetPort: 8083
    - name: '8084'
      protocol: TCP
      port: 8084
      targetPort: 8084
    - name: '8085'
      protocol: TCP
      port: 8085
      targetPort: 8085
