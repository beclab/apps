spec:
  versionName: 'gemma4:31b-it-ud-q4_K_XL'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth Dynamic quant from `unsloth/gemma-4-31B-it-GGUF` (`gemma-4-31B-it-UD-Q4_K_XL.gguf` + `mmproj-F16.gguf`).
    Mixed-precision UD quantization preserves quality near Q5_K_M while keeping decode throughput close to standard Q4_K_M, with full vision (mmproj) retained.
    Uses the GGUF embedded chat template (single-step files-API create) for reliable tool calling and image input. Thinking is enabled by default (OLLAMA_THINKING=""); clients can disable it per request for faster agent/tool loops.

    Gemma 4 31B IT is a dense instruction-tuned multimodal model from Google DeepMind. Expect higher GPU memory than 26B-A4B MoE.

    - Format: GGUF + mmproj (text + image)
    - Quantization: UD-Q4_K_XL (~18.5 GiB weights + mmproj on disk)
    - Context: 65536 (safe on 24GB; increase if VRAM allows)

  upgradeDescription: |
    Context length raised to 65536 (safe on 24GB with q8_0 KV). Thinking enabled by default; clients can disable it per request. Vision support via `mmproj-F16.gguf`, with tool calling. Proxy v0.1.21, Ollama 0.30.0. KV cache q8_0.

  developer: Google (base) / Unsloth (GGUF)
  website: https://ai.google.dev/gemma
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma Terms of Use
      url: https://ai.google.dev/gemma/terms

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6500m
  requiredCpu: 500m
  requiredDisk: 50Mi
  limitedDisk: 80Gi
  limitedMemory: 44Gi
  requiredMemory: 6Gi
  requiredGpu: 20Gi
  limitedGpu: 26Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamagemma431a4budq4kxlv2s
    shared: true
  - name: ollamagemma431a4budq4kxlv2
permission:
