  description: Run Gemma 4 31B dense GGUF (Unsloth UD-Q4_K_XL) locally via Ollama with HF pull + Modelfile.
  appid: ollamagemma431a4budq4kxlv2
  title: Gemma4 31B IT UD-Q4(Ollama)
  version: '1.0.0'
  categories:
    - AI
sharedEntrances:
  - name: ollamagemma431a4budq4kxlv2
    host: sharedentrances-api
    port: 0
    title: Gemma4 31B IT UD-Q4_K_XL
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3-27B.png
entrances:
