    title: Gemma4 31B IT UD-Q4_K_XL
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3-27B.png
entrances:
  - name: ollamaclient
    port: 8080
    host: ollamaclient
    title: Gemma4 31B IT UD-Q4_K_XL
    icon: https://app.cdn.olares.com/appstore/llm/ollama/llm/gemma3-27B.png
