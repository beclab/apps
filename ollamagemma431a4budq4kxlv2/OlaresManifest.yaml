spec:
  versionName: 'gemma4:31b-it-ud-q4_K_XL'
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Gemma 4 31B is a dense instruction-tuned multimodal model. This chart downloads **gemma-4-31B-it-UD-Q4_K_XL.gguf** from [unsloth/gemma-4-31B-it-GGUF](https://huggingface.co/unsloth/gemma-4-31B-it-GGUF), registers it in Ollama as **gemma4:31b-it-ud-q4_K_XL**, using the same Olares Ollama proxy flow as the 26B-A4B UD-Q4 chart.

    - Quantization: UD-Q4_K_XL (Unsloth Dynamic 2.0, ~18.5 GiB on disk)
    - Context: 131072 (Modelfile / env; reduce if VRAM-constrained)
    - Backend: Ollama 0.20.0 + harveyff-olares-ollama sidecar
    - Expect higher GPU memory than 26B-A4B MoE.

  upgradeDescription: |
    Initial release aligned with ollamaqwen35a3budq4klv2 / ollamagemma426a4budq4kxlv2. Ollama 0.20.0.

  developer: Google (base) / Unsloth (GGUF)
  website: https://ai.google.dev/gemma
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: Gemma Terms of Use
      url: https://ai.google.dev/gemma/terms

  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  limitedCpu: 6500m
  requiredCpu: 150m
  requiredDisk: 50Mi
  limitedDisk: 90Gi
  limitedMemory: 44Gi
  requiredMemory: 6Gi
  requiredGpu: 20Gi
  limitedGpu: 28Gi
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 800Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 10m
  limitedCpu: 800m
  {{- end }}

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: ollamagemma431a4budq4kxlv2s
    shared: true
  - name: ollamagemma431a4budq4kxlv2
permission:
  appData: true
  appCache: true
  userData:
    - Home/Ollama
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - ollamagemma431a4budq4kxlv2
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.3-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: ollamagemma431a4budq4kxlv2
      type: application
      version: '>=1.0.0'
      mandatory: true
  {{- end }}
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: KEEP_ALIVE
    required: false
    type: bool
    editable: true
    applyOnChange: true
    default: "false"
{{- end }}
