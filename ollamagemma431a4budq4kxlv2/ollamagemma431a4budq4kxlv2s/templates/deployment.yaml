{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: ollama
  name: ollama
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ollama
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: ollama
    spec:
      containers:
        - name: ollama
          image: "docker.io/ollama/ollama:0.30.0"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - '-c'
            - |
              echo "Starting Ollama server..."
              ollama serve &
              SERVER_PID=$!
              until ollama list > /dev/null 2>&1; do
                sleep 1
              done
              echo "Ollama server is ready."

              {{- with .Values.olaresEnv }}
              {{- if and .KEEP_ALIVE (eq (lower (toString .KEEP_ALIVE)) "true") }}
              # Wait for the api proxy to create the model (weights + mmproj), then preload.
              while ! ollama list 2>/dev/null | grep -q "${MODEL_NAME%%:*}"; do
                sleep 5
              done
              sleep 5
              echo "Preloading model..."
              START_TIME=$(date +%s)
              ollama run ${MODEL_NAME} "Hello"
              END_TIME=$(date +%s)
              ELAPSED=$((END_TIME - START_TIME))
              echo "Model preloading completed in ${ELAPSED} seconds"
              {{- end }}
              {{- end }}
              wait $SERVER_PID
          envFrom:
            - configMapRef:
                name: ollama-env
          env:
{{- with .Values.olaresEnv }}
{{- if and .KEEP_ALIVE (eq (lower (toString .KEEP_ALIVE)) "true") }}
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
{{- end }}
{{- end }}
          ports:
            - containerPort: 11434
          livenessProbe:
            httpGet:
              path: /
              port: 11434
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 60
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          startupProbe:
            tcpSocket:
              port: 11434
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          resources:
            limits:
              cpu: "6"
              memory: 42Gi
            requests:
              cpu: 50m
              memory: 6Gi
          volumeMounts:
            - mountPath: "/root/.ollama"
              name: data
            - mountPath: "/models"
              name: gguf-models
            - name: cuda-compute-cache
              mountPath: /root/.nv/ComputeCache
              subPath: ComputeCache
      volumes:
        - name: data
          hostPath:
            path: "{{ .Values.userspace.userData }}/Ollama/{{ .Release.Name }}"
            type: DirectoryOrCreate
        - name: gguf-models
          hostPath:
            path: "{{ .Values.userspace.userData }}/Ollama/{{ .Release.Name }}/models"
            type: DirectoryOrCreate
        - name: cuda-compute-cache
          hostPath:
            path: "{{ .Values.userspace.userData }}/Ollama/.nv"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: ollama
  name: ollama
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "ollama"
      port: 11434
      targetPort: 11434
  selector:
    io.kompose.service: ollama
status:
  loadBalancer: {}

{{- end }}
