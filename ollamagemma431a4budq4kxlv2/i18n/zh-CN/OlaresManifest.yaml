metadata:
  title: Gemma4 31B IT UD-Q4(Ollama)
  description: 通过 Ollama 本地运行 Gemma 4 31B 稠密模型 Unsloth GGUF（UD-Q4_K_XL），含 HF 拉取与 Modelfile。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型 ##
    Gemma 4 31B 为 Google DeepMind 的稠密指令微调模型。本 Chart 从 [unsloth/gemma-4-31B-it-GGUF](https://huggingface.co/unsloth/gemma-4-31B-it-GGUF) 下载 **gemma-4-31B-it-UD-Q4_K_XL.gguf**（磁盘约 18.5 GiB），在 Ollama 中注册为 **gemma4:31b-it-ud-q4_K_XL**，流程与 26B-A4B UD-Q4 的 Ollama 应用一致。

    - 格式：GGUF（纯文本；未包含视觉/图片模块，以获得更长上下文和更高吞吐）
    - 量化：UD-Q4_K_XL（Unsloth Dynamic 2.0）
    - 上下文：默认 32k（32768，可按显存调高）
    - 后端：Ollama 0.20.5 + harveyff-olares-ollama
    - 显存需求高于 26B-A4B MoE。

  upgradeDescription: |
    将内置 Ollama 升级至 [0.20.5](https://github.com/ollama/ollama/releases/tag/v0.20.5)。主要更新：`ollama launch openclaw` 可接入 WhatsApp、Telegram、Discord 等 OpenClaw 消息通道；兼容 GPU 上为 Gemma 4 启用 flash attention；识别 curl 安装的 OpenCode（`~/.opencode/bin`）；修复基于 safetensors 架构模型的 `/save` 命令。
