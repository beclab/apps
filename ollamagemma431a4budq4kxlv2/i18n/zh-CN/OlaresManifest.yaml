metadata:
  title: Gemma4 31B IT UD-Q4(Ollama)
  description: 通过 Ollama 本地运行 Gemma 4 31B 稠密模型 Unsloth GGUF（UD-Q4_K_XL），含 HF 拉取与 Modelfile。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 模型 ##
    Gemma 4 31B 为稠密多模态指令模型。本 Chart 从 [unsloth/gemma-4-31B-it-GGUF](https://huggingface.co/unsloth/gemma-4-31B-it-GGUF) 下载 **gemma-4-31B-it-UD-Q4_K_XL.gguf**（磁盘约 18.5 GiB），在 Ollama 中注册为 **gemma4:31b-it-ud-q4_K_XL**，流程与 26B-A4B UD-Q4 的 Ollama 应用一致。

    - 量化：UD-Q4_K_XL（Unsloth Dynamic 2.0）
    - 上下文：默认 32k（32768，可按显存调高）
    - 后端：Ollama 0.20.3 + harveyff-olares-ollama
    - 显存需求高于 26B-A4B MoE。

  upgradeDescription: ''
