metadata:
  title: Gemma4 31B IT UD-XL（Ollama）
  description: Gemma4 31B IT 稠密模型（Unsloth Dynamic UD-Q4_K_XL）多模态本地推理。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。
    用户流量通过代理流向 Ollama。

    **模型**
    使用来自 `unsloth/gemma-4-31B-it-GGUF` 的 Unsloth Dynamic 量化（`gemma-4-31B-it-UD-Q4_K_XL.gguf` + `mmproj-F16.gguf`）。
    UD 混合精度量化，完整保留视觉能力（mmproj）。
    使用 GGUF 内嵌对话模板以支持工具调用与图片输入。默认开启思考（OLLAMA_THINKING=""），客户端可按需关闭以加速 Agent/工具循环。

    Gemma 4 31B IT 为稠密指令微调多模态模型。显存需求高于 26B-A4B MoE。

    - 格式：GGUF + mmproj（文本 + 图片）
    - 上下文：32768

  upgradeDescription: |
    上下文提升至 65536（24GB 安全）。新增视觉：`mmproj-F16.gguf` + 内嵌对话模板以支持 tools/vision。默认开启思考（OLLAMA_THINKING=""）。代理 v0.1.21，Ollama 0.30.0。KV cache q8_0。
