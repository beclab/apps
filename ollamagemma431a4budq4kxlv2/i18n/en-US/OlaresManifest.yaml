metadata:
  title: Gemma4 31B IT UD-Q4(Ollama)
  description: Run Gemma 4 31B dense GGUF (Unsloth UD-Q4_K_XL) locally via Ollama with Hugging Face download and Modelfile.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Gemma 4 31B is a dense instruction-tuned multimodal model. This chart downloads **gemma-4-31B-it-UD-Q4_K_XL.gguf** from [unsloth/gemma-4-31B-it-GGUF](https://huggingface.co/unsloth/gemma-4-31B-it-GGUF), registers it in Ollama as **gemma4:31b-it-ud-q4_K_XL**, using the same Olares Ollama proxy pattern as the 26B-A4B UD-Q4 chart.

    - Quantization: UD-Q4_K_XL (~18.5 GiB on disk)
    - Context: 131072 (reduce if VRAM-constrained)
    - Backend: Ollama 0.20.0 + harveyff-olares-ollama sidecar
    - Expect higher GPU memory than 26B-A4B MoE.

  upgradeDescription: |
    Initial release aligned with ollamaqwen35a3budq4klv2 / ollamagemma426a4budq4kxlv2. Ollama 0.20.0.
