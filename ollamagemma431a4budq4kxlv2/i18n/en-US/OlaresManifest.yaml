metadata:
  title: Gemma4 31B IT UD-Q4(Ollama)
  description: Run Gemma 4 31B dense GGUF (Unsloth UD-Q4_K_XL) locally via Ollama with Hugging Face download and Modelfile.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## MODEL ##
    Gemma 4 31B is a dense instruction-tuned model from Google DeepMind. This chart downloads **gemma-4-31B-it-UD-Q4_K_XL.gguf** from [unsloth/gemma-4-31B-it-GGUF](https://huggingface.co/unsloth/gemma-4-31B-it-GGUF), registers it in Ollama as **gemma4:31b-it-ud-q4_K_XL**, using the same Olares Ollama proxy pattern as the 26B-A4B UD-Q4 chart.

    - Format: GGUF (text-only; vision/image input is not included to maximize context length and throughput)
    - Quantization: UD-Q4_K_XL (~18.5 GiB on disk)
    - Context: 32k default (32768; increase if VRAM allows)
    - Backend: Ollama 0.20.5 + harveyff-olares-ollama sidecar
    - Expect higher GPU memory than 26B-A4B MoE.

  upgradeDescription: |
    Upgrades bundled Ollama to [0.20.5](https://github.com/ollama/ollama/releases/tag/v0.20.5). Highlights: OpenClaw channel setup via `ollama launch openclaw` (WhatsApp, Telegram, Discord, etc.); flash attention for Gemma 4 on compatible GPUs; curl-based OpenCode installs detected at `~/.opencode/bin`; fix `/save` for safetensors-based model architectures.
