metadata:
  title: Gemma4 31B IT UD-XL (Ollama)
  description: "Gemma4 31B IT dense (Unsloth Dynamic UD-Q4_K_XL) multimodal local inference"

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.
    User traffic goes through the proxy to Ollama.

    **MODEL**
    Uses Unsloth Dynamic quant from `unsloth/gemma-4-31B-it-GGUF` (`gemma-4-31B-it-UD-Q4_K_XL.gguf` + `mmproj-F16.gguf`).
    Mixed-precision UD quantization with full vision (mmproj) retained.
    Uses the GGUF embedded chat template for reliable tool calling and image input. Thinking enabled by default (OLLAMA_THINKING=""); clients can disable per request.

    Gemma 4 31B IT is a dense instruction-tuned multimodal model. Expect higher GPU memory than 26B-A4B MoE.

    - Format: GGUF + mmproj (text + image)
    - Context: 32768

  upgradeDescription: |
    Context raised to 65536 (safe on 24GB). Add vision: `mmproj-F16.gguf` + embedded chat template for tools/vision. Thinking on by default (OLLAMA_THINKING=""). Proxy v0.1.21, Ollama 0.30.0. KV cache q8_0.
