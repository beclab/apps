spec:
  versionName: "0.30.0"
  featuredImage: https://app.cdn.olares.com/appstore/ollama/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/ollama/1.webp
    - https://app.cdn.olares.com/appstore/ollama/2.webp
    - https://app.cdn.olares.com/appstore/ollama/3.webp

  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    **OVERVIEW**
    Ollama is a user-friendly interface for running large language models (LLMs) locally. It is a valuable tool for researchers, developers, and anyone who wants to experiment with language models. With Ollama, you can easily download and run LLMs, customize and create your own, and chat with your LLMs using files on your device.

    Ollama supports a wide range of models, including:
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    Upgrade Ollama from v0.24.0 to v0.30.0

    **What's Changed**

    v0.30.0 (2026-05-13)
    - Ollama 0.30 improves compatibility and performance using llama.cpp, augmenting the MLX engine on Apple Silicon for broader hardware support
    - Supports a wider range of models, including GGUF-based models from Hugging Face and fine-tuned models
    - Faster performance on NVIDIA hardware
    - Set `LLAMA_ARG_FIT_TARGET=1024` (free VRAM margin per GPU in MiB; must be non-empty — an empty value crashes 0.30 llama-server)
    - Mount CUDA ComputeCache at Home/Ollama/.nv (shared across all Ollama apps) to speed up GPU kernel warmup

    **Known issues**
    - `laguna-xs.2` is not yet supported on Windows/Linux
    - `llama3.2-vision` is not yet supported
    - `nomic-embed-text` now converts inputs to lowercase per the model card (prior versions incorrectly preserved mixed case)

    v0.24.0 (2026-05-14)
    - Ollama 0.24 adds support for the Codex App (OpenAI desktop for Codex threads with worktree and git support); use `ollama launch codex-app` and `ollama launch codex-app --restore` to revert
    - Codex can open local servers in a built-in browser for annotations, and supports review mode for commenting on code in-app
    - Reworked the MLX sampler for improved generation quality on Apple Silicon

    v0.23.2 (2026-05-07)
    - `ollama launch` no longer includes Claude Desktop due to the third-party integration being limited to Anthropic models
    - Use `ollama launch claude-desktop --restore` to restore Claude Desktop to its normal state
    - `/api/show` responses are now cached, improving median latency by ~6.7x which speeds up integrations like VS Code
    - Improved backup workflow when managing launch integrations
    - Cleaner image generation layout in the MLX runner

    For detailed release notes, visit:
    https://github.com/ollama/ollama/releases

  developer: ollama
  website: https://ollama.com/
  sourceCode: https://github.com/ollama/ollama
  submitter: Olares
  locale:
