  appid: ollamav2
  title: Ollama
  version: "1.1.0"
  categories:
    - Utilities_v112
    - Productivity
sharedEntrances:
  - name: ollamav2
    host: sharedentrances-ollama
    port: 0
    title: Ollama API
    icon: https://app.cdn.olares.com/appstore/ollama/icon.png
    invisible: true
    authLevel: internal
entrances:
