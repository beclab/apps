spec:
  versionName: "0.23.2"
  featuredImage: https://app.cdn.olares.com/appstore/ollama/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/ollama/1.webp
    - https://app.cdn.olares.com/appstore/ollama/2.webp
    - https://app.cdn.olares.com/appstore/ollama/3.webp

  fullDescription: |
    ## IMPORTANT NOTE
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## OVERVIEW
    Ollama is a user-friendly interface for running large language models (LLMs) locally. It is a valuable tool for researchers, developers, and anyone who wants to experiment with language models. With Ollama, you can easily download and run LLMs, customize and create your own models, and chat with your LLMs using files on your device.

    Ollama supports a wide range of models, including:
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    Upgrade Ollama from v0.20.5 to v0.23.2

    ## What's Changed

    ### v0.23.2 (2026-05-07)
    - `ollama launch` no longer includes Claude Desktop due to the third-party integration being limited to Anthropic models
    - Use `ollama launch claude-desktop --restore` to restore Claude Desktop to its normal state
    - `/api/show` responses are now cached, improving median latency by ~6.7x which speeds up integrations like VS Code
    - Improved backup workflow when managing launch integrations
    - Cleaner image generation layout in the MLX runner

    ### v0.23.1 (2026-05-05)
    - Gemma 4 MTP (Multi-token Processing) speculative decoding now supported on Macs, giving over a 2x speed increase for Gemma 4 31B on coding tasks (`ollama run gemma4:31b-coding-mtp-bf16`)
    - Update MLX and MLX-C with threading fixes
    - Bump Go to 1.26

    ### v0.23.0 (2026-05-03)
    - Claude Desktop is now supported with Ollama Launch (`ollama launch claude-desktop`); Claude Cowork and Claude Code are supported within the Claude Desktop App
    - Ollama app now surfaces featured models from server-driven recommendations
    - Fixed OpenClaw gateway timeout on Windows by enforcing IPv4 loopback
    - Hardened Metal initialization to gracefully handle ggml kernel compilation failures

    ### v0.22.1 (2026-04-28)
    - Updated the Gemma 4 renderer for thinking and tool calling improvements
    - Model recommendations are now updated without updating Ollama
    - Aligned the desktop app's launch page with `ollama launch` integrations
    - Fixed the Poolside integration title in `ollama launch`

    ### v0.22.0 (2026-04-28)
    - New models: NVIDIA's Nemotron 3 Omni and Poolside's first open-weight coding model Laguna XS.2

    ### v0.21.3 (2026-04-24)
    - api: accept "max" as a think value
    - openai: map responses reasoning effort to think

    ### v0.21.2 (2026-04-23)
    - Improved reliability of the OpenClaw onboarding flow in `ollama launch`
    - Recommended models in `ollama launch` now appear in a fixed, canonical order
    - OpenClaw integration now bundles Ollama's web search plugin in OpenClaw

    ### v0.21.1 (2026-04-22)
    - Kimi CLI: install and run the Kimi CLI through Ollama (`ollama launch kimi --model kimi-k2.6:cloud`)
    - MLX runner adds logprobs support for compatible models
    - Faster MLX sampling with fused top-P and top-K in a single sort pass, plus repeat penalties applied in the sampler
    - Improved MLX prompt tokenization by moving tokenization into request handler goroutines
    - Better MLX thread safety for array management
    - GLM4 MoE Lite performance improvement with a fused sigmoid router head
    - Fixed model picker showing stale model after switching chats in the macOS app
    - Fixed structured outputs for Gemma 4 when `think=false`

    ### v0.21.0 (2026-04-16)
    - Hermes Agent: `ollama launch hermes` — Hermes learns with you, automatically creating skills to better serve research and engineering workflows
    - Gemma 4 on MLX: text-only MLX runtime for Apple Silicon, with mixed-precision quantization and new op wrappers
    - Hermes and GitHub Copilot CLI are now first-class integrations in `ollama launch`
    - `ollama launch opencode` now writes its config inline rather than to a separate file
    - `ollama launch` no longer rewrites config when nothing changed
    - Fixed `ollama launch openclaw --yes` so non-interactive setups complete cleanly
    - Restored the Gemma 4 nothink renderer with the e2b-style prompt
    - Fixed the Gemma 4 compiler error that was breaking Metal builds
    - Fixed macOS cross-compiles and quieted cgo build warnings

    ### v0.20.7 (2026-04-13)
    - Fix quality of gemma:e2b and gemma:e4b when thinking is disabled
    - ROCm: Update to ROCm 7.2.1 on Linux

    ### v0.20.6 (2026-04-12)
    - Improved Gemma 4 tool calling using Google's latest post-launch fixes
    - Improved parallel tool calling for streaming responses
    - Hermes agent Ollama integration guide is now available
    - Fix image attachment errors in the Ollama app

    For detailed release notes, visit:
    https://github.com/ollama/ollama/releases

