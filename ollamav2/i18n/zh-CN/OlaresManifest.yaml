metadata:
  title: Ollama
  description: 开始使用并运行大型语言模型吧。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 应用概览 ##
    Ollama 是一个用于在本地运行大型语言模型（LLMs）的用户友好界面。  
    对研究人员、开发者以及任何想要尝试大语言模型的人来说，Ollama 是一个非常有价值的工具。  
    使用 Ollama，您可以轻松下载和运行 LLMs，自定义并创建您自己的模型，并使用您设备上的文件与 LLMs 进行对话。

    Ollama 支持广泛的模型，包括：
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    将 Ollama 从 v0.20.0 升级至 v0.20.5

    ## 更新内容

    # v0.20.5 (2026-04-09)
    - OpenClaw 频道设置：通过 `ollama launch openclaw` 连接 WhatsApp、Telegram、Discord 等消息渠道
    - 在兼容 GPU 上为 Gemma 4 启用 flash attention
    - `ollama launch openclaw` 现可检测基于 curl 安装的 OpenCode（~/.opencode/bin）
    - 修复 safetensors 架构模型的 `/save` 命令

    # v0.20.4 (2026-04-07)
    - mlx：通过 NAX 提升 M5 性能
    - gemma4：启用 flash attention

    # v0.20.3 (2026-04-07)
    - 改进 Gemma 4 工具调用
    - 在 Ollama App 中添加最新模型
    - 修复 OpenClaw 启动 TUI 的问题

    # v0.20.2 (2026-04-04)
    - 应用主页默认显示新对话而非启动页

    # v0.20.1 (2026-04-03)
    - bench：添加提示校准、上下文大小参数和 NumCtx 报告
    - 修复 gemma4 引号字符串参数解析问题
    - gemma4：启用 flash attention
    - 重构 gemma4 工具调用处理
    - 修复 ROCm 构建中 cublasGemmBatchedEx 预留包装器问题

    ## 其他
    - 升级 terminal 至 v0.0.8

    详细发布说明请访问：
    https://github.com/ollama/ollama/releases
