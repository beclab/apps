metadata:
  title: Ollama
  description: 开始使用并运行大型语言模型吧。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 应用概览 ##
    Ollama 是一个用于在本地运行大型语言模型（LLMs）的用户友好界面。  
    对研究人员、开发者以及任何想要尝试大语言模型的人来说，Ollama 是一个非常有价值的工具。  
    使用 Ollama，您可以轻松下载和运行 LLMs，自定义并创建您自己的模型，并使用您设备上的文件与 LLMs 进行对话。

    Ollama 支持广泛的模型，包括：
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    将 Ollama 从 v0.18.3 升级至 v0.20.0

    ## 性能与稳定性改进

    # v0.20.0 (2026-04-02)
    - Gemma 4 模型：`gemma4:e2b`、`gemma4:e4b`、`gemma4:26b`、`gemma4:31b`
    - MLX：在流水线中遵循 tokenizer 的 `add_bos_token` 设置
    - Tokenizer：支持 SentencePiece 风格 BPE

    # v0.18.3 (2026-03-25)
    - 改进 GLM 工具调用解析
    - 优化 OpenClaw 集成的网关检查

    # v0.18.2 (2026-03-18)
    - 通过修复缓存失效问题，提升本地推理速度
    - 修复 `ollama launch openclaw --model` 支持

    # v0.18.1 (2026-03-17)
    - 改进 Ollama 基准测试工具

    # v0.18.0 (2026-03-14)
    - 云端模型速度提升最高 2 倍（Kimi-K2.5）
    - 提升工具调用准确性
    - MiniMax-M2.5 延迟降低最高 10 倍，Qwen3.5 延迟降低最高 2 倍
    - 修正上下文压缩在各模型中的触发时机，提升内存效率
    - 支持 AMD GPU 的 ROCm 7（需更新显卡驱动）
    - 云端模型无需再执行 `ollama pull`，使用 `:cloud` 标签即可自动连接

    详细发布说明请访问：
    https://github.com/ollama/ollama/releases
