metadata:
  title: Ollama
  description: 开始使用并运行大型语言模型吧。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    **应用概览**
    Ollama 是一个用于在本地运行大型语言模型（LLMs）的用户友好界面。  
    对研究人员、开发者以及任何想要尝试大语言模型的人来说，Ollama 是一个非常有价值的工具。  
    使用 Ollama，您可以轻松下载和运行 LLMs，自定义并创建您自己的模型，并使用您设备上的文件与 LLMs 进行对话。

    Ollama 支持广泛的模型，包括：
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    将 Ollama 从 v0.30.6 升级至 v0.30.11

    **更新内容**

    v0.30.11 (2026-06-26)
    - 新增模型：Ornith —— 自改进的开源 agentic coding 模型家族（9B / 35B MoE，256K 上下文，MIT 协议）。通过 `ollama run ornith`（或 `ornith:9b` / `ornith:35b`）即可运行。本版本下通过通用对话模板运行；其专用 renderer/parser（让 agentic 工具调用输出更规范）将在后续版本提供
    - `ollama launch` 现可在缺失时自动安装 opencode 与 Claude Code，并为 opencode 增加 thinking 能力检测
    - 修复 Windows 混合显卡机型上核显/独显 Vulkan 分类反转的问题；Windows 现使用宿主机 Vulkan 加载器
    - 统一并优化 MLX 推测解码；为发生位移的提示词保留生成余量
    - `ollama ps` 在部分卸载时不再重复计入 mmap 权重；mmproj 卸载按投影器显存大小计算
    - 本次发布未新增环境变量

    v0.30.6 (2026-06-05)
    - 新增模型：Gemma 4 QAT（量化感知训练）权重，大幅降低显存占用并提升端侧性能——标签以 `-qat` 结尾（如 `gemma4:e2b-it-qat`、`gemma4:12b-it-qat`、`gemma4:31b-it-qat`）
    - `ollama launch omp` 现已集成 Oh My Pi（带 IDE 集成的 AI 编码助手）
    - MLX 嵌入层改用 NVFP4 全局缩放，提升 Apple Silicon 上的量化质量

    v0.30.5 (2026-06-04)
    - 修复 `gemma4:12b` 在 x86、CUDA、Linux 与 Windows 上的浮点异常崩溃
    - `ollama launch hermes-desktop` 在已安装打包桌面应用时不再重复构建
    - `ollama launch hermes` 现支持通过 Hermes PowerShell 安装器进行原生 Windows 安装
    - 新增 Cline CLI 集成文档

    v0.30.0 (2026-05-13)
    - Ollama 0.30 基于 llama.cpp 提升兼容性与性能，并在 Apple Silicon 上增强 MLX 引擎，覆盖更广的硬件
    - 支持更多模型，包括来自 Hugging Face 的 GGUF 模型及自训练微调模型
    - NVIDIA 硬件上推理更快
    - 设置 `LLAMA_ARG_FIT_TARGET=1024`（每 GPU 预留空闲显存 MiB；必须非空，空值会导致 0.30 llama-server 崩溃）
    - 将 CUDA ComputeCache 挂载至 Home/Ollama/.nv（多 Ollama 应用共用），加速 GPU 内核预热

    **已知问题**
    - `laguna-xs.2` 在 Windows/Linux 上尚不支持
    - `llama3.2-vision` 尚不支持
    - `nomic-embed-text` 现按模型卡将输入转为小写（旧版错误地保留了大小写混排）

    v0.24.0 (2026-05-14)
    - Ollama 0.24 支持 OpenAI Codex 桌面应用（并行处理 Codex 会话，内置 worktree 与 Git）；使用 `ollama launch codex-app`，`ollama launch codex-app --restore` 可恢复此前配置
    - Codex 内置浏览器可加载本地服务与站点以便批注；支持在应用内审阅代码并留言迭代
    - 重构 Apple Silicon 上的 MLX 采样器以提升生成质量

    v0.23.2 (2026-05-07)
    - 由于 Claude Desktop 第三方集成仅限于 Anthropic 模型，`ollama launch` 不再包含 Claude Desktop
    - 使用 `ollama launch claude-desktop --restore` 可将 Claude Desktop 恢复至默认状态
    - `/api/show` 响应现已支持缓存，中位数延迟提升约 6.7 倍，可显著加速 VS Code 等集成的加载速度
    - 改进 launch 集成管理时的备份流程
    - MLX 运行器中图像生成布局更整洁

    详细发布说明请访问：
    https://github.com/ollama/ollama/releases
