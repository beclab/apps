metadata:
  title: Ollama
  description: 开始使用并运行大型语言模型吧。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    **应用概览**
    Ollama 是一个用于在本地运行大型语言模型（LLMs）的用户友好界面。  
    对研究人员、开发者以及任何想要尝试大语言模型的人来说，Ollama 是一个非常有价值的工具。  
    使用 Ollama，您可以轻松下载和运行 LLMs，自定义并创建您自己的模型，并使用您设备上的文件与 LLMs 进行对话。

    Ollama 支持广泛的模型，包括：
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    将 Ollama 从 v0.23.2 升级至 v0.24.0

    **更新内容**

    v0.24.0 (2026-05-14)
    - Ollama 0.24 支持 OpenAI Codex 桌面应用（并行处理 Codex 会话，内置 worktree 与 Git）；使用 `ollama launch codex-app`，`ollama launch codex-app --restore` 可恢复此前配置
    - Codex 内置浏览器可加载本地服务与站点以便批注；支持在应用内审阅代码并留言迭代
    - 重构 Apple Silicon 上的 MLX 采样器以提升生成质量

    v0.23.2 (2026-05-07)
    - 由于 Claude Desktop 第三方集成仅限于 Anthropic 模型，`ollama launch` 不再包含 Claude Desktop
    - 使用 `ollama launch claude-desktop --restore` 可将 Claude Desktop 恢复至默认状态
    - `/api/show` 响应现已支持缓存，中位数延迟提升约 6.7 倍，可显著加速 VS Code 等集成的加载速度
    - 改进 launch 集成管理时的备份流程
    - MLX 运行器中图像生成布局更整洁

    v0.23.1 (2026-05-05)
    - Mac 平台支持 Gemma 4 MTP（多 Token 处理）推测解码，在 Gemma 4 31B 编码任务上可带来 2 倍以上的速度提升（`ollama run gemma4:31b-coding-mtp-bf16`）
    - 更新 MLX 与 MLX-C，修复多线程问题
    - Go 升级至 1.26

    v0.23.0 (2026-05-03)
    - Ollama Launch 现已支持 Claude Desktop（`ollama launch claude-desktop`）；Claude Desktop 应用内同时支持 Claude Cowork 与 Claude Code
    - Ollama 应用通过服务端推荐展示精选模型
    - 修复 Windows 上 OpenClaw 网关超时问题（强制使用 IPv4 回环地址）
    - 强化 Metal 初始化以优雅处理 ggml 内核编译失败

    v0.22.1 (2026-04-28)
    - 更新 Gemma 4 渲染器，改进思考与工具调用
    - 模型推荐可独立于 Ollama 升级而更新
    - 桌面应用的 launch 页面与 `ollama launch` 集成保持一致
    - 修复 `ollama launch` 中 Poolside 集成的标题

    v0.22.0 (2026-04-28)
    - 新增模型：NVIDIA Nemotron 3 Omni 与 Poolside 首个开放权重编码模型 Laguna XS.2

    v0.21.3 (2026-04-24)
    - api：think 字段接受 "max" 取值
    - openai：将 responses reasoning effort 映射到 think

    v0.21.2 (2026-04-23)
    - 改进 `ollama launch` 中 OpenClaw 引导流程的可靠性
    - `ollama launch` 中推荐模型按固定的规范顺序展示
    - OpenClaw 集成内置 Ollama 的 Web Search 插件

    v0.21.1 (2026-04-22)
    - Kimi CLI：可通过 Ollama 安装并运行 Kimi CLI（`ollama launch kimi --model kimi-k2.6:cloud`）
    - MLX 运行器为兼容模型新增 logprobs 支持
    - 更快的 MLX 采样：top-P 与 top-K 在单次排序中融合，且重复惩罚在采样器中应用
    - 改进 MLX prompt tokenization：将分词移入请求处理 goroutine
    - 改进 MLX 数组管理的线程安全性
    - GLM4 MoE Lite 性能提升：融合 sigmoid 路由头
    - 修复 macOS 应用切换聊天后模型选择器显示过期模型的问题
    - 修复 Gemma 4 在 `think=false` 时的结构化输出

    v0.21.0 (2026-04-16)
    - Hermes Agent：`ollama launch hermes` —— Hermes 在与你协作中学习，自动生成 skill 以更好地服务研究与工程工作流
    - MLX 上的 Gemma 4：Apple Silicon 文本专用 MLX 运行时，支持混合精度量化与新增算子封装
    - Hermes 与 GitHub Copilot CLI 现已成为 `ollama launch` 的一等集成
    - `ollama launch opencode` 现使用内联配置，不再写入独立配置文件
    - `ollama launch` 在配置无变化时不再重写配置
    - 修复 `ollama launch openclaw --yes` 使非交互式安装可顺利完成
    - 恢复 Gemma 4 nothink 渲染器（e2b 风格 prompt）
    - 修复 Gemma 4 编译器错误（导致 Metal 构建失败）
    - 修复 macOS 交叉编译并降低 cgo 构建告警噪音

    v0.20.7 (2026-04-13)
    - 修复禁用 thinking 时 gemma:e2b 与 gemma:e4b 的输出质量
    - ROCm：Linux 平台升级到 ROCm 7.2.1

    v0.20.6 (2026-04-12)
    - 基于 Google 最新修复改进 Gemma 4 工具调用
    - 改进流式响应中的并行工具调用
    - 提供 Hermes Agent 的 Ollama 集成指南
    - 修复 Ollama 应用中的图片附件错误

    详细发布说明请访问：
    https://github.com/ollama/ollama/releases
