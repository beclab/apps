metadata:
  title: Ollama
  description: 开始使用并运行大型语言模型吧。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 应用概览 ##
    Ollama 是一个用于在本地运行大型语言模型（LLMs）的用户友好界面。  
    对研究人员、开发者以及任何想要尝试大语言模型的人来说，Ollama 是一个非常有价值的工具。  
    使用 Ollama，您可以轻松下载和运行 LLMs，自定义并创建您自己的模型，并使用您设备上的文件与 LLMs 进行对话。

    Ollama 支持广泛的模型，包括：
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    将 Ollama 版本从 v0.17.5 升级至 v0.17.7

    ## 主要变更

    # v0.17.7 (2026-03-06)
    - 在使用 `ollama launch` 时增加上下文长度以支持压缩
    - 所有思考模型在 Ollama API 中现可正确解析 "medium" 等思考级别

    # v0.17.5 (2026-03-02)
    ## 新增模型
    - Qwen3.5：小型 Qwen 3.5 模型系列现提供 0.8B、2B、4B 和 9B 参数规格。

    ## 修复
    - 修复 Qwen 3.5 模型在 GPU 与 CPU 间拆分时的崩溃问题
    - 修复 Qwen 3.5 因缺少 presence penalty 导致的自我重复问题（可能需要重新拉取模型，例如 `ollama pull qwen3.5:35b`）
    - 使用 MLX 引擎时，`ollama run --verbose` 现会显示峰值内存使用
    - 修复 MLX 运行器中的内存问题与崩溃
    - 修复无法运行从 Qwen3.5 GGUF 文件导入的模型的问题

    如需查看每个版本的新增模型和功能的详细发布说明，请访问：
    https://github.com/ollama/ollama/releases
