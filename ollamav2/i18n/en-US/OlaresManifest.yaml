metadata:
  title: Ollama
  description: Get up and running with large language models.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## OVERVIEW ##
    Ollama is a user-friendly interface for running large language models (LLMs) locally. It is a valuable tool for researchers, developers, and anyone who wants to experiment with language models. With Ollama, you can easily download and run LLMs, customize and create your own, and chat with your LLMs using files on your device.

    Ollama supports a wide range of models, including:
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    Upgrade Ollama from v0.20.0 to v0.20.5

    ## What's Changed

    # v0.20.5 (2026-04-09)
    - OpenClaw channel setup: connect WhatsApp, Telegram, Discord, and other messaging channels through `ollama launch openclaw`
    - Enable flash attention for Gemma 4 on compatible GPUs
    - `ollama launch openclaw` now detects curl-based OpenCode installs at ~/.opencode/bin
    - Fix `/save` command for models with safetensors-based architectures

    # v0.20.4 (2026-04-07)
    - mlx: Improve M5 performance with NAX
    - gemma4: enable flash attention

    # v0.20.3 (2026-04-07)
    - Gemma 4 Tool Calling improvements
    - Added latest models to Ollama App
    - OpenClaw fixes for launching TUI

    # v0.20.2 (2026-04-04)
    - App: default app home view to new chat instead of launch

    # v0.20.1 (2026-04-03)
    - bench: add prompt calibration, context size flag, and NumCtx reporting
    - Fix gemma4 arg parsing when quoted strings contain "
    - gemma4: enable flash attention
    - Rework gemma4 tool call handling
    - Fix ROCm build for cublasGemmBatchedEx reserve wrapper

    ## Other
    - Upgrade terminal to v0.0.8

    For detailed release notes, visit:
    https://github.com/ollama/ollama/releases
