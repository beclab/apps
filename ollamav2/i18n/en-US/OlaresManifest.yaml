metadata:
  title: Ollama
  description: Get up and running with large language models.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## OVERVIEW ##
    Ollama is a user-friendly interface for running large language models (LLMs) locally. It is a valuable tool for researchers, developers, and anyone who wants to experiment with language models. With Ollama, you can easily download and run LLMs, customize and create your own, and chat with your LLMs using files on your device.

    Ollama supports a wide range of models, including:
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    Upgrade Ollama from v0.18.3 to v0.20.0

    ## Performance & Stability

    # v0.20.0 (2026-04-02)
    - Gemma 4 models: `gemma4:e2b`, `gemma4:e4b`, `gemma4:26b`, `gemma4:31b`
    - MLX: respect tokenizer `add_bos_token` in pipeline
    - Tokenizer: SentencePiece-style BPE support

    # v0.18.3 (2026-03-25)
    - GLM parser improvements for tool calls
    - OpenClaw integration improvements for gateway checks

    # v0.18.2 (2026-03-18)
    - Faster local inference by preventing cache breakages
    - Correctly support `ollama launch openclaw --model`

    # v0.18.1 (2026-03-17)
    - Improvements to Ollama's benchmarking tool

    # v0.18.0 (2026-03-14)
    - Up to 2x faster speeds with cloud models (Kimi-K2.5)
    - Tool calling accuracy improved
    - Lower latency on MiniMax-M2.5 (up to 10x faster) and Qwen3.5 (up to 2x faster) on Ollama's cloud
    - Context compaction now occurs at the correct context length for each model
    - ROCm 7 support for AMD GPUs (driver update required)
    - Cloud models no longer require `ollama pull`, setting `:cloud` tag connects automatically

    For detailed release notes, visit:
    https://github.com/ollama/ollama/releases
