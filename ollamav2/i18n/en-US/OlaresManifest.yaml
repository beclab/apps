metadata:
  title: Ollama
  description: Get up and running with large language models.

spec:
  fullDescription: |
    ## IMPORTANT NOTE ##
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    ## OVERVIEW ##
    Ollama is a user-friendly interface for running large language models (LLMs) locally. It is a valuable tool for researchers, developers, and anyone who wants to experiment with language models. With Ollama, you can easily download and run LLMs, customize and create your own, and chat with your LLMs using files on your device.

    Ollama supports a wide range of models, including:
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

  upgradeDescription: |
    Upgrade Ollama version from v0.17.5 to v0.17.7

    ## What's Changed

    # v0.17.7 (2026-03-06)
    - Add context length to support compaction when using `ollama launch`
    - Allow thinking levels such as "medium" to be correctly interpreted in Ollama's API for all thinking models

    # v0.17.5 (2026-03-02)
    ## New models
    - Qwen3.5: the small Qwen 3.5 model series is now available in 0.8B, 2B, 4B and 9B parameter sizes.

    ## Fixes
    - Fixed crash in Qwen 3.5 models when split over GPU & CPU
    - Fixed issue where Qwen 3.5 models would repeat themselves due to no presence penalty (note: you may have to redownload the `qwen3.5` models: `ollama pull qwen3.5:35b` for example)
    - `ollama run --verbose` will now show peak memory usage when using Ollama's MLX engine
    - Fixed memory issues and crashes in MLX runner
    - Fixed issue where Ollama would not be able to run models imported from Qwen3.5 GGUF files

    For detailed release notes including new models and features in each version, please visit:
    https://github.com/ollama/ollama/releases
