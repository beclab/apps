{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-env
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: env-config
  annotations:
    description: "Ollama env config. Edit data below and redeploy. Empty value = omit (use Ollama default)."
data:
  # Runtime
  PGID: "1000"
  PUID: "1000"
  TZ: "Etc/UTC"
  # CORS and GPU
  OLLAMA_ORIGINS: "*"
  GGML_CUDA_DISABLE_GRAPHS: "1"
  # Optional: set as needed (empty = use Ollama default)
  OLLAMA_DEBUG: ""
  MODEL_NAME: ""
  OLLAMA_NO_CLOUD: ""
  # Parallel requests per model (default 1; empty = use Ollama default)
  OLLAMA_NUM_PARALLEL: ""
  # Max concurrently loaded models (default 0 = auto based on VRAM, typically 3 x GPUs)
  OLLAMA_MAX_LOADED_MODELS: ""
  OLLAMA_LOAD_TIMEOUT: ""
  OLLAMA_GPU_OVERHEAD: ""
  OLLAMA_CONTEXT_LENGTH: ""
  # Performance: Flash Attention reduces memory at large context sizes
  OLLAMA_FLASH_ATTENTION: "1"
  # KV cache quantization: f16 (default), q8_0 (half memory, minimal quality loss), q4_0 (quarter memory)
  OLLAMA_KV_CACHE_TYPE: ""
  # How long models stay loaded in memory (default "5m"; e.g. "30m", "-1" = forever, "0" = never)
  OLLAMA_KEEP_ALIVE: ""
  # Maximum number of queued requests (default 512)
  OLLAMA_MAX_QUEUE: ""
  # Enable client<->server authentication
  OLLAMA_AUTH: ""
  # Allowed remote hosts for cloud models, comma-separated (default "ollama.com")
  OLLAMA_REMOTES: ""
  # Opt-in to the new Ollama engine (experimental)
  OLLAMA_NEW_ENGINE: ""
{{- end }}