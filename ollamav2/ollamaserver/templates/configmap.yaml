{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-env
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: env-config
  annotations:
    description: "Ollama env config. Give every key a real value — empty strings break 0.30 llama-server (e.g. LLAMA_ARG_FIT_TARGET). Edit values then redeploy."
data:
  # Runtime (linuxserver-style; harmless if unused by official image)
  PGID: "1000"
  PUID: "1000"
  TZ: "Etc/UTC"
  # CORS: see note below — narrow to your Olares domain if you expose the raw API to browsers
  OLLAMA_ORIGINS: "*"
  # Performance (official default for flash-attn is off)
  OLLAMA_FLASH_ATTENTION: "1"
  # 0.30 llama.cpp VRAM auto-fit (default on)
  LLAMA_ARG_FIT: "on"
  # Free VRAM margin per GPU in MiB (llama.cpp default 1024). MUST be non-empty — an empty value crashes
  # llama-server (stoull). Comma-separate for multi-GPU, e.g. "2048,2048".
  LLAMA_ARG_FIT_TARGET: "1024"
{{- end }}
