{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-env
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: env-config
  annotations:
    description: "Ollama env config. Edit data below and redeploy. Empty value = omit (use Ollama default)."
data:
  # Runtime
  PGID: "1000"
  PUID: "1000"
  TZ: "Etc/UTC"
  # CORS and GPU
  OLLAMA_ORIGINS: "*"
  GGML_CUDA_DISABLE_GRAPHS: "1"
  # Optional: set as needed (empty = use Ollama default)
  OLLAMA_DEBUG: ""
  MODEL_NAME: ""
  OLLAMA_NO_CLOUD: ""
  OLLAMA_NUM_PARALLEL: "1"
  OLLAMA_MAX_LOADED_MODELS: "3"
  OLLAMA_LOAD_TIMEOUT: ""
  OLLAMA_GPU_OVERHEAD: ""
  OLLAMA_CONTEXT_LENGTH: ""
{{- end }}