olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: opennotebook
  icon: https://app.cdn.olares.com/appstore/opennotebook/icon.png
  description: A powerful open-source, AI-powered note-taking/research platform that respects your privacy
  appid: opennotebook
  title: Open Notebook
  version: '1.0.3'
  categories:
  - Productivity_v112
  - Productivity
entrances:
- authLevel: internal
  host: opennotebookingress
  icon: https://app.cdn.olares.com/appstore/opennotebook/icon.png
  name: notebook
  openMethod: window
  port: 8080
  title: Open Notebook
spec:
  versionName: '1.8.5'
  promoteImage:
  - https://app.cdn.olares.com/appstore/opennotebook/1.webp
  - https://app.cdn.olares.com/appstore/opennotebook/2.webp
  - https://app.cdn.olares.com/appstore/opennotebook/3.webp
  - https://app.cdn.olares.com/appstore/opennotebook/4.webp
  
  fullDescription: |
    Open Notebook is an open source, privacy-focused alternative to Google's Notebook LM!

    In a world dominated by Artificial Intelligence, having the ability to think and acquire new knowledge, is a skill that should not be a privilege for a few, nor restricted to a single provider.

    Open Notebook empowers you to:
    - Control your data: Keep your research private and secure
    - Choose your AI models: Support for 16+ providers including OpenAI, Anthropic, Ollama, LM Studio, and more
    - Organize multi-modal content: PDFs, videos, audio, web pages, and more
    - Generate professional podcasts: Advanced multi-speaker podcast generation
    - Search intelligently: Full-text and vector search across all your content
    - Chat with context: AI conversations powered by your research

  upgradeDescription: |
    Open Notebook version 1.8.5
    
    Full release note at: https://github.com/lfnovo/open-notebook/releases/tag/v1.8.5

  developer: lfnovo
  website: https://www.open-notebook.ai/
  sourceCode: https://github.com/lfnovo/open-notebook
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://www.open-notebook.ai/get-started.html
  license:
  - text: MIT
    url: https://github.com/lfnovo/open-notebook?tab=MIT-1-ov-file
  limitedCpu: 4.5
  limitedDisk: 50Gi
  limitedMemory: 4.5Gi
  requiredCpu: 50m
  requiredDisk: 50Mi
  requiredMemory: 1000Mi
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    version: '>=1.12.2-0'
    type: system
envs:
  - envName: PASSWORD
    required: false
    applyOnChange: true
    type: password
    editable: true
    description: "Set a password to protect your Open Notebook instance (for public hosting)"
