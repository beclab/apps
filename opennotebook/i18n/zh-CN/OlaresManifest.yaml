metadata:
  description: 一个强大的开源、AI驱动的笔记与研究平台，尊重您的隐私
  title: Open Notebook
spec:
  fullDescription: |
    Open Notebook 是一个开源且注重隐私的笔记工具，是 Google Notebook LM 的极佳替代品！

    在被人工智能主导的世界中，思考与获取新知识的能力不应成为少数人的特权，也不应被单一服务商所限制。

    Open Notebook 让您能够：
    - 掌控您的数据：让您的研究数据私密且安全
    - 自由选择 AI 模型：支持 16+ 个提供商，包括 OpenAI、Anthropic、Ollama、LM Studio 等 — 均可通过界面配置
    - 高效管理多模态内容：支持 PDF、视频、音频、网页等多种内容
    - 生成专业播客：具备先进的多说话人播客生成能力
    - 智能检索：全文检索与向量检索结合，轻松搜索一切内容
    - 上下文对话：由您研究内容驱动的 AI 智能对话

  upgradeDescription: |
    Open Notebook 1.8.5 版本（从 1.4.0 升级）

    重要新功能：
    - 界面化 API 密钥管理（1.7.0）：通过设置 → API 密钥配置 14 个 AI 提供商 —— OpenAI、Anthropic、Google、Groq、Mistral、DeepSeek、xAI、OpenRouter、Voyage AI、ElevenLabs、Ollama、Azure OpenAI、OpenAI-Compatible、Vertex AI —— 凭证以 Fernet AES-128-CBC + HMAC-SHA256 加密存储，支持一键连接测试与模型发现，并提供 .env 旧配置迁移工具
    - 新增两个 AI 提供商（1.8.2）：DashScope（阿里云 Qwen）与 MiniMax（204K 上下文），通过 Esperanto 2.20.0 接入
    - 播客模型注册中心整合（1.8.0）：节目（Episode）和发言人（Speaker）简介改为引用模型注册中心，不再使用零散的 provider/model 字符串；凭证自动透传到 podcast-creator；支持每个发言人单独覆盖语音模型；新增节目级 language 字段（采用 BCP 47 编码，如 pt-BR、en-US）；旧版简介首次启动时自动迁移；"Templates" 标签更名为 "Profiles"；未配齐的简介显示 "Setup required" 标记；新增 GET /api/languages 接口
    - 播客失败恢复（1.7.3）：失败的播客单集新增重试按钮和错误详情，并提供 POST /podcasts/episodes/{id}/retry 重试接口与 error_message 字段；通过 podcast-creator 0.12.0 支持播客语言选择（1.8.1）
    - 国际化扩展（1.5.0 → 1.8.5）：简体与繁体中文（1.5.0）、俄语和意大利语（1.7.0）、法语（1.7.1）、孟加拉语（1.8.1 / 1.8.2）、西班牙语（1.8.5）—— 共计 8+ 种语言，并新增语言切换组件、date-fns 日期本地化与错误消息翻译系统
    - Token 化的嵌入分块（1.8.5）：分块单位从字符切换为 token，大幅改善中日韩与混合语言场景下的分块尺寸；OPEN_NOTEBOOK_CHUNK_SIZE / OPEN_NOTEBOOK_CHUNK_OVERLAP 的语义同步变更（默认值由 1200 字符下调为 400 token，以稳妥落在 mxbai-embed-large 等 BERT 系嵌入模型 512 token 上限以内）
    - LLM 错误分类（1.7.2）：API Key 无效 / 模型错误 / 触发限流 / 配置错误等情况现在通过 FastAPI 全局异常处理器返回带描述的错误消息，不再统一显示 "An unexpected error occurred"
    - 文本来源的 HTML 剪贴板检测、URL 校验防 SSRF、通过 _FILE 后缀使用 Docker secrets（1.7.0）

    安全加固（CERT-EU 协调披露）：
    - 1.8.4 —— 用户自定义转换 prompt 中存在 Jinja2 SSTI 远程代码执行（CVSS 9.2，严重）、文件名路径穿越导致任意文件写入（CVSS 7.0，高危）、来源创建接口存在本地文件包含（LFI）任意文件读取（CVSS 8.2，高危）。修复方式：所有模板渲染改用 SandboxedEnvironment、文件名经 os.path.basename() 净化、解析后的路径强制限制在上传目录内
    - 1.8.3 —— GET /api/notebooks 的 order_by 查询参数存在 SurrealDB 注入（CVSS 8.7，高危，可通过 CSRF 触发）。修复方式：排序参数加白名单校验，使用 $variable 参数化绑定替代 f-string 拼接，base 类的 get_all() 方法增加防御性校验

    重要改进：
    - 移除笔记本聊天上下文的 50 个来源硬上限（1.8.0）
    - 大文档（3MB+）嵌入按 50 条一批分组并支持单批重试，避免 413 Payload Too Large 错误（1.7.4）
    - 修复 SurrealDB 卡住问题（1.8.1），并在 Docker Compose 中固定 SurrealDB 版本，防止上游变更引入破坏性升级（1.8.0）
    - tiktoken 在构建期预下载编码文件，离线 / 内网隔离部署不再因此崩溃（1.8.1，1.8.2 进一步修补）
    - 失败的来源会保留其 asset（URL 或文件路径），便于识别和重试（1.8.2）
    - 用户手动设置的来源标题不再被后台处理过程覆盖（1.8.2）
    - 凭证级联删除：删除凭证时自动连带删除关联模型，不再返回 409 错误（1.8.2）
    - 通过 URL、上传文件或文本添加来源后，来源列表自动刷新（1.8.2）
    - 播客单集目录改用 UUID 命名，避免标题中含特殊字符导致的文件系统错误（1.8.2）
    - 多个嵌入提供商的 Esperanto base_url / api_key 配置修复（1.8.2）；ElevenLabs TTS 凭证透传修复（1.7.1）
    - 聊天系统的 SqliteSaver 异步兼容修复，笔记/来源删除级联，YouTube 内容可用性修复，空内容重新嵌入修复（1.7.0）
    - source chat 与 ask 的 SSE 流式错误事件不再被内层 JSON parse 的 try/catch 吞掉，可正常显示（1.7.2）
    - 聊天输入/消息、来源卡片、笔记编辑器、行内编辑、笔记标题、对话框内容的长字符串换行 / 溢出问题修复（1.7.2）
    - 嵌入字段改为可选；转换的 max_tokens 上调；空白/纯空格的来源内容不再触发重试循环（1.7.1）
    - 修复可折叠列组件中的中日韩文字方向问题（1.8.0）
    - 凭证接口具备容错能力：加密密钥损坏或不匹配时不再让 API 崩溃（不再返回 500）；损坏的凭证会显示解密警告但仍可删除；DELETE 支持通过 migrate_to 参数迁移到其他模型（1.8.5）
    - Azure 默认 API 版本升级到 2024-10-21（1.8.2）；Azure 凭证的 base_url 现在能正确映射到 endpoint（1.8.5）
    - 通过 Esperanto 2.17.2 修复 llama.cpp / OpenAI-Compatible 提供商的连接错误（1.6.2）
    - 前端 i18n 由自定义 Proxy 模式迁移至标准的 react-i18next t() 函数，与生态工具更兼容（1.8.5）
    - 单容器 Docker 镜像被弃用，官方推荐使用 Docker Compose（1.8.2）；Olares 部署方式不受影响
    - 引入 Vitest 前端测试基础设施、优化 Dockerfile 多阶段构建缓存，以及无障碍可访问性改进（1.5.0）

    升级注意事项：
    - 已有播客简介会在首次启动时自动迁移至模型注册中心（1.8.0）；无法自动映射的简介会显示 "Setup required" 标记，请打开后重新选择模型
    - 嵌入分块大小默认值由 1200 字符改为 400 token（1.8.5）；只有新摄入的内容会使用新分块策略，已存储的嵌入不受影响
    - 单容器 Docker 镜像已弃用（1.8.2），建议改用 Docker Compose；Olares 用户无需任何操作

    完整发布说明：https://github.com/lfnovo/open-notebook/releases （v1.5.0 至 v1.8.5）