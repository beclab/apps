olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  claudecode: 1
  terminal: 1
metadata:
  name: claudecode
  icon: https://app.cdn.olares.com/appstore/claudecode/icon.png
  description: Anthropic's official agentic coding CLI that lives in your terminal
  appid: claudecode
  title: Claude Code
  version: 0.1.13
  categories:
  - Developer Tools
  - Productivity_v112

entrances:
- name: terminal
  host: terminal
  port: 80
  title: Claude Code CLI
  icon: https://app.cdn.olares.com/appstore/claudecode/icon.png
  openMethod: window
  authLevel: internal
spec:
  versionName: '2.1.191'
  fullDescription: |
    **Overview**
    Claude Code is Anthropic's official agentic coding tool that lives in your terminal. It understands your codebase, executes routine tasks through natural language, and helps you move fast while staying in flow.

    **Key Features**
    - Terminal-native TUI with streaming tool output, slash commands, interrupt-and-redirect, and rich diff review.
    - Real file edits, shell execution, git workflows, and test runs driven by natural language.
    - Skills, Subagents and MCP-compatible tool calling.
    - Works with a Claude Pro/Max subscription (OAuth) or a Console API key; also supports Amazon Bedrock and Google Vertex AI.
    - Workspace image ships common language runtimes and build toolchains (Python, Node.js, Go, Rust, OpenJDK 21, Ruby, PHP, Lua) plus database clients (PostgreSQL, MySQL/MariaDB, Redis), git-lfs, protobuf compiler, Gradle, tmux, dig/ss/nc, shellcheck, clang-format/tidy, graphviz, and extra -dev headers (libpq, MySQL client, curl, ICU, LDAP) so agents can run typical dev commands without root.
    - Optional Docker-in-Docker sidecar (`ENABLE_DIND`, default on): run `docker build`, `docker compose`, and containerized dev stacks from the terminal.

    **First-time Setup**
    Open the `Claude Code CLI` entrance and run `claude` to launch the OAuth login flow, or set `ANTHROPIC_API_KEY` in the app environment variables and restart.

    **Use a Local Model (Ollama / Anthropic-compatible Gateway)**
    To route Claude Code at a local Ollama (or any Anthropic-compatible `/v1/messages` proxy) deployed inside your Olares cluster, configure these env vars in the app settings — no manual `export`/`unset` needed each session:

    - `ANTHROPIC_BASE_URL` = `http://<your-shared-domain>` (e.g. the shared entrance of an Ollama Olares app)
    - `ANTHROPIC_AUTH_TOKEN` = `ollama`
    - `ANTHROPIC_API_KEY` = (leave blank)
    - `ANTHROPIC_MODEL` = `qwen3-coder:30b` (or whichever model that gateway exposes)
    - `CLAUDE_CODE_USE_BEDROCK` / `CLAUDE_CODE_USE_VERTEX` / `CLAUDE_CODE_USE_FOUNDRY` = false

    These vars are conditionally injected: blank strings and `false` toggles are *not* placed into the container env, so Claude Code sees them as truly unset (which is required — it treats `CLAUDE_CODE_USE_*` by presence, not value).

  upgradeDescription: |
    Terminal sidecar image bumped to `beclab/terminal:v0.0.13` (was v0.0.11).

  developer: Anthropic
  website: https://code.claude.com
  sourceCode: https://github.com/anthropics/claude-code
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://code.claude.com/docs
  license:
  - text: Claude Code License
    url: https://github.com/anthropics/claude-code/blob/main/LICENSE.md
  requiredMemory: 3Gi
  limitedMemory: 44Gi
  requiredDisk: 1Gi
  limitedDisk: 100Gi
  requiredCpu: 500m
  limitedCpu: 12
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
  - Home
  externalData: true
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
envs:
- envName: ANTHROPIC_API_KEY
  type: password
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Anthropic API key. Leave empty for OAuth login (Claude Pro/Max subscription) or when routing to an Anthropic-compatible gateway (e.g. Ollama) via ANTHROPIC_AUTH_TOKEN."
- envName: ANTHROPIC_AUTH_TOKEN
  type: password
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Bearer token sent as `Authorization: Bearer ...` to the Anthropic-compatible API. For Ollama set this to `ollama` and leave ANTHROPIC_API_KEY blank."
- envName: ANTHROPIC_BASE_URL
  type: url
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Custom Anthropic-compatible API endpoint (e.g. https://your-shared-domain for an Olares-hosted Ollama proxy). Leave empty to use Anthropic's official endpoint."
- envName: ANTHROPIC_MODEL
  type: string
  required: false
  applyOnChange: true
  editable: true
  default: ""
  description: "Default model to use when running `claude` without --model (e.g. qwen3-coder:30b for an Ollama backend). Leave empty to let Claude Code prompt or use its own default."
- envName: CLAUDE_CODE_USE_BEDROCK
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Route through Amazon Bedrock instead of the Anthropic API. Leave false unless you specifically want Bedrock — Claude Code treats this var by presence, the chart only injects it when true."
- envName: CLAUDE_CODE_USE_VERTEX
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Route through Google Vertex AI instead of the Anthropic API. Leave false unless you specifically want Vertex — Claude Code treats this var by presence, the chart only injects it when true."
- envName: CLAUDE_CODE_USE_FOUNDRY
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Route through Azure AI Foundry instead of the Anthropic API. Leave false unless you specifically want Foundry — Claude Code treats this var by presence, the chart only injects it when true."
- envName: ENABLE_DIND
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "true"
  description: "Run a privileged Docker-in-Docker sidecar in the pod. Exposes docker CLI in the terminal via DOCKER_HOST=tcp://localhost:2375 (uses extra CPU/RAM/disk under app data). Disable if your environment forbids privileged containers"
- envName: ALLOW_HOME_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow Claude Code to read/write the Olares Home directory"
- envName: ALLOW_EXTERNAL_DIR_ACCESS
  type: bool
  required: false
  applyOnChange: true
  editable: true
  default: "false"
  description: "Allow Claude Code to read/write the Olares External directory"
