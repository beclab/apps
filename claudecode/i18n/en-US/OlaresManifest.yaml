metadata:
  title: Claude Code
  description: Anthropic's official agentic coding CLI that lives in your terminal
spec:
  fullDescription: |
    **Overview**
    Claude Code is Anthropic's official agentic coding tool that lives in your terminal. It understands your codebase, executes routine tasks through natural language, and helps you move fast while staying in flow.

    **Key Features**
    - Terminal-native TUI with streaming tool output, slash commands, interrupt-and-redirect, and rich diff review.
    - Real file edits, shell execution, git workflows, and test runs driven by natural language.
    - Skills, Subagents and MCP-compatible tool calling.
    - Works with a Claude Pro/Max subscription (OAuth) or a Console API key; also supports Amazon Bedrock and Google Vertex AI.
    - Workspace image ships common language runtimes and build toolchains (Python, Node.js, Go, Rust, OpenJDK 21, Ruby, PHP, Lua) plus database clients (PostgreSQL, MySQL/MariaDB, Redis), git-lfs, protobuf compiler, Gradle, tmux, dig/ss/nc, shellcheck, clang-format/tidy, graphviz, and extra -dev headers (libpq, MySQL client, curl, ICU, LDAP) so agents can run typical dev commands without root.

    **First-time Setup**
    Open the `Claude Code CLI` entrance and run `claude` to launch the OAuth login flow, or set `ANTHROPIC_API_KEY` in the app environment variables and restart.

    **Use a Local Model (Ollama / Anthropic-compatible Gateway)**
    To route Claude Code at a local Ollama (or any Anthropic-compatible `/v1/messages` proxy) deployed inside your Olares cluster, configure these env vars in the app settings — no manual `export`/`unset` needed each session:

    - `ANTHROPIC_BASE_URL` = `http://<your-shared-domain>` (e.g. the shared entrance of an Ollama Olares app)
    - `ANTHROPIC_AUTH_TOKEN` = `ollama`
    - `ANTHROPIC_API_KEY` = (leave blank)
    - `ANTHROPIC_MODEL` = `qwen3-coder:30b` (or whichever model that gateway exposes)
    - `CLAUDE_CODE_USE_BEDROCK` / `CLAUDE_CODE_USE_VERTEX` / `CLAUDE_CODE_USE_FOUNDRY` = false

    These vars are conditionally injected: blank strings and `false` toggles are *not* placed into the container env, so Claude Code sees them as truly unset (which is required — it treats `CLAUDE_CODE_USE_*` by presence, not value).
