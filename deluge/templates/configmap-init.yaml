apiVersion: v1
kind: ConfigMap
metadata:
  name: deluge-init
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    homeDir="/olares/userdata/home"
    downloadDir="$homeDir/Downloads/deluge"
    confFile="/config/core.conf"
    defaultConf="/chart-defaults/core.conf"

    mkdir -p "$downloadDir"
    # Only app-created Downloads subtree + appData — never recurse the whole Home.
    chown -R 1000:1000 "$downloadDir" /config

    if [ ! -f "$confFile" ]; then
      echo "First-time setup: copying default core.conf into /config."
      cp "$defaultConf" "$confFile"
    else
      echo "Existing core.conf found in /config."
    fi
