metadata:
  title: Deluge
  description: A lightweight and free BitTorrent client.
spec:
  fullDescription: |
    Deluge is a fully-featured cross-platform BitTorrent client. It contains the common features to BitTorrent clients such as Protocol Encryption, DHT, Local Peer Discovery (LSD), Peer Exchange (PEX), UPnP, NAT-PMP, Proxy support, Web seeds, global and per-torrent speed limits.

    **Default credentials**
    Username: admin
    Password: deluge
    Please change username and password as soon as possible.

    **Highlighted Features**
    As Deluge heavily utilises the libtorrent library it has a comprehensive list of the features provided.
    - Disk caching
    - Network buffers
    - Piece picker
    - Share mode
    - Merkle hash tree torrents
    - Customizable file storage
    - Easy to use API

    Visit here to learn more: https://dev.deluge-torrent.org/
  upgradeDescription: |
    Upgrade Deluge to version 2.2.0 (2025-04-28)
    Config changes: unified download directory & entrance auth level.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Add Olares External Directory mount path to /olares/userdata/external
    - Keep legacy /downloads mount for existing configurations
    - Default download path for new installs: Home/Downloads/deluge
    - Entrance auth level changed to internal
    - Switch container image to linuxserver/deluge

    Breaking changes:
    - Removed Python 3.6 support (Python >= 3.7)

    Upgrade Highlights:
    - [Core] Fixed insecure HTTP for new version check (GHSL-2024-189); fixed alert handler segfault; added support for creating v2 torrents
    - [Web UI] Fixed path traversal vulnerabilities (GHSL-2024-188, GHSL-2024-191); fixed insecure tracker icon endpoint (GHSL-2024-190); improved responsiveness to avoid "Connection lost"; added UI theme support and network interface name binding
    - [GTK UI] Fixed window resize crash with Piecesbar/Stats plugin; fixed quick search; added dark/light theme switching
    - [Console UI] Fixed 'rm' and 'move' commands hanging; fixed unable to add host in connection manager

    Full changelog: https://deluge.readthedocs.io/en/deluge-2.2.0/changelog.html
