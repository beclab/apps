metadata:
  description: 轻巧且免费的跨平台 ​BitTorrent 客户端
  title: Deluge
spec:
  fullDescription: |
    Deluge 是一个轻巧且免费的跨平台 ​BitTorrent 客户端。它集成了 BitTorrent 客户端常见的功能，如协议加密、DHT、本地对等发现（LSD）、对等交换（PEX）、UPnP、NAT-PMP、代理支持、Web 种子、全局及单个种子的速度限制等。

    **默认凭证**
    用户名: admin
    密码: deluge
    请尽快更改用户名和密码。

    **亮点**
    Deluge 大量使用 libtorrent 库，因此具备全面的功能列表。
    - 磁盘缓存
    - 网络缓冲
    - 分片选择
    - 共享模式
    - Merkle 哈希树种子文件
    - 可定制的文件存储
    - 易用的 API

    点击此处了解更多信息: https://dev.deluge-torrent.org/

  upgradeDescription: |
    升级 Deluge 至版本 2.2.0（2025-04-28）
    配置变更：统一下载目录 & 入口认证级别。
    - 变更默认 Olares Home 目录挂载路径为 /olares/userdata/home
    - 添加 Olares External 目录挂载路径为 /olares/userdata/external
    - 保留旧版 /downloads 挂载以兼容已有配置
    - 新安装默认下载路径：Home/Downloads/deluge
    - 入口认证级别更改为 internal
    - 切换容器镜像为 linuxserver/deluge

    破坏性变更：
    - 移除 Python 3.6 支持（需要 Python >= 3.7）

    升级亮点：
    - 【核心】修复新版本检查的不安全 HTTP（GHSL-2024-189）；修复 alert handler 段错误；新增 v2 种子创建支持
    - 【Web UI】修复路径遍历漏洞（GHSL-2024-188、GHSL-2024-191）；修复不安全的 tracker 图标端点（GHSL-2024-190）；改善响应性避免"Connection lost"；新增 UI 主题切换和网络接口名称绑定
    - 【GTK UI】修复启用 Piecesbar/Stats 插件时调整窗口大小崩溃；修复快速搜索；新增深色/浅色主题切换
    - 【Console UI】修复 rm 和 move 命令挂起；修复连接管理器无法添加主机

    完整更新日志：https://deluge.readthedocs.io/en/deluge-2.2.0/changelog.html
