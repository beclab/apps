# Per-workload replica counts (keys match Deployment metadata.name and
# workloadReplicas in OlaresManifest).
#   facefusionv3         — facefusion engine Deployment (== appid / Release.Name)
#   facefusiondownloader — model downloader (Hugging Face)
#   facefusionproxy      — nginx entrance proxy
workloads:
  facefusionproxy:
    replicaCount: 1
  facefusiondownloader:
    replicaCount: 1
  facefusionv3:
    replicaCount: 1
