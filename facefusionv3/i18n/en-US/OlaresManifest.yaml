metadata:
  title: FaceFusion
  description: Industry leading face manipulation platform
spec:
  fullDescription: |
    FaceFusion is a industry leading face manipulation platform. It enables you to effortlessly swap faces and create breathtaking photo manipulations.

    **Key Features:**
    Advanced Facical Image Generation and Editing
    - Utilizes high-quality algorithms for seamless and realistic blending of facial features with customizable intensity levels, provides features such as facial morphing, blending multiple faces, realistic transformations

    Multiple Face Swapping:
    - Supports swapping multiple faces in a single project.

    Real-Time Processing:
    - Provides instant previews and results, enhancing user experience with fast and interactive face fusion.

    Age Modification:
    - Alter the apparent age of a face

    Lip Sync:
    - ensures that swapped faces in videos are perfectly synced with the audio, creating seamless mouth movements that match the speech.

    Deep Swapper (DeepFaceLive Models):
    - A dedicated face-swap processor backed by community-trained DeepFaceLive `.dfm` models, with a built-in library of 24+ ready-to-use celebrity faces.

    **Model storage (App Common, shared)**
    FaceFusion model packs (3.0.0 → 3.6.0) live in the shared cross-app App Common
    HF Hub cache (`appCommon/huggingface`, fixed `/cache/hf/hub` container path).
    A `llm-init` download-only sidecar fetches every repo into that store via the
    user's `OLARES_USER_HUGGINGFACE_SERVICE`; the engine mounts the same store and
    gates on `download-svc:/readyz` before rebuilding the flat
    `/facefusion/.assets/models` view it expects as an ephemeral symlink farm over
    the cached snapshots. Model bytes are de-duplicated and reused across apps.
  upgradeDescription: |
    V3 shared-app migration of FaceFusion (engine 3.6.1).

    **What's Changed**

    - **Download architecture**: replaced the bespoke `harveyff-hf-downloader-only`
      Job with the shared `llm-init` download-only Deployment
      (`facefusiondownloader`), matching speachesv3 / acestep15v3. Model packs now
      land in the shared cross-app HF cache (App Common, `/cache/hf/hub`) in the
      standard `models--owner--repo/snapshots/<sha>/...` layout; the engine gates
      on `download-svc:/readyz` instead of per-repo `.done` sentinels and rebuilds
      the flat `/facefusion/.assets/models` layout as a symlink farm at startup.
    - **Entrance routing**: rewrote nginx to match acestep15v3 — llm-init API
      paths pin to download-svc; `/` gates on model download AND Gradio readiness
      and auto-reloads off the download dashboard into the app via `/__app_ready`.
    - **Architecture**: the engine Deployment is now named after the appid
      (`facefusionv3`); the nginx entrance (`facefusionproxy`) and downloader
      (`facefusiondownloader`) are independent workloads declared via
      `workloadReplicas`.
    - **HF env**: HF mirror / token are sourced from the user's system HF account
      via `valueFrom` (declared as `HF_ENDPOINT` / `HF_TOKEN` locally; templates
      no longer reference `OLARES_USER_*` names directly, as required by v3).
    - **Resources**: bumped `limitedMemory` to 21Gi so engine (16Gi) + llm-init
      (4Gi) + nginx (256Mi) limits fit inside the envelope.
